zagros.51.t:0 "The Guilds of the Road"
zagros.51.d:0 "There is no group more skilled, knowledgable, and aware of the vast routes between Basra and Shiraz and beyond than the Assyrian and Armenian truck drivers of the Transportation Guilds. These motorised nomads of the Ottoman-Iran borders have enveloped this relatively new industry with their culture, with a set hierachy of masters known as Arbabs taking on apprentices known as Shagaird-e Shufers under their wing. Their deep connection to the roads have allowed them gain insight into all the facets of the terrain, from bandit activity to road conditions and more, often shared amongst one another in a dispersed network of Chaikhanehs - teahouses - reinforced by ethnic and religious solidarity.\n\nOur agents have made contact with members of these guilds seeking their expertise and resources for hauling certain supplies to-and-from Basra and key points within the Confederation. Drawing on the ties they hold with their brothers and sisters still under Ottoman occupation, or simply hedging their bets on our victory, many have come to work with us, allowing us to transport more illict goods on the backs of their weathered trucks, hidden under tons of carpets, cooking oil, and other more mundane items."
zagros.51.a:0 "Key allies in the wars to come."


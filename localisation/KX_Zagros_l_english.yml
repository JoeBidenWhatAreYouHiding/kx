zagros.1.t:0 "The Zagros Confederation, 1936"
zagros.1.d:0 "There is a popular belief amongst the southern peoples of Iran that they are blessed by God. If that were not true, then He would not have granted them the gift of a nation to call their own. This gift is known as the Confederation of Mountain Peoples of Zagros, or just the Zagros Confederation. For years, the south of Iran had been neglected, trodden upon, or exploited by the more so-called 'civilised' regions of the country. It was only during the Weltkrieg that the tribes of the region finally stopped fighting one another to focus on fighting the one enemy that held their leashes. The Ettehād-e Jonub - the League of the South - secured a great victory for its peoples, signalled most clearly by the capture of Shiraz. From this point onwards, the ambition of the tribes would only grow, seeing the weakness of the Qajar dynasty and their inability to care for the southern people. When the Tajziyeh finally erupted, there was no better opportunity for the southern tribes of Iran to finally make their move for true, absolute independence. \n\nShielded by the great Zagros Mountain range and utilising their intimate knowledge of the landscape, the tribes fought hard and bloody against the royalist troops, and then later the republican forces. Many men and women died for the cause, but their sacrifice would finally pay off as the skirmishes eventually became less frequent, and the bombings became less devastating. Victory brought with it the independence of the region, and soon after, the formation of the Zagros Confederation - the first of its kind. \n\nToday, it operates as a strictly decentralised, traditional state, where the multiple confederations and tribes of Iran live in relative peace with one another, unrestricted by unfair taxation or cultural bannings. Though a majority of the nation is nomadic and largely agrarian, its economic survival hinges on the oilfields of Khuzestan, ruled over by the elderly Sheikh Khaz'al, a prominent leader within the confederation. One of the architects of the Confederation, and its current leader, Sowlat-ed-Dowleh Qashqai is the current Ilkan, who rules the nation mostly as a cultural figurehead, and as leader of the Supreme Council of Khans which contains representatives of the many tribes within the Confederation. Rather than governing through absolute rule, a delicate balance of negotiation, persuasion, and tribal pride is utilised to ensure the nation remains stable. The road ahead is uncertain, however. The Republic in Tehran will come eventually, and we cannot ignore the radicals in Orumiyeh any longer. One thing is assured - the snow of the mountains shall be stained with blood once again."
zagros.1.a:0 "What lies within the Zagros Confederation?"
zagros.1.b:0 "Dear God, lead us to glory!"
 
zagros.2.t:0 "State of the Confederation"
zagros.2.d:0 ":D"
zagros.2.a:0 "A delicate balance indeed."

zagros.3.t:0 "The German in Shiraz"
zagros.3.d:0 "Wilhelm Wassmuss has been in Iran for a long time representing German interests. He has not let us done so far, but is it really good to have a foreigner so tied to our politics?"
zagros.3.a:0 "He must be celebrated for his contributions to our independence!"
zagros.3.b:0 "Let us keep him at arm's length"
zagros.3.c:0 "I'm sorry. You're a hero...and you have to leave."

zagros.4.t:0 "Qashqai's Vision"
zagros.4.d:0 "centralise or no?"
zagros.4.a:0 "Together we are strong."
zagros.4.b:0 "Centralisation means control, and control brings strength."

zagros.5.t:0 "A Confederation United"
zagros.5.d:0 "No centralisation woohoo"
zagros.5.a:0 "Many we may be, united we shall stand."

zagros.6.t:0 "Whispers of Ambition"
zagros.6.d:0 "Gently or boldly?"
zagros.6.a:0 "Slowly and carefully. We cannot afford mistakes."
zagros.6.b:0 "Boldly. Speed is its own advantage."
 
zagros.7.t:0 "Bakhtiari Concerns"
zagros.7.d:0 "Erm the Bakhtiari, our main rivals, are concerned. What do?"
zagros.7.a:0 "Offer them positions of power to satisfy them."
zagros.7.b:0 "Bribe em."
zagros.7.c:0 "The Qashqai Lion does not turn around when the Bakhtiari Dog barks."
 
zagros.8.t:0 "Khaz'al's Warning"
zagros.8.d:0 "Kha'zal the Arab is angry af. What do?"
zagros.8.a:0 "Reassure him."
zagros.8.b:0 "Remind him who commands the armies here."
zagros.8.c:0 "Say nothing. Sit back and observe. Not everything needs a reaction."
 
zagros.9.t:0 "The Confrontation"
zagros.9.d:0 "Ohhhh fuck they have come to stop us! What are we gonna do?!"
zagros.9.a:0 "We have prepared well. Our position is strong."
zagros.9.b:0 "They have outmaneuvered us. It's over."

zagros.10.t:0 "Khaz'al Takes Charge"
zagros.10.d:0 "Ismail Khan Qashqai is gone and the Sheikh's forces are in Shiraz."
zagros.10.a:0 "A new era begins."
 
zagros.11.t:0 "What of the Bakhtiari?"
zagros.11.d:0 "Oh great, it's the Bakhtiari again. What do?"
zagros.11.a:0 "Collaborate. The Bakhtiari shall lead the confederation."
zagros.11.b:0 "Sideline them. Arabistan shall stand supreme."
zagros.11.c:0 "We all fucked. Perhaps another way..."

zagros.12.t:0 "The German Steps Forward"
zagros.12.d:0 "White Boy Goated With The Sauce Steps Forward...he take charge now."
zagros.12.a:0 "No, it's fine. I just didn't expect the Khan to be German is all."

zagros.13.t:0 "The Sheikh Takes the Reins"
zagros.13.d:0 "SHeikh Khazal is here now"
zagros.13.a:0 "The heart of the Confederation started here, and it shall remain so."
zagros.13.b:0 "We must concentrate political power in Ahvaz."

zagros.14.t:0 "The Name of Our Nation"
zagros.14.d:0 "What shall we be called?"
zagros.14.a:0 "We are Arabestan - the Land of the Arabs."
zagros.14.b:0 "We remain Zagros. The name serves us well."

zagros.15.t:0 "The Arab Awakening"
zagros.15.d:0 ""
zagros.15.a:0 "Our time has come."

zagros.16.t:0 "The Tribal Question"
zagros.16.d:0 "The tribes present a problem.\n\nThe Qashqai, Bakhtiari, and Lurs are not Arabs. They have their own languages, their own customs, their own fierce pride. They joined the confederation to resist Tehran, not to be ruled by an Arab sheikh.\n\nKhaz'al must decide how to handle them. Crush them, and risk endless rebellion. Buy them, and drain the treasury. Integrate them, and risk diluting the Arab character of his new state.\n\nThere are no easy answers."
zagros.16.a:0 "Crush them."
zagros.16.b:0 "Buy their loyalty."
zagros.16.c:0 "Integrate them slowly."

zagros.17.t:0 "Embracing Our Roots"
zagros.17.d:0 ""
zagros.17.a:0 "The Persian yoke is broken."

zagros.18.t:0 "Our Arab Brothers"
zagros.18.d:0 ""
zagros.18.a:0 "Kuwait shall be ours."
zagros.18.b:0 "Our eyes turn to Baghdad."
zagros.18.c:0 "We shall leave our mark on the Arab world!"
zagros.18.d:0 "We have enough to manage already."

zagros.19.t:0 "The Berlin Concession"
zagros.19.d:0 ""
zagros.19.a:0 "Let us discuss partnership."
zagros.19.b:0 "We will take their money, but not their orders."

zagros.20.t:0 "The Price of Loyalty"
zagros.20.d:0 ""
zagros.20.a:0 "Every man has his price."

zagros.21.t:0 "Gulf Ambitions"
zagros.21.d:0 ""
zagros.21.a:0 "Kuwait alone will suffice for now."
zagros.21.b:0 "The northern Gulf shall be ours."
zagros.21.c:0 "The entire Gulf shall bow to us!"
zagros.21.d:0 "We should focus on what we have."

zagros.22.t:0 "A Nation Forged"
zagros.22.d:0 "What shall we proclaim ourselves as?"
zagros.22.a:0 "Proclaim the Emirate of Arabestan!"
zagros.22.b:0 "Proclaim the Emirate of Zagros!"
zagros.22.c:0 "Proclaim the Ka'bid Sultanate!"
zagros.22.e:0 "Proclaim the Zagros Sultanate!"

zagros.23.t:0 "Wilhelm of Persia"
zagros.23.d:0 "What is to come of this German gone native? Will he yield to his masters in Berlin, or will he strive for the prosperity and freedom of the people who have adopted him? Only time will tell."
zagros.23.a:0 "The work begins."

zagros.24.t:0 "Picking Up the Pieces"
zagros.24.d:0 ""
zagros.24.a:0 "We shall rebuild."

zagros.25.t:0 "A Promise Kept"
zagros.25.d:0 "Wassmuss addresses the tribal leaders and gives them his word - again."
zagros.25.a:0 "Together, we shall build something new."

zagros.26.t:0 "Orders from Berlin"
zagros.26.d:0 "Berlin shows interest, but wants results before committing."
zagros.26.a:0 "We must steady our hearts and fasten our minds."

zagros.27.t:0 "A New Identity"
zagros.27.d:0 ""
zagros.27.a:0 "We are Zagros - children of the mountains."
zagros.27.b:0 "We are Iran - heirs to an ancient civilization."

zagros.28.t:0 "The Tribal Question"
zagros.28.d:0 ""
zagros.28.b:0 "Integrate them into the state. Tradition must yield to progress."
zagros.28.c:0 "Find a middle path. Partnership, not domination."

zagros.29.t:0 "A Soldier's Honour"
zagros.29.d:0 "Wassmuss honours his earliest allies when he first landed in Bushehr"
zagros.29.a:0 "A debt of honour is always repaid."

zagros.30.t:0 "Forging a Nation"
zagros.30.d:0 "who are we"
zagros.30.a:0 "We are heirs to Persia. Where we step was once an ancient and glorious civilization, and we are its children."
zagros.30.b:0 "We are a new nation; united by choice, not by blood."

zagros.31.t:0 "The Iran of Tomorrow"
zagros.31.d:0 "wat nou?"
zagros.31.a:0 "Proclaim the Free State of Zagros!"
zagros.31.b:0 "Proclaim the Free State of Iran!"
zagros.31.c:0 "Proclaim the Zagros Republic!"
zagros.31.e:0 "Proclaim the New Republic of Iran!"

zagros.32.t:0 "The State of Our Forces"
zagros.32.d:0 ""
zagros.32.a:0 "The reform begins now."

zagros.33.t:0 "The Committee Debates"
zagros.33.d:0 ""
zagros.33.a:0 "Good arguments on both ends..."

zagros.34.t:0 "The Khans Answer"
zagros.34.d:0 ""
zagros.34.a:0 "The tribes are with us."

zagros.35.t:0 "The New Officer Corps"
zagros.35.d:0 ""
zagros.35.a:0 "They will be invaluable."

zagros.36.t:0 "A Zagrosi Tradition"
zagros.36.d:0 ""
zagros.36.a:0 "May it last forevermore."

zagros.37.t:0 "Children of the Mountains"
zagros.37.d:0 ""
zagros.37.a:0 "These hills have seen everything."

zagros.38.t:0 "The Enemy Beyond The Mountains"
zagros.38.d:0 ""
zagros.38.a:0 "We shall fight and die for justice!"

zagros.40.t:0 "The Tribes Grow Restless"
zagros.40.d:0 "[Placeholder]"
zagros.40.a:0 "We must ease the burden on our allies."
zagros.40.b:0 "The Confederation must endure."

zagros.41.t:0 "Cracks in the Council"
zagros.41.d:0 "[Placeholder]"
zagros.41.a:0 "We cannot sustain this any longer."
zagros.41.b:0 "Hold firm! We need every tribe."

zagros.42.t:0 "The Council Fractures"
zagros.42.d:0 "[Placeholder]"
zagros.42.a:0 "Reduce the levies before it is too late."
zagros.42.b:0 "We will not yield."

zagros.43.t:0 "Taking Advantage Of A Brewing War"
zagros.43.d:0 "[placeholder]"
zagros.43.a:0 "Begin preparations."

zagros.44.t:0 "Stage 1 Complete"
zagros.44.d:0 "[placeholder]"
zagros.44.a:0 "[placeholder]"

zagros.45.t:0 "Stage 2 Complete"
zagros.45.d:0 "[placeholder]"
zagros.45.a:0 "[placeholder]"

zagros.46.t:0 "Full Support Reached"
zagros.46.d:0 "[placeholder]"
zagros.46.a:0 "[placeholder]"

zagros.47.t:0 "The Congress Extends Its Hand"
zagros.47.d:0 "egypt says sheikh khazal come along pal"
zagros.47.a:0 "We will attend and be heard."

zagros.48.t:0 "Cairo Calls!"
zagros.48.d:0 "WAR"
zagros.48.a:0 "We march alongside our Arab brothers."
zagros.48.b:0 "We will open our borders to the Cairo Axis but our armies stay home."

zagros.49.t:0 "Our Moment Has Come"
zagros.49.d:0 "WAR BUT SELFISH"
zagros.49.a:0 "The gulf will be ours!"
zagros.49.b:0 "Not yet."

zagros.52.t:0 "The Spoils of War"
zagros.52.d:0 "Ottoman dead, what nou?"
zagros.52.a:0 "All of it is ours. We shall lead the Arab cause into a golden age!"
zagros.52.b:0 "Kuwait and Basra are enough."
zagros.52.c:0 "Iraq is too large to hold alone."

zagros.53.t:0 "War on Two Fronts"
zagros.53.d:0 "Oh fuck Iran declared war on us. Should we get the fuck out of ME?"
zagros.53.a:0 "We shall turn full attention to the threat at home!"
zagros.53.b:0 "No surrender!"

zagros.54.t:0 "The Congress in Cairo"
zagros.54.d:0 "placeholder"
zagros.54.a:0 "Best to keep eyes on it for Berlin..."

zagros.55.t:0 "Creeping Chaos"
zagros.55.d:0 "placeholder"
zagros.55.a:0 "A glimpse into what we will soon face."




### Scripted Localization ###


### Ideas ###

ZGS_oil_wealth:0 "Black Gold of Khuzestan"
ZGS_oil_wealth_desc:0 "Even though the majority of our population may be farmers, nomads, or simple tradesmen, these occupations are not enough to sustain a nation. Our economic life-blood is almost entirely reliant on the seemingly limitless oil deposits which we extract, process, and sell to the highest bigger. Most of the fields are located in Khuzestan, in the grip of the honourable Sheikh Khaz'al who agreed that the confederation should handle the majority of these fields, in return for investment and political support for the Emir of Khuzestan. Many nations, particularly the Germans, have approached us seeking to get a cut of this business, offering further aid and development of infrastructure into the rest of our region. \n\nIt is imperative that we ensure the oil remains secure, otherwise we may risk certain economic doom."

ZGS_tribal_confederation:0 "Tribal Confederacy"
ZGS_tribal_confederation_desc:0 "Our valiant efforts in the Tajziyeh rewarded our peoples with an oppourtunity that even our ancestors could not fathom - an independent nation, finally free of the shackles of the central government to our north that always sought to burden us with their wars and their taxes and their way of life. What we have now is no mere republic, however, but rather a representative confederation that upholds the rights and customs of all the tribes of the south, from Arabs to Kurds to Qashqai to Luri, we all stand equal to one another. \n\nAlthough the various territories under our jurisdiction are highly autonomous and decentralised, a council of tribes remains active in Shiraz, seen as the de-facto capital of the Zagros Confederation, where matters are discussed and debated by the representative of each major tribe. Any matter requiring the attention of this council is thereby handled by the elected Ilkhan and his advisors. Although this system of governance is undoubtedly antiquated, it is acceptable to all the major players of the Confederation. Only time will tell if it manages to persevere."


ZGS_famine_and_influenza:0 "Lingering Famine and Influenza"
ZGS_famine_and_influenza_desc:0 "During the Weltkrieg, the southern provinces of Iran became nothing more than desolate. Caught between invading armies, warring tribal confederacies, and corrupt hoarding by local elites, the region's agricultural economy completely collapsed. This man-made starvation was closely followed by devastating outbreaks of cholera, typhus, and a remarkably virulent strain of influenza that ravaged nomadic camps and cities alike. In cities like Shiraz, tens of thousands perished, while many roaming confederations like the Qashqa'i and Afshars lost over a third of their fighting-age men to the plagues. \n\nThis was only worsened by the Tajziyeh, and even today we do not know the true extent of how many people perished over the last two decades. Although we are no longer crippled from major famine or disease, there are still occurences in the more remote regions of the Confederation, and our people suffer still as a result."


ZGS_german_presence:0 "German Presence"
ZGS_german_presence_desc:0 "For decades, the British Empire maintained a stranglehold over southern Iran through the coercion of the South Persia Rifles and the bribery of corrupt tribal elites. We were pleased to finally be rid of their meddling after the Weltkrieg, and gladly turned to a trusted wartime ally to secure our future; Germany. During the Weltkrieg, the German agent Wilhelm Wassmuss proved his absolute dedication to Iranian independence by organising a fierce tribal resistance against the occupying British forces. Having earned the profound respect and brotherhood of the Khans, Wassmuss now serves as the vital diplomatic bridge between the Zagros and Berlin. Thanks to his unique understanding of tribal politics, German investment is pouring into the region, replacing British hegemony with mutually beneficial trade, modern infrastructure, and German engineering. \n\nAlthough there are concerns that the Germans may take advantage of our kindness and emulate British overbearance, these remain relatively minor for the time being, especially with Wassmuss as the Kaiserreich's face here in the Middle East."


ZGS_feudal_warfare:0 "Feudal Warfare"
ZGS_feudal_warfare_desc:0 "Although we enjoy the liberty which comes with our decentralised confederation, there is also a major downside to such governance. Our military forces rely on a traditional system of warfare where our soldiers are merely levies on horseback, under the command of their Khan or Kalantar. While they may work well amongst one another, they lack the discipline or military prowess needed for a modern day army, to the point where they will refuse out of principle to be commanded by an officer from a differing tribe. \n\nCoordinating large-scale defensive operations across the mountain range is therefore almost impossible, especially considering how unwilling many of our civilians are to be so far away from their mountainous pastures, let alone abiding by their specific military hierarchies."




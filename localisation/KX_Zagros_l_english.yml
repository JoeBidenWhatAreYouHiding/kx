POLITICS_QASHQAI_DESC:0 "The life of an Ilkhani is often filled with drama, ambition, and a responsibility that few truly understand. Such is the life of the Solat-ed-Dowleh, the chief paramount of the Qashqai confederation and the current Ilkhani of the Zagros Confederation. During the Constitutional Revolution, the Qashqai were already enbroiled in conflict with not only the central government that they saw as British lackeys, but also rival confederacies that sought to oust the Ilkani and his people. It was only through Qashqai Khan's pragmatism that the Qashqai's grip over Fars was secured, as he sought alliances with key figures, most key of all being Sheikh Kha'zal of Mohammerah, the shrewd Emir who he would be working with for many more years to come. This League of the South, as it would come to be known, was perhaps the first glimpse into what would later become the Confederation of the Zagros.\n\nQashqai Khan's ambition would only grow when the spectre of the Weltkrieg eventually made its way to Iran, and it manifested itself through a 'khareji', an outsider by the name of Wilhelm Wassmuss. The German spy would manage to convince Qashqai Khan after much deliberation to rise up once again, to dismantle the British presence in Fars and cast away the central government that they supported. Months of conflict finally gave away to a clear victory for Qashqai Khan and Hajji Wilhelm, signalled by their taking of Shiraz, the provincal capital of the region. It would never fall back into the central government's hands again. The British retreat from Iran and their ultimate defeat in the Weltkrieg solidified Qashqai Khan's invisible dominance of the region, and the League of the South expanded once more in influence and popularity. \n\nBut these times did not entail only success. The war and the failures of the government led to a devastating famine, and a dark shadow of death loomed over Fars. Such chaos proved to be the defining limit of the patience of the tribes, who blamed the central government entirely for their weakness during the Weltkrieg and after. Qashqai Khan had no issue raising his rifle once again in rebellion, and for the first time, he was accompanied by the same rival tribes that he viciously fought with years before. Although the regime in Tehran inflicted many casualties during the Tajziyeh, they could not stop the tribes from uniting together to defend the mountain range, though at a devastating cost. Today, Qashqai Khan sits in Shiraz, surrounded by his advisors and the representatives of the many tribes that now encompasses the Zagros Confederation. No doubt he shall be remembered as a legendary hero of the Qashqai and of all the tribes of the south. One question remains on how the coming years, and the inevitable conflicts within it, will shape that legacy."


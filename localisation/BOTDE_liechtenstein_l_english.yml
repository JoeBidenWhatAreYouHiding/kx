LIC_totalist_party_postfrance_long:0 "Bund der Alpenarbeiter\n§LLeague of Alpine Workers§!\n§gThe natural evolution of post-occupation Vaduz-Schellenberg, the Internationale occupation left lasting impacts on the country. Its Spartacist exiles, like Hans Beimler, were made leaders and vanguards of an Alpine revolution the likes of which had not been seen since the Trans-Alpine Strikes. The BA has fully separated from its Spartacist origins, declared the revolution in Liechtenstein complete, and has incorporated some sympathizers from the UEK and LAV. Now the BA seeks to complete an industrial revolution to pave the way for its grand vision of society.§!"


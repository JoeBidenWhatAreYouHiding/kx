licfor.19.b:0 "This does not concern us."

licfor.20.t:0 "Counter-Revolution in Britain"
licfor.20.d:0 "description of counter-revolution"
licfor.20.a:0 "Perhaps it is time to make another investment..."

licfor.21.t:0 "Franz Joseph II Selected King of Britain"
licfor.21.d:0 "General Percy Hobart's Counter-Revolution in Britain has swung the red banners off their poles, and set the moon upon an eclipse of the red sun. With Mosley ousted and the Syndicalists actively hunted in Britain once more, the Windsors have sought to reclaim their throne in Buckingham Palace - but it was not to be. Hobart decided that the Windsors were to be shunned from the Isles, and instead, a new king was to be elected - this included our glorious prince.\nAfter votes were tallied and monarchs contacted, it was obvious that there was a winner, and he lived in Vaduz. Prince Franz Joseph II has been crowned King Franz Joseph I of Britain, and Vaduz's odd investments have yet again bore massive, fruity returns."
licfor.21.a:0 "This is our most lucrative property yet!"

licfor.22.t:0 "Post-Ceylon-Purchase separatist ticker"
licfor.22.d:0 "hidden"
licfor.22.a:0 "hidden"

licfor.23.t:0 "Ceylon revolts!"
licfor.23.d:0 "ceylon wonders why some bumfuck landlocked micronation is owning it and revolts"
licfor.23.a:0 "We cannot do much here..."

licfor.24.t:0 "The Future of Ceylon"
licfor.24.d:0 "ceylon is ours lol"
licfor.24.a:0 "Ceylon muss unser sein!"

licfor.25.t:0 "Franz Joseph II Elected King of America"
licfor.25.d:0 "It all began when the blue-and-red royal banner flew over Anchorage in the new Alaska. The House of Liechtenstein had finally reached the New World, armed with the information of Alaskan black gold.\nNew England, too, has cast down the ballot and raised the sceptre and crown; to the monarchs they called. Washingtons and other royal candidates for America were selected, and as their letters fluttered further west, one went up the Pacific Coast and landed in Anchorage.\nAs the Prince of Liechtenstein owns property in Alaska, it was decided he too would be included in the election for an American monarchy. The New Englanders have made it clear who they prefer: not the Founding Fathers or any of their famous patriots, but a European royalty who owns one of the smallest extant nations, besides Alaska.\nFranz Joseph II has been elected as the King of America, and he shall honor the wishes of the New Englanders as their great king."
licfor.25.a:0 "Amerika ist wunderbar!"

licfor.26.t:0 "Bohemians occupy Liechtensteiner castles!"
licfor.26.d:0 "Vienna's authority throughout the vast forested realms of Central Europe have been struck with a mortal wound in their industrial heart; the revolution of the Kingdom of Bohemia. With Bohemia's revolution, the scales have been flipped and spun at immeasurable speeds, and any balance once perceived in Austria has been put on its head.\nUnfortunately, with an independent Bohemia comes Czech interests not privy to the demands of the Kaiser, and that means the respecting of princely properties. It has been reported to [LIC.GetLeader] that the Bohemians have manned Liechtensteiner properties, filling with with spplies and using as durable forts against potential Austrian infantry advances.\nIt is imperative to us that we get the Bohemians to compensate for the castles, and ensure that they do not wreck our sacred belongings!"
licfor.26.a:0 "This is unacceptable - demand repayment when this revolution ends!"

licfor.27.t:0 "Liechtenstein demands compensation!"
licfor.27.d:0 "The strategic seizure of noble castles all throughout Bohemia to provide funds and storage for the war efforts have resulted in Austria's western neighbor Liechtenstein barking up a storm about the violation of their meagre noble properties. While we really could not care about what such a small, irrelevant, and weak principality has to say in our affairs, they have powerful allies - it may be best we stay off of their bad side, or just shut their mouths with the money.\nWhat say we?"
licfor.27.a:0 "This is acceptable."
licfor.27.b:0 "Absolutely not!"

licfor.28.t:0 "Bohemia Gives Compensation"
licfor.28.d:0 "Thankfully, sane minds have prevailed in Prague, and the new, Kaiser-less government of the Czechs have agreed to recompense for their disrespectful occupation of Liechtensteiner castles. Fortunately, besides a few bullet holes and the occasional looted artifact, the buildings and castle complexes lay unfettered by artillery or stray bombs.\nThe reparation may have left a minor grudge against us, but we are more than happy to cooperate with Prague as long as they know what's theirs and what's princely property."
licfor.28.a:0 "This was to be expected."

licfor.29.t:0 "Bohemia Refuses Compensation"
licfor.29.d:0 "A response from Prague has been telephoned back to the Prince: NO! Bohemia insists that we pay for the damage they did to our castles, replace our family heirlooms, our artifacts, with our own coin - and not theirs! They claim they have enough troubles, enough things to sort out, enough of this, that and the other - all things they know we could not find an ounce of care about.\nOur relations have soured, because the Bohemians are too selfish to repay us with the spoils of war from their victory over Vienna..."
licfor.29.a:0 "Imbeciles!"

licfor.30.t:0 "Bohemia Nationalizes Liechtensteiner Properties"
licfor.30.d:0 "bohemia takes over a bunch of liechtenstein castles to use during the bohemian revolt"
licfor.30.a:0 "How rude! Prague will pay someday."

licfor.31.t:0 "Liechtenstein demands return of princely properties!"
licfor.31.d:0 "liechtenstein demands return of their castles from bohemia"
licfor.31.a:0 "And what are you going to do about it?"
licfor.31.b:0 "Fine - it's not like there was much benefit."

licfor.32.t:0 "Bohemia Refuses to Return Property"
licfor.32.d:0 "bohemia does not return the castles. fuck off micronation"
licfor.32.a:0 "If we weren't so small, we'd march to Prague!"

licfor.33.t:0 "Liechtenstein Terminates the Customs Agreement"
licfor.33.d:0 "austrian event - liechtenstein terminates the 1852 customs union"
licfor.33.a:0 "So be it."

licfor.34.t:0 "An Alpine Customs Union?"
licfor.34.d:0 "let's go larger, make an alpine customs union. best of both worlds :D"
licfor.34.a:0 "Reach out to Bern and Vienna immediately!"
licfor.34.b:0 "We will not attempt such grand maneuvers yet."

licfor.35.t:0 "Liechtenstein Proposes an Alpine Customs Union"
licfor.35.d:0 "aus or swi - liechtenstein proposes the awesome union"
licfor.35.a:0 "An excellent opportunity!"
licfor.35.b:0 "No reason to."

licfor.36.t:0 "Results of the Customs Union"
licfor.36.d:0 "hidden"
licfor.36.a:0 ""

licfor.37.t:0 "The Alpine Customs Union is Signed!"
licfor.37.d:0 "customs union be signed"
licfor.37.a:0 "Hurrah!"

licfor.38.t:0 "Failure of the Customs Union"
licfor.38.d:0 "customs union dont be signed"
licfor.38.a:0 "It was a noble attempt."

licfor.39.t:0 "Liechtenstein Requests Liberation of Micronation Territory"
licfor.39.d:0 "The Principality of Liechtenstein, unlike previous countries of its size, continues to exist in the present day. Vaduz and its Prince seek to change that; they worry that the cultures and peoples of these conquered micronations- San Marino, Andorra, among others, will suffer under foreign rule and have urged us to let go of our micronations. While the land is pretty unremarkable in terms of manpower and industrial resources, these micronations have great strategic value, and in Liechtenstein's sphere of influence, might be part of some greater plot.\nEven stranger is the missive itself: how could it get past the bureaucracy to be demanded at a national level? One wonders. Should we even bother with this princedom's wishes?"
licfor.39.a:0 "What's the harm in it?"
licfor.39.b:0 "Go to hell, philanthropist!"

licfor.40.t:0 "[FROM.GetName] Accepts"
licfor.40.d:0 "[FROM.GetNameDefCap] has miraculously agreed! They have agreed to turn over their micronations. Subsequent meetings with the leaders of the liberated nations have profusely thanked House Liechtenstein for our help in liberating their countries. Owing to our increasing position on the world stage, they have promised what resources they can to assist us. Our villages and towns- Schaan, Balzers, and Triesen, among all others, have opted to twin with these new freed districts and villages."
licfor.40.a:0 "Excellent!"

licfor.41.t:0 "No response from [FROM.GetNameDef]"
licfor.41.d:0 "A few days after we sent our request, [FROM.GetNameDef] did not send us a response. They did not elect to send a response in the next week either. It has been so long now it is apparent they have either rudely brushed us off or it just got lost in the mail. Despite our measures to ensure our letter made it to their head of state, it seems nothing has come. Micronation territory remains occupied by [FROM.GetNameDef], unfortunately- but there is a rather extreme option should we seriously want to liberate their territory."
licfor.41.a:0 "Oh, we'll make sure they notice!"
licfor.41.b:0 "Send them a strongly-worded complaint. That'll show them!"

licfor.42.t:0 "Till Death do us Part?"
licfor.42.d:0 "Liechtenstein and Switzerland are both countries known for their neutrality. When one of us is threatened, so is the other: the idea of violating neutrality is an infectious one, a drug; once you violate one sovereignty, a terrible government cannot help but want to do it again. This has been seen in Belgium in the Weltkrieg, and the Arabian intrigues over more than a thousand and one nights. Liechtenstein seeks to deepen our connection, so we at least may go down fighting together. They propose a rather unique military alliance\n\nLiechtenstein offers to fund mutual defense with what it can. We swear to protect Liechtenstein. It is a regular military alliance, but with a caveat: if one of us is to fall to the enemy, the other will annex what remains and assume command of all the capitulated's forces, so they may continue to fight under a unified structure. For example, if Liechtenstein falls, we shall annex them and assume their Landespolizei and commit wholly to their defense, and vice versa. What say we?"
licfor.42.a:0 "Neutral together!"
licfor.42.b:0 "We can't promise Vaduz anything."

licfor.43.t:0 "The Savoyard Crisis"
licfor.43.d:0 "The Commune of France, brutish boars, are infringing on Swiss neutrality. Seeking to restore the lost territory of Haute-Savoie, Paris' demands threaten war on the Continent, the imminent endangering of Liechtenstein, and possibility of Austrian or German intervention. Our sandwiched position makes us a wonderful crossing ground between Austria and Switzerland. One must fear the Weltkrieg, where through our association with the Dual Monarchy, Liechtenstein was gripped by famine and an ensuing crime spree thanks to Entente embargoes. If Switzerland is to fall, this situation might once more come to pass! The government has decreed stockpiling of machinery and food.\n\nIn the meantime, a few extra border guards have been hired at both the Swiss crossings and the Austrian crossings. We must remain vigilant- and even more urgently- independent!"
licfor.43.a:0 "How dreadful!"

licfor.44.t:0 "The Swiss Response"
licfor.44.d.yes:0 "The Swiss have responded to our requests for mutual protection - and what luck! They have agreed to our proposal. Our nations will draw closer together, and with Austria at least partially interested in us, anyone will have to think twice before attacking either of us. The treaties have been signed in Chur. The Treaty of Chur is but the promenade to both our ambitions and our friendship: our pens will cross, as will our daggers with our enemies. In effect, a military alliance now exists between Switzerland and Liechtenstein, and all associated ties our states have will be maintained. In the event of either of us collapsing, the other will be instantaneously annexed into the other."
licfor.44.d.no:0 "The Swiss have responded to our requests, but despite lengthy talks in Chur, the obstacle of our previous engagements prove insurmountable. Our web of alliances must be too complicated for them- and so, negotiations broke apart without fanfare and without much disagreement. It was, in fact, rather disappointing; both sides' murmuring and chatting just faded away, and both parties silently streamed out to return home. Our alliance will not come to fruition, unfortunately."
licfor.44.a:0 "Hourra!"
licfor.44.b:0 "Damn."

licfor.45.t:0 "The Treaty of Chur goes into Effect!"
licfor.45.d:0 "Disaster! Our allies as per the Treaty of Chur have been overwhelmed by enemy forces. As per the treaty's terms, Liechtenstein and Switzerland will form one nation now and all command structures will be unified! We must destroy the invader now that we are unified. The treaty's easy acceptance and smooth transition have bolstered friendly morale and has raised spirits on the home front."
licfor.45.a:0 "Drive the invader back!"

licfor.46.t:0 "Liechtenstein Wishes to Hire Boris Smyslovsky"
licfor.46.d:0 "[LIC.GetNameDefCap], a small backwater principality in Europe, who has affirmed their friendship with us, no less- has requested some men and material for their fledging army. In dialogues with Russian offciers, Savinkovist general Boris Smyslovsky has particularly shown interest in Liechtensteiner affairs, and have offered to make for the country at once on a train with a contingent of soldiers. The Prince of Liechtenstein has set all the necessary documents in order, arranging for passage and a fake identity for Smyslovsky: Arthur Holmston.\nHolmston would thus place his service under the principality, and his soldiers will make their living there. Do we accept?"
licfor.46.a:0 "He's on his way already!"
licfor.46.b:0 "What?"

licfor.47.t:0 "Arthur Holmston Entrained"
licfor.47.d:0 "All is in order for our new Russian general. Well- was. All is in order for Liechtenstein's brightest new pupil! Boris Smyslovsky, in the service of Boris Savinkov of Russia, has put aside his loyalties and agreed to hop on a train for Liechtenstein at once following probes from our ambassadors, diplomats, and string of wayward contacts. Boris Smyslovsky, given the identity Arthur Holmston in Liechtenstein, is arriving with a few hundred men, all in piecemeal and from all over Europe as to not arouse too much suspicion.\n\nVaduz, meanwhile, was in a right tizzy preparing for the arrival. The citizens heard some talk of alluring Russian friends, and heads shamelessly pop from buildings' windows, as if expecting a sudden parade. When none came, instead just a trickle of lost-looking, sometimes drunk Russians, nobody paid much more a mind to the Russians. Smyslovsky- or should we say Holmston- has been introduced to the government and offered to advise us on all the military matters we desire."
licfor.47.a:0 "His experience will be invaluable."

licfor.48.t:0 "No Support from [FROM.GetNameDef]"
licfor.48.d:0 "A call from [FROM.GetNameDef] has informed the Russian ambassador that our proceedings attempting to claim a Russian officer for our own purposes must be halted immediately. Smyslovsky's mission has been terminated, and in a particularly upsetting show of force the ambassador apologized as he tore the assumed Arthur Holmston identity up in shreds. It seems we are to have no assistance from Russia- perhaps they are too afraid of Austro-German attention."
licfor.48.a:0 "Drat."

licfor.49.t:0 "Liechtenstein Proposes Unternehmen Marterl"
licfor.49.d:0 ""
licfor.49.a:0 "Very well. Send them equipment."
licfor.49.b:0 "They can handle it."
licfor.49.c:0 "What?! Cease this insanity at once!"
licfor.49.e:0 "See to it personally Liechtenstein succeeds."

licfor.50.t:0 "Pressuring Switzerland - Our Offer."
licfor.50.d:0 ""
licfor.50.a:0 "Merely Greater Switzerland."
licfor.50.b:0 "...and maybe some money to fund the war machine?"
licfor.50.c:0 "Damn it, have Vorarlberg too!"

licfor.51.t:0 "Liechtensteiner bribes!"
licfor.51.d:0 ""
licfor.51.a:0 "Enticing!"
licfor.51.b:0 "This ought to cause a scandal!"

licfor.52.t:0 "Switzerland Declines"
licfor.52.d:0 ""
licfor.52.a:0 "Maybe there's another way."

licfor.53.t:0 "Liechtenstein Offers to Purchase Vorarlberg"
licfor.53.d:0 ""
licfor.53.a:0 "Pleasure doing business!"
licfor.53.b:0 "Your money is not as valuable as our people."

licfor.54.t:0 "Paying up for Vorarlberg"
licfor.54.d:0 ""
licfor.54.a:0 "Worth it!"

licfor.55.t:0 "[FROM.GetNameDefCap] Rejects Purchase Offer"
licfor.55.d:0 "[FROM.GetNameDefCap] has rejected our offer.\nAre you playing multiplayer/tag switching? AI never rejects, so this is an AI only event."
licfor.55.a:0 "Damn."


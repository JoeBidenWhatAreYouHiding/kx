lic.20.t:0 "Specter of the Weltkrieg"
lic.20.d:0 "The Weltkrieg was a dark time for Liechtenstein. On its eastern borders, the Dual Monarchy suffered famine and the thought of its very existence perishing. In the West, Switzerland was surrounded by both the Entente and the Central Powers. Switzerland was cowed into not exporting its food to the Central Powers, and Liechtenstein, through the Austro-Liechtensteiner customs treaty, suffered dearly due to this closure. Famine tore through the land, and bands of smugglers formed to slip through the borders and smuggle food from both Austria and Switzerland back into Liechtenstein, and in some cases, back out. Liechtenstein's unemployment rose and the people turned towards the smugglers.\n\nOne smuggler, Jakob Heidegger, was shot dead by a Swiss border guard in 1918, and another in 1920. Economic catastrophe again chokes the heartland. In the West, revolutionary Paris eyes its territory in Haute-Savoie. Should the Swiss be intimidated by bloody Parisian intrigues, Liechtenstein could be in grave danger.\n\nA commission has been set up by the Prince to prepare the principality for the reality of the First Weltkrieg to return in the event of a Second Weltkrieg, where Swiss or Austrian goods dry up and Liechtenstein must fend for itself. More men like Heidegger could needlessly die should hunger return to our lands. In any event, we should prepare with Austria and Switzerland. Food must be stockpiled and our relations secure as to prevent any international or internal upset."
lic.20.a:0 "We will be better prepared this time."


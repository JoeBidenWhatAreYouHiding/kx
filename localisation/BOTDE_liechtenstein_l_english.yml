lic.28.t:0 "The Special Election"
lic.28.d:0 "The elections of [GetYear] are special times. For the first time, Liechtensteiners - if they can be called that anymore- head to the polls to vote. It is not for the Landtag nor for the head of government- but for the first time, a head of state. The princely throne has been abolished and the wealthy Princes scattered. Our occupiers protect our right to a free vote without meddling. The old forces have reformed, unfettered from royalist interference, and three major parties have emerged: the FBP, the VU, and the UEK.\n\nElectoral discourse revolves around the simple matter of rebuilding the national identity and sweeping economic reforms with the cooperation of our benefactors to secure domestic and international acceptance of a non-royalist microstate in the heart of Europe. Tough questions must be asked and debated over about what our monarchy meant to us, and how we will go forward. We have already chosen our future to be independent from all our neighbors, and each candidate has done his part in dispelling ugly nationalist proposals to tie Liechtenstein into unworkable foreign governments. Evidently the way forward are by the people, for in their little queues drop one ballot at a time in the most important election the country has yet seen.\nThe ballots are counted and the votes reveal that the victor and architect of modern Liechtenstein is:"
lic.28.a:0 "The FBP!"
lic.28.b:0 "The VU!"
lic.28.c:0 "The UEK!"


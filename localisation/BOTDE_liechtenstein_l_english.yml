licfor.56.t_neutral:0 "Oben am Jungen Rhein..."
licfor.56.t_russia:0 "Uniting Our Properties"
licfor.56.t_austria:0 "A New Duke in Swabia"
licfor.56.d_reichspakt:0 ""
licfor.56.d_neutral:0 ""
licfor.56.d_russia:0 ""
licfor.56.d_austria:0 ""
licfor.56.a:0 "...valuable friends abroad?"
licfor.56.b:0 "An Alpine brotherhood!"
licfor.56.c:0 "More than princes of Danubia!"
licfor.56.e:0 "To rule Swabia!"

licfor.57.t:0 "Sourcing the Armory"
licfor.57.d:0 ""
licfor.57.a:0 "Purchase from the Swiss."
licfor.57.b:0 "Purchase from the Austrians."
licfor.57.c:0 "Put some money into Hilti instead."

licfor.58.t:0 "Introducing Heavier-Than-Air Flight"
licfor.58.d:0 ""
licfor.58.a:0 "Some Swiss trainers and old fighters would be nice."
licfor.58.b:0 "Some Austrian scouters and old fighters would be nice."

licfor.59.t:0 "Die Knochen des Doppeladlers"
licfor.59.d:0 "The Austrian Empire has collapsed, gunfires echos throughout the alpines, and now Liechtenstein finds itself alone. With the long held alliance with Austria now dead, our government has little options left but to watch as the fires of the Danube spread dangerously close to the Rhine."
licfor.59.a:0 "Has our luck run out?"

licfor.60.t:0 "[LIC.GetName] Requests Materiel"
licfor.60.d:0 ""
licfor.60.a:0 "Fulfill the order in full!"
licfor.60.b:0 "Surely they don't need that much."
licfor.60.c:0 "What do they need all that for, anyhow?"

licfor.61.t.a:0 "Aid Arrives from [FROM.GetNameDef]"
licfor.61.t.b:0 "No Help from [FROM.GetNameDef]"
licfor.61.d.a:0 "aids"
licfor.61.d.b:0 "pools closed"
licfor.61.a:0 "How kind! We shall put it all to proper use!"
licfor.61.b:0 "Do they even care? Misers, the lot!"

licfor.62.t:0 "[LIC.GetName] Requests Territorial Enlargement"
licfor.62.d:0 ""
licfor.62.a:0 "Carve up the Alps to their design."
licfor.62.b:0 "So cocky... no!"

licfor.63.t:0 "[FROM.GetNameDefCap] Accepts Our Designs"
licfor.63.d:0 ""
licfor.63.a:0 "Excellent!"

licfor.64.t:0 "[FROM.GetNameDefCap] Rejects Our Requests"
licfor.64.d:0 ""
licfor.64.a:0 "The challenges of proper diplomacy."

licfor.65.t:0 "Russian Loyalists Arrive"
licfor.65.d:0 ""
licfor.65.a:0 "For the Grand Prince!"

licfor.66.t:0 "Vaduz-Schellenberg Plots for German Division"
licfor.66.d:0 ""
licfor.66.a:0 "Germany must be divided."
licfor.66.b:0 "Revolution in a whole Germany is of utmost importance."

licfor.67.t:0 "Vaduz-Schellenberg Wants to Expand"
licfor.67.d:0 ""
licfor.67.a:0 "Germany must be divided."
licfor.67.b:0 "Germany must not be divided."

licfor.68.t:0 "Liechtenstein Wants on the Legation Council"
licfor.68.d:0 ""
licfor.68.a:0 "Petition the Legations."
licfor.68.b:0 "Too obvious a power-play."

licfor.69.t:0 "The German Concession Wishes for Liechtensteiner Accession"
licfor.69.d:0 ""
licfor.69.a:0 "A little neutral nation wouldn't hurt."
licfor.69.b:0 "This smells rotten!"

licfor.70.t:0 "[FROM.GetNameDefCap] Shuts Down Legationary Intrigue"
licfor.70.d:0 ""
licfor.70.a:0 "Drat."

licfor.71.t:0 "The Liechtenstein Concession"
licfor.71.d:0 ""
licfor.71.a:0 ""

licfor.72.t:0 "Our Legationary Attempt Falls Flat"
licfor.72.d:0 ""
licfor.72.a:0 ""

licfor.73.t:0 "Liechtenstein Diplomatically Shifting"
licfor.73.d:0 ""
licfor.73.a:0 "Eleven thousand Redls?!"
licfor.73.b:0 "Well, suffering can sometimes force the crab from its shell."

licfor.74.t.a:0 "Liechtenstein Apologizes!"
licfor.74.t.b:0 "The Germano-Liechtensteiner Connection!"
licfor.74.t.c:0 "The Russo-Liechtensteiner Connection!"
licfor.74.t.d:0 "Liechtenstein Has No Excuse"
licfor.74.d.a:0 ""
licfor.74.d.b:0 ""
licfor.74.d.c:0 ""
licfor.74.d.d:0 ""
licfor.74.a:0 "They must return our territory at once."
licfor.74.b:0 "We must set up a meeting. This requires concession."
licfor.74.c:0 "Sanctions must be applied posthaste!"

licfor.75.t:0 "[FROM.GetNameDefCap] Demands Immediate Territorial Compensation"
licfor.75.d:0 ""
licfor.75.a:0 "We don't have a choice!"
licfor.75.b:0 "Ask our partner for help."
licfor.75.c:0 "We'll stand up to you!"

licfor.76.t:0 "Liechtenstein Begs for Assistance"
licfor.76.d:0 ""
licfor.76.a:0 "Yes, to friendship!"
licfor.76.a:0 "They brought it upon themselves."

licfor.77.t:0 "[FROM.GetNameDefCap] Agrees to our Proposal!"
licfor.77.d:0 ""
licfor.77.a:0 "They have seen reason."

licfor.78.t:0 "[FROM.GetNameDefCap] Rejects our Demand!"
licfor.78.d:0 ""
licfor.78.a:0 "Eighty soldiers will become zero by tomorrow!"
licfor.78.b:0 "On second thought..."

licfor.79.t:0 "[FROM.GetNameDefCap] Arbitrates in Vaduz' Favor"
licfor.79.d:0 ""
licfor.79.a:0 "Traitors, the lot. We can't risk a general European war."
licfor.79.b:0 "On second thought..."

licfor.80.t:0 "We're Abandoned!"
licfor.80.d:0 ""
licfor.80.a:0 "We will give in, then."
licfor.80.b:0 "Hold fast!"

licfor.81.t:0 "[FROM.GetNameDefCap] Drops Demands"
licfor.81.d:0 ""
licfor.81.a:0 "Too close..."

licfor.82.t:0 "Liechtenstein Gives In."
licfor.82.d:0 ""
licfor.82.a:0 "Should we prepare an 'accidental' invasion?"

licfor.83.t:0 "[FROM.GetNameDefCap] Cancels All Protections"
licfor.83.d:0 ""
licfor.83.a:0 "We have poked a bear."

licfor.84.t:0 "Founding a Liechtensteiner Nachrichtendienst!"
licfor.84.d:0 ""
licfor.84.a:0 "Put power in the embassy and diplomat, focusing on diplomatic intrigues."
licfor.84.b:0 "Take inspiration from the Evidenzbureau, focusing on military espionage."

licfor.85.t:0 "Austria Emplaces an Embargo"
licfor.85.d:0 ""
licfor.85.a:0 "Mein Gott!"

licfor.86.t:0 "[AUS.GetLeader] Personally Summons [LIC.GetLeader]"
licfor.86.d:0 ""
licfor.86.a:0 "We shall attend, then."

licfor.87.t:0 "An Uncomfortable Meeting in Burg Liechtenstein"
licfor.87.d:0 ""
licfor.87.a:0 "Offer"

licfor.88.t:0 ""
licfor.88.d:0 ""
licfor.88.a:0 ""

licfor.89.t:0 "The Papacy Reclaimed!"
licfor.89.d:0 ""
licfor.89.a:0 "Send the Pope home, adieu!"
licfor.89.b:0 "Restore the Papal State ourselves."

licfor.90.t:0 "Switzerland Demands our Submission!"
licfor.90.d:0 ""
licfor.90.a:0 "What choice do we have?"
licfor.90.b:0 "They shall not take us so easily!"

licfor.91.t:0 "Liechtenstein Rejects Our Demands!"
licfor.91.d:0 ""
licfor.91.a:0 "Back off."
licfor.91.b:0 "Send one soldier in, and we take the whole principality."


licnews.1.t:0 "Death of Franz I of Liechtenstein"
licnews.1.d:0 "Prince Franz I of the Principality ascended to Prince in 1929. Now, nine years later, Franz I died peacefully in Castle Feldberg. The streets of Vaduz and the little townships in the European microstate weep openly for the beloved Franz I's passing at the ripe old age of 84.\nThe new Prince, Franz Joseph II, has already been given his coronation and promptly moved his seat to Vaduz Castle; an unprecedented move in the history of the house of Liechtenstein. He has pledged to continue his father's legacy, but that includes solving the complicated relations between Liechtenstein's neighbors and itself.\n The entire royal house of Liechtenstein, plus Kaiser Karl of Austria, have paid their respects at his funeral at the Church of the Nativity of the Virgin Mary in Brno, where the late Prince was laid to burial."
licnews.1.a:0 "Rest in peace, high on the young Rhine."

licnews.2.t:0 "Liechtenstein Holds Emergency Elections"
licnews.2.d:0 ""
licnews.2.a:0 "Will this change anything, though?"

licnews.3.t:0 "Liechtenstein Invades Switzerland!"
licnews.3.d:0 ""
licnews.3.a:0 "But did they return with another soldier?"

licnews.4.t:0 "Franz Joseph II Declares Liechtenstein Absolutist"
licnews.4.d:0 ""
licnews.4.a:0 "What an odd law."

licnews.5.t:0 "Liechtenstein Buys Alaska"
licnews.5.d:0 ""
licnews.5.a:0 "For such a small state they sure have deep pockets."
licnews.5.b:0 "Nach Norden Nach Alaska!"


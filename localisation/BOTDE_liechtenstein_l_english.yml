LIC_Max_Auwarter:0 "Max Auwärter"
LIC_Eugen_Hilti:0 "Eugen Hilti"

LIC_FRANZ_I_DESC:0 "Born in Castle Liechtenstein, in Lower Austria, as Franz de Paula Maria Karl August, Franz I began his early life like many Liechtensteiner princes and royalty: off in Austrian and Bohemian properties, receiving education there, out of their little principality. He studied law in the Viennese and Prague universities in 1871 through 1878, earning entry into Austro-Hungarian diplomatic duties.\nFirst serving as an attache to Belgium, right after his exit from school, Franz I then joined in the task of administrating the Liechtenstein family's royal holdings and properties, even representing the prince himself on many occasion. His actions garnered the watchful eyes of K.u.K. authorities, and in time Franz I became a man involved in diplomatic expeditions to both Rome and St. Petersburg. He presided over the warmest period of Austro-Russian relations as the ambassador to St. Petersburg, then the capital of the old Russian Empire, between the Crimean War and the outbreak of the Weltkrieg. One of Franz I's greatest diplomatic triumphs lies in the Kaiser-Entrevue in 1897, allowing the Austro-Hungarian delegation's departure at the time of the Weltkrieg a ten-year entente, or understanding.\n While serving as ambassador, Franz I took on one of the most radical ideas for an Austrian of his time: an Austro-Russian alliance, attempting to prevent the Tsar from declaring war, and at long last Franz I was forced to resign.\nAfter this, not much of note happened to the aging Franz, until 1929, 8 years after the end of the Weltkrieg: Johann II, prince of Liechtenstein, perished, leaving the throne of the principality to him. Franz I's reign marked a strengthening of the Austro-Liechtensteiner Customs Union, which has been faltering in recent years in favor of Switzerland. Franz I is at and old age now, and many believe that Franz Joseph II will become the next Prince of Liechtenstein. For now, though, Franz has presided upon a time of great prosperity in the little Principality of Liechtenstein. He successfully used his diplomatic prowess to resolve the Trans-Alpine Strikes in his country and Vorarlberg, and some say that the princes' "usual" residence will become Vaduz at long last."

LIC_FRANZ_II_DESC:0 "The prince following the late Franz I, Franz Joseph II, the industrialist and man of money, was born at Schloss Frauenthal in Deutschlandsberg, in Styria to parents Alois and Elisabeth Amalie. At his baptising was his great-uncle and godfather, Franz Joseph I of Austria. Young Franz became heir to the throne in 1929 at 23 years old, a feat remarkable for the old House of Liechtenstein.\nWhile young, the Prince has embarked on extravagant and strange spending adventures, increasingly looking into Alaska and eyeing Austrian territories lest they go asunder. Young Franz II is an avid supporter of the industrialization of Liechtenstein, assisting in establishing new factories and initiating new public works projects. Thus Franz II has gained a popularity both within and outside Liechtenstein that exceeded Franz I at many times.\nNow as Prince of Liechtenstein, Franz II is the first Prince since the acquisition of the Principality to principally live within the principality of Liechtenstein's princely quarters, the princely Palace of Liechtenstein in Vaduz. Franz II still maintains industrial investments and advancements with both Swiss and Austrian colleagues, yet always espouses Liechtensteiner neutrality at any and every possible opportunity.\nPrince Franz Joseph II is expected to be one for the princely archives, as his achievements shall decide little Liechtenstein's future in the decades to come."

LIC_RUDOLF_SCHAEDLER_DESC:0 "Born on March 31, 1903, Rudolf Schädler and the party he commands has forever been shrouded in both mystery and distrust. As a young boy, Schädler was enthralled with nature, art, and music, entering into the Basel Conservatory in his later teens. Young Schädler came upon the Ostara magazine by chance in his years as a tavern owner, fascinated by Lanz von Liebenfels' radical, enrapturing tellings of Germanic superiority and the bright natural state of the Earth and all of it. Schädler came to adopt his own school of Ariosophy, largely absent of Liebenfels' celestial tellings and Aryan superpowers. Schädler became a founding member of the VDBL, or Volksdeutsche Bewegung in Liechtenstein, in 1938. The VDBL was built upon a platform of Greater Germany, taking in inspiration from Liebenfels, Georg von Schoenerer, and the Iron Guard in Romania.\nWhile hated, the VDBL has triumped, yet must go its own route, away from that of Greater Germany. For now, Schädler shall lead Liechtenstein to its Germanic renaissance it always yearned for, in an era that shall mark a new dawn for Liechtenstein."

LIC_BEIMLER_DESC:0 "Born on the second of July, 1895, in Munich, Hans Beimler is not a man one would expect to be in charge of the little former principality. A veteran of the Kaiserliche Marine- where he received the Iron Cross in 1917- Beimler joined the Spartacus League and participated in the November Uprising. Here he was captured and sentenced to a lengthy stay in a Bavarian presence, where he languised for a good many years. It is not known how, but he managed to escape - possibly with the help of sympathizers- and managed to run west, follow the Liechtensteiner smugglers' route into Switzerland, and after a perilous journey crossed the border into Communard France and settled there.\n\nFrom there Beimler worked in Internationale aid organizations, culminating in many adventures in Spain. In his new free time, Beimler worked with the FAUD, remnant Spartacists, and was a prime collaborator with French intelligence in riling up revolutionary elements inside the Kaiserreich. During the early 30s, Beimler crossed back into Switzerland and Liechtenstein to agitate socialist sympathies. When Liechtenstein came under occupation, and a governor was needed to lead, Beimler was selected, where he now serves as a sort of military governor. Beimler may continue to lead little Vaduz-Schellenberg, revolutionizing the Commune and defending it from reactionary threats, or perhaps a politican will step forth to relieve Beimler of duty."

LIC_SMYSLOVSKY_DESC:0 "Born on the third of December, 1897, in Terijoki, far-away in Finland, Boris Smyslovsky was born to a family from the army. From an early age he became a cadet, graduating from an artillery school and joining the Eastern Front of the Weltkrieg in 1915. There he advanced to the rank of captain. The October Revolution sent Smyslovsky the other way, where he fought in Moscow and assisted the White Army in chasing out the Bolsheviks. From there, he became involved in the clique of the aspiring Vozhd, Boris Savinkov, who he continued to serve.\n\nHis arrival in Liechtenstein as an occupier was simply a matter of luck; having had experience with the German language, Smyslovsky was appointed to be the head of the Liechtenstein occupying government. In a bid to gain their affections he goes by Arthur Holmston sometimes, but most still call him what he is - an invader and occupier."

#Ideas
LIC_customs_union:0 "Austro-Liechtensteiner Customs Union"
LIC_customs_union_desc:0 "The Customs Union of Liechtenstein and Austria was first established in 1852, and fully melds the economies of our two states into one large market. With free, open trade between our realms and with one shared economic zone, we enjoy all the economic benefits of being with the wider Austro-Hungarian Empire without having to actually be within it politically, and even military benefits for our protection given that we have no standing army. However, despite the economic boon that this has caused our nation - a greatly one-sided boon that benefits our small principality more than the vast Empire - many within our borders feel that the Customs Union infringes upon our stance of neutrality. This has caused tensions within the government, so we must monitor this situation and tread carefully, especially as Vienna’s ambitions grow."

LIC_austro_swiss_divide:0 "Austro-Swiss Divide"
LIC_austro_swiss_divide_desc:0 "Our small but proud nation is currently divided as competing forces threaten to tear our realm asunder. For nearly a century we have been bound to Austria economically through the Customs Union, but some say it is time to end this long standing economic pact. These worried ministers and princes fear it compromises our famous stance of permanent neutrality - a position firmly held since 1868 - and have instead pushed for closer ties with Bern over Vienna. Opposing them are the Austrian loyalists and defenders of the status quo who seek to continue the Customs Union, further linking our economy with that of the Empire. With these competing factions arguing nonstep, refusing to cooperate and impeding the duties of the state and the Crown, our small principality must heal this schism and decide our destiny."

LIC_legacy_of_trans_alpine_strikes:0 "Legacy of the Trans-Alpine Strikes"
LIC_legacy_of_trans_alpine_strikes_desc:0 "Just a few short years ago, a wave of revolutionary fervor swept across our mountainous region in an event now known as the Trans-Alpine Strikes. Sparking over resentment to Habsburg dominance and foreign rule under Vienna, the strikes started in North Italy and raged across Switzerland, Austria, and our Liechtenstein. These strikes have left a deep mark on our nation, and have given rise to extremism on both ends of the political spectrum. Pertaining to little Liechtenstein, the issue of social securities and rising unemployment were raised as chief issues in regard to little Liechtenstein. Though the Crown remains solidly in control, the government around it is in peril and might be easily subjected to radical change. We must remain vigilant and resolve ourselves against this rising tide of radicalism."

LIC_princely_holdings_idea:0 "Holdings of the House"
LIC_princely_holdings_idea_desc:0 "All across Europe, the various sigils and symbols of our house adorn properties both large and small. From small plots to massive estates and castles, the Crown owns properties, business interests, and other investments from Spain to Russia - each providing their own slice of income that contributes to the vast wealth of our small principality. Due to these holdings, the Crown is rich, but perhaps it may be time to let loose on some in order to free up funds or to forge new friendships."

LIC_famine:0 "Famine Conditions"
LIC_famine_desc:0 "Famine conditions are reported in [ROOT.GetNameDef] due to internal management and international disruptions. The populace is very unrestive, and conditions are deteriorating to that of those seen during the twilight years of the Weltkrieg."

LIC_customs_union_swiss:0 "Swiss Customs Union"
LIC_customs_union_swiss_desc:0 "At long last, Liechtenstein has severed economic ties to Vienna, and has embraced a union with Switzerland, cementing Liechtensteiner neutrality alongside the Swiss for the time being. The two German Alpine countries shall cooperate under the agreement, and Swiss companies may assist Liechtenstein, and vice versa."

LIC_foreign_suspicion:0 "Foreign Suspicion"
LIC_foreign_suspicion_desc:0 ""

LIC_bm_1:0 "Black Monday Upon the Rhine"
LIC_bm_1_desc:0 "The Landesbank has been stricken with a buffet of bad luck that began in Berlin and wormed its way down to Vienna, and then Vaduz and Bern. The Great Berlin Stock Market Crash has negatively affected Austro-Liechtensteiner relations, and shown the cracks in the Customs Union that Franz I previously plugged. However, the mortar did not solidify enough in the brick of his reign."

LIC_scouts:0 "PuP Scouts"
LIC_scouts_desc:0 ""

LIC_abolishment_18_percent:0 "18% Clause Abolished"
LIC_abolishment_18_percent_desc:0 "If the popular vote of the people regarding a candidate received less than 18% of the vote, it would not be able to progress. That is what struck the nail in our already-open coffin in 1932. Now, with a stroke of luck and political prowess, we have managed to free the electoral system from the shackles of the 18% clause."

LIC_bank_idea:0 "The Landesbank"
LIC_bank_idea_desc:0 "The Landesbank, or Liechtensteinische Landesbank, is not associated with the princes as much as the BiL group. Centered in the capital city of Vaduz, the Landesbank accepts Austro-Hungarian krones as currency, but there is a growing supply of Swiss francs in reserve. Monetary policy is dictated by Vienna, as is the supply of coinage and bills."

LIC_new_army:0 "Fürstlich-Königliche Armee"
LIC_new_army_desc:0 "Abolished in 1868 for financial reasons, Liechtenstein has not seen need for a standing army until now. We persisted through the Weltkrieg unopposed, but ideological conflict threatens to consume Bern and Vaduz from the outsdie. Armed with new funds specifically set aside for an army, the Royal Princely Army has been formed with a small attachment of elite policemen, armed with Austro-Swiss doctrine and officers."

LIC_military_police_idea:0 "Landespolizei Militarization"
LIC_military_police_idea_desc:0 "Threatened by internal and external strife, we are going to use our funds to arm the police, lest Liechtenstein be under threat. Funds for an army can be better allocated elsewhere, but the new policemen must be absolutely certain of their ethics, for with great power comes great responsibility."

LIC_unternehmen_marterl_bonus_idea:0 "Unternehmen Marterl"
LIC_unternehmen_marterl_bonus_idea_desc:0 "Liechtenstein has launched a surprise attack on Switzerland to bypass the Italian plains. It is only a matter of time until the front slows, however!"

LIC_newspapering:0 "Liechtensteiner Volksblatt"
LIC_newspapering_desc:0 "Liechtenstein's ruling party, the Patriotic Union, has set up a weekly newspaper. We shall aim to print more, but in the meantime, the people will be united behind our vision. An informed populace will be better able to decide on what is best for their future."

LIC_case_of_conflict:0 "Fallback Plans"
LIC_case_of_conflict_desc:0 "In the case of invasion, the government is spreading knowledge on how to defend oneself and the precautions we should take should the little principality be invaded. With the word being spread, we shall build a large enough deterrent to make our resource-deserted country look maximally unappetizing."

LIC_LGT:0 "BiL-Gruppe"
LIC_LGT_desc:0 "The BiL Group is 100% owned by the House of Liechtenstein, and serves as a bank for the family's vast fortunes and funds. With the Princes' return to Vaduz, the BiL group has been involved in Liechtensteiner affairs more and more often, and for the greater good of economic amelioration."

LIC_prince_worker:0 "Prince & Worker!"
LIC_prince_worker_desc:0 ""

LIC_secondary_education:0 "Publicized Higher Education"
LIC_secondary_education_desc:0 ""

LIC_proportional_representation_idea:0 "Proportional Representation"
LIC_proportional_representation_idea_desc:0 ""

LIC_greatness:0 "The Alpine Bastion"
LIC_greatness_desc:0 "High on the young Rhine, lies Liechtenstein resting, on Alpine heights. While neutral, we see war as a demon that lurks behind every corner, winds its way into every handshake, in the throats of the speakers of the diplomats. Liechtenstein will defend itself, whether there be an invasion or not - our sovereignty shall never be compromised."

LIC_der_umbruch_idea:0 "Der Umbruch"
LIC_der_umbruch_idea_desc:0 ""

LIC_vril_cannon:0 "Vril Vernichtungskanone"
LIC_vril_cannon_desc:0 ""

LIC_department_store_ban:0 "Department Stores Banned"
LIC_department_store_ban_desc:0 "A vote in the Landtag banned department stores in all of the Principality of Liechtenstein, and the economy has been positively augmented by the legislative jurisdiction."

LIC_purchase_idea:0 "Purchase from the Princes"
LIC_purchase_idea_desc:0 ""

LIC_bohemian_compensation:0 "Bohemian Compensation"
LIC_bohemian_compensation_desc:0 "Bohemia, following the Bohemian Revolution, has granted us reparations regarding their use of Liechtensteiner castles as fortifications."

LIC_alpine_customs_union:0 "Alpine Customs Union"
LIC_alpine_customs_union_desc:0 ""

LIC_1939_idea:0 "1939 Reform Plan"
LIC_1939_idea_desc:0 ""

LIC_research_treaty_idea:0 "Vaduz Research Treaty"
LIC_research_treaty_idea_desc:0 ""

SWI_LIC_AUS_alpine_nation:0 "Alpine Nation"
SWI_LIC_AUS_alpine_nation_desc:0 ""

LIC_neutrality_hidden_idea:0 "Liechtensteiner Neutrality"
LIC_neutrality_hidden_idea_desc:0 ""

LIC_fields_factories_idea:0 "Russian-Sponsored Reindustrialization"
LIC_fields_factories_idea_desc:0 "Liechtenstein has been wrecked by war. However, with aid from the Russians, our peasantry is being put into factories quicker than they were even before the war."

LIC_occupation_forces:0 "International Liaisons"
LIC_previous_attachments:0 "Remaining Habsburg Tethers"
LIC_previous_attachments_desc:0 "Despite switching foreign policy, the Liechtensteiners have promised to play nice and keep good relations with Habsburg overlords. This unwillingness to commit against Austria is reflected throughout the whole country."
LIC_austrian_securities:0 "Austrian Securities"
LIC_diplomatic_idea:0 "Diplomacy-focused Ministry"
LIC_espionage_idea:0 "Espionage-focused Ministry"

LIC_smuggling_issue:0 "Smuggling Issue"
LIC_smuggling_issue_desc:0 "The famine is worsening. Factory lines are empty. Bread stalls are empty and the markets cry no more for sales but instead for bread. Agriculture suffers as the vegetables are stolen from the plants. All becomes worthless compared to necessity: food. Thus smugglers have sprang up to get food from beyond this principality, crossing laws and borders to nourish themselves and family. This is very dangerous to themselves and our government, who might be drawn into spats with neighboring polities."

LIC_refugee_idea:0 "Refugee Crisis"

LIC_red_cross:0 "The Liechtensteiner Red Cross"

LIC_holy_see:0 "Seat of the Holy See"
LIC_holy_see_desc:0 "The seat of Vatican Hill has served the Holy See since the times of Leo I. However it is not unheard of for the papacy to be under occupation by another power, France had occupied the hill in the early 19th century, and the Kingdom of Italy had annexed the area until its collapse in 1919. Now with Saint Peter's Basilica flying the colours of the church's enemies. The heavily catholic Liechtenstein has offered to house the papacy until it may return to Vatican Hill."

LIC_bunker_donor:0 "Assistance in the Liechtensteiner Fortification Program"
LIC_bunker_recipient:0 "Assistance in the Liechtensteiner Fortification Program"

LIC_shadow_empire_dynmod:0 "Shadow Empire"
LIC_shadow_empire_dynmod_desc:0 "Liechtenstein is known for its properties abroad in Danubia, but what is far less known is their forays into industrialism. Liechtenstein owns stocks and even whole factories outside their little Principality, which pay dividends."
LIC_shadow_empire_occupied:0 "Wringing Out Capitalism"
LIC_shadow_empire_occupied_desc:0 "We are in the process of wringing out capitalist tendencies from banks, including our own and wealthiest. We shall reform them, and put excess funds to use for our own farmers and laborers."

LIC_divinity:0 "Industrial Divinity"
LIC_divinity_desc:0 "Our isolated state makes us vulnerable to never having enough. It is necessary we make do with as little as possible and be able to switch priorities as fast as possible."

LIC_reconstruction_idea:0 "Rekonstruktion unter Besetzung"

LIC_french_occupation_idea:0 "The [INT.GetAdjective] Occupation"
LIC_french_occupation_idea_desc:0 "The Internationale has overwhelmed the little Principality of Liechtenstein, wiped away its royal affronts, and are beginning to build a new society in its place. The country shall be returned to a state of perpetual revolution, à la the Trans-Alpine Strikes."
LIC_french_occupation_2_idea:0 "Communard Liberties"

LIC_russian_occupation_idea:0 "The [RUS.GetAdjective] Occupation"
LIC_russian_occupation_idea_desc:0 "Russian occupation forces now live off the land of Liechtenstein. Its royal sigils have been defaced and the country thoroughly looted. A new society shall be built in its place, one able to be an effective bulwark against western imperialism."
LIC_russian_occupation_2_idea:0 "Ivan's Bounty"

LIC_totalist_idea:0 "Forming Labor Councils"
LIC_totalist_idea_desc:0 "The formation of labor councils, and the subsequent general spirit of change in the air for the poor and damned, have made the workers slightly more zealous in their labor."

AUS_SWI_Bailout:0 "Liechtensteiner Bailout"
AUS_SWI_Bailout_desc:0 "We are in the midst of providing economic support for Liechtenstein."
LIC_bailout_AUS:0 "Austrian Bailout"
LIC_bailout_AUS_desc:0 "Our old friends in Vienna have come to their aid of their loyal servants, bringing salvation. This will draw the two countries closer."
LIC_bailout_SWI:0 "Swiss Bailout"
LIC_bailout_SWI_desc:0 "The Swiss are bailing out their Alpine brethren! Their financial institutions and burgeoning industrial sector will help provide jobs and resources to our people."
LIC_i_love_you_bunny_GO_FUCK_YOURSELF:0 "Goods Shortages"
LIC_i_love_you_bunny_GO_FUCK_YOURSELF_desc:0 "As war drags on, our country has begun to run out of its stockpile. The costs have passed on to the people."
LIC_i_love_you_bunny_GO_FUCK_YOURSELF_worse:0 "Goods Shortages"
LIC_i_love_you_bunny_GO_FUCK_YOURSELF_worse_desc:0 "As war drags on, our country has begun to run out of its stockpile. The costs have passed on to the people."
LIC_i_love_you_bunny_GO_FUCK_YOURSELF_ariosophic:0 "Goods Shortages"
LIC_i_love_you_bunny_GO_FUCK_YOURSELF_ariosophic_desc:0 "Our abrupt government change has angered many neighboring nations, who want nothing to do with our 'cultist' government. They have refused to recognize us and deem us illegitimate."
LIC_stockpile_empty:0 "Government Stockpile Emptied"
LIC_stockpile_empty_desc:0 "The government stockpile has depleted beyond our acquisitions. The ongoing war will strain our little country some."

LIC_VRL_payments_LIC:0 "Vorarlberg Payments"
LIC_SWI_payments:0 "The Cost of Bribery"
LIC_SWI_payments_desc:0 "We have persuaded Switzerland to our side, but at what cost?"
LIC_VRL_payments_benefactor:0 "Vorarlberg Dividends"

LIC_less_vulnerable_idea:0 "Hiding in Plane Sight"
LIC_less_vulnerable_idea_desc:0 ""

LIC_economic_boom:0 "Capital Flows on the Young Rhine"
LIC_economic_boom_desc:0 ""

LIC_monarch_power:0 "Princely Powers"
LIC_monarch_power_desc:0 ""

LIC_acceptance_idea:0 "Naturalized Princely Rule"

LIC_alaska_idea:0 "Nach Norden Nach Alaska"
LIC_alaska_idea_desc:0 ""

LIC_rule_britannia:0 "Anglo-Liechtensteiner Hybridization"

LIC_living_in_amerika:0 "America's Princely House"

LIC_schwesterstaat_idea:0 "Towards Neu-Vaduz"
LIC_tianjin_SS_idea:0 "The Kicked-Down Door"
LIC_breadtrade:0 "Supplying the Schwesterstaats"
LIC_alaska_surveying:0 "Send Prospectors to the Yukon"
LIC_contact_virgil_rigsby:0 "Invest in Virgil Rigsby's Electric Wonders"
LIC_usa_princely_ships:0 "Princely Ships"
LIC_defending_integrity:0 "Defend the Crown's Integrity"
LIC_return_home:0 "Return to Vaduz"
LIC_bygones:0 "Let Bygones be Bygones"
LIC_LCCI:0 "The Liechtenstein Chamber of Commerce and Industry"
LIC_gnosis:0 "Armanist Gnosis"
LIC_volkism:0 "Volkist Outreach"

LIC_aerial_home_guard:0 "Improving the Haushalt"
LIC_kam_on_ingerland:0 "Legitimizing the House of Liechtenstein!"

#Focuses

LIC_1936_general_elections:0 "The Convenient General Elections of 1936"
LIC_1936_general_elections_desc:0 "The Great Berlin Stock Market crash, and the Creditanstalt failure in Austria, has totaled the Liechtensteiner economy. The land is a space of economic ruin- perfect for upheaval. Elections are slated to occur regularly, just after this economic fright- could a usurper not the FBP come out on top?"

LIC_UEK_victory:0 "A Surge from the UEK"
LIC_UEK_victory_desc:0 "The first true political party of Liechtenstein, the UEK has defeated the FBP and VU in the 1936 elections. It is time to bring a natural end to revolutionary sympathy and bitterness from the early 1930s, while instating electoral reform that prevents oppression of the minority."
LIC_satisfy_social_securities_clause:0 "Satisfy the Social Security Clause"
LIC_satisfy_social_securities_clause_desc:0 "Liechtenstein is a developing economy. Despite setbacks thanks to factors ourside our control, we are committed to this growth and shall see our workers compensated for hard labor. A better wage and working conditions is a natural start to things."
LIC_treaty_with_LAV:0 "Treaty with the LAV"
LIC_treaty_with_LAV_desc:0 "The Liechtenstein Workers' Association, or Liechtensteiner Arbeiterverband, is the revolutionary circulatory system of our party. Their interests are ours, and vice versa. As per their statues and demands drafted during the Trans-Alpine Strikes, we should see the Swiss three-pillar system set up and provisions like health, age, and accident insurance implemented. Construction workers, the main body of the LAV, are in mind."
LIC_highland_dairy_farms:0 "Mountain Dairy Ranches"
LIC_highland_dairy_farms_desc:0 "We can preach the virtues of our industrial laborers and fight for their rights all we wish, but Liechtenstein for now is largely agricultural and pastoral. Thus it comes necessary to turn our attention to our farmers, in particular the dairy ranches, whose milk we should sell and their concerns listened to just as fairly as a factory laborer in Schaan. Unions for farmers must be created."
LIC_expand_scouts:0 "Encourage PuPL Scout Membership"
LIC_expand_scouts_desc:0 "Unser Bestes! Allzeit Bereit! Scouting for both boys and girls is essential, an honorable pastime which teaches traditional skills to the next generation. Scouts should be taught to venerate the natural world, be rational, and foster community ties. The Pfadfinder und Pfadfinderinnen Liechtensteins, or the Scouts and Guides of Liechtenstein, shall be supported directly by the princely house!"
LIC_princely_roads_commission:0 "Princely Roads Commission"
LIC_princely_roads_commission_desc:0 "Liechtenstein's roads are not too well acquainted with the modern world. Most are paths for horses and their carraiges, and many more only fit for bicycles or motorcycles. We should open ourselves to the automobile market, and put folks to work developing infrastructure to combat the unemployment of Black Monday and drive demand for automobiles."
LIC_eschen_ammo_factory:0 "Open the Presta-Eschen Ammunition Plant"
LIC_eschen_ammo_factory_desc:0 "Despite a lack of a standing army, Liechtenstein sometimes engages in dealings with its neighbors. Seeing that the world's tensions are flaring up again, we shall open an ammunition plant in Presta-Eschen to supply either the Swiss or the Austrians with bullets for their primary arms. These ventures will undoubtedly tie our two countries closer, and commit us further to them."
LIC_abolish_18_percent_clause:0 "Abolish the 18 Percent Prerequisite"
LIC_abolish_18_percent_clause_desc:0 "Dangerous movements like revolutionary syndicalism and Ariosophy were cited in the early 30's as reasons to implement an '18% qualifying clause,' preventing any party from sending members to the Landtag if they receive less than 18% of the popular vote. This was implemented in the 1928 election to stop revolutionaries and Ariosophists alike, but it has also been used to torment the underdogs of the Landtag.\nDoubtlessly, this clause is unconstitutional and should be removed, with perhaps an 8% qualifying clause being put in its place."
LIC_workers_councils:0 "Support Labor Councils"
LIC_workers_councils_desc:0 "Labor councils briefly formed in Germany, in the times preceding socialist migration to Liechtenstein. These ideas have permeated, even entrenched themselves, in socialist dialogues throughout the last decade. We will make this reality come true, and perhaps in the process draw closer to the radical German leagues in our country. In doing so, we will attempt to moderate them, and dominate the hearts of workers."
LIC_workers_visas:0 "Draw Workers to Liechtenstein"
LIC_workers_visas_desc:0 "We are not limited by our population. We will pass legislature to invite workers into Liechtenstein, and man the growing industrial sectors in Schaan and Balzers. This way, we can increase competitiveness, employment, and a general living standard across the country. Their labor will bring us money, which we will feed into our loop of growth."
LIC_oben_am_jungen_rhine:0 "Oben am jungen Rhein"
LIC_oben_am_jungen_rhine_desc:0 "Industrialism has sprung to life in Liechtenstein. Our workers are well-paid, our farmers existing alongside them in harmony, and the intricacies of a modern nation are developing. We've proven our detractors wrong: with the Princes at our side, we have reformed Liechtenstein without revolution, instead effecting a gradual, peaceful transformation that stays traditional."




LIC_VU_victory:0 "Victory of the Vaterländische Union"
LIC_VU_victory_desc:0 "The gamble of the Volkspartei and Heimatdienst have succeeded. The VU is in power, Otto Schädler the Prime Minister, and the so-far eternal reign of the FBP deposed. The Landtag will come to our control in due time- once we solve our position on the customs union and prove corporatism as Liechtenstein's economic future."
LIC_liechtensteiner_vaterland_paper:0 "Liechtensteiner Vaterland Articles"
LIC_liechtensteiner_vaterland_paper_desc:0 "Each of the three major political establishments have their own newspaper. The FBP has the Liechtensteiner Volksblatt. The UEK have their Arbeiterzeitung. We have reformed the Liechtensteiner Nachrichten into the Liechtensteiner Vaterland, as a unified media organ capable to uphold our party values. Using our media we can move minds to the issues at hand: the customs union debacle and Black Monday."
LIC_consolidate_VU:0 "Consolidate the VU Coalition"
LIC_consolidate_VU_desc:0 "The VU is a fusion of the Volkspartei and the Liechtensteiner Heimatdienst created to oppose revolutionary elements like the UEK and the domineering FBP. One party is a liberal people's party, and the other an Austropopulist entity heavily based on the ideas of the Millimetternich in the East.\nWe should reconcile our ideological differences and come with with an austere plan to both keep the new VU together and fulfill our election promises."
LIC_dollfussian_corporatism:0 "Dollfussian Corporatism"
LIC_dollfussian_corporatism_desc:0 "Dollfussian corporatism advocates for the fusion of the state, religion and the economic policies of the state into one harmonious orchestra. Our liberal Volkspartei friends disavow the religious aspect of corporatism, which we shall graciously drop- nevertheless, we will provide real social and economic solutions with new guilds and associations to bring up the peasants and the nascent laborers of Liechtensteiner industry. Through corporatism we should hope to accelerate our industrialisation."
LIC_establish_hilti:0 "Establish Hilti"
LIC_establish_hilti_desc:0 "In Schaan, the industrial heart of Liechtenstein, two brothers, Eugen and Hiltl Hilti have a vehicle workshop that also produces spark plugs, bolts, and other automotive parts.\nAs part of industrialisation, we should seek to uphold these companies as standard and salvation, seeing that lights, appliances, and vehicles are standardized in every household."
LIC_christian_social_justice:0 "Christian-Social Justice"
LIC_christian_social_justice_desc:0 "Long have the people of the principality forgotten the three core principles of real justice. These sacred tenets are human dignity, human flourishing, and the sacredness of life. Without these three core tenets, no justice system is truly sacred. We should see our justice system liberalized heavily, as per the Volkspartei. As per the Heimatdienst, we will see it more charitable and upholding of aforementioned divine teachings."
LIC_schaan_canning_factory:0 "The Schaan Hilcona Canning Factory"
LIC_schaan_canning_factory_desc:0 "In Schaan, our pumping machine-heart, a company by the name of Hilcona has set up a canning factory that takes peas, beans, and squashes from our native fields and cans them for preserved distribution. A variety of foodstuffs can be canned and bottled with a diversity of cooking techniques, which will help prepare the population in case of some future emergency."
LIC_red_black_unity:0 "Agreement with the Reds"
LIC_red_black_unity_desc:0 "In our pursuit of industrialism, it comes apparent that our growing workforce needs supporters. This shall come in the form of the UEK, who we shall enlist to aid us in passing workers' rights and compensation laws. If our workers can be assured of their safety and prosperity at these factories, Liechtenstein can be transformed all the quicker."
LIC_more_power_to_monarch:0 "Increase Monarchical Authority"
LIC_more_power_to_monarch_desc:0 "Before 1921 Liechtenstein had no constitution. While this is not to change, they have led us wisely, and we can't have subversive elements like rogue socialists and ariosophs prowling in our country. Giving the Princes more authority over government will allow a strong, fair monarch to persecute these radicals. In addition, their connections and knowledge will serve well to guide us."
LIC_adapting_to_industrial_society:0 "Settling Into Our Industrial Society"
LIC_adapting_to_industrial_society_desc:0 "Liechtenstein has surpassed its economic backwardness and is now industrialized. With industrialism comes new societal changes and challenges. We will connect with wider markets, and transfer to an export-focused economy that will feed our industry, and thus, our people."
LIC_fur_gott_furst_vaterland:0 "Für Gott, Fürst und Vaterland!"
LIC_fur_gott_furst_vaterland_desc:0 "Liechtenstein has three cruxes, three constants: God, Prince, and Fatherland. These things are eternal, and thus our national motto. God's wise hand guides us- Catholic social teaching. The Princes look over us- wise investments, political advice, passing laws. Our Fatherland is at our service- rising smoke from new factories, green fields, bustling districts. As long as we always think of how any three of these things can either be improved by us or how these three deities can support us, we can never go astray."


LIC_FBP_victory:0 "Continuation of the FBP's Reign"
LIC_FBP_victory_desc:0 "The Fortschrittliche Bürgerpartei will continue its reign as ruling party despite the efforts of the UEK and the VU. We will keep her steady as she goes and continue with what has worked in the past, while working alongside the Princes."
LIC_black_lion_party:0 "The Black Lion Party"
LIC_black_lion_party_desc:0 "Our enemies decry us as blackguards and thus 'black lions,' a derogatory term. We shall prove that black lions are no less noble than golden ones, and use our valor and pride to unite the people around the citizens' party that is the FBP."
LIC_papal_legitimacy_concordat:0 "Papal Legitimacy Concordat"
LIC_papal_legitimacy_concordat_desc:0 "Our faithful have long lobbied the Throne of St Peter to recognize the devote faith of our nation and for our own Archdiocese separated from Switzerland. The newly spiritual government has heard positive mewling from his Holiness to finally grant both of our requests."
LIC_a_job_for_the_prince:0 "A Job, for the Prince!"
LIC_a_job_for_the_prince_desc:0 "The Princes like to live off in their splendiferous Austrian palaces. We should thus involve them in the governing of their principality. We will increase the frequency of meetings between the civilian government and the Prince. Their wise counsel and contacts in the aristocratic courts will help guide government policy going forwards."
LIC_restrict_home_service:0 "Scrutinize the LHD"
LIC_restrict_home_service_desc:0 "We have seen the damage Dollfuss has caused to the Christlichsoziale Partei in Austria. We shall not let that happen here; we should suppress and do our best to discourage the radicalization of fine Christians into the LHD. In doing so, we will spend some effort shooting strays at the UEK and VU, as to maintain hegemony."
LIC_construct_binnenkanal:0 "Realize the Binnenkanal"
LIC_construct_binnenkanal_desc:0 "In order to prevent waterlogging of the Rhine River and combat the loss of employment in Black Monday, we shall start construction on a twenty-three-kilometer-long canal through the country. We shall add subsidiary canals- may Josef Vogt and Philipp Krapf guide us."
LIC_confirm_national_bank_integrity:0 "Confirm the Sparkassa's Integrity"
LIC_confirm_national_bank_integrity_desc:0 "The Liechtensteinische Sparkassa, or the National Bank has been part of the state administration since its creation in 1861. The Sparkassa has even had its own administration, elected officials via the Landtag, and direct government oversight. We shall decouple the Sparkassa from the state, and make it independent and under public supervision. Nevertheless, we shall maintain much of the bank's shares to exert control."
LIC_armed_viability:0 "In The Case of Conflict"
LIC_armed_viability_desc:0 "In the case of a Second Weltkrieg it is wise that Liechtenstein is adequately prepared for its consequences. We may outfit the Landespolizei with more arms, and begin experimenting with something like the Swiss Volksmilizen system. Guns should be stocked in the houses of the knowledgeable."
LIC_our_own_archdiocese:0 "The Archdiocese of Vaduz?"
LIC_our_own_archdiocese_desc:0 "Industrialism and its consequences have changed Liechtenstein's culture. The faithful are more educated than ever, and their eyes widen than ever. We are aware of God in our daily lives as His hand caresses Liechtenstein, raising its place in the world. Thus we shall request the Pope to grant us our own archdiocese, the Archdiocese of Vaduz, and remove ourselves from the Diocese of Chur."
LIC_restore_political_dominance:0 "Restore Political Dominance"
LIC_restore_political_dominance_desc:0 "Before the Trans-Alpine Strikes and government crises of the late twenties and early thirties, the Fortschrittliche Bürgerpartei held a strangehold over Liechtenstein's politics. Its newspapers were the widest read and its politicians continuously earned prime ministership. Through prudent policy and perhaps unbecoming measures, we will put the FBP in another golden era where it will forever remain comfortably ahead of its opponents."
LIC_die_jahrhundertregel:0 "Die Jahrhundertregel"
LIC_die_jahrhundertregel_desc:0 "Fair and rational government, when continued to be steered, will never stray and tumble. Since the inception of political parties, Liechtenstein has only ever been ruled by the FBP. We shall see to it things continue this way, in service of our Princes and God. May Liechtenstein prosper!"


LIC_swiss_compact:0 "The Swiss Compact"
LIC_swiss_compact_desc:0 "Our neutrality cannot be compromised. We should put our confidence in Switzerland and have the Principality's duties overturned to Swiss authorities. A country secure from the threats of embargo and war create a more favorable target in the eyes of investors."
LIC_foreign_suspicion:0 "Foreign Suspicion"
LIC_foreign_suspicion_desc:0 "Perhaps we can have the securities and glamor of Austria, while maintaining the appearance of Switzerland. Both the Swiss and the Austrians have a set of advantages and disadvantages; besides, it is unwise to throw away centuries of good grace with the Habsburgs. We shall settle for the best of both worlds."
LIC_continue_customs_union:0 "Continue the Customs Union"
LIC_continue_customs_union_desc:0 "Austria, despite coming out of the Weltkrieg battered and bruised, is known for its tenacity. In the Napoleonic Wars it bled itself dry to destroy the French aspirations for European conquest. In the Weltkrieg, everyone thought the Empire would collapse, but it stood strong. Even now Austria remains stalwart and committed above all else to the survival of its state.\nOur commitment to Austria is just the same: timeless. We should settle the question by intertwining ourselves further with Austria."
LIC_franz_josef_ii_expansion:0 "Franz Joseph II's Company Enlargement"
LIC_franz_josef_ii_expansion_desc:0 "A new Prince means new ideas. He has come to the princely seat of power and seen before him a fertile valley ripe for growth and expansion: our Liechtenstein! With the treasures of the family behind us, we will put some of the fortune towards personal investments and betterment in the Principality- especially in industrial ventures- and yet more money into foreign investment and speculation as to deepen our ties with other nations."


#Absolutists

LIC_absolutist_decree:0 "The Absolute Monarchy Decree"
LIC_absolutist_decree_desc:0 "The power to declare absolute monarchy is reserved to the Prince, which he is allowed to invoke at will. Doing so would go against the 1863 and 1921 constitutions and the political development of Liechtenstein, but the clause has been invoked. The Prince retains absolute control over the Principality."
LIC_reopen_bern_embassy:0 "Reopen Closed Embassies"
LIC_reopen_bern_embassy_desc:0 "For a long time, Liechtenstein's embassies in practically everywhere but Vienna have been closed or non-existent. We shall remedy this, and expand extant diplomatic missions to other European states and re-open any, like the Swiss one, that have not seen paperwork in some time."
LIC_return_of_the_princes:0 "Humanitarianism of Elsa"
LIC_return_of_the_princes_desc:0 "Elsa von Gutmann, the wife of our late Prince Franz I, is noted and beloved by the country for her humanitarian efforts within the Principality. She has contributed greatly to medical research and funding within the country, Elsa went out of her way to secure polio vaccines in 1931 from the United States & Germany at her own expense.\nThe people love her, rightfully so; we should invest in our medicines and hospitals as part of Liechtenstein's transformation from agrarianism to industrialism."
LIC_oerlikon_balzers:0 "Start Gerätebauanstalt Balzers"
LIC_oerlikon_balzers_desc:0 "With the assistance of Swiss industrialist Emil Georg Bührle and our own Max Auwärter, we will start industrial development in Balzers. A hallmark of any industrial society is its ability to innovate and bring new advancements to the world. With the new facility we plan to build, Liechtenstein shall employ many hundreds of men to pioneer thin optics, vacuum tubes, and semiconductors."
LIC_found_AHV:0 "Bill of the AHV"
LIC_found_AHV_desc:0 "With industrial development of the country speeding up, we can finally allocate our funds to support our citizens. We shall create a three-pillar insurance model, working off failures in 1922 and success in '23. Our Constitution provides for state support of pensions, especially that of the older peoples at the twilight of working years. We shall model it on both Austrian and Swiss models, creating three distinct pillars: the state pension, occupational retirement planning, and private retirement savings. Such a thing has been controversial, but with absolutist control this will be very easy to push through."
LIC_LGT_group:0 "Expand the BiL Group"
LIC_LGT_group_desc:0 "The BiL group, founded in 1923 as the Bank of Liechtenstein Aktiengesellschaft, is Liechtenstein's royal-owned private bank. Since the Weltkrieg its job has been primarily acquiring capital in foreign currencies, including Swiss Francs and German Marks. The idea behind this is that the BIL should like to have as many offshore assets as possible and finance industrial expansion in the principality.\nAs our future is very uncertain, we should turbocharge these prudent business practices to finance and support our country."
LIC_princely_holdings:0 "Renaissance on Alpine Ridges"
LIC_princely_holdings_desc:0 "Liechtenstein can by all intensive measures be considered an industrialized nation. Traditional industry, like ranching and logging, exist in harmony with new heavy industries. Our banks have weathered economic crises, and come out trusted by the international banking community. Our princes are even more fabulously wealthy; a glorious dawn rises over Alpine ridges, and under God's wise hand we should continue to see prosperity and living standards hike."


#Syndies

LIC_LAV_rule:0 "The Union's Expedition"
LIC_LAV_rule_desc:0 "We have finally bested not only the FBP, but even eclipsed the UEK. The trade unions are firmly in power now, and despite conservatives barking about 'imminent revolution!' it seems the Princes are ready to accept our rule. We shall see a more natural end to the Trans-Alpine Strikes, with the nation built on class harmony and peace as opposed to a forcible maintenance of the status-quo."
LIC_for_prince_and_worker:0 "Fürst und Arbeiter"
LIC_for_prince_and_worker_desc:0 "Despite what the average Syndicalist may tell you, it is more than possible for royalty and the enlightened laborer to co-exist, even under a Syndicalist structure. All it requires is the willingness of the worker to put his heart into the prince, ruler of the nation, and the Prince's tolerability for the worker and a true love for his fief.\nThese are the extant conditions in Liechtenstein. Let our workers prosper, so they may give all to our Princes, and we all shall grow richer because of it."
LIC_youth_protection_act:0 "A Future for the Youthful"
LIC_youth_protection_act_desc:0 "All children have a right to grow up in a world better than their parents. With industrialisation on the rise, we must be sure that this growth comes smoothly, without controversy and without turmoil. We shall shield our children from dangerous labor in the factors and incorporate children into state welfare."
LIC_rheinische_clothes_factory:0 "Expand the Rheinische Clothes Factory"
LIC_rheinische_clothes_factory_desc:0 "One of the earliest industrial properties of Liechtenstein is a little clothes factory on the banks of the Rhine. Fine garments show a fine people and a refined nation; with industrialism comes an increase in population and a rise in prosperity for most people. We should expand our clothing industry to meet the demand in both Liechtenstein and our neighbors."
LIC_reunite_associations:0 "Reunite the Upper and Lower Associations"
LIC_reunite_associations_desc:0 "The Lower Association, the ruling half of the LAV, was only put into power by careful negotiations with the UEK, VU, and Upper Association. This Upper Association is more true to the spirit of the Trans-Alpine Strikes: anti-government, anti-state, and anti-party outlook of the LAV pioneered by Hugo Kindle.\nIt is time to reunite the associations, the moderate Lower and radical Upper, into one LAV again."
LIC_encourage_public_secondary_education:0 "Incentivize Public Secondary Education"
LIC_encourage_public_secondary_education_desc:0 "An intelligent population is the most fertile soil for a prosperous society. Our schools will receive increased fundings, and our students encouraged to study as much as possible. Fresh minds are needed for the future, where we can put the strong industrial base we have spent the 30's building into good use. This education will be provided to workers on every rung of society."
LIC_young_reformed_liech:0 "Cast Away the Storm of the Strikes"
LIC_young_reformed_liech_desc:0 "The time of revolution is over. We will implement a free economy that finally does away with private ownership, while remaining loyal to our Princes. The Strikes have been worked past, and by all purposes have succeeded: Liechtenstein is now a workers' paradise, red in both the sense of the Princely sigil and the Syndicalist revolutionary color."

#Natpops

LIC_LHD_victory:0 "Defense of our Home"
LIC_LHD_victory_desc:0 "Against all odds, the LHD has managed to decouple from the VU and secure a majority in the Landtag. While we may have secured our victory we cannot rest on our laurels and gladhand for too long. Austropopulist principles must be established immediately, alliances must be made, and a fervor for Christianity re-established."
LIC_ally_with_frontenbewegung:0 "Ally with the Swiss Frontenbewegung"
LIC_ally_with_frontenbewegung_desc:0 "In the spirit of our political goals, we should reach out to an associated organization to the west- the Frontenbewegung, a Swiss organization similar in goals and style. We shall meet them with the cry of 'Harus!' and seek a Swiss-Liechtensteiner friendship deeper than before."
LIC_proportional_representation:0 "Enact Proportional Representation"
LIC_proportional_representation_desc:0 "Proportional representation keeps rogue factions such as the FBP in control of the country. People and their organizations would be far better represented with proportional representation- conveniently, a lack of it also resulted in everyone else losing to the FBP. A better society shall come of this."
LIC_catholic_unitarianism:0 "Gott beschütze Liechtenstein!"
LIC_catholic_unitarianism_desc:0 "These days, the Principality is far too concerned with worldly affairs. We have forgotten all things ecclesiastical, much to society's detriment. We shall introduce Catholic social teaching and pursue a better standard of living, so that people no longer have to think of worldly issues and can look to God for self-improvement."
LIC_promote_liechtensteiner_heimatdienst:0 "Gospel of Dollfuß"
LIC_promote_liechtensteiner_heimatdienst_desc:0 "Engelbert Dollfuss is the man who made the LHD's ideological programme. Through Der Umbruch and Schaedler's speakers, we should keep in contact with the Millimetternich and follow the words of Dollfuss' Austropopulist agenda. Whether it be corporatism, peasant uplifting, or religious rejuvenation, we should be the perfect example of an Austropopulist state at the smallest scale."
LIC_coopt_volkisch_takes:0 "Integrate Volkisch Sentiments"
LIC_coopt_volkisch_takes_desc:0 "The rise of Ariosophy and the work of Guido von List in the last three decades has left a subtle but immediately noticeable impact on the minds of the German people. They realize themselves greater together and as one. Most of these people, though, see the VDBL as Liechtenstein's primary vehicle towards future Germanic strength. We will co-opt volkisch ideals, turn away the ariosophical VDBL, and forge closer ties with all kinds of Germanic friends."
LIC_a_path_to_some_level_of_greatness:0 "Das Hochschloss"
LIC_a_path_to_some_level_of_greatness_desc:0 "Liechtenstein is above the world. We sit somewhat removed for global affairs, and we should seek to keep it that way. Being out of the way does not remove our potential for greatness; we should seek to further our own glory and prestige despite splendid isolation. We shall do this via our Princes and wise government council, seeking to build a lively society that can claim superiority even over the Great Powers in some respects."

#Ariosophists

LIC_Anschlussputsch:0 "Alone After the Anschlussputsch"
LIC_Anschlussputsch_desc:0 "The Anschlussputsch has succeeded! However, it has also failed. The overt objective was to integrate Liechtenstein into a true German nation and put its resources to use fighting for a Greater Germany, but it seems that dream will have to be reached by us alone. Already ostracized in the world, we have a lot of work to attend to: chasing out the Princes, bringing Ariosophic myth to our history, and preparing to take on the world for our dreams- all in the name of the Aryan people."
LIC_hilti_arms:0 "A Santur Here on Earth"
LIC_hilti_arms_desc:0 "Santur! The land of paradise! The home of Aryan superpowers! We cannot truly restore its might, but we can try as hard as we can. Relief must be secured for the nation's woes and it must be shown that Liechtenstein can survive without the Princes. Now is the time in which our rule must be cemented with action."
LIC_der_umbruch:0 "Reorientation to the Stars Beyond"
LIC_der_umbruch_desc:0 "Through the party paper Der Umbruch and Ariosophic teachings, we should stop looking between east and west- Austria and Switzerland- and instead look up to the wisdom of the gods and below to the prowess of the Agarthans. We should prepare the people for the Ariosophic societal overhaul, promising salvation and sustenance even without royalty."
LIC_vril_render_cannon:0 "The Vril Render-Cannon"
LIC_vril_render_cannon_desc:0 "Unique solutions are needed if the Ariosophic state is to survive the modern era. We will develop our curious new weapons, the rail-gun, and make them militarily viable. These weapons are powered by the errant Vril, infused with the lingering souls of Aryan past. We shall become a truly modern military, through the most unusual ways possible."
LIC_blessed_are_the_tears_of_the_rhine:0 "Blessed are the Tears of the Rhine"
LIC_blessed_are_the_tears_of_the_rhine_desc:0 "The young Rhine forms Liechtenstein's western frontier. It provides our people with water for the towns and the animals. In the spirit of our anthem, we will fortify our populace with industrial might and agricultural prowess as to stave off the apes abroad, who have declared our enlightenment 'foolish' and our nation illegitimate."
LIC_reintroduce_listian_wotanism:0 "Reintroduce Listian Wotanism"
LIC_reintroduce_listian_wotanism_desc:0 "Guido von List pioneered a secret gnosis in which he revealed the ancient German method of nature-worship and a world of hidden magic inside nature. Our leader, Rudolf Schädler, is a renowned sculptor whose talents  have gone to use in emulating this Armanist gnosis and bringing it back to the modern age. We will spread these old ways among our people."
LIC_all_in_the_name_of_divinity:0 "In the Name of Divinity"
LIC_all_in_the_name_of_divinity_desc:0 "We must legitimize! Perhaps we must descend to Earth and be worldly as to shake off the pariah status we find ourselves in. We will see to it that the Ordo Novi Templi opens chapters in Liechtenstein and that their orders are carried out to the best of ability."


#Army 

LIC_landezpolizei:0 "The Landespolizei in an Uncertain Future"
LIC_landezpolizei_desc:0 "Liechtenstein's last military deployment was in 1868, during the Brothers War. Two years later, its standing army ceased to exist.\nThe remnant security force is civilian policing, also known as the Landespolizei. In this time, subversive forces seek Liechtenstein as an inlet to the greater Habsburg Empire and revolutionary intrigues abound. We should bolster the ranks of our police force to maintain readiness."
LIC_purchase_neighborly_reserves:0 "Purchase Neighbors' Hand-Me-Downs"
LIC_purchase_neighborly_reserves_desc:0 "Our nation suffers in procurement. Our protection is primarily handled by Vienna, but now we should see to upgrade an ever-aging arsenal. We should purchase new firearms and perhaps a few armored vehicles to ensure we stay up-to-date."
LIC_expand_police_arsenal:0 "Give Wings to the Fürstliche Luftwaffe"
LIC_expand_police_arsenal_desc:0 "Why might Liechtenstein want an air force? The same reason Switzerland would- to protect our airspace and independence. Our neighbors would have stockpiles of Weltkrieg-era fighters and scout planes, which we might put to use in both civilian and military purpose."
LIC_motor_transport:0 "The Legacy of Peter Rheinberger"
LIC_motor_transport_desc:0 "Peter Rheinberger was a great late military man. Known for his engineering skill, Rheinberger participated in the construction of numerous rails, roads, and bridges inside the Principality.\nAfter his military duties ended following disbandment, Rheinberger had proved his excellence and became a state technician, expanding his domain to drainage projects and state buildings.\nWe should emulate his forethought and provide for the burgeoning automobile and the nascent air field."
LIC_purchase_old_models:0 "Buy Out Older Models"
LIC_purchase_old_models_desc:0 "There are likely many outdated Austrian and Swiss airplanes languishing in old aerodromes. Investing into a small airforce is much more worthwhile than an army; the machines have purposes beyond war, and perhaps our neighbors will be willing to part with these old models for a price."
LIC_a_war_on_horizon:0 "Preparing for the Coming War"
LIC_a_war_on_horizon_desc:0 "Another great war threatens Europe. It is a domino reaction: one country prepares for war. Fearing its opponent, so does the other country. Fearing violation of neutrality, so do all the border states- and thus the effect spreads. Liechtenstein, too, may be drawn in. We may not be so lucky this time as we were in the last, awful as it was. We shall draft contingencies, and in the worst case, prepare the Landespolizei for all-out war. A substantial increase in armaments is required to back our little principality's independence."
LIC_swiss_style_air_force:0 "Swiss-Style Aeronautic Combat"
LIC_swiss_style_air_force_desc:0 "The Swiss take neutrality to the extreme: running interception missions against neutral pilots violating their airspace, thereupon grounding them and taking the pilot prisoner. We should seed to emulate this, and turn any substantial open road into a possible military runway. An aggressive air force makes us seem especially unappetizing."
LIC_restore_the_army:0 "The New Fürstliche Wachen"
LIC_restore_the_army_desc:0 "It has been seventy years since the 80-man Liechtensteiner Army marched out to war and returned with one Leutnant Radinger leading it home.\nIn those seventy years, the world has grown far more dangerous and ourselves inching towards real prosperity. We will re-establish the army and provide lawful provisions for the Landeswehr, a scrapped paramilitary from the 1920s. Hereupon we will keep a little under one percent of men enrolled in the army, and about the same amount as reserves."
LIC_maintain_the_police:0 "Maintain the Landespolizei's Stature"
LIC_maintain_the_police_desc:0 "The Landespolizei of Liechtenstein has found itself in an increasingly militarizing and dangerous Europe. Our security is provided by nearby nations and upheld by our neutrality. Just because we choose not to establish an army does not mean that we are in no need of further protection.\nThe police shall have increased vigilance and, rather than funding men into the army, increase the police force's armaments and build state apparatuses for national defense.
LIC_armor_purchase:0 "Treading Defense"
LIC_armor_purchase_desc:0 "While we maintain strong defensive possessions it would be imprudent to assume that these are unassailable and that we would never need to mount a rolling defensive operation. We should seek to purchase a complementary suite of Armoured Vehicles so that we can mount a treading defence further into our territory."
LIC_armored_car_focus:0 "Rolling Offense"
LIC_armored_car_focus_desc:0 "Tanks are too expensive. Rather, we can use vehicle chassises and purpose them for policing, uprooting unrest, and as a tool to break new grounds on the countryside. We shall invest in armored cars as an infantry accompaniment, putting vehicles such as the Austrian ADGZ to use in the Alps and our own principality."
LIC_navy:0 "Landlocked No More"
LIC_navy_desc:0 "'There is no maritime law in Liechtenstein. It does not maintain a ship register and it is not possible to sail under the Liechtenstein flag in foreign or international waters.'\nBy the firm gauntlet of God, Liechtensteiner citizens can now look from their homes to see the ocean. We are landlocked no longer: we will update our maritime laws, and immediately begin taking advantage of our new coast with a merchant marine of our own."
LIC_one_thousand_radingers:0 "One Thousand Radingers"
LIC_one_thousand_radingers_desc:0 "In 1866, one of Liechtenstein's strangest incidents occurred. When its army of eighty soldiers went to fight for the Austrians in the Austro-Prussian War, eighty-one returned. Who was this wayward soul?\nThe truth is that this strange addition was a one Kaiserjäger Leutnant Radinger, who simply showed the army home and returned to Austria shortly after. He was no Italian defector, but a kind soul; but the heart of the story gives a sort of mythos to Liechtenstein's army. We must have a thousand of these Leutnant Radingers: knowledgeable, kind-hearted, and veterans. We shall drill our small army into even greater shape!"
LIC_raising_offense:0 "Harkening to Joseph Wenzel"
LIC_raising_offense_desc:0 "We are an Alpine nation. Rugged peaks shoot into the skies and great valleys snake through the land. Rivers lie at the bottom, and everywhere rocks are the greatest obstacle. Taking inspiration from Austrian experience in the Weltkrieg, we will see how the Austrians and Italians managed mountain guns and thus put that experience to use traversing mountains that might not necessarily be Liechtenstein's. In doing so we shall think of Joseph Wenzel, Austria's famous artillery reformer."
LIC_specialist_units:0 "Extraordinary Circumstances, Extraordinary Powers"
LIC_specialist_units_desc:0 "Syndicalist, Totalist, Socialist, Ariosophic, and Legionairist intrigue thrives in this Europe. Every man could be a secret agent, and Liechtenstein might one day be simply relegated to a bridge to another country to be tramped down by another's jackboots. The police must know of all plots and root them out before they come to pass.\nIn addition, every citizen is already obliged to take up arms to defend the principality. We will reiterate this fact, and ensure all are aware."
LIC_internationale_reconstruction:0 "Aid Reconstruction in Western Europe"
LIC_internationale_reconstruction_desc:0 "Leveraging the House's vast wealth, we will invest in firms across defeated Third Internationale countries. We shall rebuild the factories and re-sow the fields, but with our backing. With these investments we can hope to have some influence on the direction of their economy, and put it to our use. Better yet, our infringements may provide us an inlet into their new political worlds."
LIC_tie_knot:0 "One Insurmountable Mountain"
LIC_tie_knot_desc:0 "Europe is far too dangerous. With Switzerland at our side, we shall enact a mutual policy of defense and destruction. No measures will not be taken to defend our fatherlands- even if that includes either Vaduz or Bern coming to rule both Switzerland and Liechtenstein. Bunkers shall blanket the hills, and our odd tchotchkes will keep our enemies guessing."
LIC_false_refugee_plot:0 "Die Flüchtlingskomplott"
LIC_false_refugee_plot_desc:0 "'The Refugee Conspiracy' - or, how to hide an army. With assistance from Russia, they shall send their trains through Danubia piecemeal. In these trains will sit workers, vagabonds, capitalists, and a cornucopia of different tradesmen. Each of these men are ostensibly refugees. However, the trains themselves will whisper a different story. Under the floorboards, rifles will lay supine and grenades will rattle like loose nuts and bolts. Russia shall send us its army by a covert means, and we will be permitted full command."
LIC_unternehmen_marterl:0 "Unternehmen Marterl"
LIC_unternehmen_marterl_desc:0 "'Unternehmen Marterl' or, Operation Wayside Shrine, shall see a remarkably more complicated Schlieffen Plan take place from Austrian command, using Liechtenstein as a base. With the Second Weltkrieg raging in Europe, and France perhaps vulnerable in the east, Unternehmen Marterl calls for a sudden invasion of Switzerland to bypass Italy and go straight into France. The Swiss mountains are rugged, and their military fiercely determined- but it is nothing our technology and Austria's might cannot handle."
LIC_shadow_empire:0 "Shadow Empire"
LIC_shadow_empire_desc:0 "Finance is the way of the future. We will invest in our allies and receive dividends; we will appropriate their industrial lands for ourselves. Our companies will open firms on foreign fronts. We shall both benefit from the competition. Liechtenstein may be small and its holding meagre, more well-known for its Bohemian castles, but we will expand our portfolio to include industrial properties."
LIC_protector_of_micronations:0 "Prince of the Little Fiefs"
LIC_protector_of_micronations_desc:0 "Liechtenstein is the last extant microstate in Europe. Andorra has bent their knees to Madrid. San Marino lays beaten and trampled by terroristic Reds. The city of Riga is in danger. Malta's flag lay beached under the shadow of the German flag. The facts are that Liechtenstein is the last of the independent micronations, even if our own independence can be ended when Switzerland or Austria see fit. Nevertheless, we will champion the cause of these lost people, repatriate their princes and captains, and be the protector of the smallest states of Europe."
LIC_greater_rank:0 "Right by Might and Write"
LIC_greater_rank_desc:0 "Shrewd diplomacy and cloak and dagger schemes is the way forward! In the light we will negotiate, in the dark we will scheme. As Liechtenstein grows, one day we may no longer be a simple principality: we might be a duchy, or even a kingdom! We will stop looking out for ourselves and look outward, and make others look out for us instead."
LIC_reap_harvest:0 "The Full Basket"
LIC_reap_harvest_desc:0 "Liechtenstein has come into possession of a variety of free cities. Together we shall connect their economies, their peoples, and their research to the homeland, and from a fast array of far-flung lands make something out of it yet. We will dedicate some resources to the welfare of these cities."
LIC_church_crusade:0 "Crusade for Reclamation!"
LIC_church_crusade_desc:0 "It is finally time to strike. The Pope has given us his blessing. We shall marshal the armies of the faithful, and as we have protected the Pope, shall launch a new crusade to reclaim his proper seat in the Vatican. Our mission will be difficult, but no holy mission was without the absence of darkness. For God, Prince, and Fatherland!"

#Foreign Policy (Vorarlberg/Tyrol can only be taken if AUS is in crisis)

LIC_principal_policy:0 "The Principal Policy"
LIC_principal_policy_desc:0 "Liechtenstein has no need for a true foreign policy until now. It has been dictated by Austria since the counties of Vaduz and Schellenberg were gifted to the House of Liechtenstein, but with new times come new ideas. We should look into our foreign relations."
LIC_reichspakt:0 "Oben am deutschen Rhein"
LIC_reichspakt_desc:0 "The Rhine River is the milk the mother Earth gives to her German children. Thus we shall attach ourselves to Berlin, put our lot in with the greatest power the world has ever seen, and by their might deter any action against Liechtenstein."
LIC_russia:0 "Legacy of Franz I"
LIC_russia_desc:0 "Franz I of Liechtenstein was notable during the Weltkrieg as the Austro-Hungarian ambassador to Russia. He was one of the even fewer who supported an Austro-Russian alliance. While such an alliance may never come to fruition, we in Liechtenstein are the masters of our own destiny. We must align with Russia; even so far apart, they will surely keep us safe."
LIC_neutrality:0 "Join the Swiss"
LIC_neutrality_desc:0 "Our House has stood as the proud protectors of our lands for over 200 years and we can owe this in large part to our shrewd diplomacy and refusal to take sides in conflicts that venture to our borders. The Swiss have done much the same. We shall join them in splendid isolation, and thereupon join together to protect our mutual interests."
LIC_keep_austrian:0 "Maintain Ties with Vienna"
LIC_keep_austrian_desc:0 "Why should we seek to upset the eagle's nest that we have lain within for so long? Our primary estates and family wealth still reside within Vienna itself and other Austrian territories. We should seek to maintain our ties with the House of Habsburg, and through our neutrality see to it the Double Eagle protects us."
LIC_court_espionage:0 "Courtly Espionage"
LIC_court_espionage_desc:0 "The old method of espionage: court intrigue. Liechtenstein has effective access to many of the European courts, and we may put the lessons our Princes have learned into the hands of agents who can infiltrate even the revolutionary governments of the west. Additionally, our embassies and ambassadors will be instructed to collude in affairs not unlike German agents had in America during the Weltkrieg."
LIC_military_espionage:0 "Observing Allied Maneuvers"
LIC_military_espionage_desc:0 "The men of Liechtenstein are military men. Our princes have a history serving in Austrian armies and diplomatic posts alike. With our allies, we will attend their military maneuvers and learn about the nature of modern warfare, so we may be able to counter it should war ever approach Liechtenstein. We will study modern doctrine and understand its strengths and weaknesses."
LIC_research_treaty:0 "Technological Agreements"
LIC_research_treaty_desc:0 "Liechtenstein is largely backwards, despite being surrounded by technologically advanced nations. We will enter into research treaties with our new allies and develop new technologies, bringing light and advancement into Liechtenstein. Perhaps we may even be able to acquire more curious machinery and with our tax-havenry promote inner development."
LIC_botde:0 "The Bones of the Double Eagle"
LIC_botde_desc:0 "At long last the Austrian Empire has collapsed. Instability and anarchy rules the lands of the former Empire, including proud neighboring territories such as Vorarlberg and Tyrol. We will seek humanitarian measures to assist with alleviating the misery of those impacted by the death ofo ur old friend."
LIC_protect_vorarlberg:0 "Vanguard of Vorarlberg"
LIC_protect_vorarlberg_desc:0 "Voralberg has a proclivity towards Liechtenstein and Switzerland. The westerliest region of Austria, it should not be difficult in this time of strife to seize the territory for Prince and God under the guise of protecting the land from government incompetence in Vienna.\nDamn what their votes say!"
LIC_seize_tyrol:0 "Protect Tyrol"
LIC_seize_tyrol_desc:0 "Tyrol is a proud, autonomous, and independent region of Austria. Even it is suffering; we should negotiate with the local Heimwehr, see their needs assuaged, and worm our way into 'temporary' governance of the territory. Its rich lumber, agriculture, and mineral resources will greatly assist autarky in the growing Principality."
LIC_unternehmen_marterl_decision:0 "Execute Unternehmen Marterl"
LIC_unternehmen_marterl_decision_desc:0 "For a swifter Weltkrieg victory, we will stab the Swiss in the back and invade through them to reach France. With Austria's blessing, we might have this made easier for us. Germany will undoubtedly be unhappy."
LIC_payback_habsburgs:0 "Paying Back the Favor"
LIC_payback_habsburgs_desc:0 "In 1719, the Habsburgs rewarded the loyalty of the Liechtensteins with their very own principality.\nIn this year, in a time of great plight for the Habsburgs, we will reward their kindnesses to us. Habsburg loyalists have already cried for Vienna's salvation. Despite appearances, we will answer the call. We shall be their saviors, and in the Kaiser's name, march to reclaim the Empire."
LIC_pressure_switzerland:0 "Greater Swiss Gambit"
LIC_pressure_switzerland_desc:0 "We will propose to Switzerland that their state shall be largely expanded should they join us against the Communard menace! It is daring and compromising to Switzerland, but what care we?"
LIC_bikes_decision:0 "Motorization via Motorbike"
LIC_bikes_decision_desc:0 "Liechtenstein has a surprisingly similar amount of motorcycles compared to four-wheeled automobiles driving its roads. The two-wheeled, easy-to-handle motorcycle marries well with the steep slopes and narrow pathways of our rather undeveloped principality, allowing motorbikes to be both quick and practical.\nWe should incorporate these machines into policing and border guard duties."
LIC_zeppelin_mail:0 "Diversify the Zeppelin Mail Service"
LIC_zeppelin_mail_desc:0 "A good amount of Liechtensteiner mail is handled by German zeppelins. These huge dirigibles have great cargo capacity and excellent steering capability. Perhaps we may be able to acquire a couple models of our own for purposes besides postage."
LIC_red_cross_2:0 "Improve the Red Cross"
LIC_red_cross_2_desc:0 "We can uphold the humanitarian idea of our women with the brand-new Liechtensteiner Red Cross. We can turn its power from assisting refugees of the Weltkrieg to greater, grander focuses: assisting soldiers on the front. We shall take inspiration from the German Red Cross, and equip our field hospitals with state-of-the-art medical equipment."
LIC_forestry:0 "Mobilize the Forest Service"
LIC_forestry_desc:0 "Liechtenstein is a pastoral land that knows nothing of natural resources. What we do have are good trees, though, and we shall instruct the foresters to engage in conservative, sustainable practices to put the forest in the service of our burgeoning industry. Additionally, Kaiser AG's wood gas generator-equipped tractors will benefit by this increased logging."
LIC_electrification:0 "Electrify the Municipalities"
LIC_electrification_desc:0 "As part of industrial transformation, it will be necessary to wire new high-voltage cables into the country, install substations, and provide a better logistical framework to prepare for even further industrialisation."
LIC_traktop_decision:0 "Militarize Josef Kaiser Jr.'s Auto-Tractors"
LIC_traktop_decision_desc:0 "The infancy of the armored vehicle was the armored tractor. Simply farm vehicles equipped with machine guns or re-tooled, we c an use this idea in our own fetal armored force. We shall ask Josef Kaiser Jr., CEO of Kaiser AG, to design us armored vehicles and tractors for policing and infantry duties."
LIC_river_boats:0 "Lay Down a Rhine River Flotilla"
LIC_river_boats_desc:0 "In the defense of our country we must be wary of amphibious attack through the crucial Rhine artery. To better protect our independence, we will place a few small gunboats in the Rhine River to ensure the integrity of our western borders, and if need be, build more boats to serve our purposes abroad."
LIC_advertisements:0 "Articles in Ostara & the Beobachter"
LIC_advertisements_desc:0 "The papers of Ostara in Austria and the Münchener Beobachter of Bavaria form some of the largest ariosophical, theosophical, occult, and völkisch media organs that let the secret gnosis breathe and pulse with life. While many are aware of the Aryan triumph of will in Liechtenstein, not many are privy to the material opportunities apparent. We are dearth of heroes and men, and sending word out to the faithful will allow Armanist, Wotanist, and Ariosophist thought to flourish in Liechtenstein."
LIC_navy_expansion:0 "Ramp Up Naval Expansion"
LIC_navy_expansion_desc:0 "To better prepare ourselves should the enemy return to occupy our new home, or if we must sally to restore the Principality, we must embark on a robust naval production program. Industries will be geared toward this ultimate goal quickly and aid in providing a larger industrial base to use for seaworthy ships' production."
LIC_change_city_codes:0 "Modify City Codes"
LIC_change_city_codes_desc:0 "Working with a lot of land similar to our home, Liechtenstein, we ought to change the local settlements' preparedness for economic expansion. We shall use our influence to change local city codes to be more friendly to business interests, bringing us factories and industry and restart the industrial growth we saw in Liechtenstein during the latter half of the 1930s."
LIC_airspace_sovereignty:0 "Defend Aerial Sovereignty"
LIC_airspace_sovereignty_desc:0 "We cannot have combatants in ongoing wars mistake us for valid bombing targets. Our planes shall be instructed to intercept enemy craft and, above all, defend the homeland."
LIC_anti_air_mission:0 "Aerial Deterrence Scheme"
LIC_anti_air_mission_desc:0 "Like the Swiss national redoubts, we might lack the industry and might for a proper air force, but that does not mean we are defenseless. We shall construct aerial defenses and deter craft from entering the principality."

LIC_in_exile:0 "The Prince in Exile"
LIC_in_exile_desc:0 "We have fallen to the fate of the British and the French. Our homeland is occupied, and Liechtenstein is without its namesake. However, fortunately for us, we still have friends in high places and territories that still fly the banner of the House of Liechtenstein. We must retreat, gather our resources, and adjust to a new life abroad."
LIC_in_ceylon:0 "Vacation in the Schwesterstaats"
LIC_in_ceylon_desc:0 "Our policy of 'twinning' and 'sister cities' has borne some fruit. A variety of independent city-states under Liechtenstein patronage dot the world, and a residence can be made available at once. This city shall become our new Vaduz, where we can perhaps eke out a new life and guide the cities to greatness."
LIC_reaffirm_rubber_and_tea:0 "Lessons of the Thirties"
LIC_reaffirm_rubber_and_tea_desc:0 "The 1930s were a challenging year for Liechtenstein. Famine, a robust stockpiling program, the rise of Ariosophy and the Trans-Alpine Strikes; each of these events bore nasty marks on the decade, one of the most tumultuous in the country's history. We should take the lessons the decade imparted: how to invest, how to industrialize, and how to handle a complicating political system."
LIC_freedom_and_control:0 "One Family, One Megalopolis"
LIC_freedom_and_control_desc:0 "The challenges of running a city-state are many-fold. We must eke out disadvantageous agreements with our neighbors, give ourselves wholly unto them, and generally give our processes of free government to foreign entities. Thankfully, in Liechtenstein, we were used to this as per the Customs Union and its associated boons and flaws.\nAs a city-state, we will connect other towns and villages together with mutually beneficial initiatives. We cannot think of ourselves as a truly sovereign nation, but in the meantime build ourselves back up."
LIC_kings_of_kandy:0 "Indulging in Local Customs"
LIC_kings_of_kandy_desc:0 "We are a foreign family in a foreign land. We should let the people know we are theirs as much as they are us, and open exchange between the ruling house and the extant nobility. We shall not stoop to the level of burghers or the middle class, but adopt the necessary legitimate ceremonial functions and build rapports with the people."
LIC_in_alaska:0 "Higher & Higher, to Alaska!"
LIC_in_alaska_desc:0 "A second lucky purchase has brought Alaska into our investment portfolio. It has paid off as a permanent winter retreat- now the Liechtenstein family retreats to Alaska. The reception has been cold, somewhat indifferent- the spirit of American republicanism must be broken down and the transformation into a proper aristocratic state ensured. From there we will also bring loyal companies and engineers with us."
LIC_baggage_and_anchorage:0 "Bringing in the Loyalists"
LIC_baggage_and_anchorage_desc:0 "Many Liechtensteiners are quite sad to see their princes leave. Many have begged to come along, with crowds having swarmed the castle as news broke that the family had fled overnight. Some loyalists, like our policemen or legislators, might be willing to do their rightful sovereigns one last duty and send any loyalists abroad to Alaska with us."
LIC_airports_and_sea:0 "Finding the Silver Linings"
LIC_airports_and_sea_desc:0 "Alaska is nearly eleven thousand times the size of the Principality of Liechtenstein we used to call home. In this vast territory, it is apparent from extant records the mistake of centuries past: the sheer extent of natural resources! Timber, oil, gas, and fish abound- let us build Alaska as we had Liechtenstein, and take advantage of our new principality in the far north."
LIC_yukon_tactics:0 "At Home in the Yukon!"
LIC_yukon_tactics_desc:0 "The Yukon is not much different from the dense peaks of the Alps and a terrible blizzard at home. The refugees who have come with the princely family find themselves quite at home here, but there is an endless winter; nevermind, for we shall conquer it too. Economics are the path to salvation, and as we exploit Alaska and provide it jobs, the Americans will find the state a paradisical anchorage from which the horrors of the Second American Civil War may be avoided."
LIC_in_britain:0 "The Coronation in Buckingham Palace"
LIC_in_britain_desc:0 "Through counter-revolution and decisions beyond our control, perhaps from a wish of a humble monarch, London has chosen its new monarch to be the head of House of Liechtenstein. As Britain chose us, now we choose Britain. Already crowned in Westminster Abbey, the Prince, now the King, has taken up permanent residence in London and from there we shall fully pivot our interest to the isle."
LIC_god_save_the_king:0 "Gott schütze den König!"
LIC_god_save_the_king_desc:0 "German monarchs have a long history in the British Isles. We will have no trouble adapting here to their customs; what are we but brave Hessians?\nHow did we deal with the Trans-Alpine Strikes? We will take these lessons and apply them to the still-syndicalist dregs clinging onto the flag of the Union of Britain. Furthermore comes cementing the rule of House Liechtenstein over that of Windsor. We must win the hearts of our subjects quickly."
LIC_harken_to_a_golden_age:0 "Harken to the Golden Age of Britannia"
LIC_harken_to_a_golden_age_desc:0 "The subjects of the Isles can relate with our plight. Chased from our homes by vicious invaders, the British people have our forever thanks by letting the house of Liechtenstein take up residence in London. Now it comes time to harken to the monarchical British Empire and reach out, establishing ourselves as fully legitimate succesors. We should seek to be proper British monarchs, not Liechtensteiners, and chase new prosperity the Union could never have achieved."
LIC_the_sun_shall_rise_again:0 "Let Dawn Cometh Once More"
LIC_the_sun_shall_rise_again_desc:0 "With our begininning business in order, it is time to prove to the world the might of the Anglo-Liechtensteiner Kingdom. Let us levy our influence and rebuild British economic dominance. We shall de-syndicalize the Isles, and then the world. The British people may rest easy knowing they are again subjects of a proud kingdom, not twice-occupied peasants by syndicalism and revanchist monarchism alike. We shall maintain governmental power similar to that we enjoyed in Liechtenstein. With God's wise hand shall the British restore their glory."
LIC_in_america:0 "A Throne at the Resolute Desk"
LIC_in_america_desc:0 "The White House is most unbefitting for a palace, but the fact is that the seat of the American presidency has fallen into the hands of a monarchical authority."
LIC_were_all_living_in_amerika:0 "We're All Living in Amerika"
LIC_were_all_living_in_amerika_desc:0 "The Princely House has moved into the White House, and now it is time to take stock of a vast variety of peoples and cultures perhaps unfamiliar to us. We shall build support in the German-speaking Midwest, Pennsylvania, and quickly bring our business prowess up to speed with American tycoons."
LIC_the_newest_founding_father:0 "The Eighth Founding Father"
LIC_the_newest_founding_father_desc:0 "The experiment of American republicanism was tested in the 1860s and it has been tested again as part of the Second American Civil War. Now it has collapsed, and the country leans on a far more traditional governance: monarchy. We should supplant republicanism and democracy with the Liechtensteiner branch of absolutism- this will not be easy, so let us treat states as cantons and leave the house above petty democrats."
LIC_high_over_the_legislature:0 "Commandeer the Oval Office"
LIC_high_over_the_legislature_desc:0 "The government must come to reconcile with the new monarchy. In addition, we shall put an end to the greedy practices of American businessmen and begin to consider American issues. We shall settle the issues of race and bring our own experiences with classism against the Americans. The Constitution should be amended to fit the monarchy and ourselves pledge to maintain and uphold American rights, especially while we are still finding our feet in this vast New World."

LIC_acceptance:0 "A New Cradle for the House"
LIC_acceptance_desc:0 "The new land we inhabit is more prosperous, and perhaps larger in some ways, than the former Principality of Liechtenstein. Although it is our ancestral home, we can build a future abroad and cement ourselves as legitimate and righteous monarchs. The Principality is lost, but it is no different than packing up and moving to the summer home."
LIC_fur_das_vaterland:0 "Vaduz is Not Yet Lost"
LIC_fur_das_vaterland_desc:0 "We cannot simply abandon the Principality of Liechtenstein and let the country suffer. There are people there who still dream of us. We have more resources and perhaps contacts abroad to bring to bear. We will make it a point to rescue the departments of Liechtenstein from their beastly occupiers, liberate the land, and restore the family's history to its rightful positions."
LIC_a_new_principality:0 "The Modern Principality"
LIC_a_new_principality_desc:0 "We have reformed society and mind alike to the Liechtensteiner identity. The country settles in comfortable to be ruled by the House of Liechtenstein; we shall adapt to having hundreds of times the bureaucracy and complexity, but we shall take it all with a quiet dignity and move forward in this new country.\nWe shall give it some decades and see a beautiful reflection of our mother principality come to be reflected in the lands we now occupy."
LIC_retake_vaduz:0 "Wave the Flag, High Over the Young Rhine"
LIC_retake_vaduz_desc:0 "It is time to reclaim Liechtenstein. We have the hearts of the people and the military is comfortably in lockstep. Demands shall be made for Liechtenstein's territories to be liberated and monarchical integrity respected, and should it not, the armies of the Prince will march to restore the Prince to his castles by force. The red-and-blue banner will fly from Alpine peaks, and thereupon we shall decide how the little principality shall continue to play a part in the larger whole of our nation."

LIC_occupied:0 "Liechtenstein without Liechtensteins"
LIC_occupied_desc:0 "The Principality has been occupied. What is Liechtenstein without its Princes? House Liechtenstein has fled the country, and no one has quite any idea what to do now. Foreign powers have been put in control of the country, and perhaps there is a future yet for the nation exempting its Princes."
LIC_relief_to_the_villages:0 "Relief to the Villages"
LIC_relief_to_the_villages_desc:0 "Cities such as Schellenberg and Eschen have been ruined by bitter fighting and resistance. While the country of Liechtenstein itself was small and easy to overrun, the mere act of invasion has been more than a serious setback. Our burgeoning industry has been stopped in its tracks. The ranchers' animals have been slaughtered to feed roving bandits.\n\nThis situation must be solved quickly with rapid aid to prevent famine and unrest within the former Principality."
LIC_excise_princely_resistance:0 "Cleaning House (Liechtenstein)"
LIC_excise_princely_resistance_desc:0 "Liechtenstein can no longer be Liechtenstein, that is for sure. Liechtenstein got its name from the princely house that once ruled us. Without them, our government needs a new name- and it shall be Vaduz-Schellenberg, two of Karl der Große's counties now united into one country."
LIC_french_occupation:0 "In Marianne's Crimson Swaddling"
LIC_french_occupation_desc:0 "Our salvation comes in the form of a crimson dawn, where warm rays shall streak through the Alps and the enlightenment of Revolution will realize all that has been stifled by the existence of the Princely House. The Internationale occupies our lands, and German socialists are being tasked to govern this socially-conservative land and make a revolutionary cradle of it yet."
LIC_russian_occupation:0 "Under Ivan's Heel"
LIC_russian_occupation_desc:0 "The Russian Bear has mauled Liechtenstein as a palate cleanser. Our poor society struggles to feed both them and our populace. Liechtenstein shall be rebuilt, freed from its previous attachments, and be freed from the serfdom its princes had emplaced upon the land."
LIC_appropriate_banks:0 "Coerce the Banks"
LIC_appropriate_banks_desc:0 "Princely fortunes and treasures have been left behind as the Internationale marched into Vaduz-Schellenberg. Among these are the banks and their capitalistic little coin-purses, which shall be promptly emptied and given to the welfare of the lumberjacks, ranchers, and factory-workers, whereupon we shall repurpose Liechtensteiner wealth into rebuilding the working class, de-Christianizing their trade unions, and turning corporatism into unionism."
LIC_fields_to_factories:0 "Fields to Factories"
LIC_fields_to_factories_desc:0 "Vaduz-Schellenberg is far too agrarian! Our occupation has destroyed the livelihoods of many thousands of Vaduz-Schellenbergers. We shall not re-sow their fields and give to them chernozem from the East, but we shall return their livelihoods to a new beating industrial heart. Liechtensteiner companies will be propped up and shall employ many thousands."
LIC_ultimate_fate:0 "Our Ultimate Fate"
LIC_ultimate_fate_desc:0 "Is Vaduz-Schellenberg a thing that can possibly be extant? Should such a small country even exist? It has similar sensibilities and a mind like Switzerland or Austria. We will have the option to choose our future: as Vaduz-Schellenberg, or simply as a new territory of Switzerland or Austria that couldn't survive without the firm hand of the Princes."
LIC_assistance_from_home:0 "Staff a Loyal Landespolizei"
LIC_assistance_from_home_desc:0 "The old must be swept out. Because Vaduz-Schellenberg is so small, there are not many recruits for a new police force, and alternatives must be sourced. The stay of occupying powers must be extended, if only to serve a coterminous role with a new Landespolizei. Those loyal to the Prince must go, and a revolutionary new constabulary will come in its place."
LIC_new_spartacists:0 "The Littlest Commune"
LIC_new_spartacists_desc:0 "Our work is done! Liechtenstein is no more. Vaduz-Schellenberg stands free and liberated in its place. Syndicalism has taken root and the people shall now true liberation at last. Vaduz-Schellenberg shall be the world's smallest commune, and has avoided the unfortunate fate of Monaco, San Marino, and Andorra! Now it is time to look to the future and join the ranks of the Internationale."
LIC_fate_of_monarchy:0 "Liechtenstein With... or Without Liechtensteins?"
LIC_fate_of_monarchy_desc:0 "Our duties have been fulfilled. The Russians have rebuilt Vaduz-Schellenberg and put it on the right track. Now the question remains: Should Vaduz-Schellenberg remain the country's name, or might it be possible to persuade the Princes to return? Franz I of Liechtenstein was Austria's ambassador to Russia at a point. We will decide if Liechtenstein shall return of if Vaduz-Schellenberg needs a new ruler."

#Decisions

BOTDE_LIC_decisions:0 "The Principality of Liechtenstein"
BOTDE_LIC_decisions_exile:0 "The Principality-in-Exile"
LIC_playing_60_seconds_speedrun:0 "The National Stockpile"
LIC_playing_60_seconds_speedrun_desc:0 "During the Weltkrieg, Liechtenstein struggled with the vice of famine around its throat. The idea that a neutral nation would nearly be starved out because of its association with Austria has never left the Liechtensteiners' minds. With war again on the horizon, the government knows that this time it must be ready.\nIn order to protect the livelihood of the nation, a stockpiling programme has been enacted to prepare the nearly forty thousand citizens of Liechtenstein for a potential disaster at the most essential level of life.\n§RNote!!§! The government §Ydoes not need§! to be 100% ready. It must only be at most ready for what happens around us; for example, a bad crisis in Switzerland may be harmful if we are not adequately prepared, although if that never happens in the first place, we need not be prepared in the slightest.\n\n§YClick resource buttons for small temporary resources.§!\n\nThe government has [?LIC.govt_readiness|%+] percentage of goods stockpiled to overcome any threats.\nWeekly stockpile change is [?LIC.weekly_readiness|%+].\nFamine level is [?LIC.famine_value|%R].\nMaximum famine level is [?LIC.govt_readiness_neg_max|%R]."



BOTDE_SRI_LANKA_LOBBY:0 "On the Matter of Ceylon"
BOTDE_SRI_LANKA_LOBBY_desc:0 "With Black Monday having shattered the pre-eminent world power's economic might, some of its overseas assets are liabilities, or, even better, able to be taken advantage of.\nOne such example is the island of Ceylon, under German control for a long few years. Germany now desperately needs money, and one obvious contender, one colony, and one oddball has come out to duke it financially over the fate of Ceylon.\nLobbyists from the incredibly rich Indian princes in the south come to Ceylon to build a network, intent on making Ceylon the first step in Indian unification.\nHundreds of kilometers away, out of the Indian subcontinent and on snowy mountaintops rising high over a river, lies a European royal house. The Princely House of Liechtenstein, south of the Kaiserreich, sends surveyors and investors to scope out Ceylon for their Prince and Fatherland in an ever-mystifying ambition.\nBut not all of Imperial Germany wishes to relinquish its hold on its stronghold on the Indian Ocean. German East Asia, too, has sent fleets of men and money to Ceylon to turn it over from direct rule to governorshop under the German eastern pearl.\nCeylon is now a financial battleground, and only one side may come out on top.\n\nThe [PRF.GetFlag] §OPrincely Federation§! has [?PRF.CEYLON_INFLEUNCE|Y0] influence in §GCeylon§!.\nThe [LIC.GetFlag] §CPrincipality of Liechtenstein§! has [?LIC.CEYLON_INFLEUNCE|Y0] influence in §GCeylon§!.\nThe [GEA.GetFlag] §LColony of Deutsch-Ostasien§! has [?GEA.CEYLON_INFLEUNCE|Y0] influence in §GCeylon§!.\nThe [GER.GetFlag] §gGerman Empire§! supports [GEA.GetFlag] §LDeutsch-Ostasien§! in its endeavours.\n\nFor §GCeylon§! to be in one's hands, certainly, one must have §Y20§! points of influence, and §Y5§! over the competitor.\n\nA nation under the jackboot of Europeans does not like to stay under the oppression of the boot. Ceylonese separatists grow stronger with the infighting of Europeans, and time can only tell until an armed Ceylonese uprising kicks out all of us.\n\n§GCeylon§! is [?CEY.IndependenceLevel|%R0] towards declaring independence."

LIC_POST_PURCHASE_CEYLON:0 "Princely Ceylon"
LIC_POST_PURCHASE_CEYLON_desc:0 "After much strife, Ceylon has been successfully purchased from Germany! With its acquisition comes ambition and questions, though - many of which we did not foresee or spend the time to look for.\n\nWhat will become of Ceylon? Shall it be directly ruled from Vaduz, or shall we prop up a government much like the British Raj; a Liechtensteiner Raj in Ceylon?\nBut the most illusive elephant in the room breathes right down our necks - what of Ceylonese separatists? Predictably, they are not thrilled about our acquisition: a far-away, incredibly small, foriegn nation has seized land many times its size. We must quash the separatists first, lest they truly fulfill their goals, and adapt Ceylon to their new masters.\n\n§GCeylon§! is [?CEY.IndependenceLevel|%R0] towards declaring independence."


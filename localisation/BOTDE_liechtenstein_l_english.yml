LIC_alpine_customs_union_decision:0 "Propose an Alpine Customs Union"
LIC_protector_of_micronations_base:0 "Assert the Sovereign Rights of [LIC.MicronationName]"
LIC_protector_of_micronations_new_protectorate:0 "Form a Schwesterstaat in [FROM.GetName]"
LIC_railgun_development:0 "Railgun Development"
LIC_railgun_development_desc:0 "Our electric rail cannons prove effective on the battlefield! Unfortunately, they are extremely unreliable, unwieldy, and expensive. Perhaps with some tweaking and outside assistance we can develop our railcannons into something more appropriate for our armies."
LIC_give_schwesterstaat_manpower:0 "Transfer Manpower to [FROM.owner.GetNameDEF] [FROM.owner.GetFlag]"
LIC_give_schwesterstaat_manpower_desc:0 "To ensure we can use our Schwesterstaats as bases of operation, we will send them manpower to help deploy troops on their land.\n\nUse colonial templates for the Schwesterstaats! The idea is you should be able to deploy them anywhere you like and have great mobility and reach, despite Liechtenstein's small size."
LIC_schwesterstaat_upgrade:0 "Develop [FROM.GetName]"
LIC_schwesterstaat_upgrade_desc:0 "It is improbably that we leave our newer territories to languish, even if far-flung; money is a universal language with no constraints on its voice. We shall use the lessons we've learned in Black Monday and the industrialisation of Liechtenstein to effect the development of our Schwesterstaats."
LIC_IM_PLAYING_MOEREDUX_AND_I_WANT_TO_LARP:0 "I'm Playing Moeredux and I want to LARP"
LIC_IM_PLAYING_MOEREDUX_AND_I_WANT_TO_LARP_desc:0 "This is the way Anzio fights!"
please_use_this_only_if_using_moeredux:0 "Switches the Schwesterschule's leader portrait to our most exalted, esteemed, restorer of Anzio, excellent, and glorious Duce. Comes with no tanks. This looks odd if you're not playing Moeredux!\n§gClick this decision again to swap the portrait variant.§!"
LIC_schwesterstaat_sevastopol_resorts:0 "Transform §YSevastopol§! into a Resort City"
LIC_schwesterstaat_constantinople_hagia_sophia:0 "Restore the Hagia Sophia to a Monastery in §YConstantinople§!"
LIC_schwesterstaat_andorra_ski_lodges_thermal_waters:0 "Construct Ski and Thermal Water Lodges in §YAndorra§!"
LIC_schwesterstaat_delhi_adopting_parade_animals:0 "Acquiring New Parade Animals in §YDelhi§!"
LIC_schwesterstaat_chinese_legation_banking_ties:0 "Forging Legationary Banking Ties in §Y[FROM.GetName]§!"
LIC_schwesterstaat_tianjin_foreign_quarter:0 "Guaranteeing the Foreigners the §YTianjin§! Concessions"
LIC_schwesterstaat_baku_oil_field:0 "Princes of §YBaku's§! Black Gold"
LIC_schwesterstaat_san_marino_noble_patronage:0 "Entrench in the §YSan Marino§! Elite"
LIC_schwesterstaat_singapore_dockyards:0 "Improving the §YSingapur§! Naval Facilities"
LIC_schwesterstaat_vienna_austerity_measures:0 "Austerity Measures in §YVienna§!"
LIC_schwesterstaat_prague_new_castles:0 "Sponsor Architectural Magnificence in §YPrague§!"
LIC_schwesterstaat_kiev_bread_deals:0 "Supplying Bread to §YKiev§! & Other Holdings"

LIC_university_of_liechtenstein_decision:0 "Found a National University of Liechtenstein"
LIC_university_of_liechtenstein_decision_desc:0 "Liechtenstein has no extant universities. That will change! A university that can support all Liechtenstein will be open, raising our intellect and awareness alike. Liechtenstein can yet become a more educated nation. With government assistance, we shall set up a national university."
LIC_emerge_from_isolation:0 "Emerge from Isolation"
LIC_emerge_from_isolation_desc:0 "The Anschlussputsch and deposition of the Prince has diplomatically isolated Liechtenstein. We should attempt to restore our position on the world stage and have all recognize the new government!"
LIC_undo_austrian_embargo:0 "Shatter the Austrian Irons"
LIC_undo_austrian_embargo_desc:0 "As a result of our diplomatic shift Austria has put some diplomatic pressure on us. Now their eyes are elsewhere; let us escape!"
LIC_teleport_russo_capital:0 "Entrain to [RUS.capital.GetName]"
LIC_teleport_home:0 "Return Home to Liechtenstein"
LIC_integrate_botde_land:0 "Integrate [FROM.GetName]"
LIC_integrate_botde_land_BOTDE:0 "Integrate [FROM.GetName]"
LIC_holding_expansion:0 "Property Reform"
LIC_holding_expansion_desc:0 "We shall reform the Liechtensteiner properties to be more involved in their communities and give to both the House and their local towns. Tourism, investments, development- what can't we do? As we reform, these properties will become more valuable."
LIC_investments_in_rietberg:0 "Counts of Rietberg"
LIC_investments_in_rietberg_desc:0 "Despite not owning the town at all, the house of Liechtenstein holds the title 'Count of Rietberg.' Now that we are close allies with Germany, we will invest in the whole region, particularly Rietberg."
LIC_bunker_mission:0 "The Princely Bastions"
LIC_bunker_mission_desc:0 "With an unsafe international situation, we should take steps to defend ourselves should it come to war. We will take inspiration from the White War decades ago and the Swiss plan of national redoubts. Using these ideas, we might put our economy to work constructing fortifications that would serve our people in the future, intended for use by ourselves or our allies."
LIC_repurpose_stockpile:0 "Repurpose the National Stockpile"
LIC_repurpose_stockpile_desc:0 "Stockpiles are not just necessities. We will need rifles and materiel to defend ourselves. We shall put up a commission to add securing building materials to the national stockpile, and set it towards the construction of these bunkers around the country."
LIC_reach_out_to_our_ally:0 "Ask for Assistance"
LIC_reach_out_to_our_ally_desc:0 "By cementing closer ties with other powers, we might be able to call on their industrial and military expertise to assist us in constructing our fortifications. We could expect to see their workshops appropriated for our cause for the duration of the program."
LIC_autarky_Decision:0 "Institute Autarkic Directives"
LIC_autarky_Decision_desc:0 "We will use our newly acquired territory to self-sustain our own people and build our image. By wisely governing these new lands we shall be able to clear up our ailing situation."

LIC_restore_austria_hungary:0 "Restore the Habsburg Monarchy"
LIC_restore_austria_hungary_desc:0 "We have fulfilled our promise and retaken Austria proper. It is time to restore Austria to its rightful owners."
LIC_feed_AH:0 "Return Habsburg Territories to [AUS.GetNameDef]"
LIC_feed_AH_desc:0 "We have come into possession of former Habsburg territories. We will return them to the government in Vienna."
LIC_schwesterstaat_destroy_AH:0 "Reincorporate the Schwesterstaat in [FROM.GetName]"
LIC_schwesterstaat_destroy_AH_desc:0 "We will reintegrate a Schwesterstaat into Austria, because it is their rightful land. The government and its proceedings will flow better, and we will show our goodwill."

LIC_adhere_to_customs_union:0 "Adhere to the Zollverein"
LIC_adhere_to_customs_union_desc:0 "We will adhere to the terms of the current customs union, and reaffirm our loyalty to it. Foodstuffs, machinery, and finance will flow easily both ways without question."
LIC_currency_act:0 "Pass the Währungsgesetz" #Currency act; switch to Swiss franc
LIC_ask_for_austrian_assistance:0 "Request Austrian Bailout"
LIC_ask_for_austrian_assistance_desc:0 "Austria is undoubtedly strugglingg in the throes of Black Monday, but they certainly must have enough to assist their loyal friends in Liechtenstein. We will request the Viennese firms for a bailout, focusing on the state of the Liechtenstein bank as to be extra persuasive."
LIC_ask_for_swiss_assistance:0 "Ask for Swiss Assistance"
LIC_ask_for_swiss_assistance_desc:0 "The Swiss are also adversely affected by Black Monday, but they might be interested in ties with our nation. We will promise investments that shall surely return and use the money towards ameliorating our situation."
LIC_noble_duties_in_austria:0 "Noble Duties in Austria"
LIC_noble_duties_in_austria_desc:0 "Haus Liechtenstein is one of Austria's most loyal houses. We have been their generals, their ambassadors, and their devoted servants. Haus Liechtenstein owns a variety of properties all across Austria and Bohemia, and we will participate as we should in the high society of Austria."
LIC_swiss_state_meetings:0 "Swiss State Meetings"
LIC_swiss_state_meetings_desc:0 "The Prime Minister and the government shall meet with Swiss politicians and discuss a manner of topics; foreign affairs, economic affairs, and we shall take home inspiration on how the Swiss run their country."
LIC_tax_code_change:0 "Adapt East Swiss Cantonal Tax Codes"
LIC_tax_code_change_desc:0 "Liechtenstein will change its tax laws to follow after Julius Landmann, so 'letterbox companies' are exempt from income tax and must only pay a minimum capital tax. Hopefully we can attract financial activity and have the princely banks manage these funds, transforming us into a respectable financial state."
LIC_personen_und_gesellschaftsrecht:0 "Pass the Personen- und Gesellschaftsrecht"
LIC_personen_und_gesellschaftsrecht_desc:0 "To progress with the detaching from Austria, we will pass a new and more liberal civil law about business trusteeship, trust funds, and personal finances. The groundwork for a special commercial community shall be laid."


LIC_stock_food:0 "Stock Food Reserves"
LIC_stock_food_desc:0 "Grains, lumber, and meats all can be stocked and stored! We shall implement rationing and encourage people to prepare for the coming war. Hunger is the true killer of all fellowships, and we must make sure to prevent that infernal black horse to drag his hooves across our land."
LIC_negotiations_foreign:0 "Negotiations with Foreign Governments"
LIC_negotiations_foreign_desc:0 "The reason for Liechtenstein's crisis in the Weltkrieg was its association with Austria and the Entente at its doorstep. Next time we will be more careful: we shall negotiate, perhaps engage in a little intrigue, and travel around Europe to ensure we can maintain readiness and food access even during crisis. We must keep prices down and confidence high!"
LIC_princely_focus:0 "Involve Haus Liechtenstein"
LIC_princely_focus_desc:0 "The government will petition to the Princes about the dire situation and directly cooperate with the royal apparatus to get updates, coordinate, and prepare the principality for sudden material crises."
LIC_foreign_currency:0 "Acquire Foreign Currency Reserves from [FROM.owner.GetNameWithFlag]"
LIC_foreign_currency_desc:0 "Perhaps foreign currency might have a more valuable share in our market should things go astray. By acquiring foreign reserves, we will have extra cushions of money to fall back on when the goings go asunder."
LIC_leverage_properties:0 "Leverage Liechtensteiner Properties"
LIC_leverage_properties_desc:0 "We will leverage income from Liechtensteiner holdings and investments directly owned by the House to promote government readiness and wellness in the Principality of Liechtenstein."
LIC_unleverage:0 "Reduce Funding from Princely Properties"
LIC_unleverage_desc:0 "We shall stem the flow of these investments, so the Princes may turn it back to macromanaging the country entire."
LIC_welfares:0 "Cost-Saving Programmes"
LIC_welfares_desc:0 "We can enlist our allies to help shore up some of the leakage from the national stockpile. It will be small quantities of aid, but it will help nonetheeless."
LIC_international_aid:0 "Call for International Aid"
LIC_international_aid_desc:0 "No good European country would let another starve. We will ask the nations of Europe for assistance and garner sympathy to earn some foodstuffs. These supplies may not be enough to fully fix things, but it will be a serious help."
LIC_fucking_grovel:0 "Plead for Aid"
LIC_fucking_grovel_desc:0 "Our government is stuck in a death loop. We must put down any pretenses of having our country under control and simply beg for help."
LIC_shadow_empire_allocation:0 "Sell off Extraterritorial Entities"
LIC_shadow_empire_allocation_desc:0 "Our adventuring in foreign lands have brought us investments and associated businesses. We shall sell these off for the benefit of the state, at a cost of some future income."
LIC_quota_mission:0 "[?LIC.GetQuotaYear] National Stockpile Quota"
LIC_quota_mission_desc:0 "In order to drive employment and prepare our government for any eventualities in our volatile international clime, Vaduz has instituted a program of stockpiling and preparedness. Every year, we should like to have a certain tonnage of supplies at hand.\nThese stockpiles won't matter if the international scene remains peaceful, but failing our quotas will look irresponsible and reflect poorly. In addition, these quotas account for situations such as Austria's collapse or a crisis in Haute-Savoie."
LIC_quota_tt:0 "Our stockpile is [?LIC.quota_value|Y%] full."
LIC_quota_success_tt:0 "§GWe have reached the year's stockpile quota! The government will be pleased.§!"
LIC_quota_fail_tt:0 "§RWe have not yet reached the year's stockpile quota. If we fail to do so, we will suffer some negative effects.§!"
LIC_big_shot:0 "§GOur gains in this year have been impressive! A boon shall come of this.§!"
LIC_welfares_tt:0 "Weekly quota change is less than or equal to §Y-0.5%.§!"
LIC_quota_build_slot:0 "Repurpose Stockpile Material to Commerce"
LIC_quota_factory_civ:0 "Repurpose Stockpile Material to Civilian Industry"
LIC_quota_factory_mil:0 "Repurpose Stockpile Material to Military Industry"
LIC_quota_civil_service:0 "Repurpose Stockpile Material to Civil Services"
LIC_60s_AUS_SWI_helper:0 "Aiding the Liechtensteiner Populace"
LIC_60s_AUS_SWI_helper_desc:0 "During the Weltkrieg, [LIC.GetNameDef] faced a dire famine due to its close relationship with the Austrian Empire and resulting Entente sanctions. With tensions in Europe rising day by day, the [LIC.GetAdjective] government has sought to prepare for another famine. Fortunately, this gives us some unusual opportunities to push them away from the very same factors that caused that famine in the Weltkrieg."
LIC_AUS_SWI_aid_decision_start:0 "Aid Liechtenstein's Stockpile Program"
LIC_AUS_SWI_aid_decision_start_desc:0 "The Principality of Liechtenstein is divided on what path its future should take. By sending them aid we can win the hearts and minds of the common populace to our cause, netting potentially lucrative benefits later down the line."
LIC_AUS_SWI_influence:0 "Influence Liechtenstein"
LIC_AUS_SWI_influence_desc:0 "Liechtenstein is diplomatically divided and ripe for a change of the sphere of influence. To keep the principality on our side we should meet with its Prince and show a vested interest in their future."
LIC_swabia_decision:0 "Restore the Swabian Circle"
LIC_austria_decision:0 "Assert Sovereignty over Austria"
LIC_south_german_soviet_decision:0 "South German Soviet"
LIC_south_german_soviet_decision_desc:0 "We have somehow achieved sovereignty over Bavaria. We will call back Spartacist history and establish a soviet republic here, albeit under the established rules of the Commune of Vaduz-Schellenberg."
LIC_giga_south_german_soviet_decision:0 "Assert Governance over Greater South Germany"
LIC_govern_BAY:0 "Govern South Germany"
LIC_expand_south_german_land:0 "Expand our Occupation into [FROM.GetName]"
LIC_swiss_decision:0 "Unify with Switzerland"
LIC_swiss_decision_desc:0 "We have come into possession of the entire Swiss heartland. Hereby we shall claim the title 'Liechtenstein-Switzerland', paving the way for further unification between our two countries."
LIC_this_isnt_fucking_europa_universalis_raise_rank_duchy:0 "Crown [LIC.GetLeader] Duke"
LIC_this_isnt_fucking_europa_universalis_raise_rank_kdm:0 "Crown [LIC.GetLeader] King"
LIC_restore_pope:0 "Restore the Papacy to Rome!"
LIC_pope_capital_change:0 "Switch the Capital"
LIC_alpine_fed:0 "Decree an Alpine State"
LIC_restore_the_aryans:0 "Restore the Aryans to their Natural Home"
LIC_core_austria:0 "Restore the Aryans to the Mongrelized-Slavicized Heart"
LIC_attack_germany:0 "Attack [GER.GetNameWithFlag]"
LIC_attack_austria:0 "Attack [AUS.GetNameWithFlag]"
LIC_illegitimate_govt_russia:0 "Eliminate the Illegitimate St. Petersburg Government"
LIC_restore_russian_empire:0 "Restore the Rightful Tsardom"
LIC_legation_decision_if_tt:0 "If §YAid Reconstruction in Western Europe§! §CAND§! §YRight by Might and Write§! have been completed:"
LIC_request_legation_entry:0 "Forging a Seat on the Legation Council"
LIC_request_legation_entry_desc:0 "Liechtenstein's industrialisation has provided it with an export economy that has so far paid great dividents into the principality at home. To better manage the royal banking and provide a platform for international commerce, we will petition the global power, Germany, to leverage some of its influence to fetch us a seat on the Legation Council."

LIC_discredit_separatists_post_ceylon:0 "Campaigns against Revolutionaries"
LIC_introduce_landezpolizei_contingent:0 "Introduce a Landespolizei Contingent"
LIC_form_the_LIC_raj:0 "Form the Liechtensteiner Raj"
LIC_direct_rule_from_vaduz:0 "Direct Rule from Vaduz"
LIC_mercenaries_add:0 "Hire Mercenaries"
LIC_mercenaries_add_desc:0 "With some money we might be able to implement ad-hoc mercenary fighting forces. This is ludicrously expensive, but we might be able to make a military yet."
LIC_mercenaries_remove:0 "Terminate Mercenary Contracts"
LIC_mercenaries_remove_desc:0 "Times of peace do not call for armed forces to exist. We shall terminate mercenary programs and halt the flow of men into the country."

LIC_occupation_govt_cat:0 "Matters of the Occupation Government"
LIC_occupation_govt_cat_desc:0 "Liechtenstein is no more. In its place is a more tangible construction, that of Vaduz-Schellenberg, which is the natural continuity of former Liechtenstein. Without a Prince, the greatest identity of the former principality, what can we be?"
LIC_unlock_decision_state:0 "If we choose for Liechtenstein to pursue an independent path:\n    Unlocks Decisions:§Y £decision_icon_small Request Transfer of Vorarlberg/Tyrol§!"
LIC_request_FROM:0 "Request Transfer of [FROM.GetName]"

LIC_schwesterstaat_category:0 "Policies in the Schwesterstaats"


LIC_SWI_went_to_war:0 "Switzerland has betrayed itself"
LIC_alone:0 "Liechtenstein stands alone"

LIC_aggressive_tt:0 "§YThe Swiss have made a mistake§!"
LIC_unlocks_new_options:0 "§GThis will unlock new options against Ceylonese separatists.§!\nSpawns a Landespolizei division in Colombo"
LIC_new_decisions:0 "§YNew decisions relating to pacifying Ceylon will be unlocked§!"
LIC_retake_empire:0 "§YUnlocks a variety of decisions to retake the Habsburg Empire.§!"
LIC_restores_states:0 "§GRestores occupied Habsburg states to the Monarchy.§!"
more_guns_if_loyal:0 "§YReceive more weapons if in the §CSwiss Ties§! or §CHabsburg Loyalty§! range.§!"
more_planes_if_loyal:0 "§YReceive more and better aircraft if in the §CSwiss Ties§! or §CHabsburg Loyalty§! range.§!"
LIC_free_template:0 "§GReceive a free division template.§!"
LIC_buff_navy_focus:0 "§GImproves the bonuses of §CLandlocked No More.§!§!"
AE_35_civ_2:0 "£air_experience §Y35§! £civ_factory §Y3§!"
AE_35_civ_2_blocked:0 "£air_experience §R35§! £civ_factory §R3§!"
LIC_HH_cost_tt:0 "£LIC_texticon §Y2§!"

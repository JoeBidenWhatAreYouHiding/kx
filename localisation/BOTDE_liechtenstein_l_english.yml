LIC_totalist_party:0 "SE"
LIC_totalist_party_long:0 "Spartakistisches Exil\n§LSpartacist Exiles§!\n§gThe revolutionary terror that sprang up in the late 20s and early 30s has not disappeared. When Germany put down the Spartacists with brutal efficiency, some of the laymen who escaped settled in Liechtenstein to foment revolutionary activity during the oh-so-beloathed Strikes. They have no official party organs and mostly operate behind the scenes, but the Landespolizei keep tabs on notable socialists and tapping has revealed some to have active communiques with the Communard government. Nevertheless, these die-hard Socialists are extremely few and are persecuted as best as possible.§!"
LIC_syndicalist_party:0 "LAV"
LIC_syndicalist_party_long:0 "Liechtensteiner Arbeiterverband\n§LLiechtenstein Workers' Association§!\n§gThe primary trade union of Liechtenstein, the Strikes in the early 30s was led by violent elements in the soon-to-be LAV and UEK. The organizations that blossomed in these uncertain times have since mellowed out, with suppression and time having melded the LAV into a pseudo-party of its own, heavily attached to the UEK, comprising socialist workers and progressive elements. Having entirely sworn off revolution and violence, the LAV continues to swear loyalty to the Prince and is not the threat of revolution it used to be.§!"
LIC_radical_socialist_party:0 "UEK"
LIC_radical_socialist_party_long:0 "Partei der Unselbständig Erwerbenden und Kleinbauern\n§LWorkers' and Peasants' Party§!\n§gThe first true political party of Liechtenstein, the UEK was founded in 1930 as a platform to voice the ailings of workers and espouse revolutionary content. However, strikebreaking actions and clashes forced cooler heads to prevail, with Gustav Schaedler's leadership steering unruly strikers into acceptance and compromise. The UEK, like the LAV, is completely non-revolutionary. Quick reactions from the FBP and VU prevented the UEK from making significant political gains early in the decade, but future events could change that.§!"
LIC_social_democrat_party:0 "UEK"
LIC_social_democrat_party_long:0 "Partei der Unselbständig Erwerbenden und Kleinbauern\n§LWorkers' and Peasants' Party§!\n§gThe first true political party of Liechtenstein, the UEK was founded in 1930 as a platform to voice the ailings of workers and espouse revolutionary content. However, strikebreaking actions and clashes forced cooler heads to prevail, with Gustav Schaedler's leadership steering unruly strikers into acceptance and compromise. The UEK, like the LAV, is completely non-revolutionary. Quick reactions from the FBP and VU prevented the UEK from making significant political gains early in the decade, but future events could change that.§!"
LIC_social_liberal_party:0 "VP"
LIC_social_liberal_party_long:0 "Volkspartei\n§LPeople's Party§!\n§gThe Christian Social People's Party, or the Volkspartei, found itself as a reaction to Austrian struggles in the Weltkrieg and subsequent reformist zeitgeist. Thus, the VU takes on a characteristic less caring of the monarchy, uncaring of the Church, and finding itself attracted to the liberal ideas of Kalergi and Redlich. Since the founding of Liechtenstein's political parties, the VU has consistently lagged behind the FBP.§!"
LIC_market_liberal_party:0 "VP"
LIC_market_liberal_party_long:0 "Volkspartei\n§LPeople's Party§!\n§gThe Christian Social People's Party, or the Volkspartei, found itself as a reaction to Austrian struggles in the Weltkrieg and subsequent reformist zeitgeist. Thus, the VU takes on a characteristic less caring of the monarchy, uncaring of the Church, and finding itself attracted to the liberal ideas of Kalergi and Redlich. Since the founding of Liechtenstein's political parties, the VU has consistently lagged behind the FBP.§!"
LIC_social_conservative_party:0 "FBP"
LIC_social_conservative_party_long:0 "Fortschrittliche Bürgerpartei in Liechtenstein\n§LProgressive Citizens' Party in Liechtenstein§!\n§gJust like the VU, the FBP was founded as a consequence of universal voting and to oppose the organizing Volkspartei. At the root of it all lay a desire to oppose revolutionary sentiment from the UEK, which had organized and instigated with the LAV the Trans-Alpine Strikes in Liechtenstein. The FBP, thus, happens to be the party of 'everyone else' who doesn't care for liberal freedom policies, corporatism, or socialist policies. Josef Hoop has molded the party into what it is today. The FBP is staunchly loyal to the Prince and the extant order with Austria.§!"
LIC_authoritarian_democrat_party:0 "FBP"
LIC_authoritarian_democrat_party_long:0 "Fortschrittliche Bürgerpartei in Liechtenstein\n§LProgressive Citizens' Party in Liechtenstein§!\n§gJust like the VU, the FBP was founded as a consequence of universal voting and to oppose the organizing Volkspartei. At the root of it all lay a desire to oppose revolutionary sentiment from the UEK, which had organized and instigated with the LAV the Trans-Alpine Strikes in Liechtenstein. The FBP, thus, happens to be the party of 'everyone else' who doesn't care for liberal freedom policies, corporatism, or socialist policies. Josef Hoop has molded the party into what it is today. The FBP is staunchly loyal to the Prince and the extant order with Austria.§!"
LIC_paternal_autocrat_party:0 "LHD"
LIC_paternal_autocrat_party_long:0 "Liechtensteiner Heimatdienst\n§LLiechtenstein Homeland Service§!\n§gJust as Engelbert Dollfuss's ideas gained traction, so did those ideas spread. In agrarian Liechtenstein, scarred by the Trans-Alpine Strikes, these ideas found fertile soil. The plant that sprouted in 1933 was the Liechtensteiner Heimatdienst, or the Liechtenstein Home Service, which as of 1936 holds three seats in the Landtag. It frequently works with the Christian Social People's Party, or the Volkspartei (VU), seeking to overturn the FBP's majority.§!"
LIC_national_populist_party:0 "LHD"
LIC_national_populist_party_long:0 "Liechtensteiner Heimatdienst\n§LLiechtenstein Homeland Service§!\n§gJust as Engelbert Dollfuss's ideas gained traction, so did those ideas spread. In agrarian Liechtenstein, scarred by the Trans-Alpine Strikes, these ideas found fertile soil. The plant that sprouted in 1933 was the Liechtensteiner Heimatdienst, or the Liechtenstein Home Service, which as of 1936 holds three seats in the Landtag. It frequently works with the Christian Social People's Party, or the Volkspartei (VU), seeking to overturn the FBP's majority.§!"


lic.1.t:0 "The Principality of Liechtenstein, circa 1936"
lic.1.d:0 "Neutral since 1868, following the dissolution of the German Confederation, Liechtenstein has stayed in its state of permanent, respected neutrality, lasting through the Weltkrieg and maintaining to today.\nOne of Europe's smallest extant nations, with a western border entirely dictated by the young Rhine, Liechtenstein's eleven thousand strong population maintains an agricultural, rural lifestyle, much like other Alpine areas. Recently, though, with the coronation of Franz I and at the encouragement of Franz Joseph II, Liechtenstein has been rapidly industrialising in recent years, and while Liechtensteiner industry is still in its infancy, the vast, rich, prosperous properties of the ruling House of Liechtenstein, from which our little principality takes its name, has been playing a large role in the expansion and construction of new factories.\nThe goods exported from these youthful assembly lines usually go to Austria, as per the 1852 Customs Treaty. However, the rising flames that lick the world ever closer frighten our quaint nation. Some feel as if Austria will get pulled into the war, and if Swiss neutrality is disrespected, which some feel may very well happen, then Liechtenstein may be in mortal danger. Thus the customs union with Austria has experienced a decline since 1921, as traders seek routes into Switzerland, for Swiss markets.\nThe Alpine region as a whole was brought to its knees in 1930, after a strike in Italy protesting Habsburg occupation some time after the end of the Italian Civil War burned out of control, spreading fervor to Switzerland, Austria, what is now Illyria, and even little Liechtenstein. The trade union movement that Syndicalism spearheaded has given the LAV, or Liechtensteiner Arbeiterverband, a somewhat large portion of economic policy inside the Landtag. However, the LAV, uniquely, does not see the King as an obstacle, but rather a potential ally.\nThe rise of Lanz von Liebenfels and the ANI has brought similar far-right waves to Liechtenstein, empowering the LHD, or Liechtensteiner Heimatdienst, which formed in 1930, headed by Otto Schaedler.\nPrime Minister Josef Hoop, the reigning prime minister since 1928, has kept Liechtenstein in a status quo, but time and our neighbors care not for us, and Hoop's status quo is threatened from outside. The Trans-Alpine Strikes, as they are known, has pushed first and foremost the lack of social security, now a focal point of the new UEK and LAV, and the unemployment that strangles common Liechtensteiners. The House has been combatting these issues, with public works projects taking place along rapid industrialization, paid for by the Princes themselves.\nToday, in 1936, Liechtenstein could be called the most well-off nation in its immediate region, but as history has shown time and time again, we should be prepared for unforeseen consequences."
lic.1.a:0 "Für Gott, Fürst und Vaterland!"

lic.2.t:0 "Black Monday Striketh!"
lic.2.d:0 "Disaster strikes the eleven thousand of Liechtenstein! As our economy bears heavy ties to Vienna, and therefore Berlin by association, the recent details of the great Berlin Stock Market Crash, or Black Monday, as it is known simply, has not spared neutral little Liechtenstein! Switzerland has suffered a heavy hit too, and with ties to Austria being already in the question, the question has sprung again: "Should Liechtenstein pursue Swiss ties?" While Franz I had reinvigorated the ages-old customs union between Vaduz and Vienna, the crash has reportedly the whole of the princely house questioning the resolve of the customs agreement.\nAs for immediate actions, Franz Joseph II, heir to the principality, has begun public works initiatives: canals, roads, schools, new buildings, investitures. It is thanks to him that Black Monday has not grinded Liechtenstein to a halt, and while employment suffered a large thwack on the head, Franz Joseph II has ensured that his initiatives will keep the economic downturn as a minor footnote in Liechtensteiner history. While others struggle for survival, Liechtenstein and Prince shall prevail!"
lic.2.a:0 "What shall happen to princely fortunes?!"

lic.3.t:0 "Death of Franz I"
lic.3.d:0 "Reports from Austria and Bohemian castles housing Liechtensteiner royalty have only confirmed the rumors: Franz I, Prince of Liechtenstein, has passed away today, in his sleep, at age 84 in Castle Feldberg. He died peacefully in his sleep of natural causes. Kaiser Karl I of Austria has already expressed his condolences, as has Maximilian Lobkowicz of Bohemia. The body has been put in a coffin, and a symbolic funeral parade has taken its route throughout a nationwide drive of Liechtenstein, as 'Oben am jungen Rhein' plays from a somber brass. As for Franz I's deceased body, it has been laid to rest in the Church of the Nativity of the Virgin Mary in Brno.\n Franz Joseph II, heir to the throne, has taken leadership over the House of Liechtenstein, and in a historic event of Liechtensteiners, has moved into Castle Liechtenstein in Vaduz, declaring it his home. This marks the first time a Liechtensteiner prince has actually lived in Liechtenstein, further solidifying Franz Joseph II's massive popularity in Liechtenstein."
lic.3.a:0 "Hail to thee, Franz Joseph II!"

lic.4.t:0 "A Convenient Count"
lic.4.d:0 "With economic plight comes political adversity. The Berlin Stock Market Crash has proved just that, all around the world, and Liechtenstein is no exception to this. Fortunately for us, a general election was slated for February, and both rounds of the election have come to a close.\nJosef Hoop has ruled Liechtenstein as Prime Minister since 1928, and has led Liechtenstein's economy up - but with Black Monday, some blame the failure on him and his inability to switch to Swiss markets.\nThe VU, a recent amalgam of the LHD and the VP, created to contest Hoop and the UEK, is notably pro-Swiss in its economic policy. Always the underdog in elections, Black Monday may provide the VU with the momentum it needs to finally own the Landtag.\nThe UEK was formed during the height of the Trans-Alpine Strikes, and the timing has been a principal contributor of the UEK's current political successes. Offering a new program with economic recovery as its highest priority, some see the UEK as the beginning of something new."
lic.4.a:0 "The FBP continues Hoop's reign!"
lic.4.b:0 "The VU's coalition overpowers!"
lic.4.c:0 "The new UEK strikes its first win!"

lic.5.t:0 "Formation of the Vaterländische Union"
lic.5.d:0 "Seeking to push past Hoop's steel grip over Liechtensteiner hearts, the Christian-Social party, or Volkspartei, and the Liechtenstein Heimatdienst have declared a merger. Seemingly ideologically opposed, the party leaders have agreed on electoral reform and curtailing of extremist tendency such as the VDBL and revolutionary sympathy of the utmost importance. Figures from the Liechtensteiner Heimatdienst dominate the upper positions of party rule, and Otto Schaedler has been placed as chairman of the new political force. \n\nAmong its primary policy is termination of the Austro-Liechtensteiner Customs Union and advancements of the Swiss relationship, along with a new Swiss customs union, and with that reorienting the Landesbank to the Swiss National Bank.\n\nInspired heavily by Engelbert Dollfuß and the Swiss Frontenbewegung, the VU espouses Catholic and corporatist ideals, although with the influence of the former VP, that open prostration has been rather muted. In exchange, the LHD has promised to support the liberal reform policies of the VP, and for now the VU seems a stable party. Some of the most radical support the Heimwehr in Austria and an establishment of similar anti-revolutionary forces in Liechtenstein, forming a surprisingly broad range of views for the party. Even stranger, the party seems to be eyeing the UEK next as a way to force terms upon the FBP. Central to Schaedler's policy is keeping this strange coalition together, but once he is elected shall the real test begin."
lic.5.a:0 "But will it really change anything?"

lic.6.t:0 "The Vaterländische Union Calls for Emergency Election!"
lic.6.d:0 "The tenure of the Fortschrittliche Bürgerpartei in Liechtenstein, or FBP, over the last few years has seen Liechtenstein draw even closer to Austria than it ever has been before. The Austro-Liechtensteiner Customs Union has been reinforced with steel, to be impenetrable for years to come in the status quo the FBP has finalized. The Principality has found itself chained to Vienna by a shackle of its own flesh, yet not all agree to this voluntary companionship. The Vaterländische Union and the UEK, besides associates to the Royal House of Liechtenstein, have expressed worry and distrust in the future of Liechtenstein while it kneels at the foot of the Habsburg throne.\nThis has coalesced in Otto Schaedler of the VU calling for an emergency election. Rumors float around the Landtag of Emil Risch, head of the Liechtensteiner Arbeiterverband, and Otto Schaedler, head of the Liechtensteiner Heimatdienst, splitting from the moderate factions of their partiesto run independently in the special election."
lic.6.a:0 "No need for such measures."
lic.6.b:0 "We need change, and we need it now!"

lic.7.t:0 "Fate of the Emergency Election"
lic.7.d:0 "With the sudden emergency election's tallies in, two things as of yet are certain: one, that the FBP has lost the vote by a significant margin. Two, the top two parties of the election are the Liechtensteiner Arbeiterverband and the Liechtensteiner Heimatdienst.\nThe Liechtensteiner Arbeiterverband, or LAV, has been criticized for its 'Syndicalist' overtures, but Emil Risch has time and time again affirmed that his loyalties lie to the Prince, and not to Paris nor London. The LAV and UEK were empowered following the Trans-Alpine Strikes, and its platform reflects its upbringings: safety for industrial workers and institutions for common betterment.\nIn contrast, the LHD, chaired by Otto Schaedler alone, has built its platform on a foundation of Liechtensteiner nationalism, away and truly separate from the grabby vices of Switzerland, Austria, and Germany. To the LHD, Liechtenstein is higher than these lows, and shall reflect the fact as such. Still, it has found allies in the Swiss Frontenbewegung, and radical elements of Austria's Heimwehr and VF.\nAs numbers climb up for the voting tallies of the LAV and LHD, one stops, and then the other; which is the latter?"
lic.7.a:0 "The LAV lights the way!"
lic.7.b:0 "The LHD secures its victory!"

lic.8.t:0 "Austria Holds the Ausgleich"
lic.8.d:0 "Our eastern brother and protector over the last few centuries, Austria's history is long and convolted. It is blotched with war, spiked with rebellions, and cracked with scandals and illicit political deals and inefficiency. Over the last few years, Austria has been taking the necessary steps to wash off the black dots that riddle its historical record, smooth out the rough edges of nationalist minorities vying for more, and seal the holes and faults they have let prosper.\nThese ameliorations have finally reached their apex, in the long-awaited Ausgleich of 1937. Vienna and Budapest stand on highly different positions on that of federalism, and while it is clear Austria will finally put its foot down to say 'no,' it remains unclear what the Magyars have to say in response. The Austrians are now promoting a federation, starting with the inclusion of Illyria as a full-fledged Constituent of Austria, following centralization in Bohemia, Galicia, Austria, and Hungary.\n\nRevolutionary Danubian federalism has entered the political spheres of oddball nations around the world, from the Caucasus to Asia, the Americas, and Mittelafrika - a solution to satisfy ever-raging oppressed peoples.\nDanubian federalism, too, has reached Liechtenstein's inner circles, particularly those of German nationalists or proponents of Swiss alliance."
lic.8.a:0 "Interesting."
lic.8.b:0 "These ideas have their merits."


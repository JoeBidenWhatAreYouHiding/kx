pers.34.t:0 "The Judiciary Question"
pers.34.d:0 "With the esteemed Seyyed Modarres now President of the Republic, many changes have come about thanks to the direct actions of his cabinet and supporters across the nation, despite the fears that his background would create further friction between the intelligentsia and clerics. On the contrary, Modarres' pragmatic approach and keen deference to the constitution have allowed him to keep the Majlis and the nation as a whole under relative control. His victory, however, has nevertheless emboldened some of the more fundamentalist scholars and preachers who have also gained much authority since the elections, such as Ayatollah Hossein Qomi and other like-minded radicals who chafed under republican authority. The balance between constitutional pragmatism and adherence to the doctrines of Islam have thus become more strained with time as these voices grow louder and more radical.\n\nThe most hotly debated topic to have emerged in recent weeks has been in regard to the role of the judiciary in the country. This is by no means a novel topic of debate; for decades now scholars have argued as to how much authority the state and its apparatuses have over the rule and dispensation of law within Iran. The traditional viewpoint, referred to as Mashru'eh, firmly places the authority of Islamic law over that of the secular, 'man-made' laws of government. Therefore the only authorities capable of dispensing justice are those most knowledgable on Sharia. The more progressive and thus far popular argument is Mashruteh, or simply constitutionalism, where the modern laws of government are required and take precedence, to ensure Iran's survival and development in the modern age. The question has thus been brought up again as to whether or not reforms must be done to restore the authority of the Islamic courts, and their authority over matters of law in criminal matters. \n\nPresident Modarres, who historically drafted much of the judicial reforms before the nation was disunited, has been assumed to fall under the Constitutionalist camp, though this is not certain considering his own personal beliefs and the pressure of his scholarly peers. A decree on the matter will certainly end the issue, though his decision may sway the nation into a more fundamentalist direction if he so chooses."
pers.34.a:0 "Sharia will continue to hold no sway in matters of the law."
pers.34.b:0 "Modarres relinquishes judicial control to the Ulema."


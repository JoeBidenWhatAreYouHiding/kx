### Scripted Localization ###


### Ideas ###
PER_loss_of_confidence:0 "Loss of Confidence"
PER_loss_of_confidence_desc:0 "When the Tajziyeh ended with no clear victor, everyone knew that unification would not yet be possible. Instead, efforts would be spent to consolidate what was left, to count the dead and to lick our wounds. It has now been ten years since, and the people have begun to view this national lack of action as merely an excuse, or a sign of weakness from Foroughi and his cabinet. Disgruntled clerics unsatisfied with the President's leadership have begun to preach for a better alternative, someone supposedly willing to take action and stop the seperatists and syndicalists from encroaching on Tehran. The military too has expressed similar dissatisfaction with the government, fearing the day that the tribal armies or the militias may grow into an organised force which they would not be able to hold back. \n\nIf Foroughi and his cabinet wish to survive long enough to see the end of the Tajziyeh, they will need to fufill the promises that they made long ago, and soon. Time is running out."

PER_factional_fracturing:0 "Factional Fracturing"
PER_factional_fracturing_desc:0 "What has maintained Foroughi's mandate over the Tehran Republic is his undoubtedly masterful skills of political manoeuvring. An esteemed intellectual and a hero of both the Constitutional Revolution and the Tajziyeh, his popularity amongst the politicians and people of the Republic have certainly ensured that his party and the government it has formed remains on good terms with the other political factions which remained loyal to the republic. However, as excellent as his abilities may be, it is not enough to maintain goodwill after ten years of gradual malaise. \n\nNewer political groups have formed to act as potential alternatives to the Iran Party, capitalising on the failures of the current government to boost their own presence. These groups range heavily, from the fringe underground cells of socialists that act under the orders of the Orumiyeh Republic to the growing Pan-Iranist Party that seeks to counter the evident rise of regionalist, globalist, and Pan-Turkist thought that has seeped its way into the Iranian plateau. More relevant groups such as the Revival Party adop a more authoritarian rhetoric, believing that liberalism is not good enough to bring Iran out of its broken state. Although these groups are not so divided ideologically as the extremists in Orumiyeh, they nevertheless pose a threat to Foroughi's rule and will do what they can to undermine his rule without entirely turning their backs to him."

PER_republican_legitimacy:0 "Republican Legitimacy"
PER_republican_legitimacy_desc:0 "Although the two rebelling states may oppose the Republic in Tehran vehemently on most things, be it ideological, economical, or in regard to foreign policy, there is one truth which they cannot deny. We are the one true legitimate government that arose from the collapse of the Qajar state and its corrupt dynasty. We were the first to proclaim ourselves as Iran renewed, embodying the ideals of those who fought and died before us in the Constitutional Revolution. We still occupy the same Baharestan Palace that was bombarded by Mohammad Ali Shah Qajar, where the republic of today still remains. \n\nNo matter how the Republic in Orumiyeh may argue that their ideals are better, no matter how the Zagros Confederation may object to the legitimacy of our mandate, it is clear for all to see that our right to call ourselves a continuation of the glorious nation of Iran is set in blood and tears."
PER_divided_military:0 "A Military Divided"
PER_divided_military_desc:0 "Even before the Tajziyeh, there were two main military forces in Iran. The Cossacks, founded by the Qajars and trained by the Russians, were once the personal guards of the Shahs, but now they have found new purpose as a roaming army, quelling banditry in the smaller towns and countryside of Iran, led by the fearsome Reza Khan Mirpanj. On the other hand is the Gendarme, which begun as highway patrolmen and civil police officers, trained by the Swedish. Both sides exhibit very strong loyalty to themselves, as well as a esprit de corps, though perhaps in opposite directions politically. The Cossacks are seen as wild and barbarous by the Gendarme, little more than hounds on a lease. The Gendarme are seen as ineffective, effeminate, and socialististic by the Cossacks. \n\nTheir rivalry has been the burden of the government for more than twenty years, and although both sides are undoubtedly capable in the art of war, this weakness will surely be exploited by our enemies if it is not addressed soon enough."


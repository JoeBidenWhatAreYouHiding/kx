### Desert War events
pers.39.t:0 "The Middle East In Turmoil"
pers.39.d:0 "Desert War has begun and we must make our watch to ensure that any advantage we can gain is taken."
pers.39.a:0 "War is approaching us by the day."

pers.40.t:0 "Striking From The Shadows"
pers.40.d:0 "Zagros Confederation has been heavily involved in the fighting, how should we respond? (dependant on current leader)"
pers.40.a:0 "Showcase our restraint and thereby our stability."
pers.40.b:0 "Appeal to the Ulema of the southern cities, turn them back to our side."
pers.40.c:0 "Our military will not stand paralysed at the feet of the mountains ever again."
pers.40.e:0 "Not yet..."

pers.41.t:0 "Watching The Dust Settle"
pers.41.d:0 "The Desert War has ended, whether or not Otts or Egy won we have to adapt to the new situation of the ME going forward."
pers.41.a:0 "The Turkish grip is steady."
pers.41.b:0 "Egypt is a new hegemon!"

pers.42.t:0 "Now or Never"
pers.42.d:0 "Our preparations have been plentiful, if we do not strike now we will lose advantages which we have built up throughout this conflict."
pers.42.a:0 "Strike at the Zagros Confederation."
pers.42.b:0 "Strike at the Republic of Orumiyeh."
pers.42.c:0 "Strike at both. Reunification begins now!"
pers.42.d:0 "Not yet."

pers.43.t:0 "The Road to Anatolia"
pers.43.d:0 "[Placeholder]"
pers.43.a:0 "We must reach the Sublime Porte by any means necessary!"

pers.44.t:0 "Afghanistan Crosses the Border"
pers.44.d:0 "[Placeholder]"
pers.44.a:0 "We'll reach Mosul before the week is out!"


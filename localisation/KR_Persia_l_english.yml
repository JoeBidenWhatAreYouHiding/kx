### Decisions ###

PER_coring_conquered_territory:0 "Integration of New Territory"
PER_core_afghan_land:0 "Integrate Afghanistan"
PER_core_afghan_land_desc:0 "Now that we have gained control of our lands in Afghanistan again, we can begin to integrate it into [PER.GetNameDef]. However, it is going to take decades to fully integrate the eastern area due to their Pashtun ethnic majority. In the west of Afghanistan, the population is majority Hazara, a group we can more easily integrate into our nation. The Pashtuns most likely will resist our attempts, but eventually they will accept our leadership."
PER_core_turkestan:0 "Integrate Turkestan"
PER_core_turkestan_desc:0 "As our state moved further North we have come into the possession of the various steppe lands inhabited by the people of Turkestan, some being our close relatives. It is time to begin the process of integrating their population into our administration."
PER_core_azerbaijani_land:0 "Integrate Azerbaijan"
PER_core_azerbaijani_land_desc:0 "Azerbaijan is now under our direct rule again. After some time, most Azerbaijanis will give up on their dream of their own state, and will accept our leadership. Although there will be some resistance to our rule, we have a very large Azerbaijani minority, and the nation of Azerbaijan only existed for a few decades. Therefore, Azerbaijani resistance will be weak and futile."
PER_core_armenian_land:0 "Integrate Armenia"
PER_core_armenian_land_desc:0 "The people of Armenia have been struggling under foreign occupation for centuries, but just as the activist Gregory Yeghikian showed, they are part of the greater Pan-Iranian family. Let us welcome our long-lost brothers back into their destined state."
PER_core_georgian_land:0 "Integrate Georgia"
PER_core_georgian_land_desc:0 "While the ancient land of Kartli may have been one of the least integrated provinces of the old Persian Empires, it was nonetheless a vital part of our domain, especially during our struggles against the Greeks and Romans. We must establish permanent administration in Georgia."
PER_core_baluchistan:0 "Integrate Baluchistan"
PER_core_baluchistan_desc:0 "The state of Baluchistan has been returned to our control. The Baluchi people are a large ethnic group in our nation, so we should be able to integrate the Baluchi population fully into our state. However, they will resist our rule, due to the fact that they have been under Indian control for much time."
PER_core_gulf_land:0 "Integrate the Gulf States"
PER_core_gulf_land_desc:0 "The lands of the Persian Gulf, previously occupied by Arabic invaders, have been liberated by our armies. While the process of integrating these mercantile and sea-faring people is not out of the question, it will still take us some time to accomplish."
PER_core_arab_land:0 "Integrate Iraq-i-Arab"
PER_core_arab_land_desc:0 "With the acquisition of our ancient lands to the West, we can finally reestablish our zone of control in the bountiful lands of the Tigris–Euphrates river system."
PER_ottos_are_weak_decision_category:0 "Western Expansion"
PER_ottos_are_weak_decision_decfision:0 "The Ottomans are weak!"
PER_ottos_are_weak_decision_decfision_desc:0 "Recently, Egypt has declared war on the Ottoman Empire. The Ottomans have been dominating the Middle East for centuries, and now it is our moment to seek revenge. They have been showing weakness since even before the beginning of the Weltkrieg, and now it is our time to put an end to the sick man that is the Ottomans."


PER_political_decisions:0 "Political Decisions"
PER_sideline_reza_khan:0 "Sideline Reza Khan"
PER_sideline_reza_khan_desc:0 "HE IS COMING...."
PER_replace_cossack_officers:0 "Replace Cossack Officers"
PER_rally_the_clergy:0 "Rally the Clergy"
PER_promote_gendarme_loyalists:0 "Promote Gendarme Loyalists"
PER_secure_majlis_support:0 "Secure Majlis Support"
PER_confront_reza_khan:0 "Confront Reza Khan"
PER_replace_cossack_officers_cost_tt:0 "Requires 25 Army Experience"

PER_desert_war_operations:0 "Window of Opportunity"
PER_desert_war_operations_desc:0 "The rebelling states have found themselves embroiled in the great war between the forces of Egypt and the Ottoman Empire. Since we are neutral to these affairs, we can utilise this opportunity to take advantage of our distracted foes and prepare for the ultimate war to unify Iran."

PER_consolidate_eastern_frontier:0 "Consolidate the Eastern Frontier"
PER_consolidate_eastern_frontier_desc:0 "With the attention of the rebellious states fixed on the south, we can reinforce our own borders and begin drilling our garrison forces in earnest."

PER_plant_agents_zagros:0 "Plant Agents in the Zagros"
PER_plant_agents_zagros_desc:0 "Iranian intelligence operatives, dispatched into the Confederation's territory under the cover of merchants and travelling scholars, will cultivate contacts, map troop dispositions, and sow quiet discord."

PER_emergency_war_chest:0 "Authorise an Emergency War Chest"
PER_emergency_war_chest_desc:0 "The Majlis will authorise a dedicated defence fund, redirecting industrial revenues into preparation for the war of reunification that all know is coming."

PER_signal_great_powers:0 "Signal Strength to the Great Powers"
PER_signal_great_powers_desc:0 "President Foroughi will dispatch careful diplomatic notes to Berlin and Ankara, positioning Iran as a rational, stable partner."

PER_national_press_mobilization:0 "National Press Mobilisation"
PER_national_press_mobilization_desc:0 "Under the liberal framework Foroughi has built, state-aligned newspapers will begin a coordinated campaign tying economic revival and national dignity directly to the question of reunification."

PER_clerical_outreach_khuzestan:0 "Clerical Outreach to Khuzestan"
PER_clerical_outreach_khuzestan_desc:0 "Modarres will dispatch Qom-trained clerics into the Confederation's Shia Arab heartland, framing the Confederation's secular Arab leadership as an apostasy against the faithful of Iran." # will need to rewrite to account for Khazal

PER_declare_fatwa_unification:0 "Declare the Reunification a Religious Duty"
PER_declare_fatwa_unification_desc:0 "Modarres will issue a fatwa framing the coming war of reunification as a religious obligation."

PER_grand_military_exercises:0 "Grand Military Exercises"
PER_grand_military_exercises_desc:0 "Reza Khan will use the lull on Iran's own front to conduct the most ambitious combined-arms exercises the Republic has ever seen, putting every division through rigorous drills in the Alborz foothills."

PER_infiltrate_zgs_officers:0 "Infiltrate the Confederation's Officer Corps"
PER_infiltrate_zgs_officers_desc:0 "Reza Khan's personal connections from the old Cossack Brigade and the Mostaghelun veterans' network run deep. Loyalists can be placed within the Confederation's command structure before a shot is fired."

PER_dw_seize_the_moment:0 "Seize the Moment"
PER_dw_seize_the_moment_desc:0 "The groundwork has been laid. The Desert War has kept our enemies occupied and weakened. The hour of reunification is now."






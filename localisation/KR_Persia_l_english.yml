### Leader Bios ###
POLITICS_FOROUGHI_DESC:0 "Statesman, intellectual, President of the Republic. Mohammad Ali Foroughi is all these things, and more, though many do not see it. From his youth, he was instilled with a deep appreciation for learning, having been raised in a family of scholars and translators with long ties to the royal court of Iran. The ideals which he would later come to champion were first introduced to him by his father, who showed his son a world where Iran could strive beyond its malaise, to embrace constitutionalism, democracy, and liberty for all Iranians. When he became the patriach of his family, Foroughi would quickly enter into the rapidly developing world of politics and excel within it with a mastery which only a handful of others could even compare to. Whatever role he was involved, be it as Minister of Justice or as Vice-President, it would not matter. With such an educated voice behind their movement, it was clear that he would become the figurehead for the Constitutional Revolution that had been unfurling for decades at that point. \n\nHowever, even someone so seemingly talented as he could not foresee the disaster which would beset the nation. The Weltkrieg and the devastation it wrought could not hold back the tides of discontent, no matter how much he tried, no matter how much he would plead for greater reforms, for real change, he could not change the corrupted minds of the Qajar noblemen and lackeys. After all, he was only the son of a court poet. When the chaos of the Tajziyeh came and went, the same son of a poet would find himself leading a new movement that finally ousted the tyranny of the Qajars, leading to the formation of a new, republican state of Iran where true change could finally happen. Foroughi and his closest allies, however, were no extremists. They knew that to craft such a state would require time, resources, and patience, aspects which his new-found advesaries to the west, led by Taqizadeh the radical, and the unruly tribes of the south would come to disagree with. Perhaps, if things were but a bit different, he could have kept Iran safe and united; but now this was but a distant dream. \n\nAs President of the Republic of Iran, Foroughi now faces the dire reality that time is indeed running out. His people are impoverished, his parliament is splintering, and the traitorous seperatists have stopped licking their wounds. The coming years will most certainly prove to be the most difficult of his entire political career, and only God knows what the history books will write of him when this era of separation finally comes to an end." 


### Opinion Modifiers ###


### Events ###

pers.1.t:0 "The Republic of Iran, 1936"
pers.1.d:0 "Iran is in a time of crisis. For ten years, the nation has been broken, no longer whole, and the Republic of Iran is what remains of the old order. When the Weltkrieg finally came to an end, the nation was beyond lawless, with banditry and famine plaguing every corner from Kermanshah to Sistan. It was inevitable that something had to give, though no one could have truly expected something so devastating as the Dowran-e Tajziyeh - the Era of Separation. Alienated by the failures of the Constitutional Revolution and the moderates that upheld it as a gradual, middle-way path to enlightenment, the Majlis and its members broke into two factions. On one end were the radicals, composed of ethnic nationalists, socialists, and the younger democrats who had witnessed the strength of Europe and desired the same for Iran. They would flee to the west, establishing a new rival government in Tabriz, the second intellectual heart of Iran. Thus the Republic of Orumiyeh was formed. To the south, the same demands for change manifested themselves through a collective tribal effort, forming the Confederation of the Zagros, led by the Solat-ed-Dowleh Qashqai Khan. \n\nNo one quite remembers what kicked off the war, but in the end, it did not matter. Years of internal warfare reigned, families became separated, brothers fought against themselves for ideals that they would die for. Fearing for his life due to his tremendous unpopularity in Tehran itself and the risk of being captured by the enemy, Ahmad Shah fled the country, leaving behind an empty throne that no one wished for. A Republic, embodying the same traditions without restrictions on implementing the ideals of the Constitutional Revolution, took hold, and emboldened the people, especially with the aid of the Mullahs that remained loyal to the capital. When the smoke had cleared, it was clear that we had lost, though we were not extinguished. The Zagros Confederation secured its independence, and the Orumiyeh Republic lived to fight another day. \n\nSince then, the Republic of Iran has been slowly recovering, implementing the dire reforms that should have been done many years ago in preparation for the day that the war resumes. Mohammad Ali Foroughi, the first and current President of the Republic, still stands as the figurehead of the moderate order, though it may not be long before the patience of the people runs out, changing the course of the Tehran government and perhaps the entire country forever."
pers.1.a:0 "Oh Iran, what has happened to you?"
pers.1.b:0 "Let us move forward."

pers.2.t:0 "Emergency elections!"
pers.2.d:0 "foroughi you mooooooooootherfucker, call elections or else we all fuckin die"
pers.2.a:0 "ok..."

pers.3.t:0 "Epic Rap Battle of Iranian History"
pers.3.d:0 "Libtard Foroughi vs Goat-face Modarres. Who wins!?"
pers.3.a:0 "Foroughi wins!"
pers.3.b:0 "Modarres wins!"

pers.4.t:0 "Reza Khan Sends His Demands!"
pers.4.d:0 "Reza Khan wants you to put him in the government or else...what do we say to this gorilla?"
pers.4.a:0 "yes reza"
pers.4.b:0 "no reza"

pers.5.t:0 "Reza Khan Marches In!"
pers.5.d:0 "Majlis is closed, go home"
pers.5.a:0 "Javid Rahbar!"

pers.8.t:0 "A Matter of Positive Equilibrium"
pers.8.d:0 "Our history with the nations of the world has been one of bitter rivalries and subtle friendships. Though it has been many years since British investors or Russian officers have stepped foot within our lands, the mark which they left from their 'Great Game' can still be readily felt across Iran. One only has to look at a map to realise it. For many Iranians, this justifies their absolute hatred of these nations, and few can argue against the fact. However, if we are to still survive today, especially against the rebelling rivals to our south and west, then we cannot take any chances. Of course, Britain and Russia can never be considered (even if they were able to recover), but a new world has brought with it new leaders at its helm, and it is vital that we persue a friendship with at least one of these nations. \nGermany, of course, stands as the most powerful figure, and we have already some history with them, from before the Tajziyeh. However, it's apparent that they have been at the very least courting with the Shirazi government, thanks to a certain Wilhelm Wassmuss. To throw ourselves into the matter may pose greater risks than we anticipate. \nThe other option would be Sweden, to which we have had amicable relations with. The Gendarme was founded and trained by Swedish officers, and we may be able to utilise this aspect to our advantage and further develop a friendship between Iran and Sweden. \nAustria, stands also as a potential ally. Diplomatically, it may be beneficial to maintain neutrality for when we once again reach the world stage. They would certainly benefit from a trade alliance, with privledged access to our resources. \nOne suggestion stands that rather than looking west, we should look to the east - Japan has developed exponentially in the last decade, and their ambitions seem to have no end. An alliance with them, albeit novel, may prove to be the right course of action."
pers.8.a:0 "Approach Germany"
pers.8.b:0 "Approach Sweden" 
pers.8.c:0 "Approach Austria"
pers.8.e:0 "Approach Japan"
 
pers.9.t:0 "Germany Accepts"
pers.9.d:0 "Berlin has agreed to our proposal. German advisors and investment will soon arrive in Iran, bringing with them the expertise of Europe's greatest industrial power."
pers.9.a:0 "Excellent news!"
 
pers.10.t:0 "Germany Declines"
pers.10.d:0 "The Germans have politely declined our overtures. Perhaps they have other priorities at this time."
pers.10.a:0 "Bastards!"
 
pers.11.t:0 "Sweden Accepts"
pers.11.d:0 "Stockholm has agreed to closer relations with Iran. Swedish industrial expertise will prove invaluable for our modernisation efforts."
pers.11.a:0 "Excellent news!"
 
pers.12.t:0 "Sweden Declines"
pers.12.d:0 "Stockholm has declined to enter into closer relations with Iran at this time."
pers.12.a:0 "A disappointment."
 
pers.13.t:0 "Austria Accepts"
pers.13.d:0 "Vienna has agreed to our proposal for closer cooperation. Austrian support will strengthen our position considerably."
pers.13.a:0 "Excellent news!"
 
pers.14.t:0 "Austria Declines"
pers.14.d:0 "Vienna has declined our proposal for closer cooperation."
pers.14.a:0 "They have bigger issues to deal with, it seems."
 
pers.15.t:0 "Japan Accepts"
pers.15.d:0 "Tokyo has agreed to pursue an alliance with Iran. Japanese military advisors will help train our forces in modern warfare."
pers.15.a:0 "Excellent news!"
 
pers.16.t:0 "Japan Declines"
pers.16.d:0 "Tokyo has declined to pursue an alliance with Iran at this time."
pers.16.a:0 "A far-flung hope, dashed."

pers.18.t:0 "The Preacher Takes the Pulpit"
pers.18.d:0 "err modarres angy."
pers.18.a:0 "Organise a counter-campaign"
pers.18.b:0 "Let him speak! He will tire himself out"
pers.18.c:0 "A public debate in the Majlis will put him in his place."

pers.19.t:0 "Unrest in the Bazaars"
pers.19.d:0 "Our economy is shit and now people are protesting! What do?"
pers.19.a:0 "Send in the Gendarme to maintain peace. We cannot afford disorder."
pers.19.b:0 "Offer emergency relief funds!"
pers.19.c:0 "Let them march, it's their right to do so."

pers.22.t:0 "Reports of Unrest in Gilan"
pers.22.d:0 "Since the annexation of the Socialist Republic of Gilan, we have been lucky not to have been burdened by any major activities up north. However, since the economy's plummet, there have been whisperings of anti-government talks occuring across the countryside of Gilan, where the local authority in Rasht have few eyes or ears. Some rumours of supposed makeshift Anjomans have also been heard. Although it is unlikely that the Gilaks will rebel at this stage, we must take caution to ensure our control over this vital province remains."
pers.22.a:0 "Dispatch diplomats to hear their grievances."
pers.22.b:0 "We are all Muslims - let us not divide ourselves."
pers.22.c:0 "Old tactics work well. Send in a regiment to patrol the countryside and root out dissenters."
pers.22.e:0 "If only the election was resolved..."

pers.25.t:0 "Reza Khan Backs Down"
pers.25.d:0 "Outmaneuvered and isolated, our reports on Field Marshal Reza Khan have indicated that, faced with mounting isolation and pressure from all sides, he has backed down and abandoned whatever scheme he had been planning.\nOur new government, led by Seyyed Modarres, has triumphed. The Republic is secure, for now."
pers.25.a:0 "God is great."

### Decisions ###

PER_coring_conquered_territory:0 "Integration of New Territory"
PER_core_afghan_land:0 "Integrate Afghanistan"
PER_core_afghan_land_desc:0 "Now that we have gained control of our lands in Afghanistan again, we can begin to integrate it into [PER.GetNameDef]. However, it is going to take decades to fully integrate the eastern area due to their Pashtun ethnic majority. In the west of Afghanistan, the population is majority Hazara, a group we can more easily integrate into our nation. The Pashtuns most likely will resist our attempts, but eventually they will accept our leadership."
PER_core_turkestan:0 "Integrate Turkestan"
PER_core_turkestan_desc:0 "As our state moved further North we have come into the possession of the various steppe lands inhabited by the people of Turkestan, some being our close relatives. It is time to begin the process of integrating their population into our administration."
PER_core_azerbaijani_land:0 "Integrate Azerbaijan"
PER_core_azerbaijani_land_desc:0 "Azerbaijan is now under our direct rule again. After some time, most Azerbaijanis will give up on their dream of their own state, and will accept our leadership. Although there will be some resistance to our rule, we have a very large Azerbaijani minority, and the nation of Azerbaijan only existed for a few decades. Therefore, Azerbaijani resistance will be weak and futile."
PER_core_armenian_land:0 "Integrate Armenia"
PER_core_armenian_land_desc:0 "The people of Armenia have been struggling under foreign occupation for centuries, but just as the activist Gregory Yeghikian showed, they are part of the greater Pan-Iranian family. Let us welcome our long-lost brothers back into their destined state."
PER_core_georgian_land:0 "Integrate Georgia"
PER_core_georgian_land_desc:0 "While the ancient land of Kartli may have been one of the least integrated provinces of the old Persian Empires, it was nonetheless a vital part of our domain, especially during our struggles against the Greeks and Romans. We must establish permanent administration in Georgia."
PER_core_baluchistan:0 "Integrate Baluchistan"
PER_core_baluchistan_desc:0 "The state of Baluchistan has been returned to our control. The Baluchi people are a large ethnic group in our nation, so we should be able to integrate the Baluchi population fully into our state. However, they will resist our rule, due to the fact that they have been under Indian control for much time."
PER_core_gulf_land:0 "Integrate the Gulf States"
PER_core_gulf_land_desc:0 "The lands of the Persian Gulf, previously occupied by Arabic invaders, have been liberated by our armies. While the process of integrating these mercantile and sea-faring people is not out of the question, it will still take us some time to accomplish."
PER_core_arab_land:0 "Integrate Iraq-i-Arab"
PER_core_arab_land_desc:0 "With the acquisition of our ancient lands to the West, we can finally reestablish our zone of control in the bountiful lands of the Tigris–Euphrates river system."
PER_ottos_are_weak_decision_category:0 "Western Expansion"
PER_ottos_are_weak_decision_decfision:0 "The Ottomans are weak!"
PER_ottos_are_weak_decision_decfision_desc:0 "Recently, Egypt has declared war on the Ottoman Empire. The Ottomans have been dominating the Middle East for centuries, and now it is our moment to seek revenge. They have been showing weakness since even before the beginning of the Weltkrieg, and now it is our time to put an end to the sick man that is the Ottomans."



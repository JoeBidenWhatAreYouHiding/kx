### Focuses ###
RUS_April_Putsch: "Kornilov Takes Over"
RUS_April_Putsch_desc: "The sudden death of President Kerensky and the paralysis of the republican government have plunged Russia into uncertainty. With elections delayed and unrest spreading across the nation, General Lavr Kornilov has acted decisively. Backed by loyal elements of the army, he has intervened in the capital to restore order and prevent the state from collapsing into chaos. What began as a temporary measure now places the fate of Russia firmly in the hands of the military."
RUS_Establish_Telegraphic_Communication: "Telegraphic Communication with the Regions"
RUS_Establish_Telegraphic_Communication_desc: "The vastness of Russia has always been both its strength and its weakness. In times of unrest, delays in communication allow rebellion and disorder to spread unchecked. By restoring and centralizing telegraphic lines with the regions, the government ensures that orders are delivered swiftly and that no corner of the country remains beyond its reach."
RUS_Gain_Senate_Support: "Gain the Support of the Senate"
RUS_Gain_Senate_Support_desc: "Though the army has secured control of the capital, legitimacy must still be forged within the state’s institutions. The Senate, entrusted with constitutional authority, must be persuaded to recognize Kornilov’s leadership as a necessary safeguard of the republic. Their approval will grant a veneer of legality to what was achieved by force."
RUS_Localize_Pockets_Of_Rebellion: "Localize Pockets of Rebellion"
RUS_Localize_Pockets_Of_Rebellion_desc: "Revolutionary unrest has not vanished - it has merely receded into scattered cells and isolated uprisings. These pockets of resistance must be identified, contained, and eliminated before they can coalesce into a broader movement capable of threatening the state once more."
RUS_Impose_Curfew: "Impose Curfew"
RUS_Impose_Curfew_desc: "Order in the streets is the first step toward restoring order in the nation. By imposing curfews in key cities, the government restricts the movement of agitators and disrupts the ability of hostile elements to organize under the cover of night."
RUS_Declare_State_Of_Emergency: "Declare a State of Emergency"
RUS_Declare_State_Of_Emergency_desc: "The current situation cannot be addressed through ordinary legal means. Extraordinary circumstances demand extraordinary authority. A formal state of emergency grants the government the powers necessary to act swiftly against threats to stability, even at the cost of temporarily suspending certain liberties."
RUS_Martial_Law_Kornilov: "Martial Law"
RUS_Martial_Law_Kornilov_desc: "Civil administration alone cannot guarantee order in a time of crisis. By placing key regions under martial law, the military assumes direct responsibility for governance, ensuring discipline, security, and immediate enforcement of the state’s will."
RUS_Eliminate_Sabotage_Among_the_Soldiers: "Eliminate Sabotage Among the Soldiers"
RUS_Eliminate_Sabotage_Among_the_Soldiers_desc: "The army remains the backbone of the state, yet it is not immune to the ideological divisions that plague the nation. Revolutionary sympathizers and disloyal elements within the ranks must be identified and removed, lest they undermine the very force tasked with restoring order."
RUS_Bring_Officer_Corps_Under_Control: "Bring the Officer Corps Under Control"
RUS_Bring_Officer_Corps_Under_Control_desc: "The officer corps is both a pillar of strength and a potential source of division. Personal loyalties, political ambitions, and factional disputes must be suppressed to ensure a unified command structure loyal above all to the state."

RUS_Indefinite_State_Of_Emergency: "Indefinite State of Emergency"
RUS_Indefinite_State_Of_Emergency_desc: "What was declared as a temporary measure increasingly appears necessary as a permanent safeguard. The threats facing Russia have not yet been extinguished, and the state cannot afford to relinquish the tools required to defend itself."
RUS_Strengthen_Presidential_Power: "Strengthen Presidential Power"
RUS_Strengthen_Presidential_Power_desc: "The weaknesses of the republican system have been laid bare. Fragmented authority and endless debate have nearly destroyed the state. By strengthening the powers of the presidency, we seek to ensure that decisive leadership can prevail over vague parliamentarism of the SRs."
RUS_Regency_Council: "Turn to Monarchism"
RUS_Regency_Council_desc: "For many, the restoration of order alone is not enough - Russia must also restore its historical continuity. The creation of a Regency Council offers a path toward monarchist restoration, providing a framework through which the question of the throne may one day be resolved. However, now is not the time to do it - instead we can give promises in order to ally monarchists - most of whom are right-wing and conservative and will help us removing the rift in the military ranks and in the Duma."

RUS_Restore_Russias_Greatness: "Restore Russia's Greatness"
RUS_Restore_Russias_Greatness_desc: "Russia’s decline did not begin with Revolution - it was merely accelerated by it. The state must be rebuilt on foundations of strength, discipline, and national unity, reclaiming its place among the great powers of the world."
RUS_Squeeze_Out_the_SR_Movement: "Squeeze Out the SR Movement"
RUS_Squeeze_Out_the_SR_Movement_desc: "The Socialist Revolutionary movement continues to operate under the guise of legality while fostering unrest beneath the surface. Their influence must be curtailed if the state is to achieve lasting stability."

RUS_Relief_For_Peasants: "Relief for Peasants"
RUS_Relief_For_Peasants_desc: "The peasantry forms the backbone of Russia, yet their grievances have long been exploited by revolutionaries. Limited reforms and economic relief may reduce their discontent, depriving agitators of fertile ground for rebellion."
RUS_Relief_For_Peasants_tt: "Sets a cap of §H60§! to the §rRevolutionary ferment§!"

RUS_Dissolve_Duma_Until_Notice: "Dissolve the Duma Until Further Notice"
RUS_Dissolve_Duma_Until_Notice_desc: "The Duma, divided and ineffective, has proven incapable of addressing the crisis facing the nation. Its dissolution removes a source of obstruction, allowing the Field-Marshal's government to act without delay."

RUS_Bet_On_Capital: "Bet on Big Capital"
RUS_Bet_On_Capital_desc: "Industrialists and financiers possess the resources necessary to rebuild Russia’s economy. By aligning the state with big capital, rapid economic recovery and industrial expansion can be achieved, though at a cost of favourable taxes and discontent of our population."
RUS_Bet_On_Apolitical_Peasantry: "Bet on Apolitical Peasantry"
RUS_Bet_On_Apolitical_Peasantry_desc: "The peasantry, if left free from political agitation, can provide stability and sustenance for the nation. By focusing on rural development and discouraging political involvement, we may secure a loyal base, turning the millions away from Savinkov and Chernov."

RUS_Enlist_Support_Navy: "Enlist the Support of the Russian Navy"
RUS_Enlist_Support_Navy_desc: "Control of the army alone is not sufficient. The loyalty of the navy, left underfunded and divided after Kolchak's demarche must also be secured, ensuring that all branches of the armed forces stand united behind the government."
RUS_Enlist_Support_Navy_tt: "We will no longer get the §H$rusd.3103.t$§! event"

RUS_Peasant_Marshal: "The Peasant Marshal"
RUS_Peasant_Marshal_desc: "General Anton Denikin has been Kornilov's most loyal and long ally since the early days of the Volunteer Army. Furthermore, he understands the principles of the ROVS and seeks to keep army apolitical and stable. We must ensure that our legacy of Volunteer Army continues in the Peasant Marshal, as Anton Ivanovich is commonly known among the soldiers."
RUS_Black_Baron: "The Black Baron"
RUS_Black_Baron_desc: "Baron Pyotr Wrangel, one of the most loyal commanders of the Volunteer Army is a talented organizer and a patriot. He can not be compromised neither his loyalty to the Volunteerism and White Cause doubted. However, he truly has ambitions of his own, and the growing circle of those who adore Black Baron, especially among the Junkers, proves it."

RUS_Prevent_ROVS_Factionalism: "Prevent [GetROVSParty] Factionalism"
RUS_Prevent_ROVS_Factionalism_desc: "The Russian All-Military Union remains a powerful force, but it is divided by competing visions of Russia’s future. These divisions must be managed carefully to prevent internal conflict from weakening the state."

RUS_Ilyins_Ideas: "Ilyin's Ideas"
RUS_Ilyins_Ideas_desc: "The writings of Ivan Ilyin offer a philosophical foundation for a strong, disciplined, and spiritually unified Russia. His ideas provide ideological justification for the state’s current course and by elevating Ilyin from a philosopher to a more serious role within our government and movement will provide us with necessary pillars."

RUS_Legalize_Blackhundreds: "Legalize the Black Hundreds"
RUS_Legalize_Blackhundreds_desc: "The Black Hundredist movements, though controversial, represent a fervent strain of monarchist and nationalist sentiment. Led by such figures as Yevgeny Markov and Mikhail Govorukho-Otrok, they were long in shadows, caused by ban on their political activities since the February Revolution. 20 years later it is time to legalize them to keep under observation and make sure that even if they plot something, they do it in [RUS.Capital.GetName] instead of Riga."

RUS_Junkers: "Junkers of the Guards School"
RUS_Junkers_desc: "The officer schools remain crucial for shaping the next generation of military leaders. Reinforcing discipline and loyalty among the Junkers ensures the future stability of the armed forces."

RUS_Support_Orthodoxy: "Support Russian Orthodoxy"
RUS_Support_Orthodoxy_desc: "The Orthodox Church has long been a pillar of Russian identity. By supporting the Patriarch and restoring its influence, we will reinforce moral unity and national tradition - long gone due to Kerensky's dictatorship of secularism."

#Unarmy
RUS_Draconian_Laws: "Draconian Laws"
RUS_Draconian_Laws_desc: "The years of collapse, mutiny, and ideological corruption have made one truth impossible to ignore: a state in mortal danger cannot afford indulgence. The laws of the republic were written for calmer times, when debate and compromise could still be mistaken for governance. Now the nation requires something sterner. By tightening punishments, widening the powers of the police and military courts, and removing the last legal protections shielding agitators from consequence, the government makes clear that sabotage, sedition, and insubordination will no longer be treated as political disagreement. In this new Russia, order must be defended with severity, and those who test it will find no mercy."

RUS_All_For_Needs_Front: "All For the Needs of the Front!"
RUS_All_For_Needs_Front_desc: "Russia cannot hope to survive a new age of war if its resources remain divided between private comfort, bureaucratic inertia, and political vanity. The nation must become a single instrument of defense, with every factory, railway, workshop, warehouse, and harvest directed toward the future Western front."

RUS_All_Russian_Movement: "All-Russian Movement"
RUS_All_Russian_Movement_desc: "A fractured nation cannot be saved by force alone if it remains divided in spirit. The old partisan quarrels of class, region, profession, and party have left Russia vulnerable to collapse, while revolutionary agitators have exploited every fissure between the people and the state. To overcome this, we will foster a broader national movement — one that unites peasants, workers, officers, bureaucrats, and loyal citizens beneath a shared vision of duty. Such a movement cannot erase difference, but it can subordinate it to the requirements of the Motherland."

RUS_Treaty_With_Admiral: "Treaty With the Rogue Admiral"
RUS_Treaty_With_Admiral_desc: "Not all enemies of the state remain enemies forever, and not every man who once raised a hand against Petrograd or Moscow must be driven into permanent exile. The Russian Empire fractured not only because of treason, but because of exhaustion, fear, and the failure of its leaders to preserve unity when unity mattered most. Admiral Kolchak may yet be drawn back into the fold, since the conditions that drove him and the Cossacks to desperation no longer exist."

RUS_Better_Death_Than_Slavery: "Better Death Than Slavery"
RUS_Better_Death_Than_Slavery_desc: "The shadow of socialism reaches far beyond Russia's borders. The Red Internationale, with its promises of world revolution and class war, seeks not reform but the destruction. Against such a threat, no compromise is possible. The state must cultivate a spirit of absolute resistance — a belief that subjugation to foreign ideology, occupation, or revolutionary conquest would be worse than ruin. In war and in peace, Russia must be prepared to choose ruin over submission, for only a people unwilling to kneel can remain free."

RUS_Draft_Constitutional_Reforms: "Draft the Constitutional Reforms"
RUS_Draft_Constitutional_Reforms_desc: "The restoration of order has not ended the question of Russia's future; it has only made that question impossible to evade. The republic as it once existed proved too weak to preserve itself, yet a return to the old forms of naked instability would merely reopen the wounds already suffered by the nation. To prevent this, new constitutional reforms must be drafted — reforms that will define who governs, by what right, and under what limits."

RUS_True_Face_Of_Revolution: "True Face of the Revolution"
RUS_True_Face_Of_Revolution_desc: "Revolution once claimed to be the path toward justice, liberty, and renewal. In practice, it has brought mutiny, terror, hunger, fragmentation, and ruin. The state now has an opportunity to force that contradiction into the open ny documenting the failures of the revolutionary era, exposing its crimes, and contrasting its promises with the suffering it created."

RUS_Root_Out_Graft: "Root Out Graft From Politics"
RUS_Root_Out_Graft_desc: "General Kornilov always hated and fought corruption - even at a cost of losses during the civil war. Russia's modern crisis was not caused by corruption alone, but corruption made the crisis impossible to contain. Senators sold influence, ministries served private interests, and public institutions became vessels for favoritism, theft, and delay. A state struggling for survival cannot endure such habits. Graft must be attacked not merely as a moral failing, but as a strategic threat that weakens the army, erodes public confidence, and undermines every reform before it begins. A serious campaign against corruption can restore a measure of trust in the administration and compel the bureaucracy to serve the nation rather than itself."

RUS_Social_Ferment: "Fight Revolutionary Ferment"
RUS_Social_Ferment_desc: "The revolution has not been extinguished so much as driven underground. Its adherents still exist in hidden circles, in trade union networks and student societies. If allowed to spread, this ferment will once again find public expression, and the state will be forced to confront unrest it should have prevented earlier. We must wage a patient war against the roots of disorder, combining surveillance, arrests, infiltration, censorship, and civic pressure until the underground loses the ability to become a movement again."

RUS_Osoboye_Soveshchanie: "Osoboye Soveschaniye"
RUS_Osoboye_Soveshchanie_desc: "Extraordinary times require extraordinary institutions. The previous government, already weakened by years of crisis and political fragmentation, has proved too slow, too divided, and too vulnerable to the pressures bearing down on Russia. The creation of the \"Osoboye Soveshchanie\" - a special assembly of trusted military men, administrators, and political loyalists - provides the structure through which Kornilov’s authority can be formalized and extended."
RUS_Osoboye_Soveshchanie_tt: "President §HLavr Kornilov§! will be proclaimed the §CSupreme Ruler of Russia!§!"

## Wrangel Tree ##
RUS_Black_Baron_In_Command: "The Black Baron in Command"
RUS_Black_Baron_In_Command_desc: "Wrangel has united the ruins of a shattered nation. His military discipline, aristocratic dignity, and spiritual resolve have made him the figure around which all Russian patriots now rally. But Russia still wavers between past and future-our destiny must be forged now."

RUS_Order_Before_Liberty: "Order Before Liberty"
RUS_Order_Before_Liberty_desc: "Wrangel’s rule begins from a principle that liberty cannot survive where order has collapsed. The old republican slogans promised rights, but they could not preserve the state that made those rights possible. Russia has paid too dearly for abstract freedoms defended by weak hands and broken institutions. Before the nation can speak of constitutional life, it must first recover discipline, obedience, and the authority of the state. The task before Black Baron is not to abolish liberty, but to place it properly - after stability, after unity, and after the triumph of the state over the chaos that nearly destroyed it."
RUS_Prevent_Another_Popular_Front: "Prevent Another Popular Front"
RUS_Prevent_Another_Popular_Front_desc: "While Commander Kornilov did much good for our case, he certainly did not go far enough in combating the red rot, acting like miasma on our Motherland. It is only logical that with the renewed import of proper Western models worth emulating the degenerated ones have to be combated. And thus any party advocating for policies which can be considered socialistic, a vile West-spawned ideology, have to be immediately removed from the political life of our nation."
RUS_Cooperate_With_VNS: "Cooperate With the VNS"
RUS_Cooperate_With_VNS_desc: "The leader of the All-Russian National Union, Vasiliy Shulgin, has long been a friend of the Black Tsar, with some even claiming that he himself floated the idea of Baron Wrangel being crowned as a new Tsar if an eventual restoration was to happen. The VNS is the most powerful conservative party across all of our Motherland, holding great sway among the aristocratic elite of our nation. We cannot waste the opportunity of garnering their support for our restored Empire."
RUS_Purify_The_Bureacracy: "Purify the Bureaucracy"
RUS_Purify_The_Bureacracy_desc: "No regime can endure if the offices of the state remain inhabited by men who serve only their own advantage, their old political loyalties, or the faint hopes of socialism. The Russian bureaucracy has been weakened by years of corruption and hesitation. The government of the Supreme Ruler shall ensure removing of unreliable officials, ending old patronage networks, and replacing them with disciplined men who understand that public office is a duty rather than a privilege."

RUS_One_Scepter_One_Sword: "One Scepter, One Sword"
RUS_One_Scepter_One_Sword_desc: "Russia cannot survive a future in which authority is split between rival centers of power. And the Zemsky Sobor clearly showed that the sword and the scepter must not stand in opposition to one another. Our officer-Tsar will ensure that command, law, and sovereignty remain fused into one indivisible structure of the restored Monarchy."
RUS_Knight_Of_The_White_Idea: "Knight of the White Idea"
RUS_Knight_Of_The_White_Idea_desc: "The actions, dedication, and deep sense of purpose behind every decision taken by our new Tsar while he commanded the anti-Bolshevik forces have ingrained themselves among the lower strata of our military. There is not a day during which an unsure junior officer does not ask himself 'If Baron Wrangel was here, what would he do?'. Such a legacy is important in ensuring the new army of the Tsardom is not only fanatically loyal to their monarch, but also competent in every mission it is tasked with."
RUS_Retain_Supreme_Command: "Retain Supreme Command"
RUS_Retain_Supreme_Command_desc: "Russia has not yet reached the point where its future can be entrusted to dynastic speculation, parliamentary ambition, or ceremonial gestures. Until the state is fully secured, Wrangel must remain the unquestioned head of government and military authority alike. We will ensure that the government remains anchored to the realities of discipline and security."

RUS_Black_Tsar: "The Black Tsar"
RUS_Black_Tsar_desc: "Before our former Commander-in-Chief Lavr G. Kornilov died, he named Pyotr Nikolayevich Wrangel as his designated successor. The 'Black Baron', as he is called, decided that the Romanvos cannot be trusted in restoring the true glory of the former Empire and thus crowned himself as the 'Black Tsar' Pyotr IV. He shall set his sight on restoring the legacy of Tsar Pyotr I, whose name was sullied by the reign of the incompetent Peter III."

RUS_rovs_wrangel_more_5: "§cWrangel§!'s ambitions are greater than §Y5§!"
RUS_rovs_wrangel_more_8: "§cWrangel§!'s ambitions are greater than §Y8§!"

RUS_The_Sword_Bows_To_The_Crown: "The Sword Bows to the Crown"
RUS_The_Sword_Bows_To_The_Crown_desc: "The soldiers and officers who carried the nation through civil war have fulfilled their task; now their duty is to yield precedence to the sovereign order they fought to preserve. As the Zemsky Sobor was convened, the legitimate Russian monarch is finally to ascend the throne. The military remains essential to the state, yet it must serve rather than govern, binding itself to a renewed monarchy that can provide Russia with permanence."
RUS_Guided_Reformism: "Guided Reformism"
RUS_Guided_Reformism_desc: "Russia cannot remain frozen in the habits of emergency forever, yet neither can it be handed over to reckless reformers who mistake disruption for progress. With a controlled modernization of the state, industry, administration, and social life under the close supervision of the Black Baron and his government we will make Russia more capable, more organized, and more productive, but never at the expense of stability, tradition, or the state’s commanding role."
RUS_Imperial_Directive_Bureau: "Imperial Directive Bureau"
RUS_Imperial_Directive_Bureau_desc: "The Imperial Directive Bureau will be created, fusing civilian administration and military oversight into a single instrument of governance under the Emperor."
RUS_Republican_Shadows_Exposed: "Expose the Republican Shadows"
RUS_Republican_Shadows_Exposed_desc: "The republican opposition has not vanished with the defeat of open revolution. But our government will no longer treat these currents as harmless dissent. The republicans call their cause freedom, but it is only a shadow politics that must be confronted with firmness."
RUS_The_Loyal_Senate: "The Loyal Senate"
RUS_The_Loyal_Senate_desc: "The new Senate offers a way to root the new regime in the surviving institutions of the old order. We will increase the number of the Senators, appointed directly by [ROOT.GetLeader] and secure the loyalty of our upper chamber, turning it into a dependable pillar of government."
RUS_The_Loyal_Senate_tt: "\n£white_dot The number of §Gappointed by [ROOT.GetLeader]§! senators has been increased to §Y75§!\n\n£white_dot The number of §Gregional§! senators has been reduced to §Y25§!"

RUS_Church_And_Saber: "Church and Saber"
RUS_Church_And_Saber_desc: "Orthodoxy is the spiritual soul of Russia, and the saber its temporal strength. Both institutions must be restored - blessed by the Patriarch and guarded by the general staff."
RUS_Zemskaya_Reform: "Zemskaya Reforma"
RUS_Zemskaya_Reform_desc: "Russia’s land question has never been only an economic problem; it is the deepest source of unrest in the countryside and one of the oldest wounds in the nation’s body. Civil War, requisition, and redivision have shattered confidence between peasant and state, while the old patterns of ownership no longer correspond to the needs of a modern and embattled Russia. Wrangel’s reform seeks a disciplined reconstruction of rural life: consolidating holdings where possible, rewarding productive cultivation, defining property more clearly, and reducing the conditions under which revolutionary promises can take root. The goal is to create a peasantry that is no longer a permanent reservoir of resentment, but a stable foundation for the state - invested in its own labor, and less vulnerable to agitators who feed on poverty and disorder."

RUS_Honor_The_Loyalists: "Honor the White Veterans"
RUS_Honor_The_Loyalists_desc: "The sacrifices of the White officers were not symbolic. They bled, marched and held lines. Those who stood by the White cause must be recognized not only with medals and ceremonies, but with influence, advancement, and a real place in the new order."
RUS_Unbroken_Command: "The Unbroken Command"
RUS_Unbroken_Command_desc: "The army is not merely one institution among many: command must remain unified, clear, and beyond civilian interference. The Black Baron will refuse any arrangement that would weaken the chain of military authority or allow political factions to intrude upon strategic decisions. The forces that defended Russia must remain disciplined, loyal, and prepared to act without hesitation. Strength begins with command that cannot be divided."

RUS_Autonomy_For_Cossacks: "Wide Autonomy for the Cossack Provinces"
RUS_Autonomy_For_Cossacks_desc: "The Cossacks have time and again proven themselves to be the most loyal of the subjects of our great Tsars. They have bravely served on every front in which Russia called for their aid, and thus they deserve to retain the rights given to them by the old Tsardom. We should ensure that they can gather in autonomous hosts across our territory in an effort to ensure their continued support."
RUS_The_National_Syndicate: "The National Labor Charter"
RUS_The_National_Syndicate_desc: "The workers of Russia must be offered not socialist illusion, but a disciplined and dignified place within the national order. The National Labor Charter will define that place by recognizing the necessity of labor rights while rejecting class war, strikes, and revolutionary organization as tools of political sabotage. Through state arbitration, regulated wages, obligations for employers, and strict limits on industrial unrest, we will make labor a managed component of national strength."


RUS_Teutonic_Discipline: "Teutonic Discipline"
RUS_Teutonic_Discipline_desc: "Peter von Wrangel, born into a Baltic German nobility, is but one among the countless of his group who have served dutifully under the old Tsardom and contributed to its successes. The population of the former Gubernias in what is today the abomination of 'United Baltic Duchy' still holds much loyalty to the institution of the Russian Crown, just as Wrangel's own father Nikolay did as the adjutant to the Grand Duke Michael Alexandrovitch. Let us take inspiration from their strong and disciplined outlook, and instill their positive values into the wider swathes of the Russian population."

RUS_Stratocratic_Government: "Stratocratic Government"
RUS_Stratocratic_Government_desc: "While the work accomplished thus far by the [GetROVSParty] administration is admirable, the dead Republic was merely controlled and somewhat governed by military commanders. The new Empire cannot allow itself to fall into the traps of the bureaucratism of the old system, it has to be run like an actual armed force. The entire Imperial system shall be shaped according to the principles governing stratocratic regimes."

RUS_Guardians_of_the_Russian_Spirit: "Guardians of the Russian Spirit"
RUS_Guardians_of_the_Russian_Spirit_desc: "The liberal-leftist zealots have broken the spirit of our once proud nation, yet thanks to his our predecessor's government the process of restoring true values in Russia has already begun. With the increased control of the military over the entirety of cultural and political life, the future generations shall be educated in the great values held by the White Army. The Russian people are defined by their deep faith, their strong sense of duty, and their love for the land. We must protect this unique Russian spirit by ensuring that our people live by the principles of the Church and the State."
RUS_Gendarme_of_Europe: "Gendarme of Europe"
RUS_Gendarme_of_Europe_desc: "The first War, for if our Motherland is to be restored in fullness there is bound to be another titanic struggle between the forces of order and chaos, mutilated Russia beyond comprehension. The lands held by the old Empire have broken themselves from their eternal oaths, deluded by the lies told to them by German-backed revolutionaries and opportunists. We ought to focus our attention on enshrining the idea of revanchism into the official doctrine of our state. By following in the footsteps of his brother Alexander I, Tsar Nicholas I dealt with upstart revolutionary movements threatening the stability of the entire continent with great haste and ruthlessness. Such dedication earned him the nickname of the 'Gendarme of Europe. ' Pyotr IV shall follow his example, and set his sights against the dark heart of all the future revolutions, France; the birthplace of communism and modern warped royalism, Germany; and the sick man among all the monarchies, torn by ethnic and socialistic strife, Austria."


## Denikin Tree ##
RUS_The_Peasant_Marshal_Reign: "Reign of the Peasant Marshal"
RUS_The_Peasant_Marshal_Reign_desc: "With the passing of our Commander-in-Chief, Lavr G. Kornilov, Anton Denikin utilized his popularity among the common people of Russia and also rallied his supporters to ensure that his position as the official successor of our previous President remains undisturbed. With his ascensions to the highest offices, the shape of our Republic may yet return to a form acceptable to the old forces represented by the Duma, of course under our terms. Denikin assumes the mantle of Supreme Ruler and pledges to uphold Kornilov's legacy while charting a pragmatic course."

RUS_In_The_Shadow_Of_Marshal: "In the Shadow of Kornilov"
RUS_In_The_Shadow_Of_Marshal_desc: "Denikin’s position has always been shaped by the legacy of the Marshal who raised him to prominence. Kornilov’s name still carries weight among officers, veterans, and those who see in the civil war’s harshest years the birth of Russia’s renewed strength. To acknowledge that legacy is not only a matter of respect, but of political survival. Denikin must present himself as the continuation of the same struggle: disciplined, patriotic, and determined to preserve the state against both revolution and fragmentation. Yet he must also show that he is more than a caretaker living beneath another man’s shadow. By embracing Kornilov’s supporters without surrendering his own authority, Denikin can inherit the White cause while making it his own."
RUS_Supreme_Command_Retained: "Supreme Command Retained"
RUS_Supreme_Command_Retained_desc: "The Russian state remains too fragile to allow the military to drift into divided loyalties or civilian interference before its foundations are secure. Denikin therefore believes he should keep direct command of the armed forces, preserving the unity of discipline that made the White victory possible in the first place."

RUS_Court_The_General_Staff: "Court the General Staff"
RUS_Court_The_General_Staff_desc: "The current task of the Supreme Ruler is to draw the General Staff's officers closer, reassuring those who remember Kornilov’s authority while offering a respectable path to officers whose sympathies lean toward monarchy or other forms of order. The army’s senior men must be made to see that the state they defend will reward service, preserve hierarchy, and continue the White struggle in a form they can respect."
RUS_Rally_The_Republicans: "Rally the Republicans"
RUS_Rally_The_Republicans_desc: "The White movement did not emerge from military discipline alone, but from the collapse of a state that many still hoped could be restored without surrendering the idea of representative government. Denikin understands that this memory still matters to bureaucrats, moderates, and conservatives who accepted the republic as a lesser evil compared to chaos. By rallying the republicans, we can build a broader political base, reassure administrators that they need not fear immediate reaction, and present our rule as a continuation of lawful Russia rather than a permanent coup."

RUS_Consult_The_Duma: "The Voice of the People"
RUS_Consult_The_Duma_desc: "The Duma is an essential institution of Russia and its democracy, allowing the entire Russian people to express their will through representatives of different parties using the vote. Denikin is not a dictator and is well aware of his people's attachment to democracy and the Duma, and has therefore decided to restore this essential assembly, although full democracy can only return to Russia when the situation is suitable for such a restoration, we can be sure that the Marshal will restore democracy when the necessary conditions are met."
RUS_Rehabilitation_of_the_Constitution: "Rehabilitation of the Constitution"
RUS_Rehabilitation_of_the_Constitution_desc: "A constitution that has been ignored, suspended, or rewritten by crisis loses not only force but meaning. Russia must decide what parts of the old legal order still deserve to stand, and which must be adapted to the new realities. We can reassure moderates, define the limits of authority, and give civil government a framework that does not depend entirely on emergency decrees."

RUS_Civil_Administration_Reform: "End the Rule of Generals"
RUS_Civil_Administration_Reform_desc: "Revolutionary ferment has made the military indispensable, but it has also allowed soldiers to occupy responsibilities that should, in a healthier state, belong to civilians. Reforming the civil administration means rebuilding the competence of the state from the ground up: professionalizing officials, limiting the arbitrary reach of military authorities, and restoring the distinction between strategic necessity and ordinary governance."

RUS_Convene_The_Council_Of_The_Republic: "Convene the Council of the Republic"
RUS_Convene_The_Council_Of_The_Republic_desc: "If Russia is to emerge from emergency rule without collapsing into another cycle of coups and improvisation, a broader constitutional framework must be prepared. The Constitutional Council of the Republic provides a forum where the nation’s political, social, and administrative forces can participate in shaping a new settlement"

RUS_A_President_For_All_Russia: "A President for All Russia"
RUS_A_President_For_All_Russia_desc: "The state requires more than a commander; it requires a figure capable of speaking in the name of the whole nation. The Supreme Ruler could stabilize the state, but not unite people. Anton Ivanovich should become the provisional - and transitional president, ensuring that the Russian state returns to democracy."


RUS_Reaffirm_Emergency_Powers: "Reaffirm Emergency Powers"
RUS_Reaffirm_Emergency_Powers_desc: "Emergency rule is never intended to be permanent, yet Russia remains beset by enemies too numerous and too determined to pretend that normal governance is already possible. By reaffirming emergency powers, Denikin will confirm that the state will not relax its guard simply because the most immediate danger has passed."

RUS_Neutralize_The_Monarchist_Threat: "Neutralize the Monarchist Threat"
RUS_Neutralize_The_Monarchist_Threat_desc: "Not all threats to the state come from the left. Among the monarchist circles that once supported White order, some now imagine that the restoration of Russia must be accelerated by pressure, intrigue, or force. Men such as Anton Turkul and their more radical allies can easily become a danger if allowed to believe that their own designs stand above the needs of the state. Monarchism may remain part of Russia’s political future, but it cannot be allowed to become a private army’s excuse for rebellion."


RUS_Strength_Through_Order: "Strength Through Order"
RUS_Strength_Through_Order_desc: "The years of revolution have shown what happens when authority is fragmented. We must continue tying military discipline, administrative coherence, and political restraint into a single state philosophy. A nation that cannot maintain order cannot win wars, govern provinces, or defend its own legitimacy."
RUS_The_Supreme_Rulership_Act: "The Supreme Rulership Act"
RUS_The_Supreme_Rulership_Act_desc: "Exceptional times require exceptional authority to be defined, not merely exercised. The Supreme Rulership Act gives legal form to Anton Ivanovich's position, consolidating powers that were once justified only by necessity and emergency."

RUS_The_Military_Oath_Fulfilled: "A Solemn Oath to Russia"
RUS_The_Military_Oath_Fulfilled_desc: "Victory has not erased the burden of command, but it has at last given us the opportunity to define the place of the military in the restored Russia. Having carried the military struggle through to its conclusion, Anton Ivanovich can now fulfill the oath that bound him to the nation in its darkest hour."

RUS_Peasant_Land_Commissions: "Peasant Land Commissions"
RUS_Peasant_Land_Commissions_desc: "Limited land reform via military tribunals to avoid peasant unrest. The Peasant is the backbone of the State and will lead Russia into a new age. To bring prosperity to the peasant is to bring prosperity to the Russian nation. Agricultural Reforms and Tax cuts will help the farmer to increase crop yield and play his part in building our great nation into a superpower. Mechanization and modernization of equipment and farming techniques will radically increase our food exports and help us stabilize our economy in these troubled times. If the masses are prospering, slowly but surely, the higher classes will begin to feel this wonderful effect and our whole nation will move forward as one into the future. Perhaps we may not see the effects of this but our children will surely enjoy the fruits of our toils."
RUS_Order_In_The_Workshops: "Order in the Workshops"
RUS_Order_In_The_Workshops_desc: "The Desocialization of the Unions is an idea proposed by Denikin to further stabilize our nation and to protect the republic from 'Bolshevik radicals' who wish to halt our walk towards a democratic state under the guidance of our great leader. We will ban all unions related to the leftist radicals and will use the hammer of the state to crush those who dare defy our rules. Though there may be discontent among the masses, we shall enlighten and guide them to the unions related to those who swear allegiance to the vision of our great leader."

RUS_Army_Above_Politics: "The Army Above Politics"
RUS_Army_Above_Politics_desc: "Our soldiers are warriors, not politicians. To keep the military focused on its mission, we will forbid officers from holding civilian office or party positions. The General Staff alone shall advise the Supreme Ruler."
RUS_Legacy_Of_Kornilov: "The Legacy of Kornilov"
RUS_Legacy_Of_Kornilov_desc: "The Volunteer Army which was crucial in defeating the Bolshevik menace and ultimately saving Russia from certain doom was organized by none other than Marshall Denikin in the Southern regions of Russia. Many good men were forced to flee those territories in the post-war border shifts, men who have proven their valour as dutiful soldiers in the White Army. We should draw on their loyal work for the Motherland and put their experience to good use."

RUS_Anti_Speculation_Laws: "Anti-Speculation Laws"
RUS_Anti_Speculation_Laws_desc: "The return of free trade will invigorate the economy. By setting fixed prices for agricultural products and passing laws to punish speculation, we can stabilize the food markets and ensure that resources flow to where they're needed most."
RUS_Defending_The_Russian_Order: "Defending the Russian Order"
RUS_Defending_The_Russian_Order_desc: "As cities return to normalcy, we must ensure law and order prevails. Rebuilding the justice system and courts will help us ensure the rule of law is respected and political freedom is protected for those loyal to the new Russia."

RUS_Supress_Cossack_Federalists: "Suppress the Cossack Federalists"
RUS_Supress_Cossack_Federalists_desc: "The Cossacks have proven to be a powerful force in Russia's history, but they must remain loyal to the central government. We will suppress any attempts at autonomy in the Cossack regions, and ensure that the unity of Russia is preserved at all costs."
RUS_The_End_Of_The_Red_Threat: "The End of the Red Threat"
RUS_The_End_Of_The_Red_Threat_desc: "While we work to rebuild the state, we must ensure that the Bolshevik threat is eradicated. Any remnants of revolutionary movements will be hunted down and crushed to preserve the unity of Russia."

RUS_True_Patriot_Motherland: "True Patriot of Motherland"
RUS_True_Patriot_Motherland_desc: "With the reconstruction of the Russian state complete and internal threats neutralized, we can now look toward a future where a strong, unified Russia leads the world. The republic is restored, but only under the guidance of a strong president, as Anton Ivanovich Denikin's leadership continues to solidify Russia's place on the global stage. Whether it's continuing to battle Bolshevism or reclaiming lost territories, Russia's destiny is one of strength, unity, and decisive leadership. The nation will rise once more as a beacon of order, justice, and Russian pride."

## Drozdovsky focus tree ##
RUS_Drozdovsky_Takes_Over: "The Rise of Drozdovites"
RUS_Drozdovsky_Takes_Over_desc: "Treasonous generals had planned to betray the very Idea of White Movement. They were plagued with desire of power and had planned to establish a plutocratic oligarchy to continue torturing of land that is our Motherland. Well, no more."
RUS_Twilight_Of_The_Republic: "The Night of the Crimson Epaulettes"
RUS_Twilight_Of_The_Republic_desc: "Kornilov is dead, the republic is spent, and Russia stands once more on the edge of an abyss. In the mourning black of Petrograd, beneath the crimson shine of old officer epaulettes, a new order rises out of silence. The time of hesitation has ended. The night belongs to those who will seize the dawn."
RUS_Rally_The_Monarchists: "Rally the Monarchists"
RUS_Rally_The_Monarchists_desc: "We aren't the only monarchist movement in Russia. There are numerous monarchist organizations and parties, but alas they all are divided and have no will to unite against threats that come from all sides on us. Perhaps, we could approach largest monarchist movements and suggest them a merge?"
RUS_To_Save_The_Holy_Rus: "To Save the Holy Rus"
RUS_To_Save_The_Holy_Rus_desc: "The decision was made, and we are obliged to make a genuine effort in order to bring our dream of monarchist coalition into reality."

RUS_National_Restoration_Regime: "National Restoration Regime"
RUS_National_Restoration_Regime_desc: "We don't want the power. We don't want to rule over people like it's nothing. Our Regime is temporal, until Russia is safe from enemies both external and internal."
RUS_Crush_Non_Predetermination: "Formulate the White Idea"
RUS_Crush_Non_Predetermination_desc: "The White Cause was never meant to be a jumble of half-measures, committees, and excuses. Russia must be given a firm idea again: duty over decadence, hierarchy over chaos, faith over abstraction."
RUS_Knights_Of_Crown_Of_Throns: "Knights of Wreath of Thornes"
RUS_Knights_Of_Crown_Of_Throns_desc: "Not all who kneel to the Crown are courtiers. Some serve as warriors, as penitents, as guardians of a wounded throne waiting to be restored. Their wreath is of thorns, not laurels: a sign that loyalty in Russia is not reward, but sacrifice."
RUS_Total_Mobilization: "Total Mobilization of the Spirit"
RUS_Total_Mobilization_desc: "Russia cannot be remade by decrees alone. The body of the nation, its spirit, its labor, its army, and its conscience must all be thrown into one sacred effort. Every parish, every barracks, every workshop must beat in time with the same iron purpose."


RUS_Against_Three_Revolutions: "Against the Two Revolutions"
RUS_Against_Three_Revolutions_desc: "Russia has suffered not one revolution, but a chain of them: the first betrayal of order, the second betrayal of faith, and the final betrayal of the nation itself. The Drozdovites do not intend to merely survive these storms. They mean to erase their legacy."
RUS_Settle_Our_Scores_With_Socialists: "Destroy the Legacy of October"
RUS_Settle_Our_Scores_With_Socialists_desc: "Our mortal enemies, the socialists, are on the run. This time we won't repeat the mistake we made 17 years ago. Now all traitors will be shot."
RUS_Smash_Liberalism: "Smash the Values of February"
RUS_Smash_Liberalism_desc: "The very existence of the Parliament with all these speeches and talks has nothing to do with real politics. Disband them, they should spend their time more productive."

# Faith and Discipline
RUS_By_Cross_And_Sword: "By Cross and Sword"
RUS_By_Cross_And_Sword_desc: "God grips me with strength and makes me the right way; he makes my feet like a deer's, and in my heights he sets me up; my hands teach how to fight, and my muscles break the brazen bow. Thou hast given me the shield of Thy salvation, and Thy right hand sustains me, and Thy mercy magnifies me. You widen my step under me, and my feet do not hesitate."
RUS_The_Cult_Of_The_Fallen: "The Cult of the Fallen"
RUS_The_Cult_Of_The_Fallen_desc: "The dead of the Civil War are not forgotten. They are the martyrs whose blood sanctified Russia’s return from ruin, whose graves mark the road from chaos to order. Their memory will not be left to mourning alone, but raised into a civic faith of duty, sacrifice, and eternal vigil."
RUS_Iron_Will: "Iron Will"
RUS_Iron_Will_desc: "Our will and Russian spirit are the reason we defeated all of our enemies in the past. Let us defeat them again, for our will is iron-forged like none other. We shall not break in defence of our Motherland!"
# Russian Idea Reborn
RUS_Regency: "The Perpetual Regency"
RUS_Regency_desc: "The Romanov House is divided, the question of the Crown unresolved, and Russia cannot remain leaderless. Until the nation and the Sobor decide who is fit to wear the Imperial burden, General Drozdovsky shall bear the country’s authority as Regent, the guardian of the throne’s future."

RUS_The_Officers_State: "The State of Order"
RUS_The_Officers_State_desc: "The officer is not merely a man of war. He is the disciplined spine of the nation, the living proof that hierarchy can still exist without corruption. If Russia is to be saved, then the state must be shaped in the image of its best sons: strict, dutiful, and unbending."
RUS_The_Code_Of_Service: "The Code of Service"
RUS_The_Code_Of_Service_desc: "Every rank must know its place, every servant of the state its obligation, every citizen his burden. Service is no longer a matter of sentiment or privilege, but the moral law of the revived Russia. Those who refuse discipline shall be taught it by the state."

RUS_Crown_And_Sword: "Crown and Sword"
RUS_Crown_And_Sword_desc: "The Regency has served its purpose. The throne can no longer remain empty, and Russia can no longer live under exception. Let the Crown return — it shall stand beside the Sword, guarded by the men who preserved the realm when others merely argued over it."

RUS_Symphony_Of_Authority: "Symphony of Powers"
RUS_Symphony_Of_Authority_desc: "The state, the Church, the army, and the crown must no longer compete like rival voices in a broken choir. They must move as one, each lending strength to the other, each restrained by a common purpose. Only then can Russia’s authority become something more than force: it can become harmony."
RUS_Empire_Of_Spirit: "Empire of the Spirit"
RUS_Empire_Of_Spirit_desc: "The new Russia will not be built only of ministries, regiments, and decrees. It will be built of belief: in sacrifice, in discipline, in sacred inheritance, and in the destiny of the nation. Where the old empire ruled by habit, the restored Russia shall rule by spirit."

RUS_National_Unity: "In the Name of National Unity"
RUS_National_Unity_desc: "During hard times, Russian nation does what it does the best to win - it unites and becomes as solid as a rock. We are united and united we are invincible."
RUS_Cultural_Awakening: "Our Cultural Awakening"
RUS_Cultural_Awakening_desc: "With no obstacles made by Liberals or Socialists, the Russian Culture prospers! Every day there is a piece of art being made, a painting or a symphony. Our task as a state of Russian People is to promote the Great Russian Art among our own population and abroad."
RUS_Legacy_of_Minin: "Legacy of Minin"
RUS_Legacy_of_Minin_desc: "Kuzma Minin was just an ordinary merchant in Nizny Novgorod, but when his country was in danger, he sold all that he had and put his money into the creation of a Popular Militia. It was that Militia that had liberated Moscow from the hands of Poles and eventually made the return of Tsar's authority in Russia. During these hard times we're in now, our citizens of all classes won't hesitate to help Russia."
RUS_Young_Drozdovites: "Uplift the Young Drozdovites"
RUS_Young_Drozdovites_desc: "The education of younger generations is the most important task for our regime. These kids are the bricks we lay in the foundation of Russia. The future of Russia depends on them."

RUS_Unconditional_Private_Property: "Restoration of Property Rights"
RUS_Unconditional_Private_Property_desc: "Returning rights to the rightful owners (or their heirs) is not the only way to restore market mechanism, destroyed by years of SR rule, but also an act of moral justice. While we understand that "returning everything to the way it was in 1913" is not possible, we have to accept compensation and government regulation during the transition period."
RUS_Strong_Peasant_Owner: "Bring Up the Peasant-Owners"
RUS_Strong_Peasant_Owner_desc: "The land should belong to those who cultivate it. We must destroy the remnants of rural Obschina and raise support for small and medium-sized enterprises."
RUS_National_Labor_Corporations: "The Organic State"
RUS_National_Labor_Corporations_desc: "Society is not divided into classes, but into corporations of different professionals, like engineers, workers, farmers, and doctors. All strikes and lockouts will be considered crimes against the nation, as all disputes will be resolved by state arbitration. What is more, we must introduce social guarantees for the workers."



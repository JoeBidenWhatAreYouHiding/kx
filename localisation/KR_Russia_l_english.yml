RUS_council_of_the_republic_cat_desc: "In accordance with his pledge to initiate democratic reforms, §gAnton Denikin§! promulgated a decree instituting the §HConstitutional Council of the Republic§!. This advisory and preparatory body is tasked with laying the groundwork for constitutional transformation and a gradual transition back to civilian governance.\n\nAnd while the §HCouncil of the Republic§! is working to draft a new constitution for our state, which will lay the foundations for a new, strong Russia without revolutions and strikes, various parties are striving to make this future their own.\n\nIn order for the drafting of the constitution to be successful, we need to control the pressure from the §hMonarchists§!, demanding the return of the Tsar, please the §Gpublic mood§!, which expects rapid changes, and prevent the collapse of the §P[GetROVSParty]§! support.\n\n§hMonarchist§! pressure: [?RUS_rovs_wrangel|H0]\n§GPublic§! confidence: [GetVVSRPublicConfidence]\n§P[GetROVSParty]§! cohesion: [?RUS_vvsr_rovs_unity|%H0]"


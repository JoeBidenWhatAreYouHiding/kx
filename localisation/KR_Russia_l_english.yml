### Modifiers ###
RUS_invested_good: "Invested in us"
RUS_invested_bad: "Refused investments"

### Army Spirits ###
stavka_legacy: "Legacy of the Stavka"
stavka_legacy_desc: "No matter how much we reform our military, certain ideas and doctrines still pervade from the Weltkrieg."

### Companies ###
## Industrial ##
putilov: "OPZ"
putilov_desc: "A large conglomerate, the Society of Putilov Factories, unites seven metallurgical enterprises of Russia. While the Weltkrieg brought both large ammunition and equipment orders to the OPZ, it also brought strikes, corruption and sequestration. Nationalized and bankrupt, the OPZ was almost doomed, if not for the new government, that brought back the network of factories, that produce a variety of locomotives and small arms."
putilov_RUS: "Industrial Conglomerate"

russko_baltiisky: "Russo-Balt"
russko_baltiisky_desc: "Originally set up in the Baltic pearl of Riga, the factory found itself evacuated to Petrograd and Moscow following the Great War and has since consolidated itself as a producer of aircraft, automobile and locomotive products. Despite the loss of some aircraft factories in the late 20s, they are still considered one of the main conglomerates in Russia."
russko_baltiisky_RUS: "Industrial Company"

ird: "IRD"
ird_desc: "Formed from the Group for Research of Reactive Movement and Gas-Dynamic Laboratory in 1933, the Institute of Reactive Movement gathers progressive scientists who strive for the development of reactive technologies such as Tikhonravov, Langemak, Kleymyonov, Keldysh, and many others."
ird_RUS: "Jet Company"

treugolnik: "Treugolnik"
treugolnik_desc: "Nestled in the western half of Petrograd, the Partnership of the Russian-American Rubber Manufactory 'Triangle' had mostly occupied a small niche in the vast Russian economy, but ever since the early 1900s grew to establish itself as one of the main rubber-producing factories despite previous years of hardship."
treugolnik_perm_effect_tt: "§CThis effect is permanent when the company is hired.§!"

ppi: "Politekh"
ppi_desc: "The Petrograd Polytechnic Institute was founded in 1899 as an engineering school and has since then come a long way. Greatly expanded in recent decades, PPI is the biggest Russian technical university with more than 10,000 students and 3,000 employees working in many laboratories and research facilities."

mps: "MPS"
mps_desc: "The Russian Ministry of Communication Routes is managing the activities of railway and other transport. Focusing their efforts mainly on railroads which were nationalised after the Russian Civil War, the Ministry also manages standards for more mundane roads and ports."

robtit: "ROBTiT"
robtit_desc: "Greatly damaged during the Russian Civil War by Bolshevik nationalisation and later by the Vilnius agreement, the Russian Society of Wireless Telegraphs and Telephones saw rebirth in recent years when it became a subsidiary of the German Braun AG. Although by 1936 the ROBTiT leadership almost concluded the process of becoming independent once again."

branobel: "Branobel"

neft: "RO Neft"
neft_desc: "If there was to be an entity that encompasses the chaotic period that Russia experienced after the Weltkrieg then Russian Society 'Neft' would not be a poor choice. While the assets of other two large oil concerns - Lianozov Sons and Branobel were seized in Baku or sold, the oil field would come to be jointly owned by American companies following the initial lack of capital investment, later changing ownership to German BASF during the chaotic period of the American Depression. Despite the almost constant change in ownership, the Second Baku nonetheless stands as one of the more successful projects built in the past decade."
neft_improved_tt: "§CHaving this company hired will increase oil gained from extraction decisions.§!"

rgoc: "Russian General Oil Company"

zlatoust: "ZOF"
zlatoust_desc: "Founded in the beginning of the 19th century, the Zlatoust Arms Factory has been the only enterprise that provided the Russian Army with cold steel arms. The factory was not severely damaged during the Russian Civil War, but since 1927 the War Ministry has sent many orders for supporting the army with equipment."

izjevskij_mekhanitsjeskij: "IMZ"
izjevskij_mekhanitsjeskij_desc: "Awarded numerous government contracts, extensive funding, and state advertising due to its participation on the side of the Whites in the Russian Civil War, the Izhevsk Arms Factory was greatly modernised in the last several decades was greatly modernised by the creation of several new workshops and merging with smaller plants. As a consequence of its expansion, the factory was recently renamed the Izhevsk Mechanical Factory."
izjevskij_mekhanitsjeskij_RUS: "Infantry Equipment Manufacturer"
izjevskij_mekhanitsjeskij_improved_RUS: "$izjevskij_mekhanitsjeskij_RUS$"

sestroretskiy_oruzheynyy: "SOZ"
sestroretskiy_oruzheynyy_desc: "The home factory of Mosin, Fyodorov, and his protégé Degtyaryov, the Sestroretsk Arms Factory had a troubled history. Almost going bankrupt in the 1920s, the factory survived only through help of the War Ministry and merging with Kovrov Machinegun Factory. Now, under the leadership of the young and promising Vasily Degtyaryov, SOZ is trying to adjust to new times with its new specialisation in automatic weapons."
sestroretskiy_oruzheynyy_RUS: "Infantry Equipment Manufacturer"
sestroretskiy_oruzheynyy_improved_RUS: "$sestroretskiy_oruzheynyy_RUS$"

tulsky_oruzheiny: "TOZ"
tulsky_oruzheiny_desc: "The oldest arms factory in Russia, the Tula Arms Factory maintains a big pool of specialists and large production capabilities. Producing armaments from revolvers to automatic cannons, TOZ is home to one of the brightest engineers of modern Russia: Fyodor Tokarev."
tulsky_oruzheiny_RUS: "Infantry Equipment Manufacturer"
tulsky_oruzheiny_improved_RUS: "$tulsky_oruzheiny_RUS$"

gosudarstvennyy_obukhovskiy: "[RUS_Dynamic_Obukhov_Name]"
gosudarstvennyy_obukhovskiy_non_socrus: "Obukhov"
gosudarstvennyy_obukhovskiy_socrus: "GOZ"
gosudarstvennyy_obukhovskiy_desc: "The Petrograd Arms, Optics and Steel Factory 'Obukhov' was privatised several years after the end of the Russian Civil War, but still remains closely connected to the Maritime and War Ministries, taking the bulk of its contracts from them. Specialising in several areas, Obukhov is also home to the tank designers of the Society of Inventors, who provide their services to the War Ministry."
gosudarstvennyy_obukhovskiy_RUS: "Artillery Manufacturer"

motovilikha: "Motovilikha"
motovilikha_desc: "Privatised after the end of the Russian Civil War, the Motovilikha Factories were reconstructed in the early 1930s to match modern standards. It is one of the biggest producers of artillery systems in Russia, but also produces civilian goods such as tractors and engines."
motovilikha_RUS: "Artillery Manufacturer"

nizhegorodsky_avtomobilny: "[RUS_Dynamic_NAZ_Name]"
nizhegorodsky_avtomobilny_non_socrus: "NAZ"
nizhegorodsky_avtomobilny_socrus: "GAZ"
nizhegorodsky_avtomobilny_desc: "Created in Nizhny Novgorod in 1929 as a private enterprise, the Nizhny Novgorod Automotive Factory soon became one of the main car producers in Russia thanks to government support. Heavily influenced by Ford designs, NAZ cars are considered to be reliable mass-produced machines."
naz_RUS: "Mechanised Equipment"
naz_improved_RUS: "$naz_RUS$"

sormovo: "Sormovo"
sormovo_desc: "Founded in 1849, the Sormovo factories produce everything from ships and trains to tractors and tanks. Nationalised in 1918, the Society of Sormovo factories was privatised again in 1922 with the end of the Russian Civil War. Carried through the economic crisis of 1925 and granted government contracts following that economic turmoil Sormovo is now mainly known for its rising stars Koshkin and Morozov and their BT line of tanks."
sormovo_RUS: "Tank Manufacturer" 
sormovo_improved_RUS: "$sormovo_RUS$" 

uralmash: "UZTM"
uralmash_desc: "Created thanks to recent efforts of the government, the Urals Heavy Machinery Factory is a whole city near Yekaterinburg with its own park, residential area and, of course, the biggest machine-building factory in the Urals. One of the many departments inside UZTM is the armament department led by promising young engineers."
uralmash_RUS: "Tank Manufacturer"
RUS_uralmash: "Uralmash"
RUS_uralmash_desc: "The Ural Heavy Machinery Factory is one of the largest construction projects of recent years, which is constantly suffering from labour and equipment shortages. According to the plan, the factory is planned as the largest one in the Urals, with its own work town, park and resort built in the same style as factory workshops. The factory will specialise in the production of excavators, crushers, blast furnaces, steelmaking equipment, and other equipment needed by the industry, which will be supplied throughout all the Urals and Siberia."
unlock_uztm: "Uralmash was built"

chelyabinskiy_traktornyy: "ChTZ"
chelyabinskiy_traktornyy_desc: "Created due to recent efforts of the government, the Chelyabinsk Tractor Factory specialises in producing reliable tractors for Siberia and other regions with harsh conditions. Created for both civil and military production purposes, the ChTZ is an enormous factory, which has the potential to become one of the main tank producers in the country."
chtz_RUS: "Tank Manufacturer"
RUS_chelyabinsk_tractor_plant: "Chelyabinsk Factory Complex"
RUS_chelyabinsk_tractor_plant_desc: "Siberia needs tractors, but they are delivered from central Russia - and local production is necessary if we want to bring Siberia up to the level of the rest of the country. The plan to build a new factory complex, connected to nearby metallurgical plants and mines, was developed several years ago - by this plan the factory will occupy an area of more than 1 square kilometre and will have a production capacity of 40 thousand tractors per year."
unlock_chtz: "ChTZ was built"

mmz: "MMZ"
mmz_desc: "Created after the Russian Civil War from the Moscow carriage-building factory and the Petrograd gun factory evacuated during the Great War, the Mytishchi Machine-Building Factory has mainly worked as a train producer in the past decades, with a recent expansion of its armament department under the promising engineer Astrov."
mmz_RUS: "Tank Manufacturer"

putilovets: "[RUS_Dynamic_Putilovets_Name]"
putilovets_non_socrus: "Putilovskiy Zavod"
putilovets_socrus: "Krasniy Putilovets"
putilovets_desc: "The main factory of OPZ, whilst remaining privately owned ever since 1885, has now switched to armament production and with the expansion of its designer department, the factory has become the main tank producer in Russia."
putilovets_RUS: "Tank Manufacturer"
putilovets_improved_RUS: "$putilovets_RUS$"

vtz: "VTZ"
vtz_desc: "Created thanks to recent efforts of the government, the Volga Tractor Factory quickly became one of the biggest producers of tractors in Russia. With the founding of the tank department, VTZ is ready to utilise its production lines for the army."
vtz_RUS: "Tank Manufacturer"
RUS_tsaritsyn_tractor_plant: "Volga Tractor Factory"
RUS_tsaritsyn_tractor_plant_desc: "Due to the break in ties with Germany and problems in America, Russia must concentrate on producing its own tractors. In this regard, the plan was proposed to build a big factory that could produce several hundreds of tractors a day to cover the country's need and provide all of the fertile Southern Russia with the tools necessary for agricultural development. The government proposes to attract American specialists to build the factory according to modern standards, since they have experience in such a type of projects."
unlock_vtz: "VTZ was built"

avtomobilnoe_moskovskoe: "[RUS_Dynamic_AMO_Name]"
avtomobilnoe_moskovskoe_non_socrus: "AMO"
avtomobilnoe_moskovskoe_socrus: "ZiL"
avtomobilnoe_moskovskoe_desc: "The Moscow Automotive Society was founded in 1916 as part of the state programme for the creation of a Russian automotive industry. During that time, AMO participated in the creation of the first Russian tanks after the Russian Civil War, produced many American and European cars under licences, and created its own car designs."
amo_RUS: "Mechanised Equipment"
amo_improved_RUS: "$amo_RUS$"

## Aircraft Manufacturer ##
tsagi: "TsAGI"
tsagi_desc: "Founded during the Civil War, the Central Aerohydrodynamic Institute is directly supported by the War Ministry and works for both military and civilian industries. Being well known as the home of Tupolev and his protégé Sukhoy, TsAGI designs the main part of Russian bombers."
tsagi_RUS: "Heavy Bomber Manufacturer"
tsagi_improved_RUS: "$tsagi_RUS$"

dux: "[RUS_Dynamic_Duks_Name]"
dux_non_socrus: "Duks"
dux_socrus: "Kommunar"
dux_desc: "Due to the harsh economic conditions in the 1920s, the Moscow Aviation Factory Duks lost several small factories - but still managed to survive and stay in the aircraft industry. Concentrating its efforts on the expansion of the Moscow plant, Duks still maintains its place as the king of fighter aircraft."
dux_RUS: "Fighter Manufacturer"
dux_improved_RUS: "$dux_RUS$"

yakovlev: "ZLS"
yakovlev_desc: "A private enterprise of a talented young aeronautical engineer Aleksandr Yakovlev, created with the support of the War Ministry in 1934 under the name 'Factory of Light Airplanes', the ZLS specializes in mass-produced aircraft, quickly becoming one of the favourites of the War Ministry."
yakovlev_RUS: "Mass Aircraft Manufacturer"

gamayun: "[RUS_Dynamic_Gamayun_Name]"
gamayun_non_socrus: "Gamayun"
gamayun_socrus: "Krasniy Lyotchik"
gamayun_desc: "After the Civil War, Sergey Schetinin returned to Petrograd from the Volunteer Army to retake back his aircraft factory 'Gamayun', established in 1910. After attracting promising designers both from Tsagi and V.A. Lebedev, Gamayun concluded solid contracts with the War Ministry and established itself as a bomber and transport aircraft producer."
gamayun_RUS: "Heavy Bomber Manufacturer"

lebedev: "AZL"
lebedev_desc: "Founded by the president of All-Russian Aeroclub, pioneer and enthusiast of Russian air industry, Vladimir Lebedev has built and equipped six aircraft factories throughout Russia, the most important ones in Taganrog and Yaroslavl. The Yaroslavl factory, Aviatsionniy Zavod Lebedeva has been greatly expanded over the past several years and has become one of the biggest aircraft plants in Russia, with people such as Lavochkin, Gorbunov, and Gudkov working as its main designers."
lebedev_RUS: "Mass Fighter Manufacturer"
lebedev_dkb: "AZL"
lebedev_dkb_desc: "Founded by the president of All-Russian Aeroclub, pioneer and enthusiast of Russian air industry, Vladimir Lebedev has built and equipped six aircraft factories throughout Russia, the most important ones in Taganrog and Yaroslavl. The Taganrog factory has played a crucial role during the Civil War, providing repair for the Volunteer Army airplanes. While since 1925 the plant was reduced in its size due to the pressure of the Russian government, Lebedev still provides the Host with air equipment at a fair price."

seversky_aircraft: "[RUS_Dynamic_Seversky_Name]"
seversky_aircraft_non_socrus: "Seversky"
seversky_aircraft_socrus: "VASO"
seversky_aircraft_desc: "Aleksandr Seversky returned to Russia in 1926 after his company, Seversky Aircraft Corp., went bankrupt during the Great Depression. Enjoying support from the War Ministry, he founded the Aeronautics Partnership of Seversky in 1931 and soon became famous for his fighters, capable of competing with Polikarpov's machines."
seversky_RUS: "Fighter Manufacturer"
seversky_improved_RUS: "$seversky_RUS$"
 
sikorsky_aircraft: "[RUS_Dynamic_Sikorsky_Name]"
sikorsky_aircraft_non_socrus: "Sikorsky"
sikorsky_aircraft_socrus: "Rappoport"
sikorsky_aircraft_desc: "Following his return from the USA after his company went bankrupt, Sikorsky managed to acquire government funding for the creation of the Aviation Machine-building Society of $sikorsky$ in Petrograd. Leading one of several companies in Russia specialising in naval aircraft, Sikorsky himself wants to explore a new area of aeronautics - helicopters."
sikorsky_RUS: "Light Bomber Manufacturer"

anatra_rus: "Anatra"
anatra_rus_desc: "Restructured after the return of Odessa to Russian hands, the Anatra factory was allowed to continue its activities. Now one of several Russian factories specialising in naval aircraft, it quickly found supporters in the War and Maritime Ministries."
anatra_company_RUS: "Light Aircraft Manufacturer"

## Naval Manufacturer ##
admiralteiskie_verfi: "Admiralteyskiye Verfi"
admiralteiskie_verfi_desc: "Greatly damaged during the Russian Civil War, the Admiralty Shipyards survived only because of extensive support from the Maritime Ministry. Becoming somewhat of a 'younger brother' of the Baltic Factory, the Admiralty Shipyards now specialise in lighter ships and sustain themselves with civilian contracts."
admiralteiskie_verfi_RUS: "Cruiser Manufacturer"
admiralteiskie_verfi_improved_RUS: "$admiralteiskie_verfi_RUS$"

baltiysky_verfi: "Baltiysky Zavod"
baltiysky_verfi_desc: "The Baltic Shipyard has produced many ships since it was founded in 1861. After the Russian Civil War, the factory experienced hard times, but due to the never-ending support of the Maritime Ministry, it endured them, and its shipyard became the biggest in Russia by absorbing Petrozavod and Ust-Izhora shipyards."
baltiysky_verfi_RUS: "Capital Ship Manufacturer"
baltiysky_verfi_improved_RUS: "$baltiysky_verfi_RUS$"

rubin: "Podplav"
rubin_desc: "The Podplav is a department of the Baltic Shipyard, which was engaged in the production of working drawings, construction and repair of submarines since 1906. The current shipyard exists only by merits of engineer Ivan Bubnov, although he did not leave any students or drawings after his sudden death from typhus. The design of new submarines were continued by Boris Malinin, who was appointed head of the Podplav in 1931."
rubin_RUS: "Submarine Manufacturer"
rubin_improved_RUS: "$rubin_RUS$"

dalzavod_naval_industries: "Dalzavod"
dalzavod_naval_industries_desc: "Dalzavod was created by private enterprise just after the end of the Russian Civil War to support trade with the United States. After the Wall Street Crash, Dalzavod was forced to expand its capabilities to remain in business and started to take government contracts. Being specialised mainly in refits and repairs, Dalzavod also produces ships and even ammunition."
dalzavod_RUS: "Ship Refitting Manufacturer"
dalzavod_improved_RUS: "$dalzavod_RUS$"

chernomorskie_verfi: "Nikosud"
chernomorskie_verfi_desc: "The Nikolayev United Ship-building Factories were created from the Black Sea Ship-Building Factory after the Russian reclamation of Ukraine. Suffering damage in the war, after rebuilding, Nikosud continued its specialisation in lighter ships for Black Sea service."
chernomorskie_verfi_RUS: "Ship Manufacturer"

as: "Azovskaya Sudoverf"
as_desc: "Developed through the extensive efforts of the Maritime Ministry after the end of the Civil War, the Azov Shipyard is a small but nevertheless important shipyard that produces ships for the Black Sea Fleet."
as_RUS: "Mass Shipbuilding Manufacturer"
as_improved_RUS: "$as_RUS$"


RUS_tsar_of_all_russia: "Emperor and Autocrat of All the Russias\n§gFull Title: By the Grace of God, Emperor and Autocrat of All the Russias, Moscow, Kiev, Vladimir, Novgorod; Tsar of Kazan, Tsar of Astrakhan, Tsar of Poland, Tsar of Siberia, Tsar of Chersonese Taurian, Tsar of Georgia; Lord of Pskov and Grand Prince of Smolensk, Lithuania, Volhynia, Podolia, Finland; Prince of Estland, Livland, Courland, Semigalia, Samogitia, Belostok, Karelia, Tver, Yugorsky land, Perm, Vyatka, Bolgar and others; Lord and Grand Prince of Nizhny Novgorod, Chernigov, Ryazan, Polotsk, Rostov, Yaroslavl, Belozersk, Udorsky land, Obdorsk, Kondia, Vitebsk, Mstislav, and all of the northern countries Master; and Lord of Iberia, Kartli, and Kabardia lands and Armenian provinces; hereditary Sovereign and ruler of the Circassian and Mountainous Princes and of others; Lord of Turkestan; Heir of Norway; Duke of Schleswig-Holstein, Stormarn, Dithmarschen, and Oldenburg, and others, and others, and others.§!"

goal_RUS_restore_1925_borders_name: "Restore 1925 Borders"
goal_RUS_restore_1925_borders_desc: "In 1925, a coup led by Kolchak and Cossacks resulted in the secession of the Far East, Don and Kuban regions from Russia. We must reclaim these territories and dismantle the unlawful quasi-states that govern them."
goal_RUS_form_the_ussr_name: "Form the Socialist Union"
goal_RUS_form_the_ussr_desc: "The Minsk Treaty left not only our former territories in the German hands, but also millions of workers and peasants under the oppression of large landowners and Imperialists."

RUS_political_instability_legacy: "Legacy of the \"Third\" Russian Revolution"
RUS_political_instability_legacy_desc: "The beginning of the 1936 brought with it both hope and despair - resulting in many victims among the civilians both by the revolutionary terrorist and the Russia, defending itself. These scars, ones of many, would shape the future decades to come."

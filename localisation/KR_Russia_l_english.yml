### traits ###
RUS_denikin_officer: "Denikinist Officer"
RUS_denikin_officer_desc: "This officer is either in favor of §GRepublic§! or believes in constitutional §cMonarchy§! and is aligned with general §mAnton Denikin§!."
RUS_avalov_officer: "North-Western Army Officer"
RUS_avalov_officer_desc: "This officer either believes in Russian §hMonarchy§! or has served in the  §gNorth-Western Army§! (Northern Corps) during the Russian Civil War."
RUS_wrangel_officer: "Monarchist Officer"
RUS_wrangel_officer_desc: "This officer either believes in Russian §hMonarchy§! or is aligned with general §cPyotr Wrangel§!, or has served in the Southern Army during the Russian Civil War."
RUS_drozdovsky_officer: "Drozdovite Officer"
RUS_drozdovsky_officer_desc: "This officer is an ardent supporter of the Russian §hTsarism§! and is aligned with general §hMikhail Drozdovsky§!."

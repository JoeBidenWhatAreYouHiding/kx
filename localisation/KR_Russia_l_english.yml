RUS_zemsky_sobor_cat: "Zemsky Sobor"
RUS_zemsky_sobor_cat_desc: "The convocation of a new §HZemsky Sobor§! by Regent §gPyotr Wrangel§! marks a crucial step in putting an end to the era of republican turmoil. Under the guidance of the §cRegency Council§!, this assembly is tasked not only with electing a new candidate for the throne, but also with crafting and adopting a much-anticipated monarchical constitution - a comprehensive framework of laws designed to fortify the resurgent imperial structure.\n\nHowever, various factions are vying for influence in this critical moment. The reawakened movement of radical §hBlack Hundred§! monarchists harbors discontent with the perceived moderation of General Wrangel's reforms. It is essential not only to maintain control over these radicals but also to secure the §clegitimacy§! of both the Sobor's actions and the proposed reforms.\n\n§hBlack Hundredist§! discontent: [?RUS_zs_blackhundred|0H%]\n§cMonarchist§! legitimacy: [GetZemskySoborLegitimacy]\nGeneral §cWrangel§!'s ambitions: [?RUS_rovs_wrangel|Y0]"

### New Junta Tree ###



rusd.3000.t: "[GetMonth] Putsch"
rusd.3000.d: "The collapse of the parliamentary coalition and the government's inability to call new elections, the economic crisis and the revolutionary state of society have done their work. Today in Petrograd, the military seized government offices and announced the creation of a new, provisional government to restore \"firm authority\" in Russia and prevent left-wing radicals from coming to power. In a striking repeat of the 1917 coup attempt known as the \"Kornilov Affair\", General Kornilov and leader of the Russian All-Military Union, once again led a military coup. At a rally in Petrograd, he announced the establishment of a \"new power\" and himself as its representative.\n\nFor many, what happened is nothing more than a military coup, but the real state of affairs is still uncertain. It is known that the Central Committee of the Left SRs announced an immediate general strike and the need to oppose the military and reactionary power of General Kornilov. The country is on the verge of collapse and a new confrontation, whether General Kornilov will be able to save the situation, or whether the revolutionary forces will take over, is still unknown."
rusd.3000.a: "Kornilov shall save Holy Russia!"

rusd.3001.t: "Martial Law in the Capital!"
rusd.3001.d: "Practically the first decision of the military was the imposition of martial law in the capital. Reluctant to radicalize the situation in the whole country, nevertheless, Petrograd is on the verge of a socialist uprising and, given the new round of violent confrontation between the protesting workers in Petrograd and the Russian army, a clash seems inevitable. The new government has arrested the key brother-in-arms of the revolutionaries among the officers, including Vladimir Trutovsky, Yuri Sablin and Mikhail Levandovsky."
rusd.3001.a: "For the safety of the Motherland."

rusd.3002.t: "The Senate Appoints Kornilov as President"
rusd.3002.d: "The predominantly conservative upper house of parliament was able to secure the necessary number of senators to appoint Kornilov as the new president. Thus, his dictatorial power became legitimate, even though the Senate had to make a number of concessions and compromises. For the time being, however, the move was not encouraging. The old convocation of the Duma, dominated by the SR majority, is preventing the new government from working effectively."
rusd.3002.a: "New power is gaining legitimacy."

rusd.3003.t: "The SRs and the Left Kadets Oppose the Senate"
rusd.3003.d: "Today at the Duma session, the SR and Left Kadet faction came out radically against Kornilov, condemning his actions and clearly labeling them as a military coup. Despite the collapse of the ruling coalition and the impossibility of forming a legitimate government, power is still concentrated in Kornilov's hands, and any careless move by the opposition could lead them to defeat.\n\nAt the same time, a small minority, the right-wing Kadets and the VNS, have expressed support for Kornilov, and hope that martial law will not last long and that new elections will soon be held in the country."
rusd.3003.a: "Duma remains unstable."

rusd.3004.t: "Savinkov's Speech in the Duma"
rusd.3004.d: "Boris Savinkov, formerly a close confidant of Kornilov, today addressed the State Duma from its tribune with political demands. At present, the People's Republican Party enjoys a relative majority within the Duma, insufficient for the formation of a government. However, Savinkov urged \"President Kornilov\" to establish a \"people's cabinet\".\n\nSavinkov's vision for the government is a cabinet composed predominantly of NRPR members, with Savinkov himself at its helm. His demands call for decisive measures to stabilize the nation and quell the revolutionary ardor of the working class, fueled by \"Bolshevik\" rhetoric. It is imperative to make a critical decision regarding Savinkov: to accede to his requests or to continue collaborating with the rightist Kadets and VNS factions, potentially dissolving the Duma at a later stage."
rusd.3004.a: "Agree with Savinkov's demands."
rusd.3004.b: "We will not allow NPRR to strengthen!"

rusd.3005.t: "People's Government"
rusd.3005.d: "Kornilov agreed to Savinkov's demands and instructed him to form a government, confirming him as Chairman-Minister. However, a number of insurmountable contradictions seem to have arisen over the composition of the government. The most key of these was the chair of the Minister of Agriculture, for which Savinkov had nominated his candidate, hoping for the successful implementation of land socialization.\nOn the one hand, this would allow the state to increase its control over the peasants and win their support, but on the other hand, it would lead to a break with the Senate parties, which traditionally favored private land ownership. This appointment will be key and will affect the entire future fate of Russia."
rusd.3005.a: "Appoint Savinkov's nominee as minister!"
rusd.3005.b: "Push a conservative into the chair!"

rusd.3006.t: "A Failed Government!"
rusd.3006.d: "Unfortunately, Savinkov's attempts to form a government did not succeed. The seat of the Minister of Agriculture went to a conservative candidate who declared the abolition of private land ownership unacceptable. The crisis that erupted was decisive in the fate of the government - without starting full-fledged work, Savinkov announced the transition to the opposition, which makes the Duma completely in the power of the majority in opposition to Kornilov. It is necessary to dissolve the Duma immediately to avoid an escalation of the situation."
rusd.3006.a: "Here goes nothing."

rusd.3007.t: "People's Government"
rusd.3007.d: "Today Chairman-Minister Savinkov announced the successful formation of a \"people's government\". It is composed almost entirely of representatives of the NRPR, and only a few, insignificant ministerial chairs were occupied by representatives from the monarchists. Under such circumstances it is obvious that Savinkov's power had increased considerably, and the question of whether it was right to trust him remains open."
rusd.3007.a: "Savinkov gains power."

rusd.3008.t: "Presidential Government!"
rusd.3008.d: "Taking advantage of his powers as president, Kornilov formed a presidential government - putting his loyal associate Dragomirov at its head. The government itself was almost entirely filled with military men from the ROVS, who were necessarily supportive of the president, but there was factionalism among them as well. Two other high-ranking generals of the ROVS, Denikin and Wrangel, who are rivals, seem to have been left out, and will probably still have to compete for the chair of the aging Kornilov's successor. For now Dragomirov is the compromise option, but even the President realizes that this will not last long."
rusd.3008.a: "Some stability at last."

rusd.3009.t: "Revolutionary Ferment"
rusd.3009.d: "Since the putsch, power has been in the hands of the military and Marshal Kornilov, but not everything is so simple. The military may only imagine that they have managed to prevent riots in Petrograd and keep the situation under control, but they have no idea what is really going on in the regions. The country is slowly sinking into revolutionary chaos: in different regions there are labor strikes and peasant revolts, and local authorities are unable or unwilling to cope with popular anger. Under these conditions, it is extremely important for Kornilov to prevent further \"revolutionary ferment\" either by force or by peace. Failure to cope with the people could lead to catastrophic consequences, and before our shaky republic crumbles into dust, urgent action must be taken."
rusd.3009.a: "We should deal with the revolution!"

rusd.3010.t: "The Question of Internal Troops"
rusd.3010.d: "In order to fight the revolution and the underground, as well as to prevent sabotage, the police and security services are supposed to be strengthened, but already now we have data that the gendarmes are not able to cope with the work assigned to them. Our advisers from the ROVS are convinced that the army will be able to cope with the revolutionary heat, but the presence of troops in the cities may lead to radicalization of the protests and hardening of the revolutionaries. Theoretically, this problem could be solved by creating internal national guard troops, similar to those in the United States. However, this would require significant resources."
rusd.3010.a: "Our soldiers will do the job."
rusd.3010.b: "Increase funding of the Okhranka instead."
rusd.3010.c: "Forget about it..."

rusd_3010_okhranka: "Decision to crush §rrevolutionary ferment§! will cost §G10 political power less§!"
rusd_3010_army: "Decision to crush §rrevolutionary ferment§! will take §Gless time§! to complete"

rusd.3011.t: "NRPR Militias"
rusd.3011.d: "We have received information that the NRPR is forming special volunteer vigilantes to fight saboteurs, under the command of the Combat Squads. These vigilantes are already organizing lynchings and causing a lot of inconvenience to the protesters. On the one hand, the state does not encourage paramilitarist groups, and breaking the state's monopoly on force could shake our regime. On the other hand, militant groups can be of great help in combating revolutionary ferment, but it is important to keep control of the situation and make sure that they are acting in our interests."
rusd.3011.a: "Do not impede them in any way."
rusd.3011.b: "Prohibit any paramilitary formations, only the Russian Army!"

rusd.3012.t: "Dissolution of the Duma"
rusd.3012.d: "The current convocation of the State Duma was dissolved today by presidential decree of Lavr Kornilov. While the opposition criticized the President's actions as anti-people and once again confirming the dictatorial nature of the current government, the President announced elections to be held in 3 months. During this time, the parties will conduct an election campaign and will be able to get into the new Duma. The president's goal is undoubtedly to form a pro-presidential majority in the Duma in order to restore the legitimacy of his own power and simplify the procedure of passing important laws."
rusd.3012.a: "They had a chance to call for elections themselves."

rusd.3013.t: "Martial Law"
rusd.3013.d: "The revolutionary heat has almost reached its peak and President Kornilov has no choice but to immediately impose martial law throughout the country. Such a regime would prohibit mass gatherings of citizens as well as strikes. Censorship of the media may be introduced, which the Okhrana is already actively engaged in, and the military and police have the right to detain and arrest any citizen suspected of having ties to the revolutionaries." 
rusd.3013.a: "All against revolution!"

rusd.3014.t: "The Revolution is a Betrayal in the German Interests"
rusd.3014.d: "\"The Revolution is a Betrayal in the German Interests!\" - this was the slogan of a recent demonstration in support of the president, aimed at accusing the revolution of destabilizing the political situation. What is not surprising is that this slogan resonated with many citizens. The proclamation made direct references to the Bolshevik putsch of 1917, when Lenin and Zinoviev, the Bolshevik leaders, returned to Russia via Germany, which eventually led to Russia's defeat at the front and the shameful Brest-Litovsk peace, later forcibly ratified."
rusd.3014.a: "Never another Brest-Litovsk..."

rusd.3015.t: "Banning the Socialist Opposition?"
rusd.3015.d: "After the imposition of martial law, the question of the fate of the Mensheviks and SRs became particularly acute. The Party of Socialist-Revolutionaries, the largest party in the country, actively opposed the president and called what was happening a military coup. The Mensheviks, on the other hand, are currently the only legal labor party, which has a huge influence among the proletariat and actively supports strikes. Most conservatives are sharply opposed to their party's activities, recalling the Civil War years and their activities during Sazonov's presidency. Conservatives also accuse the SRs of radicalizing the peasantry, provoking Kolchak's putsch, and generally anti-state activities during all the years of the party's existence. Despite the fact that during this time a number of SR figures have moved to other parties, the largest party in the country should be on our side - so General Denikin believes. As for the Mensheviks, their activities clearly need to be banned, but without appropriate laws, this cannot be achieved simply like this."
rusd.3015.a: "We must prepare the ground for such a decision."

rusd.3016.t: "Anti-Socialist Legislation"
rusd.3016.d: "The time has come for keeping the situation within the law and in our hands. Terrorists, saboteurs, revolutionaries - they are all adherents of purely socialist ideas and parties - both banned and still active - the PSR and the RSDRP. The bill put forward from the National Center suggests a significant restriction on the activities of socialist parties, accountability to the government and the right to completely ban their activities if such parties do not stop all anti-state acts, which now includes organizing strikes and raising certain political slogans. The law will make life more difficult for parties and will also prohibit them from receiving funding from the state or private capital. Such conditions will become unbearable for both the PSR and the RSDRP, but we must be sure that we have effective mechanisms to control society in case of a sharp rise in revolutionary sentiment due to this law."
rusd.3016.a: "We must work towards banning both parties."
rusd.3016.b: "Menshevism is another name for Bolshevism."
rusd.3016.c: "We should not intervene - that will only add fuel to the fire."

rusd.3017.t: "The Inner Line"
rusd.3017.d: "Since the formation of the Combat Organization of the [GetROVSParty] under the initiative of General Aleksander Kutepov, there has been an increase in incidents involving pogroms, assaults on striking workers, extortion and blackmail of trade union officials. Our leadership is concerned that the use of blatantly terrorist methods may not benefit our cause, but rather exacerbate revolutionary ferment.\n\nAt a clandestine meeting, it was discussed how to safeguard the organization and the nation - to establish a so-called \"Inner Line\". This would be a top-secret military organization, headed by Captain Voss, whom the [GetROVSParty] leadership wishes to appoint. Membership in this organization would be granted only through personal invitation from the commander, and withdrawal would not be permitted. The organization will be tasked with gathering intelligence on banned parties, preventing any acts of sabotage from their side, as well as curtailing the activities of socialist groups within the nation. General Kutepov's tenure at the helm is set to come to an end as news of his \"BO\" spreads further.\n\nAmidst the apparent intensification of pressure on the revolutionary movement, we may anticipate an augmentation, or rather a ratcheting up, of their operations. However, this is the sole means of vanquishing this malignancy that is ravaging the nation."
rusd.3017.a: "This is our answer to the militant organizations of the socialists!"
rusd.3017.b: "This is coming too far - back down!"

rusd.3018.t: "The Murder of Vasily Desnitsky"
rusd.3018.d: "A tragic incident occurred today in the city of Nizhny Novgorod, where a workers' strike culminated in a mass rally. Among the speakers at this event was Vasily Desnitsky, a prominent figure in the RSDRP and an influential representative of the Menshevik-Internationalist faction, renowned for his close associations with the Communards. However, just moments before he was set to take the podium, an explosion occurred near his vehicle, resulting in his death and the loss of several lives among the crowd.\n\nThe bomb had been meticulously placed, leaving no discernible traces of the perpetrators' involvement. It was a carefully planned assassination executed with remarkable precision.\n\nThe Menshevik movement was shaken by this attack. The party, which had already been weakened by internal strife and government oppression, now faces the loss of one of its most prominent leaders. Desnitsky played a crucial role in maintaining connections between the Russian socialists and their international allies.\n\nWhile no group has taken responsibility for the attack, there are rumours that the perpetrators may have been affiliated with the Kutepovites, who have long advocated for harsher measures against revolutionary elements."
rusd.3018.a: "Who could have organized such a crime?"

rusd.3019.t: "Restoration of the Monarchy"
rusd.3019.d: "One of the key controversies within the ROVS from the organization's inception was the question of the form of government. Generals Wrangel and Drozdovsky, stood for the restoration of monarchy as a necessary element for Russia. The leadership of the ROVS, in the person of Generals Kornilov, Denikin and Markov, at first stood on the positions of either republican or non-decided. However, this conflict, which stands out in a special way in the conflict between Denikin and Wrangel, significantly impedes the unity of the ROVS. No possible solutions are in sight - and with revolutionary ferment, holding a referendum on restoring the monarchy is simply impossible. At a recent press conference of the President, one of the journalists, presumably of Black Hundred views, asked the Commander-in-Chief the following question."
rusd.3019.a: "There will be no monarchy in Russia!"
rusd.3019.b: "This question will be decided in a referendum."

rusd.3020.t: "Restoration of the Black Hundred Movement"
rusd.3020.d: "As a result of the initiative of conservative ministers, it was possible to initiate the legalization of Black Hundred parties and organizations that had been banned since 1917. Although for many years none of the parties of those times - the Union of the Russian People (SRN), the Russian People's Union of Mikhail the Archangel (RNSMA) - have survived, and their members have long since died or retired from politics, the decree gave the green light to the emergence of lesser-known organizations. In particular, the elderly senator Vladimir Purishkevich, a member of the VNS party, announced the re-establishment of his VNGP (All-Russian People's State Party) as an independent unit. Earlier, this party was founded by him during the Civil War, and tried to take part in state politics, but was banned in 1926 by President Kerensky. Another interesting case is the legalization of the Supreme Monarchical Council, Nikolay Markov's emigrant organization, which for a long time operated only abroad - in United Baltic Duchy and the Ukrainian State. Markov, who was previously known as an advocate of alliance with Germany, announced his full support for the new Russian government shortly after Kornilov's coup.\n\nThe legalization of the movement has met with resistance from liberal and socialist parties, as well as protests in many cities. The opposition accused the government of destroying revolutionary achievements and trying to legitimize outdated monarchical ideas."
rusd.3020.a: "This is true democracy and freedom of opinions, but put them under control."

rusd.3021.t: "The Legacy of the Alekseyev Organization"
rusd.3021.d: "The history of resistance to Bolshevism during the Civil War largely began with the creation of the volunteer movement - which later became the Volunteer Army and the Armed Forces of the South Russia, under the command of General Kornilov. However, unlike the illustrious general and our president, the name of General Alekseyev remained not so well known to many.\n\nThe organization of the volunteer army began in the conditions of increasing decay of the Russian army on the front of Weltkrieg. The goals of the organization were to counteract the collapse of the country, to suppress the expected and inevitable Bolshevik uprising and to continue the war with Germany. There was a conflict between generals Kornilov and Alekseyev, and despite the fact that since the organization of the movement into a volunteer army, the commander-in-chief was Kornilov, formally the supreme leader of the army was Alekseyev.\n\nMikhail Alekseyev died just a year after the movement was created, as a result of pneumonia, and was buried in Yekaterinodar, in the Kuban. Now many veterans of the Volunteer Army have come forward to restore the general's good name in the hearts and minds of Russia's patriots. According to their plan, the general's name should become a symbol of the White movement - a symbol of uniting many officers on volunteer basis for the sake of saving the country from collapse. Such an initiative will undoubtedly affect the split within the ROVS - for many monarchists the personality of General Alekseyev is unacceptable as a symbol, and Kornilov himself fears that the glorification of his old, albeit deceased opponent will not make him glory."
rusd.3021.a: "Glorify Alekseyev as a founding father of the ROVS!"
rusd.3021.b: "True patriots remember him anyway."

rusd.3024.t: "The Cult of a Volunteer"
rusd.3024.d: "One of the great achievements of the White movement in the Civil War, according to many generals, including Kornilov, the main proponent of this idea - is the volunteer nature of the troops. In 1918, thousands of officers took up arms out of patriotic feelings and motivation to resist Bolshevism and swore to serve their Fatherland faithfully and faithfully. The heroes of the Kuban campaign will never be forgotten, the participants of the Yassy-Don campaign will never be forgotten, Kornilov's volunteers and SZRS partisans of the Yaroslavl uprising will never be forgotten. The feat of the workers of Izhevsk and the Kappelevtsy, Kolchak's Siberian volunteers and the Czechoslovak Corps will live in our hearts.\n\nDuring the years following the war, the ROVS directed great efforts to strengthen and establish the cult of volunteers - people who freely and selflessly gave their lives or health for the Fatherland. However, any coin has two sides. Kornilov's goal is to reform the army according to the British standard - to introduce a regular contract and professional army, to abolish compulsory conscription. This proposal finds wide support among left-wing politicians and civilians, but a number of high-ranking officers consider such an initiative harmful. They are convinced that Russia will inevitably be drawn into a new war, provoked to defend and liberate its territories. Under these conditions, they believe, the cult of volunteers may not work, and the army must be provided with manpower.\n\nA decision will soon be made, and whatever it may be, it must be to Russia's benefit."
rusd.3024.a: "Interesting."

rusd.3025.t: "Reinstatement of Capital Punishment"
rusd.3025.d: "The death penalty was abolished after the February Revolution, but soon - reintroduced at the front by the Provisional Government for war crimes, treason, murder and robbery. General Kornilov played a key role in the resumption of this practice. However, with the advent of peacetime and the proclamation of a democratic republic and the adoption of a new Constitution, capital punishment was abolished.\n\nNow, the question of the return of the death penalty in conditions of revolution, rampant banditry and crime, as well as blatant cases of lynching, is again on the agenda. The leadership of the ROVS insists that the practice of capital punishment for crimes against the Fatherland must be returned, but this is opposed by many liberal forces in the government and the army. The president has the key word, but he may make the necessary concessions to maintain unity in power, even if these concessions seem to many to be a sign of weakness."
rusd.3025.a: "Death penalty is a necessary mean of justice."
rusd.3025.b: "We'd better not revive this awful tradition."

rusd.3026.t: "Gosudarstvennaya Strazha"
rusd.3026.d: "In 1919, on the initiative of the commander-in-chief of the Armed Forces of South Russia, Lavr Kornilov, the Gosudarstvennaya Strazha (State Guard) was created - a paramilitary body of civil administration in the controlled territories. In its essence, functionality and organization, the State Guard resembled the Special Corps of Gendarmes, the political police of the Russian Empire. According to the principle of Dobrarmia, the guards could be volunteers, but also mobilized soldiers. In many ways, the Gosstrazha resembled the Derzhavna Varta of Skoropadskyi's Ukraine. The chief of the guards was General of Infantry Nikolay Martos, who had been released from the Ukrainian prison. Already by the end of 1919 there were almost 80 thousand guards, both military and civil officials.\n\nThe State Guard was truly a great achievement of the Armed Forces of South Russia, and in many respects ensured order in the territories liberated from Bolshevism, however, like many other conquests and successes of the White armies, it was disbanded and undeservedly forgotten under the new, democratic government. All the functions of the guards were transferred to the police, that is, the Ministry of Internal Affairs of the Russian Republic.\n\nNow there is a brilliant opportunity to recreate the State Guard as a gendarmerie and internal troops of the republic, but there are disagreements among officers on this issue. Most of the generals insist on the re-creation of the State Guard with the former functions, but a number of officers have proposed the creation of the National Guard, similar to the U.S., as a reserve of the armed forces under the President."
rusd.3026.a: "Restore the State Guard!"
rusd.3026.b: "Create the National Guard!"

rusd.3027.t: "Heroes of the Moscow Uprising"
rusd.3027.d: "The Moscow Uprising of 1919 turned the tide of the Civil War in many ways. Under the leadership of General Nikolay Stogov, the headquarters of the Moscow District Volunteer Army, also known as the Moscow Branch of the National Center, prepared and carried out the uprising in Moscow in cooperation with General Kornilov's army advancing on the capital and receiving funding from representatives of Kolchak's army. In addition to underground White officers, teachers of the armor school at the Main Military Engineering Department of the RKP, cadets of the Higher Rifle School of the Red Army, the Higher School of Military Disguise, and the District Artillery School joined the uprising.\n\nDuring the uprising they managed to seize powerful Moscow radio stations and to inform all units of the Red Army at the fronts about the fall of Soviet power. Despite the uprising's success in seizing power in Moscow, heavy fighting for Moscow continued for several more weeks until the capital and the surrounding region were completely liberated by the army in early 1920."
rusd.3027.a: "And their deed is eternal."

rusd.3028.t: "I AM A VOLUNTEER"
rusd.3028.d: "1) I am a VOLUNTEER because I gave my youth and shed my blood for the power of the United Indivisible Russia.\n2) I am a VOLUNTEER, I stand for the convocation of the People's Assembly, elected by all the people, because I believe that it will give happiness, peace and freedom to all: to the left and the right, to the Cossack, the peasant and the worker.\n3) I am a VOLUNTEER, I give land to all peasants who are real laborers, and so that each peasant will be the complete and eternal master of his piece and therefore will work it with great love.\n4) I am a VOLUNTEER, I stand for the restoration of factories and plants, for the workers to conspire with their masters and establish labor, for no master to offend the worker, for the worker to have his unions to defend his interests. And whoever is an enemy to the worker and will do him harm by hindering the restoration of industry is an enemy to me, the volunteer. Where I am, - there the meat is fresher, and bread costs 1 - 2 r. pound.\n5) I am a VOLUNTEER, I give everyone to believe in his God and pray as he wishes, but most of all, as a Russian, I love my Orthodox faith.\n6) I am a VOLUNTEER, I love even those with whom I am now at war - I, by order of my leader, General Kornilov, do not shoot, but take them prisoner and deliver them to justice, which is terrible only for the enemies of the people - commissars, communists.\n7) I am a VOLUNTEER, and therefore I say: Let peace be restored in the ruined and tormented Russia! No domination of one class over another! Free and quiet work for all! No violence against peaceful citizens, no murders, no executions without trial! Down with the predators who oppress Russia! Down with the commune!"
rusd.3028.a: "Long live the United Great Indivisible Russia!"

rusd.3029.t: "Participation in the Elections?"
rusd.3029.d: "When Lavr Kornilov established the Russian All-Military Union, he proclaimed the organization's commitment to non-partisanship and impartiality. These principles allowed the ROVS to purportedly maintain a neutral stance in political matters, while ostensibly supporting the government in its efforts to quell the Kolchak rebellion in 1918.\n\nHowever, it is clear that the ROVS actually maintains a centrist-rightist orientation, with some members even advocating more radical positions. Moreover, these ideological underpinnings have effectively precluded ROVS representatives from assuming positions of elected office or participating in legislative bodies.\n\nThe situation has changed. Following Kornilov's appointment as President and the announcement of snap elections, certain senior figures within the Russian All-Military Union have proposed that the organization cannot remain apolitical in light of the prevailing revolutionary chaos. Some advocate for supporting the Kadets and conservatives during these elections, whereas others contend that the ROVS must abandon its commitment to political neutrality, establish its own electoral slate, and secure representation in the Duma. This course of action, however, may slightly exacerbate the current predicament of the president, as a majority in the legislative body cannot be reliably anticipated."
rusd.3029.a: "We must stay loyal to our dogmas."
rusd.3029.b: "Form our list to the Duma!"

rusd.3030.t: "The Fate of Pavel Gorgulov"
rusd.3030.d: "Pavel Gorgulov, the perpetrator of the assassination of Kerensky, which led to the subsequent chaos that engulfed Russia, initially received a sentence of life imprisonment upon his capture. His actions inflicted irreparable harm on the nation, plungeing it into turmoil. Following the conclusion of Gorgulov's trial, it was widely believed that the matter was closed, and his fate had been sealed.\n\nHowever, with the General Kornilov's decision to reintroduce the death penalty in a nation desperate for order, the debate regarding Gorgulov's fate has resurfaced once again. The restoration of the death penalty for individuals found guilty of high treason, homicide, and acts of terrorism has ignited renewed controversy. Within Kornilov's government, particularly among those advocating for a more rigid approach, there is a demand for Gorgulov to face the ultimate penalty for his part in the assassination and the subsequent instability. His crime, it is claimed, is a travesty of the highest order, an act of treachery unparalleled in Russian history, regardless of the controversial nature of President Kerensky's persona. The only recourse, it is argued, is to set a precedent and serve as a stern warning.\n\nNevertheless, there are concerns that Gorgulov's execution may exacerbate existing tensions in the nation and further estrange factions that continue to wield significant power and influence."
rusd.3030.a: "Execute Gorgulov."
rusd.3030.b: "We must not descend to the level of terrorists."

rusd.3031.t: "Congress of the ROVS"
rusd.3031.d: "Today, in Petrograd, a congress of senior leaders of the Russian All-Military Union was held. The congress was attended by Field Marshal Anton Denikin, Cavalry Generals Abram Dragomirov and Pyotr Wrangel, Infantry General Aleksandr Kutepov, Lieutenant General Viktor Zborovskiy and others. Naturally, the permanent leader of the organization, President of Russia and Supreme Commander-in-Chief Lavr Kornilov was also present at the meeting.\n\nCongresses have not been held at all in the history of the ROVS. Initially, the organization emerged as a voluntary veteran association of the White Movement, seeking to satisfy spiritual and other non-material requirements, as well as to represent and safeguard shared interests. In post-war Russia under the leadership of an SR left-wing government, veterans of the White Army clearly needed to defend their rights and liberties from revolutionary lawlessness. Top officials were preoccupied with organizing a new republican military and preserving the legacy of the Imperial Russian Army in a new form. Meanwhile, lower-ranking members were engaged in publishing the magazines and organizing activities aimed at both charity and recreation.\n\nCrucially, the ROVS never positioned itself as a 'political army' or a political party, dividing people into friends and enemies. The ROVS did not seek power for its own sake, but rather service to a higher cause. It championed not the interests of a particular party, but the well-being of the nation as a whole. Rather than dividing, it sought to unite. Rather than acquiring, it was willing to sacrifice. To this ethos, the ROVS remains faithful to this day.\n\nThe congress was convened in order for the ROVS to develop its organizational strategy in the new conditions - in conditions when power temporarily passed to the military and President Kornilov. But the saddest thing is that the Congress could not come to something new: it limited itself to adopting the clause \"on organizational unity\" and commitment to the principles of apoliticality."
rusd.3031.a: "Times have changed, and the ROVS must be ready."

rusd.3032.t: "Monarchists Organize Rally"
rusd.3032.d: "Today, rallies organised by monarchists in major Russian cities almost led to clashes. These were miraculously prevented by the valiant police who protected \"peaceful monarchist demonstrators\" from \"enraged left terrorists\", but the spectacle of the nearly Black-Hundredist demonstration evoked considerable awe among the citizens, and not the most benign nostalgia for the bygone era of Tsarism.\n\nThe rally was both supportive of the new military government and critical of the Russian All-Military Union. The movement's leaders urged the ROVS to abandon their position of apoliticism and philosophy and adopt a clear, straightforward ideological stance. No more concessions to the leftists, the terrorists and the revolutionaries. Long live a strong government!\n\nHowever, the ROVS itself reacted ambiguously to the demonstrations. The top leadership, of course, was faithful to the dogmas of the Union, but doubts were clearly sown among the entire general staff. Most of the generals had hitherto expressed themselves very cautiously, especially among the monarchists, but the rapid development of events told them that it was time to act."
rusd.3032.a: "The first cracks, or nothing serious?"

rusd.3033.t: "The White Idea"
rusd.3033.d: "The ideological tenets of the paramilitary youth movement known as the \"White Idea\" are actively propagated among the Junkers, cadets and younger members of the Russian All-Military Union, who have personally witnessed the horrors of civil war. Founded by Viktor Larionov in 1933, this organization aimed to cultivate a new generation of white warriors under the idea that \"a future combatant - is an officer who wields not only a sword and a flame, but also an inspired spiritual idea\".\n\nIn essence, the ideology of the movement is characterized by clarity, conciseness, and freedom from vagueness and ambiguity, as well as a focus on physical fitness, martial arts, and military training. Certainly, the organization was but another manifestation of the crisis in the ROVS ideology, particularly among the younger members, who witnessed how this apolitical alliance brought Kerensky to power, legalized the Black Repartition, contributed to German subjugation, and resulted in the loss of Cossack territories and the Far East region.\n\nFor his political activities, which were unthinkable in the context of the organization, Viktor Larionov was expelled, as General Kornilov's decree prohibiting political activity among ROVS members remained in effect, causing significant controversy and dissent within the organization. The movement has now been actively gaining momentum, particularly in the wake of the apparent collapse of the centre-left republican movement."
rusd.3033.a: "Interesting..."

rusd.3034.t: "The Russian National Union of War Participants"
rusd.3034.d: "Today, the Russian All-Military Union has been shaken by a significant schism, as a group of its most radical elements has seceded to establish a new organisation, the Russian National Union of War Participants (RNSUV), under the leadership of General Anton Turkul.\n\nThe new formation aims to unite veteran monarchists from the White Movement, advocating a militant form of nationalism and an active engagement in political affairs, in sharp contrast to the long-standing apolitical stance of the ROVS. While Turkul serves as its founder, the RNSUV enjoys the explicit support of General Mikhail Drozdovsky and numerous of his followers, known as Drozdovites.\n\nFor some time, these military officers have been dissatisfied with the ROVS' reluctance to actively shape Russia's future, particularly in light of perceived existential threats posed by both the republican government and left-wing revolutionaries. The leadership of the ROVS responded swiftly, officially expelling Turkul from the organization for his violation of the fundamental principle of non-involvement in politics or the establishment of political entities. In protest against this decision, however, Drozdovsky and numerous other members of the Drozdovites voluntarily resigned, further weakening the already fractured ROVS.\n\nRNSUV presents itself as an alternative to those who believe military officers should actively engage in the struggle for a nationalistic, monarchist Russia rather than merely remaining passive observers under the current government. With its rigid ideology and willingness to operate beyond traditional military frameworks, it remains uncertain how far they may go - whether this marks the beginning of a more radical White Renaissance."
rusd.3034.a: "This is not good for the remaining monarchists within the ROVS."

rusd.3035.t: "The Chief of the Army"
rusd.3035.d: "In a further attempt to portray Kornilov's government as illiterate, the opposition have demanded that Kornilov immediately relinquish his position as commander-in-chief of the army. The rationale behind this demand is that a president cannot simultaneously hold this position.\n\nWhile it is unlikely that Kornilov would seriously consider succumbing to these provocations, this idea may not be entirely without merit. An aging general might consider stepping down in favor of a younger and more loyal colleague. However, there are only two individuals in the general staff who could potentially fill this role: Field Marshal Anton Denikin, who is both talented and a reliable republican, or Cavalry General Peter Wrangel, who is less reliable but also a talented commander and a monarchist. Wrangel achieved his position through his leadership of the Caucasus Volunteer Army.\n\nThe monarchists of the ROVS are, naturally, advocating for the appointment of Pyotr Wrangel as the candidate for the position. However, his candidacy also enjoys the support of more moderate factions, such as the VNS and [GetMarLibParty]. On the other hand, the opposition is likely to be content with the election of Anton Denikin as the new leader, a figure who, though undeniably loyal, may be viewed as less radical than Wrangel's."
rusd.3035.a: "Appoint Anton Denikin."
rusd.3035.b: "Pyotr Wrangel will do the job."
rusd.3035.c: "We should not give in to opposition demands!"

rusd.3036.t: "General Kutepov Assumes Power"
rusd.3036.d: "Russia stands on the brink of an abyss. The demise of Lavr Georgievich Kornilov has not only created a leadership vacuum, but has also plunged the nation into a state of complete disarray. The revolutionary fervor that persisted during his tenure resulted in strikes, unrest, and armed insurrections spreading across the land like wildfire, leaving the government, already fatigued, paralyzed by internal discord, incapable of naming a clear successor to his leadership.\n\nIn the absence of stability, the military once again assumed control. At daybreak, columns of soldiers, led by General Aleksandr Kutepov, entered Petrograd, initiating a swift and violent coup. Loyalist officers purged dissenters, and remnants of the military administration swiftly pledged allegiance to the new regime, with Kutepov broadcasting a proclamation of a \"temporary military dictatorship\" on the radio. He promised to restore order and put an end to the chaos that had engulfed Russia. However, the reality of Kutepov's rule was far from stable. The authority of Kutepov is precarious. Only a small group of radical monarchists within the army fully embraced him, while a significant number of officers - be they Republicans, moderates or simply weary of the perpetual military rule - either hesitated or outright refused to pledge their allegiance. Some have gone silent, retreating behind their strongholds, while rumors circulate of others plotting against the new regime in secret.\n\nThe army itself is profoundly divided, demoralized by years of political turmoil, desertions, and indecisiveness. Meanwhile, unrest persists in Russia. The revolutionary movement remains unquelled, ready to erupt at any moment. Economic disruptions caused by industrial strikes further destabilize the situation, while unrest intensifies in the provinces, as governors and regional commanders begin to exercise greater autonomy. Kutepov may have seized control of the capital, but his sway over the nation is at best tenuous."
rusd.3036.a: "Does he even have the strength to carry it out?"

rusd.3037.d.intro: "Russia mourns the passing of a great leader, a staunch defender of the nation, whose iron-willed determination restored order and quelled the revolutionary fervor. He left behind a nation rebuilt in accordance with his vision of strength and stability, but now is not the time for sorrow."

rusd.3037.t: "General Wrangel Assumes Power"
rusd.3037.d: "$rusd.3037.d.intro$\n\nField Marshal Pyotr Wrangel, the chief of staff of Kornilov, whom Kornilov had confidence in, now stepped forward to assume the burden of leadership. In accordance with the wishes of the late leader and supported by the General Staff, Wrangel was proclaimed the Supreme Ruler of Russia.\n\nUnlike his predecessor, Wrangel is not a man given to impassioned speeches or rash decisions - he is a cool, calculating strategist who views governance as a battlefield, where mistakes could lead to disaster. From the moment he assumed power, Wrangel made it clear that his rule would be marked by meticulous precision.\n\nHas he confirmed the state of emergency, warning that Russia is not yet ready for civil governance? Instead, he emphasised the need to bolster national institutions, expand industrial and military capacities, and eradicate any vestiges of revolutionary influence. Wrangel currently holds the reins of the Russian state in his hands, but the true test of his leadership remains to be seen."
rusd.3037.a: "Glory to the new Supreme Ruler of Russia."

rusd.3038.t: "General Denikin Assumes Power"
rusd.3038.d: "$rusd.3037.d.intro$\n\nThe fate of Russia rests on the shoulders of General Anton Denikin, to whom General Kornilov bequeathed the position of Chief of Staff and, in his final decree, designated his rightful successor. With the backing of the General Staff and the allegiance of the armed forces, Denikin formally assumed the role of Supreme Ruler of Russia.\n\nIn his inaugural address to the nation, Denikin pledged solemnly to uphold Kornilov's legacy, preserving the order he restored and safeguarding Russia from both internal and external perils. Unlike his predecessor, however, Denikin does not espouse radicalism. Firmly adhering to the principles of discipline and duty, Denikin advocated for a pragmatic approach in addressing challenges, striking a balance between the requirements of public administration and the unyielding grip of military governance.\n\nAmidst the suspension of the Constitution, whispers in the corridors of the Duma and regional administrations hint at the possibility that Denikin might embark on a path of cautious political reform. However, the specter of Kornilov looms large, and those who once sought to mold Russia under his vision may find it difficult to accept these changes.\n\nWill Denikin solidify his grip on power, or will his pragmatism alienate the hardliners, who continue to dream of an even more authoritarian regime?"

rusd.3039.t: "The Drozdovites Seize Power"
rusd.3039.d: "The demise of Lavr Georgievich Kornilov has plunged Russia into a state of precarious ambiguity. With no designated successor and Kornilov's absence, a void of power swiftly emerged.\n\nThe monarchist factions, who had long been biding their time in anticipation of Kornilov restoring the monarchy one day, now face the stark reality of either restoring a democratic republic or perpetuating a military dictatorship indefinitely. Fearing public backlash against their cause and the rise of anti-monarchist sentiment, the Drozdovites - a faction of fervent monarchists under figurehead of Mikhail Drozdovsky - decided to act.\n\nAs Kornilov's body lies in state, the Drozdovite loyalists assumes control of the capital with the backing of officers and military units. Their swift action caught many off guard, leaving the government incapable of preventing the coup.\n\nWith the ascension of the Drozdovites to power, the question of Russia's future once again lies in the hands of those advocating for the restoration of the monarchy."
rusd.3039.a: "March, the people of Russia, for your salvation!"

rusd.3040.t: "General Levitov Assumes Power"
rusd.3040.d: "$rusd.3037.d.intro$\n\nHowever, the Supreme Ruler did not leave behind a clear political legacy - no clear successor was named, no final decree, no established line of leadership. Without the guiding hand of Kornilov, many feared the possibility of a dangerous power struggle within the government and military. Nevertheless, order was swiftly restored.\n\nFollowing urgent consultations between the General Staff, the [GetUpperChamberNameShort], and the leadership of the Russian All-Military Union, it was decided that Mikhail Levitov, a veteran of Kornilov's shock divisions and a comrade-in-arms who had been with him through the most trying moments of the civil war, would assume the role of Supreme Ruler of Russia. His first decree was straightforward and unwavering: to continue Kornilov's policies in their purest and unyielding form.\n\nLevitov was not a traditional politician or statesman. He was a warrior, a man of action and discipline who swore to uphold the legacy of Kornilov and prevent any deviation from the late leader's path."

rusd.3041.t: "Savinkov Assumes Power"
rusd.3041.d: "The passing of Lavr Georgievich Kornilov cast Russia into a state of mourning. For Boris Savinkov, however, and the People's Republican Party of Russia, it presented an unparalleled opportunity. With remarkable swiftness, the Chairman-Minister commenced consolidating his power by proposing a bold and far-reaching constitutional amendment to the State Duma and the [GetUpperChamberNameShort]. The amendment, which merged the positions of Chairman-Minister and president into a unified executive body known as the government, was adopted without significant opposition, leaving the stunned opposition in disarray. Through this historic decision, Boris Viktorovich Savinkov emerged as the unchallenged leader of Russia, wielding extraordinary powers surpassing those of any typical president or Chairman-Minister.\n\nUnder his leadership, the NRPR secured complete control over the government apparatus, ensuring that the revolution would not falter due to indecision or internal divisions. However, Boris Savinkov did not allow his ascension to power to limit his ambitions. Declaring that parliamentary politics only serves to weaken the will of the people and impede its realization, he disbanded the State Duma and the [GetUpperChamberNameShort], asserting the need for a powerful, undivided government. With no opposition remaining in the legislative sphere to challenge his authority, the NPR now reigns supreme. The state-run radio broadcasts the news from the magnificent halls of [ROOT.Capital.GetName] to the remotest corners of rural Russia: \"The Vozhd leads us forward!\" To those who remain steadfast, the future appears radiant and promising. To those in opposition, however, the path ahead may prove far more obscure."
rusd.3041.a: "Long live the Vozhd!"

rusd.3042.t: "The National Center Forms a New Government"
rusd.3042.d: "With the departure of Lavr Georgievich Kornilov, the political landscape of Russia was plunged into a state of uncertainty. However, Vasily Shulgin, a prominent figure and leader of the All-Russian National Union, wasted no time in acting decisively to stabilize the situation, as the Chairman-Minister swiftly began consolidating power under the guidance of the National Center. In a speech to the State Duma, Shulgin emphasized the need for steadfastness, maintaining order and stability during these turbulent times. He reassured the public that the vision of Kornilov for a strong and united Russia would not be lost. Surrounded by Dmitry Romanov, the Speaker of the Senate, and other senior government officials, Shulgin announced the formation of a government that would operate based on conservative and nationalistic principles, while honoring the legacy left behind by Kornilov. The new administration wasted no time in implementing urgent measures to maintain the continuity of governance in the country. Personnel changes have been made in key government departments, with individuals loyal to the National Center appointed to positions of responsibility. While the State Duma continues its meetings, discussions are underway to amend the constitution, which may lead to further consolidation of executive power, ensuring a stable leadership for Russia in the future."
rusd.3042.a: "Strong and united Russia is here to stay."

rusd.3043.t: "General Boldyrev's Counter-Coup"
rusd.3043.d: "Kutepov's fragile tenure came to an abrupt and sanguinary end. It was evident from the outset of his ascension that his reign was built on shifting sands - far too many officers declined to acknowledge his authority, and numerous factions within the military remained discontented. Now, their patience had been exhausted.\n\nIn the early hours of the morning, well-organized units under General Vasily Boldyrev's command launched an offensive against Kutepov. Supported by officers sympathetic to democratic ideals and seasoned commanders such as General Anton Denikin, Boldyrev's forces swiftly seized control over key government buildings in Petrograd. The units once loyal to Kutepov had been demoralized and unprepared for combat, offering minimal resistance. By midday, the remnants of Kutepov's supporters either surrendered or sought refuge in exile. Kutepov himself was apprehended while attempting to rally the remaining forces at the Winter Palace. In a broadcast to the nation, General Boldyrev declared the end of an era of militarist rule. He denounced the chaos that followed the overthrow of General Kornilov, pledging to initiate a transition towards civilian governance. Amidst the ongoing divisions within the Popular Front, it appears that the Revolution, previously unquenchable, has found its new champion in General Boldyrev."
rusd.3043.a: "If you cannot quell the revolution, then take charge of it!"

rusd.3044.t: "General Arkhangelsky's Counter-Coup"
rusd.3044.d: "The military dictatorship of Kutepov was doomed from its inception. Isolated and increasingly paranoid, Kutepov ruled not with authority but with fear, eliminating disloyal officers, antagonizing the remaining political establishment, and pursuing a harsh monarchical policy. His fall was inevitable.\n\nGeneral Aleksey Arkhangelsky, a highly respected military commander, led a decisive counter-coup supported by General Pyotr Wrangel and other officers loyal to the idea of a legal and orderly state. In contrast to Kutepov's haphazard attempt at a coup, Arkhangelsky's coup was meticulously planned. The supporters of the military swiftly seized strategic locations throughout Petrograd while key members of the government, weary of Kutepov's instability, quietly changed their allegiance. After a brief stand-off at his headquarters, Kutepov himself was apprehended. With his remaining followers either dispersing or capitulating en masse, the final vestiges of his radical monarchist faction were ousted from power. In a speech before the newly reconstituted [GetUpperChamberNameShort], Arkhangelsky declared the Provisional Government of the Russian State, pledging to restore order and lawfulness to the nation. Unlike his predecessors, Arkhangelsky vowed to transition to a constitutional regime, though it remains uncertain whether this will truly be a republican or monarchical system. For the time being, his priority is to stabilize the country and quell the revolutionary forces that pose a threat to his authority."
rusd.3044.a: "Glory to the General!"

rusd.3045.t: "Combat Organization of General Kutepov"
rusd.3045.d: "At a secretive gathering of the Russian All-Military Union, General Aleksandr Kutepov proposed a bold and potentially perilous initiative: the establishment of a Combat Organisation, a paramilitary force designed for clandestine operations, targeted assassinations, and direct confrontations against \"traitors of Russia\". Drawing inspiration from Savinkov's Combat Squads, this organisation would serve as a covert arm of the White movement, instilling fear in the hearts of sympathisers of the Popular Front, socialist propagandists, and even supporters of the Republican cause.\n\nKutepov, a relentless adversary of socialism, maintains that conventional political approaches have proven ineffective. He contends that the Popular Front and its affiliates - whether they be SRs, liberals, or moderate conservatives - constitute impediments to restoring genuine order in Russia. For him, the path forward lies in decisive and unyielding action.. The paramilitary unit will operate clandestinely, targeting key individuals and eliminating the adversaries of the ROVS before they have a chance to launch their initial assault.\n\nHowever, such operations entail significant risks: the emergence of yet another paramilitary group, albeit one that operates within the confines of regulation, could potentially plunge the nation into even greater turmoil."
rusd.3045.a: "We're not terrorists, after all!"
rusd.3045.b: "We must use same means as our enemies."

rusd.3046.t: "General Kutepov Denounces ROVS"
rusd.3046.d: "The rejection of General Aleksandr Kutepov's proposal for a military organisation was the final straw. Disillusioned by the ROVS's leadership's reluctance to take decisive measures against Russia's adversaries, he publicly condemned the organisation as toothless, inflexible, and blindly loyal to the Republic, which he considered unworthy of such allegiance.\n\nIn a fiery address to his supporters, Kutepov criticised the very foundation of the ROVS, denouncing its doctrine of political neutrality as a feeble excuse for inactivity. He announced his departure from the ROVS and joined forces with generals Mikhail Drozdovsky and Anton Turkul, who had already departed the organisation to form RNSUV.\n\nNow, radical monarchist officers rally around them, advocating for a more assertive and belligerent approach to safeguarding Russia's future. While some members of the ROVS continue to adhere to General Kornilov's prudent leadership, there is a growing sentiment among others that maintaining neutrality may be a misstep."
rusd.3046.a: "Unbelievable!"

rusd.3047.t: "Osoboye Soveschaniye"
rusd.3047.d: "The recent years have convincingly demonstrated that Russia is ill-suited to parliamentary and democratic system. The perpetual disputes, fragile coalitions, and dominance of various lobbyists have left Russia with a choice between lawlessness and authoritarianism, which are both manifestations of leftist ideologies.\n\nIn response to this situation, the government has concluded that only a strong leader can prevent the country from collapsing into chaos and a civil war. In a speech on the radio, [GetRussianPM] announced that Russia has now embarked on a path towards stability, strength, and the elimination of anarchy.\n\nThe government has taken a fundamental step by transferring the exercise of supreme power to a single individual, who will be supported by the government. This individual will be granted the title of Supreme Ruler. On that day, Lavr Kornilov assumed full state power and became the Supreme Ruler of Russia, as announced by the Supreme Ruler himself in a subsequent radio address. He announced the formation of a legislative and administrative body under the Supreme Ruler - the General Command, which would function until the parliament was reinstated. In essence, the General Command would assume the responsibilities of the government and the Senate. Kornilov further stated that the Russian State would no longer follow the perilous path of partisanship, with no political party ever gaining representation in the General Command.\n\nThis latest self-coup sparked a wave of criticism and revolutionary discontent among the general population, while the remaining opposition leaders called for resistance against this unprincipled usurpation of power, denouncing the \"Supreme Ruler\" and \"his High Excellency's\" administration" for dismantling the foundations of Russia's constitutional order. However, their opinions are no longer relevant."
rusd.3047.a: "Russia will never be weak again."

rusd.3048.t: "Konstitutsiya Kornilova"
rusd_3048_d_state_religion: " and it was noted that Orthodox Christianity is the official religion of the Russian State, while freedom of religion was fully upheld"
rusd_3048_d_no_state_religion: " and it was noted that state oversight over religious affairs cannot be restored. Religious liberty should be fully exercised without any restrictions."
rusd_3048_d_death_penalty: " All citizens were declared equal before the law, and the death penalty remained in force but was to be applied only for the most serious crimes against the state."
rusd.3048.d: "The amendments to the Russian Constitution were finally adopted thanks to the concerted efforts of the Duma and the Senate. These amendments were drafted and proposed for the first reading by General L. G. Kornilov, senior officials of the ROVS, and mediated by Ivan Ilyin.\n\nIn the first chapter of the revised Constitution, the legal name of the country was changed from \"Russian Democratic Federative Republic\" to \"Russian State\". The right to property was guaranteed,[rusd_3048_religion].[rusd_3048_death_penalty]\n\nMost articles remained unchanged, but a few were modified. In particular, forced nationalization by workers and worker-controlled enterprises was prohibited, as it was deemed to be detrimental to domestic industry.. Moreover, the Constitution recognizes the right of individual ethnic groups within Russia to broad autonomy, provided that the unity of the state is maintained.\n\nThe most significant amendment for General Kornilov himself was the restoration of the Russian Army on the basis of true military discipline. The Army should be formed voluntarily (following the principle of the British Army), without the involvement of committees, commissars, or elected positions.\n\nPerhaps the most significant changes were made to the chapters on executive and legislative powers. The name \"State Council\" has been restored to the Senate, and the procedure for electing its members has been modified - the upper house will now be elected exclusively by regional parliaments.\n\nAccording to the constitutional amendments, the President of the Russian State will be elected for a term of four years by citizens through universal, equal, direct, secret voting. The Chairman-Minister of the Russian State is appointed by the President, following the approval of his candidacy by the State Duma."
rusd.3048.a: "New Russia is rising."

rusd.3049.t: "The Constitutional Court Restores the 1920 Constitution"
rusd.3049.d: "The regime of General Kornilov's military dictatorship came to an end, and with it, the pillars that had weakly supported it crumbled. The dictator had failed to dismantle the institutions, and in his absence, they began to rebuild.\n\nLast week, at the behest of the government and a faction of left-leaning Duma deputies, the Constitutional Court examined the legality of General Kornilov's constitutional amendments. The court ruled that, although the amendments had been passed by the Russian parliament with the requisite two-thirds majority, they were in fact contrary to the adopted constitution, which expressly prohibits changes to its first chapter. Moreover, the court considered the fact that General Kornilov had effectively staged a military putsch, and consequently, the actions of political institutions during that period might have been taken under duress and were not in line with democratic standards. In any case, the Constitutional Court ruled the amendments unlawful, ordering the immediate annulment of the \"Kornilov Constitution\" and the reinstatement of the 1920 constitution (along with its amendments adopted in 1925 and others).\n\nWhile some deputies saw some positive aspects in the Kornilov Constitution, on the whole, it was hardly democratic, granting the president far-reaching powers."
rusd.3049.a: "Let us just hope this is not restoration of Kerenskyism."

rusd.3050.t: "Dissolution of \"Volunteerism\" Into \"Regularity\""
rusd.3050.d: "In the aftermath of the transformation of the Volunteer Army into the Armed Forces of Southern Russia, the role of volunteers has gradually diminished in favor of a more structured and organized approach to military service. In the final years of the civil war, volunteers were an ostracized group, but their cause continued to be championed by leaders of the White movement.\n\nDuring the era of the democratic republic, reforms of the army and General Staff did not align with Kornilov's vision, resulting in a largely conscript-based and mobilized military. The trend towards regularization is evident, and if Russia ultimately abandons the concept of a professional Volunteer Army, the cultural and quasi-religious significance of volunteering may fade."

rusd.3051.t: "Pyotr Wrangel and Hetman Skoropadsky"
rusd.3051.d: "The Volunteers, followed by the Russian All-Military Union, have consistently upheld the principles of united and indivisible Russia. In recent decades, the increasing revisionism in Russian society has manifested itself in the unwavering nature of this fundamental aspect of ROVS ideology.\n\nTherefore, the figure of General Skoropadsky, a self-declared Ukrainian Hetman whose authority was solely dependent on German bayonets, elicited an unambiguously negative response. In response to this, a group of generals allegedly instigated by Denikin sought to engage in provocative actions against General Wrangel, who, in their view, had collaborated with Skoropadsky in 1918 and was supposed to lead the Ukrainian General Staff.\n\nDespite the fact that in reality the Black Baron refused this offer and, together with General Dragomirov, left Ukraine to join the Volunteer Army, the purpose of these rumors is clearly to discredit Wrangel."
rusd.3051.a: "Prevent the spread of this slanderous rumour!"
rusd.3051.b: "Connive at this gossip."

rusd.3052.t: "Snap Elections Announced in the Russian State"
rusd.3052.d: "In a decisive move, President Kornilov has initiated a constitutional overhaul, effectively dissolving both the Duma and the Senate. This move sets the stage for an extraordinary election cycle, scheduled to take place within the next three months. These elections will shape the trajectory of Russia's future political course. While Kornilov supporters perceive this as a stride towards establishing a well-ordered state, opponents, both moderate and radical, view these amendments as a veiled attempt at consolidating authoritarian control. Socialist parties, still recovering from government crackdowns, face an uphill battle, while conservative, nationalistic, and military factions are anticipated to dominate the electoral race."
rusd.3052.a: "Onwards, to the new Russia!"

rusd.3053.t: "The Establishment of the Regency Council"
rusd.3053.d: "As the Supreme Commander-in-Chief and the de facto ruler of the nation, Lavr Kornilov now finds himself at a crossroads, where the restoration of monarchy, once a distant aspiration, has become a pressing issue that demands attention.\n\nKornilov, recognizing the yearning among the General Staff and military officers for the stability that monarchy once provided, has decided to establish the All-Russian Regency Council. This body will serve as the catalyst for restoring the monarchy, tasked with overseeing a referendum process to determine the successor to the throne. Yet, Kornilov is keenly aware that monarchy cannot be imposed by force alone; the country remains divided by the scars of revolution, with many factions opposing the idea. Thus, the powers vested in the Regency Council are limited to selecting the future monarch and the conviction of monarchist factions is that the restoration of the monarchy is a possibility, albeit not yet realized. The holding of a referendum is contingent upon parliamentary approval. The critical question at hand is: who shall preside over the Regency Council? General Kornilov faces the task of selecting a leader who can unite the monarchist ranks, while simultaneously maintaining a position of neutrality.\n\nThe first contender is Boris Engelgardt, a liberal monarchist and member of the VNS. His active involvement in the February Revolution makes him an intriguing, yet contentious candidate for Kornilov's support. Engelgardt's leadership could bolster confidence among monarchist officers in the General Staff, but his association with the February Revolution might alienate some staunch monarchists.\n\nThe second choice is Pyotr Wrangel, a steadfast monarchist and key figure in the ROVS. He represents a more centrist option, adhering to the non-partisan and apolitical principles of the ROVS. This could make him an unifying figure among military personnel, but it would be challenging for him to garner the support of civilian monarchist movements or the broader public.\n\nLastly, there is Aleksandr Lukomsky, a moderate monarchist closely linked to the ROVS. His appointment could strike a delicate balance between the more radical monarchist elements and the more conservative factions within the military. While Lukomsky may not enjoy the widespread acclaim and influence enjoyed by Engelgardt or Wrangel, his assured and prudent leadership may make him an appealing candidate for those seeking stability and a more measured approach to restoring the monarchy."
rusd.3053.a: "Engelgardt shall head the Council."
rusd.3053.b: "The Black Baron Wrangel is a natural choice."
rusd.3053.c: "Appoint Lukomsky instead."

rusd.3054.t: "Choosing an Heir"
rusd.3054.d: "The Regency Council, established to oversee the process of gradually restoring the monarchy, faces the most significant challenge at present – the issue of determining the successor to the throne. While the Council was established with the government's commitment to subsequently organize a national referendum on the monarchy, it has become apparent that the restoration of the monarch cannot occur without first determining a suitable successor. However, this seemingly straightforward task has given rise to deep divisions among monarchist factions.\n\nKirill Vladimirovich has been chosen by long-time monarchists and members of the Black Hundreds. He embodies the older, autocratic traditions of monarchy. Supporters argue that Russia needs a strong and unquestionable leader, rather than a figurehead. However, some reactionary monarchists and representatives of the Black Hundred oppose his candidacy, citing his actions during the February Revolution, when he, instead of supporting Tsar Nicholas II, was the first member of the royal family to break his oath of allegiance and declare his personal loyalty to the revolution. Members of the State Duma also support this stance, as do some high-ranking members of the Russian Army's White movement.\n\nGrand Duke Dmitry Romanov is a preferred candidate among moderate monarchists and VNS. He is an experienced statesman and an advocate of constitutional monarchy, and his supporters argue that he represents a modern and pragmatic monarch who can unite Russia rather than rule it as an autocrat. However, some uncompromising monarchists believe him to be too weak and too closely aligned with Republican ideals, and they are convinced that he could be directly influenced by the National Assembly in his decision-making.\n\nAnother candidate for the position of Tsar is Roman Petrovich, a lesser-known member of the Romanov family. He is the nephew of Prince Nikolay Nikolaevich, who was closely associated with the ROVS and supported its activities. Although he enjoys support from moderate monarchists, hardliners oppose his candidacy.\n\nDisagreements over the succession issue have led to a standstill in the work of the Regency Council, preventing it from achieving any significant progress. Some members of the council advocate postponing a decision, fearing that an early choice could disrupt the delicate balance between monarchist factions. Others argue that time is of the essence and that the council should act as soon as possible to prevent the monarchists from losing the political initiative to republicans."
rusd.3054.a: "Select Kirill Vladimirovich as heir."
rusd.3054.a2: "Select Vladimir Kirillovich as heir."
rusd.3054.b: "Select Dmitry Pavlovich as heir."
rusd.3054.b2: "Select Pavel Dmitrievich as heir."
rusd.3054.c: "Select Roman Petrovich as heir."
rusd.3054.e: "Delay the decision..."

rusd.3055.t: "Choosing an Heir"
rusd.3055.d: "Despite weeks of negotiations, the Regency Council has been unable to reach an agreement on the rightful successor to the Russian throne. The original candidates – [GetRusKirillovich], Dmitry Pavlovich, and Roman Petrovich – proved to be too controversial, and each one caused dissatisfaction among different factions within the monarchist movement. The delay has angered both military and nobility groups, as they fear that the longer Russia remains without a clear monarch, the higher the risk of republican or revolutionary groups taking advantage of the political vacuum. Faced with increasing pressure and a lack of clear consensus, new candidates have been proposed – less traditional figures who, while not the first choice, could serve as a compromise or even a radical solution to the succession issue.\n\nVsevolod Ioannovich is a young member of the Konstantinovich branch of the Romanov dynasty and a representative of aristocratic circles. He lacks strong political connections, making him a relatively neutral candidate in the eyes of the public. As the grandson of Emperor Alexander III, Andrey Aleksandrovich holds a position as a high-ranking noble and moderate aristocrat with views that are more in line with European values. He could potentially act as a bridge between the conservative monarchist and liberal constitutionalist factions.\n\nThe most controversial choice of all would be Prince George Mikhailovich Brasov, who is the illegitimate son of Grand Duke Mikhail Aleksandrovich and the younger brother of Tsar Nicholas II. His legitimacy as a member of the Romanov dynasty is disputed, and therefore, traditionalists would not recognize him as an Emperor."
rusd.3055.a: "Select Vsevolod Ioannovich as heir."
rusd.3055.b: "Select Andrey Aleksandrovich as heir."
rusd.3055.c: "Select Georgy Mikhailovich as heir."

rusd.3056.t: "Right-Wing Monarchists Condemn the Regency Council"
rusd.3056.d: "The establishment of the Regency Council elicited a diverse response. While many viewed it as a crucial step towards the restoration of the monarchy and stability in Russia, certain right-wing monarchist groups began to voice their discontent. These groups, particularly those affiliated with the Black Hundreds, were particularly incensed that Kornilov's decision to establish the Regency was accompanied by a clear limitation of his authority.\n\nRight-wing monarchists, who envision the monarchy as the restoration of Tsarist autocracy, believed that the Regency should wield significant influence over the government and military, paving the way for a full restoration of the monarchy. However, due to the symbolic nature of the Council's powers and lack of real administrative control, many were left feeling frustrated and enraged.\n\nThe condemnation of Kornilov's actions served to exacerbate the rift within the monarchist movement. His decision to curtail the powers of the Regency Council was viewed by the most radical right-wing monarchists as a betrayal of the ideals they held dear, causing them to distance themselves from Kornilov and his plans. This has led to a decline in support for his vision among these groups, who are now considering alternative strategies for restoring the monarchy on their own terms."
rusd.3056.a: "We've already established it with a good grace."

rusd.3057.t: "Monarchists Denounce Boris Engelgardt"
rusd.3057.t2: "Monarchists Denounce Pyotr Wrangel"
rusd.3057.t3: "Monarchists Denounce Aleksandr Lukomsky"
rusd.3057.d.intro: "The establishment of the Regency Council was intended to serve as a stabilizing force, serving as a conciliatory gesture towards monarchist elements within the government and military. However, rather than unifying the monarchist movement, the selection of its leader sparked outrage and intense controversy.\nMany monarchists, particularly those with a more conservative and reactionary outlook, have openly denounced the choice of head of the Regency Council."
rusd.3057.d.end: "\n\nAcross the country, monarchist publications, officer circles, and clandestine salons are brimming with criticism. Generals such as Mikhail Drozdovsky and Aleksandr Kutepov, both ardent monarchists, privately express their discontent with the Regency Council's leadership, deeming it a misstep to entrust the task to someone who might either delay restoration or compromise its prospects."
rusd.3057.d: "$rusd.3057.d.intro$ Boris Engelhardt's appointment has particularly provoked their ire. As a monarchist himself, Engelhardt actively participated in the February Revolution and initially supported Kerensky, even acknowledging the legitimacy of the republic in the fight against Germany.\nHis perceived compromise stance and lack of credibility have led many to view him as someone who will indefinitely delay the restoration of the monarchy. They advocate for a more radical leader who would swiftly dismantle republican institutions and bring about a return to the monarchy without delay. $rusd.3057.d.end$"
rusd.3057.d2: "$rusd.3057.d.intro$ Wrangel, a venerated general and monarchist, is also an unwavering advocate for the apolitical stance of the Russian All-Military Union (ROVS). His steadfast refusal to employ the military for political objectives casts doubt among monarchists regarding his commitment to actual restoration. Some radical voices whisper that Wrangel's neutrality and caution may lead him to do little to restore the monarchy. $rusd.3057.d.end$"
rusd.3057.d3: "$rusd.3057.d.intro$ Lukomsky, a prominent monarchist figure, is accused of weakness, with fears that he may lack the strength and influence necessary to drive the restoration forward. Moderates, meanwhile, worry that his ties to hard-line conservatives could foster unnecessary tension. $rusd.3057.d.end$"
rusd.3057.a: "Their dissatisfaction with any government action can be regarded as treason..."

rusd.3058.t: "Supreme Monarchist Council"
rusd.3058.d: "Today, with the legalization of \"Black Hundred\" organizations, right-wing monarchist forces have finally emerged from the shadows of moderate parties such as the [GetSocConParty]. Evgeny Markov, the \"Kursk Bison\", and perhaps currently the most active radical monarchist, has announced the creation of the Supreme Monarchist Council (VMS), an organization that explicitly states that a monarchy is necessary for the restoration of Russia. With the slogan \"Faith. Tsar. People\", the organization rejects the return to \"old orders\" and instead advocates a return to \"order\". At the first congress of the Supreme Monarchist Council, Markov himself was elected as the chairman, with Aleksander Krupensky, the leader of the Bessarabian nobility, serving as his deputy. The congress began with a prayer service, and the Council's program was also adopted. The VMS has so far refrained from openly supporting any of the contenders for the throne, declaring its loyalty to all descendants of the Romanovs. Other notable attendees of the congress included Pyotr Gendrikov, a veteran of the Volunteer Army and the last Tsarist governor of Oryol, as well as Nikolai Talberg, a former Tsarist official and writer who currently teaches at the theological academy in Saratov."
rusd.3058.a: "The Kursk Bison reminded of himself."

rusd.3059.t: "[THIS.GetName] Resigns in Protest"
rusd.3059.d: "As the power of the monarchist faction within the ROVS grows stronger, [THIS.GetName], a staunch republican and advocate for the apolitical stance of the union, can no longer stand by. Believing that the ROVS is straying too far from its founding principles, the commander has submitted an official resignation, decrying the increasing political interference and the dominance of monarchist agendas. This marks a significant moment in the ongoing struggle within the union, with [THIS.GetName] taking a firm stance against what many see as the perversion of the ROVS' original purpose. Such a departure will certainly have a ripple effect on the union, as other like-minded generals may follow suit, further polarizing the ROVS."
rusd.3059.a: "Reject this resignation."
rusd.3059.b: "Let them go."

rusd.3060.d: "In response to the increasing influence of republican ideals within the ROVS, [THIS.GetName], a leading monarchist general, decides to resign from his position in protest. His belief in the restoration of the monarchy and a more authoritarian military role clashes with the growing republican faction's agenda. He condemns the weakening of the ROVS as a military entity, warning that the union is being transformed into a political tool, instead of maintaining its original focus on the military's role in securing Russia's future. His resignation signals a deep rift within the union and threatens to erode the unity of the veteran's organization even further."

rusd.3062.t: "The Knight Who Never Existed"
rusd.3062.d: "The summer heat of 1919 carried many things across the steppe - dust, rumor, and the distant echo of collapsing empires. Among these came something stranger still: a knight. Word arrived from George V himself - the King of the Mighty British Empire and the last ally of the White Armies. In recognition of valiant service in the struggle against Bolshevism, framed in London as nothing less than a crusade against a universal evil, the Crown had seen fit to bestow knighthood upon one \"General Kharkov\", enrolling him into the distinguished Order of St. Michael and St. George. A curious choice, perhaps, but wartime Britain was not above honoring distant allies whose names carried weight.\n\nThe British mission, which happened to be the last one before the Liberation of Moscow, dispatched with ceremony and a polished case containing the insignia, first arrived at the headquarters of Lavr Kornilov. There they made their inquiry:\n\n\"Where is General Kharkov?\"\nNo one could say. Perhaps he had moved with the front. Perhaps he had been reassigned. Perhaps, the British had confused a city for a man.\n\nUndeterred, the mission pressed onward, finally reaching Voronezh, where the headquarters of Anton Denikin received them. Here, at last, the matter was clarified. General Kharkov did not exist. He had never existed.\n\nNo officer of that name had ever held command, drawn pay, or issued orders. No adjutant had served under him, no soldier had marched at his side. \"Kharkov\" was a city, but never a man. The British delegation, faced with the undeniable, could hardly return the King’s honor unbestowed. The machinery of Empire did not easily admit error - especially not one so... imaginative. And so, in a gesture equal parts pragmatism and quiet embarrassment, the insignia and royal patent were presented instead to Vladimir May-Mayevsky, a very real general of considerable reputation, who happened to be just dismissed for a bout of heavy drinking. His adjutant would later recount the moment with dry amusement: a knightly honor bestowed upon a man who at least had the courtesy to exist. Thus ended the brief and illustrious career of General Kharkov - hero of no battles, commander of no troops, and the only officer in history to be knighted by the British Crown without ever having been born."
rusd.3062.a: "Let's raise a glass to Sir May-Mayevsky, God rest his soul!"

rusd.3063.t: "The White Cross"
rusd.3063.d: ""
rusd.3063.a: ""

rusd.3064.t: "The Society of the Zealots of Military Knowledge"
rusd.3064.d: "In the years following the disasters of the Revolution and the Civil War, the Russian officer corps has been forced to face an unpleasant truth: valor alone is not a victory, and instinct cannot replace knowledge. It is in this spirit that Vasily Pronin has begun to attract the attention within the higher command. A participant in the fateful days of the Kornilov affair and among those officers confined in Bykhov, Pronin emerged through the Civil War as an assistant to the Chief of the General Staff of the Volunteer Army. Now, under the auspices of the General Staff Academy under the leadership of Nikolay Golovin, and where Pronin teaches, he has gathered a small circle around himself: the \"Society of the Zealots of Military Knowledge\".\n\nThe society studies campaigns and failure, as well as foreign doctrines not for the purpose of imitation, but with the intent to extract principles from practice and promoting military scientific knowledge. The General Staff encourages the Society, as it has made funds available and attendance recommended. There is an unspoken but firm understanding that a modern army cannot be built on nostalgia for the Ice March alone.\n\nAt another time, such people might have been dismissed as pedants. In another time, such men might have been dismissed as pedants. In the present circumstances, they are becoming indispensable."
rusd.3064.a: "The Army must learn before it can triumph."

rusd.3065.t: "A Philosopher Among Officers"
rusd.3065.d: "In the years that followed the end of the Civil War, as the Russian state slowly emerged from the chaos of revolution and reconstruction, a quieter process unfolded within the ranks of the officer corps. Beyond drills, reports, and endless administrative burdens, a number of senior commanders began to take interest in questions that had once seemed secondary to survival itself - questions of authority, duty, and the meaning of the state they had fought to preserve.\n\nIt was in this atmosphere that Ivan Aleksandrovich Ilyin, a jurist and philosopher known for his uncompromising opposition to revolutionary thought, found his way into military circles. Not a soldier by profession, nor a politician by inclination, Ilyin nevertheless spoke with a clarity that resonated among officers who had witnessed the collapse of the old order and the uncertain birth of the new. His lectures, delivered in academies and private gatherings alike, spoke of Russia as a living organism, bound not merely by law or force, but by a shared sense of duty and moral purpose. The state, in his view, could not rest on coercion alone, nor could it be entrusted to the shifting will of factions. Authority had to be rooted in a national consciousness that transcended both revolution and reaction.\n\nWhile general Kornilov himself did not openly endorse any single doctrine, as his focus remained firmly on discipline, unity, and the restoration of order, Ivan Ilyin became one of the chief ideologues of the Russian All-Military Union."
rusd.3065.a: "Russia must first be understood before it can be governed."

rusd.3067.t: "The Unanswered Question of the Throne"
rusd.3067.d: "The assassination of Tsar Nikolay II and his immediate family during the tumultuous Russian Civil War not only brought about the demise of the ruling Romanov dynasty but also shattered the notion of unquestionable continuity. While the House of Romanov may have survived, it no longer stands united.\n\nKirill Vladimirovich, a prominent figure within the Romanov lineage, claimed the throne in the early 1920s as the senior male heir, proclaiming himself Emperor in an attempt to maintain the continuity of the Imperial line. However, his claim is met with controversy even among monarchists. His actions during the February Revolution, including his purported reconciliation with revolutionary authorities, have left an indelible mark on the minds of many officers and monarchists, as has the deeper question of whether his marriage was sanctioned by Nikolay II.\n\nThe opposition to Kirill emerged almost immediately in the face of Nikolay Nikolaevich, who challenged the legitimacy of Kirill's claims. Around him, the military and numerous monarchists rallied, having not forgotten him as the governor of the Caucasus, the commander-in-chief of the Caucasian Army, and the military commander of the Caucasian Cossack troops during the Weltkrieg. However, due to his death in 1929 without issue, this powerful legitimist faction was left without a successor to the throne.\n\nNow, opposition to Kirill takes the form of various possibilities. Attention is drawn to figures such as Andrey Aleksandrovich, Roman Petrovich, and Vsevolod Ivanovich, who are seen as unblemished figures, closer in spirit to the military, and more acceptable to those fighting for the restoration of Russia. Some go even further, placidly postulating that the cataclysm of the revolution might have utterly annihilated the old regime - that, if the monarchy is to be restored, it must be reconstructed, not merely rebuilt. For the time being, the vacant throne remains unoccupied."
rusd.3067.a: "This is not the time to divide Russia with such nuances."

rusd.3083.t: "The Black Baron"
rusd.3083.d: "A new legend began to flourish in the training grounds and military academies, capturing the imagination of young cadets aspiring for leadership and glory. After their training sessions, they would gather in circles, sharing stories about the enigmatic figure they dubbed the \"Black Baron\". Pyotr Wrangel, the leader of the arduous and desperate battle for Tsaritsyn, his unyielding will and impenetrable persona is becoming the subject of genuine admiration. For these young individuals, Wrangel embodies everything the Russian army is meant to represent: an unyielding spirit of resistance to both Bolshevism and decaying liberalism, military acumen and stoic demeanour. Due to his sombre black Circassian coat he often wears in public only added to his mystique of the Black Baron. In the eyes of many, Wrangel is seen as a visionary, a man who, given the opportunity, could restore Russia to its former greatness. His speeches, albeit few in number, touched the hearts and minds of many."
rusd.3083.a: "A new hero for the Junkers?"

rusd.3090.t: "Secret Negotiations"
rusd.3090.d: "Now, as tensions between us and the government in [RUS.Capital.GetName] begin to rise once again, and Russia finds itself engulfed in the flames of revolutionary unrest, we have received, via officer channels, a communication from a delegation representing Lavr Kornilov, inviting us to commence negotiations.\n\nThe stance of the Kornilov administration is straightforward - Russia cannot be partitioned, and we must strive for unity, putting aside past grievances. Similar to the events of the Civil War era, when a fragile accord between the White Commanders contributed to defeating the oppression of Bolshevism, the Kornilovites advocate for the establishment of a formal non-aggression treaty, followed by the integration of our two nations.\n\nOf course, Admiral Kolchak must relinquish his \"self-proclaimed position\" and disband his government. Instead, he would be offered to become the Supreme Admiral once again, and full pardon is offered, for a united effort against socialism and other adversaries for the sake of Russian unity."
rusd.3090.a: "Russia sorely needs unity."
rusd.3090.b: "By not standing by us in 1925, he already betrayed Russia..."

rusd.3091.t: "The Admiral Refused"
rusd.3091.d: "Our message to Admiral Kolchak has been heard, but unfortunately it has been rejected on the grounds that we are traitors to Russia. The Rubicon has been passed. As long as the Kornilovites remain alive, this Japanese lapdog must be put down!"
rusd.3091.a: "Whosoever opposes the unity of all Russia, opposes Russia itself!"

rusd.3092.t: "The Irkutsk Protocol"
rusd.3092.d: "Today in Irkutsk, a historic moment has been marked by the signing of an agreement between representatives of the \"Transamur administration\" and our official government. The Admiral's administration has agreed to the unification in exchange for a full pardon and some concessions."
rusd.3092.a: "Glory to Russia!"

#hidden event
rusd.3099.t: "Wrangel Mission fires again"

rusd.3100.t: "Sabotage in the Factories"
rusd.3100.d: "Reports from the industrial heartland of Russia paint a bleak picture. Dissatisfied workers, embittered by the deterioration of conditions, mass arrests of socialist activists, and the iron-fisted policies of the government, have begun purposefully sabotaging production lines.\n\nMachine parts are going missing, railway depots are reporting stolen or damaged supplies, and shipments of critical military equipment are being inexplicably delayed. Sabotage is not limited to factories; railway workers are slowing down work, refusing overtime, or going on mass sick leave, causing chaos in the movement of troops and supplies.\n\nThere are already reports of ammunition and fuel shortages in key garrisons. While this situation has not yet escalated into a full-scale strike, it threatens to cripple the military-political apparatus if not addressed."
rusd.3100.a: "Crack down on the saboteurs and impose severe punishments."

rusd.3101.t: "Mutiny Among the Troops"
rusd.3101.d: "Dissatisfaction is on the rise within the Russian military ranks. Confronted with orders to quell uprisings and worker protests, many servicemen question their part in what they perceive as a conflict against their own countrymen. Some units have openly defied orders, maintaining that they signed up to protect Russia, not to fire upon their fellow citizens.\n\nAcross several garrison locations, entire regiments have abandoned their posts, fleeing into the countryside. While some soldiers have vanished without a trace, retreating to their homes, others - more concerningly - have joined clandestine socialist militias. The weapons and training provided to these insurgent groups imbue them with newfound strength, with reports suggesting that anti-government elements in rural areas are preparing for concerted resistance."
rusd.3101.a: "Hunt down the deserters and make an example of them."

rusd.3102.t: "A Bullet for the Regime"
rusd.3102.d: "Today, one of the principal members of the government narrowly avoided a fatal encounter. As he departed the government building in Petrograd, he became the target of an ambush by a solitary gunman, subsequently identified as a socialist revolutionary affiliated with clandestine militant factions. The assailant managed to discharge several rounds before he was apprehended, but the government official sustained only minor injuries.\n\nDespite the failure of the assassin, his actions have emboldened revolutionaries across the country. Underground socialist cells throughout the nation extol him as a hero and martyr, prepared to sacrifice his life in a strike against the core of the Kornilov regime. Flyers are circulating in factories and military barracks, extolling the terrorist act and urging others to emulate it."
rusd.3102.a: "Traitors of Russia!"

rusd.3103.t: "Sailor Conspiracies"
rusd.3103.d: "Alarming reports are emerging from the Baltic Fleet, indicating a growing trend of clandestine gatherings among sailors. Revolutionary pamphlets, intended to spread dissent, have been found in barracks and are circulating within the ranks. Attempts by commanding officers to maintain discipline have been met with open defiance, with some crews outright refusing to obey orders.\n\nThe specter of the events of 1905 and 1917 looms large, as discontented individuals whisper about potential rebellion. While a full-blown uprising has not materialized yet, intelligence suggests the presence of active socialist agitators within the naval ranks. If left unchecked, this could lead to widespread desertion, or, worse, an armed insurrection at sea."
rusd.3103.a: "Keep a close watch - any mutiny must be crushed immediately."

rusd.3104.t: "Revolutionary Propaganda Spreads"
rusd.3104.d: "Despite the government's best efforts to enforce strict censorship, socialist publications continue to spread like wildfire through Russia's industrial hubs. These clandestine publications, clandestinely infiltrating factories, universities, and even military barracks, denounce the rule of Kornilov, expose alleged corruption within the government, and denounce brutal repression of workers and protestors. Leaflets urging strikes are posted on factory walls, and newspapers publish scathing articles condemning the suppression of political opposition.\n\nThere are widespread reports of soldiers refusing to obey orders and workers defying their factory bosses, further fueling the belief that another revolution is imminent. Efforts to suppress these publications have proven futile. During police raids on suspected hideouts, printing presses have been discovered in secret cellars, but for each destroyed publication, it seems that two more have appeared. Every day, the calls for revolution reach more and more people."
rusd.3104.a: "Crack down on underground presses!"

rusd.3105.t: "Sabotage on the Rails"
rusd.3105.d: "A convoy of military supplies destined for Siberia was diverted from its course by a band of armed revolutionaries operating in the countryside. The attack, executed with the use of explosives and well-coordinated ambush tactics, resulted in the destruction of the train and its precious cargo, including ammunition and food supplies, either through loss or theft.\n\nSurvivors reported that the assailants displayed red flags and banners bearing socialist slogans prior to their hasty retreat into the surrounding wilderness. This act of subversion not only disrupted military logistics but also delayed reinforcements and instilled fear among food convoys. Moreover, it serves as a stark reminder of the growing cohesion and audacity of the underground resistance movement.\n\nLocal security forces have noted a marked increase in guerrilla activity, with more and more groups emerging, many comprising disillusioned deserters and radicalized workers, targeting infrastructure facilities."
rusd.3105.a: "Vow swift retribution."

rusd.3106.t: "A Battalion Defects"
rusd.3106.d: "In one of the major industrial hubs, a contingent of soldiers defied direct orders to quell a workers' uprising. Instead of enforcing governmental repression, they openly proclaimed their allegiance to the revolutionary cause, espousing solidarity with the workers' aspirations for justice and socio-economic transformation. The defection of an entire unit ignited a wave of outrage within the military ranks. Should this trend continue, it may signify the onset of a widespread military insurrection, potentially destabilizing the government's hold on key urban areas. The situation is escalating rapidly, and the authorities are grappling to respond effectively."
rusd.3106.a: "Troubling..."

rusd.3107.t: "Coordinated Attack on Arms Depot"
rusd.3107.d: "A wave of orchestrated acts of arson has resulted in the destruction of critical weapons storage facilities in strategic industrial hubs across the nation. These attacks, perpetrated by clandestine revolutionary cells, have decimated vital armaments and munitions upon which the government relies to quell unrest and maintain its military dictatorship. The magnitude of the damage inflicted is substantial, leaving government forces grappling to maintain their capacity to counter insurgency. With access to essential supplies disrupted, the military is compelled to reassess its strategy.\n\nThe perpetrators' capacity to execute such precise and far-reaching attacks indicates a growing level of organization and effectiveness among the revolutionaries in their struggle."
rusd.3107.a: "Hunt down the arsonists."

rusd.3108.t: "Assault Failed!"
rusd.3108.d: "A well-orchestrated assault on a critical infrastructure facility by the resistance was swiftly and decisively rebuffed. The insurgents, seeking to strike against the Kornilov regime, launched an assault on a strategic supply depot with the intention of disrupting logistical operations and weakening the government's capacity to quell rebellions.\n\nDespite initial success in breaching the outer defenses, the assailants encountered formidable counterattacks from government forces, resulting in a fierce engagement. The battle concluded with the defeat of the insurgents who retreated under intense fire, leaving behind their wounded and some of their key leaders as prisoners. This failed operation significantly undermined the morale of the resistance movement."
rusd.3108.a: "Celebrate this small victory."

rusd.3109.t: "Curfew Defied in Moscow!"
rusd.3109.d: "Despite the government's efforts to impose a stringent curfew in Moscow, disobedience in the city centre is on the rise. Students, labourers, and political activists have defied the curfew restrictions, expressing their anger at the ongoing crackdown and economic hardships. As night descends, clashes between demonstrators and law enforcement escalate in intensity. The police, already stretched thin and acting under orders to maintain order at all costs, employ harsh tactics to suppress the protests. However, the people, resolute and desperate, refuse to back down, hurling stones, erecting barriers, and refusing to disperse.\n\nAs darkness falls, violence escalates, with reports of casualties on both sides. The breach of the curfew in Moscow serves as a manifestation of the growing unrest across the nation, as citizens continue to resist Kornilov's autocratic rule."
rusd.3109.a: "Deploy additional military forces to restore order."
rusd.3109.b: "Ease the curfew and negotiate with the protesters."

rusd.3110.t: "General Accused of Treason!"
rusd.3110.d: "Amidst the chaos engendered by the imposition of martial law and ongoing oppression, one of the commanders has been publicly accused of high treason. [THIS.GetName], who pledged his allegiance to Russia, is now the subject of a criminal inquiry on charges of conspiracy with socialist organizations. The allegations, based on intercepted communications, imply that the general might have engaged in clandestine discussions with revolutionary leaders or, at the very least, provided them with sensitive military intelligence. At present, the evidence is inconclusive, and the inquiry has been overshadowed by internal strife within the military establishment."
rusd.3110.a: "Delay actions, we need to investigate carefully."
rusd.3110.b: "Arrest him!"
rusd.3110.c: "Death to the traitors of Russia!"

rusd.3111.t: "Military Tribunals Established"
rusd.3111.d: "In a bid to re-establish order and consolidate Kornilov's authority, military courts-martial have been established throughout Russia. These tribunals, operating under the auspices of martial law, are empowered to deal with any form of dissent, be it from revolutionary agitators, deserting soldiers, or disloyal officers.\n\nThese courts, instituted by the Kornilov government, promise swift verdicts and severe punishments in the name of national security. Particular attention is paid to eradicating any revolutionary sympathizers within the military ranks. Any soldiers who refuse to obey orders, are suspected of undermining operations, or engage in acts of insubordination, face swift justice and severe consequences."
rusd.3111.a: "A necessary step."

rusd.3112.t: "People's Republicans in Opposition"
rusd.3112.d: "Following the establishment of a government sans the involvement of the People's Republicans, Boris Savinkov assumed a more assertive role. Despite not explicitly advocating for open rebellion, there exists evidence to suggest that the People's Republican faction is engaged in undermining the government's operations at the grassroots level, actively opposing the \"military dictatorship\" and espousing the concept of a \"people's dictatorship\", naturally under the leadership of the \"Vozhd\" Savinkov himself.\n\nBut Savinkov is no mere radical; he is one of Lavr Kornilov's closest associates, having been so for a considerable period of time and remaining so for many years. Now, evidently, he is feeling \"out of place\". The government's recent actions have sparked outright outrage, and thus Savinkov attempted to orchestrate an action in Petrograd, demanding his appointment as military governor of the city and acting commander of the Petrograd Military District, explicitly referencing the events of the 1917 Kornilov Uprising for which he was expelled from the PSR. Now, Savinkov threatens to join the \"Popular Front\", although he knows he will not be welcomed there, yet the intensification of revolutionary ferment by several tens of thousands of Savinkov's loyalists will not benefit Kornilov nor his government.\n\nIn one way or another, acquiescing to Savinkov's demands implies acknowledging his sway and authority over the government, as well as over Kornilov. However, on the other hand, he represents the largest republican movement that has not actively opposed a military coup, and enlisting their support would be advantageous."
rusd.3112.a: "SRs are SRs. No concessions to Savinkov!"
rusd.3112.b: "The largest right-wing Republican movement cannot be turned away from us!"

rusd.3113.t: "Civil Servants' Strike"
rusd.3113.d: "The recent upheavals in Russia and its regions, while not yet sufficiently severe to overthrow Kornilov's regime with a single decisive blow, have nevertheless been marked by periodic outbreaks of chaos. However, these disturbances may now be reaching their zenith.\n\nA series of strikes, involving workers, railway workers, and sailors, has led to the unexpected emergence of a new front in the struggle. Civil servants, predominantly from the central regions of Russia and predominantly ideologically aligned with the Socialist-Revolutionaries or the Left Kadets, have declared a general strike and launched civil disobedience campaigns against the actions of the \"military junta\". They have refused to carry out their duties, including financial record-keeping and public payments, until \"power is transferred to a democratic government\".\n\nIt remains uncertain whether this move was orchestrated by the Central Committee of the PSR, but it is clear that it will not serve their interests. This act of sabotage could potentially severely undermine our authority, prompting a number of more radical military leaders to advocate for the immediate dismissal of all striking personnel and empowerment of the military, including garrison units and commanding officers, to assume control in areas where civilian officials fail to uphold their constitutional obligations. Conversely, more moderate military figures propose a more measured approach, advocating for a temporary suspension of pay for these individuals until they come to their senses."
rusd.3113.a: "Suspend all payments to them."
rusd.3113.b: "The army should take power locally if officials cannot."

rusd.3114.t: "The RTsSPS Dispersed"
rusd.3114.d: "In an effort to prevent a nationwide strike, the government opted to disband the RTsSPS and prohibit its operations. The All-Russian Central Council of Trade Unions (RTsSPS) was established in 1918 during the First All-Russian Congress of Trade Unions and was effectively subordinate to the Bolshevik Party. However, following the conclusion of the civil war, leftist governments allowed the resumption of trade union activities. A new incarnation of the RTsSPS was formed, this time under the leadership of the Menshevik faction.\n\nSolomon Lozovsky, who served as the leader of the RTsSPS from 1930 onwards, was undoubtedly a staunch Bolshevik, although he later renounced his beliefs and received amnesty from Kerensky, allowing him to continue his subversive activities.\n\nIt is high time to disband the All-Union Central Committee, a well-organized body of revolutionary fervor that has been responsible for all acts of unrest and disobedience. While trade unions must be abolished, they must be kept under strict supervision to prevent impudent revolutionaries from challenging the government."
rusd.3114.a: "Another victory!"

rusd.3115.t: "The Arrest of Solomon Lozovsky"
rusd.3115.d: "In the face of escalating unrest throughout Russia, the government has taken drastic measures against one of the key figures in the opposition movement. Solomon Lozovsky, leader of Trade Unions, was apprehended today in Moscow by security forces. Accused of subversive activities and inciting workers' discontent, Lozovsky has been a persistent thorn in the side of the Kornilov government. Under his guidance, trade unions have become the focal point of anti-regime agitation, orchestrating strikes and clandestine protests. His arrest represents a significant setback for the revolutionary movement, yet it is unlikely to completely quell their efforts.\n\nAccording to reports, Lozovsky surrendered without resistance, but seized the moment to denounce the government's policies as an act of treachery against the Russian working class. The fate of Lozovsky now rests in the hands of the authorities, with some members of the government advocating for his immediate execution as a traitor and others cautioning against turning him into a martyr.\n\nThe response from the workers was swift and decisive. While some strike committees were left in disarray, others called for a general strike in retaliation. Despite the loss of their leader, the revolutionaries remain committed to their cause."
rusd.3115.a: "Make an example of him - publicly execute Lozovsky."
rusd.3115.b: "Let him rot in a fortress prison."

rusd.3116.t: "The Fall of Maria Spiridonova"
rusd.3116.d: "The government's crackdown on revolutionary elements continues, as it takes action against one of Russia's most prominent left-wing leaders. Today, Maria Spiridonova, the head of the Party of Left Socialist-Revolutionaries and a longtime advocate of violent revolution, was apprehended in Samara by security forces and military police.\n\nSpiridonova, a once-fervent orator who had gained the loyalty of numerous radical peasants, had been living underground since the seizure of power by Kornilov, orchestrating an underground resistance movement against the regime. Intelligence reports suggest that she had attempted to unite various socialist groups into a unified anti-government alliance, but the failure of the Petrograd uprising thwarted these plans.\n\nHer arrest was met with intense resistance, with her guards engaging in a firefight with government forces before being overpowered. Even in captivity, Spiridonova continues to defy the authorities, refusing to acknowledge the legitimacy of the Kornilov regime and denouncing its rule as the \"last gasps of a doomed dictatorship\". The question now is how to deal with her.\n\nThe hardline military faction calls for her immediate execution to crush revolutionary morale, while some government officials are concerned that her death would only turn her into a martyr, further fueling unrest among the peasants and the socialist underground. Others suggest a public trial to discredit her movement, but this approach carries its own risks - Spiridonova has a history of using the courtroom to promote revolution."
rusd.3116.a: "Execute her immediately. We cannot afford martyrs or revolutionaries."
rusd.3116.b: "Send her to a remote fortress prison."
rusd.3116.c: "Put her on trial - make her ideology stand trial as well."

rusd.3117.t: "The Fall of the Moscow Bolsheviks"
rusd.3117.d: "The Bolshevik underground network in Moscow suffered a severe setback. In a well-coordinated operation by the Okhrana and the military police, prominent figures of the Bolshevik movement, including Nikolay Bukharin, Aleksey Rykov, and Lev Kamenev, were apprehended. These individuals, once instrumental in Lenin's revolutionary organization, had been tirelessly working to rebuild the Bolshevik party following the rise of Kornilov, attempting to mobilize workers and factory committees against the government.\n\nIntelligence sources suggest that Bukharin served as the mastermind behind the Bolshevik underground's propaganda campaigns, while Kamenev maintained connections with railway and industrial unions, capable of crippling Moscow's infrastructure in the event of an insurrection. Rykov, a seasoned administrator, reportedly engaged in efforts to garner foreign support for Socialist causes in the country. The arrests were the result of a series of infiltrations by informants from the Okhrana into Bolshevik cells. These informants provided the government with direct access to the secret meetings of the Bolshevik leaders.\n\nThe arrests were not without incident. There were shootings in working-class neighborhoods of Moscow, where pro-Bolshevik activists attempted to confront government forces. Nonetheless, the arrests successfully dismantled the central leadership of the Moscow Bolshevik organization, causing unrest within the movement. With the fate of these individuals now in the hands of the government, it must decide how to proceed.\n\nSome members of the regime advocated for immediate execution, seeking to eradicate the last traces of Bolshevism. Others proposed public trials, aiming to expose the alleged criminal plots of these revolutionaries. There was also a possibility of employing them as bargaining chips in negotiations with socialist elements abroad, although such a strategy would likely be met with resistance from the military leadership."
rusd.3117.a: "Execute them. Bolshevism must be eradicated."
rusd.3117.b: "Imprison them indefinitely."

rusd.3118.t: "The Ban of the RSDRP"
rusd.3118.d: "The Russian Social Democratic Labour Party (RSDRP), the ideological foundation of socialist agitation in the nation, has officially been declared an unlawful organization. In coordination with security and military authorities, the Ministry of the Interior issued an order prohibiting the party, dissolving its institutions, and criminalizing its operations. The RSDRP has long served as a breeding ground for radical elements inciting unrest among workers, soldiers, and peasants. Through its publications and clandestine printing operations, the party disseminated dangerous ideas that instigated strikes and rebellions. According to authorities, as long as the RSDRP exists, the specter of revolution remains a constant threat.\n\nUnder the new legislation, all known party establishments must be shut down, assets seized, and membership in the party carries the risk of imprisonment, even the death penalty for suspected conspiracies. Marxist literature is subjected to censorship, and agents of the Okhrana have been granted extensive powers to detect underground cells. This legislation also extends to affiliated organizations such as socialist trade unions and workers' councils that are suspected of harbouring revolutionary sentiments.\n\nThe response was swift. While conservatives and military factions applaud this move as necessary for maintaining order, the opposition cautions that a comprehensive crackdown on socialist movements may push them further underground, rendering them ungovernable. Reports suggest that in Moscow and Petrograd, socialist agitators have already begun calling for defiance, pledging resistance against the \"dictatorship of the generals\".\n\nWith this decree, the government has sent a clear message: there is no room for socialism under Kornilov's rule. The question remains whether the opposition will be quelled or if this action will merely serve to fuel the flames of revolution."
rusd.3118.a: "With the stroke of a pen..."

rusd.3119.t: "The Ban of the PSR"
rusd.3119.d: "For decades, the Party of Socialist-Revolutionaries has played a pivotal role in Russian political landscape. It was the dominant leftist party, leading peasants' movements, engaging in guerrilla warfare against tsarist rule before the revolution. Afterwards, it served as the ruling party for two decades.\n\nHowever, under President Kornilov's administration, the PSR has officially ceased its existence. Citing its involvement in inciting revolutionary unrest, orchestrating terrorist acts, and opposing the state, the government has issued a decree banning the party. Its offices are being raided, its publications are closed, and key members have been either apprehended or forced underground.\n\nThis decision is particularly significant given the PSR's deep roots in the Russian countryside. Its agrarian socialist rhetoric and promises of land reform have made it a potent force among rural populations.. Nonetheless, given that many of its erstwhile members have already been exiled or compelled to engage in clandestine resistance, it is anticipated that the law will serve to radicalize those who remain. Reports from various regions of the country suggest that socialist revolutionary militant groups are regrouping, and peasant insurrections may erupt in response to the government's harsh measures.\n\nDespite these potential dangers, many members of the military and political establishment welcome this decision. The officer corps, industrialists, and conservatives have long perceived the PSR as a source of instability, and allies of Kornilov maintain that this step will foster greater stability. In the meantime, city guards and military police have been instructed to suppress any signs of activity by socialist revolutionaries."
rusd.3119.a: "An end to their vicious existence."

rusd.3120.t: "Assassination of Maria Spiridonova"
rusd.3120.d: "Blood has been shed once again in Moscow. During a clandestine gathering of Left SRs, Maria Spiridonova, one of Russia's most renowned revolutionary leaders, was assassinated by members of the Savinkov's Combat Squads. These vigilantes, operating with chilling precision, burst into the chamber, fired at point-blank range, and vanished into the night, leaving no time for a response. The demise of such a prominent figure ignited a wave of outrage in the revolutionary underground. While the state was not directly implicated in the assassination, public sentiment shifted, with many viewing it as nothing more than an act of extrajudicial killing, a clear indication that the government would tolerate no opposition.\n\nEnraged by the murder, the Left SR militants immediately tried to raise an uprising, hoping to avenge their fallen leader. But their rebellion was premature and disorganized - the police, with the support of Okhrana, quickly suppressed the rebels before they could gain strength.\n\nWith the flower of their leadership cut down by the scythe of the state, the Left SRs no longer pose any threat. However, some in the government fear that Savinkov's vigilantes are becoming too bold - if they could kill Spiridonova without orders, who could they target next?"
rusd.3120.a: "Thus unto all enemies of the state!"

rusd.3121.t: "Vox Populi"
rusd.3121.d: "Another chapter in Russia's tumultuous history of revolutionary struggle has been closed. Last night, in Moscow, Boris Kamkov, a prominent figure in the Left SR movement, met his demise. Acting on information obtained from intelligence sources regarding an illicit gathering of PLSR sympathizers, members of Savinkov's Combat Squads conducted a raid on a clandestine safehouse, forcing the conspirators into a desperate flight.\n\nKamkov, recognizing the futility of his situation, attempted a desperate escape by leaping into the frigid waters of the Moscow River. However, the night proved relentless, and the strength of the current proved stronger than his resolve to survive. His lifeless and chilled body was eventually discovered downstream. Rumors circulate that he may have been shot before plunging into the water, while others suggest he was submerged until he ceased resisting. Nevertheless, official records indicate that he met his end in the river.\n\nThe news of Kamkov's demise failed to generate much commotion. The radical leftist movement has been shattered – their leaders are no more, their organizations have been dismantled, and their aspirations for an uprising are now nothing more than whispers in the darkness.\n\nIvan Bunin, the perpetual satirist chronicling Russia's descent into chaos, commented in his column, \"Last night, another soul was claimed by the mighty river. Some say he stumbled, others claim he jumped, while others suggest they assisted him. Yet, the 'vox populi' about this incident seems to be sneers or indifference. Just as Savinkov desires.\"\n\nIndeed, no one dares mourn Kamkov openly – and for the NRPR, this is a significant victory."
rusd.3121.a: "Farewell Boris, farewell Boris, I'll see you in my dreams."

rusd.3122.t: "Arrest of Viktor Chernov"
rusd.3122.d: "The permanent leader of the Socialist-Revolutionary Party, Victor Chernov, has been apprehended today in Petrograd by the Okhrana, the secret police. The elderly revolutionary was seized in his residence and escorted under heavy guard to the Kresty Prison, where he awaits his destiny.\n\nChernov, a fervent advocate of agrarian socialism and federalism, who once served as a key figure in the provisional government and as a a minister without portfolio in Kerensky's cabinet, remains a steadfast opponent of the reactionary forces now in control of Russia. Despite his diminishing influence, he continues to support the remnants of the Socialist-Revolutionary movement, refusing to renounce his vision of a democratic Russia governed by the peasants.\n\nThe arrest has sparked a wave of indignation among the leftist ranks. Some fear that it is merely the beginning of a wider crackdown on even moderate socialist revolutionaries and other dissenting groups. Some contend that Chernov's incarceration is purely nominal, as his significance in the political landscape has waned in light of intensified crackdowns. The government now faces a critical decision regarding Chernov's future. His history renders him a perilous emblem, deserving of liberty, yet his demise could transform him into a revered martyr for revolutionary ideals."
rusd.3122.a: "Put Chernov on trial for treason."
rusd.3122.b: "No trials, no spectacle, just a quiet end."
rusd.3122.c: "Exile him abroad."

rusd.3123.t: "The Split of the Socialist-Revolutionary Movement"
rusd.3123.d: "The harsh crackdown on the Socialist-Revolutionary Party had a devastating impact. Following the end of Viktor Chernov's political career and unrest within the party leadership, one of Russia's most prominent political parties and a powerful agrarian socialist movement splintered.\n\nThe most radical faction, under the guidance of Vladimir Volsky, opted to align with the Popular Front, declaring the fight against reaction as their primary objective. Volsky and his allies joined with the remnants of the Left SRs. Conversely, the moderate and conservative socialist revolutionaries completely abandoned their commitment to revolutionary agrarian socialism, with some seeking refuge in the left liberal movements under the leadership of Nikolay Avksentiev. Others, driven by nationalist sentiment and militancy, aligned with Boris Savinkov.\n\nNevertheless, a small, steadfast faction within the PSR remained neutral, refraining from affiliating with any particular faction... These individuals are attempting to weather the current storm by resolutely refusing to endorse the Popular Front, while continuing their peaceful resistance to the ruling regime to the best of their abilities. In a state of isolation and persecution, their fate remains shrouded in uncertainty."
rusd.3123.a: "The SRs are no more."

rusd.3124.t: "The Fall of Savinkov"
rusd.3124.d: "Boris Savinkov - once a conspirator against the Empire, later a self-styled champion of Russia against Bolshevism, and finally the architect of his own populist republican movement, has been arrested and his NRPR is dissolved by state decree. The Combat Squads, long feared for their discipline and fanaticism, have collapsed with surprising speed. Cut off from central command, deprived of coordination, and hunted methodically, they have disintegrated into scattered remnants. Without their Vozhd, they proved incapable of transformation into anything enduring.\n\nSavinkov himself is a figure of contradiction to the very end. To some within the officer corps, he remains a man who once fought Bolshevism with ruthless determination when others hesitated. To the Drozdovite leadership, however, this does not absolve him. His past: his terror against the old order, his unyielding republicanism, his belief in revolution as a tool marks him as irreconcilable.\n\nThe execution of this traitor would send a clear message that no past service outweighs defiance of the new regime, but his fate is up to the tribunal."
rusd.3124.a: "He is an enemy of Russia. Execute him."
rusd.3124.b: "Let him live and be forgotten."

rusd.3130.t: "The ROVS Dissolved"
rusd.3130.d: "The Russian All-Military Union, formerly a revered representative of the White officer community and veterans of the Civil War, has officially dissolved after months of internal strife. A decisive schism emerged between the monarchist and republican factions within its leadership, rendering any reconciliation impossible following Denikin's rise to prominence.\n\nWhile Denikin himself did not take any direct action to disband the organization, his unwavering commitment to republicanism and democracy, coupled with rumours of his peasant origins, further exacerbated the rift. Ultimately, officers aligned with the republican cause refused to remain in the ranks supporting the monarchist agenda, while monarchists viewed collaboration with the republicans as an act of treachery.\n\nIn order to maintain its honour and heritage, the leadership of the Union issued a final communiqué announcing the voluntary dissolution of the organization. Shortly thereafter, Anton Denikin and his followers announced the establishment of the Union of Volunteers (Soyuz Dobrovoltsev), an apolitical organization composed of veterans that advocated for civic unity and the revival of their nation, positioning themselves as the successor entity to the ROVS." #denikin
rusd.3130.d2: "After several months of increasing internal tension, the Russian All-Military Union collapsed in a final act of dissent. The cause was the irreconcilable schism between the monarchical officers, who remained loyal to Wrangel's vision of national rebirth, and the republican-minded generals who saw his ambitions as dangerously retrograde.\n\nAt their last gathering, General Anton Denikin and a number of key officers formally departed the organization, declaring that they could no longer serve within an entity that had departed from the principles established by its founders. Although the ROVS continues to exist as an organisation, most of its members now rally around Wrangel. The aspiration for a broad and unified officer corps has been extinguished, but new alliances are already emerging from its embers." #wrangel
rusd.3130.d3: "It is now official: the Russian All-Military Union has been dissolved. Once a beacon of unity for the White Army and an emblem of military honor, this organization has in recent years lost both its raison d'être and its leadership. Lacking clear ideological guidance and without the support of a prominent political figure, what remained of the union quietly surrendered to dissolution, with no announcement of a successor.\n\nThose officers who continued to wear the organization's insignia dispersed, some returning to their regular duties at the general staff, while others announced their full retirement from public life. While some privately expressed regret, there was no organized opposition or protest. The ROVS had faced years of crisis and internal strife, ultimately succumbing to irrelevance." #levitov or drozdovsky
rusd.3130.d4: "The Russian All-Military Union, which once served as a pivotal institution within the White movement in Russia, has formally ceased to exist. Over the course of many years, this organisation has continued to operate as a marginal force within the increasingly shifting political landscape of Russia. With the advent of democratic socialism, the rise of workers' representation, and the ongoing military reforms, the ROVS has long since lost its significance.\n\nIts remaining members, now dwindling in number and largely inactive, unanimously voted to dissolve the organisation. No official statement was issued, and none of the successor groups have announced any plans to assume the mantle. The media barely registered this event, marking the quiet end of a movement once envisioned as a means to restore Russia to its former glory. However, the Russia they sought to restore no longer exists, nor does the ROVS itself." #left republic
rusd.3130.d5: "The Russian All-Military Union, which once served as a pivotal institution within the White movement in Russia, has formally ceased to exist. This decision to self-dissolve has sparked concern in conservative circles, as the ROVS had long served as a moral compass for many members of the military, serving as a reminder of pre-revolutionary values and the ideals of service to the nation. The closure of the ROVS raises uncomfortable questions about the unity within the armed forces and the absence of a unifying institution for the military elite.\n\nIn response to this development, voices have been heard in the media and the Duma advocating for the establishment of a new veterans' council under civilian oversight. However, at present, the top leadership appears to be directionless and increasingly fractured." #right
rusd.3130.d6: "The slow-burning ideological conflict within the Russian All-Military Union has finally reached its inevitable conclusion. Torn between loyalist monarchists and republican officers, the Union chose to dissolve itself rather than collapse into open schism.\n\nRather than mourn its collapse, the Vozhd seized the opportunity to reshape Russia's veteran movement in his own image. Backing the republican generals who had left ROVS, he announced the founding of a new veterans' organisation - the Russian All-National Union, one far more dynamic, aggressive, and politically committed.\n\nThis new body, combining former ROVS members, the Combat Squads of the NRPR, and leaders of the Green Armies, is envisioned as a vanguard of \"national action\", glorifying volunteerism, personal sacrifice, and militant patriotism. At its head, Savinkov appointed his longtime comrade Karl Goppers, a veteran of the underground SZRS struggle during the Civil War and a symbol of unbroken resistance.\n\nTo Savinkov's supporters, the new Union is a chance to build a new elite for a new Russia, with blood, will, and unity as its sacred principles. To his enemies, it is a warning that Savinkov's appetite for power and influence has only grown." #savinkov
rusd.3130.a: "This organization made no sense at all." 
rusd.3130.b: "Let us hope it does not affect the army too much." 

rusd.3131.t: "hidden event to burst democratic popularity"

# Denikin events #
rusd.3200.t: "The New Supreme Ruler"
rusd.3200.d: "General Kornilov, the hero who led the Russian Army through the Ice Marches, is no more. A man who dedicated his life to service to his Motherland, yet accomplished so much and yet so little for it. Anton Denikin, General Kornilov's right-hand man, both during wartime as an aide to the army commander and in peacetime as deputy chairman of the Russian All-Military Union, was always in Kornilov's shadow, both literally and figuratively.\n\nDenikin, now in his turn, has taken over as Supreme Ruler, following the late Kornilov's wishes. The burden has been passed down, and although Kornilov's intentions were clear - to prevent the triumph of revolution and unite the right-wing forces - there is much work to be done in completing what has been begun."
rusd.3200.a: "Long live the Supreme Ruler!"

rusd.3201.t: "The Democratic Opposition Calls for Change!"
rusd.3201.d: "The accession to power of a new Supreme Ruler, of course, did not herald a thaw for the skeptics. However, for many, both idealists and activists, Anton Denikin's persona provided a glimmer of hope for a political thaw. What remained of the shattered Socialist-Revolutionary party, once the dominant force in Russian politics, aligned with Nikolay Nekrasov's faction of left-leaning Kadets. This newly formed political movement declared itself the \"Radical Democrats\" or RRDO, and began organizing rallies and meetings in major cities to advocate for the restoration of democratic principles, economic liberalism, and the revival of the authority of zemstvos.\n\nThus far, the authority of the Supreme Ruler remains relatively feeble, perhaps resting solely on the legacy of his glorious predecessor, and any form of stern retaliation, albeit directed at radical democrats rather than socialists, remains inconceivable. Nonetheless, the democratic opposition has begun to stir, albeit not yet demanding but rather anticipating liberal reforms."
rusd.3201.a: "Russia definetely needs change."

rusd.3202.t: "General Wrangel's Increasing Ambitions"
rusd.3202.d: "Despite the schism within the ROVS, which resulted in the departure of reactionary monarchists and the Black Hundreds from our ranks, there remain voices within the organisation that continue to fracture the already divided veteran movement.\n\nPyotr Wrangel, a staunch monarchist but a proponent of an apolitical military, clearly hopes that the Supreme Ruler will at least contribute to the restoration of constitutional monarchy. The situation is further complicated by the looming prospect of war for the reunification of Russia, where dissent, new divisions, similar to those before the Battle of Tsaritsyn, would not serve our nation's best interests.\n\nWrangel's ambitions are evidently growing, as is his influence among the officer corps. The Black Baron poses a clear threat to the authority of the Supreme Ruler, yet we cannot openly confront him without further dividing our General Staff, Army, and Homeland."
rusd.3202.a: "This rivalry is a threat to the foundations of the state."

rusd.3203.t: "Supreme Ruler's Announcement"
rusd.3203.d: "And here is the initial pledge. Yesterday, the Supreme Ruler delivered a speech on the radio, proclaiming the commencement of democratic transformation and the gradual resuscitation of the \"operation of the constitution\", which is set to culminate in a fresh convocation of the State Duma.\n\nNonetheless, the initial step on the arduous journey towards the restoration of constitutional order, as assured by the Commander-in-Chief, lies in preventing the resurgence of revolutionary unrest. Specifically, the state of emergency remains in effect and will continue until the convening of a new legislative body. Consequently, any forms of strikes, political gatherings, and particularly - soviets - remain strictly prohibited.\n\nDenikin further stated that the functioning of city Dumas and regional Seims will gradually be restored, and they will be tasked with initiating the establishment of electoral committees for the nationwide elections upon receiving the necessary instructions. Moreover, Denikin emphasized the necessity for constitutional reform prior to the elections, which shall be implemented under the supervision of the Constitutional Court.\n\nThe draft of the revised constitution must be formulated in close collaboration with the government, specifically the Constitutional Council of the Republic, to ensure its legitimacy and effectiveness.\n\nThe Supreme Ruler's proclamation undoubtedly evoked a sense of relief among those who harbored aspirations for political liberties and democratic reforms. Conversely, it also elicited criticism from monarchists and the distrustful among the democratic camp. Nonetheless, the foundation for these transformations has been laid, marking a significant milestone."
rusd.3203.a: "Russia needs stability, by the people - for the people."

rusd.3204.t: "General Biskupsky Returns to Russia"
rusd.3204.d: "Yesterday, General Vasily Biskupsky has arrived to [ROOT.Capital.GetCapitalVictoryPointName] from Kiev, following the Anti-Hetman revolt."
rusd.3204.a: "Welcome back!"
rusd.3204.b: "We don't need him."

rusd.3205.t: "Amnesty for the Arrested Generals"
rusd.3205.d: "General Vasily Boldyrev, a person known for his left-wing views, and, according to some, even a member of the Menshevist party, has approached the High Command about a possibility to grant amnesty to the Generals, arrested under General Kornilov's emergency measures. He claims that these officers are not terrorist nor are they plotters. Instead, they are patriots ready to serve Russia."
rusd.3205.a: "We must seek peace among our staff in new Russia."
rusd.3205.b: "Sideline Boldyrev - he is also under suspicion."

rusd.3206.t: "The Indecisive General"
rusd.3206.d: "When the Senate confirmed General Denikin as the new Supreme Ruler of Russia, few doubted his honesty and devotion to the Motherland. A soldier to the core, he faithfully served Kornilov for decades - in the trenches, in Ice Marches, and later in the offices of the General Staff and the ROVS. However, those who knew Denikin personally are not talking about a man born to rule, but about a man who is forced to bear too heavy a burden, which cannot be abandoned.\n\nDenikin is neither a politician nor an bureaucrat. He has the instincts of a soldier - cautious, conscientious, but prone to hesitation when the path ahead required political cunning rather than moral rectitude. Now he rules not out of ambition, but out of the conviction that Russia, tired and divided, must be saved once more - at least until order is restored and civil power can be revived.\n\nSome officers whisper that Denikin too often hesitates, seeks compromises where firmness is required. Democrats, meanwhile, pin their hopes on his sense of legitimacy, believing that he can still restore the old Constitution. In the meantime, the nation waits, balancing reform and order, principle and necessity, while its new ruler ponders which duty weighs heavier: that of a general, or that of a statesman."
rusd.3206.a: "May God guide him."

rusd.3207.t: "Denikin's Cabinet"
rusd.3207.d: "The Supreme Ruler has taken a decisive step in consolidating authority. While the nation remains at risk of unrest and the looming conflict with Germany demands unity, Denikin has decided to reshuffle his new cabinet to ensure continuity and efficiency.\n\nThree directions were considered: the existing ministers who served under Kornilov, a coalition of moderate civilian politicians, or a center-right team focused on economic stability."
rusd.3207.d2: "In the spirit of guiding Russia toward lawful governance and the restoration of constitutional order, the Supreme Ruler has decided to appoint a new cabinet. Recognizing the necessity of civilian involvement and the importance of reconciling the various political factions, Denikin sought a composition that balances experience, moderation, and legal legitimacy.\n\nThree potential directions have emerged: continuation of the previous ministers who served under Kornilov, a coalition of moderate civilians and liberals, or a center-right team focused on economic stability."
rusd.3207.a: "Kornilov's cabinet will continue its work."
rusd.3207.b: "A moderate cenrist cabinet, tempered with military."
rusd.3207.c: "A center-right cabinet, focused on economy."

rusd.3208.t: "The Supreme Ruler Retires!"
rusd_3208_d_intro: "Today, Russia was stunned by the unexpected announcement that Supreme Ruler Anton Ivanovich Denikin had taken the \"difficult decision\" to step down. As a true Russian officer and warrior, he was unable to bear the defeat of his troops. The surrender of a major Russian city to advancing enemy forces was a grave defeat that the general took personally. With a heavy heart, he has made this decision and will be stepping down from all positions, including that of Supreme Ruler.\n\nAnton Ivanovich would retire to a state-granted dacha, where he would spend the remainder of his days with his family, writing memoirs on the events of the Civil War."
rusd_3208_d_intro2: "Today, Russia was stunned by the unexpected announcement that Supreme Ruler Anton Ivanovich Denikin had taken the \"difficult decision\" to step down. As a true Russian officer and patriot, he viewed his service as the successor to Kornilov and the Supreme Ruler only as a temporary measure aimed at restoring stability to the nation. Regrettably, the Supreme Ruler has taken on the responsibility for the failed reforms. With a heavy heart, the general has resigned from all positions, including that of Supreme Ruler.\n\nAnton Ivanovich would retire to a state-granted dacha, where he would spend the remainder of his days with his family, writing memoirs on the events of the Civil War."
rusd.3208.d: "[rusd_3208_intro] However, the question of succession remained after his departure. In his final decree, Denikin named General Ivan Romanovsky as his successor, and Romanovsky accepted the position. Romanovsky's candidacy was already endorsed by the General Command, though there's plenty of criticism of the new Supreme Ruler as well. Romanovsky has already issued a brief statement indicating that Russia will follow the course set by Kornilov and Denikin and that Russia's future is secure."
rusd.3208.d2: "[rusd_3208_intro] However, the question of succession remained unsettled after his departure.\n\nA meeting chaired by the Chairman declared that Russia would benefit from a civilian government elected democratically, and the government announced its dissolution, promising to hold free and fair elections for the Russian parliament in the next three months."
rusd.3208.d3: "[rusd_3208_intro] Nonetheless, the issue of succession remained unresolved following his departure. Despite Denikin's final decree appointing General Romanovsky as his successor, and the apparent willingness of the General Command to acknowledge this choice, the opposition led by Wrangel and monarchist-leaning generals vehemently opposed it, casting doubt. The Black Baron denounced the transformation of Russia into a \"Tsardom devoid of a Tsar\", demanding that such \"unconstitutional edicts\" not be acknowledged.\n\nInstead, Generals Wrangel and Lukomsky succeeded in persuading the General Command that power ought to be transferred to a Regency Council which would subsequently elect Russia's monarch. Meanwhile, General Wrangel will assume the position of chairman of the Regency Council, exercising limited authority over public administration in the interim until the Emperor of All the Russias assumes the throne."
rusd.3208.a: "General Romanovsky takes the lead."
rusd.3208.b: "[GetRussianPM] announces early elections."
rusd.3208.c: "Finally, the Russian Emperor will be restored."

rusd.3209.t: "Inauguration of the Acting President"
rusd.3209.d: "Today Anton Ivanovich Denikin formally abolished the office of the Supreme Ruler of Russia. The decree was read aloud by the Chairman of the Constitutional Council, to a standing audience of ministers, generals, and deputies. Following this proclamation, Denikin took an oath to uphold the newly adopted Constitution and was inaugurated as the Acting President of [RUS.GetNameDef]. The appointment, confirmed by the Council, will remain in force only until the nation's final victory in the West and the first free elections.\n\nThe ceremony was quiet and almost austere, as it was a moment of profound symbolism rather than celebration."
rusd.3209.a: "The age of tyranny is over."

rusd.3210.t: "The All-Russian Patriotic Union"
rusd.3210.d: "This morning, the Cabinet of Ministers issued a statement: in accordance with the decree of the acting president, the All-Russian Patriotic Union (Vserossiysky Patriotichesky Soyuz - VPS) has been officially established as the preeminent political force of this transitional period.\n\nThis new party is a coalition of loyal officers, civilian republicans, and liberal conservatives from the National Congress, led by Chairman-Minister Pavel Milyukov and his Constitutional Democrats. The VPS proclaims itself not merely a political party but a national movement committed to moderation and renewal. Its platform combines republican institutions with patriotic conservativism aimed at maintaining unity and stability until full restoration of the country and triumph in the West.\n\nThe formation of the VPS marks the closing of an age - the quiet, orderly withdrawal of the army from direct political stewardship. Where once the officers governed by decree, now the civilians govern by law."
rusd.3210.d2: "Under the watchful guidance of Acting President Denikin, the All-Russian Patriotic Union (Vserossiysky Patriotichesky Soyuz - VPS) has been formally founded in Petrograd. Built upon the existing framework of the VNS, the new formation serves as a bridge between the disciplined officers of the White Army and the emerging civilian government.\n\nThe VPS proclaims its loyalty to the Constitution, its faith in the republic's institutions, and its duty to defend Russia's unity until the final victory over Germany. It is not a party of ideology, but of duty - a party of the State.\n\nThough dominated by former VNS members, the VPS includes new figures from regional administrations, local zemstvos, and reform-minded officers. Its emergence formally ends the period of military governance and opens the era of civilian oversight - a slow but steady return to the politics of law and representation."
rusd.3210.a: "Glory to the President!"

rusd.3211.t: "Drafting the Constitution"
rusd.3211.d: "In accordance with his pledge to initiate democratic reforms, Anton Denikin promulgated a decree instituting the Constitutional Council of the Republic. This advisory and preparatory body is tasked with laying the groundwork for constitutional transformation and a gradual transition back to civilian governance.\n\nThe Council comprises key civil ministers, provincial governors, esteemed jurists from the Constitutional Court, and a select number of representatives from the General Command of the Supreme Ruler, a body that remains loyal to the White cause but is open to reform. While the Council lacks legislative authority, it is entrusted with two critical responsibilities: drafting a revised constitution and establishing a framework for nationwide elections.\n\nThis body serves as a symbol of the delicate balance between Denikin's military authority and the aspirations of Russia's democratic intelligentsia.. He is compelled to operate under rigorous conditions, as the state of emergency continues in force, with the [GetROVSParty] and other conservative elements maintaining a watchful eye over the proceedings. Despite the transitory nature of this Council, its establishment marks a significant political juncture: a solemn pledge towards a civil and constitutional future, albeit under the astute supervision of the Supreme Ruler."
rusd.3211.a: "Let them begin their work."

rusd.3212.t: "The Council Convenes"
rusd.3212.d: "In the marble hall of the Tavrichesky Palace in [195.GetName], the newly formed Constitutional Council of the Republic has gathered for the first time. Among those in attendance were legal experts from [195.GetName], members of the Constitutional Court, and provincial governors, as well as generals who had been seconded to the event by the Supreme Ruler himself. Denikin, however, was not present at the inauguration of the conference. Instead, his written address was read aloud on his behalf - a dignified and almost humble statement declaring that "order should be guided by law, so that law may replace military administration.\n\nNewspapers reported on a new wave of political activity, with monarchists characterizing the Council as a \"lawyers' club for dreamers\"."
rusd.3212.a: "The Council shall restore national unity above all."

rusd.3213.t: "Question of Faith"
rusd.3213.d: "The first ideological schism within the Council has emerged in the form of a debate on the moral essence of future Russia. Prince Trubetskoy, an advocate of conservatism, proposes to establish Orthodoxy as the spiritual cornerstone of the Russian identity, while liberals caution that such a move would alienate millions of adherents of other faiths, compromising the secular character of the contemporary state.\n\nThese divergent views have sparked a heated discussion. For the first time in its history, the Council is faced with the task of not only determining the shape of Russia's future, but also its moral compass."
rusd.3213.a: "Let Orthodoxy be recognized as the moral foundation of the nation."
rusd.3213.b: "Freedom of conscience must be the cornerstone of the new order."
rusd.3213.c: "This debate serves no purpose now - postpone the question."

rusd.3214.t: "Citizens of the New Russia"
rusd.3214.d: "The debate in the Council revolves around the question of who should govern the state. Liberal jurists advocate for universal suffrage in senatorial elections, arguing that it is a moral imperative to ensure representation. However, the generals contend that the masses are not yet ready to assume such responsibility.\n\nSome propose intermediate solutions, such as granting voting rights based on educational attainment, military service, or ownership of property. The discourse is rife with philosophical and ethical arguments, but underlying it lies a sense of apprehension: the specter of the Popular Front, and the question of whether the populace can be trusted once again."
rusd.3214.a: "Universal suffrage shall return - the people must speak again."
rusd.3214.b: "Only those proven in service and education shall vote."

rusd.3215.t: "The Guardians of Order"
rusd.3215.d: "The question of the military's role in Russia has been the most contentious issue in the Council. The delegates from the ROVS maintain that the military should uphold its constitutional duty to safeguard the unity of the nation, which would not compromise the apolitical character of the armed forces promoted by the Supreme Ruler. Civil lawyers, however, argue that such an amendment would legalize an indefinite state of emergency.\n\nDenikin is receiving reports of increasing unrest among military personnel, with officers expressing fears that politicians may abandon them. The council now faces a critical decision."
rusd.3215.a: "Russia has but two allies - her army and her navy."
rusd.3215.b: "The army must serve, not govern."

rusd.3216.t: "The Provinces Speak"
rusd.3216.d: "The delegates from the borderlands and the newly reintegrated territories present their memorials to the Council. They advocate for autonomy in matters of taxation, educational policy, and local governance.\n\nFor many, the notion of a united and indivisible Russia appears to be nothing but the populist rhetoric of outdated politicians and a remnant of bygone eras. During the post-civil war chaos, the provinces rebuilt themselves. Now, they resist complete centralization, arguing that local autonomy contributes to national stability.\n\nThe generals fear another collapse, while Denikin's administration cautiously observes the situation, recalling how regional autonomy once led to the dissolution of the empire."
rusd.3216.a: "Empower the provinces with regional Seims."
rusd.3216.b: "Maintain central authority."


rusd.3220.t: "The Triumph of the Republic"
rusd.3220.d: "After months of intense deliberation, heated discussions, and meticulous compromise, the Constitutional Council of the Republic has achieved its goal. The new constitution, characterized by its moderate tone and republican spirit, was endorsed by the majority of its members and sanctioned by the Supreme Ruler  himself.\n\nThe constitution, based on the semi-presidential model, establishes a powerful yet accountable executive branch, maintaining a bicameral legislative structure and independent constitutional oversight. Local city Dumas and regional Seims will be granted their rights, while the State Duma once again will assume its role as the central organ of parliamentary activity.\n\nIt is noteworthy that the Supreme Ruler will serve as interim president, with the election of a permanent president to be conducted after the conclusion of the conflict with Germany, a pledge solemnly reiterated by Anton Denikin during his address on national radio.\n\nDenikin, the last and first of soldiers, vowed to relinquish power upon victory, committing the fate of Russia to her free institutions. In his own words, \"I do not aspire to become a new Caesar; instead, I strive to ensure that Russia shall never again descend into the abyss of tyranny or anarchy.\""
rusd.3220.a: "A cautious optimism pervades the nation, and the republic breathes anew."

rusd.3221.t: "The Triumph of the Presidency"
rusd.3221.d: "The debate is over, the ink has dried, and a new epoch commences - not with the restoration of parliamentary government, but with the ascension of a powerful executive. The Constitution, soon to be ratified, though nominally democratic in form, places the President at the unquestionable center of power. Legislative and judicial reforms continue, but remain severely constrained. The State Duma shall convene, but its authority remains advisory. Local assemblies operate under the supervision of presidential appointees.\n\nThe President of the Republic, chosen by popular vote, wields extensive authority in the realms of defense, public service, and international relations - a constitution forged in war and tailored for wartime governance. Despite criticism of Denikin's veiled authoritarianism by many, he defended the new system in his address to the nation. His tenure will endure indefinitely, serving as Russia's steadfast guide during turbulent times."
rusd.3221.a: "Some refer to it as stability. Others murmur: dictatorship."

rusd.3222.t: "Deadlock in the Council"
rusd.3222.d: "The dream of constitutional revival was shattered by a bitter sense of disillusionment. The Constitutional Council of the Republic crumbled under the weight of bitterness and stagnation, paralyzed by internal strife, ideological bickering, and growing estrangement from the broader public.\n\nRepublicans clashed with conservatives, military leaders distrusted civilian officials, and the specter of monarchist unrest deepened the divide. After months of wrangling, as public confidence waned, the Supreme Leader appeared before the council unannounced. In a brief address, he declared that the nation required order, not uncertainty. That evening, he disbanded the council and asserted his extraordinary authority."
rusd.3222.a: "The pen failed. The sword remains."

rusd.3223.t: "The [GetYear] Constitution of Russia"
rusd.3223.d: "After several months of deliberation and meticulous revision, the Constitutional Council of the Republic has finally brought its work to a close. Today, in the grandeur of the Great Hall of the Tauride Palace, amidst the reverberations of solemn orations and the rustling of parchments, the ratification of the Constitution of the Russian Republic was formally executed.\n\nThis document, bearing the signatures of the Constitutional Court members, ministers, and representatives of the [GetRussianHeadOfState], establishes a parliamentary system of government in which legislative authority is vested in a freely elected Duma, while executive power is entrusted to a Council of Ministers accountable to the Duma.\n\nIn his address to the nation, General Denikin stated that the new constitution would bring about a state of law and order. The bells of churches are ringing throughout the cities, and the people are gathering in the squares to celebrate the arrival of a new political system. However, there is still concern among the military and conservative circles, who view this change as a precarious step towards the instability of civil society, reminiscent of both 1917 and 1936."
rusd.3223.d2: "After several months of deliberation and meticulous revision, the Constitutional Council of the Republic has finally brought its work to a close. Today, in the grandeur of the Great Hall of the Tauride Palace, amidst the reverberations of solemn orations and the rustling of parchments, the ratification of the Constitution of the Russian Republic was formally executed.\n\nThis document, bearing the signatures of the Constitutional Court members, ministers, and representatives of the [GetRussianHeadOfState], establishes a system of government that harmoniously balances the aspirations of the people and the need for strong and unified leadership. Hereafter, the head of state shall be elected through universal suffrage, wielding extensive executive powers.\n\nIn his address to the nation, General Anton Ivanovich Denikin declared that the new constitution would bring law and order to the country. The bells of churches were ringing throughout the cities, and crowds gathered in public squares to celebrate the advent of this new political system.\n\nHowever, many understand that this constitution is a manifestation of both a dream for freedom and a fear of instability. As more liberal-minded people believe that the military merely changed its uniform rather than relinquishing power."
rusd.3223.a: "Glory to Anton Ivanovich, the savior of Russian democracy!"

rusd.3224.t: "Anton Denikin Steps Down!"
rusd.3224.d: "The peasant marshal remained true to his word. Today, Anton Ivanovich Denikin, the Commander-in-Chief and the [GetRussianHeadOfState] of Russia, formally announced his departure from public life. His speech, broadcast throughout the nation, was concise, composed, and deeply reverent. \"I have fulfilled all that duty and conscience demanded of me,\" were his final words in office.\n\nHaving restored order, Denikin proclaimed that it was now time for the people to elect their own leaders. In a decree of his own, he called for new general elections to be held in accordance with a newly drafted constitution. The news swiftly spread, and even among his critics there was a sense of involuntary respect – after all, few who wield power willingly relinquish it.\n\nAt dawn, his car departed from Petrograd. As it traversed the Nevsky Prospekt, a spontaneous crowd broke into applause. The soldiers on duty saluted. The Supreme Ruler did not look back."
rusd.3224.a: "Grom pobedy, razdavaysya!"

rusd.3225.d: "Ever since the tragic passing of Kornilov, Russia had been under the unyielding grip of the autocratic rule of the Supreme Ruler. Denikin rationalized his continued ascendancy by invoking the necessity of war, claiming that it was imperative to eradicate the German menace and ensure the safety of the Fatherland. Few could have imagined that he would ever relinquish his position.\n\nHowever, in a surprising turn of events that even his most trusted generals found unexpected, Anton Ivanovich Denikin, the Supreme Ruler, delivered his final address to the nation. With the Western Front now pacified, and the tricolour once again flying over Minsk and Riga, he declared the mission accomplished.\n\nHis edict proclaimed the holding of general elections and the annulment of all emergency decrees and statutes. For the first time in years, censorship was abolished, and the media erupted in constrained elation. Denikin, evidently aged and weary, concluded his address with words about duty and the many years dedicated to serving the nation. On the eve when the final flag of the Supreme Leader was lowered, firecrackers were set off in the squares of numerous central cities."

rusd.3226.t: "The Drozdovsky Affair"
rusd.3226.d: "Even in the aftermath of the schism that divided the ROVS, a new tension emerges among the ranks of Russia's military elite. General Mikhail Drozdovsky, venerated veteran of the Civil War and long-respected by both officers and the [GetRussianHeadOfState], has begun publicly criticizing the ongoing reforms and quietly encouraging monarchist sympathizers within the army. His influence, though subtle, reverberates through the Drozdovite faction, who now look to the recently established Russian National Union of War Veterans as an avenue for active political engagement.\n\nWhile Denikin holds Drozdovsky in personal esteem - a man of courage and strategic vision - the [GetRussianHeadOfState] is acutely aware that the Army's principles of apolitical service are under threat. A careful balance must be struck: discipline the general without provoking unnecessary upheaval, or allow him limited latitude, hoping his loyalty to the nation prevails. Military observers note that the Drozdovites' discontent, if unaddressed, could embolden other radical elements within the officer corps, particularly under the watchful eyes of Pyotr Wrangel and his supporters.\n\nThe matter has been formally presented to the [GetRussianHeadOfState]. A measured response is required."
rusd.3226.a: "Make sure he has no real authority."
rusd.3226.b: "He's not a threat to us."

rusd.3227.t: "Case of the RNSUV"
rusd.3227.d: "Following the decisive measures taken against General Drozdovsky, the [ROOT.GetLeader]'s government moves to formally disband the Russian National Union of War Veterans. The organization, led by General Anton Turkul and buoyed by a handful of remaining Drozdovites, had been steadily consolidating radical monarchist sentiment within the officer corps. Its dissolution marks the culmination of Denikin's careful management of this emerging faction, ensuring that no single militant grouping can dominate the veterans' movement or challenge the authority of the [GetRussianHeadOfState].\n\nThe process is orderly yet firm. Turkul and other leading figures are compelled to retire, their posts dissolved, while some of the less radical Drozdovites choose to join the loyalist faction within the General Staff, aligning themselves with Pyotr Wrangel. In doing so, the government neutralizes an ideological threat while retaining elements of experience and competence within the military structure.\n\nThe action sends a clear message that the [GetRussianHeadOfState] remains the ultimate authority over the direction of both the state and its armed forces. The broader officer corps takes note, some with relief, others with quiet discontent, yet none can openly oppose this decision without risking marginalization or dismissal."
rusd.3227.a: "Outlaw this terrorist movement and enforce retirements!"

rusd.3228.t: "Clarifying the Legal Grounds"
rusd.3228.d: "In the wake of ongoing instability and mounting expectations from both civilian and military actors, the question of the legitimacy of the Supreme Ruler's authority has once again become a subject of intense discussion. With foreign threats looming and the recent memory of internal chaos fresh, Russia's governing institutions demand clarification: what is the nature and duration of Anton Denikin's exceptional authority?\n\nDebates quietly take place within the Senate, among senior generals of the Russian Armed Forces, and within the government bureaucracy. Some insist that the Supreme Ruler should retain authority indefinitely, acting as a stabilizing force until Russia achieves total victory over its enemies abroad. Others argue that such powers, even under wartime necessity, cannot be absolute, and that Denikin's tenure must have a defined endpoint to reassure both the citizenry and more moderate political actors that the country remains committed to lawful governance.\n\nDenikin, aware of these tensions, must now formally define the legal foundations of his office, sending a clear signal to all factions: whether the state rests under his direct command until victory, or whether his authority is temporary and subordinate to the eventual restoration of civilian oversight."
rusd.3228.a: "The Supreme Ruler will remain the highest executive position."
rusd.3228.b: "The Supreme Ruler shall step down once all the enemies are defeated."

rusd.3230.t: "A Split Within the Officers"
rusd.3230.d: "In the weeks following the solemn funeral of Lavr Kornilov, the mood within the Russian All-Military Union has grown uneasy. The passing of the old leader not only left a void in authority but also revived latent rivalries among his former comrades-in-arms.\n\nGeneral Pyotr Wrangel, a respected figure within the army and a symbol of the monarchist cause, has become a frequent topic of conversation among the officer corps. While publicly loyal to the Supreme Ruler, his reserved criticisms have begun to circulate quietly, repeated in mess halls and staff meetings alike. Many officers, weary of uncertainty, look to Wrangel as a man of resolve - a commander unafraid of decisive measures. Denikin himself remains calm, outwardly unshaken by the undercurrents. Though he cannot ignore the sense that his authority rests upon the shifting loyalties of men who still weigh strength above legality. The ROVS, once united in Kornilov's name, now listens to more than one voice."
rusd.3230.a: "Wrangel has every right to speak his mind."
rusd.3230.b: "Remind the Black Baron who commands the army."

rusd.3231.t: "The Black Baron's Gesture"
rusd.3231.d: ""

rusd.3232.t: "The Cabinet and the Baron"
rusd.3232.d.intro: "The formation of a new cabinet has not gone unnoticed by General Pyotr Wrangel. Ever attentive to the currents of influence within the [GetROVSParty] and among civilian politicians, he observes the appointments with measured eyes, noting both opportunity and potential obstruction."
rusd.3232.d: "$rusd.3232.d.intro$\n\nAccording to our informers, the Black Baron quietly seeks to place trusted confidants in positions of economic and internal authority. Aleksey Arkhangelsky, responsible for finance, seem to be subtly courted by the General.\n\n$rusd.3232.d.end$"
rusd.3232.d2: "$rusd.3232.d.intro$\n\nHowever, Wrangel's influence is limited. He notes the ascendancy of liberal voices with thinly concealed concern, recognizing that officers loyal to the monarchy and traditional order have fewer opportunities to guide policy. Yet he refrains from open dissent, keeping his intentions veiled and his network active, ready for moments of weakness.\n\n$rusd.3232.d.end$"
rusd.3232.d3: "$rusd.3232.d.intro$\n\nOur sources tell that the Black Baron finds fertile ground among allies such as Vasily Shulgin. Though subtle, his guidance on fiscal and administrative matters begins to steer decisions, nudging the cabinet toward the traditionalist, hierarchical vision he favors, all while maintaining a veneer of loyalty to the [GetRussianHeadOfState].\n\n$rusd.3232.d.end$"
rusd.3232.d.end: "The [GetRussianHeadOfState], aware that the Black Baron's ambitions are as persistent as they are discreet, understands that these developments may affect officer cohesion and the broader authority of the state. Wrangel's influence grows or wanes depending on the cabinet's composition, leaving Denikin to weigh the delicate balance between respect for his fellow officer and the necessity of command."
rusd.3232.a: "We must closely watch our ministers."

rusd.3233.t: "The Question of Moral Renewal"
rusd.3233.d: "Among the first significant proposals to reach the Supreme Ruler's desk since the formation of the new cabinet came from the Ministry of Internal Affairs. Vasily Shulgin, a man whose ideological zeal was long known within both the Duma and the monarchist movement, presented what he described as a necessary step toward the "spiritual rejuvenation of the nation". His proposal was broad in scope - a decree aimed at combating moral decay and anti-national influences through the strengthening of internal censorship, moral oversight in education, and the reintroduction of the Orthodox Church's consultative role in public institutions.\n\nYet Shulgin reform carries the unmistakable echo of the Black Hundredist past - language invoking Faith, Autocracy, and Fatherland resurfaced in ministerial drafts, while sympathetic circles within the officer corps and provincial administrators lauded the initiative as a long-overdue correction of the liberal excesses of the previous era.\n\nWithin the cabinet, however, apprehension spread quickly. The moderates whispered of creeping clericalism and authoritarianism, the liberals saw it as a return to the politics of dogma, and even some generals privately questioned whether this "moral renewal" might divide rather than unite the country. Denikin, weary of ideological crusades and yet burdened with the duty of maintaining fragile unity, found himself once again caught between principle, and the growing shadow of his rival."
rusd.3233.a: "The proposal shall be approved - moral decay must end."
rusd.3233.b: "This initiative must be tempered - moderation serves the nation better."
rusd.3233.c: "This is not the path Russia needs."

rusd.3234.t: "The Return of Moral Order"
rusd.3234.d: "The decree was signed without delay. Within days, the Ministry of Internal Affairs announced a program of \"spiritual vigilance\", extending its oversight into schools, universities, and the press. Local administrators were ordered to cooperate with diocesan committees, while newly formed "Societies for the Preservation of National Morality" appeared across the provinces.\n\nIn [ROOT.Capital.GetName], student assemblies denounced the policy as a clerical intrusion into civic life, while in smaller towns and garrisons, processions and thanksgiving services praised the [GetRussianHeadOfState]'s decision as a restoration of true Russian values. For Denikin, this was not victory but a burden heavier than any command post. He understood that the measure would be interpreted as a step away from the constitutional ideals he once defended. Yet among the officers and the Church, his authority now appeared stronger than ever. Wrangel's associates - particularly those within the ROVS - lauded the act as proof that Russia was finally returning to its "natural path".\n\nThe opposition began organizing quietly, with Nekrasov's democrats issuing statements warning of the death of civic freedom. The first protests were small and controlled, but the echo of their chants carried through the cold streets of [ROOT.Capital.GetName]."
rusd.3234.a: "Will the monarchists finally desist?"

rusd.3235.t: "Amended Decree"
rusd.3235.d: "Denikin's response to Shulgin's initiative was cautious. The draft reform returned to the Ministry with annotations in his own hand, that moral order must not mean political coercion.\n\nThe final version, approved after long consultations, spoke not of Orthodoxy but of moral culture, and reduced the Church's new role to an advisory one. It was a compromise, but not without its cost. Within the ROVS, the act was read as a sign of Denikin's steady hand - an effort to keep unity above ideology. Even Wrangel, though privately disappointed, refrained from open criticism. Yet the rift was not closed; it merely grew quieter, hidden under a thin layer of formality. The "moral question" would return - perhaps with new faces and greater fervor - for the spirit of restoration had already been awakened."

rusd.3236.t: "A Government Divided"
rusd.3236.d: "The decree was rejected outright, the [GetRussianHeadOfState] declaring it incompatible with the principles upon which the Russian state was restored. The announcement fell upon the cabinet like a sudden frost. Shulgin, pale and rigid, read his resignation aloud the following day, proclaiming that he would not serve a government that forgets the sacred foundations of the Russian nation.\n\nWithin a week, the conservative press erupted in outrage, calling the act a betrayal of the right's moral mission. The [GetSocConParty] party fractured almost overnight. Some, led by Feliks Yusupov and Dmitry Romanov, argued for maintaining cooperation with Denikin in the name of stability. Others, more zealous, demanded withdrawal from the government entirely."
rusd.3236.a: "Form a new coalition with the moderates."
rusd.3236.b: "We need conservatives on our side."

rusd.3237.t: "The Question of the ROVS Charter"
rusd.3237.d: "For years, the ROVS has stood as the moral pillar of the nation's army. Founded as an apolitical brotherhood, it vowed to safeguard the dignity of the officer's oath and remain untouched by the storms of politics. Yet since Kornilov's rise and Denikin's succession, this principle has blurred.\n\nToday, it has become an open question: can the head of state, who commands the army and governs the republic, also remain the formal leader of an apolitical military union?\n\nA circle of senior officers, headed by Aleksey Arkhangelsky, one of our ministers in the General Command, now challenges Denikin's dual position. They insist that the Charter must mean what it says - that no one holding political office may preside over the ROVS. They speak not in defiance, but in reverence for tradition.\n\nEither way, the line between state and army will never again be what it once was."
rusd.3237.a: "Affirm Denikin's temporary dual role."
rusd.3237.b: "The [GetRussianHeadOfState] must resign from the ROVS!"
rusd.3237.c: "Redefine the Charter of the ROVS."

rusd.3238.t: "The New Chief of the ROVS"
rusd.3238.d: "The formal resignation of the [GetRussianHeadOfState] from the leadership of the Russian All-Military Union has created an unprecedented situation within the organization. For the first time since its founding under General Kornilov, the ROVS must choose a leader itself. The decision was inevitable - the organization's charter clearly defines it as apolitical, a principle now reaffirmed with Denikin's departure. Yet, this act has not quelled division; rather, it has exposed the competing visions of what the Union ought to be.\n\nThe Congress of the Union has gathered in the austere hall of the [ROOT.Capital.GetName] Officers' Assembly. No banners hang upon the walls - only the old regimental standards. The candidates, each representing a distinct tendency within the veteran movement, are few but emblematic. General Mikhail Levitov, pragmatic and disciplined, stands for the continuation of Kornilov's model - a professional, non-political brotherhood bound by duty. General Aleksey Arkhangelsky, a clear candidate, suggested by the Black Baron, calls for unity and the preservation of the ROVS as a moral foundation of the state, independent yet patriotic.\n\nFinally, Professor Ivan Ilyin, philosopher and conservative thinker, as well as the author of the ROVS ideology, is proposed as a symbolic candidate - a civilian moral authority who could stay true to the Union's initial purpose."
rusd.3238.a: "The ROVS serves Russia, not ambitions."
rusd.3238.b: "The ROVS shall remain a veteran's brotherhood."
rusd.3238.c: "Let the ROVS stay as a union of spirit."
RUS_levitov_leader: "§HMikhail Levitov§! becomes the new Chief of the ROVS"
RUS_arkhangelsky_leader: "§HAleksey Arkhangelsky§! becomes the new Chief of the ROVS"
RUS_ilyin_leader: "§HIvan Ilyin§! becomes the new Chief of the ROVS"

rusd.3240.t: "The Minister of Possibilities"
rusd.3240.d: "The appointment of Boris Savinkov as the military governor of Petrograd was, at the time, a matter of expedience. The People's Republican Party of Russia, which he led, was among the first to endorse General Kornilov's coup, hailing it as a long-awaited national salvation from both the liberal weakness and the socialist oppression. To reward his loyalty and keep him at distance - Savinkov was entrusted with the administration of the capital.\n\nIn the months since, however, the city on the Neva has acquired an ambiance unlike any other in Russia. The green NRPR banners with the symbols of the Ice March now hang from municipal buildings. Mass rallies blend the rhetoric of revolutionary sacrifice and national revival, while Savinkov, in his fiery orations, speaks not of the \"Republic\" that once existed but of a \"Third Russia\", reborn through blood, obedience, and faith. He tolerates no Bolshevik or monarchist influence, claiming to embody the \"true will\" of the nation's rebirth.\n\nReports from the city suggest that Petrograd has become more well-behaved, but also more fanatical. The garrison officers answer to the Governor with the fervour of religious devotees; the civilian authorities act with theatrical ardour.\n\nDenikin's observers warn that Savinkov is transforming his post into a personal fiefdom, and that his charisma is beginning to win supporters even within the army. And yet - the NRPR's fierce anti-monarchism, its hostility towards the old aristocracy and \"reactionary intrigues\", make Savinkov an effective counterbalance to the growing influence of Wrangel and his monarchist allies."
rusd.3240.a: "Tolerate him - for now. His zeal serves our cause." #-> 3241
rusd.3240.b: "Remind him who commands the State." #-> 3245
rusd.3240.c: "We must curtail his ambitions before they root too deep." #-> 3243

rusd.3241.t: "The Petrograd Congress"
rusd.3241.d: "Today, the First Petrograd Congress of National Revival took place, an official \"consultative forum\" of veterans, agrarian leaders from the All-Russian Peasant Union (VKS), some non-mainstream priests of the Orthodox Church, as well as industrial managers. In truth, this is undoubtedly the creation of Boris Savinkov and his NRPR.\n\nSavinkov himself opened the congress, appearing in a plain field uniform and carrying no insignia, save a small Ice Campaign 'crown of thorns crossed by a sword', pinned to his chest. His speech was broadcast on the radio and quickly spread to newspapers. In it, Savinkov declared that \"we will build a Third Russia - a Russia of sword and conscience, where every peasant knows his land, and every soldier knows his duty.\"\n\nThe delegates, many of whom were former Socialist-Revolutionary supporters or junior officers, responded with thunderous applause. By the second day, resolutions were drafted calling for \"a National Assembly to affirm the unity of State and Nation\".\n\nHowever, it is obvious to the government that a parallel power structure is emerging in Petrograd, built on a populist cult. Although Savinkov's congress formally declares loyalty to the Supreme Ruler, it speaks of the need for moral renewal of the state - a phrase that subtly conceals the intent to subordinate the government to his ideology. Wrangel's allies, meanwhile, denounce the Congress as \"neo-Jacobinism\", while moderate liberals whisper that Savinkov is seeking to revive the revolutionary dictatorship under a new flag.\n\nNow Savinkov has asked for an audience with the Supreme Ruler, ostensibly to discuss \"national representation and the spiritual renewal of the army\". Few people doubt the true significance of his visit."
rusd.3241.a: "Allow it to proceed." #-> 3242
rusd.3241.b: "Disband this farce - by decree of the Supreme Ruler." #-> 3243

rusd.3242.t: "The Voice of the Third Russia"
rusd.3242.d: "Weeks have passed since the Petrograd Congress, and yet the echoes of Savinkov's rhetoric refuse to fade. Every newspaper now carries excerpts of his speeches. His movement, once a curiosity of radical officers and rural idealists, now marches toward the political mainstream. Savinkov delivers impassioned addresses, condemning corruption and \"the tired liberalism of the city men\".\n\nBoris Savinkov's visit to the residence of the Supreme Ruler was, at first glance, an ordinary consultation. However, few people could not understand its deep meaning. Once a terrorist and conspirator, and now a statesman, Savinkov came not just with a report, but also with an appeal to speak on behalf of what he called \"Third Russia\", a nation born in the blood of revolution, but purified by faith and self-sacrifice.\n\nDenikin received him with the restrained politeness of a soldier. Savinkov's speech developed in deliberate intonations: he praised Kornilov's legacy, condemned the monarchical intrigues in the General Staff and called on the Supreme Ruler to complete the revolution - to purge the state of old lies and lifeless crowns. Behind the fiery metaphors of the \"Third Russia\" there was a clear proposal: an alliance between the army and the Savinkov movement to establish a moral and national dictatorship under the name of Denikin, but in fact it was Savinkov's plan."
rusd.3242.a: "Let him speak - for Russia is tired of silence." #-> 3243
rusd.3242.b: "Your service is noted, Boris Viktorovich - and concluded." #-> 3244

rusd.3243.t: "The Fall of the Governor"
rusd.3243.d: "The fire spread faster than any police circular could contain. In Petrograd, mobs bearing the banners of the \"Third Russia\" marched through Nevsky Prospekt, proclaiming the dawn of a new republic under the banner of national salvation. Similar outbursts flared across provincial towns - peasants waving icons and red standards, invoking Savinkov's name as a prophet betrayed by generals.\n\nThe Supreme Ruler's orders were swift yet reluctant. Troops loyal to the government entered Petrograd under cover of night, restoring order with a mixture of persuasion and gunfire. By morning, Savinkov was nowhere to be found.\n\nRumors abounded: that he had fled abroad, that he had been arrested by his own guard, that he had taken his life in defiance. The truth mattered little. The voice of the Third Russia had been silenced."
rusd.3243.a: "They were only radical SRs."

rusd.3244.t: "The Quiet Eclipse"
rusd.3244.d: "Savinkov's dismissal was executed without ceremony. The decree arrived at his office under plain seal, citing reassignment and consolidation of authority. No protests erupted in Petrograd; no mobs gathered. The NRPR's banners remained folded.\n\nWithin days, Denikin's envoys reached the remnants of Savinkov's following - younger officers, idealists, and minor administrators - offering them positions within the army's political departments. Many accepted.\n\nFreed from Savinkov's shadow, the government's tone softened. Liberal ministers found new confidence; civilian commissions resumed work. The specter of the \"Third Russia\" faded - not defeated, but absorbed, its energy rechanneled into Denikin's cautious renewal of political life.\n\nThe Supreme Ruler had outmaneuvered another would-be savior."

rusd.3245.t: "The Shadow of the Third Russia"
rusd.3245.d: "Reports from Petrograd have grown increasingly troubling. The Narodno-Respublikanskaya Partiya, once tolerated as a curious remnant of revolutionary romanticism, has turned its agitation toward defiance. From the editorials of Volya Rossii to the whispering salons of former radicals, Savinkov's circle has begun to style itself as the true conscience of the republic.\n\nThe Supreme Ruler has decided the time has come to remind the Governor of Petrograd who commands the State. The order was delivered without ceremony: a formal reprimand, the removal of several Savinkovite officials, and the transfer of the city's garrison to direct General Staff oversight.\n\nPetrograd now moves under a new silence. Yet the consequences will not pass unnoticed. For some, the elimination of the NRPR confirms that there is no path to reform outside the command of the Army. For others, it is a warning: even those once loyal to the Republic's birth can be erased when their ideals grow inconvenient."
rusd.3245.a: "Reform must be guarded, even from its zealots."

rusd.3246.t: "The Officer from Włocławek"
rusd.3246.d: "Anton Ivanovich Denikin was born from the hard edge of the Empire, from a provincial military household near the western frontier, where service was a duty carried like a surname. The old world of his childhood was strict, modest, and full of rank without comfort. One learned early there that an officer did not exist for himself, but for the line of service that had produced him.\n\nDenikin’s early years gave him little taste for intrigue and no patience for vanity. He was formed by military schools, by examinations, by the long discipline of institutions that cared more for obedience than charm. He was not the kind of young man who entered the army to shine in salons. He entered because the army was the one place where his habits of seriousness, restraint, and exactness could be made useful.\n\nThose who later spoke of him as a soldier or ruler often forgot that he was first shaped by a frontier milieu in which one’s word had to be reliable. It is from such men that Russia sometimes makes its hardest servants: the ones who believe that a state survives only when its officers still know what they owe it."
rusd.3246.a: "Duty comes before ambition."

rusd.3247.t: "The Small Wedding in Novocherkassk"
rusd.3247.d: "In the middle of war and collapse, Anton Ivanovich Denikin did something almost unfashionable in its simplicity: he married. The ceremony took place in Novocherkassk, under conditions too unstable for romance and too serious for ceremony in the ordinary sense. There were no grand political speeches, no triumphant parade of comrades, only a brief, private act carried out while Russia was breaking into factions around it.\n\nThe bride, Xenia Chizh, was 20 years younger than General. For Denikin both the engagement during the Weltkrieg and the marriage during the Civil War was a defense against becoming entirely absorbed by duty. He was a soldier, yes, but also a husband now, and later a father."
rusd.3247.a: "Even in ruin, a man still chooses how to live."

## Boldyrev events ##

rusd.3250.t: "A New Hand at the Helm"
rusd.3250.d: "Russia, still reeling from the turmoil that followed Kornilov's death and Kutepov's brief, violent rise to power, now finds itself under the rule of a new governor. General Vasily Boldyrev, a man who had long been considered clear-minded and conciliatory in the officer corps, seized the reins of government in a swift counter-coup that swept away the remnants of militaristic rule.\n\nBoldyrev's name, however, does not have the authority of his predecessors. He was never an instigator or an ideological inspirer. According to rumors, before Kolchak's Omsk coup in 1918, it was he who was to be proclaimed the Supreme Ruler - a man associated with the Menshevik Party, a member of the National Center and the SVR. But dismissed as an Admiral, Boldyrev spent the rest of the Civil War in Japan, although he opposed the Japanese occupation of the Far East. He did not deserve all the glory that went to the heroes of the White Movement, and it was only during Kerensky's time that he was able to return to the General Staff.\n\nNow Vasily Georgievich is at the head of a country that is still divided, exhausted and deeply suspicious of any form of power. Moderates in the Popular Front view Boldyrev with cautious hope, seeing in him perhaps the last opportunity for a peaceful return to civilian rule. The most radical elements are meeting his arrival with skepticism, if not outright hostility. In the meantime, the army obeys his command more out of pragmatism than loyalty."
rusd.3250.a: "Russia shall boost its spirits."

rusd.3251.t: "All of Russia is Liberated!" #failsafe for other generals in charge
rusd.3251.d: "The guns have fallen silent across the vast expanse of Russia. From the Baltic shores to the distant frontiers of Siberia, resistance has been crushed, rival authorities dissolved, and the long years of fragmentation brought at last to an end. Under the leadership of [ROOT.GetLeader], the state stands reunited once more.\n\nVictory, however, has not resolved the most fundamental question confronting the nation. The emergency that justified extraordinary powers is fading, and with peace comes expectation. Officers, politicians, industrialists, peasants, and workers alike now ask what form the restored Russia shall take. The army has delivered unity, but unity alone cannot define the future. Within government circles, debates grow increasingly urgent. Monarchists argue that only the restoration of the Crown can heal the wounds of revolution and provide sacred legitimacy to authority. Republicans insist that Russia's suffering stemmed precisely from unchecked autocracy and that only representative institutions can secure lasting stability. Others, hardened by years of chaos, warn that relinquishing power too soon risks undoing everything achieved through sacrifice.\n\nFor now, all eyes turn toward [ROOT.GetLeader]. The reunification of Russia has granted him unmatched authority - and the responsibility to determine whether this authority will be surrendered, transformed, or preserved."
rusd.3251.a: "Russia shall welcome back her Tsar."
rusd.3251.b: "Power must return to the people."
rusd.3251.c: "Russia still requires a firm hand."

rusd.3252.t: "Minister of War Calls Emergency Meeting"
rusd.3252.d: "General-Fieldmarshal [RUS.GetChiefOfArmy] has requested an emergency meeting of the cabinet to discuss actions that the government will be taking following the start of the war between Communards and Germany. Chairman-Minister [GetRussianPM] was undeniably bitter about such a request, as it showcases how the Minister of War is, in practice, more powerful than the head of government, if push comes to shove.\n\nIt was no ordinary cabinet meeting, either. The Minister of War, [RUS.GetChiefOfArmy], was essentially requesting the [GetRussianHeadOfState]'s permission to start preparations for the pre-emptive invasion of German-controlled Eastern Europe. While the decision on war and peace usually rests on the [GetUpperChamberNameShort] and the [GetRussianHeadOfState], the military only needs the permission of [GetRussianPM] to start implementing the necessary precautions in case of war.\n\nThe implicit threat was clear: the army merely expects political backing for already-decided operations, and if that is not given, the government may lose the trust of the whole army."
rusd.3252.a: "If the army is ready..."
rusd.3252.b: "I'm hurt he ever doubted my patriotism."
rusd.3252.c: "Or what? You're going to arrange a coup?"
rusd.3252.c.tt: "§rThey will arrange a coup.§!"

rusd.3253.t: "Wrangel Marches into the Winter Palace"
rusd.3253.d: "The coup was swift and efficient. The 3rd Guards Infantry Division, under General-Fieldmarshal Drozdovsky's orders, secured control of the capital, while General-Fieldmarshal Wrangel assumed the role of the public face of the coup. The government was forced to resign under the pressure of the military, and the Emperor swiftly appointed a new Imperial Cabinet out of men approved by the military - most controversially, appointing Wrangel himself as the Chairman-Minister of this 'sabre cabinet'. Public protests were widespread but muffled quickly by the security forces.\n\nThe official narrative claimed that [GetRussianPM] and a number of other cabinet ministers had been guilty of embezzlement and various other abuses of their power, including suspicion of cooperation with the German intelligence. Now resigned, the true patriotic government shall guide Russia, until better times are upon us."
rusd.3253.a: "The military, guardian of the nation."

rusd.3254.t: "The Sword of Damocles Falls"
rusd.3254.d: "Russian democracy owes everything to the Russian Army. Without it, Russia would be enslaved to Bolshevik tyranny. And as such, the military has always held that it has the moral obligation to intervene if the civilian government is endangering the interests of Russia. And now, that day has come.\n\nIn the early hours of dawn, Guards units of the [ROOT.Capital.GetName] Military District entered the capital and swiftly secured bridges and the radio station before entering the Administration. General Mikhail Levitov arrested the government and declared martial law in the city until proper transfer of power is organised. In a simple radio address by the military to the people, it was assured that a responsible government would soon take the reins, and the military would only see its role as guarantor of the nation. That the former government, accused of various crimes against the Russian nation, would be tried in civilian courts, and everything would return to normalcy soon enough."
rusd.3254.d.prewar: "Russian democracy owes everything to the Russian Army. Without it, Russia would be enslaved to Bolshevik tyranny. And as such, the military has always held that it has the moral obligation to intervene if the civilian government is endangering the interests of Russia. And now, that day has come.\n\nIn the early hours of dawn, Guards units of the [ROOT.Capital.GetName] Military District entered the capital and swiftly secured bridges and the radio station before entering the Administration. General Mikhail Levitov arrested the government and declared martial law in the city until proper transfer of power is organised. In a simple radio address by the military to the people, the former government was outed as unpatriotic sycophants who were caught trying to negotiate with Berlin in secret. When the treason was revealed, it left the military no other course of action but to act."
rusd.3254.a: "The Sword of Damocles has fallen upon us."


## Wrangel events ##
rusd.3300.t: "The Radical Democrats Speak"
rusd.3300.d: "With the new government settling into its hardened routines, voices of dissent have begun to stir once more within the pages of liberal newspapers. At the center of this growing chorus stands the Russian Radical Democratic Association (RRDO), an alliance of liberals and right-leaning socialists who refuse to accept the permanence of martial order. Led by Nikolay Nekrasov, a veteran parliamentarian with a reputation for fiery oratory, the RRDP demands an end to the state of emergency and the restoration of full constitutional safeguards. He finds an ally in Nikolay Avksentiev and his Right SRs, who lend their rhetoric to student circles and civic societies that still cling to the memory of democratic politics.\n\nFor now, their speeches amount to little more than a nuisance - legal motions, petitions, rallies carefully contained within the limits of the law. Wrangel's advisors regard them with a mix of irritation and weary amusement. The Supreme Ruler himself, ever calculating, sees them as idealists lost in a world that no longer tolerates illusions of unguarded liberty. They are permitted to speak for now - so long as they do not cross the line that divides words from action."
rusd.3300.a: "We must still watch them closely."

rusd.3301.t: "A Pact in the Senate"
rusd.3301.d: "Vasily Shulgin, the seasoned leader of the All-Russian People's Union, arrives to the Senate as a statesman - the figurehead of Russia's most influential conservative force and the standard-bearer for the idea that the monarchy must one day return.\n\nFor Wrangel, the meeting is not one of negotiation but of arrangement. The VNS, emboldened under Kornilov, now stands ready to lend its weight to the Supreme Ruler's government - providing loyal bureaucrats, steady parliamentary votes, and the moral legitimacy of continuity with Russia's pre-revolutionary heritage. In return, Shulgin secures what his followers demand: clear signs that this military regime will not stray from conservative social principles and that, in time, the question of Russia's crown will be resolved in their favor.\n\nThis pact in the Senate does not settle every doubt about the path ahead. But for the moment, it binds the threads of state power to the promises of tradition - giving Wrangel's cold precision a cloak of familiar authority, and giving Shulgin's monarchists a place at the table as guardians of Russia's true restoration."
rusd.3301.a: "Russia requires a strong government."

rusd.3302.t: "The Supreme Ruler's Government"
rusd.3302.d: "With authority consolidated and the foundations of order secured, Pyotr Wrangel now turns to the final step in stabilizing his rule - the formation of a new government under the auspices of the Osoboye Soveschaniye.\n\nTwo figures stand at the center of this moment. Vasily Shulgin, the seasoned statesman and leader of the VNS, commands wide respect among conservatives and monarchists alike. His appointment would reassure the Senate, lend the new government a veneer of civilian continuity, and temper the discontent simmering within the remaining liberal ranks.\n\nStanding opposite him is General Aleksandr Lukomsky - a trusted ally from the days of the White struggle and an administrator whose loyalty to Wrangel is beyond question. Elevating Lukomsky would strengthen the Supreme Ruler's direct control, ensuring that the ministries remain firmly in the hands of men loyal to the chain of command."
rusd.3302.a: "Appoint Vasily Shulgin."
rusd.3302.b: "Appoint Aleksandr Lukomsky."
rusd.3302.c: "Appoint Ivan Ilyin."

rusd.3303.t: "The Black Hundreds Increase Activity"
rusd.3303.d: "While Pyotr Wrangel's new government settles into its promise of measured stability, the streets and churchyards of Russia's provincial cities stir with another vision for the nation's future.\n\nThe cells of the old Black Hundredist tradition find new life under fresh banners. The Russian National Union of War Participants, commanded by Anton Turkul and bolstered by Drozdovite loyalists, rallies discharged officers with promises of a righteous return to autocracy. Viktor Larionov's 'White Idea' brigades march under icons and slogans demanding the restoration of a monarchy untainted by compromise. Meanwhile, old reactionary figures like Markov breathe life back into the long-forgotten movements, convening the so-called Supreme Monarchist Council to denounce what they call the half-measures of the current regime.\n\nIn Petrograd and beyond, their orators proclaim that Wrangel's Senate deals and conservative pacts amount to betrayal - that only the full rebirth of the Orthodox Autocracy can redeem the nation's wounds. Leaflets appear overnight, adorned with crowns and double-headed eagles. Processions wind through city squares, watched warily by police detachments.\n\nFor now, they remain a nuisance, but a force alone might accomplish what words cannot."
rusd.3303.a: "What vanquishing the left did to bolstering the right?"

rusd.3304.t: "Petition for the Martyrs of the Throne"
rusd.3304.d: "A formal petition has reached the Special Council bearing the unmistakable seal of the Russian People's Union of Archangel Michael, endorsed by Purishkevich and Markov, and echoed by clergy from pulpits in cities and villages alike. The demand is simple but heavy: a National Day of Remembrance for the Martyrs of the Throne - the Romanovs and all loyalists who fell to revolutionary violence - and the restoration of monuments once torn down in the upheavals of the civil war.\n\nAcross provincial squares, supporters gather beneath Orthodox icons and old imperial banners, holding vigils and singing hymns for the souls they call betrayed by the tides of modernity. In the capital, liberal deputies and newspapers denounce the petition as a provocation, warning that stirring old symbols will revive old hatreds and divide the fragile calm Wrangel's regime has enforced.\n\nGranting it would mean no immediate risk, but the precedent could embolden the restless fringes who believe the state must bend to their vision of sacred autocracy. Refusing, however, risks feeding discontent and pushing their cause deeper into the streets."
rusd.3304.a: "Approve the Day of Remembrance."
rusd.3304.b: "There will be no return to symbols that could reopen old wounds."

rusd.3305.t: "Druzhinas of Self-Defense"
rusd.3305.d: "In towns across Russia, detachments of the Russian National Union of War Participants have begun marching in disciplined columns, clad in surplus uniforms and bearing Drozdovites' regimental banners. Turkul's veterans, joined by younger patriotic recruits, have staged what they call training demonstrations - patrols near churches, watch details for newly restored monuments, and show-of-force rallies in working-class neighborhoods once loyal to the revolution. Their leaders now submit a formal petition to the Special Assembly: legal status for these patriotic Self-Defense leagues as community guards, empowered to drill and bear arms under the sanction of local authorities. They justify their request as a necessary shield against subversion - a volunteer force to protect the moral order and defend sacred sites from the remnants of radicalism.\n\nWhile parts of the army quietly approve, the General Staff and police chiefs warn that these leagues, once recognized, will be answerable to no single command. In Petrograd, liberal deputies stage protests against what they denounce as the birth of a private army under monarchist banners."
rusd.3305.a: "The veterans will guard the streets and the churches."
rusd.3305.b: "No private army will march beside the regular forces."

rusd.3306.t: "Guardians of Morality"
rusd.3306.d: "Emboldened by their growing presence on the streets and in veterans' halls, Larionov's youth movement - the ‘White Idea' brigades, and the Supreme Monarchist Council have advanced a new demand. With the quiet blessing of influential Orthodox clergy, they have petitioned the Special Assembly to grant them oversight of moral and national education in schools, universities, and cultural institutions. In some provinces, the demand goes even further: local chapters wish to sit on municipal advisory boards, vetting administrators for their loyalty to the Church, the Throne, and the moral vision they claim to embody.\n\nWrangel's senior bureaucrats, especially within the VNS ranks, see this as a clear threat - an attempt to establish a parallel authority that answers not to the state but to reactionary councils and self-appointed guardians of virtue. Liberals condemn the proposal as the death knell of civil society, while conservative loyalists murmur that it might contain the spread of dangerous ideas among the youth."
rusd.3306.a: "Grant them influence over education only."
rusd.3306.b: "Grant them local administrative oversight too."
rusd.3306.c: "The state remains the sole guardian of Russia's moral order."

rusd.3307.t: "Assault in the Street"
rusd.3307.d: "Late one evening in Petrograd, a well-known deputy of the Radical Democratic Association was set upon by a group of masked men as he left a public forum. Witnesses describe the assailants waiting in a side street, shouting monarchist slogans as they struck him down and vanished into the night.\n\nThough the deputy survived with broken ribs and a battered face, he is now the centerpiece of outraged headlines in liberal papers, which denounce the incident as proof that the Black Hundreds operate beyond the reach of law. At the same time, sympathetic whispers in officers' messes and veteran circles suggest the beating is the natural consequence of reckless dissent in dangerous times.\n\nThe city gendarmerie have filed a brief report but made no arrests."
rusd.3307.a: "No further inquiries will disturb loyalists."
rusd.3307.b: "The police will be told to find the culprits."
rusd.3307.c: "Better not to stir the matter at all."

rusd.3308.t: "Churchyard Pogrom"
rusd.3308.d: "In a small provincial town, rumor spread that a circle of former leftist agitators had gathered inside the parish schoolhouse to plot against the local order. By morning, a crowd of parishioners and Black Hundred youths had assembled in the churchyard, incited by a fiery sermon from the local priest denouncing hidden traitors in the heart of the community. The supposed conspirators, a handful of teachers and a librarian, were dragged out, beaten, and paraded before the parish gates.\n\nThe town's civil authorities lodged a mild complaint to the regional prefect but made no arrests. The local diocese released a cautious statement calling for calm but praised the people's vigilance in defending the faith."
rusd.3308.a: "Condemn the violence publicly."
rusd.3308.b: "Settle it quietly with local payments."
rusd.3308.c: "Better to let the townsfolk settle scores as they see fit."

rusd.3309.t: "Factory Yard Fray"
rusd.3309.d: "In an industrial district on the outskirts of a major city, a group of factory workers, frustrated by months of delayed pay, staged a small strike and blocked the yard gates in protest. Local managers, fearing sabotage and mindful of rumors of \"agitators\", quietly requested assistance, but not from the police.\n\nInstead, a detachment of Black Hundred vigilantes appeared, claiming to protect vital industry and the national cause, they forced their way into the yard, beat the strike leaders, and forced the rest back to work at bayonet point.\n\nLeftist newspapers seized on the clash at once, calling it proof that private gangs now enforce the will of factory owners and monarchists alike. Inside the government, loyal generals grumble that uncontrolled vigilantes risk inflaming labor unrest rather than quelling it, yet some industrialists praise the \"patriots\" for keeping order when the state could not."
rusd.3309.a: "Factories must stay open."
rusd.3309.b: "Punish the vigilantes publicly."
rusd.3309.c: "Try to calm the workers, without angering the vigilantes."

rusd.3310.t: "A Throne Without a Crown"
rusd.3310.d: "The question that has lingered since the day Kornilov assumed command has returned to the forefront: what form shall the promise of monarchist restoration take? If the old order is to rise again, then the state must decide who will stand guard over the throne, until the time is right. Already, monarchist deputies in the Senate and the VNS have tabled proposals for a Regency Council, a body of trusted generals, senior nobles, Orthodox metropolitans, and statesmen to guide the transition, guard the faith, and prepare the Zemsky Sobor that will decide Russia's future sovereign.\n\nYet how far its hand will reach remains undecided. Some urge that the Council must be a dignified promise to the nation that the return of the Tsar is certain, but under the shield of Wrangel's supreme rule. Others argue the Regency shall hold real authority as the caretaker of the throne, until a monarch can be named."
rusd.3310.a: "Establish a ceremonial Regency Council."
rusd.3310.b: "Empower the Regency with right to advise and plan the Sobor."
rusd.3310.c: "Regency should have broad constitutional and ceremonial powers."

rusd.3311.t: "The Steward of the Throne"
rusd.3311.d: "With the Regency Council now recognized as the guardian of Russia's uncertain crown, the question of who shall serve as its steward looms large.\nThe first contender is Boris Engelgardt, a liberal monarchist and member of the VNS. His active involvement in the February Revolution makes him an intriguing, yet contentious candidate for Wrangel's support. Engelgardt's leadership could bolster confidence among monarchist officers in the General Staff, but his association with the February Revolution might alienate some staunch monarchists.\n\nThe second choice is Aleksandr Lukomsky, a moderate monarchist closely linked to the ROVS. His appointment could strike a delicate balance between the more radical monarchist elements and the more conservative factions within the military.\n\nLastly, some whisper that only the Supreme Ruler himself can command the respect, loyalty and discipline required to shepherd the monarchy back to life without it fracturing into rival factions. For Wrangel, to name himself as Regent would bind him to the crown's fate, but also place him at its mercy."
rusd.3311.a: "The Black Baron himself."
rusd.3311.b: "Engelgardt shall head the Council."
rusd.3311.c: "Appoint Lukomsky instead."

rusd.3312.t: "The Regency Council's Petition"
rusd.3312.d: "The Regency Council, supported by the Russian Orthodox Church, has formally petitioned Supreme Ruler Wrangel to summon the Zemsky Sobor - a national assembly of both Zemstvo-appointed representatives from all across Russia, and delegates, invited by the Regency Council, including nobles, clergy, and loyal dignitaries. The Zemsky Sobor should be tasked with choosing a lawful monarch to restore Russia's ancient order. Church bells have tolled across the major cities, while solemn masses and prayers have been held in honor of the impending convocation. The sacred rites lend divine weight to the future Sobor's convention and rally the hearts of loyalists across the land.\n\nYet among the Black Hundred factions, voices grow impatient and restless. Such people as Markov and Turkul warn that delay may breed chaos and embolden revolutionaries, hinting that their own direct action might soon be necessary should the Sobor not proceed promptly. On the other hand, the radical democrat opposition of Avksentiev and Nekrasov try to diminish the Sobor's influence as neither legal nor legitimate. Despite all, the Black Baron accepts the convocation of the Sobor as a natural step in the restoration of national order and stability."
rusd.3312.a: "Issue orders for immediate preparations to convene the Zemsky Sobor."

rusd.3313.t: "Church Bells and Prayers"
rusd.3313.d: "Throughout the cities and countryside, church bells toll solemnly, marking the beginning of the Zemsky Sobor's preparations. Inside cathedrals and churches, the faithful assemble for special services. Clergy deliver sermons invoking divine favor on the restoration of the monarchy and the unity of Russia. Yet in some quarters, whispers of discontent circulate as liberal newspapers quietly decry the Church's prominent role in state affairs. In large cities, small gatherings murmur their unease with the encroachment of sacred authority on secular governance."
rusd.3313.a: "Publicly endorse the Church's role in the Sobor preparations."
rusd.3313.b: "Limit public displays of Church influence."

rusd.3314.t: "Noble Envoys Arrive"
rusd.3314.d: "Delegations from noble families across the Russian provinces converge on Moscow and other key cities, preparing to take part in the upcoming Zemsky Sobor. Envoys carry petitions urging the restoration of the monarchy, protection of property rights, and the preservation of Russia's historic social order. Behind the scenes, however, rival factions vie for influence, whispering of their preferred claimants or alternative futures for the nation. Local authorities brace for potential unrest as the gathering swells."
rusd.3314.a: "Welcome broad attendance, inviting all loyal nobles and landowners."
rusd.3314.b: "Restrict attendance to carefully vetted loyalists only."

rusd.3315.t: "Rumors of Romanov Envoys"
rusd.3315.d: "Rumors spread rapidly across the capital and beyond that envoys representing a Romanov claimant have held secret meetings with Supreme Ruler Wrangel. Though no official confirmation has been given, whispers suggest that Dmitry Pavlovich, a senator from the VNS party, might be involved in these delicate negotiations.\n\nThe news excites monarchist factions eager for a legitimate heir, while simultaneously stirring suspicion among Black Hundreds who fear conspiracies. Liberals view the rumors as a sign of backroom dealings."
rusd.3315.a: "Publicly acknowledge the meetings."
rusd.3315.b: "Deny the rumors firmly."
rusd.3315.c: "Refuse comment."

rusd.3316.t: "Liberal Press Mocks the Sobor"
rusd.3316.d: "The liberal press, which supports the Nekrasovites and the RRDO, has taken to openly mocking the Zemsky Sobor. Editorials describe the assembly as a \"reactionary theater\", a desperate attempt by monarchists to cling to outdated symbols and delay real political progress. Publications question the legitimacy of the Regency Council and warn that the Sobor risks deepening divisions within the nation rather than healing them. Though the movement remains peaceful, their persistent critiques are gaining traction among urban liberals and moderate socialists."
rusd.3316.a: "Denounce destabilizing rhetoric."
rusd.3316.b: "Ignore the criticisms."
rusd.3316.c: "Attempt discreet negotiations with RRDP leaders."

rusd.3317.d: "The Zemsky Sobor, currently in full swing, has reached a critical and perilous juncture - the question of succession. For weeks, delegates have argued over various novel proposals for the future of the Russian monarchy. The discussion has now shifted to the issue of specific individuals, with three key contenders emerging from the discourse, each representing a distinct vision for the restored monarchy.\n\nThe first in line, [GetRusKirillovich], represents the senior line of the Imperial House. To the devoted monarchists, the Black Hundreds and the more reactionary clergy, this descendants are the only legitimate heirs to the Russian throne, sanctified by dynastic law and ancestral right. To enthrone them would mean a return to the old order - firm, autocratic, and unquestionable. Yet the shadow of 1917 lingers. Many recall that Kirill himself was the first Romanov to break his oath to Nicholas II, to march under the banner of the revolution, and to embrace the Provisional Government. Baron Wrangel himself, while refraining from open interference, is known to harbor reservations toward such a candidate.\n\nOpposing this vision stands Grand Duke Dmitry Romanov, preferred by moderates and the VNS. Dmitry, a man of education and worldly experience, advocates a constitutional monarchy. His supporters see in him a monarch of reconciliation, capable of bridging the abyss between the army, the intelligentsia, and the people. Yet his critics, both reactionaries and the cynical within the officer corps, whisper that his moderation is mere weakness - that under his hand, Russia will once again fall prey to parliamentary chaos and industrial oligarchy.\n\nLastly, there is Prince Roman Petrovich, nephew of Grand Duke Nikolay Nikolaevich - a soldierly, disciplined man, and a close associate of Wrangel himself. His candidacy, though lesser known, finds support among pragmatic monarchists and the more moderate elements of the ROVS. But for the hardliners, he is too modest, too pliable, too bound by his ties to Wrangel and the White cause to command true reverence."

rusd.3319.t: "Dissolution of the RRDO"
rusd.3319.d: "The decree has come at last. By order of the [GetRussianHeadOfState], the Russian Radical Democratic Association - the so-called \"RRDO\" - has been formally dissolved. The remnants of the old liberal intelligentsia and reformist circles clung to life beneath the iron canopy of the new order. From the columns of fading newspapers and from the rostrums of civic clubs they pleaded for the return of a constitutional age long since buried.\n\nYet time, like the state, has moved on. The patience of the government, strained by ceaseless petitions and parliamentary obstruction, has finally reached its end. Wrangel's decree cites the persistent subversive activity and moral decay of the Association as justification for its abolition. Within hours, the organization's headquarters were shuttered, its archives sealed, and its modest press silenced.\n\nNikolay Nekrasov, the party's founder and elder tribune, issued a short statementbefore departing abroad - his destination unannounced. His ally, Nikolay Avksentiev, fled soon after, reuniting with the exiled remnants of the Right Socialist-Revolutionaries to form the Foreign Bureau of the Party of Social Reforms in Paris."
rusd.3319.a: "A logical consequence for those who oppose Holy Russia!"

rusd.3320.t: "Master of the Russian Land"
rusd.3320.d: "A profound silence descended upon the vast chambers of the Grand Kremlin Palace as the patriarch's solemn voice proclaimed the choice of the Sobor. After weeks of intense deliberations, clandestine machinations, accusations, and invocations to both history and conscience, a decision had been reached. Russia, having long since shed its imperial mantle, would once again bow before a Tsar.\n\nPyotr Nikolaevich Wrangel, standing among the delegates as both a soldier and a statesman, felt no bitterness but rather a heavy sense of tranquility. His mission had been accomplished: to reestablish the foundations of order and guide Russia towards the restoration of monarchy. He had preserved the State, and now he would serve as its guardian and minister, ensuring its triumph in the long war.\n\nTo many, this decision of the Sobor marked not an end but the commencement of a new chapter - the resurgence of the Russian crown under the benevolent guidance of divine providence and the unity of the nation."
rusd.3320.d2: "A profound silence descended upon the vast chambers of the Grand Kremlin Palace as the patriarch's solemn voice proclaimed the choice of the Sobor. After weeks of intense deliberations, clandestine machinations, accusations, and invocations to both history and conscience, no name commanded consensus; no dynasty inspired unity. The dream of restoration was dissolving. It was then that one voice rose from the assembly and uttered a name that would change everything: Wrangel.\n\nWrangel himself, pale and withdrawn, did not speak for a long while. When he finally did, it was only about duty. \"If Russia wills it,\" he said quietly, \"then let it be done\".\n\nThus, in a decision born of necessity, the Zemsky Sobor proclaimed Pyotr IV as Tsar of All Russia."
rusd.3320.d3: "The final day of the Zemsky Sobor concluded not in jubilation, but in silence. For weeks, delegates had engaged in heated debate and contention, their vision of the future obscured by partisan fervour and mutual mistrust. When the patriarch's plea for unity was met with derision, Wrangel rose to his feet and declared that the time was not yet ripe. With a decisive stroke of his pen, he dissolved the assembly.\n\nWhile some viewed Wrangel's decision as a prudent one, others saw it as the obituary of a restorationist dream. To Wrangel, however, it was merely a skirmish, not a battle. When the battle was over, Russia would be able to stand tall."
rusd.3320.a: "Long live the Tsar, and long live Russia restored!"
rusd.3320.b: "Long live Tsar Pyotr the Fourth!"
rusd.3320.c: "\"The burden of rule remains mine to bear\"."

rusd.3321.t: "The Burden of Victory"
rusd.3321.d: "Grom Pobedy, Razdavaysya!\n\nThe German arms have surrendered, and once again the Russian banners fly over the lands that were once lost. Field Marshal Pyotr Wrangel, stands before the same desk from which he led his nation through its most perilous years.\n\nThe ministers now await his word. For years, Wrangel has ruled under the title bestowed upon him by the will of the army and the necessity of survival. Now that victory is achieved, all Russia waits to know his intentions."
rusd.3321.d2: "Grom Pobedy, Razdavaysya!\n\nThe German arms have surrendered, and once again the Russian banners fly over the lands that were once lost. Field Marshal Pyotr Wrangel, stands before the same desk from which he led his nation through its most perilous years.\n\nThe ministers now await his word - in the radio address, the Black Baron has announced his resignation and announced new elections to the Russian Parliament, that would be convened once again."
rusd.3321.a: "Russia shall choose her own path."
rusd.3321.b: "Victory over Germany is but half the work."

rusd.3322.t: "The Two Unions of the Russian Nation"
rusd.3322.d: "In the weeks following the Zemsky Sobor, the matter of governance returns to the fore. The Russian Monarchist Union (RMS), founded under the personal patronage of His Imperial Majesty Pyotr IV, has swiftly become the nucleus of a new political order, as a brotherhood of conviction and service, devoted to the monarch and the renewal of Russia's statehood.\n\nYet, on the other flank of the patriotic spectrum stands the venerable All-Russian National Union of Vasily Shulgin as our old allies. Though their ideals now seem nearly identical, both claim the mantle of the nation, as Shulgin starts to demand more concessions and restoration of the consitutionalism.\n\nSome urge that the two unions remain allied but distinct - the RMS as the crown's instrument, the VNS as the conscience of the conservative elite. Others whisper the monarch's movement must absorb all lesser banners beneath the single name of the Russian Monarchist Union."
rusd.3322.d2: "The Sobor has spoken, and his Imperial Majesty [ROOT.GetLeader] now reigns. Yet the question of political alignment still hangs unresolved. Baron Wrangel, though relieved of command of the ROVS, has not retired from duty. Under his initiative, the Russian Monarchist Union was founded as a body of loyalists and statesmen pledged to uphold the new crown and ensure the continuity of order. As the old pillar of conservative politics, Shulgin's VNS members now fill many of the ministries in Wrangel's coalition, yet the VNS feels itself completely out of the governance. Ideologically, little divides the two groups: both stand for Faith, Tsar and Fatherland. The Chairman-Minister must now decide, whether to preserve the present coalition of monarchists and conservatives, or to weld them into one movement, a single guardian of the restored realm."
rusd.3322.a: "Let the two unions stand together."
rusd.3322.b: "Unite the banners beneath one name."

rusd.3323.t: "The Petrograd Disturbances"
rusd.3323.d: "In Petrograd, the People's Republican Party of Russia has allowed its Combat Squads to march openly through the Nevsky, with their green armbands and revolutionary hymns echoing against the granite facades. Across the river, the Black Hundred druzhinas answer in kind, parading with icons and portraits of the Tsar-Martyr, proclaiming their divine right to defend Holy Russia.\n\nAt first, the confrontation was little more than a contest of words and banners. But when the first stones flew - and gunfire followed - Petrograd descended into a chaos unseen since the days of the February collapse. For two nights, fires burned across Liteyny Prospekt.\n\nBoris Savinkov, the city's Military Governor, appointed by Lavr Kornilov himself, hesitated, waiting for the response of the Supreme Ruler. When calm finally returned, dozens were dead, hundreds wounded, and the fragile order of Wrangel's regime visibly shaken.\n\nNow, under pressure from the General Staff, the Supreme Ruler must decide how to respond."
rusd.3323.a: "The NRPR is to be outlawed."
rusd.3323.b: "The Black Hundreds have gone too far."

rusd.3324.t: "The Fall of the Governor"
rusd.3324.d.intro: "In the wake of the Petrograd disturbances, the People's Republican Party of Russia, the Black Hundreds, and the loyalists of the Supreme Ruler alike have all been reminded that Petrograd answers only to the authority of the state - and of the Supreme Ruler himself.\n\nFor Boris Savinkov, the consequences are immediate. The military governorship he held as a concession to the turbulent political landscape is revoked. While never a general in the traditional sense, he had wielded a dangerous mixture of charisma, militant zeal, and revolutionary cunning - a combination the Supreme Ruler could not allow to remain in the capital."
rusd.3324.d: "$rusd.3324.d.intro$\n\nThe Combat Squads are dismantled, their offices shuttered, and the NRPR's leadership dispersed. Savinkov is relieved of his post, his influence in Petrograd eradicated. He remains in Russia, but is stripped of all formal authority and kept under close observation by loyalist security services. His presence continues to inspire whispers of dissent, but without access to resources or armed followers, he becomes just a shadow of his former self."
rusd.3324.a: "One man's ambitions subordinated to the enduring order of Holy Russia."

rusd.3325.d: "$rusd.3324.d.intro$\n\nBy repressing the monarchist militias rather than Savinkov's faction, Wrangel forces the latter to resign in shame, yet the NRPR survives in a weakened and disorganized form. Savinkov is removed from his office, but the ideological fervor of his followers continues to stir debate among younger officers and intellectuals. His personal authority is broken, though remnants of his movement linger in clandestine networks, quietly opposing monarchist influence."

rusd.3326.t: "Solidarists Support Tsar Pyotr!"
rusd.3326.d: "The National Union of the New Generation has made its stance clear. In a declaration published across the conservative press, Aleksandr Trushnovich and Mikhail Georgiyevsky - the most visible figures of the so-called Solidarist current - have proclaimed their support for His Imperial Majesty Pyotr IV, hailing him as the Restorer of Unity and Order and the living embodiment of Russia's renewal.\n\nTheir manifesto, drafted in both lofty moral tone and youthful zeal, speaks of overcoming the false division between throne and people through a new synthesis of faith, social duty, and national solidarity. They frame the monarchy not as a relic of the past but as the nucleus of a third way - a vision where the Crown stands as the guarantor of harmony between classes. The vision that their previous figurehead, Boris Savinkov, could not fulfill.\n\nThe move has caused a stir among the older conservative factions. The Black Hundredist orators and many within the Orthodox hierarchy regard the NSNP's rhetoric with suspicion, finding them too modern, too ambiguous in their piety. Yet, in the barracks and among the Junker schools, enthusiasm is spreading."
rusd.3326.a: "The young believe again - and they believe in him."

rusd.3327.t: "The Black Baron Retires!"
rusd.3327.d.intro: "The war is over. The banners are lowered and the parades have stopped. There is only silence in the tired expanses of Russia - the silence that comes after a great defeat. The years of self-sacrifice and iron discipline under the leadership of the Black Baron ended not in triumph, but in defeat. In a brief address to the nation, Wrangel recognizes the limits of human strength. He speaks without bitterness, without excuses. He declares that the time has come for new people to restore what the Cossack shashka could not protect. And with these words, he steps back from the stage, leaving the fate of Russia to those who follows."
rusd.3327.d: "$rusd.3327.d.intro$\n\nThe banners of the Black Baron are being removed from all administrative buildings, as the Tsar abdicates. In his last order, he summons the chiefs of the General Staff and the remaining members of the Special Council. Before them, he declares that Russia shall be placed under military administration until such time as national order is restored. Then, without ceremony, he departs the capital, never to be seen in public again."
rusd.3327.d2: "$rusd.3327.d.intro$\n\nThe Supreme Ruler's cabinet gathers for the last time. Wrangel listens to his ministers' proposals - to restore the Duma, to declare martial law anew. At last, he rises and announces his resignation, leaving the decision of succession to his subordinates - not as a ruler, but as a man who has seen too much of duty's cost."
rusd.3327.d3: "$rusd.3327.d.intro$\n\nThe Council of Ministers convenes in uneasy silence. Outside, the people mutter of betrayal and failure; inside, the ministers trade blame and frightened glances. Wrangel announces that he has fulfilled his service to Russia, leaving the burden for others to take. There are no protests, no arguments - only a quiet recognition that the age of the Black Baron has ended."
rusd.3327.a: "The Army will preserve the realm until Russia heals."
rusd.3327.b: "Let the Duma assume authority once more."
rusd.3327.c: "Appoint a new government from the loyalists."
rusd.3327.e: "Dissolve the cabinet and rule temporarily by decree."

rusd.3328.t: "Fate of the Zemgor"
rusd.3328.d: "Zemgor, or the Main Committee of the Union of Zemstvos and the Union of Towns, was an organization established in 1915 based on Zemstvos and city dumas institutions to distribute state defence orders. The necessity for such an intermediary body arose in the context of the \"shell famine\" of 1915, when the supply of ammunition became critical.\n\nIn the British Empire, this problem was addressed by nationalizing the defence industry, whereas in Russia, it was resolved through concentrating supplies in private hands. Similar to the Zemstvo movement itself, the Zemgor maintained close ties with the Constitutional Democratic Party and was frequently criticized during the Imperial period for existing solely at the expense of the state without providing tangible benefits. However, one of Zemgor's strengths was its anti-monarchist propaganda efforts at the frontlines.\n\nYears later, there is a prevailing view that Zemgor had been preparing the groundwork for the February Revolution as it was the members of Zemgor who subsequently assumed power. In the aftermath of the Civil War, Zemgor, now as a public charity organization, significantly consolidated its position, actively contributing to the development and promotion of local self-governance and Zemstvo institutions in Russia. However, despite its growing influence, it remained bound by its primary responsibility of providing support to the military in case of war.\n\nThe current leader of Zemstvo, Vladimir Zeeler, hailing from the Don region, has established himself as a key intermediary between the Cossack communities and the Volunteer Army during the early stages of the Civil War. Nevertheless, his association with the liberal opposition movement raises concerns regarding his loyalty to the current regime.\n\nAmidst this complex landscape, the Supreme Ruler is faced with a critical question regarding the future of Zemstvo. While its role as a vital institution cannot be disregarded, its allegiance to [RUS.GetLeader] remains uncertain."
rusd.3328.a: "Dissolve the Zemgor entirely!"
rusd.3328.b: "Place Sergey Trubetskoy as its head."
rusd.3328.c: "Let it exist, they are hardly an issue."

rusd.3329.t: "The Philosopher of the State"
rusd.3329.d: "Unlike his predecessor, Pyotr Wrangel has shown little patience for ambiguity. The state, in his view, must justify itself, command belief, and endure beyond the will of any single commander. Discipline and order may secure obedience, but they cannot alone secure legitimacy.\n\nSummoned for consultation, Ilyin has presented to the Supreme Ruler a vision of the Russian state as a moral organism, bound by a shared understanding of duty, hierarchy, and national purpose. Authority, he argues, must be personal yet restrained, rooted in conscience as much as command. For Wrangel, this offers something the regime has thus far lacked, yet this is not without risk.\n\nTo elevate a philosopher is to evolve a ideological doctrine from Ilyin's blueprint for the future Russian state. Some from the ROVS welcome this development, seeing in it the long-awaited synthesis of order and meaning. Others remain wary."
rusd.3329.a: "Elevate him as the ideological architect of the regime."
rusd.3329.b: "The state requires generals, not philosophers."

rusd.3330.t: "The New Chief of the ROVS"
rusd.3330.d.intro: "Due to the fact that the ideology of the ROVS implies the apolitical nature of its members, with the rise to power of both General Kornilov and his successor, rumors spread in the opposition environment that the ROVS no longer had the right to represent the interests of the army. In light of this conflict of interest, Baron Wrangel has officially announced his resignation as the Chief of the ROVS."
rusd.3330.d: "$rusd.3330.d.intro$\n\nGeneral Aleksey Arkhangelsky, a clear candidate suggested by the Black Baron, who calls for unity and preservation of the ROVS as a moral foundation of the state, was appointed instead by the Congress of ROVS."
rusd.3330.d2: "$rusd.3330.d.intro$\n\nIn his place, professor Ivan Ilyin, philosopher and conservative thinker, as well as the author of the ROVS ideology, was proposed as a symbolic candidate by the Black Baron - who would act a civilian moral authority, true to the Union's initial purpose."

rusd.3331.t: "The House of Wrangel"
rusd.3331.d: "Before Pyotr Nikolayevich became the Black Baron, before his name was spoken with fear, admiration, or hope, he was first the son of a family shaped by discipline, learning, and duty. The Wrangels were old Baltic nobility, with a military name and a household that nevertheless valued books, conversation, and the sort of stern moral education that produces men who do not bend easily, but who also do not break without cause.\n\nHis father, a man of restrained dignity and broad interests, left behind not only a tradition of service but a habit of thought; his mother, educated and exacting, gave her son the mixture of formality and inner independence that would later distinguish him from so many of his peers. In the family estate, one learned that rank was not an excuse for laziness and that a man was judged not only by how he fought, but by whether he knew WHY he fought.\n\nIt would be wrong to say that Wrangel was made by cruelty. He was made instead by responsibility and pride, a mix from the old nobility and modern discipline. From such a house, one could produce a bureaucrat, a scholar, or an officer. Russia received the last — and perhaps, in time, the most dangerous of the three."
rusd.3331.a: "A name is often a burden long before it becomes a banner."

rusd.3332.t: "Letters from Manchuria"
rusd.3332.d: "The Russo-Japanese War left many Russian officers with memories of confusion, exhaustion, and an empire unsure of its own strength. Pyotr Wrangel returned from Manchuria with a habit of observation. During his reconnaissance service, he wrote long and careful letters home, not as a man performing himself for posterity, but as one trying to set down what a soldier actually sees when the language of patriotic rhetoric is stripped away.\n\nHis descriptions were exacting, sometimes severe, and never lazy. The terrain, the fatigue, the uncertainty of command, the small human details of camp and march — all were rendered with a clarity that later made his correspondence seem almost literary. His mother would preserve and publish these letters in late 1920s, a decision obviously made with Black Baron's consent, and from them emerged an early portrait of a commander who saw purpose.\n\nIn Manchuria, Wrangel learned that modern war was not merely a contest of courage, but of endurance, logistics, and nerve. He saw that armies could be broken by hunger, terrain, rumor, and hesitation long before they met in battle. It is perhaps no surprise that, in later years, he would distrust improvisation and romanticism alike. He had seen too much of war to believe that fate rewards enthusiasm. It rewards preparation."
rusd.3332.a: "A good commander must first learn how war looks when it is not glorious."

rusd.3333.t: "Kaushen"
rusd.3333.d: "The summer campaign in East Prussia gave Wrangel the episode by which legend first reached him. At Kaushen, in the smoke and shock of mounted action, he led the charge that would later be repeated so often that fact and myth became difficult to separate. His horse was struck beneath him; the guns were taken; the engagement became one of those rare moments when cavalry, already said by many to belong to an older age, proved it could still decide the moment with force and audacity.\n\nFor the White movement and for those who would later tell stories about Pyotr Nikolayevich, Kaushen became an emblem. The Black Baron in these legends spread among the Junkers, was a man of honor and courage, but not for the blind exuberance of seeking applause. There was calculation in the daring, and discipline inside the charge. He rushed because he understood that in war, hesitation often killed more surely than enemy fire. The legend that grew from that day would follow him through Civil War and beyond. The legend that made him who he is in the eyes of millions."
rusd.3333.a: "The battlefield made him, and then made him famous."

rusd.3334.t: "For Holy Rus"
rusd.3334.d: "Grom Pobedy, Razdavaysya!\n\nThe German arms have surrendered, and once again the Russian banners fly over the lands that were once lost. Our Tsar and Supreme Commander-in-Chief, Pyotr IV, stands before the same desk from which he led his nation through its most perilous years.\n\nThe ministers now await his word. For years, Pyotr IV has ruled under the title bestowed upon him both by the will of the army and the Zemsky Sobor. Now that victory is achieved, all Russia waits to know his intentions."
rusd.3334.a: "Russia shall choose her own path."
rusd.3334.b: "Victory over Germany is but half the work."


rusd.3350.t: "Anarchy on the Streets"
rusd.3350.d: "The old order did not fall quietly, and neither does the new one rise uncontested. Across the breadth of Russia, from provincial towns to the great arteries of the former Empire, the streets have become battlegrounds of will and blood. What was once called the Popular Front now reveals its true face: a desperate coalition of Socialist-Revolutionaries, Mensheviks, and the ever-lurking remnants of Bolshevism, bound together by a shared hatred of authority. Around them gather the aimless and the embittered - the anarchists, deserters, and agitators who thrive wherever order falters. Barricades rise overnight, red banners hang from shattered windows, armed bands roam the streets, proclaiming revolution once more, as if the past decades had taught nothing. Railway lines are sabotaged, officers dragged from their posts, and loyal officials vanish into the chaos without a trace.\n\nThe rise of our new state has not cowed them, as to these men, the return of iron discipline and sacred authority is an existential enemy. They strike now, before the new order can take root, hoping to drown it in the same storm that consumed Russia once before.\n\nThe time of weakness, of concessions to disorder, has passed into memory. The state now stands as a judge and as an executioner."
rusd.3350.a: "Revolution must be strangled!"

rusd.3351.t: "Radicalism Among 'Liberals'"
rusd.3351.d: "Not all enemies of the state raise barricades. In the days following the restoration of order, a different voice of the so-called \"liberal opposition\" has begun to rise above the din of street violence. Under the banner of the newly proclaimed Russian Republican Democratic Association, figures long familiar to Russia’s past failures have re-emerged: former Kadets, Duma politicians, and Right Socialist-Revolutionaries.\n\nThey speak of \"rights\", of \"law\", of the \"will of the people\". They demand the restoration of the constitution, the republic, the very system whose weakness and indecision once opened the gates to ruin.\n\nFor it was not the rabble who first shattered Russia, it was these men of committees, Zemgor and speeches, who in their arrogance mistook disintegration for freedom and collapse for progress. And now, once again, they gather under new names and new banners, but with the same old poison. The state has seen this before. It will not be deceived again."
rusd.3351.a: "These 'Februarists' are same traitors."

rusd.3352.t: "Mutiny of the Officers"
rusd.3352.d: "The turmoil in Russia has reached the barracks, the staff offices, and the very core of the army itself. Reports from across the country speak of orders delayed, directives \"misinterpreted\" and transfers quietly ignored. At the center of this growing unease stands General Levitov, commander of the famed Kornilov Shock Regiment. Though no open declaration has been made, his actions speak clearly enough. Around him, a new structure begins to take form - the so-called Union of Volunteers. Drawing in disillusioned officers, staff workers, and veterans of the Civil War, it presents itself as a continuation of the \"true\" Russian army - one that, in their eyes, of General Kornilov.\n\nThe General Staff itself remains divided. A few, more bold or more foolish, have begun to drift toward Levitov’s orbit. But a state cannot tolerate two armies, nor two understandings of loyalty. However misguided these men may be, brothers-in-arms, veterans of the same struggle, they stand at the edge of a line that cannot be crossed.\n\nTurkul has already commanded to quietly reassign and sideline questionable officers, until they prove their loyalty."
rusd.3352.a: "They must recognize our power."

rusd.3353.t: "Boldyrevites Join the Popular Front"
rusd.3353.d: "General Boldyrev and his adherents have now made their choice. In a formal declaration, issued with all the dignity and restraint they so carefully cultivate, the so-called defenders of the \"people's army\" have announced their alignment with the Popular Front. Under this banner, he and his accomplices moved to organize a coordinated seizure of key administrative centers in Moscow. Yet the conspiracy, hastily assembled and poorly concealed, was uncovered before it could fully unfold. Loyal units moved swiftly and key participants were detained before their orders could even be carried out. By nightfall, it was over.\n\nThe tribunal was swift, and it was public. Sentence was carried out without delay."
rusd.3353.a: "This Menshevik always seemed a traitor."

rusd.3354.t: "Pillars of the New Order"
rusd.3354.d: "Russia stands at the dawn of a new era. The chaos of decades, the endless betrayals of revolutionaries and weak republicans, the moral decay that once claimed the streets and hearts of our cities - all have brought the nation to its knees. From this ruin, a new order arises, with the Russian National Union of War Participants standing at its center. The RNSUV is a force forged in the fires of Civil War, tempered by sacrifice of the Yassy-Don March, and guided by the revival of Russia through strength and unity. Its leader, Anton Turkul long acts as a thinker shaping a vision, of the Drozdovites - the Knights of Spirit.\n\nOnly a unified, disciplined state can protect Russia from internal decay and external threats. Divisions of class, ideology, or former allegiance are subordinated to the singular purpose of national restoration. Former enemies may be judged, rehabilitated, or sidelined, but all who serve Russia in this moment find their place within the national structure. The state is not merely political, but ethical. Citizens and soldiers alike are called to cultivate discipline, honor, and devotion. The nation must wield strength decisively, swiftly, and without hesitation. Only through courage and determination can the errors of the past be rectified and the future secured.\n\nThough Mikhail Drozdovsky remains the revered figurehead for now, the shadow behind the throne is clear - Turkul is the mind, the strategist, the architect of a Russia restored."
rusd.3354.a: "Russia shall be reborn."

rusd.3355.t: "The National Restoration Regime"
rusd.3355.d: "Today, in a ceremony witnessed by officers, loyal functionaries, and representatives of the RNSUV, Mikhail Drozdovsky is formally proclaimed Regent of Russia, the living symbol of national restoration and continuity. His ascension marks the formal birth of the National Restoration Regime - a government designed to restore order, strengthen the state, and guide the country toward its rightful destiny. While Drozdovsky takes his place at the head of the nation, the minds and strategists behind the regime remain vigilant. Anton Turkul, as the guiding architect of policy, ensures that every decree, every law, and every mobilization serves the principles of national unity, discipline, and moral renewal. Together, figurehead and strategist embody a Russia reborn: strong, vigilant, and resolute. From this day forward, the Regent shall stand as the guarantor of order and the protector of the state."
rusd.3355.a: "Drozdovsky shall be our Regent!"

rusd.3356.t: "The Russian All-People's Union"
rusd.3356.d: "With the Regency restored, it is now time to consolidate the fragmented monarchist factions and veterans of the Civil War into a single, cohesive force capable of guiding Russia forward. From the ashes of divided White movements, a coalition has been proposed - the Russian All-People’s Union, uniting monarchist parties, former officers, and loyalists under one banner. However, Turkul himself is still not sure about the roles of both emerging RONS and consolidated RNSUV.\n\nOne way is to make sure that the RNSUV asserts its authority as the central political engine of monarchist resurgence, controlling the Union and guiding the nation directly. Its ideology, discipline, and vision would dictate the political course, ensuring the veterans' influence.\n\nAlternatively, the RNSUV could step back from direct political leadership, allowing the newly formed RONS to assume the role of the primary political movement. In this configuration, the RNSUV would retain its prestige, cohesion, and veteran networks while the RONS channels popular support, articulates policy, and becomes the only legal political party."
rusd.3356.a: "The RNSUV shall remain the Veteran organisation." #natpops
rusd.3356.b: "The RONS shall be the political movement of the RNSUV." #patauts
RUS_rons_popularity: "Half of §PRNSUV§! popularity will be added to §FRONS§!"
RUS_rnsuv_pataut: "Specific §hMonarchist§! movements will be harder to rally."

rusd.3357.t: "Larionov's \"White Idea\" Endorses the RONS"
rusd.3357.d: "The Russian All-People’s Union has gained a significant new pillar as Viktor Larionov, hero of the Ice March and founder of the \"White Idea\", has formally endorsed the Union, bringing his organization and its fervent adherents into its fold.\n\nThe White Idea, forged in the fires of defeat and reimagined for a nation that cannot and must not return to the illusions of the past, has long been a force apart. Where the old White movement defended what had been, Larionov's followers attacked the enemies of the nation, organizing themselves into disciplined combat cells, and elevating personal devotion to the idea above all else. Their concept of the \"volunteer knight\" is a living, militant ideal, for whom death in service of the Motherland is the highest calling. \"Februarism\", with its liberal democracy, was no less a threat than the Red Internationale: both embodied the dissolution of national order and the betrayal of Russian destiny. Instead, the White Idea pursues a new national revolution, a renewal that elevates the nation into a powerful Empire guided by faith, discipline, and the leadership of a proven elite.\n\nNow, these ideals find alignment with the RONS, which has emerged as the only legal political expression of monarchist and nationalist unity. Larionov and his followers bring not only their numbers, but a rigorously defined vision of Orthodox-nationalist activism, emphasizing spiritual brotherhood, ethical order, and militant devotion to Russia itself.\n\nThe White Idea will remain a distinct current within the Union, its energy, zeal, and uncompromising devotion complementing the broader political structure."
rusd.3357.a: "Great!"

rusd.3358.t: "Negotiations with the Kursk Zubr"
rusd.3358.d: "The shadow from Russia's past has once again stepped into the political arena as Nikolay Markov, known among old comrades and enemies alike as the \"Kursk Bison\", has come forward to negotiate the inclusion of his Supreme Monarchist Council within the RONS. Markov is no relic, despite his old age. Though his influence has waned since the fall of the old Empire, his personality, uncompromising vision, and the loyalty of his paramilitary followers still command respect and caution. The Black Hundred veteran brings with him a network of grassroots militants, organized along the classical principles of Orthodoxy, Autocracy, and Nationality, though in his own ruthless interpretation.\n\nThe negotiations are tense as Markov's first demand is clear: his men must be officially armed, allowed to operate openly, and funded to sustain the Black Hundred movement as a counterweight to socialist agitation. To refuse is to risk alienating one of the most disciplined and fanatical factions still capable of enforcing monarchist influence in the provinces."
rusd.3358.a: "Give them the rifles."
rusd.3358.b: "More rifles on the streets? He is a madman!"

rusd.3359.t: "The Black Vanguard's Demands"
rusd.3359.d: "From the distant shores of Vladivostok comes the figure of Anastasiy Vonsyatsky, leader of the All-Russian Nationalist Movement and commander of the notorious Black Vanguard. Though his organization has remained largely regional, its paramilitary discipline, uncompromising ideology, and the fiery charisma of its \"Vozhd\" have drawn attention from both exiled monarchists and the leadership of the RONS.\n\nThe negotiations are fraught as Vonsyatsky is careful in his praise of the Drozdovite regime, acknowledging their authority while subtly reminding his hosts that his allegiance is first to Kolchak’s legacy, the Orthodox Church, and the ideals of a restored Tsardom. Though it is impossible to ignore the personal ambition that glints in his words as he envisions himself as the true Vozhd, a guiding hand for the young monarchist movement, even under a figurehead monarch.\n\nHis demands are pointed and uncompromising: he seeks formal recognition of the Black Vanguard as a legal paramilitary, freedom to organize training and propaganda, and the ability to operate within the monarchist coalition without interference. Though Vonsyatsky’s forces are small and concentrated, their fanaticism and reputation for ruthlessness in suppressing dissidents make them a tool the Drozdovite leadership cannot entirely dismiss."
rusd.3359.a: "Our aims are too close to reject the deal."
rusd.3359.b: "They are highly disorganized, no match to Drozdovites!"

rusd.3360.t: "Vonsyatsky Joins Us!"
rusd.3360.d: "The negotiations have concluded, and the Black Vanguard has formally aligned with the RONS. While the self-proclaimed \"Vozhd\" maintains operational autonomy, the Far-Eastern paramilitary force is now officially recognized as part of the broader monarchist coalition. Vonsyatsky’s fiery speeches and uncompromising vision remain intact, yet the pragmatic alliance allows the Drozdovite leadership to co-opt his energy without compromising the cohesion of the RONS. The Far-East, once a distant and ideologically fragmented region, now recognizes a unified monarchist authority, and the presence of the Black Vanguard brings legitimacy and local support to the regime. Though his personal ambitions and cult of personality persist, Vonsyatsky's loyalty to the coalition provides the Drozdovites a foothold in previously inaccessible territories. The Far-East will watch carefully, but for now, the Black Vanguard is no longer a rival."
rusd.3360.a: "Znamyona Vyshe!"

rusd.3361.t: "Treachery of the 'Turtles'"
rusd.3361.d: "Not all negotiations concluded as intended. The so-called Black Vanguard has refused to coordinate with the RONS, attempting instead to assert its independence and publicly undermine the monarchist coalition. Their propaganda is brash but limited, a string of proclamations denouncing the RONS as opportunists and traitors to the national cause.\n\nObservers may note the curious irony: the Vanguard's members display a turtle emblem on their chests, a symbol intended to inspire fear but instead lending a comical air to their antics. As loyal Drozdovite authorities quickly dismiss their claims and suppress any potential influence, exposing the movement as a minor nuisance rather than a serious threat. The "Turtles" remain fanatical, theatrical, and ambitious, but ultimately irrelevant to the task of consolidating a restored Russia."
rusd.3361.a: "..."

rusd.3362.t: "The Holy Cross Brigades Join Us!"
rusd.3362.d: "The Far-Eastern Military Union, long under the watchful eye of General Mikhail Diterikhs and the veteran Vladimir Kappel, has agreed to formally align with the RONS. Their \"Crusaders\", seasoned officers of Siberia and the Far-East, bring discipline, experience, and the quiet authority of those who fought to defend the Russian Land during the Civil War. The Far-East, previously fragmented by competing monarchist factions, now recognizes a unified structure under the RONS banner. The Crusaders maintain operational autonomy, their traditionalist and militant spirit intact, yet they are bound to the coalition’s objectives and the authority of our government."
rusd.3362.a: "In the name of Holy Cross, Russia will endure!"

rusd.3363.t: "The Progressive Monarchists"
rusd.3363.d: "The All-Russian National Union, led by the venerable Shulgin and the claimant Dmitry Romanov, represents the broadest, most influential monarchist faction in Russia today. Unlike the paramilitary or veteran organizations scattered across the regions, the VNS derives its strength from networks of moderates, influential generals, and a reputation for parliamentary strategy, carefully cultivated among the educated elites of the Duma and the Senate. For our leadership, this is both a rare opportunity and a delicate risk. To co-opt the VNS is to secure the loyalty of Russia's most politically significant monarchists, but the cost may be high: the VNS demands recognition of their ideological influence, input on the RONS’ organizational policy, and the ability to nominate trusted advisors to oversee regional coordination. If we accept, we risk alienating the hardline Drozdovites, who view compromise as weakness."
rusd.3363.a: "After all, we need their support."
rusd.3363.b: "I see no difference between Popular Front and the VNS!"

rusd.3364.t: "Always Prepared!"
rusd.3364.d: "The volunteer-veteran from the Civil War, Viktor Larionov, was already famous for being both a hero of the Ice March and the founder of the \"White Idea\" organization. Now, in an effort to support our regime's drive to keep the Russian population ready for anything that might come their way, Larionov galvanized the Drozdovite youth under the auspices of a new entity. The National Organization of Russian Youth, or NORM for short, shall amalgamate various groups previously serving the young patriots, forming a highly disciplined force trained during regular camp meetings, eternally prepared to march for our future."
rusd.3364.a: "Russia in a dire need of young Drozdovites!"

rusd.3365.t: "Markov Demands a Seat at Power"
rusd.3365.d: "The Kursk Bison is not content with rifles alone, as Nikolay Markov now demands a formal role within the National Restoration government for his movement. He argues that the VMS deserves a voice in shaping policy, directing anti-socialist action, and ensuring that the grassroots militancy he commands is wielded in accordance with national and monarchist ideals."
rusd.3365.a: "A reliable alliance must be formed!"
rusd.3365.b: "We do not need them."

rusd.3366.t: "The Rival Black Hundreds"
rusd.3366.d: "Nikolay Markov and his Supreme Monarchist Council have publicly denounced the RONS, accusing the organization of opportunism, weakness, and betrayal of the monarchist cause. In his statement on the streets of Kursk, Markov spares no rhetoric: the RONS is, in his words, little more than a cult of officers, a hollow echo of the true Black Hundred spirit. The real work of defending Orthodoxy, Autocracy, and Nationality lies with him and the paramilitaries who remain loyal to his command. While the VMS is small, its militancy and ideological fervor carry weight. It is not in our interests to give new voice to accusations that the RONS is nothing more than an officer order, disconnected from the people and the \"true\" spirit of militant monarchism.\n\nWe must act decisively and either formally dissociate the RONS from this rival movement, clarifying that the state does not condone Markov’s rhetoric or paramilitary activity, or move against the VMS directly, cracking down on their illegal organizations to prevent their influence from spreading further."
rusd.3366.a: "Dissociate RONS from this benighted movement!"
rusd.3366.b: "Crack down on illegal paramilitaries!"

rusd.3367.t: "The Twilight of the Old Guard"
rusd.3367.d: "Whispers circulate through the officer corps as some of the veterans who once served with distinction under the banners of the ROVS and the Union of Volunteers now speak openly of change, the promise of republican ideals, civil liberties, and the restoration of political debate. With the politicization of the army and once apolitical organisations, the figure of Anton Denikin emerges with a heavier burden. The once indomitable liberator of Moscow and stalwart of the White movement now lays down his uniform in an official retirement. At his dacha, he seeks only the solace of memoirs and reflection.\n\nFor us, these murmurs of dissent are a delicate matter. While the officers lack the strength to challenge the regime openly, their words are dangerous, and the possibility of decisive action looms. We do not accept neither mistakes nor failures."
rusd.3367.a: "This is what they call Non-predetermination?"

rusd.3368.t: "The Brotherhood of Russian Truth"
rusd.3368.d: "The Brotherhood of Russian Truth is a political party driven by a strong ideology based on monarchism, traditional values, Russian nationalism, Orthodoxy, and opposition to republicanism. Since 1925, when they hoped that the Cossack uprising on the Don would sweep away the republic throughout Russia, they have existed as outcasts in Rostov and Novocherkassk, secretly organizing a monarchical underground network throughout the country, and having direct contacts with the Drozdovites."
rusd.3368.a: "They would be more than willing to join us!"

rusd.3369.t: "Unity with the Drozdovites?"
rusd.3369.d: "The new Russian government of [RUS.GetLeader]'s [RUS.GetRulingParty] has officially invited us to join their new monarchist coalition. While some of their methods are far from our own, our dream of a truly monarchist Russia can become as close as ever."
rusd.3369.a: "Yes, we're in."
rusd.3369.b: "They are far too militaristic to govern a nation."

rusd.3370.t: "The BRP Joins the RONS!"
rusd.3370.d: "Thanks to our diplomatic efforts, the Brotherhood of Russian Truth has accepted an invitation to join our ranks."
rusd.3370.a: "Great!"

rusd.3371.t: "The BRP Refused!"
rusd.3371.d: "Despite our best efforts, the Brotherhood of Russian Truth has refused our invitation."
rusd.3371.a: "What an egregious case!"

rusd.3372.t: "The BRP Leaves Don"
rusd.3372.d: "The Brotherhood of the Russian Truth has now officially joined the [RUS.GetRulingParty] and the Drozdovite government in [RUS.Capital.GetName] as both the officers and politicians pledge loyalty to the new Supreme Ruler and his state."
rusd.3372.a: "Are we next?"

rusd.3373.t: "Demands From the BRP"
rusd.3373.d: "Despite the fact that the BRP exaggerates its influence on the monarchist movement in Russia, they have made certain demands for a future restored Empire: They actively promote the idea of establishing the clerical authority of the Orthodox clergy throughout Russia, as well as the destruction of the patriarchate established by the republican antichrists.\n\nAnyway, as the Brotherhood approved the idea of joining us, the disagreements on these key points may only lead us to a conflict in the future."
rusd.3373.a: "They have a point."
rusd.3373.b: "With all due respect, we are not inclined to bolster the clergy."

rusd.3374.t: "The Great Zemsky Sobor of [GetYear]"
rusd.3374.d: "They have come from across the breadth of Russia: generals in worn uniforms, priests bearing icons darkened by candle smoke, nobles, and delegates chosen or imposed, from cities and provinces alike. Beneath the Gatchina Palace, the Zemsky Sobor assembles once more. For days, the debates rage. Law is invoked, precedent dissected, faith proclaimed. At last, the voices fade. The ballots are cast. The decision, long awaited, can no longer be deferred. The throne of Russia will not remain empty."
rusd.3374.a: "By right and by law."
rusd.3374.b: "Roman Petrovich, Your Imperial Majesty."

rusd.3375.t: "Gridlock Sobor"
rusd.3375.d: "Days turn into weeks, and still the Sobor cannot decide. Every name raised is answered by another; every claim affirmed is denounced in equal measure. The delegates no longer debate, but entrench. What was meant to restore unity now reveals only division. As the throne remains empty, the patience of the army does not.\n\nBeyond the walls of Gatchina Palace, the world has not stilled as enemies gather both within and without. While the socialists stir once more in shadow, it is no time for the fragile order. In the early hours of the morning, before the session can reconvene, the doors of the chamber open to the Drozdovite Guard. The Zemsky Sobor is dissolved.\n\nIts failure is declared moral, as the question of the Crown is postponed, not abandoned. Later that day, Regent Drozdovsky addresses the nation, as he speaks not of law and not of Tsars. He speeks only of war. As Russia stands not at the end of its trials, but at their beginning, the restoration of the monarchy, like the restoration of the nation itself, must be earned."
rusd.3375.a: "We all want the same thing, then why can't we agree on anything?"

rusd.3376.t: "The House Divided"
rusd.3376.d: "Across Russia, proclamations are read aloud in churches, barracks, and public squares: a Zemsky Sobor shall be convened in what now seems Russia's second Time of Troubles. Yet even before the delegates gather, one truth has become impossible to ignore: there is no single House of Romanov. There are many.\n\nMore than 10 years ago, Grand Duke Kirill Vladimirovich declared himself Emperor of All Russia, invoking the ancient laws of succession and the seniority of his line. To his followers, the so-called Legitimists, the matter is already settled: the Empire did not die, it merely awaits its rightful sovereign. His son, Vladimir Kirillovich, has been raised in the certainty of being a Tsesarevich. But others recall that Kirill was one of the first who supported the 1917 Manifesto, supporting the February Revolution - a move that no true Drozdovite would forget.\n\nThus those who oppose Grand Duke's treachery look upon Grand Duke Dmitry Pavlovich, from the second most senior branch. While Dmitry Pavlovich served a longtime Senator, he is also a figure entangled in the fragile machinery of the Februarist republic, and what is more - a participant in the dark and fateful murder of Rasputin. Yet this, too, is his burden.\n\nAnd beyond both stands a quieter, older idea - one not bound to any single man. The Soborniks, drawing upon the memory of the ancient assemblies, reject both the self-proclamation and the politician's claim. They invoke the precedent of 1613, when the land, broken and leaderless, chose its Tsar not by strict inheritance, but by divine calling expressed through the people. Rejecting both senior lines, they suggest younger heirs of the Romanovs - Vsevolod Ioannovich, Andrey Aleksandrovich or Roman Petrovich - men distant from intrigue, unmarked by ambition, and therefore, perhaps, worthy."
rusd.3376.a: "One way or another, the Zemsky Sobor shall decide."

rusd.3377.t: "The 1917 Manifesto Provokes a Backroom Scandal"
rusd.3377.d: "Before the Zemsky Sobor may decide who shall wear the Crown, it must first decide who may be considered worthy of it. No issue has proven more divisive, nor more dangerous, than that of the so-called Legitimists. The claim of Grand Duke Kirill Vladimirovich rests upon the rigid logic of dynastic law. By seniority, by lineage, by the ancient statutes of succession, his right, so his supporters insist, is beyond dispute. And though his self-proclamation cast a long and troubling shadow, they argue it was born as a desperate act to preserve continuity when all else had collapsed.\n\nYet among the officers, the clergy, and even within the Regent’s own circle, doubts linger. They remember the February days of 1917, his oath to the Provisional Government, the red cockade worn upon a Romanov breast. They remember, too, that the title of Emperor was assumed without the consent of the nation, and without the blessing of any Sobor.\n\nIf such a claim is accepted, some warn, then the Sobor becomes a mere formality. And yet, to reject it outright is to strike at the very principle of dynastic legitimacy itself. For if the laws of succession may be set aside, then what remains of monarchy but opinion and force?\n\nThus the debate shifts, subtly but decisively, toward the figure of the son, Vladimir Kirillovich. Unlike his father, he has made no proclamations and issued no decrees. He stands as heir not by action, but by inheritance. To some, this makes him the perfect compromise: the continuation of the legitimate line, unburdened by the controversies of exile."
rusd.3377.a: "By his actions, Kirill undermined the role of his line."
rusd.3377.b: "The sins of the father shall not condemn the son."

rusd.3378.t: "The Candidate Dmitry"
rusd.3378.d: "Grand Duke Dmitry Pavlovich does not speak of immutable laws or sacred inheritance. His claim, if it may be called such, rests on something far less certain and far more immediate. He has served the state not in memory, but in fact. A Senator of the republic, a participant in its fragile governance, and, for a fleeting and turbulent moment, even its acting head, Dmitry Pavlovich's name carry weight among the progressive monarchist circles and the remnants of the old administrative elite. They see in him not only a Romanov, but a man who could bridge the gulf between Empire and Republic, authority and governance. Yet it is precisely this that troubles his detractors.\n\nFor Dmitry Pavlovich is not untouched. His past is marked not only by service, but by shadow of most serios accusations. The murder of Rasputin follows him still. While no proof exists, it is certain that Dmitry is a political candidate, not a symbol above the fray.\n\nWithin the Drozdovite camp, opinions harden. The officers of the old school distrust him. The pragmatists rally quietly. The Soborniks reject him outright. Even among the monarchists, there is hesitation - for Dmitry Pavlovich does not represent the restoration of the past"
rusd.3378.a: "A Tsar must stand above politics, not emerge from it."
rusd.3378.b: "He is experienced and would be a worthy Tsar."

rusd.3379.t: "The Quiet Candidate"
rusd.3379.d: "Roman Petrovich is not the senior heir. He has made no proclamations, gathered no court, issued no manifestos. He has not sought the Crown, and it is precisely this that now draws men to him. Among the Soborniks, his candidacy has taken on a quiet certainty, as he is a man unentangled from the sins of both Empire and Republic, neither compromised by the collapse of 1917 nor shaped by the intrigues that followed. His lineage is unquestioned, yet not dominant. Roman Petrovich was the godson of the last emperor and for many, this spiritual connection had a sacred meaning. More surprising, perhaps, is the sympathy this view finds among certain Drozdovites and officers. He served in the Caucasian Native Mounted Division and participated in combat operations, which earned the respect of officers. Furthermore, in Roman Petrovich, they see the possibility of a sovereign who would not overshadow the state, nor seek to command it through personality or intrigue.\n\nThere are, of course, objections. Some dismiss him as too passive and too unknown to command the loyalty of a nation so long without a crown."
rusd.3379.a: "A fitting Tsar for our reborn Empire."
rusd.3379.b: "We must stay neutral in this affair."

rusd.3380.t: "Meeting With Mikhail Georgiyevsky"
rusd.3380.d: "The National Union of the New Generation, initially a youth movement and later a political party, was closely associated with Savinkov’s NRPR throughout much of its political history. However, the \"solidarists\" themselves are not as radical in republicanism as their patron, the notorious terrorist.\n\nWith the rise to power of General Kornilov, many of the solidarists had already begun to distance themselves ideologically and politically from Savinkov. Following the Field-Marshal's death, some even openly opposed the Republic as idea. The Solidarist movement is particularly popular among right-leaning youth, who find it difficult to align themselves with the older generation of veterans of the White movement, like us. In this regard, Turkul suggests that young people should be on our, right and bright side of history.\n\nToday, he has initiated a meeting with Mikhail Georgiyevsky, one of the leading figures within the Solidarist movement, who is a scholar of church history and expert in ancient languages. During the Civil War, he served in the government of Kornilov's VSYuR, later dedicating much of his work to the cause of Solidarist ideology. Currently, as part of his academic pursuits, he imparts knowledge through a course on the Apostle Paul at the university.\n\nThe Solidarists, while exhibiting a degree of democratic sentiment that surpasses our own, make explicit calls for the convening of popular representation, a demand that we are unable to meet. Nonetheless, by offering concessions on the issue of popular representation, including the reinstatement of local seims, we may gain the support of solidarity theorists and draw younger individuals to our cause."
rusd.3380.a: "They can breath youth into our movement."
rusd.3380.b: "They are far too compromised by their previous alliances."

rusd.3381.t: "Kutepov’s Combat Organization"
rusd.3381.d: "As the National Restoration solidifies its hold over the fractured remnants of the former Russian state, Aleksandr Kutepov, one of the most important our allies, emerges not just as a military leader but as a vigilant guardian of our ideals. As he argues that the survival of the state depends on a shadowed network capable of striking decisively against enemies before they can act.\n\nNow, with the funds allocated by Turkul, a secretive cadre of trusted officers, veterans of the Civil War, and loyalists drawn from sympathetic paramilitary units is formed. This Combat Organisation is trained rigorously in intelligence gathering, sabotage, and targeted elimination of threats, both ideological and practical, against the state. With official sanction, the Combat Organisation begins its work, rooting out subversive elements, disrupting anti-Drozdovite conspiracies, and ensuring that Russia's enemies remain crushed.\n\nKutepov personally oversees the organisation’s structure, recruitment, and training. Each cell operates semi-independently, allowing rapid and decisive action without drawing unwanted attention."
rusd.3381.a: "We shall root out the enemies of the state, swiftly and decisively."

rusd.3382.t: "The DVSV Refused Cooperation!"
rusd.3382.d: "Despite the overtures of the RONS, the Far-Eastern Military Union has declined to integrate its forces. The decision comes swiftly after the inclusion of the Black Vanguard under Vonsyatsky, a move the Crusaders view with suspicion and cautious disdain. The veterans, guardians of the Siberian and Far-Eastern campaigns, refuse to subordinate themselves to what they see as an alliance diluted by regional adventurism."
rusd.3382.a: "...we will continue to watch and guide them."

rusd.3383.t: "The General Steps Aside"
rusd.3383.d: "Anton Denikin, once the steadfast liberator of Moscow and a bulwark of the White cause, has chosen to lay down his uniform and retire from public life. After decades of campaigns, councils, and the ceaseless tumult of Russia's wars, he seeks only the quiet of his dacha and the company of memories. There is no triumphal departure, no grand parade to honor his deeds. He will dedicate himself to memoirs, to the careful recording of a past that few now understand."
rusd.3383.a: "At last, peace for a weary soldier"

rusd.3384.t: "Loyalties of the Old Guard"
rusd.3384.d: "Within the Stavka and across key regional commands, the figures of Wrangel, Markov, and a handful of senior generals stand as both a challenge and an opportunity. These men are open monarchists, their devotion to the crown and the principles of order unquestioned. Yet their methods and temperaments are far less radical than of ours. Their experience, discipline, and connections,especially Wrangel's links to the broader monarchist political circles, could serve as a stabilizing force in the army, ensuring cohesion and preventing dissent among moderate officers. The alternative is to purge them, as they are still not fully loyal, in order to remove any trace of independent political influence and enforce unchallenged obedience. Though the generals are unlikely to rebel outright, allowing them to persist risks the possibility of divided loyalties, and eventual political complications, particularly if external monarchist factions seek to exploit their moderation."
rusd.3384.a: "Bring experience into the fold."
rusd.3384.b: "We must consider removing them."

rusd.3385.t: "North-Western Veterans Join the Cause"
rusd.3385.d: "The alliance with Markov’s VMS brings with it a curious contingent: the monarchist officers of Bermondt-Avalov. These men are veterans of the Northern Corps, the infamous formations that once fought in the Baltic and Northern theaters of the Civil War under German auspices. Though their regiments carry the stigma of foreign patronage, their experience, discipline, and battlefield rigor are undeniable. Their presence is a reminder of the tangled loyalties of the White movement, yet their martial skill and knowledge of operations in the Northwest could prove invaluable in stabilizing contested regions."
rusd.3385.a: "Their experience is too valuable to waste."

rusd.3386.t: "Purge of the North-Western Veterans"
rusd.3386.d: "The monarchist officers of Bermondt-Avalov are now suspected of divided loyalties, as their heritage in the Northern Corps, funding from the German Empire, and independence of action make them politically and militarily unreliable in the eyes of our government.\n\nThe veterans were immediately purged from command, their regiments disbanded or reassigned, and officers brought before tribunals to root out any potential dissent. It is a harsh but necessary measure, since in the new Russia, absolute allegiance is demanded, and history does not excuse disloyalty."
rusd.3386.a: "Dismiss them. Loyalty cannot be compromised."

rusd.3387.t: "Slayer of Commissars"
rusd.3387.d: "Vladimir Manshteyn is spoken of in tones reserved for legend - the officer who never retreated, the veteran who left his arm on the battlefield and returned with an unbreakable will. His division marches with a reputation that precedes it. To some, he is the \"Russian Nelson\", a hero forged in sacrifice. To others, he is the Slayer of Commissars, the one-handed executioner of the Civil War, whose name alone is enough to still dissent. Manshteyn, however, is not a politician, but a warrior - he does not concern himself with committees, decrees, or the delicate balances of governance. For him, the war never ended. Bolshevism, in his eyes,  is a disease, a blasphemy against Russia itself. And like any disease, it must be cut out, burned out, annihilated without hesitation or mercy.\n\nWithin the army, his influence grows, especially since the glorious days of the Drozdovite Coup. Should such a man remain confined to the battlefield alone?\n\nThere are proposals from Anton Turkul's assembly to expand Manshteyn’s role beyond conventional command and place him at the head of special formations. Aleksandr Kutepov instead suggests integrating his authority into the internal security apparatus, unleashing his methods against the hidden enemies."
rusd.3387.a: "Let him hunt the enemies of Russia."
rusd.3387.b: "Give him command of the special formations."

rusd.3388.t: "The Question of the Church"
rusd.3388.d: "Since the restoration of order, the Patriarchate, re-established in the fateful revolutionary years, continues to function under Patriarch Sergius. For many, its existence symbolizes a return to the ancient roots of Russian Orthodoxy, a rejection of the bureaucratic machinery imposed upon the Church during the Imperial era. Among officers and faithful alike, there are those who see in the Patriarchate a purified Church, reborn from the chaos of revolution. However, the Patriarchate, for all its spiritual legitimacy, remains independent, its authority not fully aligned with the state. In a time of consolidation, such independence is seen by some as uncertainty. Thus emerges the proposal to abolish the Patriarchate and restore the Most Holy Governing Synod, bouding Church directly to the state. At its center would stand Isaakiy (Vinogradov) - a priest of the White Cause, veteran of the Yassy-Don March, and spiritual figure of the RNSUV, who would be elevated to the rank of Metropolitan of Petrograd. Alongside him, the state would appoint an Over-Procurator, ensuring that the Church moves in harmony with the needs of the Russian State.\n\nSuch a structure would subordinate the Church to our mission, of a Russia where throne and altar are inseparable."
rusd.3388.a: "Restore the Most Holy Synod."
rusd.3388.b: "The Patriarchate shall stand."

rusd.3389.t: "The Reigning Icon"
rusd.3389.d: "In these days of restoration and reckoning, when the fate of Russia is once again bound to questions of authority and divine will, voices have begun to recall an omen never forgotten. In the final days of the old Empire, a peasant woman Yevdokia Andrianova claimed to have received visions. In her dreams, the Mother of God spoke of a dark icon hidden and forgotten, calling for it to be revealed so that the faithful might pray before it. Guided by these visions, she came to the Church of the Ascension in the village of Kolomenskoye near Moscow, where, in the presence of clergy, a large and neglected icon was discovered in the basement. When it was brought into the light, its image revealed itself: the Blessed Virgin seated as a sovereign ruler, clad in scarlet robes, crowned with the Imperial diadem, holding the sceptre and the orb. She appeared not as a servant of Heaven alone, but as its regent upon the Russian land. On that very same day, March 2, 1917, the Emperor Nikolay II abdicated the throne.\n\nTo many, the meaning was undeniable: the crown had been taken by the Mother of God herself and Russia had not been abandoned. The icon came to be known as the Derzhavnaya (the Reigning Icon) and was revered as miraculous. Replicas spread across the land as workers, peasants, and nobles alike came to pray before it. Even within the walls of the Martha and Mary Convent, the Grand Duchess Elizaveta Feodorovna herself knelt before its image.\n\nNow this story returns with renewed force, as many see in the Reigning Icon a sign that the authority of Russia was never extinguished and the years of chaos were not abandonment and the unfolding restoration is providential."
rusd.3389.a: "The Crown was never lost."

rusd.3390.t: "The Countess's Gambit"
rusd.3390.d: "There are rare moments, when Russia turns its gaze not to power, but to brilliance. In the distant city of Irkutsk, far from the political heartlands yet no less alive with ambition, the national chess championship has concluded in a fashion few could have predicted. Among seasoned masters, like Romanovsky, Riumin and Goglidze stood an unlikely figure of Countess Nina Podgorichani-Petrovich. To the public, she has long been something of a phenomenon: a poet, a translator of foreign tales, a presence in salons and gatherings where wit and intellect are as prized as lineage her name carries with it. This time not the quill but the board secured her place.\n\nRound after round, in contests that stretched for hours, the Countess met her opponents not with precision and answered with patience. One by one, the masters fell and there was little doubt the Countess had prevailed. Never before has a woman claimed the highest title in the national championship! Her triumph is noted with a certain respect, as chess, after all, is the art of command in miniature. Even in times of iron resolve, there remains room for brilliance, elegance, and the quiet triumph of the mind."
rusd.3390.a: "In chess, it is not gender, but brains and nerves that determine the victor."

rusd.3391.t: "The Passion-Bearers"
rusd.3391.d: "The memory of the Romanovs, of their final days, their captivity, and their deaths, has never fully faded. Among monarchists, clergy, and even common believers, there spreads the conviction that their suffering was redemptive, that in their deaths, they bore witness not simply to the fall of a dynasty, but to the crucifixion of the Russian state itself. This belief has found expression in a doctrine of Tsarebozhiye - the idea of the Tsar-Redeemer. According to its adherents, the Tsar is not merely God's anointed ruler, but a sacrificial figure, whose suffering and death carry a spiritual meaning for the entire nation. In this view, Nikolay II and his family accepted their fate as a form of divine trial, their blood sanctifying Russia in its darkest hour. While the Church has long honored suffering and martyrdom of the last Romanovs, the elevation of the Tsar to such a role blurs the line between reverence and something far more absolute.\n\nNow the government is confronted by the Church with the question of canonization - to give the Church permission to recognize the Romanovs as saints, passion-bearers. However, this would also give strength both to the growing radical current of Tsarebozhiye and the growing number of leftists and simple atheists across the country."
rusd.3391.a: "Canonize them as Passion-Bearers - Russia must remember."
rusd.3391.b: "Honor them, but do not sanctify them."

rusd.3392.t: "Drozdovites in the Fire"
rusd.3392.d: "General Anton Turkul has presented to the nation a work that seeks to define not merely the past, but the spirit of the present. First appearing as a series of newspaper essays and now published in full with the literary assistance of journalist and fellow veteran Ivan Lukash, \"Drozdovites in the Fire\" is no simple recollection. The original campaign notes of Turkul, lost to the chaos of war, have been painstakingly reconstructed through memory, correspondence, and the testimonies of those who marched alongside him. From the march out of Yassy, across the steppe, to the decisive battles that culminated in the capture of Moscow, the book follows the path of the Drozdovite formations as both military force and moral order. Officers and soldiers alike are depicted as figures of conviction - tested in fire, forged in discipline, and bound by an unyielding understanding of Russia’s destiny.\n\nTurkul himself rejects the label of historian. His work, as he states, is \"the combat truth\" a depiction not only of what the White soldiers were, but of what they must be, and will inevitably become. Across the country, the book is received with interest, offering a vision of unity, sacrifice, and uncompromising purpose."
rusd.3392.d2: "The publication of General Anton Turkul's \"Drozdovites in the Fire\" has stirred renewed discussion across Russia about the legacy of the Civil War and the meaning of its victories. First appearing as a series of newspaper essays and now published in full with the literary assistance of journalist and Volunteer Army veteran Ivan Lukash, the work presents a sweeping reconstruction of the Drozdovite campaign from the march out of Yassy to the final battles for Moscow. Drawing on recollections, correspondence, and the accounts of fellow veterans, Turkul attempts to restore what he calls the \"combat truth\" of the White Army’s struggle.\n\nIn Turkul’s telling, the Drozdovites are not merely one formation among many, but the embodiment of a particular ideal: discipline without compromise, loyalty without hesitation, and a conception of Russia that leaves little room for ambiguity. Among veterans and certain circles of the officer corps, the book is received with admiration, even nostalgia. Others view it with caution, noting its uncompromising tone and the way it elevates one current of the White movement above all others."
rusd.3392.a: "The Drozdovites walked with a firm step!"
rusd.3392.b: "The past is never truly settled."

rusd.3393.t: "Russian Falcons"
rusd.3393.d: "Vyacheslav Matveyevich Tkachov belonged to that rare generation of Russian officers whose careers crossed the entire transformation of modern war. A Cossack artillery officer by training, he entered military aviation in 1911, when flight was still an experiment, rather than a true arm of war. By the time the Weltkrieg came, Tkachov had already become one of the men who understood that the future of combat would not remain forever on the ground. He served in the air with distinction, and when the old army began to collapse under the pressure of revolution, he carried that experience into the White cause, rising to the rank of Major General.\n\nIn the Civil War, aviation remained an auxiliary force rather than a decisive one, but even there it proved its worth: reconnaissance, liaison, artillery correction, and the occasional shock of aerial combat gave the Whites another instrument in a war otherwise decided by railways, infantry, and morale. Tkachov was among those who argued that this was not enough. Russia would not merely need pilots; it would need a doctrine, schools, maintenance, cadres, and a state willing to treat air power as more than ornament.\n\nThat work did not bear fruit overnight. For years after the Civil War, the Russian military air arms remained divided between army and navy structures, constrained by unding, and the simple fact that the republic had too many urgent needs and too few resources. Aircraft were purchased from abroad whenever possible; domestic production existed, but only in limited runs. Companies such as Sikorsky, Gamayun, and Duks survived less by prosperity than by persistence, balancing military contracts against the civilian market so that their factories could remain open at all. By 1927, after the persistent efforts of Tkachov and fellow ace Aleksandr Aleksandrovich Kazakov, the Voeyenno-Vozdushny Flot Rossii was at last recognized as a separate branch of the armed forces. Tkachov became the first and still the only General of Aviation in the Russian Army. Aviation schools expanded, clubs multiplied, and men such as Nikolay Moiseenko-Veliky and Aleksandr Akaro laid down the foundations of doctrine."
rusd.3393.a: "Vse vyshe, i vyshe, i vyshe!"

## Land Reform

ruseco.4.t: "Agrarian Reform Looming!"
ruseco.4.d: "The land reform initiated by previous governments has not been fully implemented. Two years have elapsed since the tumultuous events of Black Monday, and now the economy regained its footing and began to show signs of growth. Nonetheless, the issue of land remains unaddressed, causing significant discontent among both landowners and peasants.\n\nIn a matter of time, our government has pledged to address this issue, granting the Ministry of Agriculture one year to devise a solution. Failure to meet this deadline may result in severe consequences for our government."
ruseco.4.a: "The time has come."



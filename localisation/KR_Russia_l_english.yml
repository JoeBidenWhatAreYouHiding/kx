rusfor.499.t: "The Disobedient Steppe" 
rusfor.499.d: "For many years, the entirety of the Kirgiz steppe constituted a part of Russia. The tumultuous aftermath of the Civil War resulted in the establishment of autonomy for locals roaming the steppes within the framework of post-revolutionary Russia. Subsequently, they attained even greater independence, albeit their government could never fully achieve true sovereignty.\n\nNow, as the entire steppe once again falls under our control, we face uprisings, acts of subversion, and sabotage. The Kirgiz people have taken refuge in the steppes, disrupting peaceful life.\n\nThe government is faced with a critical decision: how to address these rebellious territories in order to foster integration and quell chaos and rebelliousness."
rusfor.499.a: "Restore the Steppe Governorate-General."
rusfor.499.b: "Rely on the Cossack to pacify the [GetKazakhEtnonym]s."
rusfor.499.c: "They shall have their autonomy, but under our strict control."
rusfor.499.e: "Kazakhs deserve their own autonomous Soviet republic."

rusfor.500.t: "The Basmachi Resistance"
rusfor.500.d: "Insurgencies and acts of subversion are rampant throughout the territories of Turkestan, a region renowned for its abundance of cotton, gold, and other valuable resources. The influence of the local Kurbashis, commonly known as Basmachis, meaning \"bandits\" in their native Turkic tongue, remains potent. It is up to our government to determine how best to ensure the full reintegration of this region into the fold of our Motherland."
rusfor.500.a: "Put things in order with a firm hand."
rusfor.500.b: "Rely on the Cossacks to pacify the Basmachi."
rusfor.500.c: "The idea of autonomies was good, but the implementation suffered."
rusfor.500.e: "The Soviet republics will solve the problem."

rusfor.501.t: "The Pan-Turkist Threat"
rusfor.501.d: "The process of Turkestan's integration continues, yet several of our advisors have come to the realization that the widespread nature of these uprisings can be attributed to the shared belief among local populations that they constitute a unified Turkic nation. Consequently, the notion emerged that combating Pan-Turkism as an ideology advocating for the separation of Turkic peoples from Russia could potentially resolve the issue. In essence, it is imperative to dismantle Turkestan and eradicate any sense of unity among these ethnic groups, fostering a heightened sense of national identity within them. Of course, only within the framework of Russia can these nations maintain their existence and thrive."
rusfor.501.a: "We will be content with Turkestan autonomy."
rusfor.501.b: "Time to end this nonsense, there is work for ethnographers."
rusfor.501.c: "Divide the region according to the economic principle."

rusfor.502.t: "Spiritual Administration of the Muslims of Turkestan"
rusfor.502.d: "Muslims of Turkestan have always been viewed as more conservative and, in all honesty, luddite and backward compared to more culturally Russified regions like Dagestan, Tatarstan and Bashkiria. Many have identified this obscurantism as one reason why Turkestan has been stubbornly refusing to integrate into modern Russia and to the modern world at large.\n\nAs part of the overhaul of Central Asian security services and bureaucracy, we have also launched religious reforms in cooperation with the Orenburg Muslim Spiritual Assembly. Its Tatar and Bashkir priests are loyal to the government and have drafted plans for reforming the Turkestani religious institutions into a more modern form, closer to those of developed Muslim countries like [TUR.GetName]."
rusfor.502.a: "Yes, it is a good initiative."
rusfor.502.b: "We should strive for secularism instead."
rusfor.502.c: "What, we should undermine Islam as much as possible!"

rusfor.503.t: "Problems in Turkestan"
rusfor.503.d: "Though we have established a new Spiritual Administration of the Muslims of Turkestan, but it is still controlled mainly by the same priests, who had been playing a significant role in Turkestan since the Civil war till the annexation. Of course we will have to change the situation here, but it will take us a lot of time."
rusfor.503.a: "Oh well..."

rusfor.504.t: "Pacification of Turkestan"
rusfor.504.d: "Good news from Turkestan - new Tatar and Bashkir Muslim leadership could finally reorganise the system of the local Islamic institutions and partly defeat the obscurantism of the local notable theologians and preachers. Now Orenburg Muslim Spiritual Assembly proposes a new vision of Islam for the Central Asian citizens, which means, that Central Asia will be loyal enough to us and we will be able to pay less attention to this region of Russia."
rusfor.504.a: "That's great!"

rusfor.508.t: "Deciphering the 1897 Census"
rusfor.508.d: "In the census conducted by the Tsarist government in 1897, a substantial portion of the settled urban population in Turkestan, specifically in the cities such as Samarkand, Tashkent and Skobelev, was designated by the ethnonym \"Sarty\". However, many scholars and orientalists maintain that this is not a genuine ethnic designation, but rather a class label that refers to the urban bourgeoisie and merchant class. There exist more speculative theories that suggest the Sarts may be a people of Aryan descent, distinct from the neighboring Uzbeks and Tajiks. For many years, local intellectuals in Turkestan have been advocating against the use of the term \"Sart\", viewing it as a remnant of Tsarist oppression."
rusfor.508.a: "Discard this Tsarist label!"
rusfor.508.b: "It is most correct to call both peoples Turkestanis."
rusfor.508.c: "The Sarts are a special people of Aryan origin."

rusfor.514.t: "The Iron Veins of Turkestan"
rusfor.514.d: "The railways, which until 1936 were under our auspices and reliable supervision, are of paramount significance in the peaceful amalgamation of Turkestan. The oversight of these railways guaranteed tranquility and order across Turkestan. While many of our advisors advocate the restoration of control over the railways and cargo transportation, there may be a more advantageous course of action."
rusfor.514.a: "The control will be given to the workers of the railway workshops!" #socialist/SR
rusfor.514.b: "Auction them off." #liberal/conservative
rusfor.514.c: "Only state control - they are of great importance." #all other

RUS_integration_of_eastern_europe: "Eastern Europe Affairs"

RUS_integration_of_ukraine_cat: "Integration of Ukraine"

RUS_influence_protofis_vszv: "Lobby Protofis and VSZV"
RUS_invite_ukrainian_generals: "Invite Ukrainian Generals to Serve"
RUS_create_ukrainian_ssr: "Establish the Ukrainian Soviet Autonomy"
RUS_demand_black_sea_fleet: "Demand the Black Sea Fleet"

rusfor.515.t: "Where It All Started From"
rusfor.515.d.intro: "At the military parade of our armed forces in Kiev, commemorating the liberation of the city and its eventual reunification with Russia, a tragic incident occurred, resulting in the loss of civilian lives and several casualties among our officers. Such a development is certainly regrettable.\n\nUnfortunately, for a considerable period of time, the cradle of our civilisation and the motherland of Russian cities, namely Kiev, has been subjected to hostile occupation. Separatist ideologies regarding a Greater and Independent Ukraine have infiltrated not only the capital but also the territories of Little Russia and Novorossiya, sowing discord in what was supposed to be a peaceful environment. While idea of Ukrainian nationhood is rather new and some consider it anti-Russian, it is impossible to ignore.\n\nIn an attempt to establish communication with our leadership, the so-called \"representatives of the Ukrainian people\" have advocated for substantial and extensive autonomy for all regions of the former Ukraine. They believe that such measures will help to appease tensions and prevent further terrorist acts perpetrated by separatist and nationalist groups. The direct Russification of the late Imperial era saw little progress - in fact, it galvanised the opposition.\n\nIn general, we face a difficult task - to achieve the integration of both Malorossiya and Novorossiya, which have been independent for only two decades."
rusfor.515.d: "$rusfor.515.d.intro$ To ensure the stability and future of our union, we can do as Emperor Aleksandr I wisely did: pacify the frontier by tolerating some amount of self-rule, and focus on building long-term institutional bonds between Russia and Ukraine. Some of our advisors suggest that a unified autonomous region may be too generous for the separatists and may legitimize Novorossiya's illegally annexed territories as allegedly Ukrainian lands. They propose creating two independent autonomous regions - Ukraine or Malorossiya, and Novorossiya - where Russian speakers predominate. Alternatively, we could reject the idea of an autonomous region for Ukrainians at all and resist the nationalists' tactics in our pursuit of restoring Triune Russia."
rusfor.515.d.unitary: "$rusfor.515.d.intro$ But we must not repeat the folly of Emperor Aleksandr I and his autonomies - Ukraine must be on a short leash, and concessions must be limited to cultural ones, not political ones."
rusfor.515.a: "Ukraine is an indivisible part of Russia."
rusfor.515.b: "Proclaim Ukrainian autonomy in full!"
rusfor.515.c: "Divide into Malorossiya and Novorossiya autonomies."
rusfor.515.e: "Create Ukrainian autonomy within Little Russia only."

rusfor.516.t: "Russia Demands the Black Sea Fleet!"
rusfor.516.d: "The pressure from Russia is escalating. Now, their government has requested us, on behalf of the Ministry of Naval Forces, to ensure the proper protection of the Black Sea by transferring all Ukrainian naval warships and submarines to the command of the Russian Navy.\n\nIn their demand, the Russians, of course, appeal to justice - they claim that our fleet is nothing but the Imperial Black Sea fleet, which was transferred to us by the Germans - and therefore, in essence, stolen from them.\n\nGiven the complexity of the current situation, we have three options: we can either comply with their demands; retain all the modernized and constructed ships, which were built with our own and German funds, or offer to sell them their old fleet."
rusfor.516.a: "Maintaining the fleet is only going to cost us money."
rusfor.516.b: "Transfer part of the old fleet to them."
rusfor.516.c: "Sell the fleet."
rusfor.516.e: "Reject their demands."

rusfor.517.t: "The Black Sea Fleet Restored!"
rusfor.517.d: "Today, festive fireworks were fired in all naval ports of the Black Sea in honor of the restoration of Russia's power on the Black Sea thanks to the transfer of the entire Ukrainian fleet into our hands!"
rusfor.517.a: "Hooray!"

rusfor.518.t: "Ukraine Transfers Part of the Fleet"
rusfor.518.d: "The Ukrainian authorities considered our demands to be fair, but understood them in their own way. They donated to us part of the old unmodernized fleet, which was part of the Black Sea Fleet during the Empire, but refused to transfer all the other vessels, which, according to them, were built with their own funds or German financing. Thus, despite the undoubtedly lucrative deal, the Ukrainians still retained control of the Black Sea."
rusfor.518.a: "At least, something."

rusfor.519.t: "Ukraine Proposed to Sell the Fleet"
rusfor.519.d: "The Ukrainians agreed to transfer control of the fleet - but, of course, not for free. They noted that the maintenance of the fleet cost the Ukrainian budget a lot of money and the transfer of the fleet for free would mean a disaster. Therefore, they demand payment for the ships, as well as payment of salaries to the entire naval command and sailors for several months in advance."
rusfor.519.a: "We don't play such games."
rusfor.519.b: "Agree to pay them."

rusfor.520.t: "Russia Pays for the Fleet"
rusfor.520.d: "The Russians tried to make fun of us when they were told about the money, but only made fools of themselves, as they had to agree to pay us a decent amount for the years of maintaining the fleet, as well as multiple salaries for all our sailors and the command who were left without service."
rusfor.520.a: "A fair price, indeed."

rusfor.521.t: "Russia Refused to Pay"
rusfor.521.d: "With the eyes of naïve fools who recall nothing, the Russians have refused to purchase our fleet, in the vain hope that it will be handed to them gratis."
rusfor.521.a: "No money, no fleet!"

rusfor.522.t: "Ukraine Refused!"
rusfor.522.d: "The Ukrainians, in their characteristic manner, vociferously and contentiously rejected our well-founded demands. They harbored the belief that the directive to dismantle the Black Sea Fleet had been issued directly by Lenin himself, and it was only due to the concerted efforts of both the Germans and the Ukrainians that a portion of the fleet was saved. Furthermore, it was through German financial support and Ukrainian contributions, among other sources, that the Black Sea Fleet underwent restoration, modernization, and even expansion."
rusfor.522.a: "We'll take what's ours sooner or later."

RUS_UKR_integration_event_tt: "We must tread cautiously...\n§R[RUS.GetFlag]Russia may try to take advantage of the situation to strengthen its influence over us§!"
RUS_UKR_integration_event_tt2: "§RThe fate of Ukraine depends on our actions§!"

rusfor.523.t: "The Quiet Accounts"
rusfor.523.d: "A confidential report from the Ministry of Finance has uncovered irregular transfers involving the Protofis and the All-Ukrainian Union of Landowners. The funds appear to originate from Russian investment houses, primarily from the 'Russian Export Trade Society' closely tied to the [RUS.Capital.GetName] ministries of industry and trade. Although such cooperation is officially encouraged under the recent agreements, the scale and informality of the transactions have alarmed several senior officials.\n\nRumors circulate that the Russian embassy itself acted as intermediary. For the Hetmanate, which still balances between internal factions and foreign pressures, even a whisper of impropriety could be disastrous - both at home and abroad."
rusfor.523.a: "Handle it quietly - we owe them too much." #-> RUS 524
rusfor.523.b: "Blame it on 'foreign provocateurs'." #-> RUS 524

rusfor.524.t: "Strings of Gold"
rusfor.524.d: "The Foreign Ministry has received intelligence from Kiev: several Russian firms - nominally private - have been implicated in questionable transfers to Ukrainian industrial and agrarian blocs. The Protofis and VSZV have long served as conduits of influence within the Hetman's state, ensuring favorable tariffs and concessions.\n\nNow, however, the scale of their dealings threatens to expose the entire system. Certain circles in the Council of Ministers argue that \"deniability\" must be maintained; others see an opportunity to tighten control over the wavering Hetman."
rusfor.524.a: "Disavow the firms. We are not common traders." #-> RUS 530
rusfor.524.b: "Use this incident as leverage in Kiev." #-> UKR 525
rusfor.524.c: "Quietly take our cut - and let them know who pays." #-> RUS 525

rusfor.525.t: "The Media Frenzy"
rusfor.525.d: "The revelations surrounding the Protofis and VSZV have reached the press, despite strict censorship. Nationalist editors speak openly of a \"Russophile comprador class\", while Ukrainophile professors and officers murmur of betrayal. The Hetman remains outwardly calm, though several advisers have urged him to address the crisis publicly.\n\nYet every gesture carries risk: an act of defiance could unravel the fragile alliance with Russia; submission could make him a figurehead in his own palace. The old Hetman's composure conceals a desperate calculation."
rusfor.525.a: "We shall trust [RUS.Capital.GetName] and silence the agitators." #-> RUS 526
rusfor.525.b: "Reshuffle the Cabinet and sacrifice a few scapegoats." #-> RUS 529, UKR ukrpol.119

rusfor.526.t: "An Unreliable Ally"
rusfor.526.d: "Reports from Kiev suggest unrest among the Hetman's supporters and open dissent in several newspapers. The term \"Marionette Theater\" has appeared more than once - always denied, yet repeated with persistence.\n\nWithin [RUS.Capital.GetName], opinions diverge: the Foreign Ministry calls for restraint; the War Ministry and the General Staff demands guarantees; the economic directorates warn that the entire southern trade system could collapse if the Hetman falters. The question, as always, is whether to risk tightening the leash - or to wait until he chokes himself."
rusfor.526.a: "Dispatch economic observers to Kyiv." #-> UKR 527
rusfor.526.b: "Threaten to suspend cooperation until loyalty is proven." #-> RUS 529 UKR ukrpol.119

rusfor.527.t: "Russian Economic Observers"
rusfor.527.d: "Russian \"economic observers\" have arrived in Kyiv as the Protofis hosts them in its headquarters and the VSZV drafts new joint memoranda on tariffs and concessions. While the Hetman still signs decrees and presides over ceremonies, the machinery of policy has begun to move without him.\n\nNationalists slowly start to cry of \"occupation through contracts\", though the people, weary of instability, prefer to ignore such talk. The fate of the Hetmanate may soon depend on whether its Hetman still believes he commands, or merely governs by permission."
rusfor.527.a: "We shall cooperate - it is the price of peace." #-> RUS 531
rusfor.527.b: "Purge the Russophile ministers!" #-> RUS 529

rusfor.529.t: "The Southern Flames"
rusfor.529.d: "Reports from Kiev are grim. Russian advisers expelled, rail lines disrupted, arrests of local collaborators. The Hetmanate - or what remains of it - appears seized by nationalist officers calling for \"Ukrainian independence\" under leadership of [UKR.GetLeader].\n\nIn [RUS.Capital.GetName], the Cabinet divides: the generals urge immediate intervention; the Foreign Ministry warns of overreach, as another front seems ready to open."
rusfor.529.a: "Send the army. We cannot appear weak."
rusfor.529.b: "Cut ties and prepare to destabilize them later."

rusfor.530.t: "The Hesitant Hand"
rusfor.530.d: "Months have passed since the scandal in Kiev. The Hetman's government, bruised but unbroken, remains in line - at least outwardly. The economic channels function, trade continues, and no new disturbances have been reported. In truth, both sides now act by habit rather than trust. The Hetmanate retains its formality, while Moscow enjoys quiet access to its markets and ports. Some in the General Staff call this a wasted opportunity."
rusfor.530.a: "Without a doubt, it was worth taking the chance while it was there."

rusfor.531.t: "A Loyal Neighbor, A Silent Colony"
rusfor.531.d: "The Ukrainian administration now functions as an appendage of Russian policy. The Hetman has signed the new \"Protocol of Economic Cooperation\", which grants Russian ministries permanent representation within his government.\n\nThe public declaration calls it \"a historic partnership\". In [RUS.Capital.GetName], few bother to pretend - the South has been pacified without a shot fired. The diplomats call it a triumph."
rusfor.531.a: "Formalize the protectorate."

rusfor.532.t: "Recovered Northwestern Gubernias"
rusfor.532.d: "The land of White Russians, Byelorussiya, is the heartland of Slavic tribes, populated by them from time immemorial. The Russian army has freed our kin there from under the Prussian boot, though not everyone seems grateful - it is Byelorussiya where Germanic propaganda went the furthest, even to Latinise their language to sever them from their roots.\n\nNow that order has been restored, we must make a long-term decision on how the Belarusian lands will be governed. Collaborator groups, like Stanislav Bulak-Balakhovich's Belarusian Military Commission - which has emerged as the chief pro-Russian organisation in the country - are pushing for the establishment of a Belarusian Autonomy, though ultimately we can choose to simply assimilate the Belarusian gubernias into Russia like any other Russian gubernia"
rusfor.532.a: "Create a Belarusian Autonomy under General-Governor Bulak-Balakhovich."
rusfor.532.b: "Create a Belarusian Autonomy under a democratically elected government."
rusfor.532.c: "Integrate the Belarusian gubernias directly."

rusfor.533.t: "Position of the Ukrainian and Belarusian Language"
rusfor.533.d: "The Ukrainian and Belarusian languages have seen a considerable increase in usage ever since they became independent states. At this point, Russian has become the secondary language in these autonomies. Naturally, this will be reversed at least somewhat, with Russian once again becoming more relevant in the day-to-day lives of Ukrainians and Belarusians. However, in terms of actual governance, this question has become rather important.\n\nPerhaps we should consider making these languages co-official in their respective homelands - or, to encourage the day-to-day use of Russian, make Russian the sole official language."
rusfor.533.a: "Allow their usage in local government."
rusfor.533.b: "Russian will always be the primary language."

rusfor.534.t: "The Delatinisation"
rusfor.534.d: "Besides the Baltics, it can be argued that White Russia suffered the greatest from German occupation culturally. The Germans went to great lengths to try to separate it from the Triune Russian nation - and in perhaps one of the worst crimes of this separation, the Minsk government even went as far as to Latinise the Belarusian language. Mass literacy programmes were also carried out with the limited funding that was available, leading to more widespread use of the language itself, and thus its Latin alphabet.\n\nThere can be no question of what is necessary. The local Belarusian government's Executive Committee has decreed a return to Cyrillic as the official script of the Belarusian language, which it was for centuries until the German occupation. While in the short term the reintroduction of Cyrillic may come with its difficulties, it is a worthy price to pay. We cannot afford a separate and anti-Russian Belarusian identity to form again - they are to be forever part of our union."
rusfor.534.a: "The mistakes of the past shall be corrected."

rusfor.535.t: "Elections in Belarusian Autonomy"
rusfor.535.d: "Most of the old parties of Belarus have collapsed or are in open resistance, and one can see that much of Belarus is apathetic to its new overlords. As the elections of the autonomy were announced, political life was suddenly reawakened, starting with the formation of new political parties.\n\nOut of the ashes of the Peasant-Labour Gramada, which dominated much of the Belarusian political scene, has risen Mikola Abramchik's Belarusian Party of Socialist-Federalists (BPS-F). The party stands for the continuation of people's democracy in Belarus, pacifism and social programmes, and the defence of people's freedom together with Russian left-wing parties. On the right, Bulak-Balakhovich's bid united the right-wings under the Belarusian Peasant Union (BSS) as the main conservative voice calling Belarusians to accept the new realities; instead of pointlessly resisting, focus on rebuilding the country."
rusfor.535.a: "The Socialists-Federalists form the government."
rusfor.535.b: "The Peasant Union forms the government."

rusfor.536.t: "Belarusian Resistance"
rusfor.536.d: "Marshes and woods prove to be perfect for guerrilla warfare, as we already saw during the wartime occupation. Resistance in Belarus is largely directed by a former SR Vatslav Lastovsky and his Savinkov-inspired ultranationalist organisation 'Zelyony Dub' (Green Oak), which has grown beyond its pre-war political fringe. Our intelligence has also identified Internationale-backed partisans led by Konstantin Yezovitov, who may become a greater threat in the long term due to their foreign support. These groups have been trying to coordinate efforts with the Ukrainian resistance, as both operate especially strongly from the Pinsk marshes."
rusfor.536.a: "We will handle it."

rusfor.537.t: "Bat'ka of Belarus"
rusfor.537.d: "In a short time, Belarusian General-Governor Stanislav Bulak-Balakhovich has become an infamous figure. He has always been a man of great energy and will, making his own way outside established parties or even nationalities. After the liberation of Byelorussiya by Russian forces, he has made a full turn and given his organisation - the Belarusian Military Commission - for the use of the Russian military administration. This union is largely composed of Belarusian veterans who fought against Germany and the Bolsheviks, and many of them have Polish or Russian descent.\n\nNow as the general-governor, he and his government, led by Timofey Khvedchenya, are running Byelorussiya as an increasingly personalistic regime. Propaganda portrays Bulak-Balakhovich - the 'Bat'ka of Belarus' - as the only safeguard of Belarusian self-rule, the only man who has the ability and gravitas to negotiate with [RUS.GetRussianPM]. Politically, the BVK runs an opportunistic programme of social conservatism, social reforms, and anti-socialism."
rusfor.537.d.nrpr: "In a short time, Belarusian General-Governor Stanislav Bulak-Balakhovich has become an infamous figure. He has always been a man of great energy and will, making his own way outside established parties or even nationalities, and has known Boris Savinkov personally for many years. After the liberation of Byelorussiya by Russian forces, he has made a full turn and given his organisation - the Belarusian Military Commission - for the use of the Russian military administration. This union is largely composed of Belarusian veterans who fought against Germany and the Bolsheviks, and many of them have Polish or Russian descent.\n\nHe quickly became the Vozhd's trusted man in Belarusian affairs. As the general-governor, he and his government, led by Timofey Khvedchenya, are running Byelorussiya as an increasingly personalistic regime. Propaganda portrays Bułak-Bałachowicz - the 'Ataman of Belarus' - as the only safeguard of Belarusian self-rule, a man who is second only to his good friend Savinkov himself, liberator of all Slavic peoples. Politically, the BVK has transformed into the Belarusian branch of the NRPR, running campaigns promoting peasant populism, pan-Slavist nationalism, and anti-communism."
rusfor.537.a: "He is doing an admirable job."

### Baltic Events

rusfor.538.t: "The Future of the Baltic Gubernias"
rusfor.538.d: "Out of all places, in the Baltic countries it can be said that we Russians are - if not welcomed - at least preferred over the Baltic German rule. We have built up some goodwill among the Estonians and the Latvians, thanks to our support for their guerrilla war against the Germans. Both of their governments in exile have also been operating out of Russia, and the Dvinsk Autonomy was largely formed to appeal to them: Free Latvia in Free Russia.\n\nIn practice, this does mean that while it would seem hypocritical to deny the Balts their freedom (even though that term has some flexibility), they also are not in a position to oppose us. We must choose whether we are allowing them to keep their own nations, integrate them into [RUS.GetNameDef] as autonomies, or merely as commissarial gubernias."
rusfor.538.a: "Grant the Baltics autonomy."
rusfor.538.b: "Keep them as commissarial gubernias."

rusfor.539.t: "The Future of Russia's Baltic Allies"
rusfor.539.d: "Our relationship with our Baltic allies has always been a rocky one. The alliance between our states was largely a pragmatic one, aimed at the Germans, and they have held a great deal of independence up until this point.\n\nWith the German threat eradicated, perhaps it is time that we make clear that this privileged relationship was temporary, and exert more control over our Baltic allies."
rusfor.539.a: "Of course. Send an ultimatum their way."
rusfor.539.b: "This is unnecessary."

rusfor.540.t: "Russian Ultimatum"
rusfor.540.d: "Today the Russian ambassador to our country has relayed an ultimatum, demanding that our government host a number of Russian advisors and allow a permanent military presence in our country. This would essentially make us a Russian client state.\n\nWe frankly have little choice in the matter - should we accept?"
rusfor.540.a: "There is nothing we can do."
rusfor.540.b: "Freedom or death!"

rusfor.541.t: "[FROM.GetNameDefCap] Accepts"
rusfor.541.d: "The [FROM.GetAdjective] government has accepted our demands, making our ultimatum successful."
rusfor.541.a: "Good."

rusfor.542.t: "[FROM.GetNameDefCap] Refuses the Ultimatum!"
rusfor.542.d: "Foolishly, the [FROM.GetAdjective] government has refused our ultimatum. No matter, as we will overrun their country in no time."
rusfor.542.a: "This shouldn't take long."

rusfor.543.t: "The Forest Brothers Rise Again"
rusfor.543.d.latvia: "As it turns out, it is hard to pacify the partisan movement we first armed and trained ourselves. Not everyone in the Baltic provinces was happy with Russian annexation of the region.\n\nIn Latvia, the Russian administration has put itself on the back foot, finding broad support only in Dvinsk and Riga. In the countryside around them, General Yanis Kurelis's Forest Brothers have re-started hostilities. They have denounced [RUS.Capital.GetName] for their 'lies to the Latvian people' and are demanding Latvian self-determination, the withdrawal of Russian administrators, and putting Latvians in charge of Latvia. In response, those Baltic Germans who have remained in the country are largely throwing their loyalties behind the Russians."
rusfor.543.d.estonia: "As it turns out, it is hard to pacify the partisan movement we first armed and trained ourselves. Not everyone in the Baltic provinces was happy with Russian annexation of the region.\n\nIn Estonia, General Paul-August Lilleleht's resistance movement has restarted its struggle against the Russians, focusing around Võru and other parts of forested southeastern Estonia. They have proclaimed they will continue the struggle against the 'illegal occupation' until [RUS.Capital.GetName] recognises Estonian rights and allows them to elect their own government with sovereign power over Estonia."
rusfor.543.d.both: "As it turns out, it is hard to pacify the partisan movement we first armed and trained ourselves. Not everyone in the Baltic provinces was happy with Russian annexation of the region.\n\nIn Latvia, the Russian administration has put itself on the back foot, finding broad support only in Dvinsk and Riga. In the countryside around them, General Yanis Kurelis's Forest Brothers have re-started hostilities. They have denounced [RUS.Capital.GetName] for their 'lies to the Latvian people' and are demanding Latvian self-determination, the withdrawal of Russian administrators, and putting Latvians in charge of Latvia. In response, those Baltic Germans who have remained in the country are largely throwing their loyalties behind the Russians.\n\nIn Estonia, General Paul-August Lilleleht's resistance movement has re-started its struggle against the Russians, focusing around Võru and other parts of forested southeastern Estonia. They have proclaimed they will continue the struggle against the 'illegal occupation' until [RUS.Capital.GetName] recognises Estonian rights and allows them to elect their own government with sovereign power over Estonia."
rusfor.543.a: "Seriously? They're resisting with the weapons we gave them?"

rusfor.544.t: "Resistance Spreads to Lithuania"
rusfor.544.d: "Lithuania is in flames, like the rest of our frontier. Despite our earlier support for the Lithuanian Activist Front, the movement has now split, giving birth to the Combat Union of Lithuania. Led by General Kazis Shkirpa, the new organisation draws support largely from Lithuanian nationalists.\n\nThe Poles and Belarusians of the region have been more supportive - or rather, more apathetic - towards the Russian administration. Still, the forests of Lithuania provide favourable terrain for a resistance movement."
rusfor.544.a: "Don't you see your efforts are futile?"

rusfor.545.t: "Elections in Latvia"
rusfor.545.d: "Although what had been happening in Latvia for the past decades cannot be called free elections or even grassroots self-management, especially during the years of the Baltic Duchy, recent months have been truly exciting for the young Latvian democracy. At first, the field was divided between the LSDSP (local Mensheviks) and Karlis Ulmanis's Latvian Farmers’ Union (LZS), but their failure to align with [RUS.GetRussianPM]'s agenda led the voters towards a more balanced Democratic Center, officially the Democratic Centre and Non-Partisan Public Workers. The DC, led by Margers Skuyeniyeks is genuinely a separatist party, a far-right coalition of local SRs and Mensheviks, that openly proclaimed nationalist slogans during its campaign, to the very interest of Gosokhrana.\n\nThis sudden popularity was not enough to form a moderate majority, however, and the DC could not decide on who to unite with in a coalition, which led to the collapse of the Skuyeniyeks's ambition and the formation of two new parties - the Labour Party (LDP) and the Progressive Union of New Farmers (PJA).\n\nAll this confusion and unusually lively political discussion for Latvia led to the fact that three forces were represented in the elections: the left-wing coalition of the LSDSP and LDP under Peteris Yurashevskis, the right-wing coalition of the LZS and PJA under champion Ulmanis, as well as - suddenly - the Bloc of Orthodox Voters and Russian United Organizations (PVKOS), led by a prominent Russian public figure from Dvinsk, Meletiy Kallistratov and Archbishop Ioann of Riga and Latvia."
rusfor.545.d2: "Despite the absence of any serious democratic initiative on the territory of Latvia in previous decades, the recent election campaign was quite balanced and calm. Two major forces competed for leadership in this race - lawyer Peteris Yurashevskis, leader of the Labor Party (LDP) in a coalition with the Latvian Mensheviks (LSDSP) and the champion of Latvian conservatism Karlis Ulmanis, who leads the agrarian coalition of the Latvian Farmers’ Union (LZS) and the Progressive Union of New Farmers (PJA).\n\nAlthough it is obvious that one of these forces will eventually form a government, the final vote count will take place today, after which the Riga Central Election Committee will announce the results."
rusfor.545.a: "Yurashevskis leads the LDP-LSDSP government."
rusfor.545.b: "Ulmanis's LZS-PJA coalition forms the government."
rusfor.545.c: "Surprisingly, Meletiy Kallistratov and the Old Believers win the day."

rusfor.546.t: "Dictator of Latvia"
rusfor.546.d: "Since the liberation of the first Latvian towns and villages by the Russian army, several native and pro-Russian forces waged their 'own' war against the Germans. The first one is the \"Imanta Regiment\" of general Yanis Kurelis, leading the trained exile from Dvinsk. The latter is the Latvian branch of the Union for the Defense of the Motherland and Freedom, led by the Boris Savinkov's long-time ally Karlis Goppers.\n\nAs the rivalry between two Generals began almost immediately after liberation of Riga, the game was rigged from the start for Kurelis, as Vozhd's brother-in-arms was earmarked to lead the government of the autonomy. Through several political machinations, the Imanta Regiment was disarmed, while Kurelis's second-in-command, Kristaps Upelnieks, was even court-martialed. As Goppers was appointed the General-Governor of Latvia, Kurelis was forced to publicly resign and disband his Association of the Latvian Homeland Guard-Partisans (LTS(p)A), though he was awarded with a state dacha and personal guard. One can only wonder if the guards are protecting Kurelis from someone, or the someone is protected from him."
rusfor.546.d2: "Since the liberation of the first Latvian towns and villages by the Russian army, the \"Imanta Regiment\" of general Yanis Kurelis actively participated in their 'own' war against the Germans. Kurelis and his Association of the Latvian Homeland Guard-Partisans (LTS(p)A) has long supported generally a pro-Russian Latvia, training the exiles in Dvinsk. With the establishment of the Latvian autonomy, it was a natural choice to place a native Latvian to lead it - and so [RUS.GetLeader] appointed Kurelis.\n\nUnder his rule, Latvia has already started to transform into something bigger than a common autonomy. As \"Generalis\" rules with a firm hand with the support of both the Latvian officers and the Russian army. While opposed by the Forest Brothers, who openly call for execution of Kurelis for treachery against Latvian independence, the situation is slowly getting under control, as Karlis Ulmanis and his Farmers’ Union (LZS) not only supported the Generalis, but also chose a path of peaceful coexistence and development of the autonomy, calming down the populace. After all, life in Latvia is much better than it was under the German boot."
rusfor.546.a: "Three cheers for General Gopper!"
rusfor.546.b: "Three cheers for General Kurelis!"

rusfor.547.t: "Confrontation in Revel"
rusfor.547.d: "We have heard unpleasant news from Revel - barricades are being erected in the city, shots are being fired, and workers are striking, and [RUS.GetChiefOfArmy] has already ordered Russian troops to be brought to the Estonian \"capital\". Such lawlessness in our territories is by no means the work of the Forest Brothers, but the result of the arrival in the \"promised land\" of the so-called Estonian \"government-in-exile\" under the leadership of Artur Sirk.\n\nSirk's speech at a rally in the city last week in honor of Estonia's liberation from the German yoke was as defiant as it was inspiring for the populace. In a move to consolidate his powerbase, Sirk has formed the Eesti Vabadussõjalaste Liit (Union of Participants in the Estonian War of Independence) or Vaps party, that in his own words, would take advantage of the citizens' initiative to ensure the transition to National Populism. The Vaps increasingly adopted a militarized style that reflected Savinkov's NRPR. Both the local democratic movements and the Russian civilian-military observers reacted to this, if not with suspicion, then with open hostility.\n\nNon-interference in the current situation in Revel is, of course, impossible. However, the government should take the most appropriate response measures. If the General Staff demands the immediate deployment of troops to the city, the declaration of martial law and the postponement of the planned local government elections for a year, this will only encourage the separatists. Instead, civic politicians are offering to support the local opposition to Sirk, and threaten him with lawsuits if he does not back down."
rusfor.547.a: "Introduce army to restore order!"
rusfor.547.b: "Threaten Sirk and support the opposition."

rusfor.548.t: "Elections in Estonia"
rusfor.548.d: "A year has passed since the uprising in Estonia, and the military has successfully managed at least to prevent the ridiculous coup of Artur Sirk. Since then, the Vapsa movement has been disbanded, and Sirk himself fled the country, narrowly avoiding arrest. Civilian life in the autonomy has improved, albeit under the watchful eye of our military. However, all illegal military formations of Estonians were disbanded, although Estonians themselves joined the Russian army.\n\nNow that the ban on civic activism has been lifted, local elections are being held in Estonia, in which Konstantin Pyats and his newly-formed Union of Settlers and Smallholders (AVK) wins a landslide victory."
rusfor.548.d2: "The Gosokhrana, without the participation of the army, as well as special commissions on the Estonian autonomy created by the Ministry of the Interior, helped effectively resolve the crisis in Revel. The failed dictator Sirk lost his support and was arrested for calling for separatism, and in return, more moderate forces began to gain popularity. The main struggle during the election campaign unfolded between the right-wing Union of Settlers and Smallholders (AVK) under the leadership of Konstantin Pyats and the left-wing coalition of Tööerakond (Estonian Labor Party) and social-democrats (ESDTP), led by Otto Strandman.\n\nThe left coalition is mainly pushing for federalism and more rights for the autonomous gubernia of Estonia, while Pyats's union is autonomist, more focused on economic issues."
rusfor.548.a: "Left coalition emerges victorious."
rusfor.548.b: "Pyats will lead Estonian autonomy to prosperity."

rusfor.549.t: "Landslide Victory of Santara in Lithuania"
rusfor.549.d: "Lithuania during its occupation by the Germans was long dominated by three main parties: social-democrat LSDP, christian LKDP and nationalist LTS. However, as all these parties became increasingly marginalized after liberation, a small Petrograd-based Santara party (Democratic National Freedom League) returned to its original ideas of a Lithuanian autonomy within a greater Russian federation. Santara champions secularism, religious tolerance and liberalism, which allowed it to gain a stable electorate in the autonomy, thanks to the support of the Lithuanian Poles, with whom a coalition was formed."
rusfor.549.a: "A new dawn for Lithuania."

### Caucasus Events

rusfor.550.t: "Future of the South Caucasus"
rusfor.550.d: "Once again Russian rule spans both sides of the Caucasus Mountains, and the great city of Tbilisi has been restored to our grasp. Even in the centuries of the Kavkaz Viceroyalty that Russia governed the region, it was never truly peaceful, and it would be naive to assume these mountains and valleys would easily submit.\n\nRegardless, a new order has arrived with the boots of our soldiers. General Markian Popov has been appointed as the Commander of the newly-formed South Caucasus Military District, tasked with pacification of the region. As military occupation is gradually lifted and civilian administration restored, the populace is awakening to a new reality. Most of the political establishment has been destroyed due to them being anti-Russian, and the administration is largely leveraging the apathetic mood in the region. A number of new 'federalist' parties have risen to organise political life, and lobby for greater autonomy."
rusfor.550.a: "South Caucasus will have its autonomies."
rusfor.550.b: "Turn them into gubernias."

rusfor.551.t: "The Mountain War"
rusfor.551.d: "Has there been any mountain range in history that has demanded more Russian blood than the great Caucasus? Our sons have bled on both sides of the mountains, be it against Ingush, Chechens, Georgians, Azeris... rugged mountain terrain gives resistance groups the perfect land to wage their hopeless but tenacious war from.\n\nThe Russian military can maintain an iron grip over the roads and cities, but the guerrillas, operating far from the mountains, will always disappear into the land before they can be destroyed. Only a slow, tiresome, and bloody fight remains."
rusfor.551.a: "Clear them out, slowly and methodically."
rusfor.551.b: "Focus more on sympathies of the people."
rusfor.551.c: "The North Caucasus is proof that this can work!"

rusfor.552.t: "Government of Georgia"
rusfor.552.d: "Now that Georgia has been stabilised, a civilian administration must be established. Our best bet would be to utilise some of the more apolitical bureaucrats who previously served under the Menshevik regime, as they have plenty of experience working in Georgia."
rusfor.552.d.nrpr: "Now that Georgia has been stabilised, a civilian administration must be established. Thankfully, some of the local nationalists, with our blessing, have founded a local branch of the NRPR, led by Grigol Robakidze, a writer, publicist, and a major figure in Georgian far-right politics. While both the founder of radical socialist Blue Horns movement and former member of Tetri Giorgi dissatisfied with its monarchist leanings, Robakidze has grown increasingly popular as new Georgia's face.\n\nCurrently, the local branch of the NRPR is facing numerous issues due to Russian rule being extremely unpopular in the region, an issue that'll hopefully soon be resolved."
rusfor.552.d.auth: "Now that Georgia has been stabilised, a civilian administration must be established. Thankfully, members of the local monarchist organisation known as the Union of Georgian Traditionalists have offered their assistance in establishing it. Namely, a prominent businessman, Giorgi Machabeli, backed by General Shalva Maghlakelidze, took on the duties of the local administrator.\n\nMachabeli, a famous monarchist who had previously tried to establish a monarchy in Georgia in 1917-18, also has the backing of some of the local right-wing elements and military figures, making him perfect for the role."
rusfor.552.d.dem: "Now that Georgia has been stabilised, a civilian administration must be established. The best way to do so would be through elections, and some of the smaller pre-existing parties have voiced their readiness to cooperate with the Russian government. This leaves two major parties that would compete in the upcoming elections: the Socialist-Federalist Party and the Georgian Mensheviks.\n\nThe Socialist-Federalist Party is one of the oldest parties in Georgia, formed in 1904 for the purpose of federating the Russian Empire and creating a Georgian autonomy within a democratic framework. They were a smaller, but still influential party in the People's Republic of Georgia, working closely with the Mensheviks. With the National-Democrat Party in shambles, the Federalists were the first to declare their loyalty towards us and have gained significant influence due to several members of the National-Democrats and the Union of Landowners parties defecting to them. The party runs on a liberal platform, federalism, as well as the protection of Georgia's local ethnic minorities.\n\nThe hegemon of Georgian politics, the Social Democratic Party, which has ruled for many years, has split over the issue of recognizing autonomy or clandestine armed struggle. The left anti-democratic wing, along with the Socialist-Revolutionaries and anarchists, went underground, deciding to declare a guerrilla war on us in the mountains, however, the right wing of the party, largely thanks to the efforts of Irakliy Tsereteli from the RSDRP, nevertheless strengthened on the left flank against the Socialists-Federalists."
rusfor.552.d.monarchy: "Now that Georgia has been stabilised, a civilian administration must be established. While there's no doubt that we must hold elections, there's the question of the Georgian crown. While previously it belonged to the Tsar of Russia, crowning a member of the royal house of Bagrationi would certainly be a more endearing option for the Georgians.\n\nCurrently, the Georgian throne is disputed between the Mukhraneli and Gruzinsky branches of the royal house. The Gruzinsky branch is directly descended from the last king of Georgia, and as such, young Petre Bagration-Gruzinsky was chosen as the candidate under the regnal name Petre I."
rusfor.552.a: "Appoint a local bureaucratic government."
rusfor.552.b: "Appoint local nationalists."
rusfor.552.c: "Empower the Union of Traditionalists."
rusfor.552.e: "There will be elections."
rusfor.552.f: "The crown of Georgia belongs to the Tsar!"
rusfor.552.g: "Fine, let them have their king."

rusfor.553.t: "Elections in Georgia"
rusfor.553.d: "Despite relative stability in the region, there is still a sense of apathy and contempt towards our administration among the Georgian people. As such, the local elections to the Georgian diet and the Gubernial Duma have failed to gather a significant level of voter turnout.\n\nMany prominent figures within Georgia view parties participating in it as traitors, stoking the fires further. Still, the elections were held without any interruption, and the results are in. The majority of the seats were gained by..."
rusfor.553.a: "Mensheviks, led by Akaki Chkhenkeli."
rusfor.553.b: "Socialist-Federalists, led by Ioseb Baratashvili."

rusfor.554.t: "The South Caucasus Gamble"
rusfor.554.d: "Transcaucasia is a powder keg on our southern borders. While the situation in Georgia has stabilized somewhat since the region was liberated, their Armenian and Muslim neighbors are in a constant state of conflict with each other. Given the Armenian insurgency against the occupation of their territory by the so-called \"Azerbaijan\" and Turks, we have long supported both their government in exile and, if possible, the Dashnak rebels in the mountains. Relations with the Muslim republic were coldly neutral.\n\nThe zemstvo and administrative reform, conceived back in 1917, has not been implemented, so some of our advisers suggest restoring its blueprints. The point is to separate the Armenian-majority Gandzak gubernia from the old Elizavetpol gubernia and transfer it to the Armenians, the rest - to the predominantly Muslim Baku gubernia.\n\nOthers propose to approach this issue even more straightforward and generally support the Armenians on numerous issues, including territories. Although there is no question of deporting Muslims, some radicals intend to deepen Baku's integration with Russia, as in the good old days."
rusfor.554.a: "The old 1917 plan is good enough."
rusfor.554.b: "We should undermine Islam as much as possible!"

rusfor.555.t: "Elections in Yerevan Gubernia"
rusfor.555.d: "In many ways, the Armenians remain our main ally in the South Caucasus, despite the fact that their most influential Dashnak movement was suspicious of Russia because of the too radical policy of the White Movement. However, one way or another, after the occupation of Armenia by Azerbaijan and Turkey, we supported the government in exile in Petrograd. It was formed by members of the Ramgavar - Armenian Liberal Party, and it was on them that the main bet was placed on the upcoming elections in the Armenian gubernias. On the other hand, the Dashnaks also announced their campaign after Garegin Nzhdeh tragically died falling off a cliff in Karabakh. Although his death shook the party's position, the Dashnaks emphasized their social-nationalist program, hoping to win back votes from a third force in Armenian politics: the Hunchaks.\n\nThe oldest Armenian political party - social democrat SDHP has seriously lost ground in recent years, but its popularity is already growing due to its radical leftist program, which promises too much to voters."
rusfor.555.a: "Surprisingly, the Hunchaks form the government."
rusfor.555.b: "Dashnaks form the government, despite the loss of Nzhdeh."
rusfor.555.c: "The liberal Ramgavar coalition takes the lead in Yerevan."

rusfor.556.t: "Radicalization of 'Azerbaijan'"
rusfor.556.d: "The political experiment organized by the Ottoman Empire under the name \"Azerbaijan\" has finally failed. Thanks to our policy, including friendly policy towards the Iranian people, this stupid political entity was declared a separatist organization, and almost all of its active political figures were forced to leave Baku gubernia.\n\nAlthough our policy towards the Caucasian Tatars is criticized, especially from the left, there are also those Muslims who fully supported it, in particular, the Hummet party, which is close to the Mensheviks. Its members not only recognized the new order of affairs, but also actively took advantage of the chance to represent their people, unlike the German and Turkish collaborators of Musavat and Ittihad.\n\nAlthough the Hummet retains its national identity and advocates the recognition of the Azerbaijani nation, they have helped in many ways to maintain order, especially in the province, as well as to establish relations with the Armenian community, although friendship is still far away, if it is possible in principle."
rusfor.556.a: "Thanks Lord, some of them have wisdom not to resist."

### Ukraine Events
rusfor.557.t: "Ukraine in Flames"
rusfor.557.d: "The war may be over, but the fight goes on. This is the slogan of the doomed soldiers, the remnants of the Ukrainian military still willing to put up a fight. From the beginning of our occupation of the south and east of the country, resistance was fierce. Though all of Ukraine was to eventually fall to our forces, the government never fully surrendered - and despite the end of the war and the fall of Germany, resistance only seems to grow.\n\nWhile the resistance is sporadic, it is highly organized, operating in separate cells in a decentralised manner, vowing to strike against the Russian occupier as long as they can draw breath.\n\nOverall, the resistance is composed of a variety of groups, both nationalist, socialist, and merely anti-Russian. Many of them are based around the remnants of units of the Ukrainian Army, but some are built around pre-war terrorist organisations, such as the Ukrainian Military Organisation (UVO) and Free Cossacks.\n\nFor now, these partisans have been waging a relentless bandit war from the forests of western Ukraine, where they seem to have broad support from the villages."
rusfor.557.a: "One more fight..."

rusfor.558.t: "Government of Ukraine"
rusfor.558.d: "Now that normalcy is returning to Ukraine, the simplest way to establish civilian government would be to use the pre-existing bureaucracy as much as possible. The Hetmanist administration in particular employed many Russophiles with the experience and connections necessary, and they would be a natural, apolitical group for our collaborationist regime to lean on."
rusfor.558.d.szrs: "Now that normalcy is returning to Ukraine, a civilian administration is being formed in the Ukrainian gubernias. Naturally, it will be run by the Ukrainian branch of the SZRS, which held its founding conference in Kharkov some weeks ago. Pyotr Stepanovich Boranetsky, already a prominent Svobodnik in Russia, failed his bid for leadership against Dmitry Mikhaylovich Odinets. Odinets had strong backing in the radicalised Russian Union in Ukraine, which serves as the backbone of the new SZRS branch. Additionally, the party has drawn some other Russophile nationalists, namely General Vasily Viktorovich Biskupsky's clique of officers and bureaucrats, who have a lukewarm attitude towards Russian rule.\n\nThis 'USZRS' will be expanded rapidly to incorporate all aspects of life in Ukraine, both as a recruitment base and, most importantly, as a nation-spanning propaganda office. After all, the Vozhd was born in Ukraine; few can doubt his love for it."
rusfor.558.d.solonevich: "Now that normalcy is returning to Ukraine, a civilian administration is being formed in the Ukrainian gubernias. The Ukrainian administration, however, will be led in a rather unique manner. Taking inspiration from Viacheslav Lypinski's ideas of classocracy, Ukrainian elections will not be held to a parliamentary body, but a corporatist one, the All-Ukrainian Class Assembly. In Solonevich's eyes, this so-called classocratic way of governance is inherent to the Ukrainian way of life, and as such its implementation would ensure the best form of national development for Ukraine. It also serves a political purpose: the expansion of the classocratic system to all of Ukraine, with other regions largely unaffected by the experiment, can show whether the classocratic system could be expanded to the rest of Russia."
rusfor.558.d.dem: "Now that normalcy is returning to Ukraine, so do civilian politics. We have been recruiting the pre-existing civilian administration to run everyday issues, but it is only intended as a temporary measure. Elections have been promised to be held in Ukraine, though the vast majority of pre-existing parties have been either abolished or are in exile for separatism. Despite the resistance in parts of Ukraine, political life is slowly waking up. Two major parties have been formed to compete in the coming elections: the UFDP and the UNB.\n\nThe Ukrainian Federative-Democratic Party has been formed by Ukrainian liberals and social democrats who have deemed it better to accept the status quo and seek to maintain Ukrainian freedoms within the Russian federal system. The UFDP's programme includes safeguarding the cultural, economic, and political rights of the Ukrainians, seeking to build a healthy federal relationship with Russia, and reinforcing democratic principles nationwide. They would likely be in the 'legal opposition' with the Kremlin and oppose any further centralisation.\n\nTo their right, the Ukrainian National Bloc has been formed to combine Russophile conservatives and a-national conservatives into a single party, which is strongly backed by the VSZV and Protofis. Their programme features 'constructive autonomy' within Russia, maintaining conservative values, supporting veterans, and a focus on 'sensible economic policies' to rebuild the damages of the war as smoothly as possible, instead of chasing vague ideological goals."
rusfor.558.a: "Appoint a local bureaucratic government."
rusfor.558.b: "Appoint SZRS loyalists."
rusfor.558.c: "Empower the classocrats."
rusfor.558.e: "There will be elections."

rusfor.559.t: "Commander of the Ukrainian Military District"
rusfor.559.d: "It is not an enviable job to be the first commander of the recently-formed Ukrainian Military District.\n\nWithin its jurisdiction falls a long list of tasks, like eviscerating the Ukrainian resistance movements, maintaining public order, defending Russia's western border, restoring Ukrainian military bases to working order, and conscripting Ukrainian military units. It is likely that this post will draw much ire from the populace should there be too many corpses."
rusfor.559.a: "A hard man for a hard job. Send Manstein."
rusfor.559.b: "Shteyfon is calm and well-connected."
rusfor.559.c: "An unorthodox touch is needed. General Shkuro!"
rusfor.559.e: "We need someone impartial, like Malinovsky."
rusfor.559.f: "A man of talent and humble beginnings, Grechko."



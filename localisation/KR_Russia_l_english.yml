goal_RUS_start_rearmament_name: "Initial Rearmament"
goal_RUS_start_rearmament_desc: "For far too long, Russia has been constrained by the limitations imposed by the Minsk Treaty. We should expand our arms production in order to bolster our liberation efforts in Eastern Europe."
goal_RUS_help_serbia_name: "Help Serbian Brothers"
goal_RUS_help_serbia_desc: "Our long-standing ally, Serbia, like us, was defeated as a consequence of the Weltkrieg. Yet once again, it is our duty to uphold our steadfast ally and fulfil all their territorial aspirations in the Balkans."

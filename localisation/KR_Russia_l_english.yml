RUS_Integrate_Alash_Autonomy: "Integrate [FROM.GetNameDef]"
RUS_Integrate_Alash_Autonomy_desc: "Kazakhstan is vast and wealthy and more than that they are loyal. Once brought into the fold again we can look even further south, to Turkestan and even Persia!"

RUS_Take_Control_Over_Latvia: "Take Control Over Latvia"
RUS_Control_Skoropadsky: "Secret Talks with the Hetman"
RUS_Control_Skoropadsky_desc: "General Pavel Skoropadsky, who styled himself Hetman of Ukraine in 1918, in reality was a loyal and unassuming general to the Crown throughout his life. Indeed, he was of Little Russian descent. However, circumstances brought him to a situation where the only means to liberate Ukraine from Bolshevism lay in relying on German bayonets and establishing a dictatorial regime.\n\nMuch time has elapsed since then, and perhaps the German-Austrian vision of \"Ukraine\" has been quite successful. Nonetheless, we can turn to the General-Hetman and rely on his integrity."


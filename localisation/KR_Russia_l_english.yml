russianews.19.t: "NRPR Wins the Russian Election!"
russianews.19.d: "Following Aleksandr Kerensky's assassination, Russia was razed by a serious political crisis. The election have been held with the People's Republican Party of Russia winning the majority of votes. While this does not mean that Russia starts its period of stabilisation, it is definitely closer towards the end of the political turmoil.\nThe new Russian Chairman-Minister has announced that the Russian Republic is facing changes, good or bad, and that the world should become ready for the Russian Bear awakening."

russianews.20.t: "Eurasianists Win the Russian Election!"
russianews.20.d: "Following Aleksandr Kerensky's assassination, Russia was razed by a serious political crisis. The election have been held with the Eurasianist Party winning the majority of votes. While this does not mean that Russia starts its period of stabilisation, it is definitely closer towards the end of the political turmoil.\nThe new Russian Chairman-Minister has announced that the Russian Republic is facing changes, good or bad, and that the world should become ready for the Russian Bear awakening."

russianews.21.t: "Aristocratic Republic in Russia!"
russianews.21.d: "The All-Russian National Union has managed to establish the supreme rule of the Senate with the president [RUS.GetLeader] and the Aristocrats becoming the benefactors of the new regime. While the socialist opposition is being oppressed, the elite gymnasiums open all across the country and large-scale balls and masquerades are organised. Nobody knows exactly, if this is the end of Russia, or only the beginning. Nevertheless, nothing ventured, nothing gained?"
russianews.21.a: "Everyone wants to taste a rich life."
 
russianews.22.t: "The Black Tsar"
russianews.22.d: "It seems that the tides of history have a sense of humor, or at least a drive towards certain figures achieving their inevitability on the history pages. Pyotr Nikolayevich Wrangel, the famed 'Black Baron' of the Baltic-German noble stock in service of the Russian Empire ever since his father's role as adjutant to the Grand Duke Mikhail Aleksandrovitch, now sits atop the Tsardom's throne.\n\nAs one of the major figures within the White Movement and the ROVS organization ever since the Civil War, Baron Wrangel has made many allies within the aristocracy and monarchist officer corps. His rising popularity amongst the common people of Russia and close ties with major conservative politicians eventually resulted in him being once again tied to the restorationist cause, just like his Bolshevik enemies sang about during their struggle.\n\nYet contrary to what many could have then expected, Pyotr Wrangel has neither taken autocratic reins of All-Russia nor has he restored a Romanov by himself, but he has been chosen by both certain elements the establishment and the people to lead the restored Russian Empire. Many now wonder how the jump from a Baron to a Tsar will affect the man himself, wider Russia and even the World."
russianews.22.a: "The Tsar's throne restored."

russianews.23.t: "Thirteenth Russo-Turkish War"
russianews.23.d: "Despite the widespread belief that the era of Russo-Turkish wars had come to a close with the conclusion of the Weltkrieg, these assumptions were erroneous, particularly since the remnants of the Russian Empire - be it Azerbaijan, Armenia, or the Mountainous Republic - have in fact become satellites of the revitalized Ottoman Empire.\n\nIn recent times, Russian forces have launched a vigorous offensive in Transcaucasia with the aim of permanently eradicating Turkish dominance in the region. Given that the Ottomans are facing challenges in other areas, this development is unlikely to favor them. However, it is premature to draw conclusions or make predictions. Will Russia succeed in regaining its influence in the Caucasus and Middle East, or will the Sick Man of Europe continue to resist?"
russianews.23.a: "The outcome of this conflict is likely to seriously change the balance of power."

russianews.24.t: "Anton Denikin Takes Power in Russia"
russianews.24.d: "Following the passing of Lavr Kornilov, the Commander-in-Chief and Supreme Ruler of Russia, his loyal brother-in-arms during the tumultuous events of the Russian Civil War and beyond, has been proclaimed the new Supreme Leader by the Russian government with the unwavering support of the Russian All-Military Union. This new leader, in his pursuit of restoring democratic yet stable governance, continues to exercise firm control and the powers bestowed upon him, aiming to bring order to the nation."
russianews.24.a: "The Russian state marches on."

russianews.25.t: "Radical Monarchist Coup in Russia"
russianews.25.d: "The death of Lavr Georgievich Kornilov plunged Russia into a state of dangerous uncertainty. Ultimately, the monarchist factions, which had been waiting for a long time for Kornilov to restore the monarchy, now face a harsh reality: either the restoration of a democratic republic or the preservation of a military dictatorship indefinitely. The Drozdovites, a faction of ardent monarchists, decided to act by carrying out a coup."
russianews.25.a: "Is Russia returning to pogroms and sobornost?" #other
russianews.25.b: "Another round of bonded labour and servitude." #socialist

russianews.109.t: "Tukhachevsky Establishes The Dictatorship of Russian Totalism"
russianews.109.d: "After the struggle for power, Mikhail Tukhachevsky seized power in the Russian Socialist Republic and established the dictatorship of totalism! In his speech, he promises to return the lost territories under the Empire, expand the spheres of influence of totalism, begin industrialization, and a bright future will soon come. However, Western authorities believe that totalism can become the main threat to peace and lead to a new war..."
russianews.109.a: "Is it worth trusting the speech of Tukhachevsky?"


russia.2006.t: "City on Neva"
russia.2006.d: "Now that we have decided to revive the monarchy in Russia, there are still reminders of the revolutionary year of 1917. Some geographical features still praise the revolution, while others that were named after symbols of our great country lost their original names after the revolution. If we want the Second Russian Empire to be a worthy successor to the first, we need to erase the reminder of the revolution."
russia.2006.a: "We need to return the historical name to the Peter's city!"
russia.2006.b: "Germany is still our enemy, Petrograd sounds more Patriotic."

russia.2008.t: "Kerensky's Legacy"
russia.2008.d: "As part of the Kerensky reforms in the 20s, many cities were renamed, the names of some bore reminders of the monarchical past of Russia, others were called in the German manner, the worst enemy of Russia, because of which the great changes of the last 20 years took place. Now that Kerensky's identity is considered highly controversial, as is his politics, it may be time to restore the old names of these cities under which they saw the glorious times in the history of our motherland, under new names they experienced only the instability and crises of the young Russian democracy."
russia.2008.a: "Let's return to the reflection of the glorious times."
russia.2008.b: "Kerensky brought democracy to Russia, and his cause will live on."

russia.2010.t: "Our Shame is Avenged"
russia.2010.d: "What we have been waiting for for the last twenty years has happened, we have washed away the shame of the Great War by defeating Germany. We control East Prussia, centered on the city of Königsberg, the cradle of the Empire. Now we need to decide the fate of the city: whether we should leave it a German name, or whether it should be renamed Korolevets, as it was called by our ancestors, the Slavs who lived in Prussia before the Germans. Some patriots would like to give the city a new name-in honor of the great figures who raised Russia from its knees, some are in favor of remembering the glorious victories of the Seven Years' War in the new name. The choice is ours."
russia.2010.a: "There's no point in changing the name let's be merciful to the losers."
russia.2010.b: "Let's show that we are the heirs of the Slavs, the new name is Korolevets."
russia.2010.c: "We will perpetuate the names of those who raised Russia from its knees."
russia.2010.e: "Let's honor the memory of the heroes of the past."

russia.2011.t: "Heroes of New Times"
russia.2011.d: "Having vanquished the Germanic menace the glorious leadership of reborn Russia has proven that it was no mistake for our people to support the government. With the fame assured by the capture of the heart of the Prussian dynasty, the 'King's Mountain', it would be only logical to rename the city in honor of the people who have saved Russia from the dustbin of history it found itself in after the First War."
russia.2011.a: "Let's name the city in honor of our great Vozhd - Boris Savinkov."
russia.2011.b: "The city will bear the name of our new Tsar."
russia.2011.c: "Pyotr Wrangel - Russian Bonaparte, his deeds should be immortalized."
russia.2011.e: "Comrade Tukhachevsky shall realize the internationalist dream."
russia.2011.f: "The city will bear the name of the Marshal of Victory."
russia.2011.g: "Comrade Frunze's deeds must remain in the centuries."
russia.2011.h: "The city will bear the name of General Kornilov."
russia.2011.i: "The city will become the Stronghold of October Revolution in the name."

russia.2012.t: "Heroes of Old Times"
russia.2012.d: "Almost two hundred years ago, during the Seven Years' War, our valiant troops completely captured the territories of East Prussia, and were also able to take the heart of Germany-Berlin, but the shame of the House of Romanov, Tsar Peter III, refused all conquests and returned all the territories we captured. Now that we are back in control of Prussian land and must honor the memory of the Russian soldiers by renaming the heart of the Germanic Empire."
russia.2012.a: "We will perpetuate the name of the mother-Empress Elizabeth Petrovna."
russia.2012.b: "The city will bear the name of Apraksin, who brought victories in Prussia."
russia.2012.c: "Apraksin is tainted with intrigues, name the city in honor of war hero Saltykov."
russia.2012.e: "Other variants seem more legit."

russia.2013.t: "Our Flag"
russia.2013.d: "There are several choices available for the current flag. We can stay with the current flag, choose the Tricolor on the Red Banner, choose the RSFSR 1918 flag design or choose the RSFSR Civil War design."
russia.2013.a: "Restore our original banner"
russia.2013.b: "RSFSR 1918 flag."
russia.2013.c: "RSFSR Civil War flag."
russia.2013.e: "Keep our current flag."

russia.2014.t: "Our Flag"
russia.2014.d: "There are several choices available for the current flag. We can stay with the current flag (hammer and sickle in a gold frame), choose the Globe Design; Hammer and Sickle without gold frame; and another design of Hammer and Sickle without gold frame."
russia.2014.a: "Hammer and Sickle with gold frame"
russia.2014.b: "Globe design."
russia.2014.c: "Hammer and Sickle without gold frame."
russia.2014.e: "Another Hammer and Sickle without gold frame."

russia.2015.t: "Our Flag"
russia.2015.d: "There are several choices available for the current flag. We can stay with current party flag of the NRPR or choose the vertical sword design."
russia.2015.a: "Original Russian State flag."
russia.2015.b: "Vertical Sword design."

russia.2016.t: "Our Flag"
russia.2016.d: "There are several choices available for the current flag. We can stay with the current flag (golden hammer and scythe) or choose a combination design between the RSFSR flag and our current one, turning the gold into white."
russia.2016.a: "Hammer and Scythe in gold."
russia.2016.b: "Hammer and Scythe in white."

russia.2018.t: "Our Flag"
russia.2018.d: "There are several choices available for the current flag. We can stay with the current Russian national tricolor or choose a monarchist Black-Gold-White flag."
russia.2018.a: "White-Blue-Red."
russia.2018.b: "Black-Gold-White."

#####Helicopterrus

russia.3000.t: "Vertical Developments"
russia.3000.d: "Utilizing economic ties with domestic businesses and military contractors, we have been able to develop experimental ‘helicopter' prototypes for the armies of Russia and her allies. Named the Sikorsky R-4 and the TsAGI A-4, these unique aerial vehicles were developed using the work of our onw Igor Sikorsky and the Spanish aviation pioneer Juan de la Cierva, and are capable of vertical take-off and landing, making them perfect for use in rough terrain. Though expensive and fragile, we have been able to send a few models to the major allies, allowing our armies and the armies of our friends to utilize this unique technology to further our ambitions. With our growing airfleet also using autogyros, rotabuggies, and other novel transports devised by crack scientists and our allied lackeys, we shall be able to ferry our populace, our goods, and our troops all around the world without issue or delay while also delivering devastating payloads at a moment's notice. Just be careful not to crash any, for we only have a fragile few, and they are currently very temperamental and very hard to replace."
russia.3000.a: "Onwards and upwards!"

russia.3001.t: "Experimental Technologies from the Russian Bear"
russia.3001.d: "Seeking to put their recent technological breakthroughs to the test, Russian aeronautical engineers working off Spanish and Anglo-American designs came together to create new military hardware to be tested on the frontlines here at the fringes of the Russian sphere. The centerpiece inventions of these new shipments are the Sikorsky R-4 and the TsAGI A-4. These ‘hoverflies' are unique aircraft that can take off and land vertically, and have been dubbed helicopters or advanced autogyros by the initial designers. Primarily designed to quickly ferry supplies and precious cargo in and out of rough areas and terrain, some of these helicopters have also been out-fitted with weaponry, functioning as basic light aerial gunships and bombers while also being adept at recon and supply. Looking more like something out of Da Vinci's sketchbooks and less like a real war machine, we shall give these new helicopters and the other tech the Russians sent us a thorough testing against the varied enemies of our alliance."
russia.3001.a: "We will ensure these are put to good use."


### Definitely Nothing Secret Here ###

russia.36589.t: "The Eternal President"
russia.36589.d: "It was a cold day in Petrograd, I was going for a daytime stroll as I existed the Duma building. From the crowd emerged a shadowy figure who, before the police could do anything, discharged a gun. I saw my entire life flash before my eyes, from my birth to my childhood, to the Revolution, all the way until the very second where I was shot. It all went blank, until I woke up in my bed the next day. I assumed it was all a dream, just a bad dream, surely my guards wouldn't allow my assassination?\n\nBut as I exited the Duma, I saw the same gunman approach, and the same bullet fly towards my head, but as soon as the bullet pierced my skull, and ass soon as my brains splattered all over the Duma's walls, I awoke in my bed the very next morning. It kept going on like this, on and on, for what felt like an eternity\n\nEvery day as I awoke I saw the world change around me, familiars faces changing, the world becoming a little different every time I awoke. The first day I was trapped in this loop, Italy was divided into two pieces, eventually I came to find that it was divided into five, a few years later it was back to two pieces. I liked it better when it was in 5 pieces. I found out who that hooded gunman was, it was one of Savinkov's insane lackeys, Pavel Gorgulov. But even as I find out more and more of the world I live in, I could never seem to avoid the tragic events of my death.\n\nMy assassination seemed to be the only constant left in the world, until the one day where I defied my set-in stone fate. As I saw Gorgulov approach, I stood unflinching, I knew the bullet would reset this loop at any second; I had just grown used to that. But as the gun fired, I took a deep breath, and ran like hell towards my eternal assassin. With all my might I tackled Gorguov, even as he feebly tried to shoot me again and again; the bullets simply glanced off of me. With the combined rage I had build up over the countless years stuck in this time loop hell, I thrust my hand into Pavel Gorgulov's chest, and pulled out his still-beating heart. As I saw his life force fade, I grimaced. I had finally done it, I had broken the loop, I had finally survived.\n\nThat was almost 500 years ago, and I have ruled Russia as their Eternal President ever since. I have seen nations crumble, men die, systems fall, but in all of this, in all of the chaotic uncertainty of the world, I, President Aleksandr Fyodorovich Kerensky remain as the one, true unflinching constant in this dark and dreary world. For I..."
russia.36589.a: "...am, the Social Liberal Dictator, Russia's Eternal President."


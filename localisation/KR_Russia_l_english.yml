RUS_rovs_internal_faction: "The Russian All-Military Union"
RUS_rovs_internal_faction_desc: "\nThe core of the internal conflict within the §PRussian All-Military Union§! began during the Russian Civil War, when the leaders of the White Movement came to a strict ideological position of §YNepredreshenchestvo§! (Non-predetermination) - §L\"The army is outside politics\"§!. This dictum became the ideological basis of the [GetROVSParty], an apolitical veteran organization. But not everyone agreed with this.\n\nThe apolitical faction, consisting mainly of §Crepublican§! generals, seeks to preserve the §P[GetROVSParty]§! as a neutral, non-political entity, maintaining an emphasis on military solidarity and resisting any political interference. On the contrary, the interventionist faction, mostly led by §hmonarchist§! generals, advocates for the §P[GetROVSParty]§! to play an active role in Russian politics, supporting the restoration of the monarchy or a strong military dictatorship.\n§HKeeping the balance within the §CStatus-Quo§! range will prevent serious crisis§!\n\n\n§P[GetROVSParty]§! cohesion: [?RUS_vvsr_rovs_unity|%0]\nGeneral §cWrangel§!'s ambitions: [?RUS_rovs_wrangel|Y0]"


RUS_russian_army_idea: "Russian Armed Forces"
RUS_general_school_idea: "National High Command Formation School"
RUS_general_school_idea_i: "Russian Assault Regiments"
RUS_general_school_idea_ii: "The Army of Eurasia"
RUS_tank_academy: "National Armoured School"

RUS_okhrana: "Gosokhrana"
RUS_okhrana_desc: "Our legacy from Tsarist times, the intricate and unstructured system of military intelligence and counterintelligence, which was handled by everyone from the Stavka and the General Staff to the headquarters of some armies, has now been officially reorganized as the Department of State Security, or Gosokhrana for short.\n\nInformants, spies, provocateurs - all tools are good in the fight for the soul of the Motherland."
RUS_army_limits: "Tilsit Accords - Military Restrictions"
RUS_deception: "Art of Deception"
RUS_deception_desc: "False airfields with mock-up aircraft are set up on the borders while the real ones look abandoned, soldiers are supplied with camouflage suits en masse, and night movements are masked by the noise of aircraft flights and gunfire - this is the art of being invisible."


RUS_central_vpk: "Central VPK"
RUS_central_vpk_desc: "In order to prevent an acute crisis of military-technical support, the Central Military-Industrial Committee was established to coordinate the work of local military-industrial committees and government agencies."
RUS_zemgor_supplies: "Zemgor"
RUS_zemgor_supplies_desc: "Zemgor, which was established during the First Weltkrieg as an intermediary body for the allocation of state defence orders based on Zemstvos and city dumas, and during peacetime - as a public charitable organization - has resumed its primary function. Through its efforts, the armed forces receive the essential equipment and supplies in a timely manner. While its performance may not always be entirely satisfactory, it remains an improvement over the absence of such coordination."
RUS_zemgor_supplies_bad: "Malfunctioning Zemgor"
RUS_zemgor_supplies_bad_desc: "Zemgor, which was established during the First Weltkrieg as an intermediary body for the allocation of state defence orders based on Zemstvos and city dumas, and during peacetime - as a public charitable organization - has resumed its primary function. Through its efforts, the armed forces should receive the essential equipment and supplies in a timely manner, but in practice, its performance is hardly satisfactory."

RUS_kornilovshchina: "Kornilovshchina"
RUS_constitution_of_kornilov: "Konstitutsiya Kornilova"
RUS_constitution_of_kornilov_tt: "£white_dot The §CSenate§! is renamed to §CState Council§!\n\n£white_dot The number of §Gelected§! senators has been reduced to §Y0§!\n\n£white_dot The number of §Gpresidential§! senators has been reduced to §Y0§!\n\n£white_dot The number of §Gregional§! senators has been increased to §Y150§!"
RUS_empowered_duma_tt: "£white_dot The §GPresident§! will lose the §Vveto right§!\n\n£white_dot The number of §Gpresidential§! senators has been reduced to §Y0§!\n\n£white_dot The number of §Gelected§! senators has been reduced to §Y0§!\n\n£white_dot The number of §Gregional§! senators has been increased to §Y150§!"
RUS_national_defense_fund_idea: "National Defense Fund"
rus_junta_focus_1: "Kornilovschina"

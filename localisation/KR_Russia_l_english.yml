### Ideas ###
rus_industry_lack: "Backward Industry"
rus_industry_lack_desc: "Kerensky's inability to carry out land reform led to the fact that entire regions of the country lost effective ways of industrialization. Moreover, after the Civil War, Russia faced economic ruin, a short period of growth, and then a recession due to stagnation and corruption caused by Kerensky's ineffective rule. Now Russia is still behind industrially compared to Western Europe and the United States.\n§W--------------\nPolitical Power Gain: [?ROOT.RUS_backward_industry_political_power_gain|=%+0]\n£prod_eff  Production Efficiency growth: [?ROOT.RUS_backward_industry_efficiency_gain|=%+0]\n£prod_eff_cap  Production Efficiency Cap: [?ROOT.RUS_backward_industry_max_efficiency|=%+0]\nFactory Output: [?ROOT.RUS_backward_industry_industrial_capacity|=%+0]\nConstruction Speed: [?ROOT.RUS_backward_industry_production_speed_buildings|=%+0]\nResearch Speed: [?ROOT.RUS_backward_industry_research_speed|=%+0]\nMonthly Industrialisation Rate: [?ROOT.RUS_backward_industry_industrialisation_rate|=%+2]"
RUS_backward_industry_modifier: "£pol_idea Backward Industry"

rus_industrialised_nation: "Industrialised Nation"
rus_industrialised_nation_desc: "Thanks to our government's efforts our country is industrialized and prosperous.\n§W--------------\nPolitical Power Gain: [?ROOT.RUS_backward_industry_political_power_gain|=%+0]\n£prod_eff  Production Efficiency growth: [?ROOT.RUS_backward_industry_efficiency_gain|=%+0]\n£prod_eff_cap  Production Efficiency Cap: [?ROOT.RUS_backward_industry_max_efficiency|=%+0]\nFactory Output: [?ROOT.RUS_backward_industry_industrial_capacity|=%+0]\nConstruction Speed: [?ROOT.RUS_backward_industry_production_speed_buildings|=%+0]\nResearch Speed: [?ROOT.RUS_backward_industry_research_speed|=%+0]\nMonthly Industrialisation Rate: [?ROOT.RUS_backward_industry_industrialisation_rate|=%+2]"
RUS_industrialized_nation_modifier: "£pol_idea Industrialised Nation"

rus_korporatsiya_yusupova_idea: "Korporatsiya Yusupova"

rus_unfinished_land_reform: "Incomplete Land Reform"
rus_unfinished_land_reform_desc: "The land was once nationalized by the Bolsheviks in the first days of the 1917 October Putsch, as well as private property abolished. However, with the White forces eventually defeating the Bolsheviks, the private property was reestablished on all Russian territory. Kerensky, while technically being a member of the Socialist-Revolutionary Party, understood the importance of the land question. In order to please the peasants and socialist supporters and voters, he passed the Land Socialization Bill, which originally should have abolished any private property considering land ownership. However, in order to appease the other side of the political spectrum, the liberals and conservatives, the Bill was adopted with some adjustments: while land in the most fertile lands was in a public ownership of special agricultural councils, private property over land was still legal in other areas of Russia. This, however, still led to various problems, including rising support for more radical parties in the country, rough going industrialization and difficulties with building new infrastructure. The Land Reform is still unfinished and it must be solved once and for all as soon as possible."
unfinished_land_reform_tooltip: "(§YMoscow§!, §YKazan§!, §YSamara§! and §Y14 others§!):\nLocal Resources: §R-25%§!\nMobilisation speed: §R-25%§!\nMax Factories in State: §R-25%§!\nLocal §YInfrastructure§! Construction Speed: §R-10%§!\nLocal §YMilitary Factory§! Construction Speed: §R-10%§!\nLocal §YIndustrial Complex§! Construction Speed: §R-10%§!"
RUS_unfinished_land_reform_modifier: "Incomplete Land Reform\n§WThis state has land in private ownership, which deprives us from effective industrialization of this region. Moreover, the local population is dissatisfied with the land in property of landlords and nobles, which threatens the stability in this region.§!"
RUS_land_reform_finished: "§HLand Reform§! completed"

RUS_capitalism_in_village_modifier: "§YCapitalism in Village§!\nThe Bukharin's NEP program can be described by a formula 'Capitalism - in the Village, Socialism - in the City'. With his support of small traders and kulaks, the land reform can be considered as completed - with its own benefits and disadvantages, of course."

RUS_divided_staff: "Humiliation of the Weltkrieg"
RUS_divided_staff_desc: "The Russian Army entered the Weltkrieg as one of the largest armies in Europe. It emerged defeated, disorganized, and humiliated. German operational coordination exposed deep flaws in Russian command, logistics, and doctrine. Though the Civil War restored Russian independence, the army that survived was a strange hybrid - Imperial veterans, volunteer formations, and new officers shaped by revolution and chaos. For twenty years the Chief of Staff attempted to modernize the army. Yet the Stavka remains deeply divided over the lessons of defeat.\n\nRussia must decide what kind of army will fight the next war."
RUS_divided_staff_2: "Divided General Staff"
RUS_divided_staff_2_desc: "$RUS_divided_staff_desc$"
rus_experienced_military: "Experienced Military"
rus_experienced_military_desc: "We have accomplished the mission of restoring Russian White Army to its greatness, but now we can easily say that the White Army is the Strongest of All"
rus_divided_marine: "Outdated Navy"
rus_divided_marine_desc: "Our marine since the civil war has stayed small and weakened, being the least of our priorities. Thus the higher naval staff has been prone to debates that haven't been answered officially by the government. Some of our officers want to stick to the classic fleet-in-being doctrine while others want to test the other innovative paths of using submarines or carriers primarily."
rus_investigation: "Investigation"
rus_investigation_desc: "An investigation into Kerensky assassination attempt is now conducted by Police." 
RUS_army_reshuffle: "The Army After Kornilov"
RUS_army_reshuffle_desc: "Kornilov had been the uncontested dictator over the Russian Army for the past two decades, and after him, much of the network of interpersonal connections at the heart of the army has broken down. Both the new chief of army and the president himself have been reshuffling officer positions to favour their own men, and removing those who took part in the Kornilov Conspiracy."

RUS_FIN_neutrality: "Russo-Finnish Treaty of Friendship and Cooperation"
MON_russo_mongolian_trade_agreements: "Russo-Mongolian Trade Agreements"
RUS_demanded_treaty_MON: "Mongolia has accepted neutral status"
RUS_SER_aid: "Russian Military Mission"
RUS_SER_aid_desc: "Russia still considers the Balkan Slavs to be its brothers and is ready to supply weapons to our country, as well as send military specialists with experience in conducting military operations in the Caucasus to our side."
RUS_SER_aid_RUS: "Serbian Military Mission"
RUS_SER_aid_RUS_desc: "We have once again sent our military experts to the Balkans - this time together with the aviation volunteers. While our military mission is there, we have the opportunity to test our military theories and help our brothers in the Balkans at the same time."
RUS_PER_aid: "[PER.GetAdjective] Military Mission"
RUS_PER_aid_desc: "The Russians sent their Cossacks to our country once again. While they are busy training our army, the government managed to conclude several contracts with Russian armament factories on favourable terms."
RUS_PER_neutrality: "Guaranteed Neutrality"

RUS_anti_partisan_guard: "Counterinsurgency War"
RUS_anti_partisan_guard_desc: "The army and the Interior Ministry are working together to suppress local rebellions - the army sets up cordons around places where partisans are found and checks forests, while the Interior Ministry mobilises local police and informants planted among nationalists."
RUS_UKR_resistance: "Resistance in Ukraine"
RUS_UKR_resistance_desc: "Ukraine is once again rebelling against [RUS.Capital.GetName]. Constant partisan activity in the countryside, attacks on members of local administrations and following that punitive raids are significantly reducing trust in the Russian government across the country."
RUS_UKR_opposition: "Ukrainian Passive Resistance"
RUS_UKR_opposition_desc: "Ukraine is once again opposing [RUS.Capital.GetName]. Constant disagreements over even the most minor issues out of principle, mass protests and disregard for Russian laws are forcing the Russian government to allocate additional resources to Ukraine from other places."

RUS_INT_deal: "Russo-Phalanstère Agreement"
RUS_INT_deal_desc: "Black gold in exchange for industrial expertise, all for the great cause of bringing upon the downfall of the German Empire."
RUS_if_FRA_accept_only: "§gIf only [FRA.GetFlag]France accepts, [RUS.GetFlag]Russia gains:§!"
RUS_if_both_accept: "§gIf [FRA.GetFlag][ENG.GetFlag]both accept, [RUS.GetFlag]Russia gains:§!"
RUS_recipent_gains: "§gThe [FRA.GetFlag][ENG.GetFlag]recipients gains:§!"
RUS_remove_agreement_after_war: "Once war with Germany breaks out we will §rlose§! the national spirit."
RUS_anti_internationale_pact: "Anti-Internationale Pact"
RUS_anti_internationale_pact_desc: "The International is the enemy of every free country, and although most countries cannot withstand a direct confrontation with the Socialists, together the free world can defend itself."
RUS_america_attache: "Attaché to America"
RUS_america_attache_desc: "The fight that began 20 years ago continues on foreign soil. While Russian volunteers in America fight to protect one of our oldest allies, we constantly receive from them information on how modern wars are fought."
RUS_renewed_american_trade: "Renewed American Trade"
RUS_renewed_american_trade_desc: "The Russian-American Trade Company has re-established its operations in America, although the volume of trade between two countries is certainly less than before the Wall Street Crash."
RUS_ACW_support: "(§Y[GetACWSupportedCountryName]§!) $volunteer_limit_plus_three_tt$"
RUS_chinese_military_mission_idea: "Russian Military Mission in China"
RUS_chinese_military_mission_idea_desc: "Sino-Russian relations began in the 17th century when Russian settlers reached the Chinese at the Amur River, and formal treaties began after 1689. The old Russian Empire played an imperialist role in the great scramble for China, and sought to exact concessions from China as well as taking advantage of China's many extraterritorial agreements.\n\nThe collapse of the old empire following the Great War however has dramatically changed the future and scope of Russian-Chinese relations. Sure, there are still plenty of unresolved issues regarding the northern borders and China's claims to the frontiers of Xinjiang and Mongolia but nonetheless, Russia sees in China a potential ally in resisting the despicable stretch of the Kaiser in the Far East. As Chinese militaries are desperately outdated and undertrained, we should facilitate a military advisory expedition in order to train local Chinese warlord soldiers into a professional force modelled on our own army successes."
RUS_china_trade_deal: "Russian-Chinese Trade Deal"
RUS_china_trade_deal_desc: "A trade deal has been formed with the Chinese government, ensuring stability and commerce across the Eurasian continent. In this new age of a new world order where global politics should no longer be dictated by the West or the Reich, our new allies are those who share in our common Eurasian struggle."
RUS_ruskapa: "Ruskapa"
RUS_ruskapa_desc: "The Russian-Canadian-American Passenger Agency is one of the most important links between Russia and the Entente, benefiting both sides through free trade and many small secret agreements between governments."
RUS_co_prosperity_penalties: "Russo-Japanese Treaties"
RUS_FNG_kvzhd_treaty: "The Chinese Eastern Railway Treaties"
RUS_JAP_treaty_maritime: "The Russo-Japanese Friendship Treaty"
RUS_port_arthur: "Port Arthur Leased"


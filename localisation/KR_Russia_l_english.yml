RUS_rovs_inner_line_desc: "The Inner Line constitutes the most highly classified political police force of our regime, functioning under the supervision of the Russian All-Military Union. However, it maintains such a high degree of secrecy that even the highest echelons of the Union remain partially in the dark about its operations. As long as the Inner Line remains operational, we can rest assured against the threat of terrorist activities emanating from socialist and revolutionary elements. After all, this game can be played by both sides, right?"

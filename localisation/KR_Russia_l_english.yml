RUS_drozdovite_russia_cat_desc: "The [RUS.GetRulingParty] has captured Russia not only militarily, but also politically. The New Russia under the leadership of §PAnton Turkul§! and other §hDrozdovites§! is indeed a new chapter in Her history. The degeneration of the liberal republic and the betrayal of the socialists have been replaced by an order of dedicated volunteers who are ready to build a strong and united Russia. Although everyone is against us, our regime must stand up to everyone.\n\nThe Drozdovites are currently leaning towards [RUS_drozd_fate_of_state]\nMost likely, the Zemsky Sobor will choose: [RUS_monarchist_pretender_line]."


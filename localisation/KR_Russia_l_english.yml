RUS_expand_moscow_metro: "Expand the [219.GetName] Metro"
RUS_expand_moscow_metro_desc: "Back in the 1920s, with the assistance of the German company Siemens Bauunion, the government was able to find funds for the construction of the first line of the Moscow subway. The line stretches from Ostozhenka Street to the square of Three Railway Stations. Following the plan drawn up by the Germans, we shall build new sections of the Moscow metro. The new line will stretch from Bryansky Railway Station to Kursky Railway Station through the center of the capital, passing under Red Square, where a huge transfer hub would be built for the future third line - from Rzhevsky Railway station to Paveletsky Railway Station."
RUS_build_petrograd_metro: "Build the First Section of [195.GetName] Metro"
RUS_Mechanize_Agriculture_In_State: "Mechanize Agriculture in [FROM.GetName]"


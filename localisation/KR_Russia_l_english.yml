RUS_support_chinese_faction: "Support [FROM.GetLeader] in [FROM.GetNameDef]"
RUS_support_chinese_faction_desc: "The Chinese forces under [FROM.GetLeader] have long been waging a war not just against the German and Japanese imperialists, but also against the warlords that plague their nation. In order to expand Russia's interests and to seek a China free of German and Japanese influence, the Stavka has proposed a Russian Military Mission to be sent with arms and advisors to help the forces of [FROM.GetName] in their hour of need."
RUS_trade_deal_china: "Strike a Deal with [FROM.GetLeader] in [FROM.GetName]"

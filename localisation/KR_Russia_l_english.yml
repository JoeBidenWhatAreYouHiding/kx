RUS_cult_of_volunteers_desc: "Despite General Kornilov's best endeavors in the aftermath of the Civil War, \"Volunteerism\" gradually evolved into \"Regularity\". In essence, the shortcomings of Volunteerism became evident during the period of struggle against the Bolsheviks, with forced conscription also occurring within the White armies. Despite this, if not in reality, then in principle, the spirit of Volunteerism should be upheld through active agitation and celebration of self-sacrifice and unwavering patriotism. For the Benefit of Your Homeland!"

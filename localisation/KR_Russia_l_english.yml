russianews.16.d: "Following Aleksandr Kerensky's assassination, Russia was razed by a serious political crisis. The election have been held with the Russian Social Democratic Labour Party winning the majority of votes. Russia is now closer to a period of stability and vanquished political turmoil.\nThe new Russian Chairman-Minister has announced that the Republic will need to face necessary changes, and that the world needs to become ready for the Russian Bear awakening."


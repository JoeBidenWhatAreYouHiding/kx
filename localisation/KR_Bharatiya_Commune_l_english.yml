BHC_INC_Meeting_1:0 "Special Meeting of the INC"
BHC_INC_Meeting_1_desc:0 "With Lala Lajpat Rai's term coming to an end, all of Calcutta is buzzing with excitement prior to the convening of the Indian National Congress. There it is expected a new head of state will be appointed, determining the direction of the Bharatiya Commune over the next few critical years."
BHC_totalist_1:0 "Subhas Chandra Bose"
BHC_totalist_1_desc:0 "Subhas Chandra Bose, leader of the Maximist faction, has won the appointment as the head of the Calcutta government."
BHC_speech_war:0 "'We Will Not Be Defeated'"
BHC_speech_war_desc:0 "The first order of business for Bose will be to address the nation - the Totalists are expected to take a harsh line when it comes to the Commune's advancement over the next several years. To Bose, the Bharatiya Commune has the capability of advancing its own interests and modernising its military, without dependence on outside forces, but only at incredible cost."
BHC_revoke_landlords:0 "Revoke the Landlords"
BHC_revoke_landlords_desc:0 "Not all the landlords common to India before the revolution are gone. Indeed, many of the smaller farms are still held by wealthy members of the upper castes who believe themselves untouchable by the Calcutta government. The Maximists intend to prove to them this is not so, and all of the nation's farmlands must come under a common rule and administration by the people who work on them."
BHC_nationalize_industry:0 "Organise Vital Industries"
BHC_nationalize_industry_desc:0 "While most of the nation's vital industries are nationalised, they yet remain in a sorry condition from the devastation of the civil war. The government must concentrate on restoring their productivity and organising their management so as to provide the military the support it desperately needs."
BHC_mass_conscription:0 "Rouse the Masses"
BHC_mass_conscription_desc:0 "The call must go out to the people of the Bharatiya Commune: prepare for war. Each and every man and woman must be ready to fight against the forces of colonialism and oppression, and if the price of that sacrifice is high then it must be gladly paid. India's freedom shall come with the shedding of blood, there is no way around it, but the majority of it shall not be the Commune's."
BHC_purge_army:0 "Begin the Purge"
BHC_purge_army_desc:0 "Too many of the officers in the Commune's army were once princes of the old order, or have questionable loyalties to the Commune. We cannot afford the risk that they will balk in the face of the demands which will come, and thus they must be purged from the ranks. The price will be severe, but it is a necessary risk."
BHC_rebuild_army:0 "A New Army Arises"
BHC_rebuild_army_desc:0 "With the purge of the army completed, it is time to replace what was lost - and ensure that all the officers promoted are loyal to the Maximist cause."
BHC_ready_people:0 "Total War Is upon Us"
BHC_ready_people_desc:0 "The loyalty of the Commune's people must be guaranteed - and it is not only a loyalty towards the nation, but to the Maximists. Ours is a hard road to walk, but we cannot afford the chance that those who call themselves 'moderates' or 'peacemakers' will stay our hand when decisiveness is what is called for."
BHC_syndicalist_1:0 "A. K. Fazlul Huq"
BHC_syndicalist_1_desc:0 "A. K. Fazlul Huq, leader of the Moderates faction, has won the appointment as the head of the Calcutta government."
BHC_speech_industry:0 "'Industry Is the Path to Victory'"
BHC_speech_industry_desc:0 "The first order of business with be for Huq and Nehru to address the nation - the Moderates are expected to take a realistic and gradual approach to the nation's advancement, focusing on its industrial growth and the reform of unjust policies to spur on the speed of social change. To many in the nation, this will be received with nothing short of a sigh of relief."
BHC_spread_revolution:0 "Spread the Revolution"
BHC_spread_revolution_desc:0 "Moderate attitudes to growth do not mean a surrender to the forces of colonialism and oppression which yet remain arrayed against the Commune. Towards that end, it is necessary for the government to reach out to those revolutionaries in the north and west who quietly remain, ready to act on a moment's notice."
BHC_create_raw:0 "The Research and Analysis Wing"
BHC_create_raw_desc:0 "Knowledge is our greatest weapon - knowledge of what our enemies are doing, and the ability to deceive them with misinformation. Towards that end, a new wing of the military shall be funded which will increase our intelligence capabilities throughout the sub-continent and beyond."
BHC_production_focus:0 "Focus on Production"
BHC_production_focus_desc:0 "As part of the Moderates' plan to spur on the Commune's industrial growth, several population centres have been earmarked to receive an influx of cash and construction."
BHC_technology_focus:0 "Focus on Technology"
BHC_technology_focus_desc:0 "The Moderates say that volume is not as important as quality - the Bharatiya Commune must focus on its technology above all else, making it the equal of the most advanced parts of the western world. It is the only path to victory."
BHC_arm_soldiers:0 "Arm the Soldiers"
BHC_arm_soldiers_desc:0 "The Commune has a large army, but equipping so many soldiers is a difficult task and one that will require a great deal of coordination and planning."
BHC_seek_aid:0 "Invite Great Minds from Abroad"
BHC_seek_aid_desc:0 "We cannot work alone - if we are to achieve true heights of research and technology, we must invite the brightest minds from socialist nations around the world to work closely with our scientists."
BHC_socialist_1:0 "Mohandas Karamchand Gandhi"
BHC_socialist_1_desc:0 "Mohandas Karamchand Gandhi, leader of the Agrarians faction, has won the appointment as the head of the Calcutta government."
BHC_speech_peace:0 "'There Is a Path to Peace for India'"
BHC_speech_peace_desc:0 "The first order of business will be for Gandhi to address the nation - he is expected to declare that the Bharatiya Commune is not ruled by warlords, but rather by a government that intends to put the people and their freedom above all else. The Mahatma is a revered figure in India, and the people will be elated to hear his words."
BHC_path_of_defense:0 "Focus on Defence"
BHC_path_of_defense_desc:0 "One of the principles of freedom is strength - even with the Agrarians in charge of the Commune, there are yet forces who see only enemies and will not hesitate to strike should they get the chance. The Agrarians will call on the people to resist, to support the government and its efforts with all their strength, and to rest assured that the Mahatma will guide them on the path to peace and freedom."
BHC_people_first:0 "The People of India First"
BHC_people_first_desc:0 "One of the Agrarians' priorities is to see to the welfare of India's poorest. It will require a sacrifice on the part of the government to see them elevated, but in Gandhi's own words the Commune cannot achieve victory without these desperate souls."
BHC_home_guard:0 "Create the Home Guard"
BHC_home_guard_desc:0 "Sadly, peace with the Princely Federation and the Delhi government will never be achieved through words alone. They will not listen to reason. Thus it is necessary to found a new faction within the Commune's army, one that is focused on defence as well as maintaining the peace. If the traitors of the north and west come, they must be met with stern resistance and know that we will take our pound of flesh if we must."
BHC_approach_enemy:0 "Approach the Enemy in Peace"
BHC_approach_enemy_desc:0 "It is possible that reunion with the other factions in India could be achieved. Most important is the government in Delhi - if they will listen to the Mahatma's words and agree to a summit, one without their British masters in attendance, then the Princely Federation will follow. Whether such an achievement is even possible remains to be seen."
BHC_reunite_india:0 "Begin the Lucknow Summit"
BHC_reunite_india_desc:0 "The Delhi and Calcutta governments have agreed to a summit in Lucknow, with the slimmest of chances that it might result in peaceful union. There are forces already stirring within the Commune in stark opposition to this plan, but the Mahatma believes it can be done... and, if peace is possible, then it must be done."
BHC_reform_army:0 "Reform the Commune's Army"
BHC_reform_army_desc:0 "Establishing the Home Guard is not enough. There are forces already stirring within the Commune's army which worry of the Agrarians' growing influence, and continue to push the nation towards war with the north and west even if the Mahatma is determined that the Commune not make the first move. They must be found and their support removed, even if it provokes the Maximists in Calcutta."
BHC_end_the_debate:0 "End the National Debate"
BHC_end_the_debate_desc:0 "While there will always be conflicts within the Calcutta government, it is time to draw the constant in-fighting to an end. If the Bharatiya Commune is to unite India, it must be done with all three factions hand in hand and working towards a common goal."
BHC_new_industry:0 "The New Industries"
BHC_new_industry_desc:0 "The state of our industry is lacking. We should concentrate our efforts on researching new designs for our factories."
BHC_railroad_1:0 "Expand the National Railroad"
BHC_railroad_1_desc:0 "Expanding the Commune's infrastructure is the first step towards rebuilding our economy and continuing our industrial growth."
BHC_railroad_2:0 "Further Expand the National Railroad"
BHC_railroad_2_desc:0 "The nation's infrastructure must continue to expand, as the first step towards our national recovery."
BHC_mining:0 "Expand the National Mines"
BHC_mining_desc:0 "The Bharatiya Commune is blessed with natural resources, and we must embrace new methods of mining in order to exploit them."
BHC_assam_oil:0 "Oil in Assam"
BHC_assam_oil_desc:0 "Recent explorations in the frontier provinces of Assam have revealed untapped oil deposits. India will never be one of the world's great oil producers, but this may yet prove to be a vital resource for our army and industry."
BHC_indian_elites:0 "The Question of Bengal's Elites"
BHC_indian_elites_desc:0 "One of the hindrances to the Commune's progress lies in the remnants of the old social order which yet lingers - the elite castes are not as wealthy or as powerful as they once were, but even so they hold onto what they have and refuse to share their excess with the people and the government. We must decide what measures will be taken to bring them into line, if it is even possible, before we can begin to truly grow."
BHC_civ_industry_1:0 "Build Civilian Industry"
BHC_civ_industry_1_desc:0 "Armed with new technologies, we can start building factories across our nation."
BHC_civ_industry_2:0 "Continue Building Civilian Industry"
BHC_civ_industry_2_desc:0 "We must continue to build civilian factories, to provide for our people."
BHC_mil_industry_1:0 "Build Military Industry"
BHC_mil_industry_1_desc:0 "Our military factories are currently lacking. We must dedicate our political efforts to expanding them."
BHC_mil_industry_2:0 "Continue Building Military Industry"
BHC_mil_industry_2_desc:0 "While our military production has increased, it is not nearly at a level necessary to take on the northern Dominion and the Princely Federation. We must continue to expand it."
BHC_new_economy:0 "The Economy Renewed!"
BHC_new_economy_desc:0 "At long last, we have restored the damage to our economy from the civil war and may now truly claim to be a rising industrial power, ready to take on our enemies."
BHC_army_research:0 "The Department of Research"
BHC_army_research_desc:0 "It is time to construct a department within the armed forces, one which concentrates on advancing our research capabilities."
BHC_radio:0 "Develop Radio Technology"
BHC_radio_desc:0 "Radio technology has proven elsewhere in the world to be a marvel which allows for instant communication with the army's front line. We must work towards its mastery."
BHC_electronics_1:0 "Develop Electronics"
BHC_electronics_1_desc:0 "The advent of radar and computers is essential to the Commune's future military efforts."
BHC_expand_research:0 "Expand Our Research Teams"
BHC_expand_research_desc:0 "Too many other parts of the world are outpacing our scientists. We must gather more scientists and put them to work on our behalf, to meet the coming challenges."
BHC_rocketry:0 "Develop Rocket Technology"
BHC_rocketry_desc:0 "With India reunited, we must embrace the future of warfare: rockets that can not only power our aircraft, but which can propel the most destructive of weapons."
BHC_nuclear:0 "Our Words Are Backed with Nuclear Weapons"
BHC_nuclear_desc:0 "There is a secret plan within the darkest parts of the Calcutta government, one which seeks to master the most powerful weapon known to mankind. With this in our hands, any victory is possible."
BHC_central_command:0 "Establish Our Central Command"
BHC_central_command_desc:0 "There are too many separate commands, based on the various revolutionary groups which fought in the civil war. We must bring them together under one banner, and move forward as a single force."
BHC_army_command:0 "The New Bharatiya Army"
BHC_army_command_desc:0 "Our ground forces must be a new priority, promoting those generals who can bring the greatest benefit and reforming their methods for the sake of the nation."
BHC_increase_training:0 "Establish Training Academies"
BHC_increase_training_desc:0 "New training academies are required - we must train a great number of soldiers, and quickly, if we are to ever hope for victory against our enemies."
BHC_mobility:0 "Mobility Focus"
BHC_mobility_desc:0 "Cavalry is no longer enough. We must focus on vehicle transport, and increase the mobility of our forces."
BHC_modernize_army:0 "Modernise the Army"
BHC_modernize_army_desc:0 "Indian infantrymen are numerous and loyal. Their equipment, however, is dated and inefficient. We must rectify this."
BHC_artillery_focus:0 "Modernise Our Artillery"
BHC_artillery_focus_desc:0 "The Commune's artillery mostly dates from the Weltkrieg. We must modernise our artillery unless we wish our soldiers to be eviscerated without proper support."
BHC_armored_corps_1:0 "The Bharatiya Armoured Corps"
BHC_armored_corps_1_desc:0 "Providing our troops with armoured vehicles will give us a distinct edge in facing off against our enemies."
BHC_armored_corps_2:0 "Expand the Bharatiya Armoured Corps"
BHC_armored_corps_2_desc:0 "We must continue to expand our armoured corps, to maintain a competitive edge against our enemies."
BHC_centralize_supply:0 "Centralise the Army's Supply"
BHC_centralize_supply_desc:0 "Supplying our ground forces comes from many different industries - we must combine and organise them, to maximise our efficiency and ensure the army is given the greatest advantage."
BHC_adv_command_1:0 "Rule the Ground"
BHC_adv_command_1_desc:0 "Our primary focus is on our army - yes, this may come at the expense of our navy and air capabilities, but the Commune must recognise where its strength lies and maximise its effectiveness."
BHC_air_command:0 "Establish the Air Branch"
BHC_air_command_desc:0 "Nothing remains of the meagre air force the Commune wielded during the Weltkrieg. We must rebuild it from scratch, and this begins with the establishment of a new air command."
BHC_air_training:0 "The Cuttack Air Academy"
BHC_air_training_desc:0 "The first step in rebuilding our air force is the creation of an air academy, one which can train our future airmen for the battles to come."
BHC_fighter_focus:0 "Fighter Focus"
BHC_fighter_focus_desc:0 "We should focus on building fighters, to keep the air clear of enemies."
BHC_bomber_focus:0 "Bomber Focus"
BHC_bomber_focus_desc:0 "We should focus on building bombers, to destroy our enemies from above!"
BHC_airborne:0 "Establish the Red Lions Air Corps"
BHC_airborne_desc:0 "A proposal from one of our retired air marshals has provided the opportunity to establish a force of paratroopers - it will be an expensive endeavour, but what better way to surprise our foes than by dropping behind their lines?"
BHC_CAS_focus:0 "CAS Focus"
BHC_CAS_focus_desc:0 "Close air support allows us to strafe enemy units during battles with frightening accuracy, giving us a large edge on our opponents."
BHC_air_production:0 "Expand Our Air Production"
BHC_air_production_desc:0 "Rebuilding our air force will require expanding and organising our factories for this sole purpose."
BHC_adv_command_2:0 "Rule the Air"
BHC_adv_command_2_desc:0 "Our primary focus is on our air force - yes, this may come at the expense of our navy and ground capabilities, but the Commune must recognise where its strength lies and maximise its effectiveness."
BHC_navy_command:0 "Establish the Naval Command"
BHC_navy_command_desc:0 "Not a single ship remained under our command after the civil war, and this leaves our coasts wide open to assault. We must establish a new naval command, and do whatever we can to guard ourselves from attack by the sea."
BHC_calcutta_dockyard:0 "The Calcutta Shipyards"
BHC_calcutta_dockyard_desc:0 "The shipbuilding facilities in Calcutta are sorely out of date. They must be updated and expanded, ready to build a new Bharatiya fleet."
BHC_submarine_focus:0 "Submarine Focus"
BHC_submarine_focus_desc:0 "Submarines are an excellent way to disrupt enemy convoys. We should construct as many as possible."
BHC_destroyer_focus:0 "Destroyer Focus"
BHC_destroyer_focus_desc:0 "Destroyers are effective at destroying enemy submarines. We should ensure our shipping is safe by constructing as many of these as possible."
BHC_red_marines:0 "Establish the Bharatiya Marines"
BHC_red_marines_desc:0 "One proposal within the government would have us concentrate not on defending ourselves from sea assault, but in establishing a force of marines capable of attacking the coasts of our enemies. It is an interesting idea, and one that has merit if our fleet is worthy enough to support it."
BHC_protect_coasts:0 "Protect the Commune's Coasts"
BHC_protect_coasts_desc:0 "Our focus must be on defending our vital ports, and to that end we must erect fortresses on the coast to ensure they can be protected from seaborne attack."
BHC_expand_dockyard:0 "Expand the Calcutta Shipyards"
BHC_expand_dockyard_desc:0 "A concerted effort must be made to expand the Calcutta shipyards once again. Our shipbuilding efforts are our only hope of strength on the high seas!"
BHC_adv_command_3:0 "Rule the Seas"
BHC_adv_command_3_desc:0 "Our primary focus is on our navy - yes, this may come at the expense of our army and air capabilities, but the Commune must recognise where its strength lies and maximise its effectiveness."
BHC_third_internationale:0 "The Third Internationale"
BHC_third_internationale_desc:0 "The Ninth Congress of the Third Internationale is soon to be called, and our attendance may mean our only chance at obtaining aid from syndicalist nations abroad."
#BHC_invite_hochiminh:0 "Invite Ho Chi Minh"
#BHC_invite_hochiminh_desc:0 "In Paris, a group of Indochinese revolutionaries under the leadership of Nguyen Sinh Con, also known as Ho Chi Minh, have announced their decision to form a united leftist government in exile whose declared goal is to topple German colonial rule. It has been suggested that our government invite Ho Chi Minh and his comrades to Calcutta and place all available resources at their disposal."
BHC_anglo_indian_trade:0 "The Anglo-Indian Trade Agreement"
BHC_anglo_indian_trade_desc:0 "A proposal has been presented aimed at systematising and streamlining the socialist Anglo-Indian cooperation - granting the Indian government vital assistance in industrial and martial matters whilst securing the people and government of Britain a steady flow of exotic goods such as bananas, rubber and - most importantly - unrestricted access to the tea plantations of Assam."
BHC_aid_from_britain:0 "Seek Aid from Britain"
BHC_aid_from_britain_desc:0 "The Union of Britain promised us military assistance at the recent Congress meeting - now we must see what they can provide."
BHC_aid_from_france:0 "Seek Aid from France"
BHC_aid_from_france_desc:0 "The Commune of France promised us military assistance at the recent Congress meeting - now we must see what they can provide."
BHC_war_prepare:0 "The Final Showdown"
BHC_war_prepare_desc:0 "It is inevitable that we will face both the Dominion of Delhi and the Princely Federation at some point in the near future. We should ensure we are as strong as possible before proceeding."
BHC_north_border:0 "Prepare the Northern Border"
BHC_north_border_desc:0 "We now look north towards the Dominion, and must prepare our northern border for the war of attrition surely to come."
BHC_attack_delhi:0 "Take Delhi"
BHC_attack_delhi_desc:0 "The traitors to the north have too long been a threat. We must strike pre-emptively, with the element of surprise!"
BHC_delhi_rebellion:0 "Socialists of the North Unite!"
BHC_delhi_rebellion_desc:0 "Simply attacking the north may not be enough - it may be risky, but we could also contact socialist elements within the Dominion and get them to rise up even as we attack. It would raise the possibility of Dominion forces being harassed behind their own lines. There is, however, the chance our plans could be betrayed, and our enemies given advance notice of our attack."
BHC_west_border:0 "Prepare the Western Border"
BHC_west_border_desc:0 "We now look west towards the Princely Federation, and must prepare our northern border for the war of attrition surely to come."
BHC_attack_prf:0 "Take Hyderabad"
BHC_attack_prf_desc:0 "The decadent princes of the west have too long been a threat. We must strike pre-emptively, with the element of surprise!"
BHC_prf_rebellion:0 "Socialists of the West Unite!"
BHC_prf_rebellion_desc:0 "Simply attacking the west may not be enough - it may be risky, but we could also contact socialist elements within the Princely Federation and get them to rise up even as we attack. It would raise the possibility of Princely forces being harassed behind their own lines. There is, however, the chance our plans could be betrayed, and our enemies given advance notice of our attack."
BHC_unite_india:0 "India United"
BHC_unite_india_desc:0 "Jai Hind! The subcontinent is once again ours! Now what?"
BHC_special_INC_meeting:0 "Call a Meeting of the INC"
BHC_special_INC_meeting_desc:0 "With India united, the first order of business will be to gather a special session of the Indian National Congress to determine how we will approach the governance of the nation as a whole. With this comes a new election for head of state. It will be an important day, and one that determines what the future direction of a united India will look like."
BHC_bhutan:0 "Claim Tawang"
BHC_bhutan_desc:0 "The mountainous frontier territory known as Tawang is rightfully ours, and was seized by the traitorous Bhutanese during the chaos of the Weltkrieg. It is time to reassert our domain over the area, now that a true national government has been re-established."
BHC_nepal:0 "Our Claims Against Nepal"
BHC_nepal_desc:0 "Nepal expanded into the Indian lowlands in the chaos following the Weltkrieg. It is time to reassert our domain over those territories."
BHC_madras:0 "Integrating the Deccan States"
BHC_madras_desc:0 "The nations of southern India must either join India willingly or be conquered - the choice is theirs."
BHC_claim_goa:0 "Claim Goa"
BHC_claim_goa_desc:0 "The enclave of Goa is nothing more than a burr on the side of our proud nation. It is rightfully our territory, and must be returned."
BHC_burma:0 "Integrating Burma"
BHC_burma_desc:0 "The eastern realm of Burma was once part of the Raj, and the time has come to incorporate it into our expanding realm."
BHC_siam:0 "The Burmese Territory in Siam"
BHC_siam_desc:0 "The Siamese Kingdom was one of the more opportunistic of the 'Vulture States' that exploited the disorder of the Raj's demise. With the young Burmese nation hard-pressed by the socialist uprisings in Assam and Bengal, the government of Siam simply occupied several districts and prefectures, including the city of Moulmein - mentioned in Kipling's famous poem. These lands must be returned!"
BHC_indochina:0 "The Revolution in Indochina"
BHC_indochina_desc:0 "Indochina is one of the nearest examples of continued European colonialism, having been conquered by the French at the turn of the last century, before being handed over to the Germans after the Entente's defeat in the Weltkrieg. We must initiate support for the leftist and anti-colonialist movements within Indochina."
BHC_ceylon:0 "Claim Ceylon"
BHC_ceylon_desc:0 "By rights, Ceylon and the Andaman Islands are part of our nation's rightful territory. Their colonialism must come to an end."
BHC_red_raj:0 "The Place of the Red Raj"
BHC_red_raj_desc:0 "With India united behind the Calcutta government and the provinces of the pretender governments brought under Socialist administration, the cabinet has begun to debate what course we should take internationally."
BHC_new_india:0 "A Red India Arises"
BHC_new_india_desc:0 "It is time to announce to the world that India has been united under a socialist banner, and that we will be champions of workers here and abroad. Our people must be united in this common cause, no matter whether they fought for our revolution or against it - the die has been cast."
BHC_unite_minds:0 "Our Greatest Minds Combined"
BHC_unite_minds_desc:0 "There are many great minds among the Indians in the rest of the sub-continent. We must find the ones who are willing to be loyal to their new government and put them to work in expanding our scientific capabilities."
BHC_delhi_officers:0 "Fate of the Delhi Officers"
BHC_delhi_officers_desc:0 "The first order of business is dealing with the officers of the defeated Dominion of Delhi. Do we give them a place in our nation? Or retire them before they can cause further trouble?"
BHC_integrate_ganges:0 "Integrating the Gangetic Plain"
BHC_integrate_ganges_desc:0 "The Gangetic plain is the main economic artery for Indian commerce and industry. The sooner these people come under the complete control of Calcutta the better."
BHC_integrate_northwest:0 "Integrating the Northwest"
BHC_integrate_northwest_desc:0 "The North-western provinces of India have been a stronghold of petty bourgeoisie interests mixed with several reactionary princely states. The traders and industrialists of Karachi and the Punjab particularly seem to oppose any radical change to the economic and societal changes we propose. We must tread carefully in order to secure their loyalty... or be forceful..."
BHC_princely_officers:0 "Fate of the Princely Officers"
BHC_princely_officers_desc:0 "The first order of business is dealing with the officers of the defeated Princely Federation. Do we give them a place in our nation? Or retire them before they can make further trouble?"
BHC_integrate_bombay:0 "Integrating the Bombay Presidency"
BHC_integrate_bombay_desc:0 "In the former Bombay Presidency there's a strong labour movement in Bombay city itself. This will be valuable when commencing our process of integration, although the interior villages and cities have a more conservative streak. Nevertheless, we must decide upon a course of action when it comes to the process of integration."
BHC_integrate_deccan:0 "Integrating the Deccan States"
BHC_integrate_deccan_desc:0 "The southern princely states were always somewhat politically detached from the federal government in Hyderabad. This makes it harder for us to establish an efficient central administration. Nevertheless, that is what we will have to achieve."

### Decisions ###
BHC_intervene_in_india:0 "Intervene in India"
BHC_intervene_in_india_desc:0 "The time has come to assist [BHC.GetNameDef] in retaking the Indian subcontinent, and if they come out victorious we shall surely be rewarded with their loyalty.\n§RWarning: Coming to the aid of any one of the Indian states will almost certainly lead to the other sides of the civil war calling in any allies they may have!§!"

### Events ###
azadhind.1.t:0 "The Azad Hind Situation"
azadhind.1.d:0 "In the latter part of the 19th century a group of Indian lawyers convened at the Indian National Congress acting as a pressure group to create dialogue with the British Raj, the goal being self-rule or ‘Swaraj’ within the colonial government akin to the Englishman governed. However, the Congress began nationalist agitations opposing the partition of Bengal which came two decades later, making way for moderate political reform, which the moderate Congress welcomed. In the outbreak of the Weltkrieg, Congress quickly turned into a mass organization as Gandhi joined the ranks, bringing his experience from South Africa as an activist for the Indian community.\n\nThings took a more radical turn, as Britain’s total defeat in the Weltkrieg brought with it social and economic upheaval, causing mass unrest throughout the subcontinent leading to a rise of terrorism and agitation. This led to the tyrannical Rowlatt Act, which only angered the public. As a response, Gandhi led many non-violent campaigns, the most significant of all would be the Non-Cooperation Movement in 1920, consisting of boycotts of local elections and foreign goods. For the first time since the Mutiny in 1857, the British Raj was shaken to its very core which brought the Congress to the forefront of the nationalist movement. Despite this growing nationalist sentiment, Gandhi abruptly stopped the campaign in 1922 after a series of violent incidents culminating in the Chauri-Chaura Massacre. This move infuriated many members of Congress which subsequently led to the formation of splinter groups, such as the Swaraj Party and the Hindustan Socialist Republican Army to resume the fight for self-rule using their own methods, as Congress returns to constructive work.\n\nAfter 2 years of dormancy, the Congress regained crucial ground at the eve of the British Revolution. After pressure from radicals that stayed in Congress led by rising stars of the youth guard such as Jawaharlal Nehru and Subhas Bose, Gandhi approved a resolution that called for total self-rule or, Purna-Swaraj, and reunited with the Swaraj party. This time, with the lessons learned from previous campaigns, Congress was determined to finally free India from the British yoke."
azadhind.1.a:0 "Interesting."


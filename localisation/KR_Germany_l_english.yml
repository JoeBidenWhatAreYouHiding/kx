GER_Mangrove_Logging:0 "[BRM.GetFlag]Expansion in the Irrawaddy Delta"
GER_Mangrove_Logging_desc:0 "Although a densly populated area of great importance for rice cultivation, the Irrawaddy Delta suffers from a lack of any serious industry or major towns. If we were to help the Burmese government in pursuing a more effective way of mangrove logging and fishing, then perhaps the outer zones could be utilized for an industrial expansion fit for the twentieth century. Furthermore, additional canals could be built to alleviate the strain on the Twante Canal connecting Rangoon and the Irrawaddy Delta."
GER_Rangoon_Safari:0 "[BRM.GetFlag]The Grand Imperial Safari"
GER_Rangoon_Safari_desc:0 "While Burma is a land of stunning landscapes and temples - as chronicled in a 1897 book by Mrs. Ernest Hart called 'Picturesque Burma, Past and Present' - what truly thrilled the British Victorian readers were tall tales of deer-eating pythons, great communities of apes on the river banks, and even domesticated reptiles fed on rice and eggs. Providing a boon to local communities willing to participate in the endeavour, we shall establish ways for the wealthier citizens of Germany to discover those mesmerizing animals, and even have a chance to hunt them down in a true display of Eastern safari might and sharpshooter acumen."


GER_expand_windhoek:0 "[MAF.GetFlag]The Many Burgs of Windhuk"
GER_expand_windhoek_desc:0 "Südwestafrika has been blessed by the genius of Wilhelm Sander, a master architect contracted to design many magnificent buildings across our furthest territory in Afrika. While there are many notable examples of his work, the 'Castles' in the capital of South West Africa are a true wonder - a miniaturized taste of European brilliance on the Dark Continent. Unfortunately, Sander died in 1930 but his plans live on thanks to his helpers, the ones that are now offering their services in bringing the Winduk-Burgs to all corners of our colonial federation."

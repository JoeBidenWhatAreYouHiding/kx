## Starting Ideas
GER_Reichstag_Powderkeg:0 "The Reichstag Powder Keg"
GER_Reichstag_Powderkeg_desc:0 "The Kaiser's Easter Promises had brought a ray of hope to those still waiting for reforms to the ancient Prussian Three-Class Franchise, virtually unchanged for almost a full century, but those promises are now history of their own. Through the Ludendorff Dictatorship to Tirpitz's Grand Coalition, little attention has been paid to directly answering the question of electoral reform in either direction, and this has resulted in the populace feeling boiling resentment.\n\nEnjoying the gunpowder-in-the-air is an array of far-right groups that take advantage of the paranoia more conservative members of society feel over possible changes, pushing them further towards reactionary thinking, while others use the tension as a vessel to spread revolutionary rhetoric.\n\n§RThe political situation is quickly becoming untenable, and so the government must pick its path soon and stay on it, lest it invite chaos into the streets.§!"

GER_quenched_militarism:0 "Quenched Militarism"
GER_quenched_militarism_desc:0 "The Kaiserreich's laurel wreath at the end of the Weltkrieg was bought at the price of over two million German lives, and it is a cost that has still remained hard for the people to stomach despite nationalist euphoria. While it has been long enough for a new generation to begin to take hold as the youth of Germany, there are many who recall never seeing their sons return home, and they wish to never suffer such a sensation ever again.\n\nWhile the military has yet to begin especially hurting in its recruitment targets, the once dominant thirst for war that was Prussian militarism has been slaked in the minds of the people, and it will take either a war of survival or a remarkably well-done round of propaganda and cultural renewal to bring that thirst back."

GER_quenched_militarism2:0 "Roused Militarism"
GER_quenched_militarism2_desc:0 "The memories of the trenches still haunt many, but time and rhetoric have begun to dull their sting. The old virtues of service, discipline, and sacrifice are once more being painted as noble - even necessary - qualities of citizenship in the newspapers who report of syndicalist barbarism taking root in far off conflicts. Lecturers speak of duty and destiny, and veterans are being recast as exemplars of endurance rather than victims of slaughter.\n\nThe people may not yet be ready to march willingly into another war, but they are beginning to see the soldier not as a relic of a darker age, but as the guardian of the Fatherland. The embers of pride smolder again beneath the ash of grief and with patience, they may yet be fanned into flame that will be able to incinerate the challenges to come."

GER_quenched_militarism3:0 "Awoken Militarism"
GER_quenched_militarism3_desc:0 "Across the Fatherland, the drumbeat of a national revival grows louder. Pamphlets, parades, and patriotic education have begun to bear fruit: the youth no longer cry bitter tears with poems of the Weltkrieg, but remember the test of manhood and destiny that defined the previous generation. The officer’s uniform has regained its old prestige, and the army is once again regarded as the highest expression of discipline and national unity as it did in the Prussia of old.\n\nWhile the spirit of 1914 has not yet fully been reborn, the anticipation for a new chance to show Germany’s greatness through struggle is palpable. The nation’s martial heart, once subdued by sorrow, beats strong again; such a heart is steady, proud, and ready to serve when called upon."

GER_renewed_militarism:0 "Renewed Militarism"
GER_renewed_militarism_desc:0 "The slumbering spirit of Prussian excellence has fully reawakened across the empire’s dominions. The doubts that once haunted the nation - the fear of loss and the shame of the trenches - have been replaced by an unyielding conviction that Germany’s destiny lies in strength. The call of militarism is no longer seen as a curse upon the national soul, but as its defining virtue and sacred duty. The madness of war is no longer decried by insolent writers and pacifists; instead, the discipline and industry of a martial people are once more exalted.\n\nThe banners of the Fatherland again command reverence. Young men compete for a place in the ranks, and the people speak of sacrifice not with dread, but with pride. The German race remembers its calling — to defend, to conquer, and to endure. Through renewed militarism, the Reich stands united in purpose, prepared to shape its own fate once more."


gerdom.30.t:0 "The 1951 Elections End"
gerdom.30.d:0 "A new decade brings with it new opportunities. It also brings along a new election cycle, the second of its kind since the passing of Kaiser Wilhelm II. It has been fifteen years since the 1936 elections - a period by which some historians have begun to refer to as the interwar period, marking the rise of tensions around the world until it ultimately culminated into the Second Weltkrieg, a conflict far more devastating than anyone could have hypothesised. Much has changed since then, globally and within Germany itself. A new generation of Germans have since been raised in a world much different than the world of their parents. Their ideas and beliefs are what will shape Germany for years to come, especially as the stragglers of the Old Order finally release the reigns. It is by no means any easier for them, of course. No matter how things come to pass, there will always be a new challenge to face, another hill to climb, a new day to stand tall for./n/nThe hardships of the Weltkriegs have passed by, and the Reichsadler still soars high. Though the scars of war still haunt us, we are steadied by our national resolve and we are ready to face the future, whatever it may bring. Of course, there must be a political government trusted by the people to light the way. The ballots were cast, and the polls closed. The results are in. The winners of this year’s nation is..."
gerdom.30.a:0 "SPD"
gerdom.30.b:0 "FVP"
gerdom.30.c:0 "NLP"
gerdom.30.e:0 "Zentrum"
gerdom.30.f:0 "DkP"
gerdom.30.g:0 "DVLP"


gerdom.3004.a:0 "Heinrich Brüning and the rest of the Zentrum Left."
gerdom.3004.b:0 "Franz von Papen is very charming!"
gerdom.3004.c:0 "Kaas should help appease our Catholic population."
gerdom.3004.e:0 "Konrad Adenauer is picking up where Kaas left off."

gerdom.3005.t:0 "A New Reichskanzler?" #DkP
gerdom.3005.d:0 "The Deutschkonservative Partei has come out as the winner of the elections! The Kaiser must now appoint a chancellor from the SPD, and there are a few figures which can take that role."
gerdom.3005.a:0 "Westarp has proven himself, he's appointed!"
gerdom.3005.b:0 "The lion roars! Appoint Lettow-Vorbeck!"
gerdom.3005.c:0 "Schlange-Schöningen can help keep our empire great!"
gerdom.3005.e:0 "The Red Baron shall guide the nation."

gerdom.3006.t:0 "A New Reichskanzler?" #DVLP
gerdom.3006.d:0 "The Deutsche Vaterlandspartei has come out as the winner of the elections! The Kaiser must now appoint a chancellor from the SPD, and there are a few figures which can take that role."
gerdom.3006.a:0 "Hugenberg's gambits seem to have finally paid off."
gerdom.3006.b:0 "Kurt von Schleicher is maintaining the Kaiser's confidence."
gerdom.3006.c:0 "Moeller van den Bruck de facto remains in control."
gerdom.3006.e:0 "Carl Friedrich Goerdeler's tenure continues smoothly."

gerdom.43.t:0 "Germany and the Papacy"
gerdom.43.d:0 "The history between Germany and the Papacy has been one with quite a few bumps in the road. Of course, the impact and lasting relations of the Kulturkampf is still felt even today, and it has left a bitter taste in our relations with the Catholic Church today. Today, however, Reichskanzler Kaas has arrived in the Vatican on a mission to improve relations with Rome, and the Pope by extension. The extent of this effort now depends on what we wish to achieve from this meeting. Do we wish to start anew with the Holy Father and strengthen our ties with the Catholic Church, perhaps going so far as to invest into our more Catholic regions as a sign of good faith, or instead maintain a steady and formal relationship? Although the former may grant us a potential ally within the Italian peninsula, it may alienate our coalition partners who see a closer relation to the church as a betrayal of our heritage and nationalist ideals. They might even act against our interests in regard to future legislation if we do go ahead with this option."
gerdom.43.a:0 "A cordial relationship is enough."
gerdom.43.b:0 "Announce our support for the Pope!"
gerdom.43.c:0 "Support the Catholic Church and invest in our Catholic regions."

gerdom.47.t:0 "The Death of Wilhelm II"
gerdom.47.d_GER:0 "The entire globe stood still for just a split second today, as the soul of our beloved Kaiser Wilhelm II, the Great, the victor of the Weltkrieg, master of an Empire spanning all corners and countless subjects, departed towards the God in Heaven after a period of illness and lung issues which confined him to intensive care in Berlin’s best hospitals. Born on 27 January 1859 as Friedrich Wilhelm Viktor Albert von Hohenzollern, he was thrust onto the Imperial throne following the unfortunate passing of his father, Frederick III, not even a hundred days into his reign. Beginning his journey on 15 June 1888 as the monarch of Europe’s sole superpower which survived largely unscathed into modern times, the era of Wilhelm II will be remembered for the grandest figures and the most monumental of events. Despite certain failures and very strong-handed mannerism when it came to politics both domestic and foreign, the people of Germany are mourning their long-time national father, one whose name even the angels in heaven shall sing - marking the disappearance of the last beacon of nineteenth century stability in the madness of the twentieth century, for better or for worse.\n\nAll over the Empire, flags are flying at half-mast, and public ceremonies are being organised to honor the Weltkriegskaiser, the man who won the future for Germany. The responsibility to uphold the Weltreich now falls onto the shoulders of Kronprinz Friedrich Wilhelm."
gerdom.47.d_GEX:0 "The entire globe stood still for just a split second today, as the soul of our beloved Kaiser Wilhelm II the Great, the victor of the Weltkrieg, departed towards the God in Heaven after a period of illness and lung issues which confined him to intensive care. Born on 27 January 1859 as Friedrich Wilhelm Viktor Albert von Hohenzollern, he was thrust onto the Imperial throne following the unfortunate passing of his father, Frederick III, not even a hundred days into his reign. Beginning his journey on 15 June 1888 as the monarch of Europe’s superpower, the era of Wilhelm II will be remembered for the grandest figures and the most monumental of events. Despite certain failures and very strong-handed mannerism when it came to politics both domestic and foreign, the people of Germany are mourning their long-time national father, one whose name even the angels in heaven shall sing - marking the disappearance of the last beacon of nineteenth century stability in the madness of the twentieth century, for better or for worse.\n\nDespite Wilhelm being unable to depart from the mortal coil on his native soil, the exiled administration has done everything in its power to ensure that wherever loyal subjects of the Kaiser are, the flags are flying at half-mast and public ceremonies can take place to honor the Weltkriegskaiser. The responsibility to regain the Imperial core shall now fall onto Kronprinz Friedrich Wilhelm, an arduous task indeed."
gerdom.47.a:0 "The Kaiser is dead! Long live Kaiser Wilhelm III!"

gerdom.84.t:0 "The Coronation of Wilhelm III"
gerdom.84_GER.d:0 "As the period of national mourning comes to an end, the death of one Kaiser must, as the laws binding our monarchy together dictate, be followed by the enthronization of his successor. Friedrich Wilhelm Victor August Ernst von Hohenzollern has certainly waited for a very long time since his birth on 6 May 1882 to ascend to the rulership of the German Empire. Although many would be quick to claim that Wilhelm III will, undoubtedly, be overshadowed by the long reign of his father, the venerable Crown Prince turned Emperor still has a monumental task before him. From being known as an ardent supporter of his friend Kurt von Schleicher, as well as a passionate lover of football, Friedrich Wilhelm will now have to oversee an era which sees the Kaiserreich not as a hungry and ambitious power, but more as the guardian of the old order, besieged by barbarians on all sides. Only time will tell if his reign shall be as glorious as that of Wilhelm II, the Great."
gerdom.84_GEX.d:0 "As the period of national mourning comes to an end, the death of one Kaiser must, as the laws binding our monarchy together dictate, be followed by the enthronization of his successor. Friedrich Wilhelm Victor August Ernst von Hohenzollern has certainly waited for a very long time since his birth on 6 May 1882 to ascend to the rulership of the German Empire - the remnants of it that he finds himself in. Although many would be quick to claim that Wilhelm III will, undoubtedly, be overshadowed by the long reign of his father, the venerable Crown Prince turned Emperor still has a monumental task before him. From being known as an ardent supporter of his friend Kurt von Schleicher, as well as a passionate lover of football, Friedrich Wilhelm will now have to oversee the greatest mission any denizen of our land was ever tasked with not even since the days of ancient heroes like Hermann der Cherusker. The Kaiserreich was banished from Deutschland, but it has not died, and as long as the Hohenzollern line survives and brave men and women swear fealty upon its crown the overconfident barbarians will be, ultimately, vanquished. Only time will tell if Wilhelm III manages to wipe away the final mistakes of his father’s reign."
gerdom.84.a:0 "Heil dir im Siegerkranz!"

gerdom.101.t:0 "The Great Crusade"
gerdom.101.d:0 "Ever since the French Civil War and the ouster of the Third Republic from the so-called \"Metropole\", the conservative and völkist elements on the German political scene have been demanding immediate action against the Communard menace. However, the \"Second Great French Revolution\" roughly coincided with our intervention in the East to stabilize the gains of Brest-Litovsk. That, combined with the general war weariness and a sense of accomplishment following the Weltkrieg meant no one, not even Kaiser Wilhelm himself, wanted to get bogged down into an internal conflict with the Frenchmen. The sense of an impending clash and necessity to prepare for the inevitable crusade to the West would, ultimately, spill out onto the rest of the population and the parties representing it, especially following the downfall of the Windsor crown.\n\nToday, we find ourselves facing the scenario which many have awaited with bated breath since the Black Monday crisis. The Second Weltkrieg is upon us, and all under the Emperor's domain have coalesced into a singular purpose - emboldened by a renewed spirit of August 1914 and the Burgfrieden. We shall not rest until the enemies of Germany, the vile zealots of a revolution run mad who wish nothing less than the total annihilation of our nation as a whole, shall be put to the sword of historical destiny."
gerdom.101.a:0 "Gott erhalte den Kaiser! Der Sieg wird unser sein!"

gerdom.102.t:0 "The Sin of Mercy"
gerdom.102.d:0 "Doom; cry out those within the Heer who have seemingly \"prophesized\" that our government's lackluster efforts to stamp out the spirit of pacifism and the notion of resting on one's laurels would strike the Empire at its most dire. Taught by the experiences of the First Weltkrieg and its prolonged length, we cannot allow ourselves to be gripped by desertion and unwillingness to carry out basic orders. Certain elements of German society might not be comfortable with our course of action, but the highest necessity of all - that to achieve ultimate victory over those wishing to obliterate the Kaiser's realm -  requires us to do whatever it takes.\n\nAnti-war sentiments, pacifism, calls for civil disobedience, and any other efforts to stifle the victorious march of our armies shall be met with an uncompromising response. Those who wish to seep the venom of treachery among our ranks have to be prepared to be \"forcefully retired\", exiled, or worse. Their puppet-masters in Paris would not have any mercy on us if given the opportunity, and thus we shall not have any on their lackies within the bounds of Imperial control."
gerdom.102.a:0 "A world bathed in misery."

gerdom.103.t:0 "Beasts of an Odd Origin"
gerdom.103.d:0 "As German industry currently struggles to churn out enough vehicles to satiate the needs of the front, as attrition and constant combat remains a fact of war, ingenious and desperate officers have been taking to drastic measures to remain combat capable. Staff cars can be seen covered in foliage taken from the side of the road, logistic trucks are often mounted with AA guns to stop syndicalist air raids, and armoured vehicles are oftentimes strapped with all manner of strange gadgets to counter French attacks. Although at first simply praised as an example of German frontline ingenuity, the fact that the situation on the front has remained precarious enough to ensure the growing sight of these rag-tag measures has sent worries through the chain of command. Due to syndicalist resilience and the ferocity of the conflict so far, Armoured formations often lack their intended combat vehicles, formations supposed to be motorized sometimes have to be guided along via requisitioned horses and donkeys, and artillery regiments find their batteries stuck throughout the countryside, due to a lack of artillery prime movers.\n\nIt is in this climate that the bright bulb of Alfred Becker has shined the brightest, having miraculously been able to motorize and indeed mechanize his artillery battery via the use of captured vehicles, now having been tasked by his direct superiors to somehow motorize the entire regiment.\n\nAlfred Becker, born and raised in Krefeld by the Rhine river, served in the First Weltkrieg at the ripe age of 15, rising through the ranks to become a battery commander, fighting at both Cambrai and Verdun, as well as all manner of smaller-yet nevertheless apocalyptic-confrontations. Following the war Becker achieved a doctorate in mechanical engineering, forming and working in companies sprinkled all throughout the industrial heartland of Germany. It is thanks to the connections made through his business life, as well as thanks to his own inherent ingenuity, that he's been able to aid the German war effort properly: By converting captured French equipment. Able to procure steel plating from his business contacts, and with his subordinates also from engineering backgrounds, Becker has turned his once cart pulled battery into a mechanized company, captured tanks having seen their turrets removed, a casemate installed, and an infantry gun strapped on top. Although oftentimes looking like macabre art installations, Becker's battery have achieved great things following their mechanization, able to support infantry attacks from close range, rapidly redeploying here and there at the drop of a hat, all without wasting German industrial might."
gerdom.103.a:0 "What's next, rockets on tanks?"

## Rhenish Syndicalist Volunteers

gerdom.200.t:0 "The German Role in the World Revolution"
gerdom.200.d:0 "Ever since the failure of the November Uprisings, the syndicalist cause in the Kaiserreich has been neutered and forced underground into organization or intellectual debates that go nowhere. Even the Rhineland, home to millions of workers, has not manifested any meaningful leftist resistance to the regime in Berlin, much to the delight of the government. The rest of the world, however, is not so complacent with the present dominance of "international capital", and so civil wars and revolutions of all sorts have sprung up across the globe.\n\nSeeing all of this chaos as opportunity, leftist paramilitary leader Wilhelm Zaisser has initiated the creation of a German "International Division" that would participate in one of the ongoing conflicts abroad. He now proclaims to the few followers he has that German participation in the world revolution, and the shedding of their blood in that process, will show that the German people are not completely lost to the whims of the Kaiser. The Reich Security agencies, meanwhile, seem more than willing to turn a blind eye to Zaisser's "brigade" leaving the country, assuredly hoping that he and the rest of his brethren die in bitter conflicts elsewhere.\n\nOf course, Zaisser could always just stay in Germany, and fruitlessly organize for a red revolution that will never truly manifest. Regardless, his men await his command, wherever in the world it may lead them."
gerdom.200.aa:0 ""America must be tamed to topple capitalism.""
gerdom.200.ab:0 ""The Argentinian people ache for their chains to be broken.""
gerdom.200.ad:0 ""The socialist cause in Moscow cannot fail this time!""
gerdom.200.ae:0 ""Spain is a pivotal step in Europe's liberation.""
gerdom.200.af:0 ""Actually, it's best to stay in Germany.""

gerdom.201.t:0 "German Volunteers Arrive in America"
gerdom.201.d:0 "Two German volunteer divisions, headed by the paramilitary leader Wilhelm Zaisser and other figures of the German Syndicalist scene, have arrived to support us in our struggle!"
gerdom.201.a:0 "Die Internationale erkämpft das Menschenrecht!"

gerdom.202.t:0 "German Volunteers Arrive in Brazil"
gerdom.202.d:0 "Two German volunteer divisions, headed by the paramilitary leader Wilhelm Zaisser and other figures of the German Syndicalist scene, have arrived to support us in our struggle!"
gerdom.202.a:0 "Die Internationale erkämpft das Menschenrecht!"

gerdom.203.t:0 "German Volunteers Arrive in Russia"
gerdom.203.d:0 "Two German volunteer divisions, headed by the paramilitary leader Wilhelm Zaisser and other figures of the German Syndicalist scene, have arrived to support us in our struggle!"
gerdom.203.a:0 "Die Internationale erkämpft das Menschenrecht!"

gerdom.204.t:0 "German Volunteers Arrive in Spain"
gerdom.204.d:0 "Two German volunteer divisions, headed by the paramilitary leader Wilhelm Zaisser and other figures of the German Syndicalist scene, have arrived to support us in our struggle!"
gerdom.204.a:0 "Die Internationale erkämpft das Menschenrecht!"

gerdom.205.t:0 "Calm in the Rhineland"
gerdom.205.d:0 "With a number of prominent Syndicalists out of the country and allowed to fight, and hopefully die, in foreign lands, tensions in our lands have decreased greatly without their malign influence. The Rhineland is finally seeing some peace and quiet."
gerdom.205.a:0 "Let's hope things stay this way."

## Flag Picker Event

gerdom.211.t:0 "Pick-A-Flag"
gerdom.211.d:0 "Welcome to the German Flag Shop, pick your flavor!"
gerdom.211.a:0 "I'll take the classic Reichskriegsflagge."
gerdom.211.b:0 "I will have one order of the black-white-red Tricolor."

gerdom.212.t:0 "Dusting Off the Kolonialreich"
gerdom.212.d:0 "Following the end of the Weltkrieg and the collapse of France and the United Kingdom as the world knew them, the people of Germany achieved one of their most ambitious dreams - a wish that even the Kaiser himself kept close to his heart. Imperial authority became like the Sun, touching anywhere on the globe where its rays were cast, ensuring that our late entry and nascent projects in Africa and Asia blossomed into a grandiose Kolonialreich. However, all is not well across the vast domains tethered to the heart in Berlin.\n\nThe overseas German administrations have become famous for suffering from what some dubbed a colonial \"mania\", in both sense of the word. The heavy-handed responses of bureaucrats faced with even the slightest opposition to their glory-hounding aims, combined with the overstretched nature of Mittelafrika and Deutsch-Ostasien, have produced a landscape ripe for a violent explosion the likes of which was not witnessed ever since the British Empire was cast down into the annals of rightfully past history. What's more, the resources required to maintain peace and security across the Oststaats separating us from the ever-ambitious gaze of Petrograd and Moscow have also put a considerable dent into our budget.\n\nNaturally, the Colonial Empire cannot be abolished, or even walked back from, for it would cause a scandal that could topple any Kanzler and his cabinet. Even murmuring about such a possibility is known to attract the full ire of our ardent sovereign Wilhelm. That's why the officials tasked with looking into the possible solutions to the Kolonialreich question felt a great respite following the reports of successful missions to reassert our authority and rationalize the civilian leadership in Ceylon - one of our most forgotten crown jewels. We could not have accomplished that if not for the wise leadership of Baron Max von Oppenheim, a skilled scholar, diplomat, archeologist and also our chief orientalist. With such a promising start this island, vital to maintain control across the Northern part of the Indian Ocean, shall be soon transformed into the model for the rest of the German overseas to follow. Additionally, if the Princes of the mainland achieved their aims and were ready to join us in shaping the world’s future, the enticing promise of a stable, economically developed, and safe \"Sri Lanka\", as it’s also known locally, would surely sway them into the right direction."
gerdom.212.a:0 "Our place in the sun deserves only the best!"

gerdom.220.t:0 "Euphoria Into Destruction"
gerdom.220.d:0 "The DVLP's victory in recent elections was welcomed by much of Germany's right-wing voter base, but for the various paramilitaries in the nation, it was something akin to a second Christmas. Bands of euphoric, and more often than not extremely intoxicated, men from groups such as Der Stahlhelm and Bismarckjugend have been causing quite a lot of chaos in the nation’s cities and towns. From fisticuffs between these young troublemakers and the opposition party voters to harassing of various minorities, the militiamen who make up a considerable portion of Alfred Hugenberg's support base have been a nuisance, if not even a pestilence, to the law enforcement of the Kaiserreich in the last few days.\n\nThere are reports of these men attacking businesses owned by the "enemy", with the most egregious example being the burning down of a shop on Berlin’s Friedrichstraße and a thwarted plan aimed at striking the press offices of Theodor Wolff. Both of these groups are not necessarily part of the DVLP, and indeed a good portion of especially Bismarckjugend absolutely despise Hugenberg. However, each paramilitary has its own section of supporters for the nationalist party, with one of the group's leaders, Theodor Duesterberg, even occupying a seat in the government. Given this delicate situation, the government and chancellor have been hesitant to tackle the issue, with high hopes that the hoodlums would soon calm down and return to more normal activities such as barfights with syndicalists and anti-FAUD posturing.\n\nThis hope has been thoroughly proven to be a forlorn one, and now authorities from all over Germany are demanding that Hugenberg’s lot reins in the excesses of their supporters. An official statement from the government could possibly help calm down the situation and cause the paramilitaries to realize the destructive nature of their actions, but it would also make DVLP look like it has instantly become an establishment party that does not care about its true backers. The electoral victory of the party has already brought in quite a few defectors from other parties and youth organizations such as Bismarckjugend, and thus the government stepping in could reverse this positive development."
gerdom.220.a:0 "They're just getting a bit rowdy, that's all!"
gerdom.220.b:0 "Now that we run things, this behavior is intolerable!"

gerdom.221.t:0 "Selective Legal Procedure"
gerdom.221.d:0 "The German state has languished under the soft hand of various governors for too long, unwilling or incapable of bringing true order and justice to the nation. However, with Alfred Hugenberg in charge, such weakness shall be excised from the skin of Germany, one legal case at a time. Everything from FAUD’s syndicalist vandals to various liberal troublemakers and Communard sympathizers will face the clang of the gavel in courts and serve their time in jail cells until they reject their shameful past or waste away. After all, if Germany and its grand empire is to survive the trials and tribulations of the coming years, it cannot be betrayed by traitors from the inside.\n\nHowever, as Hugenberg has begun to use his considerable influence on the legal field to combat his perceived enemies, political observers and influential figures from the ranks of his rival parties in NLP and Zentrum have accused the chancellor of favoritism and clear-cut ignoring of the letter of law in favor of his paramilitary allies. Important political figures such as Gustav Stresemann of the NLP and Heinrich Brüning of Zentrum have publicly denounced the regime’s seeming ambivalence towards bringing violent and uncontrollable members of Der Stahlhelm to justice, even in cases where the evidence for their crimes are unquestionable. This has caused more moderate members of the DVLP to question whether Hugenberg’s vision of justice is actually beneficial to the party or simply extremely damaging to its public image, since it would cause the party to be seen as nepotistic autocrats sheltering murderers and madmen.\n\nHowever, while dissident voices towards this preferential treatment have been growing, the silent support the chancellor has received from forces within the German right is far greater, and unless the demands for a more lawful practice of persecuting villains grow exponentially in number then the situation seems poised to continue as is. The looming Communard threat weighs in the minds of many, and if a few moderate left-wingers have to suffer legal consequences to keep the threat under surveillance, it is a small price to pay for security. For many within DVLP, a minor hit to the party’s reputation is preferable to keeping Der Stahlhelm on the chancellor’s side in these troubling times."
gerdom.221.a:0 "Unfortunately, we can't investigate that matter..."

gerdom.222.t:0 "Expanding the Media Conglomerate"
gerdom.222.d:0 "The DVLP's consolidation of power following their recent rise to power has been a period of adjustment for the entire German nation and the empire at large. However, compared to the apocalyptic visions many in the left-wing of German politics claimed to occur following the party's victory, Hugenberg’s takeover has gone rather smoothly. Of course, political experts around the Reich have crafted many theories in regards to this success, but the undeniable truth is that the new Reichskanzler's immense control over the German media machine has been one of the key pillars of his triumph. Many local and international observers have compared him to the famed American media tycoon, Randolph Hearst, and perhaps this is an apt comparison, for Hugenberg’s company, Telegraphen-Union, has been a tool with incredible potential in his rise to the top of the Kaiserreich’s pecking order.\n\nThe true extent of TU’s power comes not from its own circulation, but from the news it provides to many smaller newspaper companies and press offices around the nation, with these smaller subscriber businesses amounting in the thousands. TU has been noted to be very heavily biased towards covering news stories of right-wing parties. Its sympathies are clear in the language used, lambasting the "partisan politicians" of the left while praising right-wing "experts" in international and national stories. Following the DVLP's victory, Hugenberg has set his eyes on total domination of the Reich's informational network, with many of his old rivals increasingly concerned with this power grab. TU has been locked into a bitter competition with liberal newspapers, primarily Telegraphisches Bureau owned by Theodor Wolff.\n\nUsing his newfound political presence, Hugenberg has been seeking to expand his hold over the minds and hearts of the German population, scrounging up capital for new purchases of different smaller companies. The chancellor hopes that one day his Telegraphen-Union may eclipse the reach of liberal and left-wing newspapers and magazines in totality. In this new era of nearly daily technological leaps forward, Hugenberg and his advisors have also begun to eye up other forms of mass entertainment as a means to get ahead of their competition, with the rising popularity of cinema intriguing them the most. The media titan is no stranger to the glitz and glamour of the film industry due to his possession of the Universum-Film Aktiengesellschaft company, but the main focus of the DVLP propaganda campaigns has mainly been on print and radio thus far. However, there is a risk in diverting funds into these newfangled agencies, and if they end up being a dud, the money wasted in them may have been the critical missing ingredient in the domination of more traditional forms of mass media."
gerdom.222.a:0 "Buy up some more print papers, maybe a few radios..."
gerdom.222.b:0 "It pays to be bold, start experimenting even more with film."

gerdom.223.t:0 "The Exiled Dictator's Presence"
gerdom.223.d:0 "Erich Ludendorff’s dictatorship may have been a pivotal step in Germany’s domination of the world, but today the man who built the modern Kaiserreich is remembered rather poorly because of his love of intrigue and heavy-handed schemes. Ludendorff is often considered one of the founders of DVLP as well, and the new Reichskanzler Hugenberg was one of his staunchest defenders until the old despot was dismissed by the Kaiser himself, and thus it is no surprise that political observers, members of the party, and parliamentary rivals have all been eager to witness which line the reorganized party will take in regard to the old general’s image. The situation is a difficult one, as the policies of the new DVLP line and those of Ludendorff have a considerable degree of overlap, and the party cannot simply shrug off its legacy as steadfast Ludendorffites. Factions within Hugenberg’s organisation have quickly emerged on the matter, with some within the party arguing that the sooner we rid ourselves of his legacy, the better it will be for our image. This line is supported by more eccentric members of the DVLP, such as Max Maurenbrecher, as well as generally more pro-Tirpitz politicians of the DVLP, such as admiral Adolf von Trotha, though their reasons for the denouncing Ludendorff vary greatly from personal rivalries to ideological clashes and more. Hugenberg himself has been relatively ambivalent on the matter, preferring to mostly leave the old dictator completely out of his speeches, with the odd reference here and there, and the party has generally supported this. However, some, such as Fritz Thyssen, a long-time friend of the shunned general and a bitter rival to the Krupp clique of DVLP, have raised their voices in support of Ludendorff, claiming that the Kanzler should emphasize a return to the old ways of governance and pay homage to the man who helped form the party, unlike the lackeys of Tirpitz who only made the Kaiserreich softer and more vulnerable. Both of these factions are fighting for the attention of Hugenberg on the matter, and while the matter is perhaps far off on the priority list, it is still one that needs a good deal of thought put into it before a final decision is made."
gerdom.223.a:0 "We run a new DVLP, for a new era."
gerdom.223.b:0 "Neglect to ever mention him."
gerdom.223.c:0 "In this party he's a hero!"

gerdom.224.t:0 "Direction of the Neue Weltpolitik"
gerdom.224.d:0 "For many in the foreign office, the Kaiserreich's present level of power is more than enough for the Empire's prestige. In fact, many would say that Germany had so ruthlessly expanded its colonial and economic sphere in the aftermath of the Weltkrieg, and all the revolutions thereafter, that the German nation is now buckling beneath the weight. Reichskanzler Alfred Hugenberg, however, has seen laziness and ineptitude creep into the state's heart as it became drunk off of victory after victory. This plucking of colonies and tiny nations into the Reich's basket had been mismanaged, and that is the fault of state employees rather than an issue of the Weltpolitik ideal itself.\n\nThese parasites and suited rastabouts that have ruined the Kaiserreich's ascent will get exactly what they deserve. Meanwhile, Reichskanzler Hugenberg will work to ensure that Germany's "bellicose" foreign policy be shown to still have energy. There exist many vulnerable nations across the globe for Germany to foist its influence upon, and unlike the past administration the DVLP does not lack a will to take advantage of these opportunities.\n\nWhile the foreign office reconstitutes itself in the wake of Hugenberg's demanding work ethic, only one of these "nations of interest" can be pressed upon for the time being. The question remains with the Reichskanzler as to which of these nations it shall be."
gerdom.224.a:0 "Let's start some talks with our Dutch cousins!"
gerdom.224.b:0 "The Swedes have been neutral long enough!"
gerdom.224.c:0 "Cuba is a promising base!"
gerdom.224.a_tt:0 "§LOur diplomatic dealings shall begin with an exchange of knowledge between the German mission and Dutch generals, for the price of their colonies, and could blossom into the Netherlands finally joining the Reichspakt.§!"
gerdom.224.b_tt:0 "§LWe have to try to obtain a favorable deal for Kiruna's steel in exchange for developing the region, and if the Swedes seem receptive we can work on cracking their neutrality.§!"
gerdom.224.c_tt:0 "§LCuba will first be wooed with promises of German economic aid, which can eventually expand into an establishment of a new base for the Kaiserliche Marine.§!"

gerdom.225.t:0 "A Change in Directors"
gerdom.225.d:0 "As Alfred Hugenberg ascends to the position of Reichskanzler and joins the prestigious cabal of world’s greatest statesmen, a minor issue has been brought up to the Kanzler regarding his position in the Universum-Film Aktiengesellschaft. UFA, one of the central cinema companies in Germany, has been on a steady rise towards becoming the premier source of German film worldwide, and this has been in no small part due to the efforts of Hugenberg in guiding the company onwards. The current Reichskanzler was an early supporter of UFA but it was only in 1927 when he would formally become the primary owner of the company, helping it to recover from bankruptcy. He has since been the chairman of the company’s board, but given his new duties as the leader of the world’s greatest empire the Kanzler understandably finds little time to dedicate to running a film company. The logical step would be to step down and let one of his talented directors run it in his stead, with their knowledge in the industry backed up by the business-savvy members of the board such as the deputy chairman Emil Georg von Stauß.\n\nHowever, the succession has become somewhat of a difficult dilemma for Hugenberg, for none of the options are exactly perfect considering the political platform the Kanzler has run on. The first option, Erich Pommer, has been a steadfast and reliable member of UFA for years now,  and it is undeniable that his services have shaped the company in a major way, but there is a slight issue with the man that would no doubt earn the critical eye of Hugenberg’s supporters if it reached the public sphere. Pommer is Jewish by birth, and if appointed, he could become a liability to the regime with the many enemies of DVLP, from the anti-semites of the DkP to the insufferable bleeding hearts of the FVP and SPD lapping up the chance to strike at Hugenberg’s perceived hypocrisy given the DVLP’s anti-Jewish platform.\n\nAnother option would be the director-actor Veit Harlan, who has been a rising star of the Kaiserreich’s film scene, but his main weaknesses in the role are most certainly his large ego and desire for total independence, not to mention Harlan’s tendency to splurge out on production costs to the point of absurdity. Finally, an unconventional option would be to give the post to Leni Riefenstahl, an up-and-coming director and a member of the exclusive club of German women directors. However, while Riefenstahl is certainly capable as a director, the paternalistic attitudes of many within the German political scene create an atmosphere that is rather hostile to women in places of power, and these influential men would likely use Riefenstahl’s position to attack her benefactor Hugenberg and his DVLP with glee. The decision is a difficult one, that much is clear, but one that the Kanzler must deal with quickly for the sake of the company."
gerdom.225.a:0 "Pull in Veit Harlan."
gerdom.225.b:0 "Retain Erich Pommer's services."
gerdom.225.c:0 "Riefenstahl is promising!"

gerdom.226.t:0 "The 'Regal' Paramilitary"
gerdom.226.d:0 "Der Stahlhelm, one of the largest paramilitaries of the German right-wing sphere, has never been fully under the control of Alfred Hugenberg or the DVLP. One of the central leaders of the group, Franz Seldte, has not been particularly enamored with Hugenberg, and despite the large overlap between DVLP voters and Der Stahlhelm supporters, the organization has always been split between its allegiance to Seldte’s pro-DkP line and Theodor Duesterberg’s pro-DVLP faction. However, with the electoral victory of Hugenberg’s party, Duesterberg has been eclipsing Seldte as Stahlhelm’s focus shifts in support of the DVLP, and while the old leader of the paramilitary holds considerable influence still, Duesterberg has quickly become the favoured son of the Steel Helmets.\n\nHowever, with the new governmental status of Hugenberg’s party, there has been a considerable push within the party to nudge Stahlhelm out of its typical modus operandi and into something greater. It is undeniable that the brave patriots of the organization have been useful to the cause of German conservatism in the troubling years prior, but if the DVLP is to conquer the Kaiserreich and transform it into the reactionary dream Hugenberg seeks, then the paramilitary will have to grow beyond its violent past. Duesterberg has been entrusted with the task of whipping his men into a proper veteran’s organization and the honorary guard of the government, showing the German youth the heights a Teuton man can reach if given the necessary training, discipline and camaraderie to reach it. Der Stahlhelm shall become a beacon of DVLP’s strength and glory, holding parades, ensuring public order and generally reminding the German people of the great work the government is putting in to secure their future by their mere presence.\n\nThe former services of Duesterberg’s crew will obviously still need to be utilized sporadically whenever the great Red Menace rears its ugly head, but it would be short-sighted to shackle the potential of these patriotic souls to such a violent and unceremonial role. However, some hardline anti-syndicalist streetfighters such as Wilhelm Adam have claimed that the new direction would neuter the movement and turn it into a knock-off Kyffhäuserbund, a rival veterans’ organization known for its more moderate and less action-oriented nature. Despite such opposition, with Duesterberg’s direction receiving the blessing of Hugenberg officially, the dissident voices will likely fade away in time as Der Stahlhelm reinvents itself."
gerdom.226.a:0 "A gradual end to thuggery."

gerdom.227.t:0 "Calling the Volksdeutsche"
gerdom.227.d:0 "The current Kaiserreich, spanning the entire width and breadth of the world, may be a Pan-German project in many ways, but the starting seeds of this global hegemony were nurtured into a blossoming flower in the soil of Prussia, through the rigorous discipline and stark will of the locals. However, while these days the region may be a pearl of the Reich in some ways, it is also increasingly non-German as the gigantic and inefficient Junker estates have driven away hard-working German toilers and what remains is oft worked on by minority groups such as Poles, Masurians, Lithuanians and various other servants of the German empire. Many of the German Völk have instead found homes in the so-called border strips between Poland and Germany, areas of Poland that were slated for annexation during the Weltkrieg. General Ludendorff, and especially the chairman of Königlich Preußische Ansiedlungskommission Friedrich von Schwerin, had proposed the creation of a buffer zone between the Kaiserreich and its future subject, Congress Poland, that would allow for Germans to remove the millions of Poles and Jews living in the region and make way for Reich settlers to move in so that the new territory could become something akin of a colony. Von Schwerin considered the complete removal of the local Poles as the most efficient solution to the dilemma of land ownership in the region, citing his belief that it was indeed the Germans who were the most efficient colonizers in the world. However, the plan fell through for a multitude of reasons, with the enormous costs of the project being one such reason, but the region underwent population exchange nonetheless with many lower-class and rural Germans becoming attracted by the prospect of attaining better economic freedoms or privileges in the puppet state of Poland. With the DVLP’s rise to power, Reichskanzler Hugenberg has announced that this development must be reversed for the good of Prussia. The German Völk must return home and help develop Prussia into the paradise of Germanism it was always meant to be. As an incentive for this population exchange, the large Junker estates holding back the Prussian economy will be dismantled, so that cheap land can be returned to the border-strip Germans, and wherever the Lithuanian and Polish hands have seized German land, they will be thrown out so that the Völksdeutsche have a place to grow families and crops for the ever-growing empire."
gerdom.227.a:0 "Prussia is German, Prussia shall always be German."

gerdom.228.t:0 "Citizenship Testing"
gerdom.228.d:0 "Our dominion over Europe has provided ample opportunities for the nations under our sphere to prosper, especially with entities such as Mitteleuropa in effect. Citizens from outside of Germany, be they Belgians from Flanders-Wallonia or Ukrainians far to the east, have thus found work and home within the nation in substantial numbers. Though it may appear on the international stage that we all stand together for the same causes under the banner of the Reichspakt, there are increasing concerns that the beliefs and ideals of these non-Germans are silent avenues for the manipulation of our elections for interests that are perhaps not reflective of the populace. Some reports have suggested that, due to greater undercurrents of syndicalist movements within our allied states, their citizenry may attempt to exert their nefarious influence through the ballot. A clear solution suggested by members of the Reichstag is to introduce a series of tests to determine and ensure that only true German citizens are allowed to vote in elections going forward. \n\nOne concern regarding this proposal, however, is that it would almost certainly alienate our allies to introduce such measures and that it may inadvertently provide a stronger justification for separatist, nationalist movements within their territories. We could mitigate this by ensuring that the tests are merely surface level and reasonable for such an important aspect of our political functions. Either way, the concern is great enough that something ought to be done regarding this matter."
gerdom.228.a:0 "Just some language and cultural tests are enough."
gerdom.228.b:0 "We can't allow foreign influences to pollute our elections, enforce background checks!"

gerdom.229.t:0 "The Extent of Suffrage"
gerdom.229.d:0 "With the increasing demands for enfranchisement across Germany becoming too big of an issue to ignore, particularly amongst the women of Germany, we are faced with some options on how we can proceed with the matter. By far the most popular proposition touted on the streets is implementing universal suffrage - total equality amongst all citizens regardless of birth or status - so that each vote is equally important. This is particularly popular amongst the many women’s suffrage organizations for obvious reasons. However, many opposing voices have dismissed this as far too radical of a change, and implementing it could disrupt our entire political system in a manner that we simply cannot afford to be bogged down by. \n\nAnother solution, however, is to adopt plural suffrage instead - a system where all can vote, but certain individuals can cast more than one ballot. Although at first sight it may appear to be antithetical to the voting reform movement as a whole, there is ample evidence that may suggest it could actually work. It was the system that Belgium used for their elections, allowing men with a higher level of education or income to cast multiple ballots to account for their contributions to the economy and society. This meritocratic system has been applauded by many intellectuals of the time, and even many of our own today. If we were to implement plural suffrage, we would certainly face some backlash, though it may be the right move if we wish to ensure the integrity of our electoral process."
gerdom.229.a:0 "We can compromise, make a plural system instead."
gerdom.229.b:0 "The people demand universal suffrage, so that's how it shall be!"

gerdom.230.t:0 "Status of Secret Ballots"
gerdom.230.d:0 "The integrity of the democratic elections within the Empire remains a contentious issue both low and high, as the concept of the secret ballot struggles to gain a universal endorsement. While legislation has been proposed to guarantee voter privacy, in practice, the situation is far more fragmented across the states. In urban centres, where voter turnout is often highest, polling stations would be more likely to adhere to the principles of confidentiality, allowing citizens to cast their votes without undue pressure. However, in rural areas, especially those dominated by the Junker Class or other influential local elites, the secrecy of the ballot has been easily compromised. Farmers and labourers could report intimidation from their employers, who may demand proof of their votes to ensure loyalty to particular political parties or factions. These thoughts of the potential erosion of trust in the democratic process have sparked concerns among the reformists, who argue that the electoral process cannot be considered truly free or fair without strict uniform enforcement of secret ballots. Support for confidential voting is strongest among the FVP, as well as certain factions within the SPD and the NLP . Conversely, opposition to such reforms comes primarily from the DkP and segments of the Zentrumspartei, who view the secret ballot as a threat to their traditional influence over rural and conservative voters. The ongoing debate highlights the broader struggle over the future of democratic governance in the Empire, with the potential erosion of trust in the electoral process serving as a rallying point for those advocating for systemic reform."
gerdom.230.a:0 "We can't allow voter harassment to continue!"
gerdom.230.b:0 "This is unnecessary, it'd only make fraud easier."

gerdom.231.t:0 "The Torchbearers of Women's Suffrage"
gerdom.231.d:0 "The reforms by which we have been debating and deciding on regarding our electoral process have been faced with pressure and opposition from numerous groups, but none have had the impact or sway of the various women’s suffrage movements across the nation, on all sides of the political spectrum. With their influence in full swing, a proposition has arrived regarding how we may further align ourselves with these organizations to the advantage of the government and the country. The most direct way we could do this is by officially endorsing one of these groups, allowing our popularity and political goals to flourish through their influence. The question now stands as to which particular women’s suffrage group should we offer our support to. \n\nOne which was immediately proposed for endorsement was Vaterländischer Frauenverein (Patriotic Women's Association), a more nationalist grouping that was founded by the Empress of Germany, Augusta. The monarchical ties of the group could make an endorsement much easier to justify amongst the more fervent supporters of the Kaiser. Another clear option to cozy up to our more conservative voters would be the Katholischer Deutscher Frauenbund (German Catholic Women's Association), one of the largest in the country and founded in Cologne. Their ideals are not so radical compared to some other groups, and an endorsement ensures that we do not rock the boat too much with this topic. Some of their more esteemed members, such as Marie Zettler, have proven to be very popular amongst our Catholic voters also, and cooperation with her would prove fruitful in ensuring our success in regions such as Bavaria.\n\nChoosing a more conservative group may instead alienate a sizable chunk of our population, however. A more neutral approach would be to favor suffrage groups that are more apolitical in nature or perhaps inhabit a centralist, middle-ground ideology that would be palatable to our politicians and civilians alike. The Bund Deutscher Frauenvereine (Federation of German Women's Associations) has proven itself to be just the sort of organization that aligns with this view, having strictly aligned itself with the middle-class, bourgeois women of Germany. Their chairwomen, Agnes von Zahn-Harnack, would also be a popular figurehead for our purposes, as her writings on women’s rights have become foundational to the movement as a whole. Likewise, the Deutscher Verband Frau und Kultur (German Association for Women and Culture), a smaller group, appears to focus on the more social aspects of suffragism. Both of these groups may be more compatible with our mission, but they may not have the same impact as the other groups.\n\nOf course, we could just instead endorse specific unions and movements designed to promote and support the ever-growing number of women in the workforce of Germany, which would certainly be popular. However, this may come at the risk of inviting far more radical voices into our sphere of influence due to the ties that these working groups hold with our more left-wing parties and even figures with sympathy for syndicalist ideals."
gerdom.231.a:0 "Favor nationalist organizations!"
gerdom.231.b:0 "Conservative and Catholic groups are preferable."
gerdom.231.c:0 "Cultural organizations and the middle-class should be a good compromise."
gerdom.231.e:0 "Our working women deserve a voice!"

gerdom.232.t:0 "Weighted Systems for Women"
gerdom.232.d:0 "With the myriad of protests and demonstrations held in favor of granting suffrage for the women of Germany, we have strayed beyond the point by which we can now ignore these demands, and our previous deliberations on how to incorporate this radical change into our electoral system are the clearest indication that this is the trajectory that we will be facing. Despite this being so, there is still a strong, majorly conservative camp that adamantly believes that these measures should not go forward. A more pragmatic compromise proposed by certain figures of the Reichstag involves granting suffrage to women but having their votes weighted in such a way that would count their votes for less than that of a man’s. Doing so would prevent too great of a shock to the electoral system and maintain the \"natural\" order to some degree, as purported by those in favor of the amendment.\n\nThere is also partial precedence for such a situation. Many regions across the Kaiserreich, particularly Prussia, have functioned with weighted systems for different economic classes in the past, so it would not be too difficult to transpose the old model into something similar today. Such a move may indeed satisfy a good percentage of our voters, but it may cause greater outcry amongst those in support of full and total equality. Their general nuisance has already dragged on for long enough, so the prospect of further problems is not one we would want to tangle with."
gerdom.232.a:0 "What part of 'equality' do these people not understand?"
gerdom.232.b:0 "This should keep the conservatives from grumbling too much."

gerdom.233.t:0 "Provincial Considerations"
gerdom.233.d:0 "The Prussian three-class franchise, since its implementation in 1848, functioned well for its purposes, taking into account the tax status of voters to classify them into one of three categories. However, the clear error of this was that it did not take into account how German provinces that were economically thriving would generally have a higher population belonging to the first class, regardless of their actual class - be they worker, landowner, or somesuch - on account of generally higher wages and thereby higher taxes. This, consequently, gives certain provinces an unfair level of representation over their poorer counterparts. In recent years, as our population continues to grow and the nation develops, this issue is becoming more and more evident.\n\nA clear solution to this issue would be to scrap the system entirely and replace it with a universal system of enfranchisement where all voters have equal say in choosing electors, regardless of economic class or tax bracket. This would certainly solve the issue completely and indeed may prove to be quite popular with the disadvantaged provinces, but it would certainly bring with it many pushbacks by the voters who would ‘truly’ qualify for the first class. This is not the first time that the system has been defended, having faced attempts at reform previously in 1910 by Chancellor Hollweg, but the signs of its obsolescence are becoming clearer by the day."
gerdom.233.a:0 "In the interests of equity, some special privileges are needed."
gerdom.233.b:0 "Everyone gets the same treatment!"

gerdom.234.t:0 "Modernizing the Electoral Districts"
gerdom.234.d:0 "The time has come for us to discuss perhaps the most controversial topics regarding the changes that we are planning to implement with the reformation package - the electoral districts. Currently, the system that is in place heavily strengthens our rural districts, as previous administrations maintained pre-industrial boundaries to maintain balance amongst the constituencies. More discreetly, it also ensured that the more conservative voting class, often based within these rural regions, had greater sway in the electoral process. This is most likely the main reason why the districts have remained as they are for decades, much to the benefit of the land-owning elites of the Kaiserreich. Of course, this disparity is utterly clear to anyone, especially as the population of our urban centers continues to steadily grow.\n\nWe now have an opportunity, with these reforms, to redraw the boundaries of these electoral districts. In consideration of our urban populace, a clear solution would be to change the boundaries to heavily support these areas, removing the electoral strength from the rural districts directly. This is a particularly popular option for our left-wing parties, but some voices have gone further to suggest that we needn’t put the rural regions at a disadvantage simply because of their fewer numbers. Rather, we should seek to ensure that the districts are redrawn in a way that makes their electoral power stand on equal footing. This would certainly be a preferable compromise, but it may not have the same impact on modernizing the districts as we hope. Of course, there are those who suggest simply leaving the electoral districts as they are and who believe that gerrymandering will only cause greater issues for the country and would be deeply unpopular amongst the landowners and other rural inhabitants of the Reich. Whichever way we choose, it will be a controversial decision, but now is a better time than any to finally address it."
gerdom.234.a:0 "Let's favor our urban centers."
gerdom.234.b:0 "Everyone gets a fair voice!"
gerdom.234.c:0 "Let's continue to maintain rural primacy."

gerdom.235.t:0 "An Interesting Proposal..."
gerdom.235.d:0 "A very peculiar method of assigning seats in the Reichstag has lately been making the rounds within the halls of power, and has started to become vociferously defended by the members of various smaller parties or organizations that have yet to achieve victory in various elections, alongside political groups with greater sway over a massive amount of votes. The proposal is known as the "Reichswahlvorschlag", or "national nomination", and its primary goal is to remove the perceived problem of our 397-member Reichstag not changing in relation to population growth, as well as its inability to properly represent various small parties that align with giants such as the SPD or DkP.\n\nThe Reichswahlvorschlag system will mandate that a certain number of votes granted to a party will determine its seats within the wider Reichstag, such as 60 thousand ballots for the SPD granting them one seat in the Reichstag, and that these amounts will be capped by the district such votes are counted within. While this cap can be further refined by our other electoral reform measures, such as our changes to the gerrymandering of states or the weight of someone's vote, it will lead to what are called "leftover votes" in any case as a party wins as many seats as it can. However, the Reichswahlvorschlag itself will collect these leftover votes and assign them to party-approved lists to then give remaining seats to smaller parties that, functionally, campaign alongside bigger ones.\n\nIn practice, this would mean that Zentrum's smaller allies on such a list of their own making, such as the Elsaß-Lothringische Volkspartei (People's Party of Alsace-Lorraine), or the FVP's allies in the Masurische Volkspartei/Mazurska Partia Ludowa (Masurian People's Party) or Republikanische Partei Deutschlands (Republican Party of Germany), will receive these "leftover votes" and then be granted appropriate seats within the Reichstag. According to the proposal's sympathizers, this will ensure a more appropriately democratic process as these smaller parties are given appropriate representation in national politics, but detractors believe that this only unnaturally inflates the influence of such groups. Furthermore, while various liberal organizations would certainly benefit from this reform package, this system could just as easily give the far-right more power as various groups within the Deutsche Fraktion can now somewhat "ride along" the victories of parties like the DNVP. Regardless, the Kaiser and Reichskanzler are free to dismiss this experiment or enact it as they wish."
gerdom.235.a:0 "Well, let's try it out!"
gerdom.235.b:0 "What? No."

gerdom.236.t:0 "Signing the Reform Package"
gerdom.236.d:0 "After a long and arduous series of debates, deliberations, and debacles, we have finally reached the end of the Reform Package and its many hefty changes. From citizenship tests to implementation of women’s suffrage to even redrawing the electoral districts themselves, this bill has the chance to bring about substantial changes to the governance of the Kaiserreich going forward. The final hurdle that stands before it can become enshrined as law is the signing process. While we may have done what we can to ensure all the ministers are happy with the results, there is still a risk that they could simply refuse to commit to the bill, leaving it dead in the water. The Prussians and Bavarian ministers are perhaps the highest risk factors in this regard, but so long as our efforts have not strayed too far ideologically for their liking, the Reform Package is in good hands. With tensions peaking at the Reichstag, many are holding their breath for the final call and fate of the bill."
gerdom.236.a:0 "...All is well!"
gerdom.236.b:0 "The Prussian ministers walk out!"
gerdom.236.c:0 "Bavaria refuses to obey!"

gerdom.23601.t:0 "The Old Order Stands Firm"
gerdom.23601.d:0 "Prussia resists voting reform which is removing the three-class franchise. Time to punch them."
gerdom.23601.a:0 "The center of our empire has clearly grown too independent."

gerdom.23604.t:0 "Reichsexekution - The Leading Commander"
gerdom.23604.d:0 "The right option is Hoepner. Eugen von Schobert, who’d be like the most obvious of obvious wrong choices since the man is part of Bavarian army, is harsh leader, and his desc mentions he’s a nationalist and a Bavarian one at that. Kurt von Hammerstein-Equord. You probs recognize him, part of Schleich man clique and also noble. Born in Duchy of Mecklenburg-whatever the fuck second part, is in his bio. Erich Hoepner, born in Brandenburg, father was a doctor. The dude joined the cav for the war and after became part of panzertruppen. The bio goes on to mention he shares with hardships of his men blah blah."
gerdom.23604.a:0 "Eugen von Schobert."
gerdom.23604.b:0 "Kurt von Hammerstein-Equord."
gerdom.23604.c:0 "Erich Hoepner."

gerdom.23605.t:0 "Reichsexekution - The Firm General"
gerdom.23605.d:0 "Schobert's event if you pick him. He's being the harsh fuck he usually is and making public statements about Prussia needing a brow-beating."
gerdom.23605.a:0 "Is he trying to provoke an armed response?"

gerdom.23606.t:0 "Reichsexekution - The Political General"
gerdom.23606.d:0 "Equord's event. He aligns too heavily with Schleicher to actually be enthusiastic about the operation and tends to be sluggish in its movement."
gerdom.23606.a:0 "To be expected of a Schleicherist lackey."

gerdom.23607.t:0 "Reichsexekution - The Popular General"
gerdom.23607.d:0 "Hoepner's event. He's a popular guy, he's already aligning with the government's interests, etc."
gerdom.23607.a:0 "The orders are given, and the men follow."

gerdom.23608.t:0 "Reichsexekution - The Police Connection"
gerdom.23608.d:0 "The right option is to use Wilhelm Abegg. Abegg is founder of modern Prussian police, left-liberal, cooperated with SPD, removed from office over bullshit shit spread by Papen and Schleicher and directed by his underling Diels. Diels is connected to Abegg, very young. Promoted to head of Prussian police after that thingy. Was fighting against both nazis and commies for some time but since 1932 irl gave info to Goering directly about commies and socdems. Tragow is conservative and prussian, participated in Kaap putsch against Weimar."
gerdom.23608.a:0 "Rudolf Diels."
gerdom.23608.b:0 "Wilhelm Abegg."
gerdom.23608.c:0 "Traugott von Jagow."

gerdom.23609.t:0 "Reichsexekution - The Young Officer"
gerdom.23609.d:0 "Diels is using his position high in the operation to actually secure his economic interests and whatnot, clearly connected to Goering, rather than focus on doing his job."
gerdom.23609.a:0 "He's more concerned with his assets than our objective!"

gerdom.23610.t:0 "Reichsexekution - The Experienced Officer"
gerdom.23610.d:0 "Abegg is committing to the operation and is a good connection in the police to use."
gerdom.23610.a:0 "You can always count on an honest officer."

gerdom.23611.t:0 "Reichsexekution - The Prussian Officer"
gerdom.23611.d:0 "Traugott is someone who has been around since Ludendorff's expansion of the police and is obviously way too DVLP aligned to actually be of any use to the government's aims to defang Prussia."
gerdom.23611.a:0 "Hugenberg's curse strikes."

gerdom.23612.t:0 "Reichsexekution - Nullifying the Red General"
gerdom.23612.d:0 "The right option is to use Ludendorff. These choices are all related to trying to erode Schleicher as a threat to the government, as Prussia is one of his big domains and he is most fiercely opposed to the government's wishes."
gerdom.23612.a:0 "Show his dealings with the Deutsche Fraktion."
gerdom.23612.b:0 "Expose the Schleicher Clique's corruption."
gerdom.23612.c:0 "Enlist the Kronprinz for help!"
gerdom.23612.e:0 "Contact Ludendorff."

gerdom.23613.t:0 "Reichsexekution - The Deutsche Fraktion"
gerdom.23613.d:0 "The Deutsche Fraktion is actually resistant to being probed and used against Schleicher. The "exposing" is silenced in the media and pushback against Schleicher for his connection is very muted. Clearly, the DF is closer to the wheels of power than the gov realized."
gerdom.23613.a:0 "They're more pervasive than we realized..."

gerdom.23614.t:0 "Reichsexekution - The Schleicher Clique"
gerdom.23614.d:0 "The Schleicher Clique is just a bit too powerful to really be worked against. It would cripple the army too heavily to remove their members."
gerdom.23614.a:0 "The army remains untouchable."

gerdom.23615.t:0 "Reichsexekution - The Kronprinz"
gerdom.23615.d:0 "Kronprinz Willy is actually fully in-line with Schleicher's thinking and believes the government is being stupid, he won't be of help even if the gov works with his dad's blessing."
gerdom.23615.a:0 "Ever the brute, evidently."

gerdom.23616.t:0 "Reichsexekution - The Former Dictator"
gerdom.23616.d:0 "Ludendorff actually hates Schleicher enough to not care for the government wanting to destroy Germany, he feels better about wielding his power to ruin the "upstart's" day and influence, perhaps to claw some power back for himself. He will pull his assets away from Schleicher and command those still loyal to him to not help Schleicher in impeding the government. They'll listen."
gerdom.23616.a:0 "Revenge can be a powerful motivator."

gerdom.23626.t:0 "Reichsexekution - The Siege of Berlin"
gerdom.23626.d:0 "Option is determined via trigger so only one will be active at a time. Military forces are now in Berlin, staring down Prussian police who are meant to be loyal to the Prussian House of Lords. It ultimately is..."
gerdom.23626.a:0 "...A bloodless incident."
gerdom.23626.b:0 "...A chaotic scuffle."
gerdom.23626.c:0 "...A violent disaster."

gerdom.23627.t:0 "Reichsexekution - Prussia Gives Up"
gerdom.23627.d:0 "Bloodless incident. Police fully stand down, no one gets killed, no one even gets hurt. With their only arm of resistance broken, the House of Lords gives up."
gerdom.23627.a:0 "The Empire's law is upheld."

gerdom.23628.t:0 "Reichsexekution - Prussia Surrenders"
gerdom.23628.d:0 "After a melee that has left quite a few injured and battered, some damage down to the House of Lords building and things getting hectic, the event has ended with relatively low damage and no deaths. Ultimately, the House of Lords is cowed."
gerdom.23628.a:0 "At least damage was minimal."

gerdom.23629.t:0 "Reichsexekution - Prussia Submits"
gerdom.23629.d:0 "Shots actually get fired and quite a few people die, mostly on the side of the Prussian police. Overt civil war doesn't happen, nor does prolonged violence, but the anger is at an all-time high. Blood has been spilled, and it was all because the government bungled its own conduct."
gerdom.23629.a:0 "It'll take time to rebuild from this."

gerdom.23672.t:0 "Dissent in the Lands of Wittelsbach"
gerdom.23672.d:0 "Bavaria resists our voting reform which is mandating a three-class franchise across the entire Empire, and it is a miracle that the other minor kingdoms have not also entered into resistance. Using the legally-available Reichsexekution, the government must act against the Kingdom of Bavaria for its refusal to adhere to the will of Reichskanzler. The Kaiser has granted his full permission to the task already, hoping that this will crush Bavaria's delusions of federalism for good."
gerdom.23672.a:0 "The southerners have grown too rebellious for their own good!"

gerdom.23675.t:0 "Reichsexekution - Executer of Our Will"
gerdom.23675.d:0 "The state must pick the commander of the operation. Bauer is wrong, he is too forceful and not Bavarian. Konrad is wrong, he is far too loyal to the King of Bavaria. Halder works, he is both Bavarian and loyal to the state. It'd be best to not note exactly where the generals come from, as the player can instead use the commander traits [Bayerische Armee] present on the corps commanders themselves in order to get that info."
gerdom.23675.a:0 "Max Bauer"
gerdom.23675.b:0 "Franz Halder"
gerdom.23675.c:0 "Konrad Krafft von Dellmensingen"

gerdom.23676.t:0 "Reichsexekution - Schleicher's Ally"
gerdom.23676.d:0 "The event upon picking Bauer. Bauer is already causing problems as he prepares his legions by talking about the need to beat the Bavarians into submission and the like. He's also using this to drum up support for himself and his cronies, which are dominantly Schleicherites."
gerdom.23676.a:0 "Wrong"

gerdom.23677.t:0 "Reichsexekution - The Artillerist"
gerdom.23677.d:0 "The event upon picking Halder. Halder is using only state-loyal Bavarian units for the upcoming operation, and he is using his own familiarity with the state as well to keep things as smooth as possible."
gerdom.23677.a:0 "Right"

gerdom.23678.t:0 "Reichsexekution - The King's Man"
gerdom.23678.d:0 "The event upon picking Konrad. Konrad is purposefully sabotaging the preparations by taking too long, and he has even been caught feeding the King of Bavaria information out of a sense of loyalty and misguided principles in keeping the empire 'fair'."
gerdom.23678.a:0 "Wrong"

gerdom.23680.t:0 "Reichsexekution - The Kingdom's Constables"
gerdom.23680.d:0 "The state must pick a sympathetic police chief of the Königlich Bayerisches Gendarmeriekorps to collaborate with. Unfortunately, a great deal of them are involved in Bavarian nationalist circles, or in the case of Pohner are quite controversial for working with Ludendorff, but the government has nonetheless produced several options to pick from. Ernst Pöhner is the right choice. He is most amenable to the govt, despite his involvement with various Freikorps and far-right groups, but Koch is too nationalistic (BVP membership) and Seisser is additionally too nationalistic."
gerdom.23680.a:0 "Ernst Pöhner"
gerdom.23680.b:0 "Hans Ritter von Seisser"
gerdom.23680.c:0 "Julius Koch"

gerdom.23681.t:0 "Reichsexekution - The Prince of Terror"
gerdom.23681.d:0 "Pohner, who already made a name for himself during the Ludendorff Era as a figure of autocracy, is once more being relied upon by the state to conduct some invsetigations into the main figures that are opposing the government's goals. He is also utilizing the police as an intimidation force, and claims about him re-using his connections to the far-right are so far muted enough for the government to turn the other way."
gerdom.23681.a:0 "Right"

gerdom.23682.t:0 "Reichsexekution - The Knight of Seisser"
gerdom.23682.d:0 "Seisser has taken a backseat to politics somewhat for a bit but has now been returned to a position of power by the state to bring them support and put the state police under heel, but unfortunately he has been floundering. His reactions to unfolding events are slow and methodical, too much for the government to bear, as he is unwilling to decisively act against some of his nationalist comrades whom he feels a great deal of sympathy for."
gerdom.23682.a:0 "Wrong"

gerdom.23683.t:0 "Reichsexekution - The People's Commissioner"
gerdom.23683.d:0 "Koch ends up using his position opportunistically, predating upon enemies of the BVP under the guise of helping the government's aims in stopping resistance to the voting reform bill's passage. Of course, this ends up not really assisting the government's position at all."
gerdom.23683.a:0 "Wrong"

gerdom.23685.t:0 "Reichsexekution - Crippling the King"
gerdom.23685.d:0 "Something has to be done about Rupprecht. Someone influential within the King's circle must be utilized against him, mostly in a case of mobilizing it against the king and causing him some consternation. The correct choice is Gurtner. The Bavarian Zentrum won't work as Papen's influence is overestimated. Kahr is far too pro-Wittelsbach to work against it. Gurtner is the right choice, as he is pro-centralization and can effectively argue that the Kingdom is not adhering to the constitution."
gerdom.23685.a:0 "Franz Gürtner"
gerdom.23685.b:0 "Bavarian Zentrum/BVP"
gerdom.23685.c:0 "Gustav Ritter von Kahr"

gerdom.23686.t:0 "Reichsexekution - The Man of the Judiciary"
gerdom.23686.d:0 "Gurtner ends up effectively arguing in a publicized document that the King of Bavaria is not adhering to the laws properly by allowing the Kingdom of Bavaria to resist the advances and reforms made by the Reichskanzler, who is acting on behalf of the Kaiser. This blatant disregard of the hierarchy in the Empire cannot be supported by the law, as he claims, and the King seems to be taking these arguments to heart. His support for some of what's transpiring within Bavaria has started to quietly dry up."
gerdom.23686.a:0 "Right"

gerdom.23687.t:0 "Reichsexekution - The Men of Zentrum"
gerdom.23687.d:0 "Despite von Papen's claism to the contrary, he barely is able to control the side of Zentrum located in the Kingdom. His appeals to them go generally unanswered, and even his prestigious parties don't change anyone's mind. Ultimately, it all ends up being a profound waste of time, and no allies have been made against the King."
gerdom.23687.a:0 "Wrong"

gerdom.23688.t:0 "Reichsexekution - The Man of the Army"
gerdom.23688.d:0 "While turning Kahr may have been a grand boon to the government owing to his position within the Bavarian Army and closeness to the king, his distinctly pro-Wittelsbach stance and his closeness to the Bavarian royal family stand resolute against the government's temptations. Unfortunately, we have wasted our time, and a door closes to us."
gerdom.23688.a:0 "Wrong"

gerdom.23689.t:0 "Reichsexekution - A March on Munich"
gerdom.23689.d:0 "How did we do in our military force against Bavaria?"
gerdom.23689.a:0 "Great"
gerdom.23689.b:0 "Middling"
gerdom.23689.c:0 "Failure"

gerdom.23690.t:0 "Reichsexekution - Calmness Prevails in Bavaria"
gerdom.23690.d:0 "Not even a shot was fired. Ultimately, Bavaria has stood down against our military force, conceding to the Empire's bill. It passes now."
gerdom.23690.a:0 ""

gerdom.23691.t:0 "Reichsexekution - Stubbornness Withers in Bavaria"
gerdom.23691.d:0 "There was some violence between forces loyal to the government and forces loyal to local Bavarian power holders but, ultimately, only a few casualties are noted. While it is certainly a stain against our prestige, we have managed to win out."
gerdom.23691.a:0 ""

gerdom.23692.t:0 "Reichsexekution - Blood Runs in Bavaria"
gerdom.23692.d:0 "The military force used against Bavaria has resulted in numerous street battles and violent actions against local power holders, resulting in quite a few casualties and many press photos that have begun to circulate showing our regime as quite autocratic. Our international prestige has been stained by the event, but, as many could expect, we have eventually won out against who was resisting our bill's passing. Still, this cannot be regarded as a 'victory'."
gerdom.23692.a:0 ""

gerdom.268.t:0 "Repossessing Junker Estates"
gerdom.268.d:0 "Desperate times call for desperate measures. Although it is an option which many will find untenable for the sake of our political backing, we must nevertheless face the reality that much of the land owned by the Junkers are economic assets which are going to waste. Across Germany, and particularly Prussia, entire swaths of land sit within the personal domain of only a handful of the richest families within the Empire. It was thus inevitable that calls for repossessing these estates, either in their majority or even as their entirety, would be brought to the table. As drastic as this maneuver may be, it would undoubtedly alleviate the burden of our collapsing economy, with massive potential for the land to be revitalised into something economically stimulating, rather than just a pretty view. These measures could perhaps prove to be beneficial for bolstering our popularity amongst the more liberal members of our populace. After all, some particularly egregious Junkers have only themselves to blame for the stereotype of them being nothing more than lazy, greedy, and selfish aristocrats that sit in their high castles while the rest of the country languishes.\n\nOf course, there are a handful of voices which have decried even the very thought of considering this measure, the Junkers themselves among them. Some have even suggested, in the most preposterous manner, that we would be no better than the Syndicalist French, stealing land that belonged to them by right. However, there is a means by which we can still enact this measure without entirely alienating these Imperial stalwarts and still maintain some standing amongst the ‘common’ men, though this may not be as effective economically as we wish. We would simply work with the upper crust of society instead as we invest into their land while keeping ownership in their hands, which, while not nearly as efficient as seizing it, will keep the aristocracy from revolt. Regardless, it is a matter we must approach with caution."
gerdom.268.a:0 "Send a message, punish the worst of them."
gerdom.268.b:0 "Fat aristocrats who can't weather storms have no place in the Empire."
gerdom.268.c:0 "These men are the leaders of our Empire! Call on their support instead!"

gerdom.269.t:0 "Sitting Around the Radio"
gerdom.269.d:0 "In spite of these times of high tensions both at home and beyond, respite can still be found in some form within many German homes. An ever-popular way this manifests is through the ‘Katzenkopf’ radios created by Telefunken. The name - ‘cat's head’ - derives from the fact that the tuning dial on the radios features four ‘ears’ and two ‘cheeks’ representing the dial window, thus creating the oddly comforting visage of a cat. Its appearance is not its only benefit, however, as recent newspaper articles have reported that a frequent pastime of families across the country is sitting by their Katzenkopf, listening intently to any and all announcements which the government will produce. Although not all the reports may be positive, there appears to be a sense of relaxation derived from simply being up to date on what is going on, and knowing that the government is hard at work to bring the people of Germany out of this crisis. There have been less reports of unrest too, which seem to correlate with the increased sales of these radios. Although they are by no means a solution to our woes, it is still useful for ensuring peace. After all, nobody likes being left in the dark."
gerdom.269.a:0 "Some fun for the family in dark times!"

gerdom.270.t:0 "Opportunistic Purging"
gerdom.270.d:0 "Although the effects of Black Monday have severely strangled our position in many ways, a silver lining presents itself. We are faced with the opportunity to rid ourselves of the more unsavory elements of the Empire which have polluted our measures or otherwise impeded us in one way or another. In any other circumstance, we would face heavy resistance in ridding ourselves of these institutions, but Black Monday has given us the best justification we could ask for. The question remains, on which sector of Germany should we focus on? After all, implementing these cuts will still have an impact on our administration, even for a short while.\n\nFirst, there is the Beamte - the civil servants of the Empire - who have plagued the government with their ceaseless bureaucratic nonsense and their clear corruption and selfish motivation. Another option is cleansing the Reichstag itself, which would allow us to proceed with legislation without constant objections from our opponents that have made themselves comfortable meddling in our affairs, particularly with the budget. Finally, there is the Auswärtiges Amt, the Foreign Office of the Empire which deals with transnational correspondence and represents Germany beyond its borders. Their usefulness has been called into question, particularly with renewed chaos happening across the Reichspakt and beyond."
gerdom.270.a:0 "This is all the fault of our lazy civil servants!"
gerdom.270.b:0 "Time to clean out the Reichstag!"
gerdom.270.c:0 "Our foreign offices have grown fat with slackers!"
gerdom.270.e:0 "We're all in this together!"

gerdom.271.t:0 "Approaching the Eagle"
gerdom.271.d:0 "As romanticised as the Imperial Army may be, particularly after their glorious efforts in the Weltkrieg, it may be time that we realise some difficult truths in order to truly keep Germany at peace. Of course, this is in reference to implementing cuts to the military budget - a practice which no one wishes to champion, particularly in the face of the military brass, some of whom wield much political power. Nevertheless, we must provide an answer to these proposals of austerity, but if we are to indeed even consider these measures, then we must do so with precision and utmost caution to ensure that the Heer does not come out against us politically. This means that our hypothetical cuts will focus on downsizing portions of the military and retiring a few officers who would not be missed. Although these measures may not be anything major, they are undoubtedly necessary in the long climb out of economic doom which we now face. Let us try not to get cut too deeply by the claws of the Eagle."
gerdom.271.a:0 "Every hero needs his rest, doesn't he?"
gerdom.271.b:0 "Force a few token retirements here and there."

gerdom.272.t:0 "Breaking Ground"
gerdom.272.d:0 "One of the most important factors of our economic woes is the sudden rise in unemployment across the country. Not only has it stagnated our economy beyond the ravaging it bore from Black Monday, but it plants a terrible seed of unrest across our populace as they become desperate without work. The sooner we can handle this issue, the better things will be overall. One proposal to counter this issue seeks to kill two birds with one stone; through the formation of projects focusing on grand public works, we can easily employ hundreds of thousands of people across the country, all the while improving our infrastructure in regions which sorely need it. This is a very popular measure, though the question remains on the scale of these projects. It is vital that we balance the budget allocated to this plan so that we do not go overboard in the costs of construction and wages allocated. After all, we are still in an economic crisis, and if these efforts do not have their intended effect, it may lead to an even worse situation than what we started with. Additionally, there is also the matter of where in the Reich these projects should receive the most attention, with numerous options before us."
gerdom.272.a:0 "Go big, let's make new complexes entirely in the Ruhr!"
gerdom.272.b:0 "The West can rebuild on its own, let's focus our efforts in Silesia."
gerdom.272.c:0 "Perhaps just some modest improvements in East Prussia?"

gerdom.273.t:0 "The Back is Breaking"
gerdom.273.d:0 "When Mitteleuropa was first founded not too long after the end of the Weltkrieg, it was clear that we, as its strongest member, would be the bulwark of its effectiveness for some time. This was especially true considering the devastation which the other nations of the Reichspakt faced after the war, particularly in Belgium and Eastern Europe. Nevertheless, it was a beneficial arrangement for everyone involved - our allied states would receive the dire aid they required, and we would cement our economic grip over Europe. This has been a great boon to our ability to dominate trade in the North Sea, as well as ensuring our investments in the further reaches of the Reichspakt remain profitable. However, with the onset of Black Monday, it is becoming evident that our ability to uphold this economic alliance largely by ourselves is untenable. While the other states apart of Mitteleuropa may appreciate our continued efforts, there has been a suggestion that we must take a step back from our assumed responsibility as the economic backbone, and instead focus our efforts on fixing our own economic issues first and foremost. Though this may be a popular decision here at home, we must consider whether it will be worth the risk in the long-term, if Mitteleuropa could perhaps recover and strive after this period of economic woes eventually comes to an end."
gerdom.273.a:0 "We can't keep taking care of every little thing from now on."
gerdom.273.b:0 "Our responsibilities can never be neglected, especially in crisis."

gerdom.274.t:0 "Austerity Hits Krupp"
gerdom.274.d:0 "There are few who would dare to argue that enterprises such as Krupp and Thyssen AG have not been fundamental to our military might, and, by extension, our survival as a whole. For more than a hundred years, Krupp has especially grown to be a goliath within the global industry, let alone within the Reich. This has only become more evident after the Weltkrieg, with their guns, steel and numerous other weaponries finding their way across the globe. We, of course, had enjoyed reaping the benefits of their direct partnership with us, but it is clear that this relationship cannot remain as friendly as it is now. Concerns have risen within the government that Krupp has become far too large, far too influential for its own good. There are debates that their ability to meddle within our politics and economy will only prove to outweigh their usefulness, and the last thing that we need is to suddenly find ourselves at the behest of an invisible corporate takeover. However, there is a chance to act now by implementing austerity measures against Krupp and its subsidiaries, ensuring that they know their place. There can be no doubt, however, that such a measure will be faced with heavy resistance by those who are entrenched within the firm’s pockets, particularly armed with the argument that doing so will put us at a military disadvantage against the Syndicalist menace. Whether this is a prophetic vision of the future or merely a desperate bluff is something which we must decide on."
gerdom.274.a:0 "I think it's time for Krupp to lose some weight."
gerdom.274.b:0 "And invite syndicalist aggression? Never!"

gerdom.275.t:0 "Defining 'Temporary'"
gerdom.275.d:0 "When the government enacted emergency control over national finance as a response to the onset of Black Monday, it was largely professed as a strictly temporary measure to ensure that the monetary flow of the country remained secure and stabilized under its watchful eye. Now that the provision which grants our total control is coming to an end, we are faced with yet another delicate issue regarding the matter. Many think it’s time we relinquish our control over the economy and allow the invisible hand of the market to once again take hold to hopefully ensure a stable transition back into a regular, functioning economy. However, there is also the risk that doing so will not guarantee that everything will be stabilised, and if things turn for the worse once again, then all our efforts will have been for naught. It may be preferable that we extend our temporary powers for another year in order to absolutely ensure that the economy is stabilised, as much as this may bring about the ire of businesses across the country."
gerdom.275.a:0 "We've kept them long enough, let the market sort itself out now."
gerdom.275.b:0 "We'll need another year to keep the economy under control!"

gerdom.276.t:0 "Keeping the Reichstag Calm"
gerdom.276.d:0 "During the recent term of Kuno von Westarp at the helm of the Deutschkonservative Partei, the party was able to secure an alliance with the Christian democrats of Zentrum thanks to diplomatic efforts and deals with the right-wing of said party, largely led by the shrewd politician Franz von Papen. However, the elections and the usual skullduggery associated with that event saw the coalition collapse as Zentrum attempted to upend its former allies, a fact they most likely now sorely regret as the DkP secured the people’s mandate for its rule again. With its rule now consolidated, the question of renewing the coalition with the battered Zentrum has been brought up to debate by members of the government and party officials. It would likely not take much to convince von Papen to get the Zentrum’s support behind DkP again, especially given their humiliation at the polls, but many within the DkP’s more hardliner wing have seen Zentrum’s betrayal as a clear sign the party is too shifty in its alliances to be invited to govern alongside the current government.\n\nFigures on the party’s right flank, such as Albrecht von Graefe, have instead advocated that the party seeks a coalition party with the Deutsche Vaterlandspartei party of the media magnate Alfred Hugenberg. Hugenberg is infamous for being difficult to work with, and his party is filled to the brim with all sorts of oligarch strongmen, radical conservatives and eccentric nationalists, but they are fellow conservatives nonetheless and less prone to regionalist or social Catholic impulses than Zentrum, so a coalition would be beneficial for both parties. However, more moderate members of the party have noted that the example set during the reign of Alfred von Tirpitz, namely the idea of a Grand Coalition, could be the most beneficial one for DkP.\n\nBy bringing both Zentrum and the centrist liberals of the Nationalliberale Partei under one coalition government, the DkP could create a truly unified front of the centrists and centre-right, all the while keeping Zentrum and NLP from drifting too close to the socialists of SPD. It would be a rather cumbersome coalition to maintain, but it has worked in the past and the political possibilities of such an alliance are lucrative indeed. Nonetheless, the DkP at present is a rather strong and populous party as is, and denouncing any alliances at all could allow the Reichskanzler and his government the means to govern as effectively and distraction-free as possible."
gerdom.276.a:0 "Let's approach von Papen again!"
gerdom.276.b:0 "No more coalitions! That's what gave us such a shock the last time!"
gerdom.276.c:0 "Maybe Hugenberg would be easier to deal with..."
gerdom.276.e:0 "Tirpitz set the right example, let's get who we can get into a New Grand Coalition!"

gerdom.277.t:0 "Propping Up the Figures of Stability"
gerdom.277.d:0 "German victory in the Weltkrieg brought with it a complete redrawing of the old borders of Europe, and while in Western and Central Europe these changes were relatively marginal in the big picture of history, the appearance of numerous German client states in the former territories of the Russian Empire did change the region massively. However, the Russian collapse was hardly a simple affair, with local nationalists and revolutionaries causing havoc in German occupied territories. To ensure stability and loyalty to Berlin, various monarchies were created in nations such as Lithuania, Finland and White Ruthenia, while the Belgian monarchy’s role was usurped by Wilhelm II’s son, Adalbert. For a time this arrangement proved successful, for the nations in the East tended to be at least somewhat grateful to Germany for freeing them from the Russian menace, while Belgium was so utterly defeated that it could not mount sufficient resistance to its new ruler. However, as decades pass and German rule continues, grumblings around the Reichspakt against the rule of the Teutons are growing ever louder, with only Ukraine’s king Vasyl having achieved a degree of popularity among his people during the post-Weltkrieg years.\n\nWith the new Deutschkonservative Partei government assuming office, the conservative Reichskanzler has seen it fit to end this difficult situation for the Reich’s many nominal allies, for as war clouds gather over Europe, the Reichspakt must remain united against the threat of both a revanchist Russia and revolutionary Internationale. Analysts and political experts within the party are already identifying issues with the various monarchies of the alliance, and more importantly, discussing methods of alleviating the gripes the locals have with their lieges. Patching up the public image of the German-installed monarchs will not suddenly fix all the issues of the Eastern and Western nations within the sphere of the Kaiserreich, but ensuring that the various heads of states do actually govern their nations to the best of their abilities is a step in the right direction. The choice nonetheless remains on which figure to support in the short time the DkP government has to devote on the issue."
gerdom.277.a:0 "We'd do well to make sure Poland stays in our sphere!"
gerdom.277.b:0 "Adolf Friedrich has to start watching over his land!"
gerdom.277.c:0 "Adalbert might need a visit from the Kaiser..."
gerdom.277.e:0 "Vasyl's doing a good enough job, but he can do better."
gerdom.277.f:0 "Uladzimir has to stop being such a shut-in!"

gerdom.278.t:0 "Meeting the German King in Warsaw"
gerdom.278.d:0 "Friedrich Christian of Saxony was recently elected as the new king of Poland, and while his coronation has been rather well received by the Polish people due to the endless bickering the interregnum government, his German lineage still causes quite a few grumblings among the locals. Due to German economic hegemony over the young state, the Teutons are not exactly the most liked people in Poland, and the memory of events such as the Destruction of Kalisz are still controversial to this day. Nonetheless, compared to many other monarchs installed by the victorious Central Powers in the aftermath of the Weltkrieg, Friedrich Christian seems well-suited for his new role. Known for his charming appearance, merits during the war, and diplomatic ventures during and after the Weltkrieg, the monarch is also noted to possess remarkable skill with languages, something that allowed him to fulfill his diplomatic duties excellently.\n\nFriedrich Christian is also amicable to many Polish citizens because of his Catholic faith, and due to his immense interest in history, he has managed to charm some with detailed descriptions of events that occurred during the glory days of the Polish-Lithuanian Commonwealth. As such, the Kaiserreich’s government is hopeful that the young monarch may turn out to be a similar success story to that of the Ukrainian king Vasyl, though the Reichskanzler and his advisors have provided a degree of diplomatic and political capital to the Polish king nonetheless to get him started as a true king.\n\nExperts and political advisors of the Deutschkonservative Partei government have suggested that the king should focus more on cultivating an image of himself as a true Catholic renaissance man among his new people, focusing on his merits in various fields while using his linguistic talents to converse with locals in their own language and using metaphors and anecdotes from local history to show the Polish that he truly cares for the new land Friedrich Christian rules over. It remains to be seen how the Saxon king does in his new role, but given the seemingly overwhelming positive qualities the monarch possesses, Berlin expects a strong new crown in the Reichspakt to emerge soon enough."
gerdom.278.a:0 "We appreciate the Reich's efforts."
gerdom.278.b:0 "Well, everything looks promising there!"

gerdom.279.t:0 "Getting Adolf Out of Afrika"
gerdom.279.d:0 "The various heads of states installed by the victorious German empire in the aftermath of the Weltkrieg have all had their trials and tribulations leading the independent or conquered states inside the Reichspakt, but none have such a peculiar problem at their hands as the government of the United Baltic Duchy. While the Duchy seemingly has a relatively strong presence due to the strong German nobility in the region, there is a central weakness in its governance caused by the very person at the top, Duke Adolf Friedrich of Mecklenburg.\n\nAdolf Friedrich is, on paper at least, an illustrious leader, with a long decade of military service, colonial governorship in Afrika, and numerous adventures and scientific expeditions under his belt, but these last ventures are the very core of the problem. The Duke is seemingly addicted to constant adventure and wanderlust, and whenever he spends time in his supposed realm, these brief periods are marred by his restlessness and constant shift in focus between his political ambitions for the realm and his dedication to local sports, arts, and cultural development. When the monarch is focused on matters of the realm, he is a force to be reckoned with, but these moments are rare and fleeting as Adolf Friedrich always has another white elephant to chase, another remote African tribe to find, a racing contest to attend, or a gala to peruse the gifts of local art in.\n\nIf the Kaiserreich’s government were to directly intervene and remind him of the primary duty to his realm, the Duke might actually remember to visit Riga more often, especially if he is reminded of the resurgent threat of Russia and the troubles at home caused by Latvian and Estonian Forest Brothers. After all, the freedom Adolf Friedrich enjoys today stems from his lavish position at the top of the rich and prosperous United Baltic Duchy, but such privileges tend to disappear if said state is annexed into Russia or collapses under nationalist agitation."
gerdom.279.a:0 "Fine, fine, maybe a bit more attention is needed."
gerdom.279.b:0 "So long as he fulfills his obligations, he can do as he wants!"

gerdom.280.t:0 "Improving Adalbert's Charm"
gerdom.280.d:0 "When Adalbert von Preußen was chosen to become the king of the freshly renamed state of Flanders-Wallonia, he had perhaps the worst possible situation out of the new nations ruled by a German monarch. The German occupation of Belgium was a bloody affair, and even firebrand nationalists within the Kaiserreich cannot with good conscience claim that everything the Heer did in the small nation was justified or moral. The installing of Prince Adalbert as their new ruler was seen as the final humiliation by the Belgians, especially as the throne he now reigned from was previously held by the immensely popular Knight King Albert I. Nonetheless, Adalbert attempted to win his new subjects over by making numerous concessions, such as breaking the tradition of a coronation to instead swear an oath to the Belgian constitution, and much more scandalously to all pious Protestants in Germany, converting to Catholicism.\n\nYet during his reign as the king of Flanders-Wallonia, little has changed in the hearts of the locals. Many still hold their loyalties to the old monarch in exile, or harbor dreams of an independent Belgian republic, with few having much love for their new, relatively authoritarian king. The Deutschkonservative Partei government has its work cut out for it with the Belgian Hohenzollern, but there are some options that advisors of the party claim could help with the situation. Walther Graef, member of the DkP and long-standing media expert, has claimed that the best way forward would be to further distance Adalbert from the German ruling family in his mannerisms. Trying to get the monarch to somewhat slip from his previous absolutist nature might be the biggest aid for his image, but there are other options to turn Adalbert into a more humble figure.\n\nA common contrast made between the German and British royals and their other European counterparts, especially those in Scandinavia or the Netherlands, is that the Germans rely on martial pride, regal pomp and grand display of their superiority to the common man. If Adalbert were to adopt more down-to-earth habits, perhaps using a less militaristic royal garb, adopting local dress customs and possibly even ditching the exquisite luxury cars from the Ruhr for a local Minerva model or even using a locally made bicycle for his transport option. Using such a common and modest vehicle to move around would be unheard of for any other German monarch, but the popularity of cycling in the Low Countries is massive and it would make Adalbert appear more ordinary to his subjects, hopefully making them forget his origins bit by bit. It is certainly unorthodox, but when in Brussels, do as the Brusselians do."
gerdom.280.a:0 "Look out, Brussels! Here comes Adalbert!"
gerdom.280.b:0 "Now to wait and see if that did anything..."

gerdom.281.t:0 "In Vasyl's Court"
gerdom.281.d:0 "Vasyl Vyshyvanyi, or as he is still known in the German-speaking regions of Europe, Wilhelm Franz of Austria, the king of Ukraine, is a rare exception in the monarchies installed by the victorious Central Powers following the Weltkrieg. Unlike many others, Vasyl is a genuinely well-liked king to his people, largely in part of his personal participation in the fighting for free Ukraine and the long fascination and love the monarch has had for the Ukrainian people. Nonetheless, increased diplomatic and political support from the Deutschkonservative Partei’s new Reichskanzler and his government will hardly go amiss, but there is something Vasyl has requested from the Kaiserreich’s government in turn.\n\nUkraine is, by its very nature as the breadbasket of Europe, of immense strategic importance to the entirety of Mitteleuropa and the Reichspakt, and thus the German presence in the nation often surpasses the other Reichspakt nations, especially in cities such as Kyiv. Vasyl, who has often found himself at odds with the very pro-German Hetman of Ukraine, Pavlo Skoropadskyi, is increasingly frustrated at the interventionist nature of the German troops in Ukraine and the entire Kaiserreich as a whole, feeling more and more that the leadership of the Reichspakt does not really trust the Ukrainians to handle the matters of their own state in a proper manner. Thus, the Ukrainian monarch has requested the current government of the German empire to ease up the pressure and constant surveillance of the Ukrainian domestic politics, seeing it as far more detrimental to the young state than just letting the Ukrainian government operate in peace would do.\n\nWhile the Kaiserreich’s vigilant eye has hung over the Eastern European state for a reason, considering the many anti-German forces contained in the nation and the threat of revanchist Russian state, perhaps Vasyl is right in his assessment. The local garrison troops shall be told to remain more aloof from matters of Ukrainian domestic politics, and the Reich’s diplomats and administrators shall equally distance themselves from the state apparatus of Vasyl’s realm. After all, how is the Kaiserreich going to build trust between the two nations if it does not allow such a trait to grow organically?"
gerdom.281.a:0 "...So, all good then?"
gerdom.281.b:0 "Just make sure the grain gets here on time."

gerdom.282.t:0 "Uladzimir's Fears"
gerdom.282.d:0 "King Uladzimir of White Ruthenia, the nephew of Kaiser Wilhelm II, has been a rather troublesome monarch for the Reichspakt during his multi-decade rule. While he served commendably during the Weltkrieg and even dabbled in state governance during his father’s, Heinrich von Hohenzollern’s, rule over the young nation of White Ruthenia, Uladzimir was still wholly unsuited to rule when he was crowned as the monarch after the passing of his father. Cursed with the legacy of Queen Victoria through his hemophilia, Uladzimir is not a strong presence on the best of days, and often must retreat from the public eye for weeks at a time to recover from the terrible condition he has been stricken with.\n\nIn addition to his illness, the royal family still possesses many estates in the Kaiserreich itself that Uladzimir must tend to, and these cumulative factors have made him something of a shadow monarch that the Ruthenian people have little love for. However, unlike some other German-installed monarchs, Uladzimir is not aloof towards his people out of disinterest, but simply because of his sheltered upbringing and general fear towards putting himself out there in public displays. However, to encourage Uladzimir to adapt a more charismatic and outward personality, the Deutschkonservative Partei government has reached out to numerous cultural figures in the field of theatre, such as Kurt Horwitz and Helmut Henrichs, who have both done long careers as dramaturges and directors.\n\nWith their assistance, Uladzimir will be given the best possible tools to not only improve his performance and likeability in the eyes of the Ruthenian people, but also to increase his confidence. Through careful honing of his speechcraft, posture, expressions and ‘stage presence’, the shy king shall be transformed into a true man of the people, and while displays of charisma alone will not win him the unconditional love of his people, they are still more than likely to increase his public appearances and regal visits to the people, reminding them that they do have a monarch who cares deeply for the woes of his people."
gerdom.282.a:0 "...Well, that was enough for one week..."
gerdom.282.b:0 "Just be yourself!"

gerdom.283.t:0 "The Youth Question"
gerdom.283.d:0 "The proliferation of the so called Halbstarke behaviour among especially young German men has not escaped the notice of the Deutschkonservative Partei, and while the youth engaging in ruffian activities is nothing new, the most dangerous aspect of this aimlessness and volatile aggression among the adolescents has come from their participation in the various paramilitaries of the Kaiserreich. The ideological radicals of the German nation are more than happy to utilize the disillusionment of the Halbstarke as a weapon for their own gains, especially in the wake of the Black Monday crisis. Many of these hooligans and vandals are caught and prosecuted, of course, but filling prisons with the youth of Germany is surely a wasteful outlet for this societal ill. The new DkP government has been divided on the matter of how to handle the issue, with the various cliques of the party proposing their own solutions. The militarists of the party, led primarily by Paul von Lettow-Vorbeck, have suggested that the iron discipline and controlled extension for aggression within the Heer will set these troubled men straight, as martial institutions have done since the very dawn of humanity. Others, primarily members of the Christlich-Nationalen Bauern- und Landvolkpartei faction of the DkP, have instead proposed that the men should participate in communal activities and help bolster workforces of urban projects or rural harvest seasons so that they could feel more included in the society, and the subsequent scattering of the Halbstarke movement to all corners of Germany would hardly hurt the matter either. More nationalist sections of the party, especially those in tune with the Völkist movements of the German-speaking world, such as Kuno von Westarp and Albrecht von Graefe, have in turn brought the possibility of mimicking the Wandervogel movement, which is a rather prominent youth organization not only in Germany but also in areas such as the Sudetenland, supporting a return to nature and building a sense of kinship through shared adventures, in addition to creating a sense of nationalism in the youth."
gerdom.283.a:0 "The Heer can sort them out!"
gerdom.283.b:0 "Some community outreach might be in order."
gerdom.283.c:0 "Perhaps the state should make its own Wandervogel Movement?"
gerdom.283.e:0 "They need distractions! Make some investments in football clubs!"

gerdom.28401.t:0 "A State-Funded Film?"
gerdom.28401.d:0 "Despite the government and a majority of the military understanding all that had been gained in the fires of the Weltkrieg, there has been a growing sense of apathy and cynicism in large portions of our citizenry regarding the whole affair, especially as the legacy of the subsequent Ludendorff Dictatorship is reassessed and the optimism of the Tirpitz Golden Years fades. While government efforts in the sphere of propaganda are still ongoing, constantly attempting to display the full splendor of our wondrous conquests, there have been some suggestions for a far more "decisive" propaganda campaign than simple posters, paid headlines, and interviews.\n\nEven as the state budget remains under close scrutiny, more than a few idealistic civil servants have tried to persuade the Reichskanzler towards the funding of a massive film project, with a flagship title that will likely end up as the most expensive movie ever produced in Germany. So far, only the concept of creating a leading film, alongside companion productions on a smaller scale, has been gaining traction amongst the DkP. The world of films has already shown its use in capturing the minds of the people more than any other medium, and most DkP members have grown affectionate towards the "Kinoprojekt", claiming it will help shake off their image as an "unchanging" force.\n\nThe conservative bureaucracy might not be the most well-versed in making movies, but thanks to the full resources of the state every possible director, film subject, and actor is up for the taking in order to ensure total artistic success. In the best case scenario, the budget may even be fully recouped in mesmerizing profits alongside mobilizing our people into loving Germany as much as they had before!"
gerdom.28401.a:0 "Let's try it out, invigorate the people once more!"
gerdom.28401.a_tt:0 "§LThe government will have to make decisions in numerous areas of the filmmaking process, with particular choices 'combining' with one another to result in a successful cinema experience. Choose wisely!§!"

gerdom.284.t:0 "Film-Making - Subject"
gerdom.284.d:0 "With the Kinoprojekt officially approved by the government and Deutschkonservative Partei officials, the whole endeavour has progressed beyond the wishful dreaming of a few bureaucrats and intellectuals into a true conquest of the big screen, at least in the ambitions of the government ministers. However, while there is a general sense of enthusiasm towards the entire ordeal, it cannot progress into a full-blown film without a clear direction and theme. Given the situation in the bleak post-Weltkrieg and Black Monday Germany, the theme must be spot on to capture the hearts of the people, and drum up support not only for the DkP but the Kaiserreich’s entire state apparatus. Four options have been laid on the table, stemming largely from the ideology of the party as well as the general subjects that seem to be rather popular in the realm currently.\n\nThe first option would be to create a film based on early modern Germany, harking back to the tumultuous century that brought the currently greatest nation on Earth to the place it now occupies and coasting on nostalgia for the pre-Weltkrieg Germany.\n\nHowever, a war film dealing with the experience of the Weltkrieg and the brave Soldats who fought for the Kaiserreich could also certainly help the nation deal with the psychological aftershock of the war and divert attention back to the old enemies and Spartan heroes of the conflict. Given the closeness of the local population to the war to end all wars, the topic is risky, but it could drum up patriotism if executed well. Another option for such a moving picture depicting patriotic and possibly even militaristic German warriors would be to set the story of the Kinoprojekt in medieval times, with a focus on the chivalric and fervent past of the Teuton knights and their dauntless adventures.\n\nSuch an epic would take quite a bit of planning and staff to create in a rather bombastic fashion, but it might return a sense of martial pride to Germany at a time it is sorely needed, while skirting the topic of the Weltkrieg. Finally, given the immense popularity of the Kaiserreich’s fighter aces, such as the Red Baron and Hermann von Göring to name a few, a film set in the Weltkrieg but from the perspective of the nation’s finest knights on their ramshackle warbirds could be just the panacea needed to bring back German spirits and of course, show the might of the German technological superiority in the air."
gerdom.284.a:0 "An early modern story!"
gerdom.284.a_tt:0 "§LFilms focusing on the Napoleonic Wars and Frederick the Great have had success so far, but they remain somewhat experimental. Actors with gravitas and filming locations with appropriate sets are highly recommended.§!"
gerdom.284.b:0 "Something about our men in the trenches!"
gerdom.284.b_tt:0 "§LWhile a few films set during the Weltkrieg have been made, many remain apprehensive about the subject when it concerns the more muddy aspects of the war. However, a few directors have a clear talent towards it, and a few actors have shown promise.§!"
gerdom.284.c:0 "A medieval epic!"
gerdom.284.c_tt:0 "§LThe castles that dot certain parts of Europe have always been a boon to films set in the middle ages, and there remain some directors that specialize in the subject.§!"
gerdom.284.e:0 "A tale of our dashing pilots!"
gerdom.284.e_tt:0 "§LFilms that focus on pilots have always been a hit, but they are highly reliant on the weather of the filming location and the prestige of the lead actor.§!"

gerdom.285.t:0 "Film-Making - Director"
gerdom.285.d:0 "After much deliberation which ended with us picking a concrete theme for the coming cinematic work, we are now faced with an even tougher decision. Who shall be given the reins of this potential cinematic masterpiece?\n\nAs the funding is not an issue, due to the Universum-Film AG receiving full support of the Chancellery, the question facing the board is who could be up to the task of creating a masterwork in propaganda. It will take a person who is not afraid to treat the subject with the respect it deserves, and thus even some notable directors such as Robert Siodmak, Ernst Lubitsch or F. W. Murnau have been already excluded pending certain qualms about the specifics of their current work and character.\n\nTo expedite the process a special group made up of experts from the Deutschkonservative Partei and the UFA formulated a final list of four directors that could be tasked with the monumental job before them. The first, and most promising according to many within the cabinet, is Veit Harlan. While so far mostly known for acting, he has created a few dramas which show that there is potential in the young filmmaker, especially as he's not related to any explicitly public political movement according to our investigation. The second, and perhaps more surprising, is Victor Tourjansky, a Russian émigré that left his homeland during the outbreak of the Civil War and then moved to Germany from his temporary abode in Crimea after the intervention was over. Despite the cries of the most rightist elements of the party, others note that immigrants have already proven themselves as directors in other nations, pointing to the fame acquired by Charlie Chaplin after he moved to the USA. The third, and more conventional of choices compared to Tourjansky yet still with notable worries, is Karl Ritter. On the surface, he’d be a perfect candidate, a Weltkrieg veteran who turned his gaze towards the cinema business. Yet, what concerns the moderates within our party is that Ritter is open about his far-right views, and could influence the movie's final shape to fit Schleicherist, or worse, perspectives, something that the supporters of the fighter pilot shoot down by reminding us of the popularity of D. W. Griffith's radically political "The Birth of a Nation". The final choice, the most exotic of all, would be to hire Leni Riefenstahl. As strange as it may seem to hire a young woman, even borderline heretical according to many within our party, she has already proven herself by her work on the "Unser Kampf" film project. Not only that, but they also note that female directors are capable of creating impactful movies like the work of Alice Guy-Blaché proves. Riefenstahl could be convinced to work for the state on future propaganda pieces, but would also provide a boost in our perception among the women's movement.\n\nA final decision will ultimately be made, the UFA knows that it cannot delay the subject forever, but any proposal they announce must meet with the approval of the Reichskanzler. So who shall the man, or woman, that will carry the German people towards a great triumph on the screen be?"
gerdom.285.a:0 "Veit Harlan"
gerdom.285.a_tt:0 "§LVeit Harlan may not command as much prestige as some of the more notable directors of the German film industry, but that is a benefit itself as he will not ask of much for his involvement in any governmental project. Some of his involvement in film has been in the acting profession, notably with the historical musical "Frederica", whereas his director filmography has thus far been dominated by comedies and dramas.§!"
gerdom.285.b:0 "Victor Tourjansky"
gerdom.285.b_tt:0 "§LVictor Tourjansky, self-exile from Russia following the October Revolution, has already made a bit of a name for himself with dramas such as "Volga Volga" and "Volga in Flames", both of which are centered around his former homeland, with the latter of the two films being set during the time of Catherine the Great.§!"
gerdom.285.c:0 "Karl Ritter"
gerdom.285.c_tt:0 "§LA former military pilot during the Weltkrieg, Karl Ritter has made it evident that he would quite enjoy working on a movie for propaganda purposes, but his numerous connections to the far-right have made some in the more moderate DkP rather uneasy. Regardless, most of Ritter's film experience has him as a producer, such as in the adventure film "Decoy", and thus this would be his first efforts as a director.§!"
gerdom.285.e:0 "Leni Riefenstahl"
gerdom.285.e_tt:0 "§LLeni Riefenstahl has already started to make a name for herself as a bit of a film-making wunderkind, notably gaining attention with her work "Das Blaue Licht". While her desire to make a propaganda film has been a little muted thus far, and more conservative DkP members remain skeptical of her talent, others think utilizing her would be a good means to co-opt a piece of the overall women's movement.§!"

gerdom.286.t:0 "Film-Making - Lead Actor"
gerdom.286.d:0 "With the choice of a moving picture theme set in stone for the Kinoprojekt, the next task for the assembled media assistants, film experts and other production crew is to find the suitable dashing actor to lead the flagship project of the Deutschkonservative Partei’s government. Given the stakes at hand, there can be no missteps with the choice, and thus only the best and brightest stars of the German acting scene have been selected as possible options. These gentlemen of the big screen include Willy Fritsch, Gustav Fröhlich, Otto Gebühr and Heinz Rühmann, each with considerable clout in the cultural circles of the Kaiserreich and talents of their own.\n\nFröhlich is a rather versatile figure given his international resume, numerous collaborations with Hollywood and appearances in numerous famous cinema pieces of the last decade, namely the financial flop but nonetheless widely lauded sci-fi film Metropolis. He is generally cast in the role of a sensible cavalier, though Fröhlich’s talents allow him to step outside the role as well. Otto Gebühr on the other hand is a very well-liked choice among the DkP, as he has appeared in numerous films portraying various monarchist figures of the German past and is generally seen as the face of German monarchism on the big screen, regardless of his personal sympathies. Many consider his stoic displays on the big screen to be his greatest asset. Meanwhile, Heinz Rühmann is a rising star among the German cinema circles, fighting his way to the top from relatively meager beginnings and making a name for himself especially as a comedy actor.\n\nCompared to the others, Rühmann is generally seen as an everyman figure on the big screen, something his filmography thus far tends to reflect. Finally, another comedy actor is Willy Fritsch, who has nonetheless slowly transitioned to more serious films at the end of the last decade. He netted fame for his boyish looks and great capacity to perform leading roles, and the ongoing decade has only seen Fritsch’s star grow ever brighter. Only one man can shape the future of the Kinoprojekt, and while all actors have their qualities and weak points, a decision must be made between these four leading men of Germanic cinema."
gerdom.286.a:0 "Gustav Fröhlich"
gerdom.286.a_tt:0 "§LFröhlich is a darling in Germany, but he also has a level of popularity in Hungary.§!"
gerdom.286.b:0 "Otto Gebühr"
gerdom.286.b_tt:0 "§LGebühr is known for his stern and authoritative presence on camera, and has often been cast in regal roles.§!"
gerdom.286.c:0 "Heinz Rühmann"
gerdom.286.c_tt:0 "§LRühmann's appeal to the wider German populace could be a boon for certain film subjects.§!"
gerdom.286.e:0 "Willy Fritsch"
gerdom.286.e_tt:0 "§LFritsch has proven himself the lovable sort, but he seems to show promise for something daring.§!"

gerdom.287.t:0 "Film-Making - Location"
gerdom.287.d:0 "With the theme, director, and leading man set for the Deutschkonservative Partei’s flagship film, a new dilemma has appeared to the forefront. The central building blocks still lack the location of the new film, as the theme can only work as well if it is filmed in the proper setting. A natural solution would obviously be to shoot the moving picture right here in the ancestral lands of all Germans, using the varied topography, biological diversity and regional differences to the fullest advantage in the creation of the Kinoprojekt. Nonetheless, there are advantages and disadvantages to this decision, and it could limit the creative potential of the actors, directors and film set creators in the long run. Another alternative is to utilize the numerous connections the cinema magnates and DkP politicians have to the Eastern European states to get permits for filming, as it would allow the crews of the Kinoprojekt to explore avenues and setpieces that simply do not exist in Germany, making the potential film more realistic or ‘period accurate’.\n\nUndeniably these states would also be cheaper locations to shoot the entire thing in, given the difference in the maturity of economies between Germany and its Eastern allies. Finally, for a breeze of the famed Mediterranean air and the warm rays of the sun, the Kinoprojekt could be shot in the Southern European states, ranging from Reichspakt-friendly nations such as the Kingdom of Two Sicilies and Spain to the islands in the region with significant German presence, such as Malta and Crete. While this would pose some logistical issues, the setting is close enough to not be a drain on the project’s resources while still possessing a degree of exoticism for the people of the Kaiserreich."
gerdom.287.a:0 "Germany"
gerdom.287.a_tt:0 "§LThe Fatherland has plenty of suitable locations for filming, notably castles, but filming in Germany with popular actors tends to draw eyes.§!"
gerdom.287.b:0 "Eastern Europe"
gerdom.287.b_tt:0 "§LThe more rugged living off in Eastern Europe, alongside its abundance of "old" styled towns, has still kept it in the eyes of various directors.§!"
gerdom.287.c:0 "Southern Europe"
gerdom.287.c_tt:0 "§LWhile the temperature can sometimes become a little biting, the pleasant skies in Southern Europe have made it a token favorite for many film-makers.§!"

dkp_moviecombo_tt:0 "§GThe movie will be more successful!§!"

gerdom.288.t:0 "Veit Harlan's Expertise with the 18th Century"
gerdom.288.d:0 "Given the importance of the Kinoprojekt to the Deutschkonservative Partei government and the entire party’s image, the appointment of Veit Harlan as the director of the upcoming flagship program of the party was controversial, to put it mildly. Harlan is a talented actor, and has appeared in numerous films since the end of the 1920s, but his directorial work has thus far been relatively light. His comedy film Krach im Hinterhaus and drama piece Maria, die Magd, some of the more successful recent pieces of cinema by Harlan, have been good films, and few can deny it, but some of the DkP’s old guard still consider him something of a greenhorn in the field.\n\nNonetheless, once the setting of the film in the early modern era was chosen by the Kinoprojekt committee, Harlan’s place as the new director became far more reasonable. During his acting career, numerous films of his, from Es flüstert die Nacht to Yorck and Die Hose, one of his earliest appearances on the big screen, have all been set in the period, with the first one also being an important footnote because of its story taking place in Hungary. Additionally, Harlan is currently finishing up his work on a film known as Der Herrscher, partially funded by the DkP’s rivals in the Deutsche Vaterlandspartei, which is also set in the last century.\n\nGiven his clear preference to working with various genres and themes of the last two centuries, Harlan may very well be the perfect choice to lead the Kinoprojekt to success, especially given the ample amount of time and funding the DkP government has been granting him. After all, when it comes to true art, experience is important, but an innovative vision is often the most direct route to success, and despite his short career in the industry, Harlan has shown himself very capable of performing ambitious miracles through his energetic direction."
gerdom.288.a:0 "He clearly has a preference for era!"

gerdom.289.t:0 "Gebühr's Frederickian Stoicism"
gerdom.289.d:0 "Germany, like many nations on the European continent, has had its fair share of great kings, from Frederick Barbarossa to the victorious Kaiser Wilhelm II, but the greatness of Frederick II makes many outright amazing monarchs pale in comparison. The reformer king embodied many of the attributes of an enlightened absolutist to perfection, and while Frederick the Great may have suffered a few blunders in foreign policy, his numerous programs and expansions to the rights and economic positions of his subjects are unquestionably some of the central pillars of the modern Kaiserreich today. In the field of cinema, many actors would find the task of portraying him daunting, but for Otto Gebühr, it has been sculpted into almost a second skin.\n\nHis first film with a clear monarchy-related stint, Die Tänzerin Barberina, was a mere warm-up for a decade-spanning spectacle that would be the actor's stint in playing the legendary German king Frederick II or, as he is more commonly known, Frederick the Great. Starting in the early 1920s, Gebühr would play the role of Frederick in four parts of the film series Fridericus Rex, only to return to the role five years later in a two-part film known as Der alte Fritz. However, outside of these two series, he also played the same monarch in numerous other films throughout the 1920s and 30s, becoming so iconic in the role that it is believed no man can truly embody Frederick the Great to the same degree now.\n\nWith the DkP’s Kinoprojekt well underway, Gebühr has employed his usual regal stoicism and talent at character acting to such a great degree that many members of the film crew, and to a greater extent, the various DkP members overseeing the project, can nearly taste success already. The name recognition of Gebühr as the man who defined Frederick II on the big screen is likely to already rake in the profits, but it is hoped that the man is capable of also reinventing himself for the large task at hand so that his performance this time transcends the already finely tuned ones done before."
gerdom.289.a:0 "He's really embodying an older gentleman!"

gerdom.290.t:0 "Junkers Provide Estates for Filming"
gerdom.290.d:0 "The entire Kinoprojekt was kept a relatively tightly guarded secret during the initial stages, but as the details have been hammered down by the Deutschkonservative Partei government and the numerous cinema experts hired for the task, parts of the project have managed to seep through the layers of secrecy into public discussion. While this has obviously gotten some ire, especially from the more left-leaning members of the Reichstag, who view it as a waste of money at a time when resources are very sparse, these breaches in secrecy have led to unforeseen consequences as well. Numerous Junkers, no doubt somewhat aware of the project because of their close relationship with the DkP titan and close friend of the Junkers class, Kuno von Westarp, have come forward with the proposition to use their own properties and estates for the filming of the flagship project of the party. However, while some such proposals had already been made by the DkP politicians before the project became common knowledge in the Kaiserreich, once details of its subject and time period became known to the people of the nation, such enthusiastic estate owners turning up to promote their mansions and castles for the film grew exponentially in size.\n\nEveryone from diplomats, such as Friedrich-Werner Graf von der Schulenburg and Ulrich von Hassell, to military men such as Heinrich Freiherr von Lüttwitz and business figures such as Gottfried von Bismarck-Schönhausen, has been eager to provide resources for the film, no doubt in hopes of both the publicity it brings to their particular noble house and stirring up patriotism in the German people in these dark times. While it would be difficult to pick simply one location to film in, the directors and film crews have instead worked with the government officials in ensuring that they are allowed to shoot different parts of the project in the estates offered for the DkP’s project. How coherent this will cause the film to be remains to be seen, but it is nonetheless clear that it will allow the artistic piece to truly capture the essence of its time period, as the estates have saved a piece of early modern Germany magnificently well."
gerdom.290.a:0 "How helpful of them!"

gerdom.291.t:0 "Riefenstahl's Capture of War"
gerdom.291.d:0 "Helene Riefenstahl, better known as Leni Riefenstahl, has always been a pioneering figure of German cinema, defying the conservative gender attitudes in the field and rising to the top from an actress and dancer to now being one of the rising stars of the wizards of the film camera. At the helm of the Deutschkonservative Partei’s new war film, however, she has shown that her experience and innovative nature is not merely limited to being a woman pioneer but also being a visionary of the camera techniques and iconography. Using various techniques not seen before on the big screen, such as tracking shots, where the camera moves on tracks to follow the action, she has been able to capture the chaos and brutality of the war on film in a manner that is respectful to the soldiers who fought in the conflict, while also showcasing their immense bravery in facing the odds.\n\nThe blending of infantry-based camera work with wide sweeps of the camera as it tracks low-flying airplanes has also left many within the Kinoprojekt astounded at the capabilities of not only Riefenstahl herself but the modern film cameras and techniques as well. Some have noted that Riefenstahl has managed to imbue the film with a great deal of patriotism as well, despite the subject matter’s bleakness, as the distorted and thundering music employed as background to the sweeping shots of the landscape with German Imperial flags and unit banners flying over the battlefield remind the watcher that even in the grueling maelstrom of the Weltkrieg, the sons of Prussia and other provinces fought on with iron will.\n\nThe use of panoramic wide shots, done with the use of airplanes loaned by the Luftwaffe, such as the newly arrived Messerschmitt Me 108 Taifuns, has made the scenes of the new film far more grandiose in size, as the true scale of the world-spanning war has been unleashed to theater audiences in detail hardly seen before. While it still remains to be seen whether Riefenstahl can truly manage to create a film capable of stirring up the martial pride Germans seem to have lost since the Weltkrieg, the current progress seems to encourage a great deal of anticipation in the government officials overseeing the program."
gerdom.291.a:0 "Both brutal and inspiring, her work with the camera is unparalleled."

gerdom.292.t:0 "Old and New Grudges"
gerdom.292.d:0 "When the Kinoprojekt truly took wind in its sails and exited the planning stages, the press raised a few questions about the supposed filming location being set in Eastern Europe. Journalists speculated that it could be seen as a direct threat towards Russia, which, ever since the assassination of Aleksandr Kerensky, has assumed a far more hostile stance towards Germany. However, while it may cause some boiling tempers in Moscow and Petrograd, a film detailing the mobile and varied battlegrounds of the Eastern Front of the Weltkrieg is hardly going to encourage Russia to attack the Reichspakt on its own. What the film has instead caused is a great deal of anticipation and excitement among the more patriotic sections of the German population.\n\nWhile the Western front of the Weltkrieg has been detailed extensively in books, radio shows, films, and even music, the Eastern front has been dwarfed by its more static rival, and a big budget film with a star-studded cast and a famed director at the helm has made many excited at the prospect. Given the intensity of the conflict in the east, as well as the far more moving and fluid battlegrounds, the varied ethnic composition of the east and the blurred lines between right and wrong, this side of the conflict is ripe to be explored through moving pictures. The authentic setting of the film, usually filmed near the actual battlegrounds, will hopefully lead to an even greater accuracy and life-like feeling.\n\nThe memory of the Eastern Front and intervention against the Bolshevik revolution is also perfectly suited for the current geopolitical position of the Kaiserreich, for the project can explore not only the battle against the Russian menace but also the extinguishing of the flames of Lenin’s dream. This will not only target the revanchist Russia but also show that Germany has beaten it once, as well as defeated the red threat of the communists, and the DkP government hopes that showcasing this particular front will lead to the people of Germany seeing the might of the German military once more."
gerdom.292.a:0 "This'll rile the people up!"

gerdom.293.t:0 "Rühmann's Ordinary Charm"
gerdom.293.d:0 "Heinz Rühmann has been one of the most promising actors of the recent decades, but some critics and cinema enthusiasts have noted that his penchant for comedic acting in pieces such as Der Mann, der seinen Mörder sucht and Die Finanzen des Großherzogs may have made his career more sluggish than it could have otherwise been. Others have noted that while Rühmann is an incredibly talented actor, his performances in films as an honest and goodhearted husband have been dwarfed by similar performances done by bigger names of the screen, such as Gustav Fröhlich. However, it seems that if the Kinoprojekt of the Deutschkonservative Partei manages to create a blockbuster or even a decently acclaimed film out of its current wrappings, then a new direction for Rühmann’s career may open into unexpected waters.\n\nPart of what has made Rühmann such a large figure in the comedy scene of German cinema is his outward appearance and ‘everyman’ looks, as compared to the great dandies and gentleman aristocrats of the big screen, Rühmann is far closer to the average film viewer. This attribute of the actor has made him perfectly suited for the Kinoproject’s new martial direction, as Rühmann’s looks make him far more believable as a soldier than the handsome and effeminate actors that usually grace local cinema audiences.\n\nPromotional material showing the actor in combat gear of the Weltkrieg has made many veterans of the brutal conflict comment on just how true to life the appearance of the film star appears to be in the artworks, and the marketing teams of the Kinoprojekt have been quick to capitalize on this phenomenon by emphasizing the relatability of Rühmann in posters and other artworks. His comedy background has also been a great help in selling the actor as a soldier, as the physical nature of comedy, especially in silent films, has allowed Rühmann to quickly learn the mannerism and body language of the average soldier, further enhancing his role as just another nameless soldier in the grand slaughterhouse of war."
gerdom.293.a:0 "On the screen, many of our veterans will see themselves."

gerdom.294.t:0 "An Abundance of Schlösser"
gerdom.294.d:0 "Germany, perhaps more so than any other nation in Europe, is a land of castles, from the mighty seat of the Kaiser himself in Burg Hohenzollern to the small but intricately detailed early modern era castles of the German countryside. As such, as the Kinoprojekt has been pushed out into the world to fulfill its mission, setting the film in Germany with its medieval theme has led to a positive problem for the film crews. Wherever one looks, there are castles and old fortifications, mansions, manors, and old churches in such abundance that the choice of filming locations takes twice the time of the filming itself.\n\nHowever, it has allowed the film crew to utilize numerous castles as the ‘headquarters’ of the different factions, noble houses, and royal courts of the film, picking and choosing between different aspects of each castle, from the whimsical and fable-like qualities of the late medieval Mespelbrunn Castle to the imposing fortress of Burghausen in Munich. This cornucopia of castles has allowed the film to tell a very rich and detailed story through visuals alone, and as a side consequence, the filming of the different scenes in the various castles is bound to increase the German people’s interest in their local history and land. Similarly, it will likely promote international visitors to also come see the various old fortifications of Germany, as the film depicts such immense variety and granular detail that could hardly be achieved in much younger nations such as the United States, at least in the same degree of authenticity.\n\nThe numerous noblemen and Junker businessmen have also been more than happy to provide their estates and old monumental fortresses for use, as many of these men and women are either already members of the Deutschkonservative Partei or closely aligned to it and thus personally invested in the success of the project. This fact has allowed the entire program to save up quite a bit of the budget given the generosity of the landowners, especially when compared to previous plans of filming the entire thing outside of Germany."
gerdom.294.a:0 "There's old stonework all over this place!"

gerdom.295.t:0 "The King in Spirit"
gerdom.295.d:0 "After the theme of a medieval epic was chosen for the Kinoprojekt, the difficult task at hand was to find an actor with enough regality and noble character to play the main role. After all, compared to the early modern monarchs, the medieval kings often have an additional sense of near myth-like quality in them, drawing from the tales of figures such as King Arthur, Charlemagne, and other larger-than-life monarchs. However, the choice of Otto Gebühr was, on closer examination, the correct one for the lead role. Gebühr is already the darling of the German monarchist elite, well-known in the circles of the Deutschkonservative Partei, but some naysayers noted that while he is the face of kings in Germany, his numerous roles as the stand-in for the great king Frederick the Great from the early 1920s to today have profiled him far more as an early modern absolutist monarch, not the wise and mythical medieval king who has to weigh the allegiances and desires of his unruly vassals at every turn.\n\nGebühr is nothing if not ambitious, however, and he has taken the new challenge with quite a bit of pep in his step, easily molding his previous performances as Frederick II into something different, yet familiar. Pouring over old tomes and character descriptions, Gebühr has taken his previous work and modified it to suit his new role at the helm of a medieval fiefdom. Compared to his many appearances as Frederick, the actor’s performance this time is less animated and bombastic, instead going for a more muted and detailed approach with the new king. For someone with a reputation for incredible stoicism, Gebühr’s change has been a surprise given that Frederick was already not the most animated character, but there has been little criticism for the change in style for the famed actor. It remains to be seen how the audiences view this change in the ‘King of German cinema’, but it has certainly suited the film particularly well, and his numerous admirers among the DkP are increasingly confident in the success of the Kinoprojekt."
gerdom.295.a:0 "Seems he's rather multi-faceted, hm?"

gerdom.296.t:0 "A More Grim Air"
gerdom.296.d:0 "After the Kinoprojekt got its theme and time period sorted, many experts and cinema enthusiasts who had watched its developments from the sidelines expected the supposed medieval epic to be filmed in Germany. After all, few places in the world have as magnificent citadels and glorious castles as the Kaiserreich, barring perhaps the nation’s southern brothers in Austria. These film buffs were rather bemused at the choice of southern Europe for the medieval epic, and to be frank, many within the Kinoprojekt’s support crew were equally cautious about the prospects, but as filming has kicked off in places like Hungary and various locations further down south in the Balkans, the international tour of film shoots has yielded considerable results.\n\nFrom the imposing Visegard Citadel located on a true eagle’s nest to the more traditionally-constructed Diosgyor and Eger castles, the film crews have had their share of locations to gather material in, and when the opposing factions of the story clash, the great strongholds of Hungary provide each of them a unique look into local culture and traits through environmental storytelling, lending character through simple visuals. The cameramen, actors, and directors have also noted that the vistas and overall atmosphere of the southern European filming settings have lent the film a far more overbearing and Gothic feel, which could have been far harder to achieve in Germany at this time of the year. Some speculate that it is simply a matter of the local climate, but others think it is a combination of the local mentality, weather conditions, and overall style of the regional nature. Whatever the case, the area has made for a far better location for the Kinoprojekt’s upcoming knightly spectacle than previously anticipated, and the director is hoping that it will blow away the self-important German-centric film ‘masters’ back home."
gerdom.296.a:0 "Fitting for our era, then!"

gerdom.297.t:0 "Ritter's Blank Check"
gerdom.297.d:0 "The government's decision to sign off on a film that focuses on the illustrious pilots of the Weltkrieg, alongside hiring a former pilot to do the job of directing, has already started to bear fruit. While Ritter is firm in making the stunts theatrical in measure, his understanding of what is possible for a pilot to accomplish has resulted in a shockingly low amount of accidents on set, which other aviation-focused films can only be envious over.\n\nRitter, thanks to his background, has been able to garner respect from some of the leading actors, resulting in some promising displays through the camera. While the man's own flying days are behind him, his dedication to the filming craft has made him confident that this piece will inspire a new generation towards the Luftwaffe. The news has assuaged a bit of anxiety among the DkP, who wondered if fixating upon pilots and their bombastic behavior would only spell a total disaster.\n\nOf most use, however, is Ritter's capacity for maximizing his budget effectively. While some of the spending has raised a few eyebrows, the effect has been quite substantial. Not only is there a wide array of shots taken of the ground, the pilots affecting an ongoing battle beneath them, but the money spent has led to most of the used planes being able to be painted and reworked in a manner befitting the illustrious, near fantastical, appearances of the Red Baron's old Flying Circus. Some of the civilian on-lookers viewing the ongoing filming have already seemed affected by the grandiose displays, asking UFA directly if they can order a seat at the film's premiere before it's even available!"
gerdom.297.a:0 "It's as if the Flying Circus is back again!"

gerdom.298.t:0 "The Charming, Debonair Ace"
gerdom.298.d:0 "Willy Fritsch is one of the most well-paid actors of his lifetime, emerging as a giant of the transition to sound cinema and garnering an adoring crowd of followers wherever he goes, even to such an extent that there are couplet songs written in Fritsch’s honor. However, while he has had an impressive career as the boyish heartthrob on the big screen over the 1920s and 1930s, his film catalogue of comedies, such as the recent Glückskinder and Amphitryon films, directed just before the Black Monday crash, hardly gives much credence to Fritsch’s new casting as the dashing Weltkrieg-era fighter pilot. His only real previous project to even come close to the Kinoprojekt’s new aerial subject is the film Frau im Mond, shot nearly a decade ago, whose science fiction topic did have some semblance of aeronautics in it, but hardly anything related to the venerable warbirds of the war to end all wars.\n\nNonetheless, some critics have noted that it is perhaps a sign of the times that the comedian and romance actor is drafted to perform in the serious war film epic about the predecessors of the modern and mighty Luftwaffe. Similarly, they have noted that the body type and overall appearance of Fritsch do tend to work rather well with the public perception of the fighter pilots of the Weltkrieg, and his roles as the charming young gentleman are made for the knights of the air on their wood and canvas steeds. The adoring fans of the actor have also been clamoring for further promotional material of the would-be ace pilot in the upcoming film, given Fritsch’s previous forays into acting while in uniform have been safe hits among the fairer sex of the Kaiserreich. Nonetheless, given the sudden departure from his lighter subject matters into a more serious, if equally adventurous and bombastic, genre, it remains somewhat unclear how the young actor will fare in his new role, but if the public reception is anything to go by, Fritsch may ascend to stardom even further with this expansion of his talents."
gerdom.298.a:0 "He's what the people want in a pilot and then some!"

gerdom.299.t:0 "Perfect Weather for Flying"
gerdom.299.d:0 "When the Kinoprojekt was set in motion with the flying aces of the Weltkrieg as its subject, there were some concerns about the difficulty of slotting the film shoots into the perfect timeframe where the weather would allow for the best possible capture of the fighters and the men who flew them. However, it would appear that choosing the Mediterranean as the location for the project was the right call, for the beautiful sunbeams and the mighty but light cloud fronts of the region are the perfect recipe for filming an air battle. The clouds especially have been a blessing for both the pilots and the crews covering their flights, for clear skies alone would make it hard to truly depict the speed of these groundbreaking machines, but with light clouds in the background, the true nature of these warhawks of the sky comes to light.\n\nThe lack of rain and relatively dry weather has also helped keep the aircraft in top shape, with no fear of moist air getting into the engines or ruining the canvas coverings of the old warbirds, though some have had to be tuned with various field modifications to avoid the overheating of their engines given the far greater temperatures in the Mediterranean than over the battlefields of the Somme and Verdun. The old Fokker Dr. Is, Albatros D.Vs and Eindeckers have been a bemusing but nonetheless exciting sight to many of the locals observing the filming from their villages and cities, especially when the planes engage in simulated air combat against their famed opponents ranging from captured Sopwith Pups and Camels to the S.E.5s and lumbering Handley Page Type O bombers. How well the Kinoprojekt does in German theaters remains to be seen, of course, but at least when it comes to the set pieces on the Mediterranean skies, few films, domestic or international, can claim to match them in spectacle and clarity."
gerdom.299.a:0 "If only it was this clear during the actual war."

gerdom.300.t:0 "Tourjansky's Personal Touch"
gerdom.300.d:0 "Even as Germany’s reach into the former territories of the Russian Empire has expanded with the establishment of numerous client states from the northern frostlands of the Kingdom of Finland to the warm shiny waters and ports of the Kingdom of Ukraine, the understanding of average Germans towards these territories has hardly kept up with this political reality. As the Kinoprojekt embarks on its grand task of filming a fully fledged creation for the cinemas of the Kaiserreich in these territories, many less experienced or locally connected directors would have likely run into difficulties not only with the language barrier but also with the local customs and peculiarities. However, the choice of the Ukrainian emigre Viktor Tourjansky as the man at the helm of the entire project has led to a very predictable success in the east, as his numerous connections not only with the Ukrainian cinema enthusiasts but also with wider networks of film buffs, directors, and actors in the region from Estonia to Belarus have allowed for a very smooth transition between pre-production and actual conventional work with the setting.\n\nIt is clear that Tourjanksy is a very versatile and driven director even beyond his position as a prime guide to the clueless Germans in the east, but the fact that he can combine his skills and experience in the film-making process with the native experience of living in Eastern Europe has led to a strong start to the entire Kinoprojekt. Of course, this golden goose alone will not lead to total success at the box office and critical reception, but for the film crew having to deal with local conditions, it has been a godsent as Tourjansky effortlessly navigates the complex bureaucracy and peculiar traditions of the locals and easily overcomes any language difficulties with his mastery of the Russian and Ukrainian languages. Compared to other German cinema attempts in the region, Tourjansky’s mission seems to have far less trouble in the region, which has made many in the Deutschkonservative Partei’s government very enthusiastic to see the final product."
gerdom.300.a:0 "He really wants to prove himself with this one..."

gerdom.301.t:0 "Fröhlich's Hungarian Connection"
gerdom.301.d:0 "When the Southern European setting was chosen for the Deutschkonservative Partei’s new propaganda film, most expected the piece to take place in the sunny beaches of the Adriatic or the scenic villages of Italy or Spain, but as the project landed in Hungary, an unexpected but very welcome coincidental link was discovered in the production. Gustav Fröhlich, the globetrotting star of the Kaiserreich, was not only the darling of German and American cinemas but also a familiar face in the Hungarian elite. Despite making his breakthrough in Germany, Fröhlich has made a considerable career with the Hungarian actor-director Géza von Bolváry, and Fröhlich’s own foray into directing was the joint-venture film created between German, Austrian, and Hungarian film studios, named Rakoczy-Marsch. In addition to his cinema adventures in the nation, Fröhlich clearly has a preference for the fair women of Hungary, as his first wife, Gitta Alpár, was a local actor and opera singer and netted quite a bit of fame in both Europe and America. However, the pair’s marriage unraveled in the mid-1930s, and they divorced in 1935, though according to gossip, their relations remain relatively positive to this day.\n\nFurther gossip since then has linked the actor to another Hungarian actress, Lida Baarova, whom he has appeared alongside during numerous German-Hungarian films, though the status of their relationship remains murky even to the most ardent celebrity followers today. These private matters of the actor, of course, matter little in the grand scheme of the Kinoprojekt’s development, but it is clear that Fröhlich has a strong interest in Hungarian culture, customs, and language, and beyond his acting role, he has helped get the production running smoothly as the film crew travels around the nation. Locals have been charmed by the famed actor conversing with them in their difficult native language, and the Hungarian cultural elite has given ample direction and funding for the film out of the blue simply because of Fröhlich’s name being attached to it, granting a surprise success for the entire program."
gerdom.301.a:0 "Unexpected, but welcome!"

gerdom.302.t:0 "The Easy Star"
gerdom.302.d:0 "The Kinoprojekt has been, since the beginning, a rather risky and uncertain program through and through. While the funding obviously is there, given the state coffers and ample support from numerous sources, chief among the Junker elites and generous figures from the ranks of the Deutschkonservative Partei, if the film is a total flop with no redeeming characteristics, the harm to the party’s reputation could be considerable. No film is ever going to cause a government collapse, of course, but in the volatile political situation of the Kaiserreich in the aftermath of Black Monday, there can be no mistakes when it comes to allocating state funding.\n\nHowever, it seems that the planning phase of the Kinoprojekt was done in a very thorough manner, as the choices of the protagonist’s actor and the location have attracted quite a bit of hubbub in the German public discussion. Gustav Fröhlich, known nationally and increasingly also globally as the gentleman dandy actor, is simply a superstar of German cinema, especially after his appearance in the monumentally important Metropolis film of the last decade. His shining star, combined with the simply universal and instinctually patriotic fact that such a film shot in Germany evokes in the people of the Kaiserreich, has seemingly scattered away any fears of a total flop among the driving forces behind the Kinoprojekt. The film obviously still needs to appeal on more levels than simply its lead actor and the setting, but with such a secure foundation under it, the DkP government, film crew, and director are all met with a whole new burst of enthusiasm towards the entire program."
gerdom.302.a:0 "Success is usually guaranteed with such starpower."

gerdom.303.t:0 "Rühmann's Neutral Maneuvers"
gerdom.303.d:0 "The Kinoprojekt is already going ahead at full steam, and while there is a great deal of hubbub and rumors swirling around it in the general population, the marketing specialists have noted that there is a central challenge that could spell doom for the entire venture. Even if the film is an utter masterpiece and all the aims of the Deutschkonservative Partei government and Reichskanzler are met in its creative direction, it may still suffer a defeat at the box office simply because of its political connections. However, they have reassured the DkP government’s ministers that the central choices made in the planning stages of the entire scheme were rather excellent in relation to this particular dilemma.\n\nWith Heinz Rühmann as the lead of the film, the political leanings of the DkP have faded in the background far more than anticipated, as the actor is known as a rather apolitical figure, avoiding statements on recent events and policies like the plague. His only real political preferences throughout Rühmann’s career have been vague support for a democratic nation, but otherwise he is, in real life as on the stage, a rather blank slate. The film’s setting in Germany combined with the politically neutral nature of its lead actor has made the forces behind the film far less pronounced, and thanks to this, the Kinoprojekt is seen far more favorably even among the political opponents of the DkP, chiefly Sozialdemokratische Partei Deutschlands and Fortschrittliche Volkspartei voters, who had originally seen the film as little more than the propaganda mouthpiece of the DkP cabinet. The truly apolitical combo of Rühmann and the classical German setting may boost the numbers of the film at the theaters, but only time can tell if it is enough to dispel the public’s negativity toward the entire Kinoprojekt."
gerdom.303.a:0 "This should endear us to more than just our base."

gerdom.304.t:0 "It's Showtime!"
gerdom.304.d:0 "Ever since the Kinoprojekt’s filming ended and the production entered the last stages, the various ministries, dignitaries, and, of course, the entire film crew, including its director and actors, have been in a state of immense trepidation. While spirits were high throughout the process, and all the various hurdles related to film creation were overcome sooner or later, the fact that film is produced and directed under the guidance and supervision of the current government has made many scoff at the film as nothing more than Deutschkonservative Partei’s little propaganda piece.\n\nHowever, in the bleak post-Black Monday period, where many films struggle to ever get the funding needed to break out of the production phase into cinemas nationwide, the prospect of a state-funded film has made many rather excited at the entire endeavor, with film enthusiasts around the Kaiserreich eager to see what marvels the inflated budget from state coffers was able to conjure onto film reels. As the cinemas open around the nation, and even the Kaiser has announced that he will see the film personally, the DkP government is hardly able to stay put in their seats as they await the reports from the German public."
gerdom.304.a:0 "The verdict is..."
gerdom.304.b:0 "The verdict is..."
gerdom.304.c:0 "The verdict is..."
gerdom.304.e:0 "The verdict is..."

gerdom.305.t:0 "A Cinematic Masterpiece!"
gerdom.305.d:0 "Reports began to trickle into the offices of the Kinoprojekt committee mere hours after the first showings of the film had concluded in German cinemas, and what had began as a small stream of positive reviews soon became a torrent of tribulation. What had begun as an ambitious but rather directionless venture of the Deutschkonservative Partei’s attempt to polish German pride in the aftermath of the Black Monday crisis had morphed into one of the cinematic cornerstones of the decade, if not the entire century thus far. The film critics, from domestic figures even on completely opposite political directions to the DkP to big names of the international critic scene, such as the Swedish Bengt Idestam-Almquist, have praised everything from the smoothly flowing and cleverly written dialogue to the beautiful and innovative camerawork and the clear attention to detail and setting as well as the harmonious and perfectly fitting music composed solely for the Kinoprojekt.\n\nBut even more important than the critical reception was that of the German people, who left the theaters in awe at the marvels they had just witnessed. From peasants of the Bavarian farms to the high society of Berlin and Frankfurt, seemingly every single soul who entered the theaters this day came away touched in some way by the film. The success of the entire program has seemingly caused the popularity of the government, as well as the actors, directors, and other personnel involved with the affair, to shoot up into previously unseen heights, and the box office profits have already made up a good chunk of the funding spent on the film."
gerdom.305.a:0 "Let's see Hollywood top that!"

gerdom.306.t:0 "A Resounding Success!"
gerdom.306.d:0 "The sense of trepidation in the offices of the Kinoprojekt committee had almost reached unbearable levels when, finally, after what had felt like an eternity, the first reports from the cinemas nationwide began to arrive. Rather soon it became evident that while the film had been a success, it would be no cinema-defining masterpiece. Nonetheless, as more and more feedback was gathered, the picture became clearer. Among the critics, it was seen as a good film, with very creative directing, rather impressive set pieces, numerous innovative features, and, of course, a rather strong cast, but especially for the pioneers of the critic field, such as the Swedish globetrotter critic Bengt Idestam-Almquist, something was missing from the final product that would have driven the film over the edge of good into the territory of true greatness. Audience reception mirrored that of the critics, with the film making a good deal of its budget back in the first showings and the people of Germany viewing it as well worth the money that was spent on it, but with few calling it a particularly transformative experience. The Deutschkonservative Partei has won a few new supporters thanks to the film, and the government’s popularity has been increased thanks to the success of the moving picture, so all in all the project achieved what it set out to do."
gerdom.306.a:0 "That's a good sign for our future propaganda efforts!"

gerdom.307.t:0 "A Palatable Enough Film"
gerdom.307.d:0 "The overbearing anticipation of the various ministers and propaganda officials had grown to immeasurable size by the time the first reports of the success, or failure, of the Kinoprojekt reached their offices, but what awaited them on those lines on paper was a rather dismal sight. The film, while not an outright terrible endeavor, had hardly impressed critics either internationally or in domestic audiences, and there were many points of failure pointed out in both the reports and later on the pages of various newspapers around the Kaiserreich. Everything ranging from the acting to the setting and direction got its fair share of flak from the critics and also unprofessional members of the public, though the reception was not entirely negative and some parts of the film were praised as good or enjoyable.\n\nNonetheless, public reception has been generally rather ambivalent about the entire affair, and while the expected sources of criticism from the numerous enemies of the Deutschkonservative Partei have been rather vocal about the film, chief among them numerous members of the Sozialdemokratische Partei Deutschlands’ upper echelons, most Germans simply see it as a rather mundane turn of events. In fact, it seems that the greatest feeling that can be gained from the entire nation towards the film is a rather clear sense of indifference, which, while not a great result, is at least better than outright hostility. Either way, it has not done wonders for the popularity of DkP or the people involved with the film, but at the very least it has also not damaged said reputation much."
gerdom.307.a:0 "Well, at least it wasn't a disaster."

gerdom.308.t:0 "A Total Bomb!"
gerdom.308.d:0 "Despite all the resources, talent, and manpower poured into the Kinoprojekt of the Deutschkonservative Partei government and the involvement of various film studios, agencies, and experts in the creation of the film, the worst has come to pass. As filmgoers leave the theaters and cinemas around Germany, the most notable feeling among the masses of people is immense disappointment, followed at times by anger or schadenfreude directed at the DkP government. The critics, both in Germany and especially in nations hostile to the Kaiserreich, have lambasted the acting as wooden and uninspired, the direction as amateurish and incompetent, the setting as a complete failure, the music as intolerable screeching interrupted at times by a choir of partly destroyed instruments, and the themes as a clear attempt by the government to push unabashed conservative propaganda to the German people, hastily wrapped into the skeleton of a much greater film concept.\n\nCompared to the critics, however, many members of the public have used far more colorful language to describe the film, but those have hardly reached members of the Kinoprojekt due to the inability to put such language through public press. Rival parties of the DkP have used the situation to their advantage to directly attack the party for wasting public money on such a ridiculous venture, and for the actors and director involved with the film, it may have as well been career suicide given the aftermath. Even the Kaiser chose to not give an official statement after seeing the film, though this can be interpreted as a statement in itself. While the government may not collapse because of the sheer terribleness of the film, it has seriously damaged public perception of the DkP’s ability to govern and may lead to more political consequences further down the line."
gerdom.308.a:0 "...Maybe everyone will forget about it in a week?"

gerdom.309.t:0 "Tourjansky's Medieval Senses"
gerdom.309.d:0 "When Viktor Tourjansky was chosen to be the director of the Kinoprojekt, some of the more Völkist members of the Deutschkonservative Partei scoffed at the idea of the German propaganda film being artistically directed by a Slav of all things. However, such naysayers have been quickly silenced as the master set to work on the medieval epic ordered by the government, putting immense effort into sculpting a true masterpiece out of the resources he had at hand. While Tourjansky’s recent filmography, such as the film Volga in Flames, has generally dealt with 19th-century Russia, during his earlier years, the director created numerous films with a far more Middle Ages-inspired theme, such as The Great Magaraz, as well as numerous productions set in the time period at the precipice between the medieval era and Renaissance, such as an adaptation of Gogol’s Terrible Vengeance and The Wanderer of Afterlife, that took place roughly around the turning point between the 16th and 17th century.\n\nDrawing from these experiences, Tourjansky has truly exceeded any expectations placed upon him previously, and the attention to detail as well as the capability the director possesses in placing the viewer right into the era of knights, sorcerers, and feudalism is seemingly unmatched. This alone, of course, shall not drive the film to victory, but given his talents in numerous fields, Tourjansky may very well drive the medieval theme to ever greater heights through a mixture of innovation, knowledge, and experience."
gerdom.309.a:0 "He really knows how to immerse the viewer in that era..."

gerdom.312.t:0 "Snuff Out the Curse"
gerdom.312.d:0 "The German Empire has seen the decline of its nobility only accelerate as modernity rolls onwards, challenged by both the rising power of the proletariat as well as the wealth of the middle class bourgeoisie, but in their place has risen a new aristocracy. An aristocracy of office, as Reichskanzler Walther Rathenau puts it, is not particularly different from its previous form, but unlike relying on titles and noble blood going back centuries, the members of this new class rise from the middle class clerks, bureaucrats and other state officials with a degree of power and influence. These middlemen in the grand scheme of things are not powerful as is, but they are nonetheless drenched in nepotism, clientelism and corruptive rot on the efficiency of the empire. Or so the status quo has been ever since the creation of a modern bureaucratic administration in the Kaiserreich, but the tide of history seems to be changing against such men.\n\nSuch a scene unfolded in the sleepy town of Erding, where a local city official, a third in his line serving the family, had just swerved into the town square, fifteen minutes late from schedule. As the middle-aged clerk banged the door of his vehicle shut, seemingly without a care in the world for his lateness, he was ordered to identify himself by a voice laden with years of martial experience. The man recognized the speaker as a member of the Bayerische Landespolizei, though not one from the town itself, and as he managed to stammer an answer, the cold steel of handcuffs was quickly slapped to his wrists. Another accompanying officer glanced at the folder on his hand, read out the clerk’s full name and produced an explanation to this sudden police sting. According to the officer, the bureaucrat had neglected his duties and caused numerous financial and administrative errors, not to mention dozens of complaints from both members of staff and involved citizens.\n\nWhether his misgivings would amount to criminal offenses remained to be seen, but the policeman assured him that no stone would be left unturned to ensure just verdicts, though the man would likely not see his office anytime in the near future either way. As the clerk entered yet another car in the span of less than ten minutes, he could only ponder who to blame for the events that had led a descendant of such an illustrious family of local government representatives to such an utterly disgraceful state."
gerdom.312.a:0 "Error cannot be allowed anymore, not when the Empire's life is at stake."

gerdom.313.t:0 "The Machine with a Soul"
gerdom.313.d:0 "Finale event for Rathenau, in a sense. Judging by how his full content isn't released yet, this shouldn't be fully final in tone, and thus give instead a tempting glimpse into what his future content might be. Regardless, his creation, the machine of the Empire, is awakened and surging forth. Total efficiency, even if it came at the cost of individuality, and more and more of the "lower" classes are realizing they are not meant to ascend beyond their positions. Perhaps, though, Rathenau should go further. More of life regimented beneath managerialism, more of society catalogued and taken care of by those who understand what is best."
gerdom.313.a:0 "The mechanical beast of Rathenau's making awakens..."
gerdom.313.b:0 "...And, it feeds ever further, endlessly creating and innovating."

gerdom.314.t:0 "Uniting the Kaiserreich"
gerdom.314.d:0 "Many members of the Fortschrittliche Volkspartei have gotten their fair share of criticism from the more nationalist groups in the Kaiserreich for one reason or another, but few are as heavily under the ire of the radical nationalists as Walther Rathenau. Due to his Jewish background, the anti-Semitic organizations of the nation have often tried to discredit him as a mere puppet to Jewish international interest groups, but in truth Rathenau has always been a fierce German patriot. In his typical search for efficiency and smooth operation of the state, it is hardly surprising that he would find the minorities of the Kaiserreich to be a troublesome cog in the German imperial machine. The Reichskanzler sees the cultivation of a Germanic spirit, a mission for the entire people of the nation, as the utmost goal of all Germans, an end to mere Prussianism and the creation of a national sentiment that surpasses being mere Germans. The Americans and British have their own cause in democracy and civilization, the Russians in Slavic orthodoxy, and the Internationale as well in its global revolutionary zeal. Germany must strive for the Spirit and cultivation of it, to leave behind the wrappings of old and become a thinking nation where every man and woman is a labourer of a new Teutonic ethos.\n\nAs such, Rathenau’s vision for Germany has little room for the meddlesome minorities, who have resisted absorption into the majority thus far. The Jewish societies, the Slavic tribes within German borders, the French and Baltics, all must eventually become German and share in this greater spirit if it is to be cultivated with the efficacy it requires. However, the topic of minorities is not one that the Fortschrittliche Volkspartei is partially unanimous on, and thus Kanzler Rathenau and his government must make careful considerations as to how these minority groups are to be dealt with to not alienate the party base. Strengthening Germanization above the current status quo in a marginal manner would make for a slow but steady trickling of new converted Germans, but the government could also increase propaganda and agitation efforts among these sections of the population. Such extolling of the virtues of the New Society and Spirit of Germany and lambasting the backwardness of the traditions of minority groups could convince many within these communities to seek closer unity with their current homeland.\n\nNonetheless, while it would be politically costly and somewhat dangerous to the stability of the realm, the Rathenau cabinet could also seek to enforce heavy-handed Germanization policies nation-wide, achieving results quickly but in a rather risky form."
gerdom.314.a:0 "Enhance ongoing Germanization efforts, but don't push too hard."
gerdom.314.b:0 "Minorities should be made to understand they will always be as they are, unless they assimilate."
gerdom.314.c:0 "The only culture permitted to live in the Empire is German."

gerdom.316.t:0 "Expanding the Kanzler's Influence"
gerdom.316.d:0 "The Kreuzzeitung is vital for Germany. With offices all around the world, and with its close ties to its owner and main supporter Westarp, it is effectively the mouthpiece of the DkP government. As part of the Reichstag's focus on achieving stability and calm on the homefront, the Kreuzzeitung is being nurtured with extra funding to have this mouthpiece of the upper elites, bureaucrats and intellectuals finally leave the Prussian part of the realm and become a truly national paper. However, the paper needs a proper, decisive goal in its newfound status as the government’s paramount speaker.\n\nThe Kanzler can, in conjunction with the government as a whole, begin to finally deal with Hugenberg and his Lügenpresse. Spreading lies about the government, sowing division beyond the norm, and holding Westarp in contempt are all reasons for why Hugenberg's media empire must be dismantled, bit by bit. Perhaps by acquiring shares, or simply confiscating certain newspapers or striking the film giant UFA, the Kreuzzeitung and the Kanzler as a whole can finally begin to mend the wounds of Hugenberg's division.\n\nA second option is to simply expand the reach of the paper by increasing sales, taking inspiration from the newspapers of America in the process. There, information is not quite as dry as in the Kruezzeitung, and there’s a greater focus on spectacle and outrage, something that will surely pay off in the long run. Rather than simply being given the news in the usual Prussian stoic manner, the paper’s readers shall be enthralled by all manner of outrageous events around the world, of adventure and intrigue, of drama and madness. The fear is naturally that the Kreuzzeitung will descend and become the press of the gutter, but the tempting profits have dulled most skeptics.\n\nA third option is to simply embrace the role of the Kruezzeitung as it is today, the most important piece of moral and true news in the whole of the Heimat, if not Europe as a whole. By subsidizing papers that run Kruezzeitung stories and reports, in time the paper will become so relevant, and dictate so much in the information landscape, that it will become the absolute Schwerpunkt of government influence in the German press."
gerdom.316.a:0 "We can't let Hugenberg keep the power he has, start some acquisitions."
gerdom.316.b:0 "The people need something to distract them for a bit, keep them docile..."
gerdom.316.c:0 "Best to expand on what we have now, subsidize some more conservative papers."

gerdom.318.t:0 "Farmers Big and Small"
gerdom.318.d:0 "Reichskanzler Kuno von Westarp has always remained a staunch ally of the Junkers landowners, forging alliances with big names of the nobility such as Otto von Schlieben and Martin Schiele, and these alliances have paid strong dividends to the entire Deutschkonservative Partei over the years. Most notable, von Westarp’s backroom dealings and mingling with the landowners and manorial giants were a large reason for the inclusion of the Christlich-Nationale Bauern- und Landvolkpartei into the wider DkP movement through Schiele, but this alliance is quickly proving to be a double-edged sword for the government of Kanzler von Westarp. While Schiele himself was a large landowner, much of the CNBL’s base comes from small to medium-sized landholders and somewhat wealthy peasants. They have little to gain from the Junkers system, and some, such as the rising star of the movement, Hans Schlange-Schöningen, are openly hostile to the Junker elites despite being a member of their class.\n\nAs such, close advisors and associates of the Reichskanzler, chief among them the reform-minded DkP member Werner von Alvensleben, have noted that perhaps it is time to start shifting away from von Westarp’s heavy reliance and connections to the rural elite and turn the party’s vision towards the growing agrarian faction. This would obviously be beneficial to the popularity of the Reichskanzler and his government in the eyes of the party base, but it could also be the best way to avoid the rise of more fiercely anti-Junker populists from the ranks of CNBL who could challenge von Westarp for his throne as the leader of the DkP. On the other hand, severing ties with his wealthy and long-standing allies is not something to be done lightly, as in the end it could have terrible consequences not only for von Westarp but also for the party as a whole through loss of funding and political capital. As such, a decision must be made with the utmost seriousness, lest the Kanzler plunge the party into an internal conflict of interest or financial dire straits."
gerdom.318.a:0 "Our best allies are, and always will be, the Junker class."
gerdom.318.b:0 "Perhaps our ruralist fellows in the party have the right idea..."

gerdom.320.t:0 "An Embodiment of Imperial Germany"
gerdom.320.d:0 "After the German victory in the Weltkrieg, many parades and momentous occasions marked the end of the war in a highly stylized and glorious way, but few of these displays of the triumph could match the return of the undefeated Schutztruppe, with the African Lion Paul von Lettow-Vorbeck at their helm. Whereas other parades and celebrations were marred by the undertone of the public shock at the losses and slaughter of the Weltkrieg, the African heroes reminded the people of the old order, the true might of Germany and the indomitable Prussian military spirit, with von Lettow-Vorbeck’s men fighting long years of guerilla warfare against impossible odds and still emerging victorious time and time again. Even today, the old officer stands as a monument to the Germany that once was and that feels so distant in the maelstrom of the modern Kaiserreich’s division and disorder. This has led to a personality cult developing around him, partially organically through von Lettow-Vorbeck’s wartime achievements and partially encouraged not only by the Löwe von Afrika himself but also by members of his government and the entire Deutschkonservative Partei.\n\nHis consistent relation to policy, relative moderation within the DkP and constant battle to improve the lives and future optics of the African Askari troops have given him an aura of a benevolent old military man, something both Lettow-Vorbeck have been quick to capitalize on. As more and more admirers flock to the banner of the venerable war hero, the Reichskanzler’s advisors have noted that perhaps the new movement cascading around him should be funneled into a particular direction to deal with issues that trouble the mighty Kaiserreich. Given his status as an anchor to the glorious Prussian past, von Lettow-Vorbeck could seek to emphasize the new empire as an even greater continuation of the old, highlighting everything the German prowess brought its people. Nonetheless, in the age of increased war fatigue and pacifism brewing in the realm due to the horrid losses of the war, the Reichskanzler could also use his martial credentials to bolster spirits and raise confidence in the Heer once more. Finally, von Lettow-Vorbeck’s image as a figure of stability in the Kaiserreich could be harnessed to fight for social stability and prosperity for all Germans, from the poorest worker of the Ruhr to the mighty Junkers of Prussia. Each of these directions is obviously important, but given the immense support the Reichskanzler has in his new following, it is best to choose wisely where to direct this as of yet untapped potential."
gerdom.320.a:0 "...To Our Empire!"
gerdom.320.b:0 "...To Our Fighting Men!"
gerdom.320.c:0 "...To the People of Germany!"

gerdom.321.t:0 "The Face of the New Militarism"
gerdom.321.d:0 "The enormous losses and the grueling warfare that characterized the Weltkrieg have obviously eroded the previously martial and brave Germanic peoples, but Reichskanzler Paul von Lettow-Vorbeck is intent on seeing this situation rectified. The Kaiserreich must return to its roots, drawing from the militaristic traditions of Prussia and the other German kingdoms, as the great conquerors of Europe and the descendants of the valiant Teutonic knights. However, such a massive shift in the psyche of all Germans does not come from mere policy proposals and government budgets but through a large-scale propaganda campaign, reaching every corner of the nation from the humble hearths on the outskirts of the Polish border to the pompous heart of the empire in Berlin. Radio broadcasts, patriotic films, propaganda posters, and public statements by the intelligentsia and cultural elite associated with the Deutschkonservative Partei shall be fully funded by the Kanzler’s cabinet to ensure the kindling of the militaristic flame.\n\nThe aim of the campaign shall be to get more young Germans to enlist in the Kaiserreich military, as von Lettow-Vorbeck understands perhaps better than anyone else that the threat of the Internationale and Russia is ever increasing, and only through the deterrence or shield of the German military can these rogue international actors be defeated. Given his long and illustrious service in the Heer, the Kanzler has been expected to favor the army of the nation at the forefront of the campaign. However, in the spirit of fair game between the different branches of the military, von Lettow-Vorbeck has been open to promoting other services of the Kaiserreich’s forces as the ‘protagonists’ of the campaign.\n\nThe Kaiserliche Marine, given its steel behemoths of the sea and the invincible reach of its cruisers, would make for an imposing and spectacular front, but on the other hand, the Luftwaffe with its brave and knightly barons of the sky in their top-of-the-line fighters and Zerstörers could showcase the technological superiority of the Kaiserreich as well as evoke images of the Red Baron and other flying aces of the Weltkrieg once more. Finally, the Jägers in their dapper uniforms and large number of specializations, as well as the prestigious status the unit has enjoyed for centuries, could remind the Germans of their military capabilities by putting the best of the best at the forefront. Only one branch gets the vaunted front position in the push for a new Teutonic military spirit, and it is the duty of the government to pick a winner."
gerdom.321.a:0 "The Heer show all that you can be!"
gerdom.321.b:0 "The Kaiserliche Marine extolls our might!"
gerdom.321.c:0 "The Luftwaffe soars with our ambition!"
gerdom.321.e:0 "The Jaegers lead the way!"

gerdom.325.t:0 "The Land of Our Children"
gerdom.325.d:0 "The industrial revolution brought with it a vast array of modernizations and much needed commodities to the tables and cabinets of even the lowliest citizens in Germany, but to say that the factories and steel mills popping up around the nation have been solely a positive force would be a rather misleading notion. The German Kaiserreich may have benefited from these endless rows of chimneystacks and coal-hungry manufacturers, but the destruction they have left in the wake of the environment of the once picturesque Ruhr region and beyond cannot be understated. While there has been an environmentalist movement in Germany ever since the end of the last century, with notably the nobleman Max Joseph von Pettenkofer leading the charge for the protection of clean water and fresh air, the state itself has been sluggish in combating the dangers of factories. Not only do these smoke-spewers damage the surrounding area, causing the dreaded Anglo-invented urban disease known as smog, but the pollution is carried further into the farmlands and countryside of Germany by rivers and wind.\n\nWith the rise of the Christlich-Nationale Bauern- und Landvolkpartei faction to the leadership position of the Deutschkonservative Partei, the new Reichskanzler Hans Schlange-Schöningen has been dealing with the dilemma of how to enact protections to the Kaiserreich’s nature without hampering the industrial output of the behemoth that is the German industry. Enacting a degree of reforms aimed at limiting the spread of industrial waste and pollution into the streams of Germany could be a start, and while these regulations would be unwelcome to the German industrial tycoons, such minor adjustments are hardly a massive drain on their business. However, some governmental figures have suggested that instead of directly targeting the industry, specific protected areas should be established to ensure that the pristine German nature is saved for the children of current adult generations to enjoy as well, in turn giving a refuge to local wildlife too.\n\nThe most radical proposal would obviously be the creation of these national parks, but also instituting strict controls on the industry and monitoring their pollution to ensure that the German mills of progress do not create wealth for the nation in a way that destroys it in the process. The situation is delicate, of course, given the might of the economic giants of the Ruhr and beyond, but given the urgency of the pollution situation, compromises may have to be made fast to preserve what’s left of the German wilds."
gerdom.325.a:0 "Some measures against these factories are warranted!"
gerdom.325.b:0 "We should set aside some protected areas, for the future generations."
gerdom.325.c:0 "No half measures with our beautiful nation, establish a national park service and institute controls!"

gerdom.327.t:0 "Extending a Hand to the South"
gerdom.327.d:0 "The various German agrarian movements throughout the early 20th century have been marred by pointless infighting, splitting along larger party lines and regionalist sentiments, but as the Christlich-Nationale Bauern- und Landvolkpartei faction of the larger Deutschkonservatives movement gains further and further power, the Reichskanzler Hans Schlange-Schöningen has set his eyes upon allies of convenience to end this age-old web of rivalries and old wounds. The greatest source for possibilities when it comes to agrarian alliances is down south in the land of Catholics, as the Bayerischer Bauern- und Mittelstandsbund political party, under its current leader Anton Fehr, has seemed eager to work with the current government despite the religious differences. Such an alliance would be lucrative not only because of ideological compatibility, although BBM is markedly more liberal than CNBL, but also because the two parties have largely separated voter bases, so a coalition government would not be burdened by electoral struggles.\n\nTheir liberal stance could help market the CNBL wing of the DkP as far more accepting of even left-wing or centrist groups than the more insular approach championed by the previous government, even if it is somewhat unpopular within the party’s more conservative strata itself. Additionally, the Bavarian agrarian movement is hardly an ally of the Junkers, who they view as economically far too powerful Prussians keeping the nation under their steel gauntlet. This aligns with Schlange-Schöningen’s own plans to heavily curtail the power of the Prussian landlords, even to the point that his political enemies have called him an agrarian Bolshevik or syndicalist. An alliance with the Catholic agrarians could help smooth things further with other regional and national agrarian movements, perhaps even to the point of creating a \"Green Front\" of sorts. After all, an accord with the BBM is not an end in itself but merely the step towards opening the door for other agrarian groups in the Kaiserreich, big and small alike."
gerdom.327.a:0 "A toast to new friends in Bavaria!"

gerdom.328.t:0 "A More Tropical Germany"
gerdom.328.d:0 "Far from the fields of Brandenburg and the valleys of the Rhine, the jungles of Brazil hold a settlement that continues the German rural traditions beneath a harsher sun. The settlement of Rolândia, carved from the dense forests of southern Brazil, stands as a distant outpost where German settlers seek land, dignity, and a future beyond the economic crisis that gripped the homeland. Founded through the efforts of tropical farmers Oswald Nixdorf and Hermann von Freeden with the support of Schlange-Schöningen, as the minister politically responsible for the settlement plan, under the Westrap chancellorship. The colony was intended as a solution to rural displacement, a release valve for population growth, and an appendage for German influence, which, if supported properly, can truly flourish.\n\nThe reality of the settlement has been far from the idyllic promise of opportunity. The settlers who arrived came primarily from the middle class and were followed by small farmers driven by hardship, German-Brazilian families, Brazilian laborers, and Japanese and Italian settlers. They have faced a relentless struggle against nature itself, as the land must be wrested from the jungle through grueling effort, with little more than basic tools and sheer determination. Infrastructure is scarce to nonexistent: no electricity, no reliable communications, with only the most fragile access to medical care, as diseases such as yellow fever and malaria still linger.\n\nYet the settlement endures, with its potential unrealized. Reports from his son Joachim, who came to Rolândia in 1933 after the Kanzler had acquired farmland in 1932, speak of both the colony’s horrendous conditions and its undeniable promise. The soil is rich, particularly suited to coffee cultivation, and with proper investment the settlement could become not only self-sufficient but also a profitable, loyal German foothold abroad. To that end, the Kanzler has begun to enact subsidies for mechanization, funding for housing, new infrastructure, and the establishment of the colony’s first school. Should Rolândia succeed, it may well serve as a blueprint for a new kind of expansion of German living space without conquest."
gerdom.328.a:0 "A new frontier for the German people."

gerdom.329.t:0 "Helfen, Wehren, Heilen"
gerdom.329.d:0 "A question has started to swirl across the now Catholic-led German political sphere, and it concerns what many were prepared to relegate to history: the Teutonic Order. With a reputation that is both illustrious and full of grievous mistakes, the Deutscher Ritterorden presently exists outside of the Kaiserreich's influence due to Prussia exiling them to Austria where they remain. While the Peace of Augsburg had permitted Protestants and Reformed Christians to participate, the group has remained predominantly Catholic, especially due to its aforementioned Austrian residency. Now however, Zentrum leads the German nation, constituting Protestants and Catholics alike. Due to this, there has been a suggestion from our more traditionalist party members that we should create a Teutonic Order for our own uses here in the Vaterland.\n\nThere already exist numerous Catholic and Protestant organizations across the Kaiserreich, but our new Deutscher Orden, independent from the knights in Austria yet closely cooperating with them, would try and unite both branches of the Christian faithful into a common purpose. While this has made proponents of keeping Zentrum "in the tower" wary, such members of our party are still swayed by the promise of traditional value that investing in this project could bring. Zentrum members who wish for the party to start pulling in more of the Protestant members of the Reich, meanwhile, are ecstastic in their support of the idea.\n\nThe Kaiserreich cannot rest idle on these spiritual matters, not when it bears the responsibility of the paramount power of the world. The threat of syndicalism and the radical far-right has been concerning, and so the Reichskanzler has agreed to the formation of this much-debated chivalrous creed. Within these pious modern knights shall be the salt of our nation and its people, the Pope having recently granted his cautious support. Now, the government need only start making its decisions on this new order's structure."
gerdom.329.a:0 "The white capes return to their old home."

gerdom.330.t:0 "Choosing the Hochmeister"
gerdom.330.d:0 "The first step of forming the new Deutscher Orden is who will gain the prestige of being its first Grand Master. While many options have been recommended, from illustrious noblemen to popular Zentrum politicians, there have been only two who have managed to be tolerable to the Centre Party at large.\n\nThe main commander suggested is Hyazinth Graf Strachwitz, a member of the old Silesian Catholic nobility. He has already offered some of the large estates of his family, including the Schloss at Groß Stein, to the still embryonic order to help it along. He has additionally proven himself through being admitted to the elite Gardes du Corps and his numerous escape attempts from the French after being captured in 1914. While the question of whether or not to militarize the order remains tabled during our ongoing discussions, Hyazinth will undoubtedly be able to competently manage his men in a martial capacity.\n\nThe second option, meanwhile, is Wichard von Alvensleben, an aristocrat and Knight of the Order of Saint John. The aforementioned order, also known as the Bailiwick of Brandenburg, is a German Protestant branch of the Knights Hospitaller, joining alongside the obsessively-noble Dutch Bailiwick of Utrecht as an example of already extant Protestant knight orders. Wichard, though not necessarily a military man and instead trained in forestry, has shown a willingness to become educated in such matters should the need arise.\n\nWhile both of these prospective Hochmeister would be acceptable, even capable, choices, there can of course be only one Grand Master. Thus, the question lays with the Reichskanzler."
gerdom.330.a:0 "Hyazinth Graf Strachwitz will rally our Catholic faithful."
gerdom.330.b:0 "Wichard von Alvensleben, as an ecumenical outreach."

gerdom.331.t:0 "Hochmeister Hyazinth"
gerdom.331.d:0 "Earlier today, a report from the new Hochmeister of the Deutscher Orden, Hyazinth Graf Strachwitz, arrived at the meeting of government officials. In it, Strachwitz outlined his ambitious plans for the Order, as well as the administrative reforms and adjustments he intended to carry out. He also detailed the moving of the Order and its assets, as well as most of its headquarters, to the Schloss at Groß Stein, where his family has long ruled. Drawing from his father, Count Hyacinth von Strachwitz, and his leadership experience with the Sovereign Military Order of Malta, the younger von Strachwitz has attempted to create a disciplined and illustrious new form for the ancient order. Hierarchy, uniformity and most importantly, the strict adherence to duty, have become the utmost values of the Order, even leading to some peculiarities such as the addressing of aristocratic members of the order by their noble title rather than rank, something Strachwitz insisted on even during his time in the military. While the militaristic status of the orders is still an open question, Strachwitz has introduced limited training as a temporary measure should the order be given the right to bear arms, taking notes from his years of service in the Life Guards. However, his own love for sports and athleticism has largely overshadowed the more militaristic sessions, as Strachwitz has been an avid equestrian and runner since his youth, and given the large estates the order now possesses there are entire fields and farmlands undergoing swift transformation into sprint tracks, stable yards and long roads to be used in horse racing. Every member of the Order shall be expected to attend at least some sort of sport activity as long as they are physically capable, with fencing quickly becoming the most common sport due to its gentlemanly nature. While the Hochmeister has certainly given the Order his own flavour, it is clear that it is now in good hands."
gerdom.331.a:0 "Perhaps we shall see the Order in the Olympics soon!"

gerdom.332.t:0 "Hochmeister Alvensleben"
gerdom.332.d:0 "Earlier today, a report from the new Hochmeister of the Deutscher Orden, Wichard von Alvensleben, arrived at the meeting of government officials. The report detailed the Hochmeister’s experiences during the first days in his new position, noting the challenges and successes in equal measure. Von Alvensleben does mention that he has received a degree of hostility, or at the very least indifference, towards himself for being a Protestant, but others within the Order have instead been very welcoming and hailed his new position as the next big step for Catholic-Protestant unity in Germany. Encouraged more by these positive comments rather than the cold shoulder of some of his new subordinates, von Alvensleben has brought with him some organizational structures from the Order of St. John, attempting to bridge the gap between the Catholic and Protestant orders through careful and moderate reform. While the situation with the militarization of the Orden remains unsolved for the time being, von Alvensleben has seemingly used his great wealth to hire military advisors from outside the order to tutor not only him, but also members of the upper echelons of the order, so that when the time comes and a decision on the matter is reached, they will not be left with incompetent civilian leadership should the decision be in favor of increased militarization. Even if the government decides against militarization, von Alvensleben has justified this expense as a way to instill a culture of discipline into the Order, taking cues from the military experts on how to best maintain organizational structure and stability. The Hochmeister has also used his contacts with the Central-Ausschuß für die Innere Mission der Deutschen Evangelischen Kirche charity and welfare organization to lay the groundwork for the Deutscher Orden should it remain as a charitable order above all else, and partially also to ensure that the ecumenical potential of his election to the position of Hochmeister is not wasted. This dialogue with the Protestant charities is mainly to allow for better collaboration and coverage of the Christian charity work in Germany, which hopefully will ensure that the Lord’s aid reaches every poor soul in the nation no matter where they may live or which church they belong to. It would appear that no matter the direction of the order, it is in good hands with its Protestant Hochmeister."
gerdom.332.a:0 "The Protestants have their uses, now and then."

gerdom.333.t:0 "Membership Status"
gerdom.333.d:0 "After the formation of the new Deutscher Orden, there have been numerous pertinent questions related to its function both within the Zentrum party as well as from outsider observers of the order’s developments. One such conundrum has been the approach of the order towards non-German foreigners, especially as the Order will start setting up settlements within the borders of other nations either as part of the Reichspakt or with strong ties to Germany. After all, Catholics around the world are drawn to the prestige and glory of the Deutscher Orden, and to many faithfuls, the ability to serve within its illustrious ranks would be a dream come true. However, the Order could remain limited in membership, offering only Germans positions within its hallowed halls, to serve as a shining example of Kaiserreich’s glory and religious pride. This would help maintain the nationalist character of the organization, giving it a far more localized identity and confining its cause more clearly to that of the Zentrum government. This would also possibly open the doors to giving some positions to Germanic peoples, such as the Austrians and Swiss. Nonetheless, a more diplomatic and far more internationally prestigious position would be to adopt a wide-reaching status of membership, giving Christians around the world the ability to join the organization, bolstering its ranks and influence in nations in a capacity somewhat detached from that of the Kaiserreich as a whole. This obviously limits the nationalist character of the Order, but in turn, the ability of the Order to promote the Catholic cause would increase exponentially, opening up possibilities for ecumenical connections around the world."
gerdom.333.a:0 "The Teutonic Order is fit for Germans only."
gerdom.333.b:0 "Our Empire is wide, the Order should be too."

gerdom.334.t:0 "German Only Order"
gerdom.334.d:0 "Ever since the decision was taken to maintain the Teutonic nature of the Deutscher Orden, the organisation has quickly become a source of national pride in a way rarely seen in such a tight timeframe. The Order’s shiny exemplars have become true paragons of virtue and Germanic ideal, sporting their distinct colors and markings as they carry out their tasks in the aid of the local populace. With a mixture of German discipline, adherence to the ancient traditions of the order and the new wave of Catholic nationalism for the new Kaiserreich, the Order has become perhaps the greatest way for Zentrum to attract support from the Catholic masses around the nation, given that its renewed presence in the nation harkens back to the glory days of Templaric Orders and the Teutonic knights of old, even if the purpose of the Order today remains somewhat detached from those warriors of old. Beyond Germany’s border, the Deutscher Orden is viewed with a mixture of awe and fear, for the shining glory of its missionaries is often contrasted with suspicions of its true intentions, even if its actions to date remain relatively modest."
gerdom.334.a:0 "In time, they will all see the benevolent glory of the Order."

gerdom.335.t:0 "Wide-Reaching Order"
gerdom.335.d:0 "Considerable time has passed since the Deutscher Orden opened its doors to the peoples of Europe, and already, thousands of faithful Catholics, and even a handful of Protestants, have made their way to join the organisation. While not everyone is accepted due to various reasons, many new disciples of the Order view their place in the ranks of the illustrious organization as the defining moment of their lives. The Hochmeister of the Orden has been quite surprised at the numbers of faithful seeking to align with the organization, and measures have been taken to ensure that the sheer size of the new would-be initiates receive thorough looks into their pasts so that no bad seeds are allowed to grow within the Order. The new pluralist nature of the Deutscher Orden has made it somewhat easier for its members to operate in many of the nations of the Reichspakt, given that it now possesses many members capable of conversing with locals in their mother languages. It has also helped alleviate some of the fears of the people in countries where members of the group have arrived on various missions, as instead of being an insular and hermetic Germanic association, the diversity within its ranks makes it seem less like another force aligned strictly with the interests of the Kaiserreich and more with the common Christian cause of the Reichspakt nations. Still, some agitators and naysayers outside of the Kaiserreich do claim that the new non-German initiates are nothing more than a new class of German lapdogs, and even within the borders of Germany, nationalists are decrying the ‘dilution of the Germanic nature of the Order’. Nonetheless, the Order remains committed to its new course, and the government of Zentrum tends to agree in this."
gerdom.335.a:0 "A great step towards Christian unity!"

gerdom.336.t:0 "Taking Up the Sword?"
gerdom.336.d:0 "When the decision to rekindle the flame of the Deutscher Order was taken, the question on seemingly everyone’s lips in Germany was whether the Order would become a militant one, or a strictly civilian one. The old order, after all, was known for its martial prowess and the image of Teutonic knights fighting against the pagans and Muslims during various crusades is a prevalent one. In times of crisis, having a militant order of devout Christians to call upon, especially when the battle against the faithless syndicalists to the west comes, would be more than welcome, but there are many issues with the decision to militarise the order. First of all, the Kaiserreich already possesses a rather large number of paramilitary groups of various shapes and sizes, and these have historically been of mixed use to the stability of the realm. Similarly, the Zentrum government supporting the creation of a primarily Catholic force, with ample state funding and relatively international reach, is quite frankly the sort of decision that more conspiratorial-minded members of the Protestant church would gladly use to paint the government as a Papist plot to turn the Kaiserreich into a puppet of the Holy See. These accusations are already prevalent enough in the politics of the Zentrum-led Germany, and nobody in the government hardly wants to hear them increase in frequency, but the prospect of revitalising the Teutonic orders of the past in the modern age is indeed a tantalizing thought.\n\nNonetheless, confining the Order to a role of being a charity organization with a more humanist mission would certainly net the government and German Catholics plenty of good press, as well as making it far easier for the brotherhood to spread beyond the Kaiserreich’s borders since it would not be viewed as a paramilitary group by local governments. This, in turn, would make it far easier for the members of the Deutscher Orden to carry out their tasks even among nations that may not be strictly allied to Germany. The decision is a difficult one, given the inherent positives and negatives both options hold, but it is one that members of the Order await an answer to with great anticipation."
gerdom.336.a:0 "It is time to ride once more."
gerdom.336.b:0 "Knights of an old era needn't fight wars, only alleviate suffering."

gerdom.337.t:0 "Militarized Order"
gerdom.337.d:0 "As chosen by the Zentrum government, the decision was taken to allow the militarization of the new Deutscher Orden, and the brotherhood has been quick to act upon this. Members of the Order with military or police training have been promoted to positions aimed at training their fellow brethren, and a large part of the budget of the Order has been allocated to the purchase of weapons and ammunition from manufacturers such as Mauser, Krupp and Rheinmetall. The Hochmeister has contributed greatly in the budget as well, donating his own wealth for the weaponry of his men as well as using various connections to military and business officials for the acquiring of weaponry itself. Some commentators have even jokingly noted that it won’t be long until the Order establishes a Panzer corps of Christ with its funding. Members of Zentrum with military and police experience, such as Hauptmann Oskar Farny and police chief Magnus Heimannsberg, have also lent a hand by providing valuable training to those within the organization who hold no previous knowledge of the art of war. The carrying of traditional weapons for ceremonial purposes, such as sabres or other swords, has also been adopted, especially among higher-ranking members of the organisation, and the militancy of the Order’s uniform has been changed to reflect its new status as the paramilitary arm of the Lord. There are still many details to be hammered out on the true strength of the organisation that can be permitted, such as the size of its forces, the choices of armaments and whether it is allowed to possess different types of vehicles or weapons among its arsenals, but these details will be worked out as the Order is shaped into a proper army of Christ. As expected, alarmist voices calling this a clear internal coup of the Catholics within the Kaiserreich have appeared among both the far-right Protestant groups as well as the left-wing parties, but for now, it seems that most political forces in the Reich are waiting for the results of the militarization process."
gerdom.337.a:0 "Our peace can only be safeguarded by men of war."

gerdom.338.t:0 "Charity Order"
gerdom.338.d:0 "The decision to not allow for the militarization of the new Deutscher Orden was made by the Zentrum government, and the Order has moved swiftly to dismantle any programs it had on-going in preparation for the possibility of becoming a militant force. Funds previously gathered with the expectation of a need to purchase weapons have been allocated into the purchase of better medical equipment, supplies and vehicles to be used by the charity organization in domestic and international affairs. Some deals with especially the noble members of the Order have been made by the government to allow for the carrying of ceremonial sabres and other uniform-adjacent weaponry, but anything beyond these trinkets will be banned from being used in the hands of the Order’s brethren. This decision has already improved the public image of the group in the Kaiserreich and in foreign offices, as the men and women of the Order now appear to be fully humanitarian in their operations. The shift in image has alleviated many fears of the group being little more than a semi-official arm of the Kaiserreich in other nations or a paramilitary group created in preparation of a Catholic takeover of it in domestic politics. As the agents of God spread far and wide, preaching the Gospel through actions and words alike, the Zentrum’s policies work to further the Catholic cause both home and abroad."
gerdom.338.a:0 "Forging swords into ploughs worldwide."

gerdom.339.t:0 "Teutonic Order Investments"
gerdom.339.d:0 "A curious new group has now shown up within [FROM.GetName], bearing the colors of the ancient Teutonic Order. This group, the Deutscher Orden, has arrived as semi-official envoys of the German Kaiserreich and their Catholic ruling party, Zentrum. Upon arriving, these missionaries began to organize charitable groups around the nation with the help of amicable laymen and clergy officials from the local parishes, and through direct donation of funds, food and other critical supplies in areas with the greatest poverty levels, the Order has helped make life a little more bearable to many within the nation. While there has been a degree of mistrust towards these pious philanthropists, with more nationalist or anti-German groups claiming them to be little more than yet another attempt by the German Eagle to press its claws upon the nation, to many others the actions of the brotherhood has been a welcome sign of relief in the dark times brought on by Black Monday. Even as discussions still continue in the press and public discourse on the true incentives and purposes of the Deutscher Orden in the country, many have come to accept them as a new fact of life, given that the Germans seem intent on staying for quite some time."
gerdom.339.a:0 "Odd bunch indeed, but at the very least they’re helping."
gerdom.339.b:0 "Truly none can match the Kaiserreich’s charitability."

gerdom.350.t:0 "Up On the Mountain"
gerdom.350.d:0 "The difficult recent election brought out a rather competitive side within Zentrum that it had previously lacked during its coalition with the Deutschkonservative Partei, and many within the party leadership felt a rather revanchist spirit take over them. After the victory of the party, figures such as Ludwig Kaas and Mathias Erzberger, who had grown tired of Franz von Papen’s collaborative stance with the DkP, urged Zentrum to seize the moment and ensure that its two greatest rivals, the DkP and the perfidious crypto-socialists of the SPD, would never rise to threaten them again. However, while Zentrum may have won the election clearly and with strong margins, the strength of the Catholic party is still not so overwhelming that it could publicly go against both its rivals and maintain power. One day, both the SPD and the DkP might be little more than a laughing stock in the shadow of Zentrum, but for now a concentrated push against one is all the party can afford. Striking the iron while it is hot and going after the DkP so soon after their recent defeat would likely yield the best results, as the party has long attempted to keep Zentrum as little more than its puppet.\n\nThe aftermath of the Black Monday crisis is blamed largely on the Deutschkonservatives, however, and using this moment of weakness to truly hammer Kuno Westarp’s party into submission would likely lead to many within their ranks leaving the sinking ship, only to wander right into the arms of Zentrum or various politically irrelevant conservative groups. However, the SPD has not been idle in its many years of opposition, and while figures like Otto Wels are popular among the working class, the continually mounting threat of a war with the French Commune would make the labor-oriented party an easy target for a smear campaign. Finding some crack in the facade of the seemingly reformist group, perhaps a young radical or syndicalist-sympathizing intellectual, would hardly be a difficult task, but the repercussions for the SPD could balloon into unforeseen proportions.\n\nNonetheless, the SPD has never been an easy opponent to face in the field of political maneuvering, and despite many attempts to see them disbanded by Zentrum, Junkers groups, the far-right and the DkP alike, they still stand. Figures such as Mathias Erzberger urge caution when dealing with the SPD, claiming that it is perhaps better to attempt a reclamation of their voter base to our side in a slow process instead of an outright political strike on them. Whichever party is chosen as a target must be attacked quickly, lest they recover from their recent defeat while Zentrum is still busy debating on who to strike."
gerdom.350.a:0 "Humiliate our fellow conservatives of the DkP."
gerdom.350.b:0 "Expose the treacherous SPD for the false shepherds they are."

gerdom.3501.t:0 "The New Commandment Echoes"
gerdom.3501.d:0 "A Polish individual "on the ground" so to speak benefitting directly in some manner from Zentrum's new policy of trying to court the Polish population living within Germany. This will be written by Max/Nickay, other loc writers ignore."
gerdom.3501.a:0 ""

gerdom.3506.t:0 "The Victims of Vainglory"
gerdom.3506.d:0 "The numerous economic blunders the Kaiserreich’s leadership committed during the 1930s have introduced a worrying trend to the politics of the nation, one that the Zentrum leadership has for far too long turned a blind eye to. The syndicalist agitation of FAUD and the various radicals of SPD are one thing, but as the German Empire struggles in the global tides of chaos, forces of the German far-right have begun to sharpen their knives against their own government as well. Groups such as the Deutsche Fraktion of Moeller van den Bruck would see the foundations of the current Kaiserreich, those being a democratic, federal and religiously pluralist nation, torn down in order to bring about their hateful and perverse regime, one that worships order and war above all else.\n\nMore troubling than the group itself are the many sympathizers it has found within the ranks of the German military. The Kaiserreich’s mighty armed forces are of course its loyal defenders, but the dictatorships of the last decades have shown that the Deutsches Heer is more than willing to take control for itself if it feels so inclined. The sidelined old dictator Erich von Ludendorff as well as the rising star Kurt von Schleicher both harbour ambitions that may very well lead to the downfall of German democracy, and they are hardly alone with these sentiments.\n\nMany within the Zentrum, primarily Heinrich Brüning and Joseph Wirth, have grown increasingly louder with their demands for action, denouncing the relative inaction of other Zentrum politicians such as Ludwig Kaas towards this rising tide of radicalism. As time has passed, various members of the party have begun to support the line of Brüning and Wirth, but the question now remains of which group should the Zentrum government target. Going after the military will be a risky matter, and one that needs a decisive yet delicate hand as well as the support of the Kaiser and various officials sympathetic to Zentrum to achieve the best possible results, but this direction will most certainly earn the government support from its rivals in the SPD as well.\n\nMeanwhile, hunting down the Hidden King van den Bruck is likely to be a difficult affair, and many still consider him a vague and niche non-threat, but cutting off the viper’s head by censuring or even arresting him would help pacify the military in turn. Alternatively, there are those within Zentrum who see that the best course of action is to simply ignore both and focus on building a strong support base throughout the Kaiserreich, so that if the day comes that either of these groups rises against us Zentrum will stand as a bastion of democracy to the bitter end."
gerdom.3506.a:0 "The military needs to be cleaned of these un-Christian forces."
gerdom.3506.b:0 "We must strike at the source: cripple this "Hidden King"."
gerdom.3506.c:0 "We must print our own counter-propaganda to sway the people."

gerdom.3508.t:0 "Death of Matthias Erzberger"
gerdom.3508.d:0 "The years have not been kind to Matthias Erzberger, burdened not only by his failures during the post-war years but also by the wounds inflicted upon him by the rabid bloodhounds of the Freikorps. Despite living his life according to the principles of democracy, social justice and, above all else, moderate and reverent Catholic faith, Erzberger suffered setback after setback when the Ludendorff dictatorship sidelined Zentrum from national politics and drove the party into a state of stagnancy. His pacifism and constant calls to limit civilian suffering, either in his consistent criticism of the Kaiserreich’s unlimited submarine warfare or the atrocities committed by the Ottomans in the Middle East against Assyrians and Armenians, earned him little else but spite and vitriol after the war where he was seen as a defeatist coward.\n\nThis culminated in an assassination attempt by the far-right militias, and Erzberger would only return to national politics in force by the 1930s, rising to lead the left-wing of Zentrum in the aftermath of the Berlin Stock Market Crash. With this titan of Zentrum’s social Catholics no longer with the Kaiserreich he fought so hard to reform into a democratic and equal empire, his mantle has been taken up by a fellow Zentrum Christian corporatist, Heinrich Brüning, though his successor has shown himself to harbour little qualms about using authoritarian means to achieve the dream Brüning and Erzberger sought to attain. Despite the conflicted nature of Erzberger’s career, he was nonetheless a beloved member of Zentrum by many, even outside of the party.\n\nThe funeral service was held in Erzberger’s home town of Biberach, and Zentrum officials overseeing the service soon ran into the issue of overcrowding as onlookers arrived from all over the Kaiserreich to see the champion of Catholic social justice off on his journey to a better world. Most bemusing was the large number of socialists, social democrats and even the odd syndicalist present in the crowds, and despite fears that they had arrived to create a ruckus or form a protest the left-wing groups had seemingly arrived to pay their respects to the Zentrum politician many within their ranks respected the most. At a time of increased social turmoil in the Kaiserreich, such a sign of unity on the grave of a conservative politician has become something of a national source of hope."
gerdom.3508.a:0 "Ruhe in Frieden."
gerdom.3508.b:0 "Ruhe in Frieden."

gerdom.35082.t:0 "Fuel for the State's Fires"
gerdom.35082.d:0 "The Black Monday catastrophe highlighted without a shadow of a doubt that the Empire’s finances have been neglected for far too long, and while the oligarchs and colonial corporation owners managed to largely remain afloat after the crisis, the people of Germany paid the price of the collapse dearly. With the rise of the left-wing of Zentrum, many expected sweeping changes to the taxation of the Kaiserreich, given that this wing draws considerable sympathy, if not outright support, from socialists and social democrats. Few could have expected the full scale of the reforms however, as the newly titled Erzberger-Brüning Plan has been revealed to the nation.\n\nBrüning’s central suggestion was to cap the total taxation share of the working class to a mere two billion Reichsmark, drawing from his own experiences with Christian unions that Brüning used to serve as the chief executive for until the beginning of the 1930s. However, Erzberger’s ideas have gone even further, outlining that unless the highest earning brackets of Germany are the ones carrying the largest tax burden, imperial society will never achieve true, just and fair conditions. Inheritance taxation will be greatly reformed to better target the phenomenon of wealth piling up to a few key families and companies, while adjustments to the federal tax laws will ensure that tax burdens are transferred from low and middle class families to the upper class property owners.\n\nThese adjustments and overhauls to the taxation laws are seen as a needed step to ensure that the Kaiserreich’s coffers do not run dry from the many foreign and domestic ventures, and the Reichskanzler has used national and imperial pride as a justification for such drastic increases. However, while those championing Erzberger’s cause have been eager to push out reforms and finally see a truly Christian justice blossom within the taxation system, some of these proposals have been met with great degree of hesitancy within the party.\n\nThe proposed one-time economic emergency tax, for instance, which would see the tax rates of upper and upper middle class hike up considerably for a short period of time, has drawn a lot of skepticism. This is likely to greatly annoy the already disgruntled German elites, who have been increasingly hostile to the Erzberger-Brüning taxation reform, and the emergency tax may very well push some into open rebellion against the Zentrum government."
gerdom.35082.a:0 "It is time for the nobles to have renewed obligations."
gerdom.35082.b:0 "We can be a little lenient."

gerdom.3510.t:0 "Beneath a Portrait of Leo XIII"
gerdom.3510.d:0 "The Ruhr region was never a particularly fancy living area for the German workers, but in the aftermath of Black Monday, it may as well have become a war zone. Clashes between right-wing paramilitaries, policemen and syndicalist agitators were nearly a daily occurrence, but to many workers, they served only as a momentary and morbid distraction from the misery of it all. As one such laborer was trudging home from his workplace at a local steel mill, he pondered the situation at home. Rent would be due soon, bread was getting more expensive by the day, and there was a collection of money going on at the workplace, gathering funds for the funeral of a fellow day laborer, who met his end after getting caught up with the lathe of industrial machinery. The man could feel his mind strain at the burden of poverty, all illusions of a prosperous future shattered after the plummeting of stocks nation-wide. As he fumbled with a cigarette in the cold evening air, a small group of men and women approached him on the street. Despite his weary state, the man found himself striking up a conversation with these strangers, who turned out to be members of a Catholic charity, established a short time ago following state support from the Erzberger government.\n\nThey shared numerous foodstuffs and even gave away tokens and coupons that could be used to buy supplies in local stores, much to the surprise of the worker. Before the group continued, they wished the man blessings from the Lord, as if he hadn’t just received one in the form of material goods. His step a little lighter, the Ruhrite continued his journey home. During these times of depression, cynicism and apathy had long captured his, and many of his colleagues’, hearts. In these muddy, dirty and smog-filled cities of Ruhr, nothing seemed to grow these days aside from the desire for a true proletarian revolution, but the encounter had brought the worker back to the ground level.\n\nHad the syndicalists, for all their calls for equality and freedom, actually helped him in any particular way? The man struggled to remember any such case, and yet, just moments ago, this group of devout followers of the Lord, complete strangers to the city, had given him the means to live on for more than two weeks, even if he had never been a Catholic, nor even a man of faith. Maybe, just maybe, times were changing for the better."
gerdom.3510.a:0 "Faith conquers us all, eventually."

gerdom.3512.t:0 "Wine in Front, Dagger Behind"
gerdom.3512.d:0 "The victory of Franz von Papen in the heated bid for chancellorship among members of Zentrum has come as an upset to many within its ranks, given von Papen’s clear ambitions and preference for the rich aristocrats over both the lower and middle classes, but in von Papen’s view, it is simply a reality these men must now contend with. However, after beginning his usual tour of the party apparatus, only now in the position of the Reichskanzler, it is clear that the new leader of Germany cannot win the hearts of all his party members. As the Kanzler sees it currently, he can dazzle many within the organisation with his diplomatic skills and aristocrat background, but some, such as his rivals Ludwig Kaas, Matthias Erzberger, and unionist figures such as Adam Stegerwald, will remain opposed to the Kanzler unless pressured adequately. If these men are not made to tow the party line, von Papen will have to remain vigilant for future revolts by his ‘colleagues’. However, there are other groups he could rely on support for. The Reichskanzler is a socialite par excellence, and his connections to the German business elite are well-known.\n\nHis staunch opposition to the left-wing associations of the Kaiserreich have made him a close ally and personal friend of Arnold Rechberg, a business magnate known for his fervent hatred of the syndicalists, and even within the Zentrum party he has his close group of allies aligned with the world of capital, such as Hans Praschma von Bilkau and Albert Hackelsberger. Catering to the wishes of these business barons could prove to be a lucrative alternative to simply ruling Zentrum with an iron fist. Nonetheless, the options do not stop there, for von Papen has not neglected his ties to the German military, and his friendship with the influential general Kurt von Schleicher would make any attempts to win over the support of the armed forces an easy task. There is an inherent risk to this approach even then, as von Papen may find himself becoming little more than a puppet for the military apparatus given its oversized influence on the society, but with careful maneuvering and a watchful eye out for such attempts, this should hardly develop into an issue. Either way, the Kanzler must soon choose what group to go after, given he currently holds all the cards but may lose some through inaction."
gerdom.3512.a:0 "These industrialists could make some for good company."
gerdom.3512.b:0 "The military is a dog that is easily led."
gerdom.3512.c:0 "Papen rules Zentrum now, this must be assured."

gerdom.3513.t:0 "The Return of Eisenzahn"
gerdom.3513.d:0 "When Franz von Papen first took office as the new Chancellor of the Kaiserreich, many Junker landlords rejoiced, thinking that the Zentrum politician would ensure their continued place at the very top of German society. After all, von Papen was a Junker himself, and while Catholic, he had always been amenable to the cause of Prussians as well. However, as one particular aristocrat had found out, the new chancellor was not entirely an asset of old money in the realm. Earlier that week, a letter had arrived to Count Heinrich-Georg Finck von Finckenstein from the government, citing numerous grievances the local workers, peasants and even staff members of the lord had with their liege, ranging from fierce verbal abuse to numerous unpaid hours and terrible working conditions, even at times putting the lives of the working men at risk. Some of the mentioned instances of mistreatment had even occurred before Heinrich-Georg had taken his position as head of the family. The letter bore with it an ultimatum: such maltreatment would have to cease immediately or the von Papen government had no choice but to take far more direct measures. Von Finckenstein found such demands preposterous, seeing von Papen, a fellow Junker, lecturing him on the treatment of some plebeians was completely unheard of.\n\nAs he tried to escape these threats via the soothing sensations of alcohol, the Count became increasingly convinced that the Chancellor was simply using him as a target to bolster his standing in the eyes of the great masses of Germany, but in reality there was little von Finckenstein could actually do to strike back at his insolent peer. His musings, however, were promptly interrupted as a servant entered the room, informing his lordship that a police squad had arrived at the mansion’s front door and was demanding to meet the Count. Von Finckenstein burst towards the door, demanding to know the reason for such a visit. The uniformed men swiftly informed the aristocrat that due to breaches in numerous labor laws, citing a long list of legal jargon and noting many of the grievances previously discussed in the letter. Before the Count could begin to properly protest, he was informed that the estate would be taken over by the Kaiserreich and converted for state use, due to the count’s clear mismanagement of the lands under his possession. Hauled away at the back of a police car, the Count could do little but curse the new Chancellor of Germany."
gerdom.3513.a:0 "Nobles may bleed blue, but robber barons bleed red."

gerdom.3514.t:0 "A Reichskanzler of True Sovereignty"
gerdom.3514.d:0 "The tumultuous years the Kaiserreich has been forced to endure following the Weltkrieg have been a burden on its empire, and while the causes for these turbulent times are numerous, in the view of Reichskanzler Franz von Papen, they stem mainly from the lack of a clear and concise figure to keep order and push the Reich onwards to ever greater heights. The difficulties Germany has faced have not gone entirely without their benefits, as political theorists have been able to study and analyse these crises to the benefit of future leadership. Primarily, the current Kanzler has taken inspiration from his political rival Max Weber as well as the influential political thinker Carl Schmitt in his bid to forge a truly unique path for the von Papen chancellorship, egged on by his close ally Joachim von Ribbentrop. In accordance with Schmitt's views, von Papen has begun to limit the powers of current democratic institutions, seeing that democracy as it currently existed in the Kaiserreich was not driving for unity, but instead towards shadowy schemes and backroom backstabbings.  In order to ensure the realisation of his ambitious designs for the empire, the influence of the Reichstag shall be limited upon the government, so that only the confidence of the Chancellor and to some extent, the Kaiser, matter for the continued reigning of the government.\n\nThe Kaiserreich shall steadily enter a state of exception, where the sovereign Chancellor shall rule not merely in the bounds of law, but over them, to ensure that von Papen’s grand vision of the empire can be realised without the bickering and slow progress of the Reichstag. To further ensure the dominance of the von Papen government, Weberian ideals of leader democracy shall be instituted nation-wide, creating an image of the Reichskanzler as a figure for the common man and empire both, fighting against the bureaucratic and inefficient state apparatus that he may only combat by wielding strong executive powers granted to him by the state of exception. Only through the conviction and will of von Papen can Germany be granted the greatness its people have yearned for and fought for so hard, and now, the time has come to grant the Kanzler the means to do so."
gerdom.3514.a:0 "Bismarck's shadow grows ever smaller against Papen's."

gerdom.3516.t:0 "The Green Line in a Smoke-Filled Room"
gerdom.3516.d:0 "To the economists of the world, it often seems that the economic models of the capitalist, imperialist world led by the likes of the Kingdom of Canada and of course, the German Empire, are more often than not in a completely irreconcilable position with their opponents on the left, be that the the French-style syndicalism or Bolshevik-inspired socialism. Canadian and American liberals consider the primacy of the market as the central tool for economic and civilizational development, while the syndicalists and socialists of the Internationale and beyond see the market as the bringer of societal ills and emphasize the primacy of collective forces. Between these two battlelines, however, there are those with a vision transcending the trenches of liberal-socialist division. One such man has climbed the ranks of Kaas’ Zentrum to the very top, certain that his vision of the new German economy is correct. Ludwig Erhard, a disciple of the famed liberal socialist Franz Oppenheimer, has always sought a way to ensure the freedom of the market as in typical liberal economies, but with a far stronger conscious will to guide the market towards more social directions.\n\nErhard, drawing from his allies and close collaborators in the economic field such as Alfred Müller-Armack and Wilhelm Röpke, envisions an economy where the market is as unbound as possible, but that governmental programs and policies ensure social security to the citizens as well so as to ensure the needs of the Empire's masses are met. The state functions as the central pillar of this engagement, providing subsidies, regulating the pitfalls of the market and negotiating deals between employees and employers to ensure the construction of new housing, sustainable levels of employment and other necessities of imperial stability. Erhard’s new state would also provide universal healthcare and guaranteed pensions, which would be funded through income taxation aimed at limiting class inequality.\n\nHis new economy would also not function as a completely laissez-faire one even in the markets as well, for the governments would still hold enough power to intervene in the trading practices to ensure the elimination of predatory or illicit practices. Kaas and his clique of Rhenish Zentrum members have been deeply impressed with the new economic model, especially as it draws heavily from the pre-existing streams of social Catholicism, though some do worry that Erhard’s theories are perhaps too optimistic in the current climate of the Kaiserreich’s economy."
gerdom.3516.a:0 "Bismarck weeps, for Zentrum will usurp him."

gerdom.3517.t:0 "The Rewards of Diligence"
gerdom.3517.d:0 "When Ludwig Kaas first stepped up to take the reins of the Kaiserreich’s chancellorship, many doubted his abilities, even within Zentrum. In addition to his Catholic faith and close relations to the Holy See, which caused many Protestants to see him as little more than the Pope’s loyal little puppet, Kaas was a proud Rhinelander and was also rumoured to have rather anti-democratic ideals, alarming liberals and pro-centralization conservatives alike. Yet today these fears seem more like hysteria of the defeated, for Kaas has proven himself the Reichskanzler Germany needed the most at a time of troubles. Despite seemingly impossible odds, the German Empire now possesses solidified relations with the Papacy, and the rift between Lutherans and Catholics is no longer as deep as it once may have been.\n\nKaas and his Rhenish allies in government, such as Konrad Adenauer, have also earned Zentrum the love of various regionalist and anti-Prussian parties, from the border provinces of Elsass-Lothringen to the Bavarian Catholics, for Kaas’ Zentrum has managed to unshackle the Kaiserreich from the clutches of Prussian elites and oligarchs. The dream of a federal Germany, first put into action by Reichskanzler Bismarck so many decades ago, has finally been fulfilled, and now the empire shall never again fall under the rulership of a single regional group.\n\nHowever, Kaas made it clear from the start that his stewardship of the Kaiserreich would not be a long one, merely promising a singular term to see his vision fulfilled, and now, that time is up. Kaas has long wished to return to his religious and academic work, and despite his meteoric rise to become one of the most popular Zentrum politicians of his time, Kaas has no intentions of reversing his earlier promise. The Kanzler is proud of his new Germany, and the Germans are proud of him, and thus, it is high time for Kaas to take his final bow and hand over the reins to a new generation of Zentrum politicians."
gerdom.3517.a:0 "His work done, it was time to return to civilian life."

gerdom.3518.t:0 "Tipping the Balance of the Liberal Crusade"
gerdom.3518.d:0 "The Nationalliberale Partei’s victory in the recent elections may have been an upset to the party’s many rivals on the left and right, but to the patriotic fighters of progress this victory was a well-deserved reward for all the work on the campaign trail. However, while it is clear that the party’s many competitors have been left licking their wounds after their defeat, they are hardly fully conquered. Parties such as the Deutschkonservative Partei on the right and the Sozialdemokratische Partei Deutschlands on the left have at times collaborated with the NLP, but even in times of seeming peace between these titans of German politics, their rivalries have simmered under the surface. The NLP is in a rather precarious political position in the murky waters between the left and right, and if its two largest political foes are allowed to run unchecked, the Kaiserreich may soon find itself torn apart by partisan infighting.\n\nTo ensure stability under the new liberal Reichskanzler, his government shall set forth to decimate one of its long-standing opponents, as going after both SPD and DkP, and to a lesser extent their allies in the Fortschrittliche Volkspartei and Deutsche Vaterlandspartei, would be too straining and difficult of an undertaking to the new administration of the burgeoning empire. As such, choosing the enemy to engage in a political brawl with is crucial, and something the Kanzler and his supporters must analyze tremendously before setting things in motion. On the one hand, the SPD would be an easy target given the hatred most of the German right and even centre has for these supposed agents of Paris, but their popularity among the working class and support from numerous associations, trade unions and intellectual groups does make them a tough nut to crack. Surgical strikes at vulnerable politicians, loudmouth unionists and shady agitators would be needed to legally destroy the support the SPD currently has, and while it is possible, such a campaign would require plenty of finesse and attention to detail on the part of government officials.\n\nThe DkP, on the other hand, has plenty of cracks of its own, from the mistakes the party made leading up to Black Monday to the many skeletons in the closets of its Junkers backers, but going after such a powerful monetary class is obviously a daring, if a bit foolhardy, endeavor with numerous risks and hurdles to overcome before potential success. Nonetheless, a decision must be made to eliminate one of the NLP’s rivals from the great game of Kaiserreich’s politics."
gerdom.3518.a:0 "The DkP conserves nothing!"
gerdom.3518.b:0 "The SPD remains our eternal rivals."

gerdom.3519.t:0 "A Distinctly German Coke"
gerdom.3519.d:0 "While the NLP has already seen some success in its efforts of bringing the nascent middle-class to the forefront, some of our ministers are nonetheless displeased with the pace of our plans. Citing factors such as a lack of confidence after the Black Monday Crisis, and the monolithic nature of the cartels controlling the German economy, they demand that we do more to facilitate the creation of new businesses among the Mittelstand.\n\nAfter much deliberation, the government has decided that what it needs is a "success story" of a smaller business growing from a humble size into a major enterprise. While there were many candidates for the task, the most promising of them is the recently established Afri-Cola, a German equivalent to the ever popular Coca-Cola. Although it has yet to make much of a presence compared to its American competitor, the potential is certainly present within the brand to become an internationally renowned product.\n\nTo truly instill a spirit of the free market in our population, it needs to see that even a business unrelated to the powerful industrial cartels is capable of breaking through, it only requires some will and perseverance. The National Liberal government will thus support Afri-Cola's ventures to expand in the post-Crisis Germany. Of course, it must be done carefully, for if anyone finds out that the state is meddling too much we risk betraying our platform of genuine capitalism. It'll be quite the balancing act between trying to help the brand succeed and let it find its own footing, but it’s not something out of the realm of possibilities if we maintain a laissez-faire attitude for the most part."
gerdom.3519.a:0 "Perhaps a new success story is just on the horizon."
GER_NLP_Government_Intervention_tt:0 "§RExcessive governmental interference could jeopardize the project!§!"

gerdom.3520.t:0 "Afri-Cola - Range of Flavors"
gerdom.3520.d:0 "The first matter to attend to when it concerns the expansion of the Afri-Cola brand is flavor, or rather the introduction of a new taste for the drink. After a meeting between the government's representatives and the creator of the cola, Karl Flach, we have two options set before us.\n\nThe first is directly tied to the high caffeine content of the original recipe for Afri-Cola. While it is enjoyed plenty by those who have a taste for it, it has yet to really establish itself as a hit among the upper classes or state employees. Many have attributed this to the drink's composition as well as its color, the darker "coke" color being tied perceptually with the lower classes. That's why a group within our cabinet has concocted a plan for a "clear Afri-Cola" that would lower the caffeine amount and additionally make the drink closer in appearance to water. While it is not something any of the current consumers asked for, and it likely wouldn't succeed anywhere outside of the elite, having the drink penetrate this notoriously hard to please class could grant the government great returns.\n\nThe second option, directly based on the plans outlined by Karl Flach himself, is a creation of an entirely distinct drink. Bluna, as it was dubbed by its creator, would be a new soft drink with a distinct orange flavor with a bright color to match, as opposed to the orthodox coke taste of Afri-Cola. People supportive of Flach’s idea believe that the addition of a wholly new flavor and also the drink's design itself will be a big hit with the wider population of Germany. The main obstacle is the Empire's protectionist market, which would require our diplomats to work overtime in an effort of establishing a reliable trade deal to secure the amount of oranges we'd need to support the venture.\n\nWe could also, of course, leave Afri-Cola's range as it was before the implementation of our Mittelstand programme. While it may take longer to establish a dominant position with just one product on offer, we could surely mitigate it with investments in other areas, such as the marketing. Our citizens already enjoy the taste of Flach's invention so why experiment needlessly?"
gerdom.3520.a:0 "Afri-Cola is tasty as is."
gerdom.3520.b:0 "Force the designers to make the less caffeinated variant."
gerdom.3520.c:0 "Let's try Flach's "Bluna"."

gerdom.3521.t:0 "Afri-Cola - Ensuring Great Taste"
gerdom.3521.d:0 "Should we change the taste of Afri-Cola at all?"
gerdom.3521.a:0 "No changes to the recipe are needed."
gerdom.3521.b:0 "Let's get some Ephedra from the Ottomans!"
gerdom.3521.c:0 "More caffeine, absolutely."

gerdom.3522.t:0 "Afri-Cola - Marketing"
gerdom.3522.d:0 "How do we market it when it's ready?"
gerdom.3522.a:0 "Just buy out a few newspapers, why go further?"
gerdom.3522.b:0 "Let's go with the cinema scheme."
gerdom.3522.c:0 "Everyone has a radio, let's broadcast ads there."

gerdom.3524.t:0 "Afri-Cola - Outside Investment"
gerdom.3524.d:0 "We might need some more people to invest in this."
gerdom.3524.a:0 "Let's court a few Junkers."
gerdom.3524.b:0 "If any other soft drink company wants to open up in Germany, they must invest in Afri-Cola."
gerdom.3524.c:0 "Let's court our main competitor, Coca-Cola."

gerdom.3525.t:0 "Afri-Cola - Product Release"
gerdom.3525.d:0 "Time to release!"
gerdom.3525.a:0 "Time to check the numbers..."

gerdom.3526.t:0 "Afri-Cola - Germany's Finest Beverage"
gerdom.3526.d:0 "It's great!"
gerdom.3526.a:0 "Excellent!"

gerdom.3527.t:0 "Afri-Cola - A New Success Story"
gerdom.3527.d:0 "It's good!"
gerdom.3527.a:0 "Great!"

gerdom.3528.t:0 "Afri-Cola - A Modest Success"
gerdom.3528.d:0 "It's alright."
gerdom.3528.a:0 "Well, it could have been worse."

gerdom.3529.t:0 "Afri-Cola - A Total Disaster"
gerdom.3529.d:0 "It sucks"
gerdom.3529.a:0 "How did this even happen!?"

gerdom.3535.t:0 "Afri-Cola Scandal Erupts"
gerdom.3535.d:0 "We got caught being interventionist!"
gerdom.3535.a:0 "Dammit!"

gerdom.3536.t:0 "For Empire or Justice?"
gerdom.3536.d:0 "The Nationalliberale Partei has, throughout its tumultuous history, never strayed from its roots in the liberal spirit of the last century, but to say that the party has been united in such pursuits and ideological tenets is hardly close to reality. Even before the rise of figures such as Gustav Stresemann and Max Weber within the party, the NLP was in a constant tug-of-war between the supporters of a more centralized and nationalist German state ruled by a powerful executive leader, and those supporting a concept of Rechtsstaat, a national model stemming from the ideas of Immanuel Kant that would see the executive powers bound with laws and checks to their power to ensure that the ruler is just and within the bounds of law.\n\nThe nationalist clique, headed by figures such as Otto Hugo and Albert Vögler with ties to financial interest groups vested with deep pockets, was very vocally in favor of a maximalist approach to the Weltkrieg. To them, the war should have brought a large bounty to the Kaiserreich in the form of annexations and aggressive expansions, as well as harsh reparations to the enemies of the German eagle. The nationalists do not share Stresemann’s moderation and seek to use the party’s liberal ideas to push against regional actors, syndicalist threats and external enemies through a highly empowered Reichskanzler. While the more moderate supporters of the Rechtsstaat do not deny the glory of Germany’s empire, they note that all the fruits of the victory would go to waste if not directed at the people of the Kaiserreich and their betterment first and foremost.\n\nThe left-wing of the NLP, headed by figures such as Eduard Dingeldey and Alfred Weber, would thus seek to ensure that the Reichskanzler must always operate within the bounds of law, and the state itself must provide wide and far-reaching civil liberties, ensure transparency and reason in policy making as well as empowering civil society to act as a partner, not a subordinate, of the state. These issues between the two cliques have plagued the NLP since its very creation, with the inner conflict simmering at times due to external factors only to emerge when the conflicts of interests were given the opening to return. If the NLP is to prosper under the Kanzler, a decision must be made on which side of the movement is supported."
gerdom.3536.a:0 "The Kaiserreich must finally realize its potential for the good of all Germans."
gerdom.3536.b:0 "The protection of our people comes before all nationalist aims."

gerdom.3538.t:0 "The Prices of Progress"
gerdom.3538.d:0 "Gustav Stresemann has always been a compromiser within the ranks of the Nationalliberale Partei, even to the very day of his ascension to the position of Reichskanzler. During the Weltkrieg, he supported the right flank of the party in its nationalist aims and expansionist ideals, all the while brokering deals with various left-wing or centrist groups in the Kaiserreich advocating for a parliamentary and constitutional transition to monarchy once the war would be over. After the war, Stresemann became increasingly disillusioned with the elitism of the new dominant force of German politics, the Deutsche Vaterlandspartei, and his support for a truly democratic society gained increased impetus in the political thinking of the NLP politician.\n\nThroughout his career,  Stresemann has been a stubborn supporter of universal suffrage, even including women, and despite his nationalist sentiments, the Kanzler has butted heads with the right-wing of the party over social programs and the nature of German capitalism numerous times, even at times earning him temporary exile from the ranks of the NLP. With his rise to the seat of the highest non-hereditary political post of the Kaiserreich, Stresemann now has the means to pursue his aggressive calls for liberty and democracy within the nation, but even at the zenith, the liberal leader must weigh his options carefully. Before, he had to face many industrial giants to push for significant reforms in the movement known colloquially as the party of chimney barons, but now, these opponents to his ideals are far more widespread than simple entrenched party bosses.\n\nTo push for his maximum programs of suffrage and democratic reforms to the Kaiserreich’s administration and bureaucracy would mean to cross the path of not only his own party’s right flank, but also right-wing parties such as the DVLP, the Deutschkonservative Partei and the various barons, counts and other members of the nobility who hardly wish to see their position challenged by the ‘uncouth masses’. As such, Stresemann’s government could seek to strive for a balanced approach, to slowly reform the state apparatus. Nonetheless, the opportunity for sweeping change dangling just in reach is quite tempting."
gerdom.3538.a:0 "The movement must be tempered in order to ensure its longevity."
gerdom.3538.b:0 "The dream of a truly liberal Germany cannot be extinguished!"

gerdom.3540.t:0 "The Adler's Outreach"
gerdom.3540.d:0 "The German Kaiserreich, a true Weltreich, stands as the unquestioned hegemon of the world even with its gaping wounds sustained during Black Monday, and yet, if one were to travel the length and breadth of this grand state, they would see pockmarked roads and crumbling infrastructure in regions not yet touched by the imperial glory and resources. An empire as wide-reaching as that of Prussia’s sons cannot function effectively if its vitality is threatened by neglect and polarized support for regions, something Reichskanzler Gustav Stresemann has set his gaze upon to rectify post-haste. State funds shall be utilized to prop up the infrastructure and public properties in regions that are considered most vitally in need of overhauls or that benefit the Kaiserreich the most in the difficult times it now faces as dark clouds of war drift over Europe. However, choosing the direction of these subsidies and investments is proving to be a monumental task as reports of problems are flooding into the ministries of the government.\n\nThe key issues identified by the Stresemann cabinet have, after many laborious hours, been narrowed to three important weak points. The Königsberg port, pearl of the Baltic sea, is hardly suited for the purposes of maintaining German dominance of the region, and while none of the countries in reach of the port pose significant threat to it, in the case of another Weltkrieg, Königsberg may become an important supply hub for Germany’s fleets once more. As such, expanding its facilities and refurbishing existing ones would lead to better connections not only to Germany’s eastern allies but to the entire Kaiserreich.\n\nAnother commonly cited issue is the quality of roads in Northern Germany. Given the rapid expansion of the empire following the Weltkrieg, far more cargo, both human and material, travels on these transportation avenues, and for two decades now, they’ve been ignored in both modernization and repair. Patching the network of passageways in the region would not only smooth the transport of goods and people, but also the centralization of the entire nation. Finally, given the increased passenger and military air flow to the east of the Kaiser’s realm, there are many air fields in our Eastern provinces that are rudimentary at best and in a case of war with Russia or other enemies from that direction, the mighty eagles of Germany could find themselves hard-pressed to find room for their weapons of war. Additionally, the rise of passenger flights to the east cannot go ignored, and they would benefit from better ground facilities even during peacetime."
gerdom.3540.a:0 "Improve the port in Königsberg."
gerdom.3540.b:0 "Our North German roads require attention."
gerdom.3540.c:0 "The airports in the East could serve many purposes."

gerdom.3543.t:0 "All of Mephistopheles' Men"
gerdom.3543.d:0 "The German society in the Kaiserreich is without a doubt one of, if not the most bureaucratic state in the world today, and the burden of managing an empire stretching from the shores of Estonia to the wind-swept dunes of Namibland has only exponentially increased this fact. Administrations and Kaisers may come and go, but the bureaucratic machine of civil administrators, clerks and state accountants runs in the background like a well-oiled machine, ensuring that no matter who appears to hold the reins of statecraft, the German state continues to operate at peak efficiency. Or so one may have expected, until Max Weber seized the leadership of the Nationalliberale Partei and the empire as its new Reichskanzler. Weber has a difficult relationship with the concept of bureaucracy, claiming that it is the most efficient form of human societal organization, but it is capable of becoming a gold-plated path to oblivion.\n\nBureaucracy, by its very nature as an impersonal force of society, would ensure that the nation was guided to greatness through the elimination of arbitrary decisions, emotionally-driven policies and clientelist deals between associates and friends. To Weber, bureaucracy’s strength lies in its detachment from the human irrationality, but this may lead the society towards an ‘iron cage’ against individualism, seeking to remove the human factor from governance and wider society through iron-fisted rule of law, led by a class of little despots more interested in efficiency than human creativity. As such, given Weber’s newfound power at the head of the Kaiserreich, he has numerous options to approach this institution, possibly leading Germany towards a dystopian future.\n\nThe most radical option would be to simply tear the current system down, sacking the cold and calculating middlemen of the state and creating a new movement of leadership democracy, a Weberian concept supporting a leader with soulful and creative approach to statecraft, supported and kept in check by citizens with the political know-how and will to see the nation succeed. Alternatively, these bureaucratic engines could be reformed and kept in check through a slightly less radical form of leadership democracy, allowing bureaucracy to exist but with its humanity ensured through the vigilance of the Kanzler and his active people. While painful, the final option is to simply retain the current system, but ensure that these tiny tyrants do not have the means to impose their will upon the people through the empowerment of politicians possessed with the vigour to counteract the heartless machine."
gerdom.3543.a:0 "Cleave the bureaucracy down!"
gerdom.3543.b:0 "We must simply start to create our own, more humane, engines."
gerdom.3543.c:0 "Restrict these men’s fouler impulses."

gerdom.3544.t:0 "The First Wave of Adventurers"
gerdom.3544.d:0 "No single policy undertaken by Reichskanzler Max Weber beforehand has truly encapsulated his rigid belief in individualism as the newest commitment to the creation of German ‘adventurers’. Drawing from his theory of Verstehen, the understanding of human actions and motivations through the individual and their rationalizations for the actions they perform, Weber’s government has sought to establish a social security system in a similar vein. Instead of focusing on blanket solutions such as welfare packages, monthly welfare checks or other forms of social aid, the Reichskanzler sees the solution to issues such as unemployment to be instead that the state must provide opportunities to capable and skilled individuals to realize their potential. As such, the Kaiserreich will begin a process of taking unemployed yet talented young men and women within Germany, and assigning them posts in the wider empire or parts of the homeland that best suit their particular skillsets. If an accountant finds themself jobless in Berlin, agents of the state will ensure that their potential is not wasted while languishing for the opening of new positions, but instead, an open vocation in the Deutsch-Ostasien or in Dar-es-Salaam will receive a new person to fill the spot.\n\nHowever, while Black Monday has left many eager and intelligent youths of Germany without the means to earn a living through their abilities, scattering the future of the Kaiserreich into all directions would limit the potential of such work programs. Instead, Weber’s cabinet seeks to ensure efficiency of the new program by assigning most of the unemployed to a certain subset of the burgeoning realm. Three potential sources of employment have been floated by the government. First is the administration of Germany’s eastern allies, bordering the ever-dangerous Russian bear. While local governments have their own clerks and civil servants already hard at work to ensure the day to day running of these friendly governments, fresh injection of talent from Germany’s universities and colleges would hardly go to waste.\n\nOn the other hand, the Oriental colony of Deutsch-Ostasien has repeatedly asked for more staff to run itself, as it has to occasionally rely on the remaining French colonial officers and administrators to run things, a state of affairs leaving it in a precarious position. Finally, the province of Posen, despite aggressive pushes from various German governments of the last century, is still largely dominated by the local Polish population, making the city an oddity in the Germanic homeland. Encouraging more youthful Teutons to move to the city would surely help counter the Slavic grip on it."
gerdom.3544.a:0 "The East needs fresh, young minds to pull it up."
gerdom.3544.b:0 "The Orient awaits!"
gerdom.3544.c:0 "The people of Posen yearn for opportunity."

gerdom.3545.t:0 "Europe Shaped in Germany's Image"
gerdom.3545.d:0 "The rule of Reichskanzler Max Weber has been a drastic shift in the politics of the Post-Weltkrieg Kaiserreich from its previous rulers, from Ludendorff and Hindenburg all the way to Westarp. Where once stood cliques upon cliques of stoic military men and nationalist firebrands with megalomaniacal dreams, now stand the leagues of active citizens of the Reich, fighters for progress under their charismatic and dynamic Kanzler. The new Kaiserreich, the ultimate fulfillment of the Weberian ideal, is one where the empire Germany forged through martial might and extreme measures shall be transformed into a patriarch of a new era, in accordance to Weber’s own preference to patriarchalism in governance. Under the rule of the benevolent, faithful and passionate head of the Reichspakt family, the entire empire shall reach untold glory and liberty that the old traditionalists and military despots denied from it.\n\nThese men lacked the passion and drive to see the German eagle soar ever higher, focusing far too much on the expansion of the Reich’s territory and challenging any outside force to give true prosperity to its people, but under Weber the radicalism of the past shall be tempered through democracy and conscious mass action. Germany is the guiding light for all of the Reichspakt to follow, an ideal to copy and import policies from, a testament to the capability of a true leader of the people to lead a nation to greatness from even the deepest pits of a terrible crisis. Just as it is a historical necessity for nations of the world to desire greatness, it will be the duty of the Reich to uplift its many allies from their old ways, to bring capitalism and the meritocratic spirit of the bourgeoisie to all corners of the Weltreich and show them that the previous steel-capped imperialism of Teuton despots is in the past.\n\nGermany will dominate Europe, as is its historic mission, but under Weber’s mesh of determinate executive and the empowered individual citizens of Germany, the results of the potential next Weltkrieg on the setting of Europe may appear wholly different from the last in both spirit and material form. The result of victory will not be a continent merely dominated by the goose-stepping Heer or the sailing Kaiserliche Marine, but rather a map colored by an innovative, liberalizing, and truly German spirit that defines Europe forevermore."
gerdom.3545.a:0 "Perhaps, one day, this map will become reality."

gerdom.3547.t:0 "The Birth of a New Political Power"
gerdom.3547.d:0 "Despite all expectations, the Fortschrittliche Volkspartei seized the reins in the recent German elections, much to the shock of its rivals on the left and right alike. However, while the party ran an excellent campaign and closed its ranks ahead of the elections to ensure success, the situation after the electoral victory has remained tense among the party body. The FVP has never been a particularly singular-minded group, and while its members generally subscribe to the same ideas, the emphasis of one policy program over the other varies greatly depending on which leading figure of the liberal organization one questions. Currently, three central figures have emerged as options to guide the party towards unified destiny, those being Thomas Mann, Walther Rathenau and Friedrich Meinecke.\n\nMann is something of an odd duck among the party’s elite, given his previous heavy-handed conservatism and anti-democratic sentiments, but his thinking has evolved leftwards and while he still holds many of his German nationalist sentiments, Mann is a supporter of democratic ideals through and through now. The writer has been instrumental in mobilizing the German intelligentsia towards the cause of FVP over the recent years, and his clique within the party is largely academicians, art-loving businessmen and nationalist firebrands opposed to the Anglo-French decadent liberalism. Another peculiar leading figure of the party is Walther Rathenau, the leader of various technocrat-minded liberals, who contrast Mann’s group of cultural intellectuals with their technicality and penchant for social engineering. Rathenau is fascinated by the increasing efficiency in modern societies, and seeks to create a truly classless society of two types of workers: the intellectuals and manual labourers. His ideals largely appeal to liberal-minded engineers, businessmen and managers within the party, and while they remain somewhat eclipsed by the two other groups in FVP in sheer size, the fame of Rathenau allows him a decent shot at competing against his rivals. Finally, the third faction within the party is led largely by the nationalist historian Friedrich Meinecke. Meinecke’s group is made up of various traditional liberals, who do generally agree with the party’s program for progress but through a very elitist and limited lens. Meinecke is also known for his heavy emphasis on dominating the Eastern regions of the new German empire, and sometimes approaches the fiery stances of far more right-wing parties in his rhetoric. However, his outreach across the more conservative aisle could be exactly what the FVP needs to ensure its current success does not evaporate come the next electoral cycle.\n\nRegardless of which of these men is the current Reichskanzler, the wings of the party that support them are currently jockeying for wider control of the party, and only one can be given support."
gerdom.3547.a:0 "Our party is dedicated to academia, and always will be. Aid Mann’s clique."
gerdom.3547.b:0 "Rathenau’s technocrats will give the FVP some much-needed jolts."
gerdom.3547.c:0 "Meinecke’s connections to the liberal elite will be a great boon."

gerdom.3548.t:0 "An Unbreakable Foundation"
gerdom.3548.d:0 "The Fortschrittliche Volkspartei has long struggled to find its footing in the German political sphere, but its recent electoral success speaks volumes of the people’s disappointment with the two competitors of the FVP, namely the Nationalliberale Partei and the Sozialdemokratische Partei Deutschlands. As such, if the party wishes to expand further and ensure that its two rivals fall further into obscurity and stagnation, conquering the support base of the two parties, primarily business interests in the case of the NLP and working class support in the case of the SPD, would surely help bring about such a future. However, the FVP does not possess the reach nor the resources to pursue the base of both parties at the same time, and in any case it would lead to conflicts of interest if the Reichskanzler tried to do such a play, and thus the best course forward is to merely attempt to seduce one side.\n\nMuch of the support for the NLP comes from business magnates and oligarchs, and while these men are rarely particularly left-leaning or liberal, they see the liberal parties of Germany as a preferable alternative to the dominance of the SPD or the aggressively jingoistic nature of parties such as the DVLP. By promising lower corporate taxation, lucrative business deals between the state and a select number of companies associated with NLP politicians and further investments into various industrial sectories, the FVP could try to dislodge the NLP as the ‘party of moneybags’. Some dissident NLP politicians, such as the business-minded lawyer and long-term NLP member Johann Becker, could also be approached in hopes of luring them to the side of the government.\n\nA somewhat more difficult target would be to try and woo the working class on the side of FVP, made troublesome given its clear support for the burghers of Germany. Nonetheless, the nationalist attitudes of the FVP over the clear internationalism and possible ties to the French Commune that the SPD possesses in its center wing could help shift many patriotic workers to the side of the FVP, especially if the Kanzler’s government enacts wide-reaching programs aimed at alleviating the difficult situation the working class finds itself in. After all, the liberals and workers have worked together numerous times in the past, and with their aims united, they could lead Germany into a truly golden era."
gerdom.3548.a:0 "The future of the FVP lies in the arms of the tycoons."
gerdom.3548.b:0 "Workers of the FVP unite!"

gerdom.3549.t:0 "Concerto of Absolution"
gerdom.3549.d:0 "The foreign policy of the Kaiserreich has been fraught with mistakes, needless aggression, and actions that have made our nation a pariah state. For the FVP, however, this state of affairs does not have to persist, and so the party has been coordinating a push to completely reform Germany's image abroad. The first step of this new diplomatic maneuvering is approaching one of the nations in our sphere we had wronged during the Weltkrieg and its aftermath, and offering compensation for our poor conduct against them. Three nations have been prepared for the first step of this diplomatic push, and while all of them undoubtedly need aid, the Foreign Office can only undertake one project at the moment.\n\nThe first, and undoubtedly in most dire need of our support, is the land of the Flemish and Walloon people. It is undeniable that the military policy of Flamenpolitik, alongside the internationally condemned "Rape of Belgium", was an egregious act on our part. We have rightfully incurred the eternal ire of the Belgian people, and our state has been intolerably lax in punishing those responsible for the worst of crimes conducted by the Heer. Some of our diplomats are convinced that an attempt to get the Belgian people on our side is an impossible task, but if we are to succeed in reorienting their views then it would be an immense aid to our future goals.\n\nThe second option presented has been Lithuania, which had nearly been annexed into the German state itself due to the madman Ludendorff's annexationist plans. The policy of the Ober Ost as well remains a black mark that the Lithuanian people have yet to forgive us for. While the Lithuanians certainly have many grievances with the Kaiserreich, many of our diplomats regard efforts with them to be fruitful, if still difficult.\n\nThe third, and easiest, option is a diplomatic effort in White Ruthenia. The region had suffered large degrees of depopulation during the Weltkrieg and subsequent interventions into the Russian Civil War, and it remains, even compared to the other Oststaats, in a state that many hesitate to call "modern". This would in truth make improving relations with Ruthenia rather "easy", considering what they most need is just industrial investment, but our returns on the diplomatic stage will comparatively not be as rewarding.\n\nThe right-wing still grumbles at the prospect of conceding to these "defeated nations" at all, but the health of our long-term leadership of the world depends on our allies being loyal rather than coerced. The choice now remains with the Reichskanzler."
gerdom.3549.a:0 "Flanders-Wallonia had suffered the most, we should make peace with their people."
gerdom.3549.b:0 "Lithuania may be loyal, but we don't have its respect. We must change that."
gerdom.3549.c:0 "The Ruthenians remain cynical towards us, we can fix that."

gerdom.3550.t:0 "Iustitia Pro Victis"
gerdom.3550.d:0 "The Entente may have propagandized and even fabricated tales of atrocities in Belgium to a level that befits their tabloid-press, but it's undeniable that our conduct there was truthfully beyond the pale. In then Kanzler Theobald von Bethmann Hollweg's own words, the Treaty of London which guaranteed Belgium's neutrality was a "scrap of paper". This attitude that Belgium had simply been an obstacle in the path of the German war machine had translated into a ruthless occupation where thousands of civilians had died and many more had been deported to work in Germany. The memories of the pillaging, massacres, and the lethal electric fence, the "Wire of Death", still hang heavy over the Belgian populace. It was this brutality that brought the United Kingdom into the Weltkrieg, and reforming our geopolitical stance will have to involve apologizing and repaying the victims for this wanton barbarism committed by our army.\n\nThere have been innumerable suggestions for what the state could, and should, do to resolve the rift between ourselves and the Belgians. Tolerable to nearly every party of the Reichstag save for the DVLP is simply making a formal apology to the people of Belgium on behalf of the Kaiser and the army, but most of the Foreign Office isn't optimistic that it'd work. "Empty words that have come too late", in their view, and so their recommendation is to create a commission that offers restitution to victims of our wartime policies alongside the public apology.\n\nMore ambitious members of the FVP, however, have concluded that even the Foreign Office's plan doesn't go far enough. They suggest the creation of a war memorial in Brussels dedicated to the lost civilian lives and the fighting of the Belgian army. Resistance from the right-wing of the Reichstag, and even those within the FVP itself, has been deeply pronounced to the memorial plan, but it has gained a lot of traction among our more radical allies and membership. The construction would also include the other two prior plans, and would involve the most effort on the part of the government.\n\nWhile it may certainly be possible that the Belgians will remain indignant towards the Kaiserreich even if we go ahead with any of these diplomatic missions, that should not preclude us from making an honest effort in the first place. After our initial moves in making our intentions clear to the Belgians, then we can set about exercising justice against the war criminals that have tainted the Deutsches Heer."
gerdom.3550.a:0 "The Reichstag must issue a formal apology to the Belgian people."
gerdom.3550.b:0 "The victims of our war policies must be given restitution for their suffering."
gerdom.3550.c:0 "Alongside an apology and restitution, we should commission a memorial in Brussels."

gerdom.3551.t:0 "Belgium is Appreciative"
gerdom.3551.d:0 "When the Fortschrittliche Volkspartei first announced its intention to pursue a policy of normalizing relationships with its Western ally Flanders-Walloonia, the German public showed little enthusiasm at the success of any such plans. Belgium suffered greatly under the German boot during the Weltkrieg, and it would take monumental efforts on behalf of the Germans to pay back the horrors of the occupation, especially as much of the Kaiserreich still wished to not acknowledge the terrible things their troops had carried out in the nation.\n\nHowever, recent developments in this program have led to a spiking interest towards it, as the local government in Brussels has been openly positive towards the efforts of the Foreign Office’s diplomatic overtures. Numerous statements by the Flemish-Walloon political elite have been circulated even in the Kaiserreich’s national-level newspapers, and for the first time in decades, it seems that the situation between the Reich and its small subject to the West are going towards a more amicable direction. Much work still remains at hand until the program can be called a success, of course, but it is nonetheless a highly unexpected yet welcome turn of events."
gerdom.3551.a:0 "Hooray!"

gerdom.3552.t:0 "Belgium Rebukes Us"
gerdom.3552.d_1:0 "Initial reports of the successes of the German Foreign Office’s program of trying to gain the Belgians on the Reichspakt’s side were encouraging, but in the end, the situation has developed into an embarrassing, if expected, failure. The Belgian government has made it clear, in a rather stern manner, that they do not wish the government of Germany to continue trying to influence public opinion in Belgium, and if such efforts continue, the Belgian government must take more forceful action towards the issue.\n\nPublic opinion of the Reich has reached a new low, even exceeding the ire the locals had for their supposed overlords after the disaster of Black Monday, and while further diplomatic overtures could follow in the future, the Foreign Office has advised the government to let the matter be for now. Opponents of the government in the homeland have taken to their respective press organs to ridicule and mock the ministers and FVP officials involved in the debacle, and it will take a considerable while until the whole thing is forgotten by either the Belgians or German opposition."
gerdom.3552.d_0:0 "The Foreign Office’s attempts to win over the public opinion in Belgium were hardly a roaring success according to numerous reports made by German diplomats, ambassadors and officials in the nation, but recently it seems that the worst possible outcome came to pass. The programs aimed at improving relations between Germany and Belgium backfired massively, and, sensing opportunity at our ill-planned diplomatic ploys, the Belgian government almost expelled the local representatives of the German government out of sheer hatred for their de facto overlords. Blunder after another by the supposed diplomatic commission sent to Belgium led to erosion of any goodwill the locals had for their guests, and eventually the local government became so insulted by the Teutonic attempts to woo the people their soldiers had ravaged mere decades prior that only the threat of another invasion kept them from going into extreme measures to eject the foreign ambassadors.\n\nNumerous businessmen, clerks and state officials from across the border have fled back to the Kaiserreich out of fears that the Belgian wrath could boil over, and Heer officers are reporting that their men are afraid to go on patrols because of rumored Franc-Tireur partisan groups appearing around the nation. Only the future may tell where the situation will evolve from here, but it is clear that the lofty ambitions of the Fortschrittliche Volkspartei for the creation of friendship and unity were only matched by their arrogance and ignorance at the true situation of their Lowlander allies. A black mark has been added to the reputation of the FVP government by the situation, and no amount of scrubbing will be able to remove it from the minds of their Western ‘comrades’."
gerdom.3552.a:0 "What a disaster!"
gerdom.3552.b:0 "We did what we could."

gerdom.3553.t:0 "The War Memorial is Complete"
gerdom.3553.d:0 "While the Belgian government may have been hesitant, even downright affronted, at the first signs of German rapprochement on the crimes committed during the Weltkrieg, the finalized construction of the War Memorial ordered by the German Foreign Office has seemingly cleared any confusions or doubts the Brussels government may have had regarding the German sincerity. The architect chosen to perform the task of designing the memorial was Bruno Taut, a German architect with Modernist and Expressionist leanings in his design work, whose ‘Glass Pavillion’ design from 1914 with its massive glass structure covered in mosaics was used as an inspiration for the new landmark.\n\nPicking Taut for the difficult mission was not a hard choice, as he is ideologically close to the ruling Fortschrittliche Volkspartei, as well as being an outspoken pacifist. However, the memorial ended up being a somewhat of a departure from his previous work, as Taut has attempted to avoid the horrors of war in his previous creations but chose to make an exception for this new memorial. Graphic and disturbing descriptions of the numerous atrocities of the Weltkrieg are depicted on the painted glass of the new monument, and it does not hide away the German perpetrators, a fact that has caused quite a bit of criticism in the right-wing press.\n\nNonetheless, in typical fashion for Taut’s works, the memorial leans back into his utopian pacifism, with paintings and engravings depicting the new society rising from the aftermath of the maelstrom Europeans, and especially Belgians, had to endure. Through clever use of lighting and prisms, the shift in atmosphere as one passes through the boundary of the oppressive and horrifying exhibitions of war to the futuristic optimism of the memorial’s other half are meant to give the visitor the sentiment that despite all the violence, humanity could endure and overcome the barbarism of the past, if it worked together.\n\nThe use of various poems, etched into the memorial’s walls, gathered from victims of the crimes as well as the men who had to endure the horrors of the war on the German side, are contrasted by the writings of Belgian, German and other Reichspakt nations’ greatest prosaic and poetic talents, dotting the walls with slogans for the better tomorrow. Whereas Taut’s earlier Glass Pavillion was an exploration of a new artistic direction, observers of the new construction have noted that the new monument instead seems to beckon in a new era of light from an age of shadows. Needless to say, the Belgians have been taken aback by the graceful and honest depiction of their suffering, as well as the hopeful message the architect has somehow managed to draw into being from the very dark chapter of German-Belgian history."
gerdom.3553.a:0 "Mesmerizing."

gerdom.3554.t:0 "Trials of the Beasts of Belgium"
gerdom.3554.d:0 "The post-Weltkrieg hubris of the Kaiserreich made many forget the terrible pillaging and destruction the soldiers of the Reich inflicted upon many of its new allies, but as time passed and veterans became emboldened to reminisce on the horrific things they witnessed during the war, no amount of propaganda or victorious celebration could silence the narratives surrounding the small Western nation on Germany’s border. If the Foreign Office is to make any significant headway into getting back to the good graces of the Flemish-Walloon people, simple platitudes, economic investments and empty apologies will not cut it. The action that could perhaps speak the loudest would be to actually prosecute the men responsible for the worst offences, such as the Sack of Dinant or massacre of Tamines, something the Belgians have already requested the German government to do.\n\nHowever, while the current government has been relatively open to prosecuting officers responsible for the massacres, especially  in the case of Dinant, the extent of these ‘witch trials’, as some members of the military upper brass have called them, is still up for debate. The simplest way to deal with the situation would be to make scapegoats of the lower-level officers, many of whom were detailed in a list provided by the Flemish-Walloon government, usually involving either majors, captains or staff officers who were directly leading the criminal actions on the ground. This avenue towards the issue could shift the blame from German high command to the lower corps, creating a narrative of drunken and badly conducted troops causing the atrocities as many accounts of the war detail, but it would hardly be a satisfactory conclusion to the situation for the Belgians.\n\nIt would nonetheless reassure the Heer, whose leadership is already rather anxious about the whole affair. Nonetheless, we could also go after the upper echelons of the German military command at the time, most of whom are already deceased, removing some of their honours posthumously. However, a more placative case towards the Belgians could also be the prosecution of Johann Meister, general of the Saxon army groups present at Dinant during the sacking. He would be a sufficiently high-profile case to show the German allies that such barbarity will no longer be tolerated. Albeit, going after a general would be a rather bold move from the government, and it is bound to ruffle the feathers of military commanders around the Kaiserreich, but if it is necessary to gain the trust of the Flemish-Walloon people, then there are few options open to the government."
gerdom.3554.a:0 "We can do without some of the worst monsters, but otherwise we mustn't shake the Heer up too much."
gerdom.3554.b:0 "There can be no compromises here if we're to truly turn over a new leaf."

gerdom.3555.t:0 "The Blood Debt Paid"
gerdom.3555.d:0 "The announcing of a set of military trials for war crimes committed in Belgium during the Weltkrieg sent shockwaves around the German society, and many especially among the right-wing parties decried such persecution of the nation’s patriotic soldiers. Nonetheless, despite the media outrage and harassment of the government by nationalist radicals, the relatively timid response from the German public has perhaps signified a degree of guilt over the conduct towards the current ally of Germany, even if such notions are never brought out in public.\n\nHowever, while it may have received a mixed response in the homeland, the trials were met with massive celebrations in Flanders-Wallonia, with thousands gathering in towns worst affected by the Teuton fury, such as Dinant, Andenne and Leuven. While it may have been a costly affair to the government of the Fortschrittliche Volkspartei and the Foreign Office, the Flemish-Walloon government has been very appreciative of the effort, so perhaps it was not all for nothing."
gerdom.3555.a:0 "Excellent!"

gerdom.3556.t:0 "Neglected Birthplace of the Continental Industrial Revolution"
gerdom.3556.d:0 "The Kaiserreich may have become the hegemon of Europe over the last two decades, but to say it has all been from the entrepreneurial spirit of her people and the resources in the soil of Germania itself would be a grand exaggeration. The extent of German presence in the Reichspakt’s states may vary from one nation to the other greatly, but in Belgium, the influence of German business has been a thorn in the side of the local government ever since the creation of the Flemish-Walloon administration. The issue is a manifold one, and it is up to the current administration to untangle the Gordian knot of Reich business interests, Walloon syndicalist threats, and the relative dominance of Flanders in comparison to its southern counterpart. The simplest solution the Fortschrittliche Volkspartei could choose is to simply expand on the industrial development currently in place in the region, providing technical experts, funding for new machinery and facilities, as well as occasionally sending even skilled workers from Rhenish areas to fill in the gaps for our Flemish-Walloon allies.\n\nExperts of the party, chief among them the merchant Adolf Röser from Elsass-Lothrigen, have noted that the plan could be risky given that Flanders-Wallonia, unlike many other members of the German empire, does not really lack technical expertise that the Reich could provide. He and a few other members of the FVP with business ties to the region have instead recommended that the Walloon states be funded more thoroughly, as the heartland of Sillon industriel, the birthplace of Belgian industrial revolution, has been sorely neglected by the Flemish-dominated local governments and this lack of support from the Brussels government is pushing many towards syndicalism. Cities such as Liège could use new industrial sectors and civilian investment to provide better wages and more jobs to the restless workers there, helping the government of the small nation to earn back their trust.\n\nHowever, more anti-syndicalist members of the FVP have noted that this would simply play in the hands of the Communards by allowing the already industrialized region to further eclipse the rural Flanders, especially since Flanders is the key stronghold of support for the German administration. Cities such as Antwerp and Ghent should instead get the lion share of the investments in the eyes of these anti-Communard politicians, or else the government would simply deliver Flanders-Wallonia to the arms of the French menace."
gerdom.3556.a:0 "Simply refurbish the current plants."
gerdom.3556.b:0 "Open some new industries in the Flemish regions, they're more loyal."
gerdom.3556.c:0 "We must go further and open plants in the Walloon states!"

gerdom.3557.t:0 "Economic Successes in Belgium"
gerdom.3557.d:0 "After the recent campaign of refurbishing and funding in the cities and towns across Belgium, the local industry has been truly pushed back into relevance. As smoke bellows from the factories of the nation and the coal mines of Wallonia once more offer their ebony bounty to the foundries and mills of the small country, the people of Flanders-Wallonia feel hope in the development of their homeland once more. While there are still issues in the local industry to be rectified in the coming years, thanks to recent investments and support from Germany, the hardest troubles caused both by Black Monday and the many years of neglect are starting to dissipate. Industrial development alone will not turn the locals to the embrace of the German Eagle yet, but positive attitudes towards their de facto overlords are becoming more common by the day."
gerdom.3557.a:0 "Excellent!"

gerdom.3558.t:0 "Reparations of the War"
gerdom.3558.d:0 "The German foreign office and diplomats of the Fortschrittliche Volkspartei have already made miracles happen when it comes to Flemish-Walloon perception of their former foe and current German ally, but the largest hurdle is yet to be overcome. The trials of war criminals from the German side were already a hard pill to swallow for the Kaiserreich’s people, but as the victors of the Weltkrieg, actually paying reparations for damages caused by the occupation of Belgium during the war is a public suicide for the government at the hands of nationalist forces that would never allow for such blemishing of the German imperial pride by admitting the wrongdoings in Belgium. Nonetheless, the FVP remains committed to compensating Flanders-Wallonia for the immense suffering and destruction that was wrought upon the nation by invading German soldiers, and it is likely that if a normalization in the relations between the two countries is the goal, reparations in some form are needed.\n\nWhile official forms of such transactions are impossible in the current political climate of Germany, the Kaiserreich has a long tradition of government-subsidised charity work done by private non-state organizations. As such, while the administration is unable to provide direct funds, the reparations could be paid through the various German charities already present in Flanders-Wallonia by funneling the money to their activities, especially social work. Organizations such as the Deutscher Caritasverband and the Arbeiter-Samariter-Bund Deutschland are some of the larger charity and social aid groups with sister branches in the region, but there are also numerous smaller secular and religious charity associations with a more local reach that could be utilized to make the effects of this new wave of funding felt in every corner of Flanders and Wallonia. The question remains, however, on how to approach the funding to these associations.\n\nThe Foreign Office has its fair share of financial-minded clerks who support a relatively small support package to local charities, as these men claim that the Kaiserreich has already invested enough into its tiny ally. However, the more socially-minded members of the FVP, led primarily by Heinz Potthoff, have demanded that the government does more for the welfare of Belgians through the charities, expanding their work from soup kitchens all the way to proper charity-run hospitals in the poorest regions. Most of the party and government tends to fall somewhere between these positions, and it is mostly a matter of expediency on which direction the Kaiserreich’s leaders will seek to lean towards."
gerdom.3558.a:0 "Some minor sums should be enough for them."
gerdom.3558.b:0 "Organize some new welfare efforts through these organizations."
gerdom.3558.c:0 "We should put our all into this, both monetarily and in regards to effort!"

gerdom.3559.t:0 "Fully Normalized Belgian Relations"
gerdom.3559.d:0 "When iron-capped boots of German soldiers crossed the border to Belgium in 1914, violating the nation’s neutrality and pulling the United Kingdom into the war that would engulf the entire world, few expected the carnage that would follow. Prussian wrath and paranoia about Franc-tireur guerillas led to untold massacres, and the wounds inflicted upon the psyche of the Belgian people seemed to never fully heal. While those days of terror slowly began to succumb to the unstoppable passage of time, relations between the Kaiserreich and its reluctant ally Flanders-Wallonia have always remained tense, at times outright hostile.\n\nUntil today, that is, as the Flemish-Walloon government has officially commended the Reichstag headed by the Fortschrittliche Volkspartei’s Reichskanzler in their efforts to restore trust between the two nations. The taxes of German citizens allowed for the nation to pay back the horrors its soldiers caused on the Belgian people, and where once the small country was a husk of its former glory, thanks to the efforts of German diplomats, advisors, charity personnel and industrial engineers, the nation now stands on its own legs. Economic development of both regions of Flanders-Wallonia have seen a considerable upsurge thanks in part to the economic aid and partly because of the mass welfare programs enacted by local German-led charities. Cultural exchange between the two Reichspakt nations have also evolved into a far more amicable direction, with the German and Belgian intellectual and cultural elite rubbing shoulders with less mistrust and division.\n\nEven on a local level, average German citizens travelling to Flanders or Wallonia on vacations note that the denizens of these provinces are a touch more welcoming than before, and the graycoated watchdogs of the Heer patrolling the cities of the nation note that the atmosphere of fear both the soldiers themselves and the civilians they guarded felt has slowly lessened, with the warriors of the Reich being seen more as a shield against the Communard menace than an iron gauntlet on the throat of the Belgian nation. Not everyone is obviously convinced to rejoice in the newfound friendship between the two nations, but their voices are increasingly in the minority. For the FVP government, this seemingly impossible triumph has brought with it a massive boost in popularity not only in the homeland but also in the other nations of the Reichspakt, eroding the image of Germany as the tyrannical ruler of the alliance holding its other members hostage for its own benefit."
gerdom.3559.a:0 "A grand first step to our diplomatic revolution!"

gerdom.3560.t:0 "An Eastern Diplomatic Trial"
gerdom.3560.d:0 "During the tenure of Reichskanzler Erich von Ludendorff, characteristically to his expansionist ideals the annexation of Lithuania into the Kaiserreich was rather heavily considered. Proposals of a personal union between the Lithuanian Kingdom and either the Hohenzollern royal family or various regal houses of the Kaiserreich were proposed, sometimes with considerable pressure, but the Lithuanians resisted all such calls vehemently, supporting the idea of an independent Lithuanian constitutional monarchy. Eventually, Prince Wilhelm of Urach and Count of Württemberg was chosen as the monarch by the Council of Lithuania, reigning under the title of Mindaugas II. However, while Lithuania remained nominally independent, it was little more than a puppet to the whims of its new German overlords, and while many locals had hoped for things to improve from the times under the Russian Empire, the situation has hardly progressed in Lithuania’s advantage.\n\nNumerous wealthy Junker landowners, such as Conrad von Wangenheim, utilized the heavy-handed land seizures from Russian and local landowners to buy vast swathes of land from the new nation and ingraining themselves as the new rulers of the nation if not directly, then economically and politically. The Kaiserreich’s government was quick to seize these lands as well, and while a large portion was sold to private actors, the Prussian Eagle still holds a large section of local soil in its talons. Given the rise of a new, far more diplomatic Reichskanzler from the ranks of the Fortschrittliche Volkspartei, the government has felt a degree of pressure to deal with the Lithuanian situation as a show of goodwill for Germany’s tacit ally, especially as another war in the East seems likely. However, the degree to which this compensation is taken remains heavily debated. Most moderate proposals have noted that simply loosening the coffers of the Kaiserreich a little to compensate the Lithuanian government would be more than enough, but the more sympathetic figures in the cabinet and the party, such as the journalist Theodor Heuss, have pushed for a more generous platform.\n\nThese bleeding hearts argue that without a proper land distribution campaign and return of the earth to its Lithuanian owners, the locals will have ample reasons to rebel in the case of a war with Russia, especially as the memory of the Ober Ost horrors still weighs in their minds. Nonetheless, even this distributionist faction is divided on how large of a campaign should be organized. Heuss and his associates support organizing a campaign of returning German state land to the Lithuanians and letting them redistribute it according to local administration, but more radical groups within the FVP want even the Junkers’ land dismantled until no part of Lithuania remains in the hands of Germans."
gerdom.3560.a:0 "Let us just properly compensate the Lithuanians for what was taken."
gerdom.3560.b:0 "We can organize a land redistribution campaign, of course."
gerdom.3560.c:0 "We should extensively work to return land to them."

gerdom.3561.t:0 "Light of Liberty in Lithuania"
gerdom.3561.d:0 "When the agents of the new Fortschrittliche Volkspartei government first approached their Lithuanian counterparts on the topic of reforming the uneven and exploitative land situation in their nation, the reception was rather hesitant. Few Germans could hardly blame them, given the Germanization policies the little state had to endure under the Ober Ost and the economic exploitation that followed the nation’s independence. However, when the government of the Kingdom realized that the FVP’s proposal was not yet another ploy by their Teuton overlords, at least on the surface, the compensation scheme was approved and negotiations could truly begin. To reassure the locals of the FVP’s good intentions, the veteran pacifist Ludwig Quidde has taken over the program as the chief ambassador to Lithuania, intent on rectifying the mistakes of the past despite his advanced age.\n\nQuidde has managed to convince other anti-war figures, such as Paul Freiherr von Schoenaich, with no affiliation to the FVP, to support the government in the negotiations. Hugo Wendorff, another member of the party and an expert on the farmer and landowning policies, has also joined the commission, and thanks to the combined efforts of both diplomats and technical experts, the Lithuanian situation has improved drastically from the previous status quo. Thanks to the influx of funding and a nudging hand of guidance, the Lithuanian authorities are far more optimistic about the rural situation for the first time in decades, and while there has been a degree of grumbling primarily within the ranks of the Junkers, the positive reputation the entire ordeal has given in the young nation towards the Kaiserreich has been well-worth the effort and costs the program has accrued thus far. While much work still lies ahead, the initial successes have assured the FVP government of the righteousness of their chosen path."
gerdom.3561.a:0 "One step closer to winning their hearts on our side!"

gerdom.3562.t:0 "The Expected Cold Shoulder"
gerdom.3562.d:0 "The Fortschrittliche Volkspartei government’s efforts to reach out to Germany’s young ally in Lithuania were met with cold responses from the very beginning, a hardly surprising reception given the Germanization policies and the massive exploitation of the nation’s countryside by Junker estates. Despite the odds, the FVP’s envoys had been hopeful, given the large investment and injection of talent to the entourage of negotiators, such as the famed pacifist Ludwig Quidde. It did not take long for this mood of optimism to fade away, however, as the Lithuanian government was doggedly hostile to the efforts of their Germanic allies, claiming that the generous offers made by the Kaiserreich’s government were wholly insufficient to rectify the abuse and scorn the Lithuanians have had to suffer during the long years of German rule.\n\nMany within the diplomatic mission were wholly insulted by these claims, and angry arguments and even threats began to fly in the meeting space until the Germans stormed out, flanked by Lithuanian guards. Needless to say, the entire debacle has hurt the relations between the Reich and its supposed subject, and many within the German public now fear that the FVP’s mistake may lead to further unrest in Lithuania as the people take their anger out on German-owned businesses and estates. True repercussions of these failures remain to be seen, but for now, the situation has been a serious blow to morale for the FVP government."
gerdom.3562.a:0 "Insolent Zhmudzin peasants..."
gerdom.3562.b:0 "We did manage some successes, at least."

gerdom.3563.t:0 "Sweeping Away the Cobwebs at Kaunas University?"
gerdom.3563.d:0 "When the Lithuanian state was slated to be annexed into the greater territories of the Kaiserreich, either through the utilization of a personal union or a forceful linking of the two states, the University of Kaunas was closed down as a preventative measure to ensure that it would not become a hotspot for Lithuanian nationalism. The University of Vilnius, on the other hand, was allowed to continue as its location in a region with far more diverse ethnic composition meant that the Lithuanians had far less influence on the academic atmosphere. Even as Lithuania asserted its independence from the Kaiserreich and managed to negotiate the creation of a constitutional kingdom, albeit under a German prince, the situation in Kaunas remained the same.\n\nThe university was never reopened, as the Germans argued that it would be a needless new expenditure with Vilnius university already as the great hall of learning for the nation, but many locals still harboured dreams of reopening the Kaunas institute. Given the rather academic composition of the Fortschrittliche Volkspartei, from figures such as Friedrich Meinecke to the now passed statesmen with a heavy emphasis on education such as Friedrich Naumann and Georg Kerschensteiner, the new government has begun to consider a push to reopen the institute partially through the funding of the Kaiserreich.\n\nThis initiative would be part of the wider program to compensate Lithuania for all the hardships it has endured under its alliance with Germany. Experts of the region have noted that the reopened university could be named after the Lithuanian national hero Vytautas the Great, allowing a degree of nationalism in the university from the onset to show that the FVP government is serious about its rapprochement. However, some dissident voices in the government are fearful of reopening the academic institution, seeing it as a way to create a new hive for dangerous Lithuanian nationalists and possibly also radicalized youth influenced by syndicalist ideals. Thus, the better option in the view of these alarmists would be to invest the funds into the Lithuanian state itself, especially given the existence of the Vilnius university at present."
gerdom.3563.a:0 "Let's do some minor investments into Lithuanian state budgets."
gerdom.3563.b:0 "Reopening the university and aiding its hiring of staff is a top priority."

gerdom.3564.t:0 "First Glimmers of a Friendship"
gerdom.3564.d:0 "The Lithuanian experience within the Reichspakt and Mitteleuropa has been hardly a pleasant one, with their economy firmly in the grip of their Teuton overlords, an unwilling king forced upon the nation in exchange for some semblance sovereignty, and their politics increasingly dominated by the whims of local Junker landlords. Nonetheless, through the rigorous and charitable work done by numerous German experts, diplomats, and administrators, the Lithuanian state has received a significant boost in its economic development. The unwavering support and erudite decision-making done by the Fortschrittliche Volkspartei government in Germany has not gone unnoticed by either the Lithuanian government nor its people, and as trade blossoms between the two allies, the subject-master relationship the two nations have shared over the last two decades is slowly developing into something resembling a true friendship.\n\nThe path to true redemption of Germany in the eyes of Lithuanians still stretches ahead, but the first concrete steps towards the healing of the wounds of Ober Ost have been taken. Perhaps one day the mistakes of the past can be put aside so the two nations of the European empire can embrace one another as true brothers, but for now it is an excellent start towards that future."
gerdom.3564.a:0 "Excellent."

gerdom.3565.t:0 "Ruthenian Mechanization"
gerdom.3565.d:0 "The White Ruthenian state is unique from the other nations the Fortschrittliche Volkspartei government has approached in hopes of creating a more equal partnership, as Ruthenia does not harbour as strong of an anti-German bias as the likes of Flanders-Wallonia and Lithuania do. Nonetheless, the young nation stands at the very frontlines of any possible war against the Russians, and thus improving their situation would hardly go amiss. While Ruthenia faces many issues, they all seem to be interconnected into problems with the agriculture of the nation, left rather primitive even after the nominal independence from Russia. German businesses have hardly alleviated their woes, as various Teuton tycoons and Junker lords have sought to keep the nation in poverty to keep the wages of local peasants and workers as low as possible while protecting domestic German agriculture from competition, something it already suffers from given the abundance of Ukrainian grain.\n\nNonetheless, the FVP’s new governing body will not let the eastern flank of the Reichspakt go unnoticed, and thus a program of investments and improvements has been drafted to be proposed to the White Ruthenian government. However, there are some disagreements between ministers and party advisors on how the situation should be approached. Members of the more technocratic wing of the party headed by Walther Rathenau propose the use of German experts, advisors, engineers and other “brain workers” to slowly but surely allow the Ruthenians to acquire the knowledge and practical experience to truly reform their agricultural production.\n\nHowever, members of the FVP with expertise in farming, such as Georg Schipper and Hugo Wendorff,  have noted that the way forward would be to fully mechanize the farmsteads and other production sites in the nation as a great jump to modernity. Finally, the more worker-minded members of the FVP, led primarily by the reformist liberal Heinz Potthoff, have argued that the German government should focus on coercing the Ruthenian-German Junker landowners to pay for the expenses of reforming the local rural economy, shifting the burden of funding from German taxpayers to the people who exploited the Ruthenians. While such a measure would undoubtedly be popular in White Ruthenia, the Junkers are not a force to be trifled with and such an approach could cause more harm than good in the long run."
gerdom.3565.a:0 "Make massive monetary investments to mechanize their agriculture."
gerdom.3565.b:0 "We can transfer some of our skilled engineers over to aid them in a prolonged effort."
gerdom.3565.c:0 "Let's just force some German landowners in Ruthenia to foot the bill."

gerdom.3566.t:0 "Fertilizer for the Ruthenian Agricultural Miracle"
gerdom.3566.d:0 "Failure was hardly in the minds of the Fortschrittliche Volkspartei’s ministers when they approached the White Ruthenian government with promises of funding and technical support in reforming the young nation’s agricultural engine, and these expectations have been proven correct. The Eastern European state agreed to the German proposals with much anticipation and celebration, and as the programs began to run their course, the improvements were quickly felt in the local society.\n\nA grand shift such as that planned by the FVP government does not happen overnight, of course, but the rural farmlands and sawmills of White Ruthenia are booming unlike ever before, expecting harvests far exceeding those of earlier years as new technologies and more fair wages are slowly becoming commonplace among the peasants of the country. News of this triumph have travelled far and wide around the German sphere of Eastern Europe, and while some are either jealous or cautious about the successes in nations such as Ukraine, the United Baltic Duchy, or Lithuania, the blossoming modern agriculture of White Ruthenia has certainly earned Germany a good deal of positive reputation among its Eastern allies."
gerdom.3566.a:0 "Much needed support from the East indeed."

gerdom.3572.t:0 "Apotheosis of the German Culture"
gerdom.3572.d:0 "Thomas Mann has always been something of an odd one out within the ranks of the Fortschrittliche Volkspartei, especially among those who still remember his wartime book, Betrachtungen eines Unpolitischen, where he lambasted the democratic currents in German society and fervently attacked those, among them his brother Heinrich Mann, who he saw as the polluters of the German spirit with Anglo-French liberalism. However, the post-Weltkrieg experience in the Kaiserreich caused Mann to abandon many of his previous positions against democracy, which may have allowed him to join FVP in the first place, and to seize the position of Reichkanzler today. While Kanzler Mann may have reverted his positions on the pluralism of German state, he has retained his deeply nationalist and somewhat apolitical stances, acclaiming Germany as the pillar of stability and positive traditionalism, a nation that has managed to remain pure for centuries against the corrupting forces of the French and British ideologies.\n\nNonetheless, the battle for the soul of Germany cannot be fought on all fronts simultaneously, and thus Mann and his government must decide on which part of the national mythos they seek to cultivate further. The Germans, hegemons of the world, are rightly considered the greatest warriors the world has seen today, all the while the artists, writers and composers of the nation also reap one success after another and push the boundaries of culture ever further. Glorifying the noble nature of war, the aggressive masculinity of the Reich’s sons and the aesthetic genius of its brightest individuals, could serve as an inspiration to not only the masses of the homeland, but to its many allies and subjects in Germany and abroad. This martial and aesthetic cult could propel imperial culture into a new era of supremacy, ensuring the purity of the German soul through Spartan discipline and rugged belief in the national cause.\n\nHowever, the other option remains to focus on the innate resilience of the Teutonic spirit towards foreign ideas. This approach would see Mann’s government promote wholly Germanic ideals, such as a contempt for modern ideas, an entrepreneurial spirit stemming from the bourgeois faith, and a love for God as the granter of the finest things in life, such as art, love and individuality. It would also see Mann attempt to depoliticize much of the public discourse, sheltering the people of the empire from the politicians so intent on destroying the dignity of the nation with their lies and meaningless words. While both options are valid directions for the FVP, the party currently does not possess the time nor resources to pursue the cultivation of both ideals, and thus it falls to Mann to choose the path for his followers and the German people."
gerdom.3572.a:0 "Martial power won us the Weltkrieg, and we must reawaken that same spirit!"
gerdom.3572.b:0 "The German spirit has sheltered us from foreign influence thus far, it must be celebrated!"

gerdom.3574.t:0 "Awakening the German Aesthetes"
gerdom.3574.d:0 "The local customs office in the city of Emmerich am Rhein had been something of a den of nervously balanced tranquility over the last two decades, ruled with an iron-fist by a manager of the office, a former captain of the Kaiserreich’s army who had lost a leg during the Weltkrieg. However, early in the morning, the tired clerk receiving any newcomers on the first floor had been surprised by the appearance of two officials from Berlin, a rare sight on the Dutch border given the relative peace between the two states. The office manager had been in for a far more nasty surprise, as the officials noted that his period of retirement would start shortly given recent changes in military pensions and retirement age of veterans pursued by Reichkanzler Mann’s government.\n\nThe captain, not used to being bossed around by a pair of seemingly civilian figures, threw up a storm in protest, but despite all his rage, the officials left shortly following the signing of some bureaucratic paperwork. As an additional insult to injury, two relatives of the captain who had been given positions in the office following exemplary military service in the colonies and the captain’s personal recommendation had been transferred to other duties in the Kaiserreich’s administration. With no representatives of the government to direct his ire to, the manager berated his workforce, claiming that with him gone, the soft-handed civilians making up most of his subordinates would run the place to the ground. Nonetheless, when the time of retirement came, and the old Kapitän was gone, his replacement proved such notions wrong.\n\nAn entrepreneur from Rostock and a veteran of the shipping business had arrived to replace the grizzled war veteran, and under his guidance, the office increased its effectiveness to completely new levels. New clerks and administrators from middle-class families began to slowly replace the military men present on all levels of the local institutions, the iron gauntlet of the Heer slowly releasing its grip on the local institutions as former soldiers left for retirement or took up duties in far more militaristic roles, and for every veteran, a son of a burgher or an artist rose to fill the gap. An era of educational and aesthetic change was flowing through all of German society, and the military no longer provided a surefire route to success in every field of society."
gerdom.3574.a:0 "The era of the soldier hegemony is rapidly nearing its end."

gerdom.3577.t:0 "Was ist des Deutschen Herkunft?"
gerdom.3577.d:0 "Given his civil profession as a historian, the new Reichskanzler Friedrich Meinecke has sought to find the answers to his political ponderings from the glorious past of the German nation. While Germany may possess a long and storied history, the concept of Germanic nationalism as it exists today is a rather young one, but what has caused sleepless nights for the historian has been the question of when exactly this unified spirit of the Germans was born. Meinecke has long argued that the invasion by the forces of Napoleon Bonaparte at the dawn of the 19th century resulted in the end of the German age of tribalism, where the feudal realms of the old Holy Roman Empire first felt a tinge of unity among one another in the face of a common foe. However, while Meinecke understands the long years of French occupation as the start of the transformation of these ‘cosmopolitans’, local minor states filled with Germans without a German identity, into ‘nationalists’, fighters for an unified Germany, the process was a long one. Despite the numerous unifications between the rising star of Prussia and the regional German states and kingdoms, Germany may have outwardly appeared more and more united yet true national unity eluded it for quite some time, possibly up until the victory in the Weltkrieg and the crowning of Germany as the true empire with its place in the sun.\n\nThe question has tormented the Kanzler, and despite its seemingly trivial nature in the face of much greater issues facing the Kaiserreich at present, Meinecke sees the tracking down of the birth of German nationalism as a way to drum up the patriotic sentiments of the empire’s denizens at a time when such ideals are sorely needed. Emphasizing the importance of the Napoleonic era of occupations and the continued struggle against the French menace could remind the German people of the time when the disparate nations of the future Teuton realm faced seemingly impossible odds and managed to persist, even thrive, in the aftermath, a situation the empire very much finds itself in now too, encircled by revanchist foes and unreliable allies alike. However, Meinecke feels that the German empire of the pre-Weltkrieg era was still a rather disunited group of former independent nations simply under the rule of Prussians, and thus the Weltkrieg may prove to be a better unifier for the nationalist causes of the Reich. After all, it was a monumental effort on the behalf of the German people, and brought untold prosperity to a nation that had so long stood in the shadow of its imperialist peers. It would also benefit from the short period of time that has passed since the war was fought, compared to the over a century of time that has passed since the age of Napoleon’s conquests. The dilemma will haunt the Reichskanzler until he arrives at a conclusion, so perhaps it is best to settle the matter until it grows into a larger drain on the empire’s leader."
gerdom.3577.a:0 "Tearing down Napoleon was our beginning as a truly powerful nation."
gerdom.3577.b:0 "Conquering the world in the Weltkrieg was the dawn of our era!"

gerdom.3579.t:0 "The People's League Breathes Anew"
gerdom.3579.d:0 "During the Weltkrieg, many political issues of the pre-war era had been set aside for the good of the nation, and most parties agreed that wartime was not for the pushing of domestic political aims. While some parties, among them the liberals from both the Fortschrittliche Volkspartei and the Nationalliberale Partei, did try to push for further parliamentarization of the Kaiserreich during the war, this was done in a rather off-hand manner and most factions within the political scene simply focused on winning the war. Nonetheless, political differences arose from the war itself as well, as many organizations got caught up in the nationalist currents of the struggle between the forces of Anglo-French and German-Austrian civilizations. Most parties had their own factions supporting either moderate expansionist claims or maximalist annexationist policies, though few were as unified in these calls for aggressive expansion as the Deutsche Vaterlandspartei. Their extremist rhetoric was an outrage to many more moderate forces in German society, and in the universities, the resistance to the brutish warcries of the DVLP crystallized in the creation of the Volksbund für Freiheit und Vaterland.\n\nThe VFV was a big-tent organization made up of independent academic individuals, such as Adolf Grabowsky, as well as those from the ranks of Zentrum, the Sozialdemokratische Partei Deutschlands and the FVP, and in sheer defiance to the warhounds of Ludendorff, supported the war simply on the basis of political and social reform and minimalist, moderate expansion of the Kaiserreich. Friedrich Meinecke was one of the central figures within the movement, breaking bread with Zentrum’s Johannes Giesberts and the SPD’s Gustav Bauer for the common good, even if the organization ended up mattering very little in the end. The war ended and Germany’s claims are still clear for all to see today, but the alliances Meinecke forged could prove useful to the FVP today.\n\nHeinrich Brüning, successor of Giesberts and a former student of Meinecke, has already expressed a degree of interest in forging a new bond between the Catholic workers of Germany and the liberal elite of FVP to carry the torch of the VFV onwards in spirit. However, Bauer’s ties within the SPD and shared respect with the Reichskanzler despite the different political platforms could be the much-needed push that would allow the two forces of progress to finally see beyond the picket lines of political minutia, embracing each other as the protectors of the Kaiserreich against the nationalist excesses of the right. Both options would mean compromises and further negotiations from the side of FVP, but the potential of these alliances are simply too good to pass."
gerdom.3579.a:0 "The Christian trade unions are safer allies."
gerdom.3579.b:0 "We can find a lot of common ground with the SPD."

gerdom.3581.t:0 "The Devil You Know"
gerdom.3581.d:0 "The Sozialdemokratische Partei Deutschlands may very well be the largest left-wing party in the Kaiserreich with a substantial enough base to contest elections, as the recent victory of the party has shown, but the reality of the realm is that the German right is a beast which even the united might of the workers may struggle to control and contain. Nonetheless, the party has sought to consolidate itself as the glorious monolithic force for change in the Kaiserreich, a true wish granter of the workers, and thus the battle against the agents of reaction is SPD’s burden to carry. Or so the official story shall appear to the public, but the new social democrat Reichskanzler and his government are fully aware of the difficulties the SPD would face if it attempted to rule without any support from parties and movements amenable to its cause. While coalitions are impossible given the party’s insistence on being the vanguard of the left, unofficial avenues of gaining sympathies within parties the SPD has worked with before are always an option. A few meetings in smoke-filled rooms there, a private conversation with a fellow Reichstag member there, a surprise holiday guest from the ‘opposition party’ and suddenly, the SPD might be able to grease the wheels of parliamentary progress far better than before. However, even if these backroom dealings can be made to work, the SPD government must settle on a direction of such actions, for trying to influence too many parties at once will just stretch the limited resources at the party’s possession too thin for any meaningful progress.\n\nRealistically, the best optics for these shadowy allies would be either the centrist liberal Nationalliberale Partei or the Christian democratic Zentrum party. The NLP is often colloquially known as the ‘chimney baron party’, and it is true a sizable portion of the party’s support comes from various industrial oligarchs, but there are also pioneers of democracy and parliamentarism in that den of plutocrats, such as prominent party official Gustav Stresemann. Their support could be vital in passing the various reforms to the Kaiserreich’s democratic institutions that SPD aims to carry out. Zentrum, on the other hand, has a rather prominent social Catholic and pro-worker wing, led primarily by the likes of Matthias Erzberger and Heinrich Brüning, and any under-the-table pacts with them when it comes to expanded workers’ rights and labour laws could prove to be a substantial boon to SPD’s parliamentary battles. One focus must be chosen, and it won’t come without compromises given the conservative nature of Zentrum and the pro-business sentiments of the NLP, but for the good of Germany, some painful choices need to be made."
gerdom.3581.a:0 "Zentrum for a workers’ united front, despite religious differences!"
gerdom.3581.b:0 "NLP for the defense and expansion of Germanic democracy!"

gerdom.3582.t:0 "The Woes of a United Front"
gerdom.3582.d:0 ""
gerdom.3582.a:0 "We have to try, for the German people's sake."

gerdom.3583.t:0 "Uprooting Communard Snakes"
gerdom.3583.d:0 "Ever since the Communard menace has come to control Paris, the German state has had to contend with syndicalist subversion. While the worst of radical leftist violence has been laid to rest with the end of the November Uprisings, dissident sentiments have been steadily on the rise in recent years since the dissolution of the Grand Coalition. Nowhere has this been more prevalent than in the Rhineland, where it's been all but confirmed that foreign agents are at work trying to mobilize good and honest Germans against their Empire.\n\nThe scale of seditious literature and pamphlets being distributed has become threatening, with many claiming that the Communards are coming to "liberate" the German worker from a system that will never truly emancipate him. Further still, pacifistic discussions have been taking an even more radical bend, with recruitment offices in Essen and Cologne being vandalized and posters asking "Why die for Nancy?" are covering Rhenish alley walls. Shockingly, none of the circulated material has called for violent action against the government, rather the focus has been on hindering our war efforts in various non-violent means. Before our ascent to power, this ongoing espionage was being fiercely investigated by the rightist government of Westarp, with many trade union members being arrested on suspicion of being connected to this nebulous web of French sympathizing.\n\nWith the SPD in control of the Reichstag, however, we can ensure that the problem is handled with tact and grace. We must do our best to only go after those who might be involved with the plot itself, for chasing ghosts or dead ends will not only inflame paranoia but also push the snakes deep underground."
gerdom.3583.a:0 "Now to follow the trail of traitors."
gerdom.3583.a_tt:0 "§RWe must pick our targets carefully, any slip-ups could ruin the entire investigation.§!"

gerdom.3584.t:0 "Who Lurks in the Dark?"
gerdom.3584.d:0 "Considering how much of the Ruhr seems to be getting possessed by anti-government sentiments, there is likely an already organized group within Germany that is aiding the spy and their network. While it has been easy for many to blame the USPD or Laufenberg's Bund, the primary leads our agents have picked up on are neither.\n\nThe first leads are claims, which our predecessors had taken very seriously, of a secretly armed force of syndicalists and Jacobin-led thugs. While such a group has yet to show itself, this "Ruhr Red Army" as some have taken to calling it has continuously cropped up as the source of our ongoing woes.\n\nThe second lead is the intellectual circle "Neu Beginnen" which contains various pacifist thinkers, formerly active USPD politicians, and even several SPD party members in its ranks. The group publicly dedicates itself to furthering leftist unity and attempting to solve debates in theory and economics. Alongside its vision of a future where Germany is reformed into a people's republic, however, it has come under scrutiny for its resistance to the "militarism" of the status quo Social Democrats.\n\nThe third lead concerns the Gruppe Sozialrevolutionärer Nationalisten, a small Sorelian faction led by the journalist Karl Otto Paetel. Despite attempts at censure and even governmental harassment, Paetel has remained deeply resistant and continues to self-publish material in Germany and distribute translations of Georges Valois' political works. The GSRN's overt sympathy for the Commune of France is certainly seditious, and their size would make any genuine crackdown rather simple.\n\nAs this is our first move against the "Rhenish Ring", we have to ensure we strike where the dissidence is centered, or else we will quickly lose the initiative against the Communard menace among us. Unfortunately, our resources and lack of support from the Abwehr only permit us to target one organization."
gerdom.3584.a:0 "It must be these rumored irregulars with red banners!"
gerdom.3584.b:0 "Perhaps this "Neu Beginnen" is more compromised than we realize..."
gerdom.3584.c:0 "The GSRN is a vestige of Spartacist violence, root it out."

gerdom.3585.t:0 "Upending the Ruhr"
gerdom.3585.d:0 "The prospect of a fully armed and prepared force of syndicalist scum on the Kaiserreich’s soil was not one to be taken lightly, and thus when agents of the SPD government were sent ahead to investigate rumors of the so-called Ruhr Red Army, their task was to be carried out with utmost secrecy and diligence. As agents began to trickle back in from the Ruhr, no stone had been left unturned, and every single lead was pursued to the ends of the Earth until the investigators gave up their chase. Even then, with all these efforts levied at the near-existential threat that the Red Army was described as, no solid evidence of their existence was ever found. In fact, even flimsy evidence appeared to be hard to come by, for whenever possible groups belonging to this supposed grand army of the syndicalist infiltrators were discovered, they turned out to be little more than petty vandals, hoodlums, or other street scum with no clear political affiliations to write of.\n\nSupposed leaders of the organization, those rumoured to be leading its military branches such as Ernst Lohagen and Artur König, were similarly mere phantoms, with local associates or family members of the many named members of the Ruhr Red Army testifying during interrogations that they had not seen the accused on German soil for ages. Even in cases where members of left-wing groups were discovered in possession of weapons or treacherous propaganda, it was merely the actions of tiny dissident cells or even disgruntled individuals, and the few guns the Ruhr police forces gathered amounted to little more than outdated pistols and revolvers. Whatever dangerous plots are unfolding inside the Kaiserreich, they surely are not coordinated by any Ruhr comrades unless the syndicalists of Paris have managed to ally ghosts and phantoms to their cause."
gerdom.3585.a:0 "So, there was nothing there after all."

gerdom.3586.t:0 "What Lurks Behind Pacifists"
gerdom.3586.d:0 "After days of diligent investigative work, evidence gathering, and, most decisively, midnight raids against the members of the Neu Beginnen organization, it seems that the agents of the Sozialdemokratische Partei Deutschlands government have finally chipped at the rot infesting the Kaiserreich. The organization, claiming to be little more than a platform for leftist unity and a pacifist organ, has turned out to be a hive of scum and treachery masquerading as a moderate movement. Inside the offices of its leader, Walter Loewenheim, a bundle of documents was discovered inside a hidden compartment, and upon closer inspection, it was revealed to contain a number of name lists, photographs, and letters.\n\nThese lists included possible left-wing politicians, union leaders, or activists of various ideological shades and alignments, from syndicalists to anarchists and communists, who could be persuaded to work with a Communard-aligned government in the hypothetical scenario where the Kaiserreich would fall to French invasions. No matter how unlikely these delusions are to come to pass, this document folder is a grave act of treason, and the would-be collaborators will get their due as quickly as possible. Far harder for SPD, however, has been the inclusion of a few social democrats in this scandal, as men such as Kurt Schmidt and Fritz Erler have been implicated as collaborators to Neu Beginnen. They have been swiftly removed from the party and prosecuted on these crimes, but the potential for SPD’s rivals to use this information lingers as a threat to the left-wing Reichskanzler nonetheless."
gerdom.3586.a:0 "We were right to suspect these seditious "intellectuals"."

gerdom.3587.t:0 "Interrogating the Firebrand"
gerdom.3587.d:0 "In the early hours of the morning, the occupants of a small Berlin apartment were frightened by a knock on the door, and as the door swung open, a pair of figures stormed the room and knocked the tenant on his feet. Recognizing the startled man as Karl Otto Paetel, the raiders ordered the man to sit down, firearms dangling from their hips as a silent but conclusive threat. The following hours would crawl on for Paetel, and as he was grilled by two grizzled veterans of the Geheimpolizei, the entire organization of his ephemeral Gruppe Sozialrevolutionärer Nationalisten grouping was unraveled and examined until the two detectives emerged into full daylight, leaving the shaken Paetel to recompose himself.\n\nWhat the two agents had learned in the room was of little use to their mission, for the eccentric nationalist revolutionary Paetel had provided multiple details about his allies and associates, but none of these were taking the investigation any closer to finding the Communard infiltrators defiling the Kaiserreich with their presence. Paetel’s GSRN was little more than a gathering ground for fringe national communists, oddball Marxists, and syncretic nationalists from the far-right, far more interested in writing manifestos and fiery sections of newspapers and journals than pursuing any revolutionary activity. The group was relatively cohesive for such an insignificant unit, but outside of Paetel himself and his allies Ernst Niekisch and Claus Heim, there seemed to be little ideological loyalty or even interest to the nationalist-communist synthesis platform of the GSRN. Even then, the supposed Internationale connections of Paetel seemed nonexistent, as the man was not fond of the French system at all and was far too patriotic-minded to care about the Commune. Even if he were willing, Paris would hardly care for such a niche figure."
gerdom.3587.a:0 "Paetel knows even less than we thought..."

gerdom.3588.t:0 "Who Might Be Compromised?"
gerdom.3588.d:0 "As the Sozialdemokratische Partei Deutschlands’ efforts to locate members of the party in league with the Communards continue, the eye of the upper echelons of the government has turned towards individuals with enough power and influence to pose a danger of infiltration. With the help of the German intelligence and investigative police branches as well as numerous trusted SPD officials and informants, the possible infiltrator candidates have been narrowed down to simply three. The first of these suspicious figures is Erwin Eckert, a Lutheran pastor from Baden who has belonged to the ranks of the party since 1911.\n\nDuring a brief period between 1926 and 1931, he was also associated with the Christian socialist organization Bund Religiöser Sozialisten Deutschlands, and while he might appear as a regular member of the SPD’s left flank, rumors and circumstantial evidence seem to show that Eckert has been meeting with syndicalists and communist intellectuals, though the veracity of these claims warrants further looking into. Another promising lead points to a separatist figure, Josef Friedrich Matthes, an SPD politician from the region of Rhineland and an outspoken critic of the Kaiserreich’s federal policies. Matthes has been a rather strong proponent of further Rhenish autonomy and perhaps even independence in his most radical statements, and while he is a liberal socialist in most matters, his loyalty to the region of Rhineland over the entire German nation might prove to be a way for the Communards to influence his judgment towards unbecoming causes for an SPD politician, regionalist or not.\n\nFinally, another member of the party’s far-left flank and a possible mole is Johanna Kirchner, who is known in the social democratic circles of the Kaiserreich as a champion for women’s rights and social aid programs at the local level. She is especially known for her work with the aid organization Arbeiterwohlfahrt, but while Kirchner’s work is praiseworthy, her choice of allies and friends does raise some eyebrows. Especially troubling is her continued contact with one Eleonore ‘Lore’ Wolf, with whom she has collaborated time and time again on socialist aid campaigns and other matters. Wolf, however, is even more of a firebrand than Kirchner and is known as an open communist, with suspected ties to the Internationale’s Parti Communiste Français and Italy’s Partito Comunista d'Italia. As such, while Kirchner might appear harmless at first, it is the company she keeps that causes the questions to arise."
gerdom.3588.a:0 "Eckert could be compromised, check his connections."
gerdom.3588.b:0 "Matthes' rhetoric threatens stability, and he must know it."
gerdom.3588.c:0 "Kirchner's friends raise too many eyebrows."

gerdom.3589.t:0 "Shaking Down Eckert"
gerdom.3589.d:0 "As unreliable as hearsay and gut feelings can be, it seems that in the case of one Erwin Eckert, these intuitions were correct. Tailing the priest for days, Geheimpolizei officers were able to remain undetected by their target until he was confirmed to have spoken to numerous familiar faces of the German intelligence and counter-espionage services. After being pounced on by agents of the Sozialdemokratische Partei Deutschlands’ government, Eckert revealed everything in the following impromptu interrogation.\n\nUsing his contacts from the days of the Bund Religiöser Sozialisten Deutschlands, the pastor had opened dialogue with numerous European Christian socialist movements, first in nations that the Kaiserreich did not consider a direct threat, and through them, the various socialists of the confessional kind in the Internationale. Eckert had been delivering information meant only for the eyes of the SPD politicians and government officials directly to his contacts in the Commune of France, all the while creating networks with local syndicalists and communists through meetings with underground figures. Eckert’s plan had been to establish a clandestine group of Protestant socialists throughout Germany in the hopes of undermining the current Kaiserreich and possibly allowing for future collaboration with their ideological comrades in Paris and beyond.\n\nThis line of communication with the French syndicalists was facilitated by various radical middlemen the pastor has been in cahoots with, but thanks to the efforts of the Geheimpolitzei, these moles have followed their informant’s fate as well. The nature of the intel Eckert provided related to not only the operations and inner workings of the German government, but also the running of the entire SPD party, which would have left much of the nation compromised in the case of a war. However, with this traitor exiled and jailed and his associates hunted down, the Commune has just lost one of their most valuable vipers within the Kaiserreich."
gerdom.3589.a:0 "If we can't trust a pastor, who can we trust?"

gerdom.3590.t:0 "Shaking Down Matthes"
gerdom.3590.d:0 "As the hunt for traitors and informants within the Sozialdemokratische Partei Deutschlands began, many investigators considered the regional wings of the party the best places for unrest and dissident voices to reach their audience and thus become fertile ground for pro-Communard rhetoric. Through a careful elimination process, the most likely target for such activity was settled on the Rhenish liberal socialist member of the SPD, Josef Friedrich Matthes. Matthes has been a thorn in the side of the party with his adamant defense of Rhenish rights and constant lashing out at the current state of affairs in the Kaiserreich’s regional administration, and his proximity to the Commune geographically could make him a great target for conversion by agents of the Internationale.\n\nNonetheless, such arguments soon began to ring hollow once Geheimpolizei’s officers politely invited Matthes to a chat and extracted a strong testimony from him. This testimony was not a condemnation of his behavior but instead a rather complete collection of details of how Matthes has spent most of his recent times organizing and socializing for the growth of the Rhenish SPD to capitalize on the success of the national party in recent elections.\n\nThe Rhenish politician claimed that while he stands behind his words on the state of the Kaiserreich and Rhineland’s position within it, he would never consider outside help, especially from the Communards, in achieving a more favorable state for it. His statements were backed by the terrible results of the Geheimpolizei's efforts in investigating his home, offices, and other venues Matthes frequented, as despite thorough combing of his documents and letters, no signs of any connections to the Commune or its allies were discovered by the officers. The enemy still lingers, but it has not found a place within the ranks of Rhenish SPD after all."
gerdom.3590.a:0 "The man can definitely shout, but he's not our guy."

gerdom.3591.t:0 "Shaking Down Kirchner"
gerdom.3591.d:0 "After the Sozialdemokratische Partei Deutschlands government chose to pursue its leads on Johanna Kirchner in hopes of finding a Communard mole within the Kaiserreich, hopes were high that through the reformist socialist Kirchner, more radical members of the spy circle could be hunted down. However, after a visit by the Geheimpolizei’s veteran detectives and some upper brass of the SPD, it seems that these efforts were sorely misplaced. The information that Kirchner may have still been in contact with many of her radical associates, friends, and allies seems to have been completely obsolete.\n\nWhile she has worked with the likes of Lore Wolf and other communist figures in the past, these contacts have long since turned into little more than detached friendships, and as Kirchner has gained more and more clout as a social aid mastermind and local community outreach champion, she has been involved in far more conventional ways of aiding local populations than some far-flung dreams of a revolution toppling the entire Kaiserreich. This closeness to the people of Germany that she has gained through her strong involvement has also made any ideas of treachery and collaboration with the Commune of France's government completely alien to her as a concept.\n\nTo back up the SPD politician’s claims, the Geheimpolizei officers did not find even a single scrap of evidence indicating any ties to either the radicals in a political sense or to the Commune of France or other Internationale nations. Defeated, the bloodhounds of the SPD had to call off the chase, for the prey had eluded them through an SPD's self-made decoy once more."
gerdom.3591.a:0 "Guess she really is as committed to helping people as it seems."

gerdom.3592.t:0 "What Unions are Infested?"
gerdom.3592.d:0 "As the investigations into the rats hiding in the ranks of the great Sozialdemokratische Partei Deutschlands continue, the eyes of the government and its loyal watchdogs in the Geheimpolitzei and Abwehr have turned towards the numerous unions affiliated with the Social Democrats. There are, of course, dozens of smaller local unions and trade-specific groups not associated with the larger national-level syndicalist organizations, but these are hardly the perfect ground for the French Communards to find strong allies in, and thus the efforts of the investigators have been aimed at the three largest unions with the highest possibility of treachery.\n\nThe least obvious target is the Generalkommission der Gewerkschaften Deutschlands, the union most loyal to the SPD, which has generally supported the party’s line in maintaining social peace and rallying behind the government during the Weltkrieg instead of using it to stir up trouble. While most officers of the police and intelligence forces are unconvinced that the GGD has been compromised, some SPD politicians still fear that the large size and variety of the union have given the Communard infiltrators ample space to operate and rot the workers’ movement from the inside through incremental changes. The more obvious target for investigations in the eyes of the government is the Freie Arbeiter Union Deutschlands, the source of many grey hairs to governments of Germany since the Weltkrieg. FAUD is an anarcho-syndicalist union with a highly federalist structure, present primarily in the industry-heavy Ruhr region and led primarily by the intellectual Rudolf Rocker.\n\nMost investigators agree that if there are agents of the Internationale to be found, they would be within the ranks of FAUD, even though it doesn’t particularly like working with the SPD, as the union was heavily involved in the November Uprisings after Weltkrieg. Some politicians of the SPD involved with the case have noted that FAUD has been rather quiet lately and attribute this lack of activity to fears of further repressions as well as the general disunity of the movement due to issues between leadership and grassroots working-class members, but it could just as easily be preparations for a strike against the Reich. Finally, the Revolutionäre Obleute, or \"Revolutionary Stewards\" union, composed of union representatives and shop stewards, is generally affiliated with the SPD to this day despite many of its members being somewhat connected with various anti-monarchist and revolutionary activities. Led by Richard Müller, who is generally far less aggressively revolutionary than many of his peers, the organization was heavily involved in anti-war protests during the Weltkrieg and led to the empowerment of figures such as Karl Liebknecht during and after the war. However, its relative overshadowing by larger unions has led to a degree of irrelevancy for the association over the recent decades."
gerdom.3592.a:0 "Unfortunately, the GGD could have snakes within its roster."
gerdom.3592.b:0 "The FAUD has always been problematic, give them a look."
gerdom.3592.c:0 "The Stewards' anti-war disruptions are too suspect."

gerdom.3593.t:0 "The General Commission"
gerdom.3593.d:0 "Whatever seeds of doubt may have emerged in the minds of investigators and Sozialdemokratische Partei Deutschlands politicians during the choice to look into their most loyal union supporters in the Generalkommission der Gewerkschaften Deutschlands have been proven thoroughly false. After a series of inspections, union leader meetings, and even the odd interrogation in cases where specific individuals were doubted, the fears were proven truly fruitless. The nationalist rhetoric and realignment of the SPD after the Weltkrieg have seeped deep into the ranks of the Generalkommision, and it now works to keep the peace in the Kaiserreich through a rather reformist policy program and approach to workers.\n\nFor a union that chose allying with employers over the revolutionary ambitions of their comrades during the Weltkrieg, doing a pivot into supporting the Internationale’s cause would have likely required such monumental shifts in German society that the Black Monday crisis pales in comparison. It is clear that the Internationale’s agents, whoever and wherever in Germany they continue to lurk, are also aware of this fact, but as a precaution, the leadership of the various constituent parts of the GGD has been quick to remove any suspicious individuals, firebrand agitators, and anti-nationalist actors from the ranks of their respective organizations. While this investigation has caused the mother party of the union to respect its syndicates even more than before, it has led to terrible results in the larger situation of the hunt, as no real perpetrators and enemies of the Kaiserreich were caught and no new leads were opened."
gerdom.3593.a:0 "We shouldn't have suspected our strongest supporters."

gerdom.3594.t:0 "The FAUD"
gerdom.3594.d:0 "The anarcho-syndicalist union Freie Arbeiter Union Deutschlands seems to be, at least on the very face value, the perfect target for investigations and hunts for Communard infiltrators, but as officers of the Abwehr and Geheimpolitzei pile up their reports on raids, interrogations, and office searches, the results seem bleaker and bleaker.\n\nDespite extensive reports of radical rhetoric and clear syndicalist activity among the union, the officers were unable to find anything that would, without a shadow of a doubt, point at more malignant forces being at play in the background of the union. Paul Levi, the leader of the FAUD alongside Rudolf Rocker, has been a strong force for legal measures and detachment from the Internationale, even at Germany’s darkest hours during the Black Monday crisis, and while syndicalist activity aimed at curtailing employer power and empowerment of the workers has been at an all-time high, these activities have largely stayed within the boundaries of the law, and even in cases of illegal actions, they have been the work of overenthusiastic or naive youngsters more than the FAUD as a whole.\n\nLevi’s activities must continue to be monitored, but right now it seems that the union leader has kept the movement as quiet as possible to prevent the Kaiserreich’s loyal servants from squashing it out of existence. In addition to Levi’s doctrine, the syndicalists are in a difficult position due to the lack of support from their more radical base towards the intellectuals and theorists occupying the highest positions of the FAUD, and even if the movement were in a position to gather aid from the Internationale, it would find itself stricken with infighting and unreliability. As of now, it seems that the FAUD is not the union the government is looking for, as satisfying as it would have been to tear the syndicalists down."
gerdom.3594.a:0 "This corpse will keep shambling on, then."

gerdom.3595.t:0 "The Stewards"
gerdom.3595.d:0 "With the red herring of Freie Arbeiter Union Deutschlands avoided, the government of Sozialdemokratische Partei Deutschlands turned its eye on the Revolutionäre Obleute organization, long associated with the SPD but increasingly hidden from the public eye. It seems that this retreat into obscurity was not a matter of increasing irrelevancy but instead a conscious choice from the union’s leadership, as many of its former critics of the November uprisings have seemingly turned on their previous ideals. Richard Müller, the union’s leader, was interrogated among a whole host of union leaders by officers of the Abwehr, and the results were a success of unprecedented size. After the crackdowns, enough information was discovered to implicate much of the union’s leadership as pawns of the Internationale.\n\nAgents of Paris and London had managed to sway the Stewards to their cause through their pacifist and anti-imperialist rhetoric, and after a long period of collaboration, intelligence gathering, and other acts of sabotage, the Stewards had become a prime breeding ground for dissent within the Kaiserreich. The worst offenders within the union went as far as to compile weapons, ammunition, and supplies for the inevitable showdown between the forces of the Reichspakt and the Internationale, hoping to resist their fatherland with arms despite their pacifist claims.\n\nNeedless to say, these traitors have been sent to the depths of the Kaiserreich’s prison system to plot against their fellow countrymen no longer, and even in milder cases, an expulsion from the SPD has been the Stewards’ fate. The union will be disbanded, with the remaining members having no clear connection to the insidious plans monitored by the Geheimpolitzei until all suspicions can be lifted. For now, the SPD can celebrate, for a grave blow has been struck to the efforts of the Internationale."
gerdom.3595.a:0 "We were too complacent in November."

gerdom.3596.t:0 "Who is Behind it All?"
gerdom.3596.d:0 "As the investigations have progressed further and further, most of the leads the Kaiserreich’s government and the upper echelons of the Sozialdemokratische Partei Deutschlands had to pursue have been exhausted. Based on information gathered in previous missions to discover the rotten heart of the Communard infiltration, the officers running the entire espionage operation have managed to narrow down the options of the possible leader of the entire clandestine organization. The first option noted by the Abwehr is Pierre Nord, a familiar face of the German intelligence apparatus, as he was a resistance fighter already back during the Weltkrieg and was caught, condemned to death, and later released after the war due to the relatively insignificant nature of his activities. However, the insolent Frenchman seems to be up to his old tricks, given repeated reports of his activity in the regions of Germany with the strongest west-facing fortifications.\n\nAccording to eyewitnesses, Nord claimed to have been in the region writing a spy thriller novel, but given his history, the situation could be far more threatening to the stability of the Kaiserreich. Another possible mole is Joseph Breitbach, a writer and journalist who is not particularly politically active beyond some theorized ties to the German communist underground. What makes him suspicious in the grand scheme of things is his extreme commitment to finding ways for Franco-German rapprochement and an end to the tense standoff between the two worlds of Prussian imperialism and French revolutionary syndicalism. He is not a massive figure in the grand scheme of things, but his numerous contacts with young artists and intelligentsia might have led him to create an intelligence-gathering network far greater than Breitbach alone could muster.\n\n The final lead to pursue is with Georges Blun, another intelligence figure from Weltkrieg times, where he worked with French, British, and Italian espionage efforts. However, it seems that he relinquished any ties he had to the regimes of the Weltkrieg states and committed himself to communist activity, leading to being expelled from Switzerland due to his agitation there a decade ago. Blun’s name has been popping up in police reports around the Kaiserreich in recent months, with officers finding more and more links between this dangerous Frenchman and the various small far-left organizations of Germany. While the veracity of these reports is still an open question given the elusive nature of Blun, he could be a worthwhile target for the men of Abwehr to hunt down, part of the conspiracy or not."
gerdom.3596.a:0 "We'll have to catch Nord once again."
gerdom.3596.b:0 "Breitbach can hide behind words, but he's surely our man."
gerdom.3596.c:0 "Blun has already made contact with extremists, we have to take him in."

gerdom.3597.t:0 "Infiltration Crippled"
gerdom.3597.d:0 "When the Sozialdemokratische Partei Deutschlands government and party elite embarked on its witch hunt to destroy the dissident and treacherous elements within its ranks working for the Communard scum, expectations were high and enthusiasm to finally purge the party of enemies of the Kaiserreich was overflowing. However, as the government and its allies in Abwehr and Geheimpolitzei have tirelessly examined every lead and hunted down every supposed enemy of the state in the time frame it has been able to, it seems that some mysteries will remain unsolved.\n\nWhile many an infiltrator of the Internationale has been caught in the net of the SPD’s efforts, some seem to have slipped by unnoticed, continuing to gather intelligence and support for the Communard cause on German soil. Some have undoubtedly been scared into exile by the arrests and pursuits of known enemy agents, but it would be foolish to assume that every fanatical agent of the syndicalists can be as easily frightened. Nevertheless, while not a complete victory, at the end of the day the Kaiserreich is a little cleaner from the syndicalist filth infesting its very heart, and while much work remains ahead until the nation can be truly free of the terrors unleashed upon it by the French and British, it is a little less threatened than before thanks to the efforts of the Social Democrats."
gerdom.3597.a:0 "Small victory, but a victory nonetheless."

gerdom.3598.t:0 "Infiltration Untouched"
gerdom.3598.d:0 "When the Sozialdemokratische Partei Deutschlands government and party elite embarked on its witch hunt to destroy the dissident and treacherous elements within its ranks working for the Communard scum, expectations were high and enthusiasm to finally purge the party of enemies of the Kaiserreich was overflowing. However, as the government and its allies in Abwehr and Geheimpolitzei have tirelessly examined every lead and hunted down every supposed enemy of the state in the time frame it has been able to, it seems that the worst has come to pass. It seems that every pursuit has led the brave officers of the Kaiserreich into a true ghost hunt, the enemy seemingly always eluding their grasp or leading them into directions filled only with patriots or apolitical bystanders.\n\nWhatever threats lurk under the surface of the left-wing circles of Germany, their true nature and the men guiding them towards insidious purposes shall remain unnamed for the time being. Some have even begun to doubt whether the conspiracy ever existed in the first place or if this was all the paranoid scheme conjured up by the SPD government and Reichskanzler to purge undesirable elements and political opponents from the party ranks. Given the highly clandestine nature of the operations performed by agents of the government, it is rather unlikely that this thorough failure will leak to the public and cause issues with the popularity of the current highest governing body of the nation.\n\nNonetheless, the inability to untangle the conspiracy will no doubt lead to issues during the Weltkrieg, for French agents running rampant in the nation’s home front and saboteurs wreaking havoc in the factories and infrastructure of the Kaiserreich are a sure-fire way to lower the German people’s morale in the struggle to come. For all the efforts poured into the project, the twist of fate has seemingly chosen to deliver the most terrible hand possible for the loyal elements in Germany, and it is now the duty of the government to prepare for the worst with the cards it has been granted."
gerdom.3598.a:0 "This is a disaster!"

gerdom.3599.t:0 "Pierre Nord"
gerdom.3599.d:0 "When agents of the Abwehr first set out to capture the French writer and suspected spy Pierre Nord, the grizzled veterans of the counter-intelligence department had expected an easy pursuit, given the relative openness with which Nord had operated beforehand. Nonetheless, after a botched raid on a tavern the Frenchman had apparently been staying in, the man became a true phantom, evading his hunters by hiding in the trunks of sympathetic locals’ cars or hiding in excruciatingly tight spaces within buildings examined by his enemies. In one case, Nord evaded the Abwehr while dressed as an elderly man, with a fake beard and a cane as his cloak as he passed by a patrol of bloodhounds on his trail. However, all it took was one moment of vulnerability, and Nord was caught. While driving to another fortified site near the city of Nanzig, Nord had to pull over to relieve himself during the night.\n\nUnknown to the agent, the policemen following his trail had happened upon the very same road, and as they passed Nord’s vehicle, the panicked look of Nord’s driver caught the eye of one of the Abwehr officers, causing Nord to be manhandled into the back of their car in a matter of minutes. After a brief, and for Nord, rather painful, interrogation, he admitted to being a French spy but not in the way the current Kaiserreich government had hoped. Nord was in Germany primarily to examine the defenses on the Franco-German border, crafting detailed maps and locations of the strongholds and possible gaps in the line intended to stop the French menace in their tracks once the second Weltkrieg inevitably begins. His capture has been a victory for the counter-intelligence branches of the Kaiserreich’s state and military institutions, but it has gotten the nation’s vigilant sentinels no closer to uncovering the plot at the heart of the Sozialdemokratische Partei Deutschlands."
gerdom.3599.a:0 "Drat, now the real threat is ready for his hunters."

gerdom.3600.t:0 "Joseph Breitbach"
gerdom.3600.d:0 "As Abwehr agents began the hunt for the journalist known as Joseph Breitbach, the more skeptical ones in their ranks were absolutely certain that the manhunt was a mistake. After all, both Georges Blun and Pierre Nord had confirmed ties to intelligence services, while Breitbach was a simple writer with big ideas. However, it seems that the intuition of the Sozialdemokratische Partei Deutschlands elite was correct, for as the men of the intelligence services managed to detain Breitbach after he was heading home from a cultural event, the writer was quick to give in and reveal the extent of his treachery.\n\nIt turned out that Breitbach had orchestrated the various traitorous actions within the ranks of the SPD, from infiltrating unions to gathering intel within party ranks and even encouraging politicians and intellectuals of the social democratic movement to dissent and betray their fatherland. Funded by the Communards and directed by elements of French intelligence services that have now been discovered and mercilessly hunted down within the borders of the Kaiserreich, Breitbach was the unassuming kingpin behind the entire conspiracy. He remained steadfast in his belief that the course of the Kaiserreich in maintaining its hostility towards the Internationale would only lead to further bloodshed and continent-spanning brutality, barbarity, and needless misery if the seemingly inevitable clash between the Communards and Reichspakt came to pass.\n\nIt was this sincerity and fanatical pacifism of Breitbach that allowed him to so seamlessly convert previously loyal members of the SPD to his cause, especially those with far more pacifist intentions than the rest of the party, with their nationalist commitments. With the head of the snake cut off, the Communard infiltration into the SPD has been crippled nearly to a point of no return, especially once Abwehr officers manage to get all the names and details on Breitbach’s dossiers hunted down, captured, and imprisoned. The leadership of the party and government can now breathe a little easier, knowing that whatever spectres of syndicalism lurked in the shadows once have now been thoroughly exorcised."
gerdom.3600.a:0 "Finally, it is over."

gerdom.3601.t:0 "Georges Blun"
gerdom.3601.d:0 "After days on the trail for the French infiltrator Georges Blun, the Abwehr agents and their police entourage were finally able to track him down to the St. Pauli suburb of Hamburg, where a clandestine meeting was taking place between the Communard spy and members of the Spartakist movement. The left-wing radicals reacted to the encirclement of their building with expected defiance, and in the first moments of the confrontation, weapons were drawn by both sides, but it did not take long for the Spartakists to realize that they were simply outnumbered and outgunned. Reluctantly, the revolutionaries lowered their weapons, and the building was emptied, with Blun found trying to escape through the backyard before being cornered and stopped at gunpoint by the lookout.\n\nThe rabble-rousers Blun was meeting were of little importance in the greater counter-intelligence picture of the Kaiserreich, but after interrogations of the Frenchman finished, he was found to be little more than a similar small cog in a far greater machine. Blun was indeed employed by the Communard espionage departments, but his mission had nothing to do with Sozialdemokratische Partei Deutschlands or its affiliated unions and organizations. Instead, he had been sent to tour the various cells of communists, syndicalists, and other revolutionary actors within the borders of the Kaiserreich in hopes of gaining more allies for the Internationale in the upcoming war as well as estimating the total strength of the anti-establishment resistance.\n\nHis particular interest lay with the Bund der Frontkämpfer, a minor communist movement led by Heinrich Laufenberg that has been a thorn in the side of the Abwehr and Geheimpolizei for quite some time. His detainment and imprisonment will be a boon for the counterintelligence forces within the Kaiserreich, but for the ongoing investigation, the capture of Blun has done very little to dispel the darkness within the very core of the SPD, resulting in another disappointing dud for the investigators and government officials alike."
gerdom.3601.a:0 "Another wrong turn, another missed opportunity."

gerdom.3611.t:0 "Stampfer's Counter to Hugenberg"
gerdom.3611.d:0 "In a nation where the presses of reaction thunder ceaselessly under the vast shadow of the Hugenberg-Konzern, Friedrich Stampfer is the greatest protector of truth in Germany. He began his venerable struggle in high school, contributing to the Volksfreund newspaper in Brno, then, after studying economics in Vienna, wrote for the Leipziger Volkszeitung, and has ultimately embedded himself within the beating heart of Berlin’s left wing press with his work on Vorwärts. Stampfer provided editorials and news to all party organs from this central position and soon his work appeared in almost four-fifths of the party’s papers across Germany from his modest Lichterfelde apartment before the Weltkrieg’s start. After returning from service in the Austrian army during that conflict on the Isonzo, he returned to Vorwärts after being dismissed from (by?) the previous hard-left editorial staff, becoming editor-in-chief.\n\nAfter wrestling the paper from its compromised leadership he has been tasked by his SPD allies with establishing a disciplined media apparatus able to deliver a clear voice for the working people of Germany. The various media organs of newspapers, journals, illustrated magazines, and even the crackling new frontier of radio shall be brought into alignment, with editors and producers appointed to enforce the party’s line and reward the correct staff. Furthermore, while Stampfer personally identifies as a Marxist, varied SPD groups are allowed space to advocate their points to appease factionalism, albeit with the most space favored to the Reichskanzler’s position. Against the cacophony of nationalist sensationalism and bourgeois complacency, the worker, the clerk, and the intellectual finally has a disciplined chorus with a single ideological message."
gerdom.3611.a:0 "Finally, class conscious media!"

gerdom.3612.t:0 "The Direction of Marx's Heirs"
gerdom.3612.d:0 "The Erfurt Congress of 1891 enshrined Marxism and the overthrow of capitalism as the "official" thinking of the SPD, but the demands of the time forced revolution out of the immediate agenda. Now that power has been achieved through electoralism, however, the matters of the SPD’s direction in accomplishing its goals demand immediate attention.\n\nThe reformist establishment, heirs to Eduard Bernstein, Ferdinand Lassalle and Friedrich Ebert have since moved from the Erfurt congress to the embracing of the wholly reformist Gorlitz programme and the revisionist Marxist Heidelberg program. Arguing that capitalism has reached a stage in which it is no longer necessary to call for revolution, the programs claim that enough reforms could be put into place, such as more democratic rights and more social welfare programs, which would transform capitalism into socialism.\n\nHowever, the revolutionary current, who remain after the USPD and the Spartacists split, insist that capitalism by its very nature cannot be amended but only overthrown as the French tore down feudalism. Through struggles for reforms, the worker realizes their class power in a "labor of Sisyphus" as the forces of capital are unassailable in its own system. They argue that socialism can only be achieved through the self-emancipation of the working class and that our current hold of democracy is indispensable to snuff out resistance against our transformation of society. \n\nAmong this position, the Lenschian faction interpret revolution through their conceptualisation of War Socialism where the revolution is achieved through the people's seizure of state power and the overthrow of the world monopoly through conflict creating a global socialist people’s community.\n\nThese debates have forced the SPD to turn inward, convening a conference to determine whether social reform or revolution is the party’s course. Pre-sworn to not split the party if the opposing side is victorious; delegates gather, speeches are sharpened, and alliances shift as the question is finally laid bare before the movement. Shall the SPD cement its place within the Empire as a force of reform, legitimized and constrained, or will it utilise its electoral victory to legitimize class consciousness so it could one day flow over the forces of reaction and end the wage-labor system?"
gerdom.3612.a:0 "We need to reform German society, in line with Marx's true vision."
gerdom.3612.b:0 "What the Empire needs is a revolution."

gerdom.3614.t:0 "Eternally Perfidious Albion"
gerdom.3614.d:0 "Lensch spurns a huge media and speech spree against the 'aristocracy' inherent to the Third Internationale through the Union of Britain, especially going on a tirade against Oswald Moseley. Whenever the next confrontation comes, London will burn."
gerdom.3614.a:0 "Next time, there will be no mercy for London's Lords."

gerdom.3615.t:0 "The People's Voice in the Union's Confines"
gerdom.3615.d:0 "How centralized should this democratization be? Lensch could afford himself a lot of control over the unions and try to put loyalists into the charge of them by applying political pressure, or he can let them be a little free to run themselves."
gerdom.3615.a:0 "The Unions can be trusted to uphold democratic values."
gerdom.3615.b:0 "Ensure everything goes with the Reichskanzler's wishes."

gerdom.3616.t:0 "A Mystifying Alliance"
gerdom.3616.d:0 "The "on the ground" event in Lensch's route. This one would detail a worker who had been in some of the SPD paramilitaries recognizing a far-right barfighter joining one of the new Lenschite groups. Insert Always Sunny meme thing here"
gerdom.3616.a:0 ""

gerdom.3618.t:0 "The SPD's Global Presence"
gerdom.3618.d:0 "Vogel's choice of where he will do a tour of goodwill making and all that sort of stuff."
gerdom.3618.a:0 "SDAP"
gerdom.3618.b:0 "Partito Democratico del Lavoro"
gerdom.3618.c:0 "Sinn Féin"

gerdom.3619.t:0 "Representing the City and the Country"
gerdom.3619.d:0 "Read the related focus desc to understand more of this event's context. Here the player can make a decision between working mostly within urban centers and larger towns, trying to have politicians become more aware of the problems therein via personal visits and outreach, or if this push should also include rural villages and communities which have traditionally been hostile to the SPD."
gerdom.3619.a:0 "Focus our efforts on just galvanizing our base."
gerdom.3619.b:0 "We should do outreach to rural communities!"

gerdom.3623.t:0 "A Close to the Violence of November"
gerdom.3623.d:0 "Noske has a long legacy, though a profoundly controversial one. As he tries to steer Germany into a democratic and reformed future in the spirit of Lassalle and Friedrich Ebert, hispast might prove to be his undoing unless he is able to deal with the demons of a different age efficiently. \n\nWaldemar Pabst in Austria thinks it is fun to implicate Noske in the disappearance of Liebknecht and Luxembourg, which means the wounds of the Spartakist uprising can never truly heal unless he quits his ceaseless yammering. Additionally, the Freikorps Noske used against the insurrectionists must also be dealt with, pacified at the very least, so that Germany does not have reactionary thugs lurking in the shadows waiting to strike. The Schutzkorps that Noske has set up will become a counter to these far right elements, providing a paramilitary force to defend democracy and the nation as a whole, rather than following in the legacy of the old Freikorps, formations of which seemed more intent on killing than protection. By coming into contact with Bernhard von Hülsen and creating a new force for a new age, the support in sympathy and manpower that the Freikorps depend on can be hijacked and directed to a better cause, ending the reactionary threat once and for all.\n\nFinally, the lying red press still will not let Noske or the proletariat forget his role in 1918-19, when he bathed in the Baltic with his friend Friedrich Ebert, all while the German worker was put to the sword. This infamous ‘Ebert und Noske in der Sommerfrische’ photograph has been printed continuously alongside any statement or act by Noske, as to remind the reader of the Reichskanzler’s past.\n\nThe problem is just what should be focused on, sorting out Pabst, working with von Hülsen, or dealing with the red press and silencing them for good?"
gerdom.3623.a:0 "Pabst talks far too much for his own good, send him a message."
gerdom.3623.b:0 "Hülsen can be trusted to build a trustworthy base of support."
gerdom.3623.c:0 "It's about time these Syndicalist journalists join their friends in silence."

gerdom.3624.t:0 "The Colonial Austerity Question"
gerdom.3624.d:0 "Gustav Noske might not have always agreed with the SPD’s main position over all these years, but one thing he’s always been clear on is his disdain for Imperialism. The gains of the Weltkrieg for the proletariat were few and far between, and while small progress has been made since the guns fell silent, the subsequent acquisition of foreign colonies has hampered social progress and bloated the budget deficit. Noske, however, has a simple plan. While abandoning the colonies is politically impossible, and something he himself is not entirely onboard with, the idea of turning these beacons of capitalist exploitation into functional profitable ventures is an appealing one.\n\nThe key to ensuring a steady revenue is to cease in various pipedreams that had been laid down by previous administrations, namely several efforts of evangelizing the German culture or constructing opulent landmarks far away, and to be more economical in the budget assigned to colonial projects. Tested resource acquisitions will be the letter of the day, alongside a stoppage on further expansion of colonial land against the locals.\n\nNaturally this whole plan is controversial, as the conservatives in the halls of the Reichstag call the whole scheme unpatriotic. Never one to hide away from attack and slander, however, Noske intends to solve the problem of the colonies, knowing that the critics will grow silent once the coffers of Germany get a well needed influx of gold. The rest of the SPD, though, may somehow manage to still get the program lessened from the Kanzler’s initially ambitious position."
gerdom.3624.a:0 "It's about time we chew the fat away."
gerdom.3624.b:0 "Let's just ween them off of the fatherland's support."

gerdom.3625.t:0 "The Vigor of the German Worker"
gerdom.3625.d:0 "The worker, the engineer, and the business owners all agree: Germany is becoming whole again. With reforms and legislation improving the quality of life for everyone, not just the urban proletariat, Germany is beginning to achieve that class unity so desired by so many. However, storm clouds have begun to brew not only West, beyond the Hindenburg Line, but also East, across the Ostwall. With Gustav Noske at the helm, it is up to him to steer the ship of the Kaiserreich, lest it crash into the rocks of reaction. Thankfully, momentum is on his side. After successes in expanding the welfare state, the SPD and its leadership find themselves with a momentum so powerful that it can shatter mountains, but questions remain on where this momentum must be directed.\n\nOne option is to focus on the worker and his immediate surroundings, to finally liberate the urban proletariat from division and decay, by saving the rural farmer from a life of squalor and poverty via continuing reforms and bringing this spirit out to even the most remote village.\n\nThe second option is to heed the worries of the army, and finally implement the ideas proposed by Noske all the way back in the first years of the century, that of establishing a modern militia, based on those of Switzerland and Sweden. This force would form an iron wall against French depravity and Russian barbarism, all while ensuring hostile forces in the rear remain pacified. \n\nWhatever the choice made, Germany is back, the SPD is in control, and the worker can finally feel that the nation of Arminius, Moltke and Goethe is his as well."
gerdom.3625.a:0 "One must improve their community first and foremost."
gerdom.3625.b:0 "A strong worker cannot be made into a victim."

gerdom.3701.t:0 "The Scion's Demands"
gerdom.3701.d:0 "Oskar von Hindenburg sees the rapidly expanding military apparatus and wants in. He represents his father, in a way, and thus has lots of sway over the old guard of the dictator's regime, and he promises being able to get them in line should he be permitted to have lots of sway over officer selection and coaching new generals. Of course, he is notedly incompetent, and Schleicher might rather have an actually strong army rather than one filled with nepotistic appointments."
gerdom.3701.a:0 "He could make a useful ally, work with him."
gerdom.3701.b:0 "He is as blind as his father, snub him."

gerdom.3702.t:0 "Multipolar Chancellorship"
gerdom.3702.d:0 "Working with the L-C-H-Gruppe and how extensive this cooperation should actually be. Obviously there is much to gain in swaying these men of the SPD, but maybe Schleicher would rather control lots of economic reform himself."
gerdom.3702.a:0 "They had Schleicher's back in 1916, it's time to repay the favor."
gerdom.3702.b:0 "Keeping them at arm's reach would be preferable."

gerdom.3703.t:0 "Who Stands Against Greed?"
gerdom.3703.d:0 "Determining who Schleicher will continue his long-term economic cooperation with, choosing between corporatists that were swell in the DVLP, to the possessedists, to continuing his work with the L-C-H-Gruppe."
gerdom.3703.a:0 "Adopt a corporatist model."
gerdom.3703.b:0 "Cooperate with the Wehrwolf."
gerdom.3703.c:0 "Deepen the alliance with the L-C-H-Gruppe."

gerdom.3704.t:0 "Accidents and Assassinations"
gerdom.3704.d:0 "As (kind of) vehmic courts are set up across Germany, the question comes about what sort of sentences these courts should lean towards. "Low profile" infers accidents and even just banishment. "High profile" regards focusing the courts towards the removal of enemies of the state and perceived traitors, with the "showing off" of the sentencing in the form of more public assassinations and murders. Schleicher is definitely far more preferential to low-profile, but others prefer high-profile."
gerdom.3704.a:0 "Focus on only low-profile operations, we are a beacon of order!"
gerdom.3704.b:0 "Perhaps a few high-profile events are what the people need to see..."

gerdom.370401.t:0 "Swept Into Shadows"
gerdom.370401.d:0 "Related to low-profile operations, this is an "on the ground" event. An underground syndicalist cell member is the victim of a deeply unfortunate accident, writer's choice, but the coincidence of the death ends up crippling the rest of the cell."
gerdom.370401.a:0 "The fear of the unknown creeps in, snuffing out resistance. Emphasis on accident here, of course."

gerdom.370402.t:0 "The Cost of Security"
gerdom.370402.d:0 "Underground operations amongst far-left groups were going well lately, especially as the government continued to confront even the most peaceful of labor organizers across the Empire. Threatening letters, sudden arrests, even the beating of a striker or two in Silesian coal mines. For a syndicalist gun-runner and spy, it really seemed as though November '18 would be rolling around once more due to the simmering dissent. He only had to get a few more cells established, perhaps speak more openly with those union leaders who chafed beneath Schleicher's economic "reforms". Just thinking of the Red General provoked bile in the man's throat, and convinced him further of the necessity of what he was doing.\n\nThe smuggler, tipping his hat to those he passed yet clutching his long coat close to his body, was right on his way back home to receive some letters from his contacts elsewhere. It had been some time since he heard from his underworld friends in Prussia, but he was still maintaining a correspondence with some compatriots in Hanover. They were worried sorts, of course, but he maintained that this wasn't the first time the East had gone silent. The initial years of Westarp were quite the same, albeit with a more bumbling police force, and so the spy assured himself that Schleicher's ascension was just making his more cautious comrades simply go to ground for a bit.\n\nHe went up the steps from the sidewalk to his apartment, relieved to get out of the biting wind that kept blowing against him. He rummaged in a pocket for his key before the noise of an engine caught his attention, the source being an all-black automobile that rolled across the street and abruptly parked. He turned, his hand just at the knob of the complex's entrance, just in time to see three men step out of it. Their faces were stony, their hands gloved in the same black leather that wrapped across their torsos, and two kept a palm in their coat pockets. One, flanked by two of his compatriots, had asked the smuggler his name.\n\nThe spy barely had time to say "Yes?" before a glimmer of metal, gripped in shadowed fingers, showed beneath one of the men's coats. His fingers tensed at the door knob, but he was halted by a piercing pain that shot through his gut, and then his arm and neck, before collapsing. He heard someone, likely the figure that gave him his last query, ascend the steps. Then, there was nothing at all. Not the hasty speeding away of the killers' car, nor even the mixture of pity, horror, and revulsion of the bystanders who later looked upon him.\n\nBy next week, all signs of subversive activity in the Ruhr had ceased, the papers reporting on a string of violence caused by Communard intelligence agencies "closing down cells" to prevent their capture."
gerdom.370402.a:0 "A day of brutality for a decade of peace."

gerdom.3705.t:0 "Prostrated Before the Dawn's Throne"
gerdom.3705.d:0 "Schleicher and Moeller van den Bruck both align in many ways, yet they also differ. Schleicher is more focused on the military and isn't receptive to Moeller's philosophical waxing, and Moeller thinks that Schleicher lacks vision for truly bringing a revolution to Germany. Regardless, both of them view the other as someone to cooperate with, and both admit the other fights for Germany. The question is, however, how deep their cooperation should run. Moeller here is generally shown to have lots of hidden influence and sway, matching Schleicher in intrigues."
gerdom.3705.a:0 "The General and the King shall work together closely, for stability."
gerdom.3705.b:0 "Setting some clear areas of influence should help."

gerdom.3706.t:0 "Drinks with the Prince of Hohenzollern"
gerdom.3706.d:0 "Schleicher has an amicable outing with Kronprinz Wilhelm, letting him talk at length about varied ambitions and how he'd like the world to look, and tends to give him affirmation that the army can assure these visions so long as Schleicher remains unimpeded in his efforts. It should be a bit obvious that Kronprinz Wilhelm is being played here, but that Schleicher still respects the system of the monarchy."
gerdom.3706.a:0 ""

gerdom.3707.t:0 "Pacts Above and Below"
gerdom.3707.d:0 "Moeller has to pick between allegiances to the aristocrats, who he is personally preferential to but might not have the most agreements with, or allegiances with the likes of the Verband, who are more proletarian and brutish but might have a bit more common ground with his platform, even if he dislikes their Volkist elements."
gerdom.3707.a:0 "The King will attend a few more upper society meetings, and make some allies along the way."
gerdom.3707.b:0 "Moeller cannot build a throne without the support of the lower classes, and the Verband mobilizes them."

gerdom.3708.t:0 "The King and His Court"
gerdom.3708.d:0 "An event mostly for Schleicher, where he can decide how he might interfere with Moeller's attempts to build a unified Conservative Revolutionary movement. He will do his utmost to ensure that this bloc is mostly manned by the Young Conservatives, but Schleicher has a chance to sabotage his aims by placing more state support on National Revolutionaries and Volkischen."
gerdom.3708.a:0 "It is in the interests of the state that Moeller coordinates with other theorists as well."
gerdom.3708.b:0 "Moeller can run his court how he likes, it is not the domain of the state."

gerdom.3709.t:0 "Of Laborers and Apprentices"
gerdom.3709.d:0 "It's time to corporatize the economy but Moeller enjoys a relatively decentralized system where cities and rural regions sort out their own guilds similar to the systems of the Holy Roman Empire, and he will be assisted by Kloppe in this matter. However, Schleicher and Co. are more preferential to Lothar Erdmann's concept of turning trade unions away from the SPD and towards the Schleicherist state as it is seen as more stable and reliable."
gerdom.3709.a:0 "Civilian organizations, through the Wehrwolf, can manage the creation of guilds."
gerdom.3709.b:0 "Lothar Erdmann's arguments hold ground, let him lead the way."

gerdom.3710.t:0 "A Toccata into Malevolent Darkness"
gerdom.3710.d:0 "It has been an almost cruel irony that the most venomous of Reichskanzler Schleicher's enemies have not come from rabble-rousing syndicalists, Communard infiltrators, or even spineless politicians of the Reichstag. Instead, it is the aging aristocrats of the Reich's high society that most stalwartly refuse to march to the new tune of the reborn Germany. A few have been paid off or coerced thus far, but Elard von Oldenburg-Januschau, a friend of the former dictator Hindenburg, has become a shield for masses of dissident Junkers. Elard himself has made it clear that he will not align with the Reichskanzler due to what he sees as a flagrant betrayal of German tradition, and has burned every offering sent his way.\n\nThe government must, using all means at its disposal, target every asset he uses to resist. This baron's wealth from his endless farms, coveted military connections, and even the prestige and influence of the Ostelbian estates must be targeted. As this old, embittered man loses everything he has, then the countless barons who find safety in his shadow will realize that nothing in the Reich can escape the encroaching spectral state.\n\nOnly then will the orchestra of the "Red General" be able to play without the sniveling jeers of lesser creatures interrupting its melody. With the aid of the "Hidden King" Moeller van den Bruck, Ferdinand von Bredow's extralegal agents, and the numerous favors that Schleicher has gained throughout his tenure, it is only a matter of time before Oldenburg-Januschau's throne crumbles beneath him."
gerdom.3710.a:0 "Germany has no need for these rotting reactionaries."

gerdom.3711.t:0 "Manufactured Pestilence"
gerdom.3711.d:0 "Many of Elard von Oldenburg-Januschau's profits, like the rest of the baronial ilk, come from his agrarian holdings. Protectionist policies, widely popular before the Weltkrieg and remaining in effect as recently as the Tirpitizian era, have allowed Elard to both line his pockets and use the amassed wealth to resist Schleicher's economic reforms. The Junker's innumerable fiefdoms and his pervasive hold over the Bund der Landwirte have thus far remained difficult to bypass or neuter, but an opportunity has finally presented itself.\n\nThe ceaseless conflict between the aristocrats and the Reichskanzler has resulted in Oldenburg-Januschau tightening his grip over his assets, leading to the workers in his employ becoming notably displeased due to their dwindling wages and benefits, especially as the sting of Black Monday remains fresh in their minds. Bredow's agents are convinced that a powder keg has been set in East Prussia, and a single spark could provoke a strike or worse. Elard, not immune to Black Monday himself, would likely not survive a mass disruption of profits, and his cronies have even less hopeful prospects.\n\nFerdinand von Bredow has suggested that an "incident" between a foreman and a worker could be manufactured to quickly turn the simmering dissent into overt violence, but while such a move would certainly succeed it could have after effects that do more damage than we'd appreciate. Moeller, meanwhile, has suggested instead that Fritz Kloppe, one of his close allies, could be relied on to goad the restless farmers into action. While a promise of a non-violent resolution may seem enticing, trusting the Wehrwolf to organize the masses with their anti-bourgeois tint might only cause the gospel of Possedism to spread beyond our control. Lastly, Schleicher still remains in the good graces of the L-C-H Gruppe, who are more than willing to assist the government in crippling the Ostelbian aristocrats that plague the "People's Community".\n\nAny operation against Oldenburg-Januschau and his allies carries with it risks of ruining East Prussia's productivity for the forseeable future, but the government will surely weather such a storm with less issues than the petty barons can. The choice of how to proceed remains with Schleicher."
gerdom.3711.a:0 "For now, these fiefdoms will have to be untouched."
gerdom.3711.b:0 "Bredow can be trusted to incite a revolt."
gerdom.3711.c:0 "Moeller and his ally, Fritz Kloppe, can rouse some peasant action."
gerdom.3711.e:0 "The L-C-H Gruppe is more than able to organize dissent against these feudal lords."

gerdom.3712.t:0 "A Fallen Eagle"
gerdom.3712.d:0 "Elard's military connections offer him power. Schleicher can either use his own connections to hurt this old man, get the DF to help, or enlist the support of Oskar von Hindenburg. Split off the third of these options into its own paragraph, for easy removal as it will not always be relevant."
gerdom.3712.a:0 "We can't hurt him here."
gerdom.3712.b:0 "Use Schleicher"
gerdom.3712.c:0 "Use DF"
gerdom.3712.e:0 "Use Hindenburg"

gerdom.3713.t:0 "Emptying the Ballroom"
gerdom.3713.d:0 "Elard's nobility connections offer him power. Schleicher can either cripple his aligned nobles' investments, use the DF to harangue who needs haranguing, or have the Kronprinz help him out on this. Split off the third of these options into its own paragraph, for easy removal as it will not always be relevant."
gerdom.3713.a:0 "We can't hurt him here."
gerdom.3713.b:0 "Use Schleicher"
gerdom.3713.c:0 "Use DF"
gerdom.3713.e:0 "Use Willy 3"

gerdom.3714.t:0 "Resistance to the Red General"
gerdom.3714.d:0 "Was Elard defeated or not? Check is here, as his support is seen..."
gerdom.3714.a:0 "...Hardly any are in attendance."
gerdom.3714.b:0 "...A stalwart few remain in the crowd."

gerdom.3715.t:0 "The Baron's Last Dance"
gerdom.3715.d:0 "Elard's gatherings are empty, vestigial. He has lost everything, and gained nothing. The Red General wins again."
gerdom.3715.a:0 ""

gerdom.3716.t:0 "The Baron's Stubborn Symphony"
gerdom.3716.d:0 "Elard will remain a thorn in Schleicher's side for the time being, but he's old. Given enough time, he'll fall, but until then he'll just have to be tolerated."
gerdom.3716.a:0 ""

gerdom.3731.t:0 "The Guides of the Next Generation"
gerdom.3731.d:0 "There are quite a few varied choices on how the youth of Germany should be directed, or who should have the most say in who to lead them. Moeller has his own political promises and revolutionary rhetoric that he spreads, while paramilitary guys close to him also have their sights set on recruiting the disaffected youth. Schleicher meanwhile obviously wants to militarize more of the young, while his ally Gereke thinks it best to create a state system that can properly organize new graduates where they need to go."
gerdom.3731.a:0 "Moeller's promises of an Empire of vigor have started to possess these malleable minds..."
gerdom.3731.b:0 "Young German men can find their place in patriotic paramilitaries."
gerdom.3731.c:0 "Gereke's employment plans will earmark jobs for promising youths."
gerdom.3731.e:0 "Kurt von Schleicher will dedicate his resources towards new military youth programs."

gerdom.3732.t:0 "Abandoned No Longer"
gerdom.3732.d:0 "While Moeller and Schleicher both can agree on mobilizing the poor, destitute, and youth of Germany, the two disagree on what the actual focus should be when it concerns ambitious projects off in the East. Schleicher believes that the mobilized men should be mostly concerned on helping with building state infrastructure in the East, while Moeller thinks that everyone should create more "personal" things, such as general city improvements, in order to cultivate a sense of pride within the wider Empire. The Wehrsportgruppen is something both can agree on and it would be attracting a lot of members."
gerdom.3732.a:0 "Reichskanzler Schleicher understands the Empire's needs."
gerdom.3732.b:0 "Moeller van den Bruck will ensure the lower strata has a part to play in the Empire."

gerdom.3733.t:0 "The Abwehr Looks Outwards"
gerdom.3733.d:0 "Schleicher prepares the Abwehr to establish very oppressive vices on the wheels of power in some of the Reichspakt nations, readying the faction to be fully under the heel of Germany."
gerdom.3733.a:0 "Practice your deceit with ruthlessness, Kameraden."

gerdom.3734.t:0 "The Shadow Looms"
gerdom.3734.d:0 "The Abwehr has established a grip on FROM, keeping it within Germany's control for the forseeable future."
gerdom.3734.a:0 "German Response"
gerdom.3734.b:0 "Not German Response"

gerdom.3744.t:0 "Mapping Out the March"
gerdom.3744.d:0 "While Moeller has a lot of power and influence, there remains much to be done for his political theory. Schleicher can take advantage of this, defining to Moeller that his 'Third Reich' cannot come without him firmly determining what that might be, likely suggested via intellectual agents that have been placed in Moeller's network. If they succeed, then Moeller will spend more time being a theorycel than actively moving his political organ forwards."
gerdom.3744.a:0 "Moeller shall be convinced that he needs more time to refine his ideas."
gerdom.3744.b:0 "The Young Conservatives commit to marching on, and all one can do is follow or step aside."

gerdom.3745.t:0 "The Kamarilla and the Court"
gerdom.3745.d:0 "Only one of them can win, of course. Moeller will play his hand, enacting an attempt to de facto wrestle control of the state away from Schleicher."
gerdom.3745.a:0 "Reichskanzler Schleicher waves a hand, and the King finds himself alone."
gerdom.3745.b:0 "Moeller van den Bruck's vassals prove too numerous for Schleicher to bear."

gerdom.3746.t:0 "An Invisible Shadow"
gerdom.3746.d:0 "Kurt von Schleicher survives the storm, and plans to cement his rulership by having Goerdeler succeed him as Reichskanzler while he remains in control of the Kamarilla, conning the people and society at large into believing him to be graciously surrendering his throne. In reality, the Spectral State is now stronger than ever before, and Schleicher is free to pursue his dreams of an insurmountably powerful Wehrstaat."
gerdom.3746.a:0 "With this master stroke of intrigue, Schleicher's rule is permanently secured."

gerdom.3747.t:0 "An Eternal Throne"
gerdom.3747.d:0 "Moeller van den Bruck has managed to de facto secure control of the state from Kurt von Schleicher. While he is not Reichskanzler, he doesn't need to be, as the whole apparatus of schemers, ambitious generals, and more that once propped up Schleicher's regime now swears fealty to Moeller instead. With the Red General's allegiances crumbling, he can only sit impotently as the state is now commanded by the Young Conservatives in full, rather than waiting for hand-outs from Schleicher's government."
gerdom.3747.a:0 "The Third Reich now inches ever closer to reality."

gerdom.3749.t:0 "An Invisible Iron Cage"
gerdom.3749.d:0 "An 'on the ground' event detailing some 'seditious elements' being progressively disappeared from public life. Autocratic rule came not with marching boots, but a silent sense of dread. Vanished journalists, unpatriotic soldiers transferred out, that sort of thing."
gerdom.3749.a:0 ""

gerdom.450.t:0 "The Generals That Conquered the World"
gerdom.450.d:0 "There can be no doubt that God has favored the Kaiserreich. With our ultimate victory in the Weltkrieg, we attained all that we had wished to gain from the bloody conflict, and even more beyond our ambition and imagination. This could not have happened were it not for our esteemed generals, the heroes of the Reich who so bravely led our troops to victory with their military ingenuity, skill, and fervour for Germany. These men, and our victory as a whole, is still celebrated as a source of pride for the Volk across the country. However, the Weltkrieg was a slaughter unlike any other - it was one which briefly transformed everything, from the fields in Flanders to the forests in the East, into a continent of blood and horror. Even we, the victors, cannot ignore the sheer brutality and death which it had let descend upon the peoples of Europe. The citizens of Germany have certainly not forgotten - not enough fathers and sons and brothers returned home, with those alive still scarred from their experiences on the battlefield. Naturally, this has resulted in a fatigue of sorts regarding the military. There are greater reports that fewer men are willing to sign up, weary of the horrors of the last war and what they may face in the future. This issue must be stopped in its tracks before it can blossom into an entire movement. In order to ensure that Germany will remain well-guarded and well-manned, we have to focus our efforts on quelling these elements of anti-militarism, as well as implementing greater reforms to all branches of the army so that they remain to be seen as the highly regarded role in our society that they have always been."
gerdom.450.a:0 "We cannot allow our victory to slip from our grasp!"
gerdom.450.a_tt:0 "§LWe will now be able to work against anti-militarist elements in society.§!"

gerdom.451.t:0 "Direction of the Heer"
gerdom.451.d:0 "With the Grosser Generalstab now revitalized and fully functioning, the question of what military doctrine we ought to prioritize is now at hand. A new decade has brought about new dynamics within the Heer, both militarily and politically. During the Weltkrieg, the Oberste Heeresleitung was formed as part of a similar initiative to what we have now, however there was a clear overreach of authority which was facilitated by the likes of Hindenburg and Ludendorff. This time, we shall ensure this will never be the case, and that the high command will focus solely on what it has been created for: upholding the military and its direction. Therefore, the decision now stands on what aspect of our forces we should form our doctrine of land warfare around. One option which is becoming all the more popular is focusing on the ever-growing Panzer division, which has seen many exciting improvements in both firepower and speed in recent years. A similar option is focusing on the developments of innovative weaponry which will allow us to perform operations with fewer men and less time to waste; a preferable option amongst the soldiers themselves, for certain. Additionally, there are more avenues in which we can expand our capacity outside the battlefield, by recruiting greater military minds to our general staff and ensuring our logistical prowess remains uncontested. A more traditional route would be to focus on the men who are fighting and dying themselves, ensuring they have the resources and training necessary to carry on the fight when it inevitably comes."
gerdom.451.a:0 "Our Panzer forces are our greatest asset."
gerdom.451.b:0 "We must remain on top of the technological race!"
gerdom.451.c:0 "The general staff is what wins wars!"
gerdom.451.e:0 "We cannot neglect our honorable men in the trenches."

gerdom.452.t:0 "Direction of the Luftwaffe"
gerdom.452.d:0 "One particular element of the military which has always been a source of pride for the nation is the airforce. In the Weltkrieg, the Deutsche Luftstreitkräfte displayed tremendous bravery and dominated the skies throughout, bringing glory and inspiring a new generation of pilots to take to the skies to defend the nation. This new generation however has the esteemed honor of being a part of a new incarnation of the airforce - the Luftwaffe. Formed almost ten years ago after the dissolution of the Oberste Heeresleitung, the Luftwaffe differed from its previous structure with our military involvements after the Weltkrieg, be they in Russia, our expanded colonial territories in Mittelafrika, or far across the world in the once-French domains of East Asia. They have proven themselves to be just as competent and worthy of the respect of the German people, though the question now stands on what the focus of the Luftwaffe must be. With our holdings secured, it is currently without a direction, though it is imperative that we keep the pilots well-prepared for what our enemies may have in plan. Manfred von Richthofen, perhaps the most renowned pilot in Europe thanks to his incredible efforts during the Weltkrieg under the callsign ‘Red Baron’, has voiced his opinion on the matter. He, as one of the architects of the Luftwaffe, believes that it has an opportunity to fully eclipse the legacy of the Luftstreitkräfte, and wishes for it to focus on total aerial domination. Other suggestions, however, have proposed that instead the air force must be prioritized as assistance to our ground forces, aiding in advancements and destroying targets threatening the infantry. Of course, there is always the option that we can remain flexible in our doctrine, and offer more aid to our expanding navy to ensure our control of European waters remains fully secure."
gerdom.452.a:0 "Richthofen is right, the air force must work to destroy the enemy."
gerdom.452.b:0 "The air force must help our army's advances!"
gerdom.452.c:0 "It's best we be flexible, and assist our navy."

gerdom.453.t:0 "Direction of the Kaiserliche Marine"
gerdom.453.d:0 "The Kaiserliche Marine has grown enormously since the aftermath of the Weltkrieg. Having triumphed in the naval arms race against Britannia, Tirpitz, the architect of Germany’s victorious naval program, continued to fund the fleet after becoming Kanzler. Yet as the Kaiser’s grand maritime project expands, the aging admirals of the old guard retire, and with them their outdated doctrines. A new generation of officers must now determine the future of Germany’s sea power. At the same time, rapid technological change is reshaping naval warfare itself. Submarines grow deadlier, aircraft carriers have begun to vindicate their promise, and battleships continue to swell to ever greater sizes. \n\nErich Raeder leads those inspired by the titanic clash of fleets that shattered England’s blockade. To them, the battleship remains the ultimate arbiter of naval supremacy. Heavily armored dreadnoughts, bristling with immense guns, still embody the decisive strength of a fleet.\n\nOthers argue that Germany’s future dominance lies beneath the waves. Karl Dönitz and his fellow U-boat commanders, emboldened by the devastating submarine campaigns of the last war, believe that vast fleets of submarines could strangle any enemy economy by severing its trade and supply lines. Rather than risking colossal battleships in costly engagements, they advocate a relentless war of attrition across the world’s shipping lanes.\n\nA smaller but increasingly vocal faction, led by Peter Strasser, champions a third path: naval aviation. Building upon the early carrier experiments begun under Tirpitz, these reformers argue that aircraft carriers will soon become the true centerpiece of modern fleets. Aircraft launched from the sea could scout vast distances, strike enemy ships before they are even sighted, and reshape naval warfare entirely.\n\nThe Kaiserliche Marine now stands at a crossroads. Whether it relies on the thunder of battleship guns, the silent menace of submarines, or the daring promise of naval aviation will determine Germany’s fate in the next great war at sea."
gerdom.453.a:0 "The battleship is still an unstoppable vessel!"
gerdom.453.b:0 "Our U-Boats shall suffocate our enemies!"
gerdom.453.c:0 "Let us innovate... Expand Tirpitz's carrier program."

gerdom.454.t:0 "Panzers or Halftracks?"
gerdom.454.d:0 "The tangled battlefields of the Weltkrieg, with its pillboxes, barbed wire, and endless trench systems, showed that infantry alone cannot persevere against modern defensive lines - it is clear that mobility and steel will define the battlefield of tomorrow. What remains undecided is whether tanks will serve as instruments of support, or operate independently in concentrated attacks. The former theory is championed by one of our earliest armored thinkers, Ernst Volckheim. He views the tank not as an independent weapon of breakthrough, but as a force working in concert with infantry. Drawing upon his experience in the Kaiserschlacht and his postwar development of the Panzertruppen, Volckheim argues that armor must be integrated and employed alongside motorized infantry within a balanced, combined-arms system. The latter vision departs from conventional doctrine. Heinz Guderian regards armored warfare as the decisive arm of modern conflict. Influenced by his experiences during the Russian intervention and inspired by rapid operational maneuver, he champions independent, concentrated panzer formations as spearheads capable of rupturing enemy lines and driving deep into the rear to shatter them."
gerdom.454.a:0 "Volckheim, having first formed these concepts, has the right ideas."
gerdom.454.b:0 "Guderian's 'reckless' spirit is what we need!"

gerdom.455.t:0 "A Choice of Two Experiments"
gerdom.455.d:0 "Within the Heer, a new question has emerged: will the next war be decided through scientific supremacy or the operational flexibility of specially trained formations? Emil Becker’s experience amid mortar batteries in the trenches of the Weltkrieg has made him a fervent advocate of technological dominance. To him, victory lies in advanced artillery, experimental weapons, and the relentless output of industry. Set against this vision is Albert Kesselring, whose service in the Russian intervention and Mittelafrika forged a doctrine of mobility and integration. He calls for the modernization of Germany’s Jäger units and the coordination of air power within operational command. Under his approach, flexibility, speed, and combined-arms maneuver will define tactical success."
gerdom.455.a:0 "Becker and his militarized academia will propel us forwards."
gerdom.455.b:0 "Kesselring can make the best trained force the world has yet seen!"

gerdom.456.t:0 "Gerd und Oskar"
gerdom.456.d:0 "Emboldened by our victory in the Weltkrieg, the lessons of the conflict remain fiercely debated as gathering storm clouds over Europe make one fact clear: the Heer’s structure and doctrine must evolve. Two distinct theories now contend for dominance within the General Staff: Gerd von Rundstedt, whose experience in the war rooms of the Weltkrieg shaped him into a master of calculated response, advocates disciplined, coordinated multi-army operations - deliberate maneuvers designed to encircle and destroy the enemy's forces while preserving cohesion. Countering this doctrine is Oskar Hutier, whose experience in the final offensives of the Weltkrieg has inspired a doctrine of shock and rupture: swift surgical strikes intended to paralyze the enemy before he can react."
gerdom.456.a:0 "Rundstedt has the energy, let's go with him."
gerdom.456.b:0 "Oskar's won us a war before!"

gerdom.457.t:0 "A War of Spirit or of Paperwork?"
gerdom.457.d:0 "The soldier must be prepared with the means to win war not only through what he carries in his hands, but through what he understands of discipline, leadership, and raw spirit. The tenacity and adaptability required on the battlefield are qualities well embodied by General Walter Model, who - unlike many of his contemporaries, possessed no military background and distinguished himself during the Kaiserschlacht through relentless determination and personal leadership at the front. Model believes that victory must be seized through initiative and aggression, and that officers must lead by example if they wish to see where crosses of iron grow.\n\nYet war may also be decided not by fiery spirit, but by the steady machinery of organization. Though the monotony of planning and administration may seem uninspiring, General Friedrich Paulus sees in it the true engine of victory. Having served in the Weltkrieg, though toward the end he was confined to staff positions due to illness, Paulus gained a deep appreciation for the discipline of structure and coordination. To him, battles are not won through inspiration alone, but through preparation, coordination, and the quiet discipline of the General Staff."
gerdom.457.a:0 "Model knows how to mold a soldier."
gerdom.457.b:0 "Paulus understands that war is won through monotony."

gerdom.458.t:0 "A New Kind of Game"
gerdom.458.d:0 "For decades, the German army has relied upon traditional staff exercises and theoretical war planning to prepare its officers for the battlefield. Maps were studied, orders written, and outcomes debated in quiet rooms far from the roar of engines and artillery. Yet the changing nature of modern warfare demands something more dynamic.\n\nTo test the ability of command and validity of doctrine a concept of \"war gaming\" has been devised to refine the Heer long before the first real shot is fired. Officers divide into opposing colored teams, commanding units across detailed maps and simulated battlefields where every maneuver is tested and analyzed. Arguments erupt over tactics, strategies are rewritten on the fly, and younger officers gain a rare opportunity to challenge the assumptions of their superiors. These skirmishes have been put into practice in massive field maneuvers across Germany’s varied terrain - rolling tank columns grinding through muddy plains, infantry pushing across marshlands, and mechanized formations racing through narrow mountain passes in exercises designed to test both men and machines to their limits."
gerdom.458.a:0 "Red Team, you're out!"

gerdom.460.t:0 "Pomp Above, Adventure Below"
gerdom.460.d:0 "The newspapers adore fighter pilots. Photographs of leather-jacketed pilots with confident smiles fill the front pages, while breathless reporters describe aerial duels as though they were chivalric tournaments fought among the clouds. The flying circus and its pinstripe clowns model themselves like knights of the air lording over the infantry.\n\nAmong the officers of the Panzerwaffe, however, such public admiration often inspires little more than jaunty laughs. These soft men of the glamorous world of airfields and press photographers are little pansies compared to the rugged and brutal panzer commanders. These men fight, not alone in the comfy chair of a sleek aircraft, but within the cramped steel hulls of armored vehicles, grinding across mud-choked fields and shattered villages.\n\nYet those who excel in this brutal environment are beginning to earn the reputations they are owed. Stories circulate in new Heer Magazines to the public of armored corps led by commanders who have smashed through entire defensive lines, outmaneuvered enemy formations, and turned the tide of battle with bold armored thrusts. Perhaps the newspapers will never celebrate them with quite the same enthusiasm as the glamorous faces of the sky, but the support of the infantrymen that make up the Heer is enough."
gerdom.460.a:0 "Why be in the circus when you can be in armor?"

gerdom.463.t:0 "Theoretical Annihilation"
gerdom.463.d:0 "Across the proving grounds of the Reich, the thunder of experimental weapons echoes day and night. The future of warfare is in laboratories, design bureaus, and testing ranges where engineers seek to push the limits of destruction ever further. With the change in command priorities, research programs have accelerated dramatically. Chemists experiment with new incendiary compounds capable of reducing entire defensive lines to seas of flame, while artillery engineers pursue weapons of unprecedented scale with colossal guns designed to shatter fortifications from distances once considered impossible. Massive tank platform prototypes which would sail across the shattered ground carrying impressive weaponry, covered by numerous supporting flak.\n\nWhen the largest of these experimental cannons fire, the ground trembles as though struck by an earthquake. A small minority have begun to voice quiet concerns as a result. If the destructive power of war continues to escalate at this pace, they argue, the ground beneath may change beyond recognition. Yet such doubts remain rare, as within the General Staff and the armaments bureaus, far more men look upon Becker’s creations not with fear but with fierce determination. If the Reich is to survive, and dominate, it must wield weapons capable of annihilating any force that dares challenge the Adler."
gerdom.463.a:0 "War will change."

gerdom.466.t:0 "The Greatest Game"
gerdom.466.d:0 "High in the mountains, deep within forests, and across isolated training grounds far from prying eyes, a new generation of Jaegers is being forged. These are not the ordinary mountaineers of yesterday's war, though. Under the guidance of Field Marshal Albert Kesselring, the Jaeger units of the Imperial Heer are being transformed into some of the most elite and capable soldiers in Europe.\n\nTheir training is relentless. Recruits are pushed through brutal endurance marches across unforgiving terrain, forced to navigate dense forests and jagged mountain paths under the cover of darkness. Live-fire exercises are conducted in conditions meant to replicate the chaos of battle, where hesitation can mean death. The goal is simple: to produce soldiers who can operate independently, adapt instantly, and strike the enemy where he least expects it.\n\nOne of the major trials undertaken by the jaegers are hunts across sprawling terrain, where the rest of the platoon pursue the rest as they survive off the land. Unfortunately, the cost of this training has even caused a handful of trainees to have already perished during the most dangerous exercises. From these losses, however, we have built a force that has been taught to think like hunters, stalking their prey with patience and discipline."
gerdom.466.a:0 "Is expertise in this hunt moral?"

gerdom.468.t:0 "Flipping the Chessboard"
gerdom.468.d:0 "To the romantics, war resembles a great game of chess, armies maneuvering across the battlefield as generals apply doctrine according to honor and axioms. Field Marshal Gerd von Rundstedt is not counted among these fools. Victory does not simply come from mastering one’s own strategy and following it through like clockwork. It comes from understanding the mind of the enemy so completely that his next move becomes inevitable.\n\nThe Prussian General Staff has always been a hard headed institution, one that treats its traditions as holy and inherently superior. To force such a lumbering beast to adapt requires force and officers are now expected to study foreign military doctrines as carefully as their own. A series of internal pamphlets has begun circulating throughout the corps, each attempting to describe how the \"average general\" of a nation might think, plan, and react under pressure. These studies do not rely on guesswork alone, though, as the Abwehr has been tasked with gathering intelligence on foreign military academies, strategic traditions, and the internal debates taking place within rival general staffs.\n\nRundstedt encourages his subordinates to imagine the battlefield not from their own perspective, but from that of the enemy commander standing across the map table. As the oriental master Sun Tzu said, \"If you Know your enemy and know yourself, and in a hundred battles, you will never be in peril\"."
gerdom.468.a:0 "It'll work, so long as your enemy remains sane."

gerdom.470.t:0 "The Reaper's Rhythm"
gerdom.470.d:0 "The MG42 is the new General Purpose Machine gun adopted by the Reich to provide the infantry with brutal sustained fire power. It fires the 7.92×57mm Mauser cartridge and is fed by linked ammunition belts for continuous shooting. Setting a record pace of 1,200 rounds per minute, it produces a dense stream of bullets which in turn is compensated for by the quick-change barrel system. Such force is supported by the recoil-operated roller-locking mechanism which - combined with a bipod for mobility - allows the machinegunner to fire on the move.\n\nSuch a beautiful instrument of war cannot solely be spoken in the terms of statistics and features in a tone befitting of a vestal virgin. It required a true Musician to pluck its trigger and unleash its beautiful salvos on the mongrels that threaten the Reich. Such a conductor of war’s melodies could be found in the muddy armpit that is Malaysia, as a veteran of the Weltkrieg had been spending his exile with a prowess matched by none amongst the Deutsch Ostasien garrison. Spending a summer vacation in the Somme, in 1916, the artist utilised the famed MG 08 to play a sonnet for the frogs as they blindly flung themselves towards his 250-round fabric belts of 7.92×57mm ammunition. Such a weapon would hammer away in slow, deliberate bursts, with a reload allowing a pause for the dancers.\n\nIn the thick Jungles armed with the MG42, however, no such rest between notes is given in the righteous business of killing guerillas. A syndicalist cell is merely evaporated instantly upon the scream of hell fire erupting from the glowing red barrel. Such a beautiful composition, echoing deep into the wild as the unit advances, gives the maestro some glee while so far from home, reminding him of Beethoven."
gerdom.470.a:0 "You get used to it after a while."

gerdom.473.t:0 "The Teutonic Tide"
gerdom.473.d:0 "The constant hum of the engine has set the pace as a column of soldiers are forced to jog alongside a platoon of tanks during a new combined arms training exercise. As boots trudge on dirt, lungs burning, and rifles clutched tight the officers urge their men forward step by step. Struggling to keep his breath as his legs filled with lactic acid, a trooper, a recruit from Saxony, began to lose strength.\n\nIn the past a man's heart was the only metronome of war, while artillery thundered overhead and cavalry scouted ahead. Now the heart must be replaced by clockwork. In the terrifying choreography of combined arms warfare, which has replaced flesh and blood with steel and oil, speed is the ultimate decider. Complete mechanisation of the cavalry has begun and now armored columns surge forward like steel battering rams, their engines roaring as they crash through enemy lines, redefining the schedule.\n\nBefore the man can fall he reaches the trench, a simulation of an incursion, and immediately falls in bayoneting the nearest target. As the treads pass overhead clouds of dust fall, creating a haze upon the fighter, but before it can clear from the eyes the officer screams for advance. In the new war of mobility such training is key in building a soldier who can keep up the momentum in an unstoppable wave of armor and flesh."
gerdom.473.a:0 "Charge, damn you, charge!"

gerdom.475.t:0 "A Unified March Beneath the Cross"
gerdom.475.d:0 "The German Empire is vast, and its banners fly not only over the cities of the Reich but across a broad constellation of allied and associated states throughout Mitteleuropa. Lithuanians, Poles, Ruthenians, Balts, and countless others stand within the Imperial system - each with their own language, traditions, and loyalties. For many years, the Imperial Army remained almost exclusively German in composition, its ranks drawn primarily from the heartlands of the Reich. Yet as the responsibilities of the Empire grow ever greater, some within the General Staff have begun to ask the daring question of expanding the defense of Mitteleuropa to all of its peoples.\n\nThere have been several experimental regiments formed that incorporate volunteers and minorities from across the Empire’s territories before. German officers led formations where Polish riflemen marched beside Baltic artillery crews and Ruthenian scouts served alongside Prussian veterans most notably during our intervention into the Russian Civil War. Undeniably inspired by the variety of cultures that make up the Austrian common army, expanding upon this early experiment will have to face the benefits and challenges of such a system.\n\nThe opposition to this new doctrine has pointed out this similarity as a point of weakness, organising a multiethnic force will face cultural conflicts and organizing so many different languages will be quite the challenge. Further many patriots fear the dilution of Prussian martial culture, though one cannot defend a land with just prestige.\n\nNew experiments in these Foreign Legions will be key in identifying and solving these issues as the trial expands, growing to build a new continental force united beyond blood."
gerdom.475.a:0 "Europa calls, and her sons answer."

gerdom.480.t:0 "Constructing Abteilung Z"
gerdom.480.d:0 "The modern battlefield is not fought along frontlines alone. Behind every marching column and roaring artillery battery lies a quieter war behind the lines, built on information and subterfuge. Intelligence has become as essential to the survival of the Empire as rifles or shells.\n\nIn recent years the Abwehr has grown rapidly, yet its structure remains tangled and inefficient. Rival offices compete for authority, reports vanish into bureaucratic labyrinths, and coordination between military intelligence, diplomatic observers, and clandestine agents is far from ideal. Unfortunately, many Prussian officers have also refused to cooperate with it in the past, seeing it as a dishonorable organisation, and so this vital organ of war has been found lacking in the latest intrigues against the Internationale.\n\nTo address these shortcomings, the High Command has approved a sweeping reorganization within the Abwehr. At its center will stand a new administrative command named Abteilung Z, or \"the central division\", tasked with overseeing coordination, central planning, and the two other branches of the Abwehr - the foreign branch and intelligence branch. The intelligence branch will also have itself reorganised, being broken up into intelligence collection, sabotage, and counterintelligence. Where once the Abwehr operated as departments more connected to their local military districts (Wehrkreis), Abteilung Z would serve as the brain that binds the entire network together. From Berlin, its officers will manage agents abroad, monitor subversive movements, and ensure that vital intelligence flows swiftly to those who need it most."
gerdom.480.a:0 "It may not be honorable work, but it keeps the Empire safe."

gerdom.503.t:0 "Revamping the Aircraft"
gerdom.503.d:0 "The rapid evolution of aviation from the Weltkrieg's biplanes has forced every major power to confront the question of what form and doctrine will best dominate the skies. Within the Reich’s aviation bureaus, engineers and strategists are locked in a spirited debate over the future direction of our aircraft development programs. The resources of the Empire, though vast, are not limitless, and the choice we make now will shape the character of our air arm for years to come.\n\nOne school of thought advocates the development of light aircraft, nimble fighters and tactical machines capable of rapid production and deployment. Their proponents argue that speed, maneuverability, and numbers will allow our air forces to dominate the skies through sheer agility and flexibility. Such aircraft could patrol borders, escort bombers, and contest enemy air superiority wherever it is challenged.\n\nOthers argue that the future belongs to heavier aircraft such as interceptors, large bombers and powerful long-range machines capable of striking deep behind enemy lines. These larger planes would carry the war to distant factories, rail hubs, and ports, crippling an opponent’s ability to wage war before their armies even reach the battlefield. Both visions demand enormous investments, deciding whether its future air arm will rely upon swift wings or heavy thunder."
gerdom.503.a:0 "Light Air is key to overwhelming all that could oppose us!"
gerdom.503.b:0 "Heavy Air Force’s will pummel them into the dirt!"

gerdom.504.t:0 "Mitteleuropa's Aviation Extravaganza"
gerdom.504.d:0 "Across the vast network of states that make up Mitteleuropa, a remarkable celebration of flight is being prepared. What is to be a modernist’s dream - which celebrates the advancement of technology, the primacy of speed, and the skill of man - will soon take flight above the skies of the Europa Regina. What began as a modest proposal among aviation clubs and industrial sponsors has rapidly grown into something far grander: an international series of aerial competitions intended to showcase the technological brilliance of the Reich and its partners. The decentralised birth of these events have been in turn nurtured by their respective governments and air forces to quickly grow into their own unique extravaganzas of their nations growing airpower and skill.\n\nThe events will see pilots, engineers, and aircraft manufacturers from across the Mitteleuropan alliance gather to test their creations in a spectacle of speed, skill, and innovation. Temporary aerodromes will be constructed, crowds will gather in their thousands, and the skies themselves will become a stage for daring demonstrations of aerial mastery. The competitions are planned to feature everything from precision flying, stunt pilots, endurance races, to experimental aircraft displays. The Luftwaffe has taken a keen interest in talent scouting, seeking to find new aces and star engineers. The grandiose event has also spurred on the innovation of our wider alliance, with many of our Eastern partners taking the chance to nurture their own nascent air forces and showcase their own generation of pilots. Soon the roar of engines will echo across fields and cities throughout the continent, as pilots compete for glory and spectators witness the dawn of a new age above them."
gerdom.504.a:0 "Let the engines roar."

gerdom.505.t:0 "The Extravaganza Reaches Lithuania"
gerdom.505.d:0 "From Across the skies of Mitteleuropa the Aerial Extravaganza has landed in the fields outside Kaunas, drawing crowds to see the continent's most daring flyboys. For many among the crowd, the sight of aircraft roaring overhead is still a curious sight. The Lithuanian state, upon its founding, followed it up by creating an independent aviation company on March 12th 1919. Afterwards the Kaunas Military Aviation School was founded and, using German designs, the air force grew. In cooperation with the Aero Club of Lithuania, the Antanas Bronė plane designers, and even the Gliding School in Nida, the Lithuanian Air Force has provided full backing to this event. \n\nAt the center of the excitement stands one of Lithuania’s most celebrated pioneers of aviation: Jurgis Dobkevičius. Dobkevičius has devoted his talents to the construction of homegrown monoplanes, recently culminating in the fighterplane Dobi-IV. Known for their speed and aerodynamics, Dobkevičius' designs have, in the past, a severe flaw in lacking visibility which has led to a series of crashes. After a particularly bad crash in June 1926, his newest designs have begun to severely erode this issue. Alongside the ace is Antanas Gustaitis, the Commander-in-Chief of the air branch, a moderniser of the service who has the honor of having created the ANBO planes, named after him and his wife, as well as reorganising the nation’s air force workshops and bases. With these two enterprising souls, the age of flight has come even to the distant edges of the Empire, and Lithuania is taking to the skies in its own way."
gerdom.505.a:0 "The future belongs to the air."

gerdom.506.t:0 "The Extravaganza Reaches Ruthenia"
gerdom.506.d:0 "The thunder of engines and the shimmer of wings have now arrived in Ruthenia, where the travelling aviation exhibition continues its grand tour across the eastern territories of the Reich’s sphere. Word of the spectacle has spread quickly across towns and villages, drawing enormous crowds eager to witness the marvels of the modern age. Children point upward in amazement as the Ruthenian Airforce has pulled out all the stops for the event. Stunts such as Pachautinsts, smoke screen displays, and formation flying over Minsk are all on display as sky minded acrobates wind between each other.\n\nAmong the pilots participating in the exhibition is the Polish-Ruthenian aviator Donat Makijonek, a talented flyer whose daring demonstrations have quickly become the highlight of the event. Makijonek throws his aircraft through steep climbs and sweeping dives, the machine’s engine roaring as it dances through the clouds above the crowd. A veteran of the Weltkrieg, he was the only ace of Polish heritage to fight against the Central Powers, ending the war with almost 600 combat missions and more than 30 aerial battles. Now, on the other side of the battlelines in the post-Weltkrieg world, he helped found the Ruthenian Air Service immediately after the war’s end and now commands a squadron. This squadron, whose engines dominate the soundscape near Minsk, has made the spectating crowds erupt into applause many times over, and they have definitively proven to the Luftwaffe that Ruthenia is hiding some nascent talent."
gerdom.506.a:0 "Even the frontier looks skyward."

gerdom.507.t:0 "The Extravaganza Reaches Poland"
gerdom.507.d:0 "The travelling aviation spectacle has crossed another frontier, arriving now in the great cities and broad plains of Poland. Posters, newspapers, and word of mouth have spread news of the exhibition far and wide, ensuring that vast crowds gather at the temporary airfields outside Warsaw. The fields that once echoed with cavalry drills and marching boots now tremble beneath the roar of engines, as citizens from across the countryside come to witness the marvels of modern flight.\n\nAmong the honored guests of the Extravaganza is one of its most celebrated pioneers: Stefan Stec. A veteran aviator and among the earliest Polish military pilots, he earned his reputation during the tumultuous skies of the Weltkrieg, flying both bomber and fighter aircraft across the Eastern Front and the distant Italian theater for the Austro-Hungarian Luftfahrtruppen. Beyond his combat record, Stec is also remembered as the originator of the Polish Air Force’s distinctive checkerboard insignia, a symbol that has since become synonymous with the nation’s wings. His contributions did not end with the war, however. Having studied aeronautical engineering in Berlin, Stec became a firm advocate for the development of a domestic Polish aviation industry, and has been instrumental in ensuring Poland’s status as having one of the largest air forces in Eastern Europe.\n\nFor now, though, he has been performing wide sweeping turns, steep climbs, and controlled dives that seem almost reckless to the untrained eye of spectators below him, yet every maneuver is executed with the calm precision of a master of the skies. As his aircraft finally touched down at the end of the event and the crowds surged forward in applause, the meaning of the spectacle became clear.\n\nIn Poland, as elsewhere, men like Stec stand ready to lead their nations into that new sky, and show that not only Germany or Russia can produce daring aerial knights."
gerdom.507.a:0 ""Let them gaze upward."

gerdom.508.t:0 "The Extravaganza Reaches Finland"
gerdom.508.d:0 "What began as a travelling demonstration of aeronautical innovation has now reached the northernmost reaches of Europe. After thrilling crowds across Mitteleuropa, the great Aerial Extravaganza has arrived beneath the pale skies and frozen fields of Finland, where the long twilight and snow-covered landscape provide a dramatic stage for mankind’s newest machines. Temporary aerodromes have been carved from frost-hardened fields outside Helsinki and other towns, while spectators arrive by rail, carriage, and foot to witness the roaring engines and daring pilots that promise to shape the future of warfare and industry alike.\n\nAmong the aviators drawing the most attention is the Finnish pilot Valfrid Nykänen, whose reputation for technical skill and fearless flying has made him one of the highlights of the Extravaganza’s northern leg. Nykänen is already regarded as one of the pioneers of Finnish aviation, and he has been handedly proving that reputation as warranted. Before Finland possessed an air service of its own, he flew for the Imperial Russian Air Service during the chaos of the Great War, becoming the first Finnish fighter pilot to take to the skies in combat. A graduate of the Kazan Military Academy in 1915, he first served with the Imperial Russian Army on the Western Front in Poland before transferring to aviation. After completing training at Sevastopol he qualified as a fighter pilot in May of 1917, and achieved multiple aerial victories, being the only Finn to do so. Beyond his military career he had even once stood on the threshold of Olympic glory, serving as a reserve gymnast for Finland’s silver medal-winning team at the 1912 Summer Olympics.\n\nLately, however, he has been devoted to honing the Finnish Air Force in the face of a growingly chaotic world, having already abandoned Russia during its civil war and seeming all too skeptical of the coming years. At the Extravaganza, however, his aircraft cuts across the pale sky with elegant precision, executing steep climbs and daring banking turns that leave the assembled crowds gasping and cheering in equal measure. Even here, at the far edge of Europe, the age of aviation has arrived in thunder and steel."
gerdom.508.a:0 "The sky knows no borders."

gerdom.509.t:0 "The Singapur Scheme"
gerdom.509.d:0 "For generations the distant port of Singapur has been regarded as one of the great strategic gateways of the East. Whoever commands its harbors commands the sea lanes that link the Indian Ocean with the vast markets and territories of East Asia. Now, as the situation in Asia faces revolution and a rising sun, Imperial planners have turned their attention to transforming the port into a fortress worthy of its strategic importance. New dry docks capable of servicing the largest warships will be constructed, while coastal batteries, fortified depots, and extensive repair facilities will transform the harbor into one of the most formidable naval bases in the world. The Seletar, Tengah, Sembawang, and Kallang airfields will be reinforced and expanded to project aerial power across Southeast Asia. Supply depots and fuel reserves will ensure that fleets operating in distant waters may find safe harbor and immediate support. A renewed Gibraltar of the East would anchor our presence in the region, safeguarding trade routes and projecting naval power across half the globe."
gerdom.509.a:0 "A fortress in the East, against the rising sun."

gerdom.510.t:0 "The War Worsens"
gerdom.510.d:0 "The Empire has fought a brutal and unrelenting war, yet even the darkest predictions whispered within the halls of the General Staff did not foresee the catastrophe now unfolding before us. Reports arrive hourly, each more alarming than the last. Across the front the situation has deteriorated with terrifying speed, as enemy offensives have broken through various defensive lines, forcing our armies into a constant retreat. Entire formations have been broken or encircled, and the roads behind the front are filled with refugees, destroyed equipment, and exhausted soldiers falling back toward the heartland of the Reich. The war has shattered our Mitteleuropean buffers and the butchers shed our blood into our soil. Every mile lost brings the thunder of war closer to the very core of the Reich itself. While such a situation may once have been met with peace offerings to our enemies, our opponents bay for nothing less than the total destruction of the Kaiserreich. As a result, negotiation with our foes is completely out of the question.\n\nWith hail and fire mixed with blood hurling down upon Germany, the Kaiser has authorized measures once considered unthinkable to counter the tides of savagery washing over our beloved nation. Women, old veterans and barely-trained youths alike are to be called to arms, organized into hastily formed militias. Chemical weapon stores shall have their seals broken and unleashed upon the earth, spoiling the soil and - as the barbarians claw at their jugulars - dissolve their lungs while it suffocates their blood. Every factory, field and fort will be clawed inward to the core and no matter what, no inch of beautiful Germania will be lost without a sea of blood. If Endsieg can only be achieved through total war or total sacrifice then the inheritors of Arminius will gladly pay such a price."
gerdom.510.a:0 "We will fight to the last!"

gerdom.511.t:0 "Chemical Attack!"
gerdom.511.d:0 "What began only as a faint, sweet, and metallic smell across our lines, has carried death to our divisions. The Reich, in its untold barbarity, has crossed the line by destroying the Hague Conventions once again - breaking the seal on chemical warfare. An impermissible act of cruelty, the Kaiser has once more consigned himself to eternal damnation in a fiery lake of burning sulfur. The reality on the ground has been especially horrific as reports roll in from the frontlines.\n\nAs the wind changed the collection of neurotoxins, blood agents, choking agents, and blister agents were unleashed upon the frontlines by artillery shells and canisters. A pale cloud crept along the ground, pooling in shell holes and trenches. Our forethought of issuing gas masks meant that many were able to quickly fumble them on, but others were too late. The lack of drills meant they did not have their masks at the ready, not expecting the unmatched inhumanity of the Hun to deploy these horrible weapons. Those who hesitated felt their burning throats, searing lungs, eyes blister as their blood itself screamed for oxygen. The medical tents have become completely overwhelmed as they attempt to save as many as they can, and our researchers are already hard at work at developing new counter-measures to the more modern, and deadly, gasses that the Germans are employing."
gerdom.511.a:0 "Bastards!"

gerdom.512.t:0 "The Bell Tolls"
gerdom.512.d:0 "For weeks the High Command has wagered everything upon a single, desperate blow. Every remaining reserve was thrown forward, every artillery piece dragged into position, every soldier who could still carry a rifle ordered into the line. This was to be the final stroke that would either break the enemies like the Romans in Teutoburg or shatter what little strength we had left. New revolvers are issued to officers and, in new ciphers, the order is given followed by the horse sound of the trench whistle.\n\nA thunderous crescendo of violence rises across the front lines as artillery turns bones to dust and render hundreds as widows. Ash chokes the sky across the front, blocking the sun as infantry drag their soon-to-be corpses through the mud. Urban streets fill with concrete dust as apartments are leveled upon their contents. The asphyxiated streets fill with fire as tanks duel - payloads flung across town square - igniting inside the invaders hull and boiling its crew. Signal companies deliver a string of barely comprehensible status updates as the sleep deprived command attempts to maneuver the last defenders of the Fatherland. Momentum is the only law that keeps the nation's blood pumping as officers scream their last orders. The bells that decide Europa’s - and her defender's - fate toll from the top of the Cologne Cathedral, and..."
gerdom.512.a:0 "...It tolls for them."
gerdom.512.b:0 "...It tolls for us."

gerdom.513.t:0 "A Strengthened Breath"
gerdom.513.d:0 "As blood filled Germania's lungs, her shield never faltered and her sword never stilled. Even as strangled gasps were the best she could muster and the foreign hordes never ceased their advances, her loyal guardians in the Heer’s tanks and troopers stormed to her defence. Her skies are blotted out by the wings of the Luftwaffe, delivering fire and thunder upon her enemies. Encircled and starved by a savage armada, the Kaiserliche Marine sails day and night to break the blockade.\n\nOn the home front, the tireless work of her people clears the airway through endless shifts in factories and shipyards to arm her soldiers, repair her wounds, and restore her strength. Even the politicians stand united, giving their all to conduct the terrible orchestra of total war. At last, the spectacle of Germany’s resistance has forced the enemy to hesitate. The suffocating pressure upon the Empire eases, if only for a moment.\n\nThe onslaught has not ended, as the enemy still presses from every side, but for the first time in many dark months the Reich can draw a breath of fresh air once more."
gerdom.513.a:0 "We are not finished yet."

gerdom.514.t:0 "A Ray of Hope"
gerdom.514.d:0 "The storm has not passed, but its fury as it tears upon the Reich has weakened. The thunder of guns still rolls across the horizon and the enemy still presses into our land, yet the great struggle that bored upon the Empire is being pushed back. The armies of the Reichspakt, once driven back step by bloody step, have begun to steady themselves. Defensive lines once thought doomed now hold firm, and in some places the soldiers of Germany even dare to advance once more to retake what was lost. Beneath the seas and across the waves the Kaiserliche Marine contests the enemy’s stranglehold, striking back where once it could only endure.\n\nFactories roar through the night, railways carry fresh divisions to the front, and the people of the Empire work with a quiet determination that no bombardment has managed to break. In the darkest hour when the seals broke and unleashed the horsemen upon the Kaiser’s realm, many of the loyal doubted day would ever break. Yet through this tribulation, as the stars of heaven fell unto the earth, a thousand year Reich is promised to emerge and - for the first time since the desperate struggle began - there is hope again to see it."
gerdom.514.a:0 "The light still burns."

gerdom.515.t:0 "Relief"
gerdom.515.d:0 "The constant weight that pressed upon the Empire is lifting. For months the Reich fought against the hungry abyss, its enemies pressing from every side while the drums of catastrophe beat ever louder. Many believed the final hour of Germania had come - her walls falling, her defenders torn apart and the Barbarians coming to rip out her throat. It was feared that the triumph of Bismarck accomplished in Versailles’ Hall of Mirrors would end in fire and ruin.\n\nYet the tide has turned. Through stubborn defense, relentless industry, and the unyielding will of its people, the Empire has regained its footing. The front advances where it once collapsed. Supply lines flow once more, divisions regroup, and the enemy’s great offensive begins to falter against the iron resolve of a nation that refuses to go into that good night. The marks of desperation may never heal but the Empire has looked into the abyss and, when it looked back, we spat in its eye. The storm begins to fade, Germany persists, but the final victory is still yet to come."
gerdom.515.a:0 "The Empire endures."

gerdom.700.t:0 "An Empire Molded in the Kaiser's Image"
gerdom.700.d:0 "Few nations in the world can rival the vast economic machinery of the German Empire. From the coal mines of the Ruhr to the steelworks of the Rhineland, from the shipyards of Hamburg to the chemical laboratories of the great industrial combines, the Reich stands as one of the foremost engines of production in the modern world. The Konzerne Cartels coordinate industries with ruthless efficiency, banks channel vast sums of capital into expansion, and the careful hand of the state ensures that the interests of industry and the power of the Empire move forward together.\n\nDespite all of this, the economic order forged in the triumphs of the past has steadily revealed its limitations as the modern world accelerates around it. Protectionist policies that once shielded German industry from foreign competition have, in places, dulled the edge of innovation. Entire sectors operate comfortably behind tariff walls, secure but increasingly stagnant. Meanwhile, beyond the great industrial heartlands, vast stretches of the countryside remain poorly connected to the arteries of modern commerce, their productivity restrained by inadequate transport and outdated infrastructure. The future will demand more than inherited strength of manpower and resources. The Empire has been molded according to the virtues of Prussia - disciplined, powerful, and ambitious - but the next era will require that this economic colossus be sharpened, streamlined, and renewed to build the Weltreich."
gerdom.700.a:0 "Germany must expand."

gerdom.701.t:0 "Breathe Life into the Land"
gerdom.701.d:0 "Across the Empire the arteries of modern civilization stretch in iron rails and paved roads, binding together kingdoms, cities, and industries into a single economic organism. Yet despite decades of expansion, not every corner of the Reich enjoys the full benefits of this network. In distant rural districts, farmers still rely on aging roads that turn to mud in the rain, while isolated towns remain only loosely connected to the great commercial centers that drive the national economy.\n\nThe government now prepares a sweeping initiative to renew and expand the infrastructure of the Empire. Railways will be modernized, new roads carved across the countryside, and the rapidly emerging technologies of the automobile integrated into the nation’s transport system. Freight that once crawled across rough provincial routes will soon travel swiftly along paved highways and modern rail corridors, allowing goods, workers, and ideas to flow with unprecedented speed. Through steel rails and endless roads, the government intends to breathe new life into the land itself."
gerdom.701.a:0 "All roads shall lead to Berlin."

gerdom.702.t:0 "The Kaiser Travels the Autobahn"
gerdom.702.d_willy2:0 "The great ribbon of concrete stretches across the countryside like a symbol of the Empire’s restless march into modernity. Where once journeys required long hours along crowded railways or uneven country roads, the new Autobahnen promises speed, efficiency, and the triumph of engineering over distance itself. Today, one of these modern highways receives a most distinguished traveler.\n\nDespite the years that weigh upon him, Kaiser Wilhelm II remains deeply fascinated by the wonders of the modern age. With evident enthusiasm, the Emperor took to the road in his personal automobile, accompanied by a modest motorcade and the Reichskanzler at his side. The small convoy glided along the Autobahn at remarkable speed, passing villages, fields, and factories that blurred together beneath the hum of the engine and the steady rhythm of rubber on concrete. Behind the glass the duo waved to the sovereign’s subjects, who had come from nearby towns to catch a glimpse of the high speed monarch, though the unceasing momentum caused many of their photos to blur."
gerdom.702.d_willy3:0 "The great ribbon of concrete stretches across the countryside like a symbol of the Empire’s restless march into modernity. Where once journeys required long hours along crowded railways or uneven country roads, the new Autobahnen promises speed, efficiency, and the triumph of engineering over distance itself. Today, one of these modern highways receives a most distinguished traveler.\n\nWith his exuberance and youth, Kaiser Wilhelm III has found himself enjoying the fast paced race through the landscape. The Emperor has taken to the road in his personal convertible, accompanied by a massive motorcade and Kurt von Schleicher at his side. The convoy glided along the Autobahn at remarkable speed, passing villages, fields, and factories that blurred together beneath the hum of the engine and the steady rhythm of rubber on concrete. From the open top the Kaiser waves to his subjects, who had come from nearby towns to catch a glimpse of the high speed monarch, though the unceasing speed often caused their photos to blur."
gerdom.702.a:0 "The distance between the Emperor and his subjects grows smaller and smaller."

gerdom.703.t:0 "The Reichsautobahn is Complete"
gerdom.703.d:0 "From the windswept plains of Brandenburg to the vineyards of the Rhineland, from the forests of Bavaria to the harbors of the North Sea, a ribbon of concrete now binds the Reich together. Years of tireless planning, engineering, and labor have culminated in a feat once thought impossible: a national highway network worthy of a modern empire.\n\nThe Reichsautobahn stretches across Germany like arteries of steel and stone, carrying the promise of speed, unity, and prosperity. Motorists may now travel from city to city in hours rather than days, while commerce flows more freely than ever before. Great sweeping bridges span valleys, elegant overpasses thread through hillsides, and long straightaways cut across the countryside like monuments to modern engineering.\n\nHaving been turned into a spectacle by the newspapers, the celebration of the Autobahn as a triumph of German ingenuity has been spread worldwide. The hundreds of thousands of workers employed in its grand construction have been slowly rolled off and moved to new projects and their camps closed. Many Engineers who have built their resume on the winding work boast of its unique quality or ambition while Industrialists speak eagerly of the new markets opened by rapid transport. Commerce and people can now move at breakneck paces to every region and economic centre of Germany, free travel for a free people."
gerdom.703.a:0 "There's no reason to not have a car anymore!"

gerdom.704.t:0 "The Kanzler and the Reichsbahn"
gerdom.704.d:0 "The life of a Kanzler is a restless one. Between cabinet meetings in Berlin, inspections of industry in Cologne, christening ships in Hamburg, speeches in Nuremberg, and attending soirées in Munich, the business of government demands constant travel. Yet for all the marvels of modern aviation, the Kanzler has chosen a far more dependable form of transportation atop the iron arteries of the Reich itself. The Kanzler’s personal railway carriage, discreetly attached to scheduled trains or special expresses, has become a familiar sight along the network’s great lines. A mobile office fitted for both labor and rest - it is where policy is drafted, telegrams are answered, and the affairs of state continue uninterrupted as the countryside rolls past the windows.\n\nThe Deutsche Reichsbahn, that sprawling lattice of steel rails and disciplined timetables, remains one of the proudest achievements of German infrastructure. Its locomotives thunder across forests, plains, and river valleys with the punctuality of a metronome, carrying ministers, soldiers, merchants, and workers alike from one end of the Empire to the other with overnight expresses and dining carriages. The government of the Reich moves along these tracks just as surely as its citizens do, bound together by the same steel network that unites the Empire from coast to frontier."
gerdom.704.a:0 "Far cheaper for the budget than flying."

gerdom.705.t:0 "The Reichsbahn is Complete"
gerdom.705.d:0 "For decades the iron web of the Reichsbahn has grown outward across the German lands,  piercing mountains and binding provinces together as new stations rise as monuments to the rhythm of modern life. What began as the patchwork systems of the old German states has long since been forged into a single unified network, stretching from the Baltic coast to the Alps and from the Rhineland to the eastern marches.\n\nNow, at last, the final planned expansions of the Reichsbahn’s great modernization program have been completed. Double-tracked mainlines thunder with express trains, freight corridors carry the lifeblood of industry, and vast marshalling yards sort wagons with mechanical precision. Coal from the Ruhr, steel from the foundries, grain from the countryside, and passengers from every province move along the same steel arteries. The Reich itself feels smaller, closer, more unified than ever before."
gerdom.705.a:0 "...Now, for a Europabahn!"

gerdom.706.t:0 "The Titans of German Automobiles"
gerdom.706.d:0 "The automobile, once an eccentric curiosity of daring engineers and adventurous aristocrats, has become one of the defining machines of the modern age. Across the German Empire factories roar with the production of engines and chassis, and the nation’s great automotive houses compete fiercely to define what the future of motoring will look like. Roads stretch ever further across the Reich, while new technologies promise vehicles that are faster, stronger, and more reliable than anything previously imagined.\n\nAs Zundapp has been charged by the state to produce the so-called \"Everyman's Automobile\", the Reichskanzler has enough resources to entrust another of Germany’s industrial titans with a new state-supported project. Through state backing this company will have complete autonomy to push the bounds of the industry and, if successful, put themselves at the cutting edge ahead of their competitors.\n\nAuto Union AG, an umbrella firm consisting of Audi, Horch, DKW and Wanderer, represents a bold alliance of engineering minds and innovative design, and their core project plan involves a vehicle that can handle a wide array of climates and geographies. Meanwhile, BMW carries a growing reputation for mechanical precision and reliability, stressing the importance of their work for the Heer’s continuous advancement. Lastly, Mercedes-Benz stands as the original Deutsch car brand and unquestioned symbol of German automotive prestige across the world, and their upcoming plans for the Grand Prix have perked the ears of most of the German aristocracy. The question of which group to offer support remains with the Kanzler."
gerdom.706.a:0 "Auto Union AG can develop a car even our colonies can use."
gerdom.706.b:0 "BMW has been remarkably proficient with military vehicles."
gerdom.706.c:0 "Mercedes-Benz will ensure that people see Germany when they think of luxury."

gerdom.707.t:0 "Baron von Oertzen Conquers the Weltreich"
gerdom.707.d:0 "The engineers of Auto Union have long been among the most daring innovators of the German automobile industry, and now they have turned their attention to a challenge worthy of the Empire itself: designing a vehicle capable of traversing not merely the roads of Europe, but the vast and often unforgiving environments of the Weltreich. Dusty colonial tracks, humid tropical climates, and long journeys across undeveloped territories demand a machine that is both robust and versatile.\n\nAt the center of this effort stands Baron Klaus von Oertzen, a talented engineer and executive whose experience abroad has given him a deep appreciation for the practical realities of travel far beyond the comfortable highways of Germany. Drawing upon his time spent in Southeast Asia and the colonies, von Oertzen has championed the development of a new light commercial vehicle, one whose origins lay in a modest Dutch businessman visiting a plant in Germany, able to service in a variety of roles from passengers and cargo, resulting in the new Auto Union \"Kombinationskraftwagen\", or simply the Kombi. Sporting forward controls and a cab-over format, it is a rugged squareset van driven by a four-cylinder engine with two side windows and removable seats for cargo. \n\nThe vehicle was tested personally by von Oertzen, using it to travel with a malaria researcher in Malaysia as well as for several hunting expeditions in Tanganyika. Amplifying the vehicle's appeal is the Baron's own status as a colorful figure within engineering circles. Spending a lot of time in Mittelafrika and Deutsch-Ostasien, even holding an Auto Union Grand Prix in Singapore, he has become known for his enthusiasm for foreign cultures, a taste he shares with his wife. The pair's fascination with Chinese art has filled their household with an impressive collection of curiosities, one expanding further through their Kombi's ability to more easily bring them to distant lands. Through all of this, von Oertzen embodies the cosmopolitan spirit of an Empire that now spans continents which has given him a prime position to design a car able to properly navigate every road in the empire with confidence."
gerdom.707.a:0 "The Empire must travel wherever its roads may lead."

gerdom.708.t:0 "A War Horse of Three Wheels"
gerdom.708.d:0 "Modern warfare demands not only tanks and artillery, but mobility at every level of the battlefield. Messengers, reconnaissance patrols, and supply detachments require machines capable of traversing rough ground with speed and reliability. Recognizing this need, the engineers of Bayerische Motoren Werke have turned their attention toward the development of a new military motorcycle designed specifically for the needs of the Heer.\n\nThe result is a formidable machine: the BMW R75, a powerful motorcycle equipped with a sidecar and engineered to endure the harsh conditions of military service. Its rugged suspension, powerful engine, and clever drivetrain allow it to traverse mud, snow, and uneven terrain with remarkable stability. For soldiers who must move quickly across chaotic battlefields, the three-wheeled vehicle promises to become an indispensable companion. With Zündapp, a core competitor for the Heer's orders for a military motorcycle, dedicating much of its industrial capacity toward the ambitious development of the Porsche Type 12 and other civilian projects, BMW’s longstanding experience with martial engineering has allowed the company to seize the initiative and build itself a true war horse of steel and gasoline."
gerdom.708.a:0 "A machine worthy of the Heer."

gerdom.709.t:0 "Amid a Split-Second World"
gerdom.709.d:0 "In the modern age, victory is measured in fractions of a second. Across Europe, the roar of engines and the blur of steel machines racing along grand circuits have become a proving ground for engineering supremacy. Nations boast not only of armies and factories, but of the speed and ingenuity of the machines their engineers unleash upon the track.\n\nFrom the workshops of Mercedes-Benz comes a machine seemingly built for this relentless contest with time itself: the W125. Sleek, powerful, and engineered with uncompromising precision, it represents the very peak of German automotive design. Built to the strict 750-kilogram Grand Prix formula, the machine conceals astonishing power beneath its streamlined bodywork. At its heart lies a massive supercharged straight-eight engine of 5.66 liters, driven by twin Roots compressors and capable of producing as much as 560 to 645 horsepower at 5800 revolutions per minute. Mounted upon a rigid steel ladder frame and paired with a four-speed manual transmission, the W125 is capable of reaching speeds well beyond 300 kilometers per hour.\n\nThe machine proved its worth immediately upon entering competition. At the Tripoli Grand Prix, Mercedes-Benz entered four of these gleaming silver racers against their fierce rivals from Auto Union. There, German driver Hermann Lang claimed victory, delivering the W125 triumph on its debut and ending a frustrating dry spell for Mercedes on the racing circuit. Since then the Silver Arrows have carved a fearsome reputation across Europe’s grand circuits. Records fall, competitors strain to keep pace, and many already whisper that the W125 may be the most powerful racing machine ever unleashed upon the road."
gerdom.709.a:0 "Faster still."

gerdom.710.t:0 "Formation of the Europäische Motor-Sport Behörde"
gerdom.710.d:0 "Across the roads and circuits of Europe the automobile has become more than a means of transport; it has become a spectacle. Crowds gather by the tens of thousands to watch roaring machines streak across countryside roads, city boulevards, and specially prepared racing circuits. What began as daring exhibitions by adventurous engineers has evolved into a continent-wide passion, where speed, precision, and mechanical mastery are celebrated as symbols of modern progress.\n\nYet competing national clubs maintain their own rules, different races operate under different standards, and the rapidly advancing technology of the automobile often outpaces the regulations meant to govern it. In response to this growing disorder, leading figures in European motoring guided by the powerful Allgemeiner Deutscher Automobil-Club have proposed the creation of a central authority capable of standardizing and organizing the sport across the continent. Thus was born the Europäische Motor-Sport Behörde, with the endorsement and sponsorship by Kaiser Wilhelm II himself. While not endorsed by the Internationale, with their own Association Internationale des Automobile Clubs Reconnus, across Mitteleuropa, the Hapsburg realms, and various other independent nations the EMSB has been embraced. The new body will establish unified regulations for Grand Prix competitions, certify circuits, coordinate international races, and ensure that the growing world of motor sport develops with both safety and spectacle in mind."
gerdom.710.a:0 "It's lights out, and away we go!"

gerdom.711.t:0 "SS Imperator Sails Again"
gerdom.711.d:0 "Few ships have ever captured the imagination of the world quite like the great ocean liners of the Imperator-class. When they first entered service, the SS Imperator and her sister ships represented the absolute pinnacle of maritime engineering, floating palaces of steel and steam carrying passengers across the Atlantic in unmatched comfort and grandeur. The first of the trio, christened SS Imperator and launched in 1912 for the Hamburg America Line, was at the time the largest passenger ship in the world. Her towering superstructures and lavish interiors stood as proud symbols of German industrial mastery and maritime ambition. Alongside her sister ships Vaterland and Bismarck, the Imperator-class became jewels of the Empire’s civilian fleet.\n\nYet the passing of years and the demands of modern travel have not been kind to these aging giants. Fires sparked by worn electrical systems and the simple toll of time has threatened to consign the once-glorious liners to obsolescence. Faced with the choice between retirement and renewal, the government and shipping companies resolved upon a complete refit. Engines have been modernized, interiors carefully restored and redesigned, and the ships themselves adapted to the evolving expectations of twentieth-century passenger travel.\n\nNow the SS Imperator sails once more alongside her sister ships, reborn for a new generation of voyagers. Passengers stepping aboard her decks find a fusion of imperial grandeur and modern engineering, a reminder that the Empire’s mastery of the seas did not end with the age of steam alone."
gerdom.711.a:0 "A marvel for the modern age!"

gerdom.712.t:0 "Surpassing Vitruvius"
gerdom.712.d:0 "From the monumental temples of ancient Rome to the soaring cathedrals of medieval Europe, civilizations have long measured their greatness by the structures they leave behind. Yet the builders of the modern age increasingly rely not upon armies of laborers, but upon machines of steel and hydraulic power capable of reshaping the earth itself. Construction has become an industrial science, driven by engineering precision and mechanical strength.\n\nAt the forefront of this transformation stands Demag, a German engineering firm with deep roots in heavy industry. Founded in 1910 through the merger of several prominent mechanical works in Duisburg and Benrath, Demag quickly earned renown for its cranes and industrial machinery. Its engineers designed the world’s largest floating crane used in the construction of the great ocean liners Olympic and Titanic. Over the years the company expanded its expertise to locomotives, rail equipment, excavators, and armored vehicles, steadily building a reputation as one of Germany’s most formidable manufacturers of heavy machinery.\n\nNow Demag has unveiled one of its most remarkable creations yet: the B504, a fully hydraulic excavator capable of rotating a full 360 degrees while operating either as a face shovel or backhoe. Powered by advanced hydraulic systems rather than cumbersome mechanical linkages, the machine moves with a smooth strength that promises to revolutionize construction itself."
gerdom.712.a:0 "The tools of the future are forged in steel."

gerdom.713.t:0 "Emptying the Vaults of the Earth"
gerdom.713.d:0 "The industrial age demands an appetite for resources unlike anything seen before in human history. Coal, iron, and lignite must be drawn from the depths of the earth in quantities that would have seemed impossible to earlier generations. To feed the furnaces of modern industry, engineers have turned to machines of unprecedented scale and power.\n\nFrom the workshops of Krupp has emerged one such titan: a colossal bucket wheel excavator designed to tear through entire landscapes in pursuit of the minerals below. Currently built  for mining lignite near Cologne, it has an enormous rotating wheel, studded with vast steel buckets over 16m in diameter. Carving great scars across the ground, the super structure supporting it weighs 5,500 tons, is over 180m long, with eighteen crawler units underneath  for movement. A conveyor belt evacuates the discharge while a massive counterweight boom balances the monstrous machine.\n\nIt is simultaneously a terrifying monument to industrial excess and a masterpiece of engineering efficiency. There can be little doubt that these towering machines represent the future of large-scale mining as it devours the land itself."
gerdom.713.a:0 "The earth yields to steel."

gerdom.714.t:0 "The Flying Hamburger"
gerdom.714.d:0 "Speed has become the defining obsession of the modern age. Railways, once content merely to be lumbering connections between cities, now compete with automobiles and aircraft in a race to redefine how quickly people may travel across the continent.\n\nThe Deutsche Reichsbahn has unveiled its answer to this challenge in the remarkable DRG Class SVT 877, a sleek diesel-powered train that the public has already christened the \"Flying Hamburger\". Ordered in 1932 and constructed by Waggonbau Görlitz, the streamlined train has entered service on the vital Berlin–Hamburg route of roughly 286 kilometers. Composed of two permanently coupled coaches equipped with a driver’s cab and passenger compartment. In these compartments the train carries ninety-eight passengers in comfortable saloon seating alongside a small four-seat buffet for refreshments during the journey.\n\nBeneath its polished exterior lies an engineering marvel. Each coach houses a powerful twelve-cylinder Maybach diesel engine driving a generator that powers electric traction motors, producing a combined output of over 600 kilowatts. With this innovative diesel-electric system the Flying Hamburger has achieved an astonishing feat: covering the Berlin–Hamburg line in just 138 minutes, an average speed of 124 kilometers per hour!"
gerdom.714.a:0 "Let it fly!"

gerdom.715.t:0 "Bigger Population, Bigger Cars"
gerdom.715.d:0 "The growth of the modern city has brought with it a challenge that the railways of the previous century were never designed to confront. Berlin, Hamburg, the Ruhr, and countless other urban centers swell with workers, clerks, and travelers each morning and evening, all demanding swift passage across the sprawling metropolitan landscapes of the industrial age. Platforms groan under the weight of crowds, while railway planners struggle to move ever greater numbers of passengers through the arteries of the Reich.\n\nGerman engineers have responded with a characteristically practical solution to double the seating via a new level. The Bilevel rail car has existed since 1855 with the Western Railway Company introducing a perilous iteration in Paris which had a series of undercover-openair benches on the roof of the rail car. This was later improved on with the Voiture État à 2 étages, however the design has never been popular outside of Paris. Based on these designs a new generation of passenger cars have been designed to bring the concept to the next stage. Unlike Paris's vulgar attempts, the engineers of the Reichsbahn have refined the concept for large-scale use within our increasingly crowded urban and transurban networks. Improving the safety and reliability, our new rail cars will be able to not only operate in dense urban corridors, but also in the arteries between cities."
gerdom.715.a:0 "More passengers, less delay."

gerdom.716.t:0 "The Brightest Spot of the World"
gerdom.716.d:0 "For generations the title of the "City of Lights" has belonged to Paris, a glittering monument to boulevards, spectacle, and the triumph of electric illumination. Yet across the Rhine a rival vision has begun to take shape. In Berlin, planners, engineers, and ministers of the Reich have thrown their weight behind the ambitious Elbe-Projekt, a vast transmission initiative which is the first commercial, static high voltage direct current transmission system constructed in the world.\n\nThrough the construction of new power stations, high-capacity transmission lines, and a web of modern electrical infrastructure stretching across the heart of the Reich, the Elbe-Projekt promises to flood Berlin with light on a scale previously unimaginable.\n\nYet the project reaches far beyond the boulevards of Berlin. The electrification radiating outward from the Elbe basin promises to bind the Empire together with an unprecedented network of power and efficiency. Workshops, railways, and homes across the Reich will soon draw from this expanding electrical lifeblood. If Paris once dazzled the world with its lights, Berlin now intends to surpass it."
gerdom.716.a:0 "Berlin shall shine brighter still."

gerdom.717.t:0 "The Empire of Lights"
gerdom.717.d:0 "With the final stages of the Elbe-Projekt complete, the transformation of Berlin stands as one of the most striking achievements of the modern German Empire. Vast power stations along the rivers and industrial basins now feed a blossoming electrical network, their currents flowing through cables that bind together the cities, factories, and railways of the Reich. All this grand effort has been centred in the city of Berlin, an exemplifier of the project's progress, now its complete electrification a success.\n\nIn a carefully staged ceremony the Kaiser, accompanied by ministers and engineers, proclaimed Berlin’s new status as \"the city of lights\" at the centre of \"the empire of light\" on film before the watching world. Paris may have once claimed this title due to its central role in the enlightenment, but the Kaiser’s declaration has reframed the phrase entirely. No longer would such brilliance belong to the boulevard-lined capital of decadence, it should now belong to the city who shines at the centre of a growing network of power stations and industries that now blaze with electric energy from the Rhine to the Vistula.\n\nYet even this triumph is only the beginning. Plans are already underway to extend the electrified grid further still, ensuring that Hamburg, Munich, Cologne, and countless other cities may share in the radiance that now defines the imperial capital."
gerdom.717.a:0 "Let the Reich shine."

gerdom.718.t:0 "The Court of Visionaries and Vice"
gerdom.718.d:0 "Behind the roaring furnaces and glittering storefronts of the German economy lies a structure unlike that of any other great power. Industry in the Reich is not simply a matter of countless firms competing freely for advantage within an unbound market. Instead, production is guided by a complex web of cartels - formal, legally binding agreements between independent companies to fix prices, regulate production quotas, and manage markets. Supported by the state, these are cornerstones of industrial development to stabilize prices and prevent ruinous competition. Steel, coal, chemicals, and machinery all flow through these organized systems, allowing German industry to operate with a unity according to the whims of these monopolies.\n\nThe scale of this arrangement is immense. More than 400 cartels operate throughout the Empire, though several stand as particularly influential pillars of the system. The Rheinisch-Westfälisches Kohlen-Syndikat, founded in 1893, commands the coal output of the Ruhr and serves as the central sales agency for its members. The Stahlwerksverband, established in 1904, regulates steel production and pricing across the Reich’s massive steelworks. In the chemical sector, IG Farben and Deutsche Bromkonvention coordinate the rapidly expanding industry that has made German chemistry world-renowned. Even specialized resources fall under such arrangements, as seen with the Kali-Syndikat, which tightly manages the production and sale of potash, a resource vital to agriculture and industry alike.\n\nWhatever one thinks of their influence the Reichskanzler cannot simply ignore or go to war against these institutions. The machinery of the German economy runs through them, and any government seeking to guide the Empire’s development must inevitably work alongside their directors and industrialists. Thus a careful balance must be endured to ensure these conglomerates remain aligned with the prosperity and strength of the Reich."
gerdom.718.a:0 "So long as they serve the interests of Germany, there will be no problems."

gerdom.719.t:0 "The Engineers' Quarrel"
gerdom.719.d:0 "Few industries symbolize the modern age quite like electricity. It powers factories, illuminates cities, and drives the motors that define the industry of today. At the heart of Germany’s electrical revolution stand two titans: Siemens and AEG.\n\nAllgemeine Elektricitäts-Gesellschaft, founded by Emil Rathenau, initially produced electrical equipment but has grown into the largest corporate entity working in Electrical power generation and transmission, Telecommunications, Automation and Transportation. Producing the first compressor-driven refrigerators, the invention of the hairdryer, as well as having the electrification of Ottoman Palestine under its belt, AEG has quite the resume.\n\nSiemens, founded in 1847 by Werner von Siemens, is composed of \"Siemens & Halske\", \"Siemens-Reiniger-Werke AG\", and \"Siemens-Schucker\" was key to found Germany’s electrical edge but has been out paced by AEG in recent years. Having built the world's first electric streetcar line, the first long-distance telegraph line in Europe and the first electric street lighting, it is still a strong contender.\n\nIn recent improvements to Berlin’s "Lampenstadt" which is Osram’s main plan in Friedrichshain this rivalry has played out. AEG is pushing to improve the power line to the plant to increase efficiency. Siemens believes that simply increasing the employees, and in turn sapping nearby competition, will do the same job of improving productivity. While they have cooperated in the past, jointly founding telefunken on the Kaiser's orders, it is up to the government to resolve the quarrel between these titans of German engineering."
gerdom.719.a:0 "Siemens is keeping things simple, they win this argument."
gerdom.719.b:0 "AEG is forward-thinking despite the expenses, agree to their plan."

gerdom.720.t:0 "An Electro-Mechanical Whir"
gerdom.720.d:0 "As the Empire’s electrification spreads across factories and workshops, a new generation of electro-mechanical motors begins to emerge from the laboratories and production lines of Germany’s great engineering firms. These compact yet powerful devices promise to transform both industry and everyday life. Driven by electricity rather than steam or manual labor, they hum quietly while performing tasks that once required cumbersome machinery or entire teams of workers.\n\nThe implications of such motors are immense. In military workshops they could power new tools, equipment, and specialized machinery that would increase the efficiency of armament production and maintenance. On the civilian side, however, these same devices could revolutionize manufacturing and consumer goods alike, enabling the development of appliances, machines, and small industrial equipment that bring electrical power directly into homes and smaller businesses. Siemens has presented designs emphasizing military applications and industrial durability, while AEG proposes versatile systems that could be adapted across civilian industries and consumer markets. With the Reich deciding which path will have funds concentrated on, the conglomerates lobby hard for the investment."
gerdom.720.a:0 "Siemens' military applications seem useful."
gerdom.720.b:0 "AEG's motors have far greater versatility."

gerdom.721.t:0 "Calling Friends, or Detecting Enemies?"
gerdom.721.d:0 "Electricity has already transformed the Empire’s factories and cities, but a new frontier now emerges from the laboratories of Germany’s great electrical firms. Invisible waves traveling through the air, signals that can carry voices across vast distances or reveal the presence of ships and aircraft long before the eye can see them. These developments promise to reshape both the battlefield and civilian life alike, yet which path shall receive the Empire’s immediate support?\n\nSiemens has presented an ambitious program focused upon the military potential of radio detection. Their engineers speak of devices capable of identifying distant aircraft and ships through reflected radio waves, a technological marvel that could provide warning against enemy fleets or bombers long before they appear on the horizon. In an age where the air war grows fiercer with every passing year, such an advantage could prove decisive.\n\nAEG, by contrast, proposes a far more civilian vision. Their engineers have put forward a vision of advanced telephone networks and long-distance communications, linking cities, industries, and households into a vast web of instantaneous connection. Such a system could magnify the ability of corporations to coordinate worldwide and allow civilians to communicate much easier."
gerdom.721.a:0 "We need to keep ahead of our enemies, go with Siemens' plans."
gerdom.721.b:0 "AEG's civilian-focused project will greatly improve living standards."

gerdom.722.t:0 "The Silhouette of Innovation"
gerdom.722.d:0 "The electrification and industrial expansion of the Reich has not only reshaped its economy but now its very skyline. New power stations, factories, research institutes, and industrial complexes rise across the Empire, their forms defining how the modern German city will appear to the world. Steel, concrete, and glass now compete with stone and marble as the materials of the age, and architects debate fiercely what shape the future should take.\n\nSiemens’ construction department, led by Hans Hertlein, supports a classicist style, grand facades, ordered symmetry, and architectural motifs that echo the heritage of European civilization. Based on their headquarters, the machines of modernity should be housed within structures that reflect a new imposing cultural style that strengthens imperial dignity\n\nAEG, under the leadership of the first industrial designer and architect Peter Behrens, cautions against such a move. Advocating for a functionally-guided approach to industrial design, which has dominated Berlin, Behrens’ comprehensive corporate graphic style seeks to create forms that accord with the character of the object. Behrens seeks to make the interior and exterior as simple as parameters allowed with many of his buildings described as ’temples of the turbine’.  This ubiquitous German Art Nouveau style is a reaction against the greco-roman neo-classist architecture which Siemens seeks to introduce."
gerdom.722.a:0 "Siemens has some illustrious new ideas, hire on their architects."
gerdom.722.b:0 "AEG has experience in these matters, they should take the lead."

gerdom.723.t:0 "Europe Interlinked"
gerdom.723.d:0 "The electrification of the Reich has already illuminated its cities and powered its industries, yet an even grander ambition now emerges among Germany’s planners. As the electrification of Germania has unlocked efficiency and bound its provinces together in mutual benefit, why could it not bind together the whole of Mitteleuropa? Engineers who cut their teeth energising Posen now begin drawing up rough outlines of an immense continental grid, a vast network of transmission lines carrying power across borders. Such a system would mean collective contribution into a system able to balance the needs of the vast economies of Central and Eastern Europe into a single electrical organism.\n\nSiemens’ engineers are seeking to emphasize efficiency and reliability, advocating a carefully calculated network that balances production and demand while avoiding excessive cost. Their design would utilize existing generation and transmission infrastructure where it can, only replacing when absolutely needed. Such a system would ensure that power flows without draining the Reich’s treasury in extravagant construction.\n\nAEG, however, advances a far more ambitious vision. Their proposal would construct immense generating stations centralised in Germany and powerful transmission lines capable of flooding the entire Mitteleuropa sphere with electricity. The system would be costly but futureproof and nations linked into such a network would become increasingly dependent upon the industrial heart of the Reich."
gerdom.723.a:0 "Siemens is keeping the budget in mind!"
gerdom.723.b:0 "AEG's "generosity" will help us gain favors in Mitteleuropa."

gerdom.730.t:0 "AEG Ends Cooperation"
gerdom.730.d:0 "The uneasy partnership between the Reich and its great electrical firms has rested upon a delicate balance of influence, contracts, and prestige. Though competition between Siemens and AEG has always been fierce, the government’s vast electrification and industrial programs compelled the two titans to work side by side in service of the Empire. Yet such arrangements cannot endure forever and the fragile balance between the two rivals has tipped.\n\nWithin the boardrooms of AEG, frustration has steadily mounted. Repeated government decisions favoring their rival have left the company increasingly sidelined in projects that it once considered central to its future. Executives now argue that the arrangement has become untenable, claiming that their cooperation has yielded little more than mounting losses and diminished influence while Siemens enjoys the lion’s share of contracts and prestige. AEG has formally withdrawn from several cooperative arrangements with the government, announcing that it will no longer continue a partnership in which it believes its interests are being sacrificed."
gerdom.730.a:0 "Damn!"

gerdom.731.t:0 "Siemens Ends Cooperation"
gerdom.731.d:0 "The uneasy partnership between the Reich and its great electrical firms has rested upon a delicate balance of influence, contracts, and prestige. Though competition between Siemens and AEG has always been fierce, the government’s vast electrification and industrial programs compelled the two titans to work side by side in service of the Empire. Yet such arrangements cannot endure forever and the fragile balance between the two rivals has tipped.\n\nWithin the boardrooms of Siemens, frustration has steadily mounted. Repeated government decisions favoring their rival have left the company increasingly sidelined in projects that it once considered central to its future. Executives now argue that the arrangement has become untenable, claiming that their cooperation has yielded little more than mounting losses and diminished influence while AEG enjoys the lion’s share of contracts and prestige. Siemens has formally withdrawn from several cooperative arrangements with the government, announcing that it will no longer continue a partnership in which it believes its interests are being sacrificed."
gerdom.731.a:0 "Damn!"

gerdom.732.t:0 "Does Animosity Preclude Patronage?"
gerdom.732.d:0 "Steel is the skeleton of modern civilization. It rises in the frames of factories, roars beneath the wheels of locomotives, and marches to war in the armor of tanks and the hulls of ships. Across the Reich the furnaces of the Ruhr and Saar burn day and night, pouring forth rivers of molten metal. The Krupp conglomerate began in steelwork, with Friedrich Krupp launching the family's activities by building a pioneering steel foundry in Essen in 1811 which has continued to be the company’s core as it expanded. Rivaling Krupp stands the United Steel Work, a cartel of several companies that merged the production of 40% of the steel and 20% of the coal produced in Germany.\n\nForeign buyers clamor for access to this bounty of steel, eager to purchase the metal that underpins the Empire’s industrial dominance. Exporting these resources would bring immense profits and further bind foreign markets to German industry. At the same time, however, the virtues of protectionism are well known within the government and the defence ministry are fighting to restrict sales due to the strategic advantage. Should German steel be sold freely to the world, allowing profit and influence to flow outward with every shipment, or should its distribution remain tightly controlled to ensure that Germany alone enjoys the full strength of its industrial might?"
gerdom.732.a:0 "If they can pay for it, they can have it."
gerdom.732.b:0 "Restrict the sale of German steel."

gerdom.733.t:0 "The Central Bank Debate"
gerdom.733.d:0 "The financial architecture of the German Empire has always been something of a compromise between unity and tradition. While the Reichsbank stands as the central pillar of the Empire’s monetary authority, a number of regional Notenbanken - note-issuing banks rooted in the federal traditions of the old German states - continue to exist alongside it. These institutions, relics of a more decentralized era, still exercise limited authority over regional credit and currency circulation. \n\nWhen the Reichsbank was established by legislation of the Reichstag in 1875, it was built from the bones of the Bank of Prussia and Hamburger Bank but 33 Notenbanken remained, though laws stopped any more from forming. After the panic of 1873, Ludwig Bamberger fought for further centralisation against the incumbent local banks of issue and defenders of state rights, led by Ludolf Camphausen. This struggle ended up leaving only the Bayerische Notenbank, Bank of Baden, Bank of Saxony, and Württembergische Notenbank as residual note-issuing institutions.\n\nThis arrangement represents inefficiency bordering on anachronism. In an age of vast national industries, global trade networks, and coordinated economic planning Germany’s financial system must be brought fully under centralized control. Only a unified banking authority can ensure the discipline and coordination required for the Empire’s growing economic ambitions.\n\n Despite this it's clear the member states will fight hard to keep their federal rights and economic power in these banks as a counterbalance to Berlin. The regional banks will argue that their existence allows the financial system to remain flexible and responsive to local conditions, which has served Germany well for decades."
gerdom.733.a:0 "It's about time the Empire removes these remnant pieces of federalism."
gerdom.733.b:0 "Our decentralized practices are our strength."

gerdom.734.t:0 "Regulating Credit"
gerdom.734.d:0 "Credit is the quiet engine of the modern economy. Behind every new factory, railway, and department store lies a web of loans and financial agreements that transform ambition into steel and brick. Germany’s great banks such as Deutsche Bank, Dresdner Bank, and others have long served as the architects of this financial machinery, directing capital into the projects that shape the Empire’s future.\n\nYet as the scale of the German economy grows, so too does the question of whether such immense power should remain entirely in private hands. Some voices within the government argue that banks must be compelled to direct credit toward investments that strengthen industry, infrastructure, and technological advancement. The recent Black Monday crash has emboldened such claims with popular sentiment strongly against the institutions that caused such chaos.\n\nOthers caution against such intervention. Germany’s bankers, after all, built one of the most formidable financial systems in the world precisely because they were allowed to exercise judgment free from political interference. A third and innovative option has been proposed that diverges from either opinion entirely by encouraging banks to expand consumer credit and household spending by expanding the use of credit cards. By popularising the use and allowing women into the system, it would expand the prosperity of the Empire out of the factories but into the homes and daily lives of its citizens, expanding market share and the possible growth of consumer industry."
gerdom.734.a:0 "Force the banks to be preferential towards investments."
gerdom.734.b:0 "The bankers know what they're doing, let them handle it."
gerdom.734.c:0 "Consumer spending should invigorate the economy, oblige them to make credit cards."

gerdom.735.t:0 "Appointing a President of the Kaiser Wilhelm Society"
gerdom.735.d:0 "Few institutions better symbolize the scientific ambition of the German Empire than the Kaiser Wilhelm Society. Founded in 1911 under imperial patronage, the Society was conceived as a grand alliance between state, industry, and academia operating outside the traditional university system to advance scientific knowledge with direct industrial and military applications. Within its laboratories physicists probe the mysteries of the atom, chemists unlock new industrial processes, and engineers experiment with technologies that promise to transform both industry and warfare.\n\nHeaded first by Adolf von Harnack and later by Max Planck, the Society’s institutes have produced discoveries that echo far beyond the walls of their laboratories. With Planck’s presidential tenure now up for review, several notable figures have put their names forward to guide the Society’s future. Planck himself has provided steady leadership, advancing theoretical physics and laying the foundations of quantum mechanics, a revolutionary framework for understanding atomic and subatomic processes. Challenging him is his longtime colleague Fritz Haber, the celebrated chemist behind the Haber process - a method for synthesizing ammonia from nitrogen and hydrogen that made possible the large-scale production of fertilizers and explosives. Today nearly a third of global food production relies on ammonia derived from the Haber–Bosch process. Yet Haber’s candidacy remains controversial: both his Jewish heritage and his role in developing chemical weapons during the Weltkrieg have drawn fierce international criticism eagerly exploited by rival candidate Ludwig Bieberbach.\n\nBieberbach, a mathematician and founder of the movement known as \"Deutsche Mathematik\", argues for a distinctly German style of mathematics rooted in intuition of a national character, openly denouncing what he describes as the abstract formalism of \"Jewish mathematics\". Completing this unusual field is the young engineer Wernher von Braun, whose pioneering work in practical physics and aerospace engineering has attracted growing attention. His early theses on liquid-propellant rockets and detailed studies on rocket construction and launch systems hint at technologies that may soon carry warfare and humanity itself into entirely new frontiers."
gerdom.735.a:0 "Wernher von Braun is inspiring!"
gerdom.735.b:0 "Fritz Haber is at the forefront of our developments, appoint him."
gerdom.735.c:0 "Max Planck is doing a fine enough job, renew his term."
gerdom.735.e:0 "Ludwig Bieberbach will ensure our science remains German."

gerdom.736.t:0 "The Society's Preferential University"
gerdom.736.d:0 "Although the Kaiser Wilhelm Society operates largely through its independent research institutes, its success has always depended upon indirect cooperation with Germany’s great universities. These ancient centers of learning provide the Society with its most promising young scientists, though the society was founded to not require their existing infrastructure. As the Reich now seeks to further entwine these two institutions, however, the Kaiser seeks a candidate university to be the chief collaborator.\n\nSeveral venerable candidates have presented themselves to the Society, seeking to gain increased research funding in return for a stable supply of scientists and use of their facilities. The Ruprecht Karl University of Heidelberg, the nation’s oldest universities, offers a tradition of scholarship that stretches back centuries as well as a strong history of coeducation and a strong liberal cohort. The Ludwig-Maximilians University of München, meanwhile, stands at the center of Bavaria’s growing scientific and industrial life while also being at the centre of art and culture. Previous graduates include Wilhelm Röntgen, Werner Heisenberg, Otto Hahn, Thomas Mann, Carl Schmitt, Konrad Adenauer and even the society’s own Max Planck. However, the University of Leipzig, under its motto of \"Crossing boundaries out of tradition\", was modeled after the University of Prague which produced Jan Hus. A centre of culture and humanities, it bore Goethe, Nietzsche and Wagner, as well as scientists such as Felix Bloch, Werner Heisenberg and Sin-Itiro Tomonaga who are deep in the questions of quantum mechanics. Whichever institution the Society favors will find itself at the forefront of Germany’s scientific renaissance and aflush with money to grow its experimental capabilities."
gerdom.736.a:0 "The University of Heidelberg"
gerdom.736.b:0 "The University of Munich"
gerdom.736.c:0 "The University of Leipzig"

gerdom.737.t:0 "Decadence Breeds Prosperity"
gerdom.737.d:0 "Industrial might and disciplined efficiency have built the foundations of the German economy, yet prosperity is not measured by steel alone. In the salons of Berlin, the boutiques of Munich, and the grand department stores of Hamburg, another kind of industry quietly flourishes devoted to luxury. Fine clothing, masterfully crafted jewelry, and gleaming pleasure yachts have become symbols of status across the Empire and far beyond its borders.\n\nPrussian kultur demands such ventures to be labeled as frivolous indulgences, but economists see such a development as the next step to complete Germanic supremacy. Luxury industries cultivate exceptional craftsmanship, encourage artistic design, and open lucrative export markets among the world’s wealthy elites. A finely tailored suit or a brilliantly cut gemstone bearing the mark of German workmanship carries prestige that cannot easily be replicated by rivals abroad and creates a soft power amongst world elites.\n\nThus the government considers whether to encourage investment into these opulent sectors. By nurturing industries that appeal to wealth and taste, Germany may not only enrich its artisans and entrepreneurs, but also project an image of sophistication and prosperity that rivals the famed elegance of Paris or London. Which luxury industry will get the most funding however remains to be seen."
gerdom.737.a:0 "German fashion should dominate the aristocracy."
gerdom.737.b:0 "The Kaiser likes his ships, so let's invest in yachts."
gerdom.737.c:0 "Jewelry has centuries-long traditions in Germany!"

gerdom.749.t:0 "Save What Remains"
gerdom.749.d:0 "The unthinkable has begun to be spoken aloud within the High Command’s Grosses Hauptquartier. Core cities that once knew the war only from newspapers now echo with the thunder of distant artillery, and Germania herself now faces the possibility of oblivion. However, an empire is not merely soil, but an ever-present force that stretches across the globe, upheld by all those who maintain its order. From the vast territories of Afrika to the distant ports of Ostasien, the banners of the Kaiser still fly.\n\nThus grim calculations are now being made. What can be saved, and what must be abandoned to the advancing storm? The Reich’s railcars, ships, and aircraft could carry artillery, engines, and machines that might one day arm a reborn Germany. Others insist that men are the true strength of any nation, arguing that trained soldiers and skilled workers must be evacuated before all else. They point to the example of the Entente exiles, whose scattered population laid the foundation for a new state upon foreign shores.\n\nAnd then there is the most radical proposal of all. Within the sealed chambers of the Admiralty and the General Staff, a contingency long buried in secrecy has been brought forth: Operation Bifrost. Named for the mythical bridge between worlds, it would mean a complete retreat from Europe to the Empire’s overseas holdings, surrendering the homeland entirely while transporting as much of the Reich as possible across the seas. As the waters rise, the operation would remain hidden from our enemies while the front is held long enough for the German nation, carried upon the navy’s arks, to flee toward its salvation."
gerdom.749.a:0 "Save the machines of war."
gerdom.749.b:0 "Save the men who will fight again."
gerdom.749.c:0 "Prepare Operation Bifrost."

gerdom.750.t:0 "End of the Second Weltkrieg"
gerdom.750.d:0 "The cannons have fallen silent across continents. From the frozen plains of the East to the shattered boulevards of the West, the Second Weltkrieg has at last reached its thunderous conclusion. The banners of our enemies lie trampled in the mud of history, their grand proclamations reduced to whispers beneath the steady march of German boots. Years of sacrifice, rationing, blood, and iron have culminated into this singular, undeniable truth: the Reich endures and stands supreme.\n\nThe war tested the very sinews of our nation. Factories burned through the night, mothers sent sons to distant fronts, and the steel arteries of our railways carried the weight of a continent’s fate. Yet where others fractured under strain, we hardened. Where rival empires gambled on our exhaustion, they found instead our resolve. Now a new Europe lies before us, one quiet and riper for a glorious future than even the Europe found in the aftermath of the First Weltkrieg.\n\n A new dawn has risen across the world but the question of the new world order for this era must be answered. The very shape of the continent will be redrawn by steady hands in Berlin, and the age of uncertainty and revolution has ended.\n\nA German century begins."
gerdom.750.a:0 "Europe has finally been brought under our wing."

gerdom.751.t:0 "Nanzig Joins the Reich"
gerdom.751.d:0 "The city of Nanzig, long a frontier of contesting identities and shifting sovereignties, has now been formally integrated into the Reich. With administrative decree and ceremony, the territory is incorporated into Elsaß–Lothringen, binding its future inseparably to that of Germany.\n\nThis bureaucratic adjustment has now grown the \"black mark\" in the french psyche to a new grand proportion, setting in stone its permanence. The scars of past wars and fragile armistices have been swept aside in favor of this showing of undeniable German victory over our Western rival. Infrastructure, governance, and law will be harmonized with the greater Reich, ensuring that the region’s industry, culture, and strategic value serve the unified Imperial state. For the Reich, it is another stitch in the carefully woven fabric of continental order ensuring the permanent strength and prestige of the realm to endure."
gerdom.751.a:0 "All of its roads lead to the Place Stanislas."

### Foreign Events ###

gerfor.1.t:0 "Union of Britain Attacks Denmark"
gerfor.1.d:0 "The Union of Britain has declared war on Denmark. This invasion threatens to disrupt the balance of power in favour of the Internationale, and the Danish government has asked for our help. Shall we warn the Syndicalists about the foolishness of their actions or say nothing, and risk losing Denmark?"
gerfor.1.a:0 "Warn them to turn back or face German arms!"
gerfor.1.b:0 "We have enough problems to be dealing with."

gerfor.2.t:0 "Germany Sends an Ultimatum Over Denmark"
gerfor.2.d:0 "The Second Reich has sent an ultimatum to London. We are to either make peace with Denmark and declare a ceasefire or Germany will come to Denmark's aid. Though it is certainly in our interests to seize the Skagerrak and pose a dangerous threat to Germany on its northern border, calling their bluff may prove to be extremely risky."
gerfor.2.a:0 "We will not risk war with Germany over this."
gerfor.2.b:0 "We do not negotiate with imperialists."

gerfor.3.t:0 "German Assistance Against Britain"
gerfor.3.d:0 "We are in a state of war with the Union of Britain. Our military, while proud, will not be able to withstand the Syndicalist onslaught. Some influential figures are petitioning us to ask the Germans for help, even if it might mean having to accept some German influence after the invasion is repelled. What shall we do?"
gerfor.3.a:0 "Thank you Berlin!"
gerfor.3.b:0 "The Germans cannot be trusted."

gerfor.4.t:0 "Union of Britain Backs Down"
gerfor.4.d:0 "After the ultimatum was received by London they quickly sent orders to all of their commanders on the ground to cease fire and return to the British Isles. We have achieved a diplomatic victory today. We have shown the world that we will stand up to Socialist and Syndicalist aggression. We will protect any nation under threat from Britain or the Commune."
gerfor.4.a:0 "Yet again German diplomacy wins the day."

gerfor.5.t:0 "Britain Ignores Our Denmark Ultimatum"
gerfor.5.d:0 "Despite the ultimatum being received by London their forces continue their move towards Danish territory, demonstrably ignoring our simple demands. We can either declare war and bring Denmark into our alliance or we can stand down and let Denmark fall, creating a northern front with our Syndicalist foe."
gerfor.5.a:0 "They have made their choice, war it is!"
gerfor.5.b:0 "Back down. There will be peace in our time."

gerfor.6.t:0 "Britain Backs Down Over Denmark"
gerfor.6.d:0 "After the ultimatum was received by London they quickly sent orders to all of their commanders ordering an immediate ceasefire and withdrawal to British territory. Denmark's independence has been preserved and our pride left intact. All the same, the fact that it took German intervention to protect us is somewhat unsettling."
gerfor.6.a:0 "We couldn't have done it without them."

gerfor.7.t:0 "Internationale Seeks to Reunify Italy"
gerfor.7.d:0 "The combined forces of the French Commune and the Socialist Republic of Italy have launched an attempt to seize the entirety of Italy. This invasion threatens to disrupt the balance of power in Europe in favour of the Syndicalists. Shall we warn the Internationale that this threatens world peace or let the peninsula fall to their malignant ideology?"

gerfor.8.t:0 "Germany Sends an Ultimatum Over Italy"
gerfor.8.d:0 "The German Empire has sent us a telegram, demanding that either we end our intervention in Italy and declare a ceasefire with the Italian states or the Reich will intervene by force."

gerfor.9.t:0 "Germany Sends the Internationale an Ultimatum"
gerfor.9.d:0 "The Kaiserreich has come to our aid! They have sent an ultimatum to the Commune of France over their support for the Socialist Republic of Italy in its attempts to conquer the entire peninsula. The Germans demand that the Syndicalists fall back or risk utter annihilation."

gerfor.10.t:0 "Commune of France Withdraws from Italy"
gerfor.10.d:0 "After the ultimatum was received by Paris, they quickly withdrew their forces from the frontlines and abandoned the peninsula. Our independence will be preserved, and our pride left intact."
gerfor.10.d.sri:0 "Drawing [FRA.GetNameDef] into our war with [ITA.GetNameDef] was perhaps not the wisest idea. The war drew the attention of the Reich which issued an ultimatum to [FRA.GetNameDef] to cease the invasion. The [FRA.GetAdjective] government has complied, ordering our own forces to stand down. We have little choice but to comply."

gerfor.11.t:0 "Commune of France Backs Down in Italy"
gerfor.11.d:0 "After we sent an ultimatum to the Commune of France to cease their intervention in Italy and backing for the Italian Syndicalists in the war, they wisely decided to comply. Already Red forces are withdrawing and our prestige has been greatly heightened. Yet again we have used diplomacy to help guard the balance, and improve prospects for European peace."

gerfor.12.t:0 "Commune of France Ignores Italian Ultimatum"
gerfor.12.d:0 "Our ultimatum was flatly ignored. Already SRI and Communard forces are on the march in Italy and refusing to return to their pre-war boundaries. The other states of the Italian peninsula are threatened existentially and Syndicalism is poised to spread its vile ideology to every corner of the land. The issue now is, do we back up our ultimatum with force and declare war on the Internationale?"

gerfor.13.t:0 "Commune of France Invades Spain"
gerfor.13.d:0 "The armed forces of the Commune of France have launched an invasion of the Spanish state. This invasion threatens to disrupt the balance of power in favour of the syndicalist alliance. Shall we warn the syndicalists about the foolishness of their actions or let Spain fall?"

gerfor.14.t:0 "Germany Sends an Ultimatum over Spain"
gerfor.14.d:0 "Monarchies are as thick as thieves. After we began our campaign against the Spanish kingdom we received a message from Berlin ordering us to cease and desist in our military efforts. They claim that if we do not bring our forces back beyond the Pyrenees they will intervene militarily to preserve the current status quo."

gerfor.16.t:0 "Commune of France Backs Down in Spain"
gerfor.16.d:0 "The Germans have achieved a significant diplomatic coup today, and helped preserve our independence. After the Reich sent an ultimatum to the Commune of France ordering them to cease their military aggression towards us, the French wisely decided to comply and brought their troops back from beyond the Pyrenees. The status quo remains, for now at least, intact."

gerfor.17.t:0 "Commune of France Ignores Spanish Ultimatum"
gerfor.17.d:0 "Despite our public condemnation of the Communard invasion of the Spanish Kingdom and subsequent ultimatum, the French have refused to pull their forces back. The possibility of the loss of yet another European monarchy can no longer be discounted, and the choice is now incumbent on us to decide how we should respond to this flagrant dismissal of German hegemony."

gerfor.24.t:0 "Enemy at the Gates"
gerfor.24.d:0 "The Russians have reached the Oder. There has been little outright panicking in Berlin but it is clear that without a counter-attack Germany is greatly endangered. The last supply reserves have been distributed to volunteers and everyone is participating in this last effort to defend the Vatherland."
gerfor.24.a:0 "Not one step back!"

gerfor.25.t:0 "Die Wacht am Rhein"
gerfor.25.d:0 "The French have reached the Rhine. Our substantial border fortifications were seemingly unable to stop their inexorable advance and now our crucial industrial cities are falling one after another. The situation is quite dire, and already there are treasonous murmurings that the Communards could reach Berlin itself."
gerfor.25.a:0 "They must be stopped!"

gerfor.26.t:0 "Fate of Spanish Morocco"
gerfor.26.d:0 "With Syndicalist forces taking control of Spain our colonial possessions in North Africa might be endangered. As a preventive measure our general staff has suggested that we occupy Spanish Morocco before the CNT-FAI stabilise their rule and spread their foul influence into our colonies."
gerfor.26.a:0 "Occupy Spanish Morocco!"
gerfor.26.b:0 "Dirt piles are beneath our concern right now."

gerfor.27.t:0 "Germany Occupies Spanish Morocco!"
gerfor.27.d:0 "The German Empire, in a show of absolute arrogance and disrespect towards our state, has occupied Spanish Morocco. Shockingly, their forces have even moved into Ceuta and Melilla, two cities that have been inviolable Spanish territory for many centuries."
gerfor.27.a:0 "There is nothing we can do..."
gerfor.27.b:0 "Such outrage will not be tolerated!"

gerfor.28.t:0 "Logging in Madagascar"
gerfor.28.d:0 "The island of Madagascar has been under our rule for several decades and it is an untapped source of rare timbers like ebony and several varieties of rosewood. As these sources have not been exploited, several industrialists and members of the colonial government have proposed that we establish a joint-stock company with authority over the timber industry on the island. Shall we decree the establishment of such a company?"
gerfor.28.a:0 "Create a new joint-stock company."
gerfor.28.b:0 "Leave the industry alone."

gerfor.29.t:0 "Expanded Logging in Madagascar"
gerfor.29.d:0 "The joint-stock company that we established has began to show some results and our inventory of rare timber has steadily increased. However, with the mechanisation of logging, several thousand locals have been put out of work. The company has at the same time advised that we begin construction on a new timber processing plant to streamline production. If we were to fund this new project it would kill two birds with one stone, so to speak."
gerfor.29.a:0 "Create the new processing complex."
gerfor.29.b:0 "In this economy?"

gerfor.30.t:0 "New Madagascan Processing Complex"
gerfor.30.d:0 "The new timber processing complex has opened and the transformative effects on the local economy were immediate. Many workers responsible for the initial construction were retained by the company and many new workers were needed after construction was complete, dramatically increasing employment in the area. The access to rare timbers has also increased and a gala was held in Tananarive to toast the new complex's opening."
gerfor.30.a:0 "A successful colonial endeavour."

gerfor.31.t:0 "Uprising on Madagascar"
gerfor.31.d:0 "With no end in sight to the rising unemployment on Madagascar, many Malagasy locals, and especially the former loggers, have risen against us. What started as merely a local insurrection quickly spiralled into outright rebellion with an independence war brewing."
gerfor.31.a:0 "We really don't need this right now..."

gerfor.32.t:0 "A Second Peace With Honour"
gerfor.32.d:0 "With the fall of France our armed forces have unsuccessfully tried to gain control over the British Isles and decisively end the war in our favour. Unfortunately, Republican resistance has proven stronger than we previously anticipated, and attempts to launch a full-scale naval invasion have soured. We can now either continue the armed struggle or try to end this futile conflict by way of a peace treaty."
gerfor.32.a:0 "It is time for an armistice."
gerfor.32.b:0 "This will only end with German boots marching through London."

gerfor.33.t:0 "Germany Proposes a Second Peace With Honour"
gerfor.33.d:0 "Attempts from the Reichspakt to gain a foothold on our island and decisively end the war have failed miserably. Though the collapse of the Commune was a terrible blow to the Revolutionary cause, British arms have proven to be too much for Jerry to handle. Now the leadership of the German Empire is offering us a proposal - to terminate conflict between the Reichspakt and the remaining members of Internationale in exchange for mutual recognition. How shall we react?"
gerfor.33.a:0 "Survival is all we can hope for. Sign."
gerfor.33.b:0 "Another humiliation? Never again!"

gerfor.34.t:0 "Second Peace with Honour Signed"
gerfor.34.d:0 "It is finally done. Though we had hoped for the total obliteration of the Union of Britain and the end to Syndicalist influence in Europe, alas it was not to be. Instead the British wisely decided to make terms with us, signing the treaty in sight of a full German military parade. With this the bulk of the fighting is now over, and the Second Weltkrieg virtually ended in Europe."
gerfor.34.a:0 "Peace at last!"

gerfor.35.t:0 "The British Refused Peace!"
gerfor.35.d:0 "In a staggering display of British stubbornness, the Syndicalist wretches flatly denied our calls for a peace treaty. Instead of swallowing their pride and accepting the inevitable, the Republican government said that they would not have a Second Peace With Honour, and would end the war by marching through Berlin."
gerfor.35.a:0 "They will pay for this insolence."

gerfor.36.t:0 "Ethnic Conflict on Sri Lanka"
gerfor.36.d:0 "Ceylon Island is settled by Sinhalese and Tamils, who have battled for supremacy on the island for ages. With Black Monday wreaking havoc on our economy and colonial administration, disobedience from the native population is becoming intolerable. Our presence on Ceylon, crucial for its supplies of rubber, is becoming increasingly precarious."
gerfor.36.a:0 "Damn those nationalists!"

gerfor.37.t:0 "Union of Britain Invades Norway"
gerfor.37.d:0 "The Union of Britain has made the bold move of declaring war on the Norwegians, seeking to impose Syndicalism on them by force of arms. This invasion shows scant regard for German supremacy in Europe and the status quo that we have spent years maintaining. The question now is, what should our response to be this act of barbarism by the British?"

gerfor.38.t:0 "Germany Sends an Ultimatum over Norway"
gerfor.38.d:0 "We have received a damning telegram from the Reich. They are demanding that either we cease our invasion of Norway or face the full might of the Kaiserliche Marine. They cite the inviolability of sovereign European nations and a whole lot of guff about guarding the balance, but everyone knows that this act stems from German's desperate attempts to hold onto their hegemonic status on the continent. What should our response be?"

gerfor.39.t:0 "Germany Warns the Union of Britain over Norway"
gerfor.39.d:0 "Germany has come to our aid! They have sent an ultimatum to the Union of Britain, either fall back to their home islands or risk annihilation."

gerfor.40.t:0 "The Union of Britain Backs Down"
gerfor.40.d:0 "After the ultimatum was received by London they quickly sent orders to all of their commanders on the ground to cease fire and return to the coast. We have achieved a diplomatic victory today, we have shown the world we will stand up to Socialist and Syndicalist aggression. We will protect any nation under threat from Britain or France."

gerfor.41.t:0 "Britain Ignores Our Norwegian Ultimatum"
gerfor.41.d:0 "In a display of repugnant audacity, the Union of Britain ignored our ultimatum. North Sea operations do not seem to have altered at all and the Republicans are continuing the war against Norway. We cannot risk the red tide of Syndicalism sinking its tendrils into yet another nation, particularly one important to our strategic interests. At the same time, open war with London would distract us at an inopportune time and potentially lead to the Internationale joining in."

gerfor.42.t:0 "The British Withdraw from Norway"
gerfor.42.d:0 "The Union of Britain appears to have listened to wise counsel, and ceased their operations in the North Sea. The German ultimatum appears to have scared them off, and Syndicalism stopped from claiming yet another scalp."

gerfor.43.t:0 "Treaty with Ireland"
gerfor.43.d:0 "With the Syndicalists awakening all over the world it is crucial for the Reichspakt to help potential allies whenever possible. With Irish sympathies swayed towards Germany due to our support during the War of Independence there now exists the possibility of gaining a strong foothold just under the socialists' noses by getting Ireland into the Reichspakt. We should start by offering them equipment and construction support."
gerfor.43.a:0 "Offer Ireland aid if they join the Reichspakt."

gerfor.44.t:0 "German Offers Support"
gerfor.44.d:0 "The German ambassador has approached us with an offer: if Ireland signs a treaty of association with the Reichspakt Germany will invest in our economy and military. While the benefits from this deal would be immense there are some in the government who are unwilling to rely on foreign aid."
gerfor.44.a:0 "Where do I sign?"
gerfor.44.b:0 "We are doing fine on our own."

gerfor.45.t:0 "Ireland Signs the Treaty"
gerfor.45.d:0 "The Irish have agreed to our offer. According to the treaty we are to supply industrial machines and the licences required to construct additional ones in Ireland itself. Additionally, we are obliged to construct and deliver guns, artillery pieces, and a number of aircraft and armour pieces to bolster their armed forces."
gerfor.45.a:0 "Begin the construction then!"

gerfor.46.t:0 "Ireland Refuses the Treaty"
gerfor.46.d:0 "Unfortunately, the Irish have decided to turn our offer down. Still, our obligations towards Ireland remain the same as they were before."
gerfor.46.a:0 "Oh well."

gerfor.47.t:0 "Irish Treaty Obligations"
gerfor.47.d:0 "We have finally finished preparations of all of the material ordered by the Irish as part of our treaty obligations. The goods are now ready to be delivered and we will give the convoy a military escort all the way to the Ireland."
gerfor.47.a:0 "Get it to Dublin, posthaste."

gerfor.48.t:0 "German Aid Arrives"
gerfor.48.d:0 "The guns, armour, aircraft and industrial machinery that Germany promised us as part of their treaty obligations have finally arrived. We have received a squadron each of fighters and bombers, a number of tanks as well as many artillery pieces and new German machine guns. This could be the first step in a fruitful relationship."
gerfor.48.a:0 "Great!"

gerfor.49.t:0 "Our Irish Treaty Obligations"
gerfor.49.d:0 "Unfortunately, with Ireland no longer able or willing to receive our aid the whole programme had to be aborted. Luckily, the equipment and craft already produced remain in our hands and is ready to be used."
gerfor.49.a:0 "Better than nothing."

gerfor.50.t:0 "Peace with [ENG.GetNameDef]?"
gerfor.50.d:0 "[GER.GetNameDefCap] has negotiated a Second Peace with Honour with [ENG.GetNameDef], since it's clear the [ENG.GetAdjective] have lost their will to carry on the war. This might be a chance for us to end our war with them, as well. Should we take advantage of the opportunity, or continue the battle?"
gerfor.50.a:0 "Let's end this now"
gerfor.50.b:0 "No, we continue the war!"

gerfor.51.t:0 "Germany Requests Austrian Support"
gerfor.51.d:0 "The Germans have asked us to join them in their war against Syndicalism and the forces of the Internationale. Conservative elements in the country say that it is our sacred duty to defend Europe against the godless Reds while others say that we should not fight Germany's war for them. After all, Germany treated us rather shabbily when it came to the Brest-Litovsk divisions, with Poland and Ukraine being forced from our sphere of influence by the glory-hogging Reich. The question now is whether we should assist the Germans in their fight?"
gerfor.51.a:0 "The Kaisers will fight together again!"
gerfor.51.b:0 "The Germans are on their own this time."
gerfor.51.c:0 "Send supplies and volunteers."

gerfor.52.t:0 "Germany Requests Ottoman Support"
gerfor.52.d:0 "The Germans have asked us to join them in their war against Syndicalism and the forces of the Internationale. Conservative elements in the country say that it is our sacred duty to defend Europe against the godless Reds while others say that we should not fight Germany's war for them. After all, with the end of the Weltkrieg the Germans refused to assist us in our recovery despite fighting with them virtually unnecessarily, and instead the Reich continued to exploit our serious foreign debt problems. The question now is whether we should assist the Germans in their fight?"
gerfor.52.a:0 "The Sultan shall aid the Reich!"
gerfor.52.b:0 "The Germans are on their own this time."
gerfor.52.c:0 "Send supplies and volunteers."

gerfor.53.t:0 "Germany Requests Bulgarian Support"
gerfor.53.d:0 "The Germans have asked us to join them in their war against Syndicalism and the forces of the Internationale. Conservative elements in the country say that it is our sacred duty to defend Europe against the godless Reds while others say that we should not fight Germany's war for them. After all, despite our contributions to the Central Powers in the Weltkrieg being recognised to an extent, Germany seized control of Romania's coveted oil supplies for itself and has neglected us ever since. The question now is whether we should assist the Reich?"
gerfor.53.a:0 "We owe them. It is time to repay the debt!"
gerfor.53.b:0 "The Germans are on their own this time."
gerfor.53.c:0 "Send supplies and volunteers."

gerfor.54.t:0 "Austria Heeds the Call!"
gerfor.54.d:0 "Austria listened to our plea for help and decided to join our alliance! the Reichspakt grows stronger, the Syndicalists will not be able to crush us!"
gerfor.54.a:0 "Welcome to the Reichspakt!"

gerfor.55.t:0 "The Ottoman Empire Heeds the Call!"
gerfor.55.d:0 "The Ottoman Empire listened to our plea for help and decided to join our alliance! the Reichspakt grows stronger, the Syndicalists will not be able to crush us!"
gerfor.55.a:0 "Welcome to the Reichspakt!"

gerfor.56.t:0 "Bulgaria Heeds the Call!"
gerfor.56.d:0 "Bulgaria listened to our plea for help and decided to join our alliance! the Reichspakt grows stronger, the Syndicalists will not be able to crush us!"
gerfor.56.a:0 "Welcome to the Reichspakt!"

gerfor.57.t:0 "Austria Refused to Help!"
gerfor.57.d:0 "Austria listened to our plea but pointedly refused to help us in our time of need. We stand alone in our struggle against Syndicalism."
gerfor.57.a:0 "Shameful."

gerfor.58.t:0 "The Ottomans Refused to Help"
gerfor.58.d:0 "Despite all of our exhortations the Sultan refused to support us at all in our fight against the Internationale."
gerfor.58.a:0 "Damn him!"

gerfor.59.t:0 "Bulgaria Refused to Help!"
gerfor.59.d:0 "The Bulgarians ignored our call for support and instead decided to stay out of the crusade against the Syndicalists. It is not like a Balkan country to avoid a fight."
gerfor.59.a:0 "Traitorous curs."

gerfor.60.t:0 "Austria Promises Some Support"
gerfor.60.d:0 "Austria listened to our plea for help but decided not to join our alliance or begin military operations against the Internationale. Instead they will send supplies and volunteers to help in our struggle against Syndicalism!"
gerfor.60.a:0 "It's better than nothing!"

gerfor.61.t:0 "The Ottoman Empire Promises Some Support"
gerfor.61.d:0 "Though the Sultan was sympathetic to our cause, he made it clear that he did not wish to drag his realm into a needless war with the Internationale. Instead he promised to give us material support and to send volunteers."
gerfor.61.a:0 "The irony is palpable."

gerfor.62.t:0 "Bulgaria Promises Some Support"
gerfor.62.d:0 "The Bulgarian government did not wish to offer us overt military support, believing that though Syndicalism is a terrible plague, war with the Communards would be pointless. They promised to at least give us some equipment and volunteers."
gerfor.62.a:0 "Thank you Bulgaria."

gerfor.63.t:0 "Germany Requests Trondheim Leasehold"
gerfor.63.d:0 "The Kaiserreich has approached our ambassador with a somewhat strange offer: we have been offered a substantial sum of money if we lease them our harbour of Trondheim for twenty-five years, to allow for the creation of a forward base against the Republican navy of the Union of Britain. The Norwegian inhabitants would be allowed to stay, as would our civilian administration, and the boost to commerce in the region would be immense. However, the Syndicalists might decide to retaliate against us if we agree to the offer...\n\nWhat shall we do?"
gerfor.63.a:0 "Money is good!"
gerfor.63.b:0 "We can't anger the British!"

gerfor.64.t:0 "Norway Agrees Trondheim Lease"
gerfor.64.d:0 "The Norwegian government has decided to agree to our offer of leasing Trondheim for the next twenty-five years! A small commission is already on its way to assess the level of investment required to make Trondheim an integral part of our defence against Syndicalism."
gerfor.64.a:0 "Very good."

gerfor.65.t:0 "Norway Will Not Lease Trondheim"
gerfor.65.d:0 "The Norwegian government has decided to not agree to our offer of leasing Trondheim for the next twenty-five years, citing the threat of British retaliation. While understandable and not unexpected, this is still unfortunate."
gerfor.65.a:0 "Kiel will have to be good enough."

gerfor.66.t:0 "Deal with the Devil?"
gerfor.66.d:0 "We have been defeated by the Syndicalist bastards but the Entente still fights on. While it was the inability of their governments to hold on to their lands that led to this whole mess in the first place, many say that we should put aside our differences and join with the Entente to reclaim our homeland."
gerfor.66.a:0 "Talk to the Entente."
gerfor.66.b:0 "We do not need them!"

gerfor.67.t:0 "Germany Seeks to Join the Entente"
gerfor.67.d:0 "The Germans have been defeated by the Syndicalist usurpers. While it was their fault that the Syndicalists have taken control of Europe they are now in the same position as we were just a few years ago. Surprisingly, the Germans have sent a delegate to the Canadian government asking for an alliance. What will our terms be?"
gerfor.67.a:0 "Let them join."
gerfor.67.b:0 "Allow them into the Entente with concessions."
gerfor.67.c:0 "Germany in an anti-German alliance? Madness!"

gerfor.68.t:0 "Entente Talks With Germany"
gerfor.68.d:0 "With the German Reich having been smashed in its heartland by the Internationale, they have fled Europe and now seek desperately to regain their power. They have begun talks with the Canadian administration about joining the Entente itself, in an effort to unite all of our efforts against the Syndicalists. The question now is what us French can exact from the Germans, culpable as they are for this entire mess."
gerfor.68.a:0 "Demand Alsace-Lorraine!"
gerfor.68.b:0 "Demand Alsace-Lorraine and part of their colonies!"
gerfor.68.c:0 "Demand nothing from the Germans."

gerfor.69.t:0 "Entente Talks Successful"
gerfor.69.d:0 "The Entente has accepted our alliance proposal and they haven't requested anything in return! This is the best offer we could hope for!"
gerfor.69.a:0 "Sign the treaty!"
gerfor.69.b:0 "No, we've changed our minds."

gerfor.70.t:0 "Entente Talks Successful"
gerfor.70.d:0 "The Entente has accepted our alliance proposal! Canada, however, has requested that in return we must enter negotiations regarding our claims on former British colonies which we took after the war. Should we still sign the treaty?"
gerfor.70.a:0 "Sign the treaty!"
gerfor.70.b:0 "No, the price is too high."

gerfor.71.t:0 "Entente Talks Successful"
gerfor.71.d:0 "The Entente has accepted our alliance proposal! While Canada has requested nothing in return, France has demanded that we give them Alsace-Lorraine after the war, reversing the 1871 annexation. Should we still sign the treaty?"
gerfor.71.a:0 "Sign the treaty!"
gerfor.71.b:0 "No, the price is too high."

gerfor.72.t:0 "Entente Talks Successful"
gerfor.72.d:0 "The Entente has accepted our alliance proposal, but both the French and British governments in exile have requested something in return. Canada has requested we enter negotiations regarding our claims on former British colonies which we took after the war and France has demanded Alsace-Lorraine back. Should we still sign the treaty?"
gerfor.72.a:0 "Sign the treaty!"
gerfor.72.b:0 "No, the price is too high."

gerfor.73.t:0 "Entente Talks Successful"
gerfor.73.d:0 "The Entente has accepted our alliance proposal. While Canada has requested nothing in return, France has demanded that we give them back their colonies after the war, reversing the seizures we made after the 1919 French Revolution. Should we still sign the treaty"
gerfor.73.a:0 "Sign the treaty!"
gerfor.73.b:0 "No, the price is too high."

gerfor.74.t:0 "Entente Talks Successful"
gerfor.74.d:0 "The Entente has accepted our alliance proposal, but both the French and British governments in exile have requested that we enter negotiations regarding our claims on former French and British colonies after the war in addition to renouncing our claim on Alsace-Lorraine. Should we still sign the treaty?"
gerfor.74.a:0 "Sign the treaty!"
gerfor.74.b:0 "No, the price is too high."

gerfor.75.t:0 "Entente Talks Break Down"
gerfor.75.d:0 "The Canadians have refused our offer to ally with them. They blame us for this whole mess and claim that they don't need any help to defeat the Syndicalists!"
gerfor.75.a:0 "Verdammt!"

gerfor.76.t:0 "Enlargement of the Entente"
gerfor.76.d:0 "The former members of the Reichspakt alliance have followed the example of the German Empire and they are now members of our alliance."
gerfor.76.a:0 "Great!"

gerfor.77.t:0 "The Reichspakt Merges with the Entente"
gerfor.77.d:0 "With the German Empire uniting the Reichspakt with the Entente to save the world from the Syndicalist threat, it is time to follow suit or we will be conquered."
gerfor.77.a:0 "We're all in it together now."

gerfor.78.t:0 "Germany Requests Basing Rights"
gerfor.78.d:0 "The Kaiserreich has approached our ambassador with a somewhat strange offer: we have been offered a substantial sum of money if we allow them access to the port of Honolulu. There has never been serious German military presence east of New Zealand so far, and German intentions are nebulous...\n\nWhat shall we do?"
gerfor.78.a:0 "Money is good!"
gerfor.78.b:0 "We cannot allow German influence!"

gerfor.79.t:0 "Hawaii Grants Basing Rights"
gerfor.79.d:0 "The Hawaiian government has decided to agree to our offer of giving our navy basing rights in their harbours! A small commission is already on its way to assess the investments necessary to make Honolulu a viable naval base, with the potential operational range for our ships going as far east as never before."
gerfor.79.a:0 "Our base in the sun!"

gerfor.80.t:0 "An Offer From Berlin"
gerfor.80.d:0 "Entangled in a war for its survival, the German Empire has reopened negotiations concerning the permanent presence of our empire in the Reichspakt, their military alliance. Although the people are exhausted from years of war, there still remains a strong pro-German sentiment amongst the ruling class and a desire to stand side by side with the victors of the new order.\n\nNonetheless our empire does not intend to sell its skin cheaply and has demanded that the Caucasus, traditionally part of the Ottoman sphere, be restored to its control and that Azerbaijan becomes more tightly connected to the Sublime Porte. Although angered by our demands, it nonetheless seems like the German government is willing to consider the cost if it leads to the strengthening of their Southern Flank."
gerfor.80.a:0 "Very well, let us rekindle the old alliance."
gerfor.80.b:0 "No, this isn't in our best interests."

gerfor.140.t:0 "Germany Proposes Research Treaty"
gerfor.140.d:0 "The German government has proposed a military research treaty between our two nations. Though relations between our two nations have not been particularly close for some time, we could benefit greatly from German military assistance."
gerfor.140.a:0 "This sounds like a good idea!"
gerfor.140.b:0 "Bulgaria needs no help."

gerfor.141.t:0 "Bulgaria Accepts the Research Treaty"
gerfor.141.d:0 "Bulgaria has accepted our very generous military research treaty. As our old Central Power ally it is in our best interests that they succeed in Balkan affairs."
gerfor.141.a:0 "Wonderful!"

gerfor.142.t:0 "Bulgaria Refuses the Research Treaty"
gerfor.142.d:0 "Unfortunately, the Bulgarian government has declined our military research treaty, as they see it as 'unnecessary' for their current military plans."
gerfor.142.a:0 "Fine then."

gerfor.187.t:0 "The Kaiserreich Besieged"
gerfor.187.d:0 "Following the Weltkrieg, Russia was absolutely humiliated and cut down to size. Despite their expansionist agenda as of late, most policy experts within Germany agreed that Ivan would never again challenge our might--Today, we were proven horrendously wrong by a formal declaration of war from the East. Russian troops have crossed the borders and reports are coming in of attacks everywhere. It's debatable if we were ready for a war with the Communards, let alone this..."
gerfor.187.a:0 "But we will hold."

gerfor.199.t:0 "Silence and Peace"
gerfor.199.d:0 "The Second Weltkrieg has ended in our favor and the cacophony of violence has ended. The banners of our defeated enemies are now thrown at our Kaiser's feet as a triumph of the German nation over barbarity. Once-proud powers now look to Berlin for instruction, their governments dissolved and bent to our will. The battlefield triumph is undeniable, the Reich stands victorious.\n\nThe German nation has asserted its dominance over the world for a second time and yet a bitter taste is in the mouth. Victory has brung burden as well as glory. Vast territories now lie under German occupation, their industries disrupted, their populations restless, and their futures uncertain. Garrisons must be organized, supply networks restored, and civil administrations either reformed or replaced. The war may be over, but order has not yet been secured. Only once the continent is truly pacified in peace can the promises of this new era be fulfilled."
gerfor.199.a:0 "Heavy is the head that wears the crown."
gerfor.199_tooltip:0 "Before we can embark on any plans of radically altering our state in this new era, we must stabilize the occupied lands of our fallen enemies."

gerfor.200.t:0 "Fate of the Kaisergipfel Plan"
gerfor.200.d:0 "With the dominance of Berlin over the Reichspakt and with the radical barbarians that banged at our gates finally defeated on the righteous fields of combat, the Kaiserreich stands supreme as the hegemon of Europe. As back to back victors of two world wars, we solidified our God-blessed empire as the true guardians of Western Civilization. Our glorious victory has irrevocably marked us as an unmistakable, nigh unmatchable global superpower. Even with a worldwide reach, however, we are not alone on this newly-secured continent, as our old allies and bickering brother to the South in Vienna have managed to survive as well. In order to secure the future of the nation, we must decide on what to do with the lands of House Habsburg.\n\nAlthough we were allies in the Weltkrieg, relations between our twin German nations have been lukewarm at best, as our international interests began to drift. Despite this, with the guns falling silent once more, pronounced calls for the formation of a Greater Germany can be heard from both Berlin and Vienna. As if the era of the Kleindeutschlanders and Großdeutschlanders has returned all over again, these calls boil down to the desire for a merger of the last remaining Germanic states into a singular political entity. To this end, several members of the Auswärtiges Amt have drafted what they call the Kaisergipfel or Kaiser Summit. Put simply, this summit would see [GER.getleader] meeting with his Austrian counterpart to discuss the future of our two nations, specifically on how they could work towards integration, to bring about a truly united German nation.\n\nIf Austria agrees, that would only be step one of a process of integration that could take years to fully achieve. Alternatively, there is no reason we cannot simply mobilize and forcefully take the lands of the Österreich. In the end, we would have achieved the goals we set out for, albeit built on the foundation of spilt German blood. We could also simply ignore these calls. Austria, for decades, has been on the verge of collapse. Is the dream of Greater Germany really worth the potential ethnic conflict?"
gerfor.200.a:0 "Send a delegation to Vienna. We begin the push for Pan-Germany once more!"
gerfor.200.b:0 "Leave them be. The Austrians have their own issues we would rather not deal with."
gerfor.200.c:0 "We have no need for diplomacy, march for Vienna!"

gerfor.201.t:0 "Berlin Proposes the Kaisergipfel"
gerfor.201.d:0 "In a surprising turn of events following this post-war lul we have begun to experience since the fall of the radicals to the East and West, we have received word from the Kaiser in Berlin that he wishes to speak to our own Kaiser, one on one, in order to determine the future fate of Europe, as well as to bring to table a number of rising questions about Pan-Germanism and Pan-Europeanism - either through direct unification or close cooperation - so that we can put the German Question to rest once and for all. Delighting many Pan-European theorists throughout the Empire like Count Richard von Coudenhove-Kalergi and Milan Hodža, as well as many Pan-Germans like Karl Hermann Wolf and George Ritter von Schönerer, and the German Bohemians under Konrad Henlein, to name a few, this idea of a ‘Kaisergipfel’ or Kaiser Summit could be promising, but could also spell the end of Austrian independence as well as we potentially unify with Berlin. What shall we do?"
gerfor.201.a:0 "Austria marches on her own. Tell our northern brothers no."
gerfor.201.b:0 "To Berlin! This ‘Kaiser Summit’ shall be held at once!"

gerfor.202.t:0 "Vienna Ignores Our Call"
gerfor.202.d:0 "In a saddening yet none too surprising turn of events, Austria has denied our calls for the Kaisergipfel, instead wishing to walk their own path. With our southern brothers turning their back on us once again, we are left with two options. We can either turn our backs as well and walk towards our own future alone, or we could prepare for war once more in order to settle the German Question once and for all - what shall we do?"
gerfor.202.a:0 "We shall walk our own path. Ignore the Austrians."
gerfor.202.b:0 "Move to put Austria out of its misery."

gerfor.20201.t:0 "Vienna Heeds Our Call"
gerfor.20201.d:0 "Vienna has said yes! Where should we continue our cooperation?"
gerfor.20201.a:0 "We need a deeper union between our two states."
gerfor.20201.b:0 "Let's just merge our factions and call it finished."

gerfor.20202.t:0 "Austrian General Staff Joins Us"
gerfor.20202.d:0 "For centuries the Austrian and German military traditions developed along parallel but separate paths. The Prussian-German General Staff became the envy of Europe whose discipline, prestige, and primacy inside the state is legendary. Austria, by contrast, forged its officer corps in the unique conditions of the mountainous Danubian realm built on a mosaic of people defended by their shared k.u.k. Gemeinsame Armee. Now, with the political barriers between the two states removed, these two military traditions are finally being brought together. The Austrian General Staff has begun the formal process of integration into the German High Command, with staff officers applying to transfer to Berlin for positions within the planning bureaus, operational departments, and military academies that will form the spine of a shared Heer.\n\nWithin the Austrian officer corps there are men who view the union of the two staffs not to be a loss of national tradition but as the culmination of a shared military destiny. These men have formed the first wave of officers seeking appointment within the newly unified command structure. Many among them are ambitious and highly capable figures, including generals such as Lothar Rendulic, Erhard Raus, and Julius Ringel, officers who are veterans of the Weltkreigs and public supporters of pan-Germanism. Alexander Löhr is another of these energetic supporters seeking to transfer to the Luftwaffe.\n\nYet outside this first wave the extent of this integration remains unanswered. The most prideful and skeptical German officers argue that only these volunteers should be admitted to senior positions, ensuring the Prussian soul of our doctrine remains sacred. The majority opinion in contrast is that the Empire would benefit from drawing more broadly from Austria’s experienced generals, whose operational expertise could strengthen the unified staff. The most bold option is to welcome every capable Austrian officer into the Imperial command structure, bloating the administration but symbolizing the complete unity of the Germania protected by her sword and shield. No matter the choice, with the absorption of the Austrian Army, the parallel military philosophies will be synthesised to create a new united doctrine, shaping the future conduct of war for the Empire."
gerfor.20202.a:0 "Take only the eager volunteers."
gerfor.20202.b:0 "We can take an expanded list of generals."
gerfor.20202.c:0 "Every officer now fights for a truly united Germany!"

gerfor.203.t:0 "The Summit of Kaisers"
gerfor.203.d:0 "With Austria agreeing to our call for a summit between the Kaisers, we have been hard at work these past few weeks preparing for the meeting, and finally the long-awaited day has finally arrived. Deep within the vaulted, ornately decorated halls of the Königliches Schloss on Spree Island in the heart of Berlin, on grounds guarded by more soldiers loyal to either Kaiser than any one person would normally see off the battlefield, the Kaiser Summit was held at long last. What was said behind those closed doors will likely never be truly known, but the outcome of which will reverberate through time immemorial regardless of the outcome as the future of an entire continent, and the entire Western World along with it, hangs in the balance. As the Kaiser in Berlin tried to convince the Kaiser in Austria to be a secondary monarch among many within a unified Pan-European system under the German crown, or perhaps a dual crown shared equally by both monarchs, the Austrian Kaiser nearly left multiple times, but yet the summit lasted, at least for awhile, as two of the most powerful men on the face of planet hashed it out for the good of Europe. With the Summit going on for hours at first that soon turned into days, a final decision needed to be made soon, and so what shall be the outcome of the Kaisergipfel as the fate of the continent hangs in the balance?"
gerfor.203.a:0 "Staying sovereign but united, our diplomatic spheres merge."
gerfor.203.b:0 "Annex Austria and create autonomies across their old empire."
gerfor.203.c:0 "Annex the entirety of the Austro-Hungarian Empire."
gerfor.203.e:0 "The Austrian Kaiser storms out in disgust. The plan is dead."
gerfor.203.f:0 "Austria backs out, so let us help them out of their misery..."

gerfor.204.t:0 "The Dream of Paneuropa"
gerfor.204.d:0 "With the Kaiser in Vienna and his Austro-Hungarian subjects dealt with one way or another, the time has come for the second phase of the true Kaisergipfel plan. Though the first phase focused on our relationship with our southern Catholic brothers, the second phase deals with the rest of the continent at large as we shift our focus from a Pan-Germanic direction towards the realization of the Pan-European idyll. Should the Kaiserreich continue to exert its influence beyond the Germanic lands of Central Europe, across the cradle of Western Civilization until all of Europe from Iberia to the Urals is united so that we can build our unified, syncretic culture that truly is the height of human perfection on the face of the earth, and if so how should we approach this noble goal, or should we ignore these misplace and naive fantasies in order to focus on building our Pan-Germanic paradise while strengthening the Reichspakt and Mitteleuropa without advancing them to their natural Pan-European conclusions?"
gerfor.204.a:0 "We have the real prize. Forget Pan-European dreams."
gerfor.204.b:0 "Push for a decentralized Pan-European alliance."
gerfor.204.c:0 "Realize the Pan-European Dream by force!"

gerfor.20401.t:0 "The European Question"
gerfor.20401.d:0 "What is Europe, beyond just a geographical entity located on a map? Some argue that Europe is the vanguard for Christian values, seeing as it has long been the beacon of Christ on earth, and the main reason those faithful in the Lord are so dominant worldwide. Others would point out that Europe is the cradle of civilization, that the ancient world of cities like Rome and Greece has helped create the best things in the world, such as reason and philosophy, something that should continue going forwards. These two opposing views are also met by a third, an idea that a united Europe is an inherent part of world progress, that it is the manifestation of a better, more secular world, a state built on ideals and principles, law and reform, progress manifested in a nationstate. Naturally, a narrative must be chosen, lest Europe mean too many things to too many people, which would only lead to division. In the halls of this emerging unified nation, in meetings and events, in discussion and even some smaller referendums, a shared narrative will take form. \n\nAdvocated by Alcide de Gasperi, famed Italian politician, the idea that Europe is Christianity, or should at least view it as a core part of itself, is naturally a very compelling idea in the southern states. De Gasperi does not mean that a Europe built on Christian values would discriminate towards smaller religious groups however, rather he’d like to see virtue and good sound Christ-like values be represented, to unite and not divide. \n\nIn stark contrast to de Gasperi, Léon Blum, former Syndicalist turned proponent of a new brighter future, believes that by focusing on faith as the basis for a new Paneurope, it will become inherently tied to the past, rather than being a Civilization in its own right. Ironically supported by more unsavoury elements on the right, Léon Blum presents the idea that Europe should not obsess over religion, but rather take a stand and embrace the mantle of Rome, of Paris, of Berlin and of Cologne, to become a Civilization unto itself, not tainted by the past, and take bold in step for the future.\n\nNaturally, this has also faced pushback by the more moderate block based around Milan Hodža, Slovak politician and a true believer in a united Europe for many years. In contrast to Alcide de Gasperi and Léon Blum, Hodža does not want to see Europe face division over if it should look to the future or to the past, rather advocating a third way, that of progress. Not just looking back and embracing the history of Europe, and the values that unites it, Hodža suggests that Europe should embrace the future, of freedom and liberty, to put progress and reform at the core heart of the European project, rather than obsessing over making it overtly Christian, or some new entity all together."
gerfor.20401.a:0 "De Gasperi is right, Christianity is core to our identity."
gerfor.20401.b:0 "It was Europe that lit up the world, and it shall stay that way."
gerfor.20401.c:0 "Hodža and his allies lead our march onwards!"

gerfor.20402.t:0 "The Native Question"
gerfor.20402.d:0 "The Imperial Federation now spans continents, unifying a Weltreich above nations, but its expansion brings the unavoidable question of the peoples who inhabit lands beyond the imperial core. What role shall these native populations play in a world increasingly governed by Teutonic law, order, and ideals? \n\n The common thought among reactionaries and conservatives scoff at the idea of bringing culture to Africa and Asia, that these uncivilized sorts must instead be governed under the greater people of the empire. The liberal and socialist parties, however, stand fast to the ideas of 1848, the international rights of man and a universal franchise. They see all inhabitants of our dominion as imperial citizens, capable of loyalty, contribution, and even representation within the greater framework of Imperial authority.\n\nThis question has been salient since 1913, when German citizenship was first introduced millions were denied the status in the colonies. They were not considered Imperial citizens, but only subjects or wards of Germany. National laws applied to them only if explicitly stated by the individual statute. In particular, they were shut out of the court system. While future rulings would adjust the status of these natives inside the empire, for example the allowance of interracial marriages after the Weltkreig, citizenship would still be denied. Now the opportunity presents itself for a complete realignment of what it means to be a German under the Kaiser’s grace."
gerfor.20402.a:0 "Unfortunately, they can never truly be German."
gerfor.20402.b:0 "We are truly a world empire now, they are imperial citizens!"

gerfor.20403.t:0 "New Landtags - Mittelafrika"
gerfor.20403.d:0 "With the Imperial Federation reorganizing its territories in Mittelafrika, new Landtags have been established to govern the vast and diverse provinces of the region. These assemblies will decide everything from infrastructure to trade policy, from local taxation to the integration of native populations into the colonial system. As these new representational bodies are formed Berlin's influence can be exerted to tip the scales toward a political party in the nation's favour systematically. The DKG are the colonial old guard, faithfully serving the state and very willing to cooperate with the Imperial government even if lacking new talent. The Reformgruppe, by contrast, is ideologically flexible and eager to implement reforms favorable to strengthening the state's foundation through sometimes radical methods. Meanwhile, the NKG, the new colonial group filled with charisma and ambition, promises innovation and vigor, though perhaps at the risk of overreach. The choice of leadership will determine not only the prosperity of Mittelafrika but also the strength of German influence across the continent."
gerfor.20403.a:0 "The DKG is reasonable enough."
gerfor.20403.b:0 "The Reformgruppe are amenable to our interests."
gerfor.20403.c:0 "The NKG would be great rulers!"

gerfor.20404.t:0 "New Landtags - Ostasien"
gerfor.20404.d:0 "The Grand East Asian territories under the Imperial Federation have now been granted new Landtags, tasked with governing provinces stretching from industrialized cities to distant colonial outposts. These assemblies are the crucibles where administrative acumen meets local conditions, determining the pace of modernization, military recruitment, and integration into the Federation’s economic orbit. For the position of leadership many candidates have been proposed: Hellmuth von Mücke has demonstrated exceptional skill in navigating the delicate balance of local interests and Imperial directives, ensuring efficiency and stability. Hellmuth Heye, inheriting his father’s legacy, brings prestige, discipline, as well as new eyes for upholding the Imperial vision. Josias, the Hereditary Prince of Waldeck and Pyrmont, is young but capable and is prepared to control affairs with vigor and a decidedly Imperialist slant. Who controls these Landtags will shape Ostasien for decades, reinforcing the Imperial Federation’s authority in their vision."
gerfor.20404.a:0 "Mucke's doing a good job over there."
gerfor.20404.b:0 "Josias can manage."
gerfor.20404.c:0 "Hellmuth Heye can continue his father's work."

gerfor.20405.t:0 "New Landtags - Baltic Duchy"
gerfor.20405.d:0 "In the newly reorganized Baltic Duchy, Landtags have been convened to bring order to a historically fractious and strategically vital region and bring it into the Reich. These assemblies will dictate local governance, enforce the rule of law, and integrate the Duchy more firmly into the Imperial Federation, all while balancing the interests of German settlers and native populations. The DbDP, VbDP, and SbDE parties are well-established, capable, and accustomed to the responsibilities of governance and firmly aligned with the settlers. Alternatively, the VdBR offers ambitious reforms of the colonial system and seeks to represent the Baltic peoples of the state, while kneeling to the Kaiser. This decision will be key to securing the new Imperial Federation’s influence at the gates of the East and ensuring the Duchy serves as a bulwark of order."
gerfor.20405.a:0 "The DbDP/VbDP/SbDE are good as is."
gerfor.20405.b:0 "The VdBR!"

gerfor.205.t:0 "The Face of the New Empire"
gerfor.205.d:0 "As the Kaiserreich swells and evolves into this new pan-national apparatus, we must decide upon the face of this new and experimental state. Should the German Kaiser continue to rule alone as the sovereign monarch of this great land with the rest of the Pan-European royalty and nobility beneath him, or at best serving as gimped equals, or should the Kaiser of Berlin and Kaiser of Austria truly rule together as equals as was suggested by the Viennese delegation during the Kaisergipfel? Perhaps we could even create a pan-national congress to rule behind the Kaiser in Berlin in order to breed a wider sense of equality and cooperation between our constituent peoples - what shall we decide?"
gerfor.205.a:0 "The Kaiser in Berlin started this dream alone and he shall finish it alone!"
gerfor.205.b:0 "The Kaisers of Berlin and Vienna shall share a dual crown!"
gerfor.205.c:0 "Create the pan-national congress beneath the Kaiser in Berlin!"

gerfor.206.t:0 "The Flag of the European Union."
gerfor.206.d:0 "Now that we have decided to fully pursue the dream of Pan-European unity. We must encapsulate the spirit of the Pan-European Idyll, and through that there are two flags that are presented, both of which depict twelve stars describing perfection under a blue background ignited by the might of the Kaiserreich, though the variation starts at how the description is illustrated. Nevertheless, what flag shall we choose?"
gerfor.206.a:0 "Go with the first design!"
gerfor.206.b:0 "The second design looks best."

gerfor.207.t:0 "Federating the Kaiser’s Reich"
gerfor.207.d:0 "Taking inspiration from the failed British plan to federalize their dead empire into a united entity, many loyal servants of the Kaiserreich including many old advocates for a more standard Pan-German and Pan-European international conglomeration have instead begun to push for a sort of German ‘imperial federation’ as some sort of evolution of Mitteleuropa and the Reichspakt. Seeking to further Germanic settlement across the scattered lands of the Kaiserreich while simultaneously drawing our colonies and puppets closer to Berlin to the point of inseparability, these internationalists - calling themselves imperial globalists and other similar terms to distinguish themselves from the foul Trotskyite menace that is Leftist Internationalism - push for the total national unification of the entire German Empire, and have gone to great lengths to convince the Kaiser and His Highness’ government of the merits of their ambition. Shall we listen to these unificationists and push towards the complete federalization of the Kaiserreich and her colonies, or should we continue on our way of traditional imperialism as we always have?"
gerfor.207.a:0 "We have no need for such lofty, naive aspirations."
gerfor.207.b:0 "We shall unify the Kaiserriech by force!"

gerfor.208.t:0 "The Flag of Our Greater Kaiserreich."
gerfor.208.d:0 "Now that we have decided to fully take control of the lands within the German Population, we must encapsulate the true spirit of Germania, and through that, the may question lies on our current banner. Though the prospect of a flag change would be deemed unnecessary, perhaps it is appropriate for us to change our flag fit within a united German identity. Nonetheless, what shall we do with our current flag?"
gerfor.208.a:0 "There is no need for change."
gerfor.208.b:0 "We shall raise a new flag!"

gerfor.209.t:0 "The Flag of Our Kaiserliche Föderation."
gerfor.209.d:0 "Now that we have decided to fully take control of the lands within our vast Empire, we must encapsulate the true spirit of the Föderation, and through that, there are flags proposed to further encapsulate the Kaiserliche spirit. The first design proposed illustrates the current flag, though modified to fit with the current banner, the second one would prove to be a more distinct version, capturing the essence of a more Global Kaiserreich of ours. Which design shall we choose?"
gerfor.209.a:0 "Go with the first design!"
gerfor.209.b:0 "Adopt the second design!"

gerfor.210.t:0 "A Deal for Our Caribbean Colonies"
gerfor.210.d:0 "The unending hunger of the Kaiser has been a well understood factor in our nation's policy making since before the Weltkrieg and the Hun is yet to subvert this conception. Seeking to stretch its wings in a new corner of the world, their ambassador has approached the foreign minister with an offer for acquisition of our holdings in the Caribbean. In return for economic assistance the Empire desires complete control. The Dutch West Indies, acquired during our golden age, governed centrally  from the Netherlands Antilles government in Willemstad, have provided a global presence, trade, salt and labor to our nation. Despite growing pressure for autonomy, under normal circumstances we wouldn’t bother entertaining such an offer. It is clear however that the Kaiser’s greed underpins such an offer, and this polite gesture may be followed by coercion. With our economies so entwined, appeasing our neighbors with full or partial acceptance could spare alienating and angering the eagle."
gerfor.210.a:0 "Sounds good."
gerfor.210.b:0 "Only give them Curacao and Saint Martin."
gerfor.210.c:0 "We have no interest in this deal."

gerfor.211.t:0 "The Dutch Accept"
gerfor.211.d:0 "After long nights of argumentation and coercion the Dutch have realised complete acquiescence is the only possible move forward. Agreeing to transfer all their holdings in the Caribbean for economic support we now have new fertile soil to grow the Weltreich. To make the governance of these new territories easier, previous Dutch officials have been offered to keep their positions and the centralized colony is to be divided into separate holdings to better organize the different native populations. Now, with overwhelming power, the next step for our Dutch play is primed for execution."
gerfor.211.a:0 "Great! Now press for Reichspakt membership."
gerfor.211.b:0 "We got what we wanted, let's remain friendly with them."

gerfor.212.t:0 "The Dutch Somewhat Accept"
gerfor.212.d:0 "In response to our generous offer the ever over cautious Dutch have decided to agree to only sell Curacao and Saint Martin to us. While certainly not the Kaiser’s ideal agreement these islands have grown the reach of the fleet and placed a foothold for future dominance. To make the governance of these new islands  easier, previous Dutch officials have been offered to keep their positions and the colonial government is to be divided into separate holdings to better organize the different unique native populations. Now with a foot in the door the next step for our Dutch play is primed for execution."
gerfor.212.a:0 "That's fine enough, let's push for Reichspakt membership."
gerfor.212.b:0 "That's fine, let's end our overtures here."

gerfor.213.t:0 "The Dutch Refuse"
gerfor.213.d:0 "The  famously stingy Dutch have lived up to their reputation, deciding to refuse our generous offer to bring strength to the Caribbean and stability to their economy. Despite the work of our foreign office to persuade the clog lovers to work in their own interest, they have stood firm against reason. In response we have a full course of sanctions to correct the Dutch’s attitude and remind them of how intertwined their economy is with ours. Of course this is only if the Kaiser determines that they need the lesson."
gerfor.213.a:0 "Well, damn."
gerfor.213.b:0 "Oh? Sanction them."

gerfor.214.t:0 "Germany Threatens Sanctions"
gerfor.214.d:0 "As expected, the barbarian Hun has decided to throw a tantrum when we denied their absurd annexations in the West Indies. Mass sanctions have been unleashed upon our economy, devastating our factories and primary industries. Despite this bad news, an unintentional repercussion of this unfair economic warfare has been a rally around the flag. From the left to even some reactionaries the response has been a mass boycott of German goods. While this has been a respite, high society remains fearful and are putting pressure for acquiescence. With their factories and farms losing their main market they are terrified of this instability and are lobbying hard for respite."
gerfor.214.a:0 "Best give in, then."
gerfor.214.b:0 "Remain steadfast!"

gerfor.215.t:0 "Germany Pushes for Reichspakt Membership"
gerfor.215.d:0 "As expected the insatiable eagle has used our agreement to push for further gains. Now the ambassador demands the Netherlands join the Reichspakt and, in so doing, sign on to the next possible Weltkrieg. While we are undeniably aligned with the Reich on the world stage, such a move would tie us to it in opposition to the international. It would deny us access to the emerging powers’ markets as they look to break the dominance of the eagle.\n\nDespite these downsides the ambassador does lay out a convincing case. The Empire holds a hegemony across the world with a unified market and access to material unmatched. The socialist world revolution may bring the war to Holland no matter the nation's alignment and with the world order rupturing no nation provides a stronger guarantee than Germany. With such a decision on the table the foreign office spends many sleepless nights in deep argument, but ultimately comes to one conclusion."
gerfor.215.a:0 "Sounds good, the world is growing more dangerous after all."
gerfor.215.b:0 "We would rather stay out of German conflicts."

gerfor.216.t:0 "The Netherlands Joins the Reichspakt"
gerfor.216.d:0 "After long nights of argument the Dutch have finally decided to see sense and agree to join the Reichspakt. Central Europe has found a new stalwart defender of its culture against the animals that surround us and who seeks to tear us down. With new injections of capital into the Netherland’s economy has also created a groundswell of good will which will be key in future joint ventures for our two nations. As a new dawn begins in Europe the forces of humanity have grown and the growing strength of Germany has become evermore enduring."
gerfor.216.a:0 "Excellent!"

gerfor.217.t:0 "The Netherlands Refuses to Join the Reichspakt"
gerfor.217.d:0 ""Despite our benevolent offer of protection the Dutch have spat in our face. A complete denial has been sent in response to our terms. Despite the clear threat of the Internationale they would much rather stick their head in the sand. In response to their decision two paths have been laid out of either quiet understanding or an undeniable statement of our desires. The increasing conjointness of the Holland economy with Berlin, economic warfare could be a clear path to ensure that their mad regime regrets their decision."
gerfor.217.a:0 "Oh well."
gerfor.217.b:0 "Ask again, "nicely"."

gerfor.218.t:0 "Germany Threatens Sanctions"
gerfor.218.d:0 "The Kaiser’s dog in Amsterdam has made his position unmistakably clear: refusal to bow to its will will bring consequences. Sanctions are no longer a last ditch possibility but openly stated to be the response should we defy their demands. The warning alone has sent a chill through our markets. The prospect of closed ports, frozen credit, and punitive tariffs threatens to choke our factories and leave our primary producers stranded without buyers. By tying our trade and finance so closely to German markets, we have narrowed our room to maneuver. With profits already uncertain and livelihoods hanging in the balance, many are pressing for accommodation, fearing that economic punishment would bring instability the nation may struggle to contain."
gerfor.218.a:0 "I suppose we have to join now."
gerfor.218.b:0 "No!"

gerfor.219.t:0 "The Dutch Remain Belligerent"
gerfor.219.d:0 "Despite all attempts at reason the Dutch remain without sense. Deciding to destroy their economy instead of ascending to join civilization they continue to deal in the same intellect that led them to become obsessed with tulips. To show that the Kaiser's threats are not made lightly the sanctions will be imposed and in turn devastate the pathetic nation. When families stand in bread lines and industrialists beg in the street they will only have themselves to blame."
gerfor.219.a:0 "That'll show them!"

gerfor.220.t:0 "German Sanctions Hit"
gerfor.220.d:0 "Predictably, Berlin reacted with fury when we remained unwilling to cooperate. In retaliation, sweeping sanctions have been imposed, striking at the heart of our industry and crippling our primary producers. Our factories slow, our exports rot on the docks, and the weight of economic coercion presses heavily upon the nation. With our previous agreement to their demands the German has increased their grip on our economy and our ability to refuse has weakened. With farms and factories cut off from their most lucrative markets, the mounting losses and dangerous uncertainty has placed strong voices in parliament and boardrooms alike for accommodation."
gerfor.220.a:0 "Damn."

gerfor.221.t:0 "Germany Relents"
gerfor.221.d:0 "After a brutal regime of sanctions imposed tyrannically against us by Berlin for refusing to fall at its feet and beg for mercy, they have finally seen sense. The pain must have been too great for the Hunnic industrialists or the foreign office must have seen sense to not completely alienate a friendly nation. Whatever the reason, the nation's industry can finally breathe a sigh of relief as capital resumes its flow across the Meuse. A new day dawns and with it proof of the Netherlands’ resilience."
gerfor.221.a:0 "Great!"

gerfor.222.t:0 "Kiruna Steel in Krupp Factories"
gerfor.222.d:0 "The iron mountains of Kiruna have long stood as pillars of Sweden’s prosperity. From the frozen north, the ore of LKAB flows southward to our foundries and abroad to foreign markets, each shipment a testament to Swedish industry, Swedish labor, and Swedish sovereignty.\n\nNow, Berlin casts a longer shadow across Scandinavia. Their ambassador now seeks integration by binding Kiruna’s output directly to the Krupp works and the vast industrial machine of the Reich. They see only Krupp’s balance sheets and the Ruhr’s appetite, not the livelihoods of Swedish workers nor the independence of our national industry. To yield control of LKAB’s output would be to allow one of Sweden’s primary industries to be subsumed beneath the wings of the imperial hawk.\n\nThe offer is not without temptation, secured markets, foreign capital, and preferential access to the Reich’s economic sphere promise stability in uncertain times. We must now decide: shall Swedish iron serve Swedish interests first or be bound irrevocably to Berlin’s designs."
gerfor.222.a:0 "Sell LKAB."
gerfor.222.b:0 "No deal."

gerfor.223.t:0 "The Swedes Accept"
gerfor.223.d:0 "After intense deliberation, Stockholm has chosen pragmatism over childish pride. Sweden will permit acquisition and preferential control over LKAB’s vast iron reserves, binding the ore fields of Kiruna to the industrial heartlands of the Ruhr. Junker capital now flows northward, modernizing mines, expanding rail infrastructure, and securing a steady torrent of steel-grade ore for the Reich’s factories. Krupp’s furnaces shall burn brighter still, fed by Scandinavian mountains. From such a place of strength, there is enough of a foothold to build a new, even bolder diplomatic play."
gerfor.223.a:0 "Let's deepen our relationship."
gerfor.223.b:0 "We're good here."

gerfor.224.t:0 "The Swedes Refuse"
gerfor.224.d:0 "In a display of Nordic stubbornness, Stockholm has rejected our generous offer regarding LKAB and the Kiruna ore fields. Cloaking their refusal in rhetoric of sovereignty and neutrality, the Swedes have chosen their pride over world security.\n\nDespite the fact that German industry has long been one of Sweden’s most reliable markets, and Berlin’s financial networks intertwine closely with Scandinavian trade; they choose to alienate us. To deny partnership is to flirt with economic isolation at a time when Europe’s order grows ever more consolidated under Deutsch leadership. The question now is whether Sweden will be permitted to enjoy the fruits of our market while denying us its steel."
gerfor.224.a:0 "Damn."
gerfor.224.b:0 "They forget their place!"

gerfor.225.t:0 "Germany Threatens Retaliation!"
gerfor.225.d:0 "The tone from Berlin has shifted to the classic Teutonic savagery. What was believed to be a polite commercial negotiation now carries coercion. Their officials have made it clear that continued refusal to cooperate over LKAB will have consequences. Sanctions, tariffs, credit restrictions and industrial boycotts are all being openly discussed in diplomatic circles. Unfortunately, Sweden’s economy is deeply tied to continental trade. German markets consume vast quantities of Scandinavian exports, and Junker banks underpin much of the credit that fuels Swedish industry. Shall we accept the Hun's savage demands and secure economic stability, or stand firm and risk the chill of isolation in a Europe increasingly ruled from Berlin?"
gerfor.225.a:0 "Fine."
gerfor.225.b:0 "We do not bow!"

gerfor.226.t:0 "Germany Pushes for Reichspakt Membership"
gerfor.226.d:0 "What was marketed as just a deal for steel contracts has now reached its true hidden agenda. Berlin has made clear that partnership in trade must evolve into a military alliance. The ambassador, courteous yet unmistakably firm, has placed the matter before Stockholm for complete ascendancy into the Reichspakt. Many reactionaries have backed such a move, as Europe grows ever more divided between order and upheaval and the stabilizing hand of German hegemony and neutrality increasingly has become more dangerous. The largest unified market in Europe, security guarantees backed by the might of the Kaiserliche Marine, and a voice within the councils that shape the continent’s future. Yet such a move would also bind Stockholm to Berlin’s wars, its enemies, and its grand designs. Having avoided the Weltkrieg, should we really walk blindly into the next continental conflict?"
gerfor.226.a:0 "This was a long time coming anyhow."
gerfor.226.b:0 "Counter-offer with a military deal."
gerfor.226.c:0 "Our neutrality is sacred!"

gerfor.227.t:0 "Sweden Agrees"
gerfor.227.d:0 "After weeks of careful negotiation and quiet reassurances, Sweden has stepped across the threshold and taken its place beneath the wings of the Imperial eagle. This marks another triumph of diplomacy backed by the economic gravity of Europe's center mass. Immediately investment has flooded Stockholm and our military officers depart to instruct the Swedish Armén. Scandinavian iron, shipyards, and the strategic coastline are now woven into the defensive tapestry of Central Europe. The age of splendid isolation in the north has drawn to a close and in its place rises a new order that is disciplined, coordinated, and unmistakably Deutsch."
gerfor.227.a:0 "Excellent."

gerfor.228.t:0 "Sweden Offers Something Else"
gerfor.228.d:0 "Stockholm has returned with a classic lack of commitment however they have not rejected cooperation outright. In a carefully worded reply, Swedish officials have proposed an alternative: a comprehensive military cooperation agreement in place of formal Reichspakt membership. Joint exercises, intelligence sharing, arms procurement, and coordinated Baltic defense would be on the table yet Sweden would retain its official neutrality and freedom of diplomatic maneuver.\n\nIt is a shrewd compromise. Sweden seeks the protection of Heer arms without loyalty. Such an arrangement would strengthen the northern flank while sparing Stockholm the domestic upheaval that open faction membership might provoke. It's an undeniable half measure, with the risk that in the rough they will leave us hanging, but it certainly has its uses."
gerfor.228.a:0 "Well, alright."
gerfor.228.b:0 "Unacceptable, ask again but threaten sanctions."

gerfor.229.t:0 "Sweden Refuses"
gerfor.229.d:0 "In a declaration steeped in rhetoric of sovereignty and historic neutrality, Sweden has refused outright to join the Reichspakt in any capacity. The Riksdag has invoked centuries of careful balance, insisting that Sweden will not be drawn into the rivalries and wars of continental blocs. All this rhetoric of course ignores Sweden’s prosperity having been increasingly reliant on Berlin’s markets and its security quietly reinforced by the deterrent power of the Kaiser’s fleets in the Baltic. To reject alignment while benefiting from the stability of the Kaiser is nothing short of insolence. The Nordic kingdom stands at a crossroads of its own making. Whether this posture of principled distance is respected or challenged will depend entirely on how firmly we will press our advantage."
gerfor.229.a:0 "Damn."
gerfor.229.b:0 "Intolerable, threaten sanctions at once."

gerfor.230.t:0 "German Threats"
gerfor.230.d:0 "Berlin’s patience has worn thin. Frustrated by Sweden’s continued refusal to join the Reichspakt, their officials have moved from polite entreaty to pointed menace. Sanctions are now openly threatened to choke trade and paralyze industry. The message is clear that the once polite offers were only masking the feral and hungry beast of imperial ambition. Every day of hesitation tightens the noose, and the question before Stockholm is stark: relent and secure stability, or maintain independence and risk economic upheaval of unprecedented scale."
gerfor.230.a:0 "Relent for their sake."
gerfor.230.b:0 "Never!"

gerfor.231.t:0 "Sweden Remains Belligerent"
gerfor.231.d:0 "Sweden has chosen obstinacy over conciliation. Oslo’s leaders insist that sovereignty and neutrality cannot be bartered, even under the looming shadow of Berlin’s sanctions. Swedish ports remain closed to the Reich’s fleet, and Swedish industry continues unbowed, though at increasing risk from the tightening economic noose. To ensure that our threats are taken seriously, the only course now is to pull the lever and hang them on their dedication to national pride over sense."
gerfor.231.a:0 "Sanction these bastards."

gerfor.232.t:0 "German Sanctions"
gerfor.232.d:0 "The bountiful threats from the Reich's ambassador have been carried into action. German sanctions have been stuck like nails into the very heart of the Swedish economy. Factories have been hit with a mass shock, slowing production and laying off workers. The Reich’s iron talons have made themselves felt, cutting all access to Mitteleuropa. All feel the strain from merchants, industrialists, and farmers alike scramble to adapt. More unconventional markets have been reached for new consumers but these new trade relations will need time to evolve."
gerfor.232.a:0 "Dammit."

gerfor.233.t:0 "Germany Backs Down"
gerfor.233.d:0 "To the relief of Stockholm, Berlin has unexpectedly relented. Perhaps economic reprisals proved more damaging than anticipated, or perhaps political calculations favored negotiation over confrontation. Regardless of motive, the Swedish nation breathes a sigh of relief as sanctions ease, trade resumes, and the Reich’s shadow recedes - at least for now. Neutrality has survived but relations with Berlin have soured, with many industrialists and investors reluctant to reintegrate with Germany in case the fickle Kaiser changes his tune."
gerfor.233.a:0 "Hooray!"

gerfor.234.t:0 "The Bofors Deal"
gerfor.234.d:0 "Amid the tension and brinkmanship, a more cooperative path has emerged. The Bofors arms deal cements a mutually beneficial arrangement between Sweden and Germany: Swedish factories supply weapons, artillery, and technical expertise to the Deutsch Heer, while Mittelroupa guarantees markets, investment, and access to broader military technology for Stockholm. Without sacrificing national sovereignty nor losing the benefits of a close relationship with Berlin Sweden has come out of the conference giddy while some of the Kaiser’s men have shown regret for what could have been achieved. No matter the result however such success shall send clear signals to the rest of the Nordic nations of the fruits of cooperation where northern stability and Reich influence may be advanced hand in hand."
gerfor.234.a:0 "This benefits both parties."

gerfor.235.t:0 "The Siren Song from Berlin"
gerfor.235.d:0 "Berlin’s diplomats have arrived in Havana seeking a new ambitious relationship between our two nations. With America in deep strife we have increasingly looked to the Teutons as our primary partner and the Kaiser now seeks to collect. Germany has proposed a far-reaching trade agreement that would bind Cuba’s sugar, tobacco, and strategic ports ever closer to the Mitteleuropean economic sphere, offering industrial goods, military assistance, and preferential access to European markets in return. Though framed as a partnership of equals, few within the Cuban government fail to notice the imbalance of power behind the polite language. Accepting may bring prosperity and protection that recent times has lacked, however it is clear that the Hun is hiding more ambitions behind this agreement."
gerfor.235.a:0 "Sounds good."
gerfor.235.b:0 "No!"

gerfor.236.t:0 "Cuba Accepts"
gerfor.236.d:0 "Havana has seen sense and agreed to deeper ties with the Empire, calling the ambassador to meet to define the final terms. The news has been met with major satisfaction in Berlin, where the foreign office’s officials quickly moved to deepen the relationship.\n\nCuba’s sugar and tobacco now flood the European market and in return the railways and ports have found new investors to develop various urban centers and utilities. With the sugar bowl of the world secured and the notoriously corrupt administration now open to new masters the time is ripe to seize the opportunity. Berlin diplomats have turned their attention to a far more strategic prize: Guantanamo Bay. Coveted for its deep harbor and commanding position over Caribbean sea lanes, the base represents a chance to project Naval power directly into the Americas. Established in 1903 through a lease agreement with Cuba following the Spanish-American War, the base would serve as a logistical, and maritime operating hub ready to serve new masters.\n\nThe question remains, however, if Germany should press its advantage immediately, or consolidate what it has already gained."
gerfor.236.a:0 "Now, to snatch Guantanamo."
gerfor.236.b:0 "This is good enough for us."

gerfor.237.t:0 "Cuba Says No"
gerfor.237.d:0 "Regrettably the government of Havana has refused our sensible deal for transatlantic cooperation between our nations. The foreign office has found little justification for such a move, the leading theory being that the nation is unwilling to subordinate itself to a new master. Whatever absurd reasoning is true, the fact remains that Cuba's ports remain closed. The defiance of a small Caribbean state is an insult that many believe cannot go unanswered, fearing that leniency would embolden others to resist our influence. That being said, the costs of escalation so far from Europe could outweigh the potential gains. It is a matter of priority if the Cubans will be repaid for their grave mistake."
gerfor.237.a:0 "This tiny state must be shown a lesson."
gerfor.237.b:0 "Oh well."

gerfor.238.t:0 "Prussian Threats"
gerfor.238.d:0 "The Kaiser’s dogs have abandoned subtlety, delivering blunt warnings of economic retaliation, diplomatic isolation, and even military consequences should we continue to resist Berlin’s demands. Within Havana’s diplomatic circles, debate rages between those who see resistance to Germany's global empire futile and those who insist that surrendering now would doom the nation’s independence forever. Their ability to conduct major operations across oceans was proven in the Chinese intervention, however stagnation and insurgent powers could hinder their power projection. On either side of the debate there is a growing consensus that this initial move is only the beginning with Berlin, as they mask their ambitions to shape Cuba’s fate for decades to come."
gerfor.238.a:0 "Give up."
gerfor.238.b:0 "They can't scare us!"

gerfor.239.t:0 "Germany Wants to Purchase Guantanamo"
gerfor.239.d:0 "Germany has made its true objective explicit, formally proposing the purchase of Guantanamo Bay. \"Generously\" promising financial compensation, investment, and guarantees of Cuban sovereignty the ambassador has lobbied hard for the deal. His voice has been amplified throughout the administration by many apparatchiks whose pockets have grown heavier after the recent deal with Berlin.\n\nActing as America's talon on the island since 1903, Guantanamo bay was stolen from Cuba after American victory over the Spanish and the following coercion to pass the Platt amendment. Since then America used it as an open door to enforce its will on our people, protected under an indefinite lease only broken by the collapse of the United States. To sell away what was only regained so recently would be a national humiliation and proof of a complete lack of sovereignty.\n\nHowever, accepting the deal could intertwine ourselves with the worlds greatest power and enrich the treasury to heights never thought possible, albeit at the cost of relinquishing one of the island’s most strategically vital assets."
gerfor.239.a:0 "Now that's a good deal."
gerfor.239.b:0 "And repeat our mistake with the Americans? Never."

gerfor.240.t:0 "Cuba Accepts"
gerfor.240.d:0 "Word has arrived from Havana: the Cuban government has agreed to our proposal and will transfer control of Guantanamo Bay to the German Empire. Tense negotiation and diplomatic pressure has concluded with a quiet but decisive victory for Berlin’s foreign office. The harbor that once served as a symbol of American intrusion in the Caribbean will now host the banners of a different great power, one far more capable of shaping the global order. Guantanamo offers a secure anchorage astride the Caribbean sea lanes, a staging ground for fleets and commerce alike, and a permanent foothold in a region long dominated by foreign powers. From its sheltered waters the Reichsmarine may observe, project influence, and ensure that the Atlantic’s western reaches are no longer beyond the reach of the Kaiser’s navy.\n\nIn Havana the decision has been justified as pragmatic statecraft. German gold flows into Cuban coffers, investments and modernization alike benefitting greatly, and Berlin has pledged to respect the island's sovereignty. Whether these assurances will calm domestic critics remains to be seen, but the agreement itself is sealed. One empire has departed these shores; another now quietly takes its place."
gerfor.240.a:0 "Great!"

gerfor.241.t:0 "Cuba Refuses to Sell Guantanamo"
gerfor.241.d:0 "The reply from Havana has arrived, and it is as frustrating as it is definitive. Despite generous financial offers, promises of investment, and repeated assurances regarding Cuban sovereignty, the government has refused outright to sell Guantanamo Bay. To the Cuban leadership, the harbor represents more than a strategic inlet but a symbol of a painful past, when foreign powers carved privileges from the island at gunpoint and cloaked domination in legal agreements.\n\nWithin their parliament and press, critics of the proposal have argued that selling Guantanamo to Germany would merely replace one imperial overseer with another. The scars of the Platt Amendment and the decades of American presence remain fresh enough that even generous compensation cannot wash away the specter of renewed dependency. National pride, more than economics or diplomacy, appears to have carried the day. A small nation has rejected the overtures of our global empire, and whether that defiance stands unchallenged will send a message far beyond the Caribbean."
gerfor.241.a:0 "Threaten them!"
gerfor.241.b:0 "Damn."

gerfor.242.t:0 "Prussian Threats"
gerfor.242.d:0 "The Prussian response has been swift and unmistakable. Diplomacy has given way to open threats, and Berlin’s representatives have abandoned the careful language of negotiation in favor of blunt warnings. Economic sanctions, trade restrictions, and diplomatic isolation have all been mentioned openly by the ambassador, accompanied by darker hints that the Kaiserliche Marine is more than capable of making its displeasure felt even in distant Caribbean waters.\n\nSome ministers argue that such demands must now be accepted, reasoning that the island cannot hope to withstand the sustained hostility of the world’s preeminent industrial power. Others insist that yielding under threat would reduce Cuba to little more than a protectorate in all but name. If Cuba yields now, critics warn, every future negotiation will carry the shadow of coercion. Berlin’s threats have forced us to confront a stark choice: surrender the harbor and purchase peace, or stand firm and risk provoking a power whose reach spans oceans."
gerfor.242.a:0 "Give up."
gerfor.242.b:0 "They can't scare us!"

gerfor.243.t:0 "Cuba Remains Belligerent"
gerfor.243.d:0 "Berlin's ultimatum has been without compromise. The Cuban government has refused once more to reconsider the sale of Guantanamo Bay, rejecting both our financial incentives and the veiled warnings delivered by the Foreign Office. Reports from Havana describe speeches filled with nationalist rhetoric and denunciations of foreign interference, portraying Germania as merely the latest empire seeking to dominate the Caribbean.\n\nWithin the Wilhelmstrasse the mood has turned sour. What was once envisioned as a straightforward diplomatic acquisition has instead become a test of prestige. Some argue that allowing a minor Caribbean republic to rebuff the Empire without consequence would embolden others across the world to resist our influence. If Cuba believes distance will shield it from repercussions, they may soon learn otherwise."
gerfor.243.a:0 "Sanction them immediately."

gerfor.244.t:0 "Germany Sanctions Us"
gerfor.244.d:0 "The response from Berlin has been swift and uncompromising. Following Havana’s refusal to yield Guantanamo Bay, the Teutonic government has announced sweeping economic sanctions against us. Krupp shipping firms have halted trade, banks across the Mitteleuropa system have frozen Cuban credit, and diplomatic pressure is being applied to discourage other nations from engaging with our economy.\n\nThough Germany lies an ocean away, its reach across global commerce is vast. Prussian merchant fleets dominate much of the Atlantic trade, and their financial institutions exert enormous influence over international markets. Already the consequences are being felt: exports are delayed in port, foreign investment grows uncertain, and merchants fear the collapse of vital commercial relationships.\n\nWithin the government the mood is tense. Some claim this hardship proves their willingness to bully smaller nations into submission, while others quietly question whether the defense of Guantanamo Bay was worth provoking the world’s most powerful empire. Regardless of opinion, the reality is undeniable: Cuba now stands alone in a contest of endurance against Berlin."
gerfor.244.a:0 "Damn."

gerfor.245.t:0 "Germany Backs Down"
gerfor.245.d:0 "In a surprising reversal, Berlin has quietly abandoned its pressure campaign against our economy. The Kaiser’s minions have ceased their threats, and the much-feared escalation of economic retaliation has failed to materialize. Though no official explanation has been offered, observers speculate that the Imperial government ultimately judged the dispute over Guantanamo Bay to be a distraction from more pressing concerns elsewhere in their vast empire.\n\nWithin Havana the news has been met with relief and cautious celebration. Many view this development as proof that steadfast resistance can preserve the sovereignty of smaller nations, even when confronted by a global power. Newspapers praise the government for refusing to bow to foreign intimidation, while political leaders emphasize that Cuba will not easily surrender its territory or independence to outside pressure. For now the storm has passed, and the island republic has emerged from the crisis with its dignity and Guantanamo Bay intact."
gerfor.245.a:0 "Great!"

gerfor.250.t:0 "France Requests Nancy Back"
gerfor.250.d:0 "At Halifax, amid polished tables and carefully measured smiles, agreements were inked that sought to shape the postwar order. Among them concerns the fate of Nancy and is \"destiny\" to return to the French motherland. The French Republic, restored and emboldened, now formally invokes that understanding. Their ambassador has requested a string of meetings to hammer out the hand over for reconciliation, local population exchange and the creation of local institutions.\n\nAnd indeed, we did agree. At the time, as the French syndalist horde bashed against our gates, it was imperative to ensure the Exiles would cooperate. Yet circumstances have changed, and this wouldn’t be the first time agreements signed in the heat of war may chafe in the cool light of victory. Nancy - or Nanzig, is a testament to Bismarck's triumph.\n\nStill, what is the worth of a great power whose word cannot be trusted? It was Paris’ obsession with revanchist claims that caused the Second Weltkrieg, and so for the sake of our new peace it would be best to stand by our agreement."
gerfor.250.a:0 "Give it back to them."
gerfor.250.b:0 "Excuse me? Nancy? I only know of Nanzig."

gerfor.251.t:0 "The Return of Nancy"
gerfor.251.d:0 "Today, the tricolor flies once more over Nancy. French officials have crossed into the city to assume formal control, greeted by crowds whose cheers of relief shuffle the Heer garrison out of the province. The negotiators that brokered the Halifax Agreement, meanwhile, have been vindicated as Berlin has proved to not be completely treacherous.\n\nThe process of restoring local institutions has begun as schools restore the primacy of the French Language and its people in its curriculum, and symbols of the Kaiserreich’s control have been steadily broken down. Whether this handover will cool the embers of Franco-German rivalry remains to be seen, as the return of the city came with guarantees to not molest the assets of Germans who live within Nancy should they not wish to sell, but so far the mood has been rather jubilant in the recently liberated province.\n\nFor now, there is hope that this measured act may mark the beginning of a less acrimonious chapter between our nations and build a Europe defined by coexistence rather than constant conflict."
gerfor.251.a:0 "Perhaps now the animosity can heal."

gerfor.252.t:0 "Britain Requests its African Colonies"
gerfor.252.d:0 "When the cannons still thundered and the fate of the Third Internationale hung in the balance, understandings were reached at Halifax between ourselves and the British government-in-exile. Among these was a commitment that Britain’s African colonies would be restored upon victory. It was a promise made in the spirit of our shared struggle and a reassurance to the dispossessed empire that its cooperation will be rewarded.\n\nNow, with the Internationale defeated and the map of Europe settled in our favor, London calls in that pledge. Their envoys speak of imperial continuity and the restoration of rightful administration. They remind us that the Union Jack once flew over vast African territories long before our own colonial banners were planted there. They appeal to honor, to alliance, and to the sanctity of agreements made between partners in war.\n\nYet it was Germanic blood that civilised the dark continent and through German steel it was defended as the British collapsed to their revolution. To relinquish these lands would be to diminish our global stature as the last great empire, to trade tangible power for just diplomatic goodwill. Are we custodians of a shared victory, or architects of an empire that yields nothing once taken?"
gerfor.252.a:0 "Hand them back over."
gerfor.252.b:0 "They're ours now, whether the British like it or not."

gerfor.253.t:0 "Return of the British Colonies"
gerfor.253.d:0 "Across the African continent, handover ceremonies unfold beneath the blazing sun. German standards have been lowered with precision, and in their place the Union Jack rises once more. British governors, long confined to exile or collaboration, now have been restored as masters of colonial capitals with renewed authority, proclaiming the restoration of imperial governance. The return of the colony and protectorate of Nigeria had been the main event as the oil river returned to Britannia, along with all its wealth. With honoring the Halifax accord, diplomacy with the Reich has been vindicated, for today at least, and cross-channel relations appear on a new steady path."
gerfor.253.a:0 "The Union Jack is back in Nigeria!"

gerfor.254.t:0 "Britain Requests its Asian Colonies"
gerfor.254.d:0 "With Africa settled, Britain now turns its gaze eastward. At Halifax, amid discussions of Europe’s liberation, we also pledged that Britain’s Asian possessions would be restored following the defeat of the Third Internationale. At the time, such assurances cost little; Asia seemed distant from the decisive theaters of struggle. It is Entente support that shored up our defences for the eastern insurgent forces seeking to destroy our bastion of culture in Asia, and Deutsch-Ostasien itself remains plagued with administrative inefficiency due to expanding our colonial empire too quickly.\n\nHowever, despite such a malus, our iron grip has steadily tightened in very recent years. From treaty ports to tropical harbors, German authority has taken root. Trade flows through networks shaped by our merchants; security is maintained by our garrisons. To return these territories would be to unwind years of careful positioning and concede influence in a region that the Kaiser remains very invested in. To refuse would cement our own primacy in Asia, but at the cost of alienating a partner whose navy still commands respect in a time of British imperial revival."
gerfor.254.a:0 "Hand them back over."
gerfor.254.b:0 "The German Empire is meant to stand in Asia, not the British."

gerfor.255.t:0 "Britain Returns to Asia"
gerfor.255.d:0 "In the humid ports and bustling treaty cities of the East, a familiar banner rises once more. The Union Jack, long absent from these shores, now flutters above government houses and naval stations as British officials resume their posts with ceremonious dignity. This marks a triumphant return to the imperial stage in Asia and a victory of the foreign office in asserting the Halifax agreement. Merchants toast the reopening of trade networks, admirals survey harbors that once anchored the pride of the Royal Navy, and colonial administrators speak confidently of restored order over the natives. Despite all the years of humiliation, Britain has regained her place in the sun."
gerfor.255.a:0 "The east returned to Britannia's bosom."

gerfor.256.t:0 "[FROM.GetName] Joins Mitteleuropa"
gerfor.256.d:0 "The ink is dry, the signatures affixed and with them the political architecture of Europe shifts once more. [FROM.GetName] has formally acceded to Mitteleuropa. What was first conceived in the aftermath of the Weltkrieg as an economic framework to consolidate Germany’s victory has steadily grown into something far greater: a continental system of markets, reconstruction, and strategic alignment bound together under Berlin’s watchful eye.\n\nThat such a power as [FROM.GetName] would enter this arrangement marks a transformation few could have imagined in the bitter years following the war. Former rivalries have been set aside in favour of pragmatic cooperation. For [FROM.GetName], the rewards are considerable such as access to German capital, integration into the vast commercial arteries of the continental market, and the quiet but unmistakable assurance that the German Empire stands behind the stability of the new European order. With one of the great powers of Western Europe now joining the Mitteleuropa system, the economic and political centre of gravity of the continent tilts decisively toward Berlin. What began as a structure to secure victory has become the foundation of a new European equilibrium; the concert of Europe grows louder and it plays, unmistakably, Beethoven."
gerfor.256.a:0 "Excellent."

gerfor.260.t:0 "An International Concert"
gerfor.260.d:0 "At the dawn of the Weltkrieg, the German Empire stood encircled and strained, destined for isolation by the Entente. Encircled by the Royal Navy, our granaries thinned and industries were pressed to their limits. Our allies fared even worse, as Austria-Hungary almost faltered  under its own contradictions while the Ottoman Empire groaned beneath internal decay. Economic isolation tightened like a vise, and famine stalked the home front even as our armies held firm abroad. It was a crucible that tested not merely our soldiers, but the very structure of our state.\n\nAnd yet, from that ordeal emerged clarity. The Empire learned that power without partners courts catastrophe, that steel and discipline alone cannot substitute for trade and diplomacy. Even an empire as formidable as ours cannot thrive beset on all sides, cut off from markets and encircled by hostility. The Tirpitzian administration, bellicose in reputation, nevertheless grasped this truth and labored to mend fences, cultivate influence, and secure Germany’s place within a broader international framework.\n\nThe new Reichskanzler inherits not merely an empire, but a web of global trade and influence. If the Weltkrieg taught us anything, it is that Europe cannot endure another conflagration of that magnitude. We shall not again allow ourselves to stand alone against a hostile world."
gerfor.260.a:0 "We have learned plenty since 1914."

gerfor.261.t:0 "The Modern Expeditionaries"
gerfor.261.d:0 "From the plains of India to the mountains of Afghanistan, from the contested ports of East Asia to the frigid winters of Russia, Heer officers have accumulated hard-earned experience in the art of limited war. No longer do we think solely in terms of mass mobilization and continental fronts. The modern battlefield is dispersed, ideological, and often undeclared which Germany must be prepared to shape accordingly.\n\nOur interventions abroad have revealed both the promise and the peril of volunteer forces. Properly equipped and guided, expeditionary detachments can tip the balance in regional conflicts, secure friendly governments, and extinguish syndicalist agitation before it spreads. Mismanaged, they risk entanglement and embarrassment. Thus we shall cultivate a new generation of expeditionaries: professional, mobile, and politically attuned. As the world rips itself apart we shall be ready to put it back together!"
gerfor.261.a:0 "Adventure calls!"

gerfor.262.t:0 "German Volunteers Arrive in Pskov"
gerfor.262.d:0 "The winds that sweep across Pskov carry with them the same bitter chill that once defined the Eastern front and the following intervention. Snow settles upon trenches scarcely thawed from the last great upheaval, and once more Russia fractures under the weight of its own contradictions. The Second Russian Civil War has turned brother against brother, socialism against tradition, and from this frozen crucible the future of the East will be forged.\n\nInto this stark landscape march German volunteers - disciplined, well-equipped, and hardened by experience. Their arrival seeks to shape the fate of Russia in Berlin's favour. There is little public support of the volunteers outside Avalov’s clique, the previous intervention a symbol of national humiliation for Russia, but they will be a key player against the return of Bolshevism."
gerfor.262.a:0 "They are most welcome here!"
gerfor.262.b:0 "The Bolsheviks clearly haven't learned."

gerfor.263.t:0 "More Volunteers Arrive in Pskov"
gerfor.263.d:0 "The frost has not relented, nor has the fighting. Pskov remains locked in a grim contest of endurance and attrition. More Heer volunteers, their boots crunching through snow already stained by war, have arrived to relieve the front and bring a swift end to war. Their numbers are not vast but show that the Reich's commitment, once tentative, has deepened. Supplies, officers, and seasoned detachments signal that this will not be a fleeting intervention. Memories have stirred among veterans of the last civil war, of the first intervention and of unfinished reckonings in the East. Whether history repeats itself or corrects its course remains uncertain. With each new transport that arrives, it becomes clearer that Western Russian Army is not isolated and the balance of Eastern Europe may yet turn."
gerfor.263.a:0 "Their help is sorely needed."
gerfor.263.b:0 "Just like 1919, eh?"

gerfor.264.t:0 "German Materiel Arrives"
gerfor.264.d:0 "Crates bearing the Kaiser’s markings have begun to arrive at depots and docks, their contents eagerly inventoried by quartermasters and officers alike. Within lie the instruments of modern war: Mauser rifles, Walther pistols, machine guns machined to meticulous tolerances, and ammunition packed with characteristic Prussian efficiency. The Germans have seen the sense in backing our army to bring order to our fractious nation. Certainly a calculated means of extending influence without overextending manpower, they will be key in entretching us against the Reds. War may be fought by men, but it is sustained by industry.  When the Ruhr's industry commits itself, it does so with precision and purpose unmatched world wide. With every delivery our deliverance from the red menace inches closer!"
gerfor.264.a:0 "Danke!"

gerfor.265.t:0 "The King in New Orleans, or the Patriots in Atlanta?"
gerfor.265.d:0 "Across the Atlantic, the American colossus tears itself apart. The Second American Civil War has reduced cities to fortresses and ideologies to militias, as competing visions of the republic clash in fire and fury. \n\nIn the American Union State, one claimant styles himself a champion of order and populism, a monarch in all but name, enthroned not by crown but by charisma. From New Orleans, Huey Long and his movement rallies those disillusioned with federal paralysis, promising stability through personal authority and sweeping reform. He is volatile, ambitious, and undeniably influential.\n\nElsewhere, in Atlanta and beyond, the Constitutional Republic proclaims fidelity to the old American framework. Draped in the language of law and Cavalier heritage, its leaders claim to defend the continuity of the Union against both radicalism and racial subversion.\n\nNeither successor state is without risk. The American furnace burns hot, and whichever faction emerges will shape the Atlantic balance for decades to come. We must choose carefully where German influence shall rest."
gerfor.265.a:0 "Let us support the Constitutional Republic."
gerfor.265.b:0 "We should prop up Huey Long."

gerfor.266.t:0 "German Volunteers Arrive in the South"
gerfor.266.d:0 "The Atlantic crossing is long, but the heat that greets our new volunteers upon arrival is longer still. The American South is a land of sweltering fields, where cicadas drone louder than artillery and the air itself feels heavy with tension. Here, amid magnolia blossoms and burning rail lines, another chapter of civil strife unfolds. Volunteers have disembarked beneath a foreign sun, their gray uniforms ill-suited to the humidity yet unmistakable in bearing. Their training, discipline, and equipment lend an immediate weight to our solemn cause. Welcomed with all the hospitality of the south, they are treated with a deep respect and curiosity. When they reach the front lines their precise, reserved, and methodical way of war will be key in the victory over the internal enemies of America. A decisive force has entered the fray, ready to bring a new order to the new world."
gerfor.266.a:0 "Welcome to America!"
gerfor.266.b:0 "Such a wild place."

gerfor.267.t:0 "German Volunteers Arrive in New Orleans"
gerfor.267.d:0 "New Orleans rises from the delta like a fever dream — music spilling from balconies, riverboats churning along the Mississippi, and beneath it all the steady pulse of unrest. The humidity clings like a second uniform over the field grey, and the mosquitoes prove as relentless as any partisan. It is a far cry from the orderly streets of Berlin or Munich. Yet into this vibrant chaos march German volunteers, their boots echoing along cobblestone and dockyard alike. Their arrival in the Crescent City is welcomed to the sorry eyes of the sultry heart of Louisiana, advisors fanning out across headquarters, inspecting lines and drilling local formations with characteristic efficiency. For the men themselves, the adjustment is stark as language, climate, and culture collide in a whirlwind of jazz and gunfire. Regardless, the German soldiers are quickly adapting and will soon provide a key force to restore order on this sorry land."
gerfor.267.a:0 "Welcome to America!"
gerfor.267.b:0 "Such a wild place."

gerfor.268.t:0 "German-American Battalions"
gerfor.268.d:0 "Across the divided United States, communities of German descent watch events with sharpened interest. For generations they have tilled American soil, built businesses, and served under the Stars and Stripes yet many have never entirely forgotten the language, customs, and heritage of the old country. Now, as civil war fractures the republic, that heritage offers Berlin a unique opportunity.\n\nWith careful organization and discreet encouragement, German-American battalions have taken shape in support of our cause. Volunteers drawn from immigrant families and sympathetic circles are formed into cohesive units governed by Heer advisors. Their existence is politically delicate, yet militarily valuable to operate seamlessly within American formations while retaining a quiet loyalty to Berlin’s interests. They will be key that upon inevitable victory, the Reich's tongue will not go unheard."
gerfor.268.a:0 "Long may they stand above all."
gerfor.268.b:0 "Long may they stand above all."

gerfor.269.t:0 "German-American Battalions"
gerfor.269.d:0 "Across the divided United States, communities of German descent watch events with sharpened interest. For generations they have tilled American soil, built businesses, and served under the Stars and Stripes yet many have never entirely forgotten the language, customs, and heritage of the old country. Now, as civil war fractures the republic, that heritage offers Berlin a unique opportunity.\n\nWith careful organization and discreet encouragement, German-American battalions have taken shape in support of our cause. Volunteers drawn from immigrant families and sympathetic circles are formed into cohesive units governed by Heer advisors. Their existence is politically delicate, yet militarily valuable to operate seamlessly within American formations while retaining a quiet loyalty to Berlin’s interests. They will be key that upon inevitable victory, the Reich's tongue will not go unheard."
gerfor.269.a:0 "Long may they stand above all."
gerfor.269.b:0 "Long may they stand above all."

gerfor.270.t:0 "The Iberian Test Bed"
gerfor.270.d:0 "Spain burns, and Europe watches. Full civil war has transformed Iberia into a proving ground for ideologies and armaments alike. For Germany, intervention here is not solely about allegiance but to shape its doctrine and military strength. The next great war, should it come, will not resemble the trenches of 1914 and Spain offers a glimpse of that future.\n\nAircraft scream across Mediterranean skies, armored columns maneuver through arid plains, and new communications equipment coordinates assaults with unprecedented precision. Advisors oversee deployments with keen interest, noting every success and every failure.The arrival of such modern equipment inspires awe and expectation in Spain and will be great investments for the coming victory in Madrid."
gerfor.270.a:0 "Such modern equipment!"
gerfor.270.b:0 "Just don't crash the expensive stuff."

gerfor.271.t:0 "Judgment Falls Over Catalonia"
gerfor.271.d:0 "The skies above Catalonia darken under wing as engines fill the air with smoke. Barcelona - defiant, turbulent, and swollen with factional militias - has become the centerpiece of Iberia’s chaos. Syndicalist committees fortify factories while Carlist banners flutter in rival quarters, each proclaiming their own vision of Spain’s salvation. Yet from above, such distinctions blur.\n\nLuftwafe aircraft carve disciplined paths through Mediterranean air, their payloads calibrated with clinical precision. The age of static fronts has passed; now cities themselves stand as battlegrounds, and modern war recognizes few sanctuaries. Fire bombs, cluster munitions and all new forms of mechanical menace of the skies shall rain the devils due on the demons. None shall escape the reach of the Kaiser's men. The aerial circus of death shall have the last laugh as the forces of chaos are brought to their knees in a complete storm of destruction. Whether red or royalist, those who defy the balance we intend to shape may find the sky itself turned against them."
gerfor.271.a:0 "Syndicalists and Carlists alike shall burn from our raids."
gerfor.271.b:0 "Syndicalists and Carlists alike shall burn from our raids."

gerfor.272.t:0 "Renewed Cooperation Between the Ottomans and Germans"
gerfor.272.d:0 "Empires tempered in the same furnace seldom forget one another. Though both Berlin and Constantinople have endured humiliation, upheaval, and reform, the strategic logic that once bound them endures. From the railways of Anatolia to the officer academies shaped by Prussian instruction, threads of partnership have survived even the harshest reckonings of the last war.\n\nNow, in a world again unsettled, those threads are drawn tight once more. The Reich's engineers and advisors return to Ottoman soil, while Turkish envoys speak warmly of shared interests and mutual vigilance. The eastern Mediterranean, ever a crossroads of ambition, demands coordination between powers who understand the burdens of imperial stewardship. Together, we anchor stability in regions prone to conflagration. Together, we ensure that neither Europe nor the Near East descends into chaos unchallenged."
gerfor.272.a:0 "Long live our friendship!"
gerfor.272.b:0 "Long live our friendship!"

gerfor.273.t:0 "An Alliance Against Alexandria"
gerfor.273.d:0 "The Nile has long been the lifeblood of empires, but now its waters reflect flame. Cairo, sprawling and defiant, stands at the heart of a regime whose ambitions have clashed irrevocably with our designs. What was once posturing has hardened into confrontation, and confrontation into calculated devastation.\n\nAir squadrons and artillery detachments converge with ruthless efficiency. Rail lines swell with Egyptian troops, destined for potential future frontlines, and warehouses across Cairo and beyond grow fat from munitions and military vehicles. From shared German and Ottoman holdings, the heart of the Arab revolution must inevitably be leveled to secure stability for the Orient.\n\nThe Middle East shall not become a theater of unchecked defiance. If Cairo must burn to secure that truth, then burn it shall."
gerfor.273.a:0 "Their posturing must come to an end, calamitous as it may be."
gerfor.273.b:0 "Their posturing must come to an end, calamitous as it may be."

gerfor.274.t:0 "The Reich in Addis Ababa"
gerfor.274.d:0 "Amid the turbulence of North Africa, another power watches carefully from the highlands of the Horn. Ethiopia - ancient, proud, and fiercely independent - occupies a position of increasing significance to the shifting African order. With Egypt asserting itself ever more boldly, Addis Ababa finds its interests increasingly aligned with the Reich's. German diplomats and military observers have made discreet overtures to the emperor as a result. Modernization assistance, industrial expertise, and military training are offered for partnership. Ethiopia’s strategic location and martial tradition make it a natural counterweight to Egyptian ambition, provided it is equipped to stand confidently upon the regional stage."
gerfor.274.a:0 "Some welcome assistance!"
gerfor.274.b:0 "Their efforts are admirable enough."

gerfor.275.t:0 "The Bulwark Against the Sultanate"
gerfor.275.d:0 "Where the Nile bends and the deserts stretch unbroken, Egypt’s ambitions have unsettled the region. It’s ceaselessly posturing against neighbors and the vital Suez, threatening to redraw lines that others hold sacred. A shared adversary, however, has a way of clarifying diplomacy. Heer advisors have coordinated with Ethiopian counterparts, exchanging intelligence, doctrine, and matériel. The aim would be to erect a bulwark against Egyptian overreach and to show aggression will meet organized resistance. Together, Berlin and Addis Ababa could form a counterweight capable of reshaping the strategic equation along the Nile, and it shall begin with new Panzer technology being sent to Ethiopian institutes. If Egypt presses too far, it may find not a fractured frontier, but a united wall of steel."
gerfor.275.a:0 "Soon, we will have our own Panzers!"
gerfor.275.b:0 "They shall be useful for Africa's future."

gerfor.280.t:0 "European Housekeeping"
gerfor.280.d:0 "As we have reshaped the map across Europe and the world, new partners have entered our orbit. With each accession, the architecture of our continental order grows more intricate. In turn economic activity has grown en masse and the question before us is not whether to benefit, but how. Economic integration offers stability: expanded markets, preferential tariffs, coordinated reconstruction, and a Mitteleuropa whose arteries pulse with mega-corporation capital. A prosperous Europe under our guidance is a Europe less prone to upheaval and more dependent upon our stewardship. However, while our coffers could certainly swell from all of this, our military remains hungry to poach everything from technology, to arms licenses, to even advisors from across many borders. Whether it is our banks that shall benefit or our generals is a question that only the Kaiser can answer."
gerfor.280.a:0 "Prioritize economic benefits."
gerfor.280.b:0 "Prioritize military benefits."

gerfor.281.t:0 "An Envoy to Naples"
gerfor.281.d:0 "Southern Italy stands at a crossroads of the Mediterranean, its ports commanding key sea lanes and its politics ever fluid. The Kingdom of the Two Sicilies, restored yet wary, if cultivated carefully, could become a keystone in our southern strategy. An envoy, to be dispatched from Berlin, has already penned proposals of economic incentives, military guarantees, and infrastructure investments. The range of inducements is broad, and our willingness to commit will shape the outcome. A lavish offer will better bind Sicily firmly into our embrace, though at notable cost, while smaller offers will have increased risk of insult. Italy has always been a land of passion, and so to win Naples it will require significant courtship."
gerfor.281.a:0 "Promise a whole bunch to them."
gerfor.281.b:0 "Promise only a little."
gerfor.281.c:0 "Promise nothing."

gerfor.282.t:0 "An Envoy from Germany"
gerfor.282.d:0 "Berlin’s emissary arrived in Naples today with polished boots and honeyed words. His message is unmistakable: the Kaiser sees opportunity in partnership. Investments in port facilities, modernization of the armed forces, and preferential trade agreements are all placed upon the table, their extent calibrated by Berlin’s appetite for commitment. To align closely with Germany promises protection and prosperity within a continental system increasingly shaped from the north. Yet it also carries the risk of dependency and risks upsetting the balance of power in the peninsula. A measured approach to our commitment will determine our flexibility and in turn the support we gain. The diplomatic move has become the talk of Italy as the terms of Risorgimento are being written."
gerfor.282.a:0 "We can cooperate a lot."
gerfor.282.b:0 "We can cooperate a little."
gerfor.282.c:0 "We don't want to work with Germany."
gerfor.282.e:0 "Absolutely not!"

gerfor.283.t:0 "Sicily Proposes Deep Cooperation"
gerfor.283.d:0 "The response from Naples has exceeded expectations. Rather than cautious diplomatic overtures, the Sicilian government now proposes a far deeper arrangement: an alignment of states bound by shared military planning, preferential trade, and coordinated industrial policy. Joint naval doctrine in the Mediterranean, mutual access to ports and armaments, and the quiet promise of political solidarity in times of crisis form the backbone of what is, in effect, a budding alliance.\n\nWith the socialist north still propped up by the Commune’s patronage, the Sicilian court sees its future tied to a powerful partner capable of securing the balance of the peninsula. For Germany, the advantages are flattering. A friendly Naples would anchor our influence in southern Italy, extend our naval reach across the Mediterranean, and bind yet another European state into the growing web of Berlin’s economic and strategic order. Italian politics are notoriously volatile however, and entanglement in the peninsula’s endless intrigues could prove more burdensome than beneficial. Either decision will rely on the lessons learned from the Italo-Prussian Alliance, only total commitment will result in mutual success."
gerfor.283.a:0 "Sounds great."
gerfor.283.b:0 "Actually, we don't want any Italians around."

gerfor.284.t:0 "Sicily Proposes Light Cooperation"
gerfor.284.d:0 "Naples has replied at last without any sweeping commitments but has promised minor cross national engagement. The Kingdom of the Two Sicilies has expressed willingness to explore limited cooperation: trade preferences, select military exchanges, perhaps a naval understanding confined to specific theaters. Sicily is wary albeit open to German partnership, but as the Kingdom is racked with political issues it lacks the strength to act on it. Naples proposes a measured foothold in the central Mediterranean that may prove preferable to overextension. Yet one must ask if accepting such half-measures can be accepted or if this deal should be refused completely."
gerfor.284.a:0 "Sounds good."
gerfor.284.b:0 "No."

gerfor.285.t:0 "Sicily Refuses Cooperation"
gerfor.285.d:0 "The reply from Naples is as unambiguous as it is unwelcome. The Sicilian government has declined our overtures outright, citing the defence of the fragile balance of the Italian peninsula. To keep foreign powers out of Italian affairs, fearing the intervention of the Internationale, and being unwilling to commit are all cited. The consequences of a Mediterranean partner spurned drifting elsewhere toward rival powers remain to be seen. The foreign office will keep our options open and Sicily may yet learn the value of German partnership perhaps when circumstances grow less comfortable without it."
gerfor.285.a:0 "Damn."

gerfor.286.t:0 "An Envoy to Holland"
gerfor.286.d:0 "The Netherlands, the merchants of Europe and custodians of vital ports of far-flung colonial holdings in both the west and east, occupy a position no continental strategist can ignore. Their harbors funnel trade of rubber coffee and oil into the German heartland and their neutrality has long been both asset and complication. Now our tentacles have reached the Hague, seeking to replace quiet coexistence with structured partnership. Economic integration, naval coordination, colonial guarantees, all may be offered depending upon the Kaiser’s appetite for commitment. A generous proposal could anchor Dutch fortunes firmly to our own and overcome the Dutch’s cautious nature. With the riches of the east and west as possible prizes, it is hard to undervalue the possible value of such a successful relationship."
gerfor.286.a:0 "Promise a lot."
gerfor.286.b:0 "Promise a little."
gerfor.286.c:0 "Promise nothing."

gerfor.287.t:0 "An Envoy from Germany"
gerfor.287.d:0 "A representative has arrived in the Hague bearing proposals of economic alignment with Berlin. Their ambassador has spoken to the ministry seeking to harmonise trade and establish some mutual investment considerations. The tone is cordial, yet unmistakably ambitious, as Germany seeks more than neighborly pleasantries. Cooperation promises privileged access to Europe’s largest market and the implicit protection of power expanded from simple Mitteleuropean membership. Yet the Reich's history of economic maneuvering has taught how important the value of autonomy is against the German giant. As the threat of the Internationale grows in strength, the threat of entanglement in a continental conflict grows. The protection of colonial holdings cannot be guaranteed if such chaos breaks out, though German East Asia could be a key ally in the region. Careful calculations must be made to thread the needle with the Reich to ensure our interests are secure."
gerfor.287.a:0 "We can cooperate a lot."
gerfor.287.b:0 "We can cooperate a little."
gerfor.287.c:0 "We don't want to work with Germany."

gerfor.288.t:0 "The Netherlands Proposes Deep Cooperation"
gerfor.288.d:0 "The reply from the Hague exceeded even our more optimistic projections. Rather than cautious trade talks or incremental alignment, the Dutch government proposed extensive and formalized cooperation. If these talks are to be allowed to continue it would be tantamount to a new allegiance!\n\nThe Netherlands understands its place in the world all too well forcing their acceptance: perched at the mouth of Europe’s great rivers, bordered by powers far larger than itself, and dependent upon maritime commerce for survival. For Germany, deep cooperation would secure our northwestern flank, anchor continental trade through Rotterdam’s harbors, and extend influence into colonial theaters without direct annexation."
gerfor.288.a:0 "Sounds great."
gerfor.288.b:0 "Actually, we don't want any Dutch around."

gerfor.289.t:0 "The Netherlands Proposes Light Cooperation"
gerfor.289.d:0 "The Dutch response has been measured, sober, and entirely uninspiring - in keeping with their reputation. Rather than sweeping commitments, the Hague suggested limited cooperation of favorable trade arrangements, selective naval coordination, and periodic diplomatic consultations. It is an offer of stability without much commitment. These merchants have calculated risk as carefully as their admirals charted the coastlines of Indonesia. It is clear they are seeking accommodation between the great powers, unwitting to the fact modern times have made such actions infeasible. For us, light cooperation offers quiet gains. Increased trade flows, improved stability in Dutch colonial possessions, and a cordial neighbor on the North Sea may suffice with a door open for future deals. Though the question remains if it is worth settling for such a middling deal."
gerfor.289.a:0 "Sounds good."
gerfor.289.b:0 "No."

gerfor.290.t:0 "The Netherlands Refuses Cooperation"
gerfor.290.d:0 "The answer from the Hague is courteous but firm. The Netherlands declined formal cooperation, citing its long-standing tradition of independence and its desire to avoid binding alignments. Behind the careful phrasing lay a clear message of neutrality remaining the cornerstone of their policy. It is a setback, though not an unexpected one. The Dutch have survived centuries precisely by resisting absorption into continental rivalries. Their ports may trade with us, their bankers may finance ventures across Europe, but their government remains resolute in preserving freedom of diplomatic maneuver. It is a decision to the windmill worshiper's detriment and means we must keep a firm eye on them as their undoubted incompetence may allow insurgent forces a weak point to assault. The Netherlands may decline formal integration today, but it cannot escape the gravitational pull of the continent’s strongest power whether it likes it or not."
gerfor.290.a:0 "Damn."

gerfor.291.t:0 "An Envoy to Dublin"
gerfor.291.d:0 "Across the Irish Sea lies a nation newly assertive and fiercely protective of its sovereignty. Ireland, long dominated and brutalised by its larger neighbor, now charts its own course in a Europe reshaped by war and revolution. Dublin represents both opportunity and leverage,  a potential partner positioned along vital Atlantic approaches and close to the throat of syndicalist agitation. The foreign office has thus commissioned an envoy to be dispatched bearing proposals carefully tailored to Irish sensibilities. Economic investment in infrastructure and industry could accelerate Dublin’s modernization, while military guarantees and training missions might ensure that Ireland stands secure against external pressure. Ireland’s leaders will inevitably divide themselves within nationalist camps, so maneuvering through their pride will be key. Alignment with Berlin offers security and continental access, yet risks antagonizing other powers. How generous shall we be in our courtship to sway the nationalists into our protection?"
gerfor.291.a:0 "Promise a lot."
gerfor.291.b:0 "Promise a little."
gerfor.291.c:0 "Promise nothing."

gerfor.292.t:0 "An Envoy from Germany"
gerfor.292.d:0 "An odd fellow from Europe has arrived in Dublin seeking a meeting with the Taoiseach and president. His credentials are stamped with the weight of the Berlin foreign office along with a carefully articulated offer. He seeks to build a new framework for cooperation between Ireland and Mitteleuropa with the expansion of the existing commercial networks, preferential trade arrangements, and avenues for military consultation all presented as incentives for closer alignment. The Diplomat argues that the shifting balance of power across Europe and England's increasing expansionism demands new partnerships, and that Ireland holds a place of growing strategic importance in the Empire’s calculations.\n\nWithin Dublin, the proposal has sparked immediate debate.  Full cooperation would draw Ireland firmly into Germany’s orbit, serving as a de facto allegiance. A more limited arrangement could offer economic and strategic benefits while preserving Ireland’s cherished independence. Yet there remains another path entirely by rejecting the overtures and maintaining the nation’s autonomy, trusting that distance and diplomacy will suffice to shield Ireland from the ambitions of the continent’s great powers."
gerfor.292.a:0 "We can cooperate a lot."
gerfor.292.b:0 "We can cooperate a little."
gerfor.292.c:0 "We don't want to work with Germany."

gerfor.293.t:0 "Ireland Proposes Deep Cooperation"
gerfor.293.d:0 "The reply from Dublin has arrived with unexpected enthusiasm. Rather than cautious diplomacy, the Irish government has proposed a far-reaching framework for cooperation with the Empire. The proposal outlines preferential trade structures, extensive economic coordination with Mitteleuropa, and the full military collaboration designed to safeguard Ireland’s security into the Reichspakt.\n\nIrish ports could serve as valuable outposts along the Atlantic approaches putting pressure on England while economic integration would draw Dublin steadily closer to the markets and capital that flow outward from the heartland. The opportunity now stands to embrace Ireland as a committed partner in the German-led order, or to step back and avoid entanglement on the far side of Europe."
gerfor.293.a:0 "Sounds great."
gerfor.293.b:0 "Actually, we don't want any Irish around."

gerfor.294.t:0 "Ireland Proposes Light Cooperation"
gerfor.294.d:0 "Dublin’s response has been measured and cautious, reflecting Ireland's recent wariness of great powers. Rather than embracing full integration with Berlin’s continental system, the Irish government has proposed a more limited arrangement of cooperation. Selective trade agreements, occasional military consultation, and modest diplomatic coordination form the foundation of their offer.\n\nSuch an approach would allow Ireland to benefit from economic engagement with Mitteleuropa while avoiding the deeper commitments that might compromise its independence. While it falls short of the deeper alignment some had hoped for, even limited cooperation would extend German influence into the western approaches and deny other power blocks from taking the emerald Isles from under us. Whether this cautious partnership will serve Germany’s long-term ambitions or merely reflect Ireland’s reluctance to commit fully, remains to be seen."
gerfor.294.a:0 "Sounds good."
gerfor.294.b:0 "No."

gerfor.295.t:0 "Ireland Refuses Cooperation"
gerfor.295.d:0 "The response from Dublin has been decisively disappointing. After deliberation within the Irish government, Berlin’s proposal for cooperation has been firmly declined. Though the refusal was delivered in courteous diplomatic language, its meaning is unmistakable that Ireland intends to remain outside Germany’s growing continental system.\n\nIrish leaders have justified their decision by invoking the hard-earned sovereignty of their nation. Geography and independence, they argue, remain the surest guarantors of the state’s future. Ireland has strongly guarded its autonomy with determination, and the island’s leaders evidently believe they can navigate the shifting tides of European politics without committing themselves to the orbit of the Empire."
gerfor.295.a:0 "Damn."

gerfor.296.t:0 "The Dual Empires"
gerfor.296.d:0 "For decades the political landscape of Central Europe has rested upon the uneasy relationship between its two great Germanic pillars: Berlin and Vienna. Once partners in the old order of monarchs and dynasties, the aftermath of the Weltkrieg and the reshaping of Europe left the Dual Empires walking opposite paths rather than marching in lockstep. Germany emerged as the undisputed hegemon of the continent, while Austria struggled to preserve unity within its vast and fractious Danubian realm.\n\nYet the strategic logic that once bound the Hohenzollerns and the Habsburgs has not disappeared. Syndicalist agitation threatens the stability of Europe from west to east, nationalist movements gnaw at imperial borders, and the fragile balance of power in the Balkans grows more volatile by the year. In such an environment, the question of Austro-German cooperation has returned to the forefront of diplomatic thinking in Berlin.\n\nSome within the Foreign Office argue that the time has come to renew Austrian support once and for all, binding Vienna tightly into Berlin’s political and military orbit and ensuring that the old alliance of the Central Powers endures in a new form. Others counsel caution, noting that pressing Austria too hard may draw us into a region at the edge of war."
gerfor.296.a:0 "We must guarantee Austrian support."
gerfor.296.b:0 "Just make some minor diplomatic overtures."

gerfor.297.t:0 "Germany Proposes Renewed Relations"
gerfor.297.d:0 "Berlin has once again turned its gaze southward. Diplomats have arrived in Vienna bearing proposals to revitalize the relationship between the two great empires that dominate Central Europe. The language of the memorandum is courteous and carefully measured, speaking of "historic friendship", "shared stability", and the necessity of cooperation in an increasingly uncertain world.\n\nGermany seeks a closer alignment between Berlin and Vienna, hoping to ensure that the Danubian Monarchy remains firmly within the broader sphere rather than drifting into isolation or pursuing its own competing ambitions in the Balkans or the east. The proposal suggests expanded diplomatic coordination, increased military consultation, and a framework for greater economic integration between the two empires.\n\nWithin the halls of the Hofburg the proposal has already sparked debate. Some ministers view closer relations with Germany as both natural and necessary, recalling the wartime partnership that once held Europe in balance. Others warn that Vienna must be careful not to become a junior partner in a Berlin-dominated order which caused the imperial split originally. Whether this initiative marks the beginning of a renewed partnership or merely another polite exchange between cautious powers now rests in Austrian hands."
gerfor.297.a:0 "Sounds good."
gerfor.297.b:0 "We enjoy the status quo."

gerfor.298.t:0 "Austria Agrees"
gerfor.298.d:0 "The response from Vienna has arrived, and with it comes a signal that the old relationship between the Central European empires may yet be restored. The Habsburg government has indicated its willingness to deepen relations with the Reichskanzler, acknowledging the mutual benefits of cooperation in diplomacy, economics, and military planning. While the language of the agreement remains careful and respectful of Austrian sovereignty, its implications are clear that Berlin and Vienna will stand together once more.\n\nFor Germany, the acceptance of this proposal secures a powerful partner along the Danube and stabilizes the southern flank of the Mitteleuropean system. For Austria, closer ties with the continent’s dominant power promise economic opportunity and strategic reassurance in an era of growing uncertainty. The history between the Hohenzollerns and the Habsburgs is long and complicated but for now the Dual Germanic Empires once again move in concert."
gerfor.298.a:0 "Deal."
gerfor.298.b:0 "Nevermind, actually."

gerfor.299.t:0 "Austria Refuses"
gerfor.299.d:0 "The answer from Vienna has arrived, it is not the one Berlin had hoped for. After weeks of diplomatic exchanges and careful negotiation, the Habsburg court has politely but firmly declined Germany’s proposal for renewed strategic coordination between the two empires. While the Austrian government emphasized its continued respect for the historic friendship between Berlin and Vienna, it made clear that it intends to preserve the current balance rather than bind itself more closely to the continental system.\n\nWithin the Wilhelmstrasse the reaction has been one of quiet disappointment. Many had believed that the pressures of the modern world - syndicalist agitation, Balkan instability, and the hungry bear of the east - would naturally drive the Dual Monarchy back into closer partnership with the Reich. Instead, Vienna appears content to maintain its independence of action. For now the matter is closed, though few believe the question of Austro-German cooperation has been settled for good."
gerfor.299.a:0 "Damn!"

gerfor.300.t:0 "An Envoy to Stockholm"
gerfor.300.d:0 "Among the monarchies of Europe, Sweden has long been regarded in Berlin as a natural partner. Bound by cultural admiration, dynastic ties, and a shared suspicion of radical republicanism, the Swedish court has historically looked favorably upon the Prussian model of monarchy and military discipline. Within certain circles of Stockholm’s aristocracy, admiration for statecraft borders on outright fascination.\n\nNow, as Germany continues to strengthen its diplomatic architecture across Europe, the question of Sweden’s alignment has returned to the forefront. The Baltic remains a vital strategic theatre, and a friendly Sweden would secure the Reich's northern flank while strengthening the broader framework of cooperation around the Reichspakt. Some argue that such an important approach should be made personally by the Kaiser himself, whose presence would carry immense prestige and flatter the Swedish court. The other option is to handle the matter more conventionally through the Reichskanzler and the professional machinery of the Foreign Office."
gerfor.300.a:0 "The Kaiser shall go personally."
gerfor.300.b:0 "The Reichskanzler can manage this."

gerfor.301.t:0 "An Envoy from Germany"
gerfor.301.d:0 "A distinguished delegation from Berlin has arrived in Stockholm bearing a proposal of significance. Speaking of shared monarchic values and northern stability, the envoy has outlined Berlin’s desire for Sweden to enter into closer alignment with the German-led continental order. The proposal seems to expand economic cooperation, diplomatic coordination, and the possibility of deeper strategic partnership within the broader framework of the Reichspakt alliance. Stockholm’s participation would align Europe’s monarchies against the growing forces of instability and ideological upheaval exemplified by the growing ravenous syndicalist horde.\n\nWithin the Swedish government, however, the proposal has sparked intense debate. Supporters argue that closer cooperation with the continent’s dominant power is both logical and beneficial; but it is a step that could entangle Sweden in conflicts far beyond its borders. The ministry and the royal court must now decide how entwined it must be to the master of Mittleuropa."
gerfor.301.a:0 "It's about time!"
gerfor.301.b:0 "We'll pass on this offer."

gerfor.302.t:0 "Sweden Desires Deeper Relations"
gerfor.302.d:0 "The reply from Stockholm has arrived with surprising enthusiasm. Rather than limiting themselves to cautious diplomacy, the Swedish government has expressed a clear interest in expanding relations with Germany far beyond the original proposal. What Berlin had envisioned as a step toward closer cooperation has, in Swedish eyes, become an opportunity to anchor their kingdom more firmly within the emerging political and economic order shaped by the Empire.\n\nStockholm’s proposal outlines a framework for expanded commercial integration, naval coordination in the Baltic, and the gradual harmonization with the Reichspakt. The Swedes see clear advantages in tying their economy to the vast continental markets dominated by Krupp capital, while the royal court itself has long admired the discipline and stability of the Prussian state. In their view, a deeper alignment with Berlin would strengthen Sweden’s position while ensuring the Baltic remains secure from hostile powers. It must be said that by binding Sweden too tightly to Berlin could draw Germany into Nordic affairs that have long remained outside our immediate strategic focus. Whether to accept Stockholm’s eagerness or temper it with caution is now a question for the Kaiser to decide."
gerfor.302.a:0 "Great."
gerfor.302.b:0 "Nevermind."

gerfor.303.t:0 "Sweden Refuses Cooperation"
gerfor.303.d:0 "The answer from Stockholm has arrived, and with it the quiet closing of a diplomatic door. After careful deliberation within the Riksdag and the royal court, the Swedish government has declined the proposal for closer cooperation. While the Swedish response was phrased in polite and respectful language, its clear that Stockholm intends to preserve its independence of action rather than formally align itself with the growing continental system.\n\nThough they acknowledge Germany’s influence and express a desire for continued friendly relations, they appear unwilling to bind their foreign policy to the ambitions of any single power. For many in Stockholm, the preservation of autonomy in Scandinavia and the avoidance of entangling alliances remains the cornerstone of the Swedish state. Scandinavia has always been a region wary of great power politics, and Sweden’s leaders evidently believe distance and diplomacy will continue to shield them from the continent’s storms."
gerfor.303.a:0 "Damn."

gerfor.304.t:0 "An Eye in the North"
gerfor.304.d:0 "Strategists within the Admiralty have increasingly turned their attention toward the far reaches of the North Atlantic. Though distant from the industrial heartlands of Europe, the islands of Iceland and Greenland occupy positions of immense strategic value. From these windswept outposts a navy could monitor shipping lanes, control access between the Atlantic and the Arctic, and establish forward bases capable of threatening or defending the sea routes that sustain the Empire and threaten the Entente and Internationale.\n\nThe growing tension with the Union of Britain has only intensified these concerns. Should conflict erupt, control of the North Atlantic would become a decisive factor in the struggle for maritime supremacy. British fleets could attempt to choke trade or strike at our shipping far from European waters, while German forces lacking adequate staging points would find it difficult to challenge their dominance in the open ocean.\n\nFor this reason the Foreign Office and the Admiralty have begun exploring new arrangements with Denmark, whose control of Iceland and Greenland grants it authority over these strategically vital territories. Some voices in Berlin advocate a bold approach: demanding direct access or even outright control over these islands in the name of security. Others recommend a more diplomatic course, seeking Denmark’s voluntary integration into the Reichspakt and thereby securing the northern Atlantic through alliance rather than coercion."
gerfor.304.a:0 "Demand Iceland and Greenland outright."
gerfor.304.b:0 "Push for Danish participation in the Reichspakt."

gerfor.305.t:0 "Germany Demands Iceland and Greenland"
gerfor.305.d:0 "A message of unusual gravity has arrived from Berlin. Diplomats, speaking with the quiet confidence of a great power accustomed to shaping the continent’s affairs, have presented Copenhagen with a demand for the transfer of administrative control over Iceland and Greenland into the Kaiser's hands. The islands, they argue, are of immense strategic importance in an age where naval aviation and long-range fleets now contest the vast expanse of the North Atlantic. It is a naked act of aggression sold as being to guarantee the security of the Atlantic sea lanes against the growing menace posed by the Union of Britain. From Berlin’s perspective, the windswept harbors of Reykjavik and the icy coasts of Greenland could be useful remote colonial possessions, with little care of local populations, to watch over the northern approaches to Europe.\n\nTo surrender these territories would be a humiliating concession to their pressure, an acknowledgment that Denmark’s sovereignty must bend before the strategic designs of the Reich. Yet to refuse outright risks provoking the ire of Europe’s most powerful state, whose economic and military weight looms heavily over Scandinavia."
gerfor.305.a:0 "As they wish."
gerfor.305.b:0 "No!"

gerfor.306.t:0 "Germany Demands Reichspakt Membership"
gerfor.306.d:0 "Berlin has delivered a proposal whose implications stretch far beyond ordinary diplomacy. Envoys have approached the Danish government with a formal demand for Denmark to join the Reichspakt, the military alliance that anchors the Imperial system of continental security. Never since the Schleswig-Holstein question has Germany made such a move over Denmark. By joining the Reichspakt, Denmark would help secure the northern maritime approaches while gaining the protection of the Empire and its network of allied states.\n\nIt is clear however that the growing tensions across Europe will lead to war which will rage across the world and into the quiet waters of the Øresund. Signing on to what could be the bloodiest war in history is doubtfully the best move."
gerfor.306.a:0 "Sure."
gerfor.306.b:0 "No!"

gerfor.307.t:0 "Denmark Refuses"
gerfor.307.d:0 "The reply from Copenhagen has arrived, and with it the unmistakable tone of polite defiance. After careful deliberation, the Danish government has declined Germany’s proposal. While their response emphasized continued friendship and respect between the two nations, the message itself was clear that Denmark has no intention of altering its current course or accepting Berlin's radical proposals.\n\nThe Danish leadership has justified the decision by invoking the kingdom’s long tradition of cautious neutrality and careful diplomacy among the great powers. Though Germany’s influence in northern Europe is undeniable, Copenhagen appears determined to preserve its independence rather than risk becoming a subordinate partner in the vast geopolitical system constructed by Berlin."
gerfor.307.a:0 "Oh well."

gerfor.308.t:0 "Denmark Accepts"
gerfor.308.d:0 "Copenhagen’s response has arrived with remarkable swiftness, with their government agreeing to our demands. The Danish government has accepted Germany’s proposal, marking a significant shift in the political landscape of northern Europe. Denmark’s acquiescence with our northern policy will strengthen our position along the Baltic approaches while extending the reach of the Reich’s Talons further into Scandinavia. The Northern reaches are now open to the Reichsmarine, and along with it the vital arteries of transatlantic trade and naval movement. All now fell firmly within the orbit of strategic influence. The once cautious kingdom of Denmark has ended the balancing act between the great powers and now has given the keys to the north, decisively expanding the reach of the Imperial Eagle."
gerfor.308.a:0 "Excellent!"

gerfor.309.t:0 "Buying the Rock"
gerfor.309.d:0 "The Rock of Gibraltar, long the bastion of the British Empire in the Mediterranean and one of the most strategic locations in the entire world, has languished under Spanish rule for more than a decade now. The collapse of the British overseas empire saw many of its colonial holdings and various outposts go from the crown of Windsor to various local states, and Gibraltar was no different. The Spanish dictator, Miguel Primo de Rivera, saw his chance as news of London falling arrived in Madrid, and following a brief and tense standoff the British protectors of the Rock surrendered it to the Spanish army. In a move rather uncharacteristic of the Kingdom of Spain at the time, the Spaniards gave sweeping autonomy to Gibraltar, allowing the local Brits to largely govern the island as it had been led before, though it did receive a rather sizeable Spanish garrison and immigration from the mainland caused the local population to slowly dwindle in size. Now, much of the glory of Gibraltar's mighty defences have been lost, as the deflated Spanish budget has had no funds to spare to renovate old British guns and emplacements in the region, and many fear that if the situation continues, a Communard invasion of Iberia could see the Gibraltar strait becoming hostile to German shipping from Mittelafrika.\n\nThe Kaiserreich has considerable strategic priorities in the region, and a closed-off Gibraltar would force shipping to go through the dangerous Red Sea route, vulnerable to Egyptian, Somali and Yemeni piracy. The government of Germany has seen this weakness as something the empire cannot allow, and thus proposals have been drafted to buy the Rock from the Spanish government. The small island is very much a point of pride for the Spaniards, but given their dire economic straits and sympathetic government towards Germany, experts believe that Spain will accept the terms, though increasing the payment is likely to grease the wheels of the process even further."
gerfor.309.a:0 "Send some money."
gerfor.309.b:0 "Send a lot of money."

gerfor.310.t:0 "Germany Wants Gibraltar"
gerfor.310.d:0 "The Rock of Gibraltar, that ancient sentinel of the Mediterranean, has long stood as a rich bounty kept out of reach of Spain. Whoever commands its guns commands the narrow throat through which the Atlantic breathes into the inland sea. Now Berlin has turned its calculating gaze toward that limestone bastion to take the same foothold once stolen by Britannia.\n\nDiplomats have approached Madrid with a proposal. In an age of crumbling empires and uncertain seas, the Reich argues that Gibraltar must be placed in hands capable of defending Europe’s maritime arteries from syndicalist pirates. Under the Reich’s stewardship, the strait would become an anchor of continental security rather than a relic of fading British dominance. Such an agreement would be a massive injury to the nation's pride however and would surely set off the public to support our domestic foes."
gerfor.310.a:0 "Sure."
gerfor.310.b:0 "What? No!"

gerfor.311.t:0 "Spain Agrees"
gerfor.311.d:0 "After careful deliberation, and no small measure of diplomatic pressure, Spain has agreed to transfer Gibraltar into German hands. The Rock, once a symbol of foreign intrusion into Iberian affairs, now becomes a fortress of the continental order in our hands. Engineers and naval officers are already surveying the heights, envisioning batteries, dockyards, and listening posts that will transform the strait into an iron gate. From this vantage point, Berlin extends its reach from the North Sea to the Mediterranean, binding Europe’s waters into a single strategic sphere. For Spain economic incentives and political assurances from Berlin have already arrived, providing much needed relief for the nation so embroiled by strife."
gerfor.311.a:0 "Great."

gerfor.312.t:0 "Spain Refuses"
gerfor.312.d:0 "Spain has rejected our proposal with indignance. Madrid insists that Gibraltar will not pass from one great power’s grasp to another. Pride and sovereignty have prevailed over sense in an undeniably bold stance from a nation at constant risk of tearing itself apart. Germany’s influence now arcs across Europe’s coasts and corridors, and few nations can afford to disregard our strategic ambitions without consequence. The Rock may remain outside our control for now, but its position at the gateway of the Mediterranean ensures that it will never be beyond our interest nor free from our iron grip."
gerfor.312.a:0 "Damn!"

gerfor.313.t:0 "Stealing the Rock"
gerfor.313.d:0 "The chaos of the Spanish Civil War has turned Iberia into a fractured battlefield of shifting loyalties and desperate factions. In such turmoil, opportunities arise that peacetime diplomacy would never permit. Gibraltar, isolated and vulnerable amid the disorder, stands as a prize that bold action might yet secure. Many options have been floated as possible strategies but two have gained primacy. The more diplomatic path championed by the foreign office is to use arm shipments to sympathetic forces so they are willing to "reconsider" Gibraltar’s status. Alternatively, the Navy high command champions more discreet measures: a team of specialists, intelligence officers and commandos, dispatched under cover of confusion, to seize the Rock. A misstep could entangle the Reich in Iberia’s blood-soaked conflict as well as alienating Spain, but would be more reliable than just gaining goodwill."
gerfor.313.a:0 "Send guns to encourage them."
gerfor.313.b:0 "Prepare a team of specialists to steal Gibraltar."

gerfor.314.t:0 "Germany Offers Guns for Gibraltar"
gerfor.314.d:0 "As Madre Patria bleeds in civil strife, Berlin has presented a Faustian bargain. Crates of rifles, artillery pieces, and much-needed munitions stand ready for delivery, provided we agreed to transfer control of Gibraltar into their imperial talons. As Spain devours itself, such an offer has an undeniable appeal. Modern weapons from the empire could tip the conflict in our advantage and quicken the end of this apocalypse. Yet the price is steep: surrendering the most strategically vital point in Iberia to a new foreign power whose ambitions are rarely modest. Only regaining it from the corpse of Britannia's empire will be hard to justify its loss."
gerfor.314.a:0 "Victory must come first."
gerfor.314.b:0 "Nationhood comes first!"

gerfor.315.t:0 "Germany Seizes Gibraltar"
gerfor.315.d:0 "Under the cover of the complete breakdown of our civil society, German forces have acted with ruthless precision. Without declaration nor negotiation, the Rock of Gibraltar now flies the banner of the Reich. As most of the real soldiers were needed on the frontline only a small local militia had remained to hold the fort. Through a midnight raid by commandos this token defense force was caught completely unaware. The combination of covert infiltration and coordinated naval strikes caused these irregulars to surrender with little resistance and were expelled leaving Gibraltar in de facto German hands.\n\n With communication lines in complete disrepair the local unit could not inform the government of the loss before the German ambassador provided a slate of threats to our rulership if any attempt were made to retake Gibraltar. The act has stunned the political class and enraged the populace. Even amid civil war, this brazen violation cuts deep and this national humiliation will be hard to recover from. With the recognition of Berlin’s many allies and the force of their empire there is little that can be done at this moment in recompense."
gerfor.315.a:0 "Those Teutonic bastards!"

gerfor.316.t:0 "Spain Agrees"
gerfor.316.d:0 "Pressed by its circumstance of total war, Spain has stood down and formally recognized Deutsch control of Gibraltar. What may once have required prolonged entanglement in the Spanish madness has been settled with little effort.\n\nThe Rock, long being contested, now stands incorporated into the continental security architecture envisioned in Berlin. German engineers fortify its heights, naval officers chart its harbors, and the Mediterranean adjusts to a new master."
gerfor.316.a:0 "Great."

gerfor.317.t:0 "Spain Refuses"
gerfor.317.d:0 "Even battered and divided, Spain refuses to legitimize Germany’s seizure of Gibraltar. Amid ruin and reconstruction, Madrid has drawn a line in the sand: the Rock remains belligerently Spanish, regardless of who occupies the capital. A pathetically defiant gesture from a nation at one of its deepest ebbs. Economically strained and politically fragile, Spain nevertheless clings to \"sovereignty\" as its final pillar. It is clear that little can be done now to change their mind."
gerfor.317.a:0 "Even now? At their lowest point?"

gerfor.318.t:0 "The Operation is a Success"
gerfor.318.d:0 "The operation has concluded with remarkable efficiency. Gibraltar is secured and its defenses neutralized before meaningful resistance could materialize. Only a militia had been left to protect the rock, whose irregulars were quickly overwhelmed as our marines assaulted in the cover of night. It seems the civil war has spread thin discipline as the force fled en masse with little casualties on our invasion force.\n\nWhen the ambassador finally delivered the news to Madrid they were caught completely off guard, with the loss yet to arrive at the capital. Now German marines patrol the docks, engineers inspect the fortifications, and signal units establish communications that bind the Rock directly to Berlin’s command structure. While the Internationale has decried the move and the Entente has signaled its displeasure there is little either can do. What diplomacy could not achieve, bold execution has accomplished and the Mediterranean’s gateway now rests firmly within the Reich."
gerfor.318.a:0 "Excellent."

gerfor.319.t:0 "Norwegian Docking Rights"
gerfor.319.d:0 "The Atlantic approaches and Arctic waters are vital in the grand calculus of naval supremacy. Norway’s fjords deep, sheltered, and strategically placed offer ideal anchorage for fleets that must project power across the North Sea and beyond. As the British syndicalists look to Iceland with avarice it is undeniable that the northern straits will be the new front in global competition. For the safety of Norway and more importantly for the Reich we will push for formal docking rights from Oslo: access to ports for resupply, maintenance, and coordinated patrols.\n\nFramed as mutual security cooperation, the request promises economic benefits and naval protection for Norway’s extensive coastline. The Kaiserliche Marine’s warships anchored in Norwegian harbors would permanently alter the balance of the North Atlantic, granting us a supreme edge against the fleets of the Internationale. The question is whether Oslo will see advantage in this alignment or risk standing alone in increasingly contested waters."
gerfor.319.a:0 "Send the message."

gerfor.320.t:0 "Germany Requests Docking Rights"
gerfor.320.d:0 "The ever greedy Kaiser has shifted his hunger northwards seeking access to our nation's ports to dominate our shipping lanes. They argue strategic foresight demands access to ports along the Norwegian coastline, seeking harbors deep enough to service the Reich’s growing fleet and a great position with which to dominate the North Sea and Atlantic approaches. The ambassador has delivered a carefully phrased request for docking rights, supply access, and permission for routine maneuvers in Norway’s harbors. It is possible this is only an opening move in a greater diplomatic play, seeking to control the naval defence of Norway for leverage for a more perilous gamble."
gerfor.320.a:0 "Agreeing to these terms are for the best."
gerfor.320.b:0 "Sovereignty above all."

gerfor.321.t:0 "The Nordstern Exercises"
gerfor.321.d:0 "In a display of naval coordination and continental might, Germany and Norway have embarked upon the Nordstern exercises, the first in a series of maneuvers designed to demonstrate both readiness and the potential for cooperative defense in the North Sea. Battleships will cut through the icy waters, flotillas practice interdiction of hostile shipping, and signals units relay complex formations with precise discipline. This united flotilla is designed to show a clear commitment to strength in the northern seas. Acting as a projection of influence, it is a clear reminder that the Reich’s reach extends across the world to the Arctic Circle. For Norway, the drills offer an opportunity to modernize fleets, gain expertise, and test the limits of naval coordination under the imperial eagles guidance. Across the fjord to the straits, the North Star shines not only as a celestial guide but as a symbol of strategic ascendancy in northern waters."
gerfor.321.a:0 "A great example of the Reichs domination."

gerfor.322.t:0 "Norway Says No"
gerfor.322.d:0 "Despite the overtures and promises of partnership, Oslo has refused to grant docking rights to the Reich’s fleet. Norwegian officials, so obsessed with neutrality, and with feigned concern over entanglement, have refused a lifeline against the growing syndicalist threat. The fjords remain closed to foreign warships, and the Reich’s ships must plot longer courses and supply chains.\n\nIn a Europe increasingly dominated by power this hesitation must carry consequences. The North Sea remains a chessboard of opportunity, and Norway has yet to decide whether it will play as a neutral observer or risk being swept into the currents of history."
gerfor.322.a:0 "Damn these impotent snakes!"

gerfor.323.t:0 "Burning Sands"
gerfor.323.d:0 "Reports from the deserts of North Africa have grown increasingly troubling. The government of the so-called French National State, clinging stubbornly to its African redoubts after its exile from the continent of Europe, has begun pursuing policies openly hostile to German interests. Though their position remains precarious and dependent upon distant colonial territories, the exiles in Algiers have shown little hesitation in challenging the balance of power carefully constructed by Berlin in Mittelafrika for the return of Entente rule.\n\nWithin the foreign office and the colonial offices of Afrika, discussion has turned toward methods of reminding the French that their authority in the region rests upon fragile foundations. The Sahara and the Sahel are vast lands, and beneath the thin veneer of colonial administration lie countless tribes, communities, and leaders whose loyalties have never been firmly secured by Paris nor the land these nomads walk.\n\nOne faction centered in the diplomat circles of Berlin argued that Wilhelmstrasse should act discreetly alone, providing arms and encouragement to insurgent groups and disaffected communities within the French territories. If properly guided, such unrest could bleed the pathetic regime dry without requiring Berlin to commit itself openly. The Afrikan administration instead seeks glory for themselves, by subverting the eternal enemy through utilizing their alliances among the Berber and Tuareg peoples of the desert along with Askari volunteers to build a force capable of breaking the fragile peace of the Sahara. Either path shows promise to break the defiant exiles and demonstrate their new place in the international order."
gerfor.323.a:0 "Let the French bleed quietly."
gerfor.323.b:0 "Mittelafrika will stir the desert."

gerfor.324.t:0 "Burning Sands"
gerfor.324.d:0 "Disturbing reports have begun arriving from across the interior of our African territories. What initially appeared to be scattered tribal unrest has revealed itself to be something far more troubling. Armed bands have emerged from the desert with suspiciously modern rifles, well supplied ammunition, and a level of coordination that suggests guidance from beyond the Sahara.\n\nOur intelligence officers increasingly suspect the hand of Berlin behind these disturbances. In a recent assault a tribes leader was struck down, and when inspected had a distinct white pigmentation unnatural for the desert. Theories abound of agents, operating through commercial networks and colonial intermediaries, appear to be distributing arms among rebellious elements while quietly encouraging resistance to our administration. If the Auswartiges Amt is allowed to ignite widespread rebellion among the Berber tribes and Tuareg confederations, our southern frontier could rapidly transform from sanctuary into battleground. We must quickly divert our industry and manpower to quickly restore order to these nomads and cut off their supply."
gerfor.324.a:0 "Mon Dieu!"

gerfor.325.t:0 "Burning Sands"
gerfor.325.d:0 "The shifting winds in the Sahara have presented a remarkable opportunity for new colonial  conquest. Colonial officials stationed across the colonial territories have begun receiving discreet instructions from Berlin encouraging greater contact with influential Tuareg leaders and other desert communities who have long resisted French rule. These tribes, masters of the vast and unforgiving sands, possess both the mobility and the local authority needed to challenge French control where it is weakest. From sending officials alongside nomads that cross our shared porous border we have gained a useful network of clans in west Afrika who would be receptive to such a proposal. n\nThrough economic support, gifts of arms, and the careful cultivation of military organisation, Heer advisors have begun weaving a network of cooperation that stretches across the desert routes. The Berber and Tuareg tribes have been very receptive for the material advantage and the chance to settle old grievances against French administrators who have long attempted to impose their authority over lands they barely understand. Many advisors, seeking a path to return to the mainland have jumped at the opportunity through mimicking the glory of the famous English operator, Lawrence of Arabia. If the exiled French regime insists on defying Germany’s wishes, then it will discover that its African exile itself is far less secure than it imagines."
gerfor.325.a:0 "The French had their chance in Africa."

gerfor.326.t:0 "Awakening the British Underground State"
gerfor.326.d:0 "Though the Union of Britain proclaims itself a vanguard of proletarian revolution, it is clear that the island’s political landscape is far from unified. Beneath the watchful eye of syndicalist committees and militant trade unions exists a quieter, more shadowed world filled with remnants of the old establishment, disillusioned officers, conservative networks, and clandestine monarchist circles that have never reconciled themselves to the revolutionary regime in London. Within the halls of the Abwehr, discussions have turned toward the possibility of cultivating these hidden currents. Carefully placed funding, discreet shipments of ordinance, and the guidance of experienced agents could breathe life into dormant organizations across the British Isles. In time, these scattered groups might form a covert network capable of undermining the syndicalist state from within. With a strong and cultivated collaborationist network, our eventual conflict will have a prepared class ready to take power. If needed these underground contacts could sabotage industry, disrupt communications, and gather invaluable intelligence on the enemy’s movements. Like weeds in the garden, the counterrevolution is ready to stir, we only have to water them."
gerfor.326.a:0 "London shall be crippled."

gerfor.327.t:0 "The Royal Navy and the Kaiserliche Marine"
gerfor.327.d:0 "For decades the seas of the world were defined by rivalry between Britain’s Royal Navy and Germany’s Kaiserliche Marine. Shipyards raced to produce ever greater dreadnoughts, admiralties studied one another’s doctrines, and the oceans themselves seemed destined to become the stage for an inevitable clash between two maritime giants. However the age of a naval arms race has ended and old enemies could make friends according to the tides of the times. With revolutionary forces seizing control of Britain itself, the exiled Royal Navy is prepared to stand alongside us for the right to return.\n\nGerman naval planners shall begin exchanging doctrine, intelligence, and operational planning with their British counterparts. The cooperation of these two great maritime traditions offers formidable potential with German industrial might paired with the Royal Navy’s centuries of seafaring experience. Together, they may yet challenge the syndicalist fleets that claim dominion over the British Isles."
gerfor.327.a:0 "A powerful partnership."
gerfor.327.b:0 "Eine mächtige Partnerschaft."

gerfor.328.t:0 "A Partnership of Two Titans"
gerfor.328.d:0 "The reconstruction of France’s exiled state and the continued expansion of German industry have created fertile ground for cooperation between two of Europe’s most renowned industrial traditions. Negotiations between German and French manufacturers have culminated in a remarkable agreement linking the engineering expertise of companies such as Mercedes with the industrial legacy of Renault.\n\nUnder this arrangement, German technical innovations in armored warfare will merge with French manufacturing capabilities and design experience. Joint projects are to come underway to develop new armored vehicles and mechanized equipment capable of strengthening both nations’ military forces. The factory owners who have been involved speak optimistically of the shared patents and the pooling of technical knowledge that would have been unthinkable in earlier decades.\n\nFor Berlin and Algiers alike, the partnership carries political capital as well as industrial promise. It represents a tangible demonstration that cooperation between the German Empire and National France extends into the machinery of modern warfare itself."
gerfor.328.a:0 "An impressive collaboration."
gerfor.328.b:0 "Industry serves the alliance."

gerfor.329.t:0 "German Support Arrives in Asia"
gerfor.329.d:0 ""In the grey dawn along the wharves of the Lower Yangtze, foreign steamers have begun to unload their cargo. Crates stenciled with the black Imperial eagle of the German Empire are carried down the gangplanks by sweating dockhands, their contents carefully inventoried by our officers. Rifles bearing unfamiliar proof marks, neatly packed artillery pieces, and sealed crates of technical equipment now fill the arsenals of the League. Alongside them arrive field grey uniformed instructors and civilian technicians sent from the Kaiser's East Asian holdings.\n\nAfter the brutal intervention against the Northern Expedition our League of Provinces has been Berlin's strongest partner in the Zhili clique, with Wu Peifu’s anti-consessionist disposition an obstacle in Beijing. With Nanjing falling into chaos, Berlin was gripped with fear that the blood shed against the Kuomintang would be upturned by savage warlords and syndicalists. Industrialists and Financiers, already rocked by Black Monday, faced the possibility of the assets of the Krupp and Allgemeine Ostasiatische Gesellschaft being seized without due compensation. With the League still committed to its treaties and concessions the Kaiser has tasked the Auswärtiges Amt to reward its consistency by renewing and reinforcing the Nanking Commission. As Falkenhausen shepherds our new gifts of ordnance tested in Europe’s great wars, it's clear Berlin’s distant court has renewed its interest in our prospect and is ready to fund our exploits."
gerfor.329.a:0 "Their support is welcome."
gerfor.329.b:0 "They are most welcome here."

gerfor.330.t:0 "The Bangkok Blitz"
gerfor.330.d:0 "Berlin’s diplomats have concluded that events in Southeast Asia are moving far too quickly for cautious maneuvering. Siam, positioned at the crossroads of the region, has long balanced its foreign relations between competing powers. Yet recent developments suggest that Japanese influence within Bangkok is growing steadily stronger, threatening to pull the kingdom decisively into Tokyo’s orbit. This possibility is deeply troubling. A Siam aligned fully with Japan would shift the balance of power across mainland Southeast Asia and potentially undermine Germany’s own strategic ambitions in the region. German policymakers therefore believe decisive diplomatic engagement is necessary before Siam’s orientation becomes irreversible.\n\nSeveral proposals now lie before Berlin’s strategists. One approach favors reconciliation between Siam and neighboring Burma, offering German mediation and incentives in hopes of building a stable regional partnership aligned with the Reichspakt. Another argues that Siam’s ambitions toward Burma should instead be quietly supported, believing that a victorious and grateful Siam might prove a valuable partner for Germany’s broader interests. Yet there remains a darker assessment circulating among certain military planners: that Siam’s alignment with Japan may already be too deep to reverse. In that case, Germany may ultimately need to prepare for a far more direct confrontation in the region before hostile influence becomes entrenched. According to the state of Burma and Siam’s orientation each option could be valid."
gerfor.330.a:0 "They should normalise with Bruma and join the Reichspakt."
gerfor.330.b:0 "Propose a joint intervention to gain their allegiance."
gerfor.330.c:0 "Siam lacks the credibility to avoid our intervention and invasion."

gerfor.331.t:0 "Germany Courts Us"
gerfor.331.d:0 "German diplomats have arrived in Bangkok bearing a modest proposal from Berlin. The Kaiserreich, eager to expand its influence across Asia, has begun a manner to make Siam its new partner in a growing international network of allies and economic associates. Their message is delivered with characteristic confidence: cooperation with Berlin promises military modernization, economic opportunity, and a place within the broader structure of the prime global power.\n\nCentral to the proposal is Germany’s suggestion that Siam resolve its disputes with neighboring Burma. According to the envoys, regional stability would benefit both nations and open the door to greater cooperation with the Reich and its allies. Their diplomats emphasize that a peaceful Southeast Asia would allow Siam to prosper under the protective umbrella of German-backed trade and security arrangements. Wary of becoming entangled in the ambitions of distant European powers, particularly when Japan watches events in Bangkok with keen interest. Siam now faces a delicate choice to either accept Germany’s hand of partnership or reject Berlin’s guidance and chart an independent course in the turbulent politics of Asia."
gerfor.331.a:0 "Germany’s proposal is acceptable."
gerfor.331.b:0 "We will not be lectured by foreigners."

gerfor.332.t:0 "The Bangkok Conference"
gerfor.332.d:0 "German diplomacy in Southeast Asia has culminated into a bold proposal: a regional conference in Bangkok aimed at settling the long-standing tensions between Burma and Siam. This rivalry between our two states has long complicated German ambitions in the region, and a stable settlement could open the door for broader cooperation under the strategic umbrella of the Reichspakt.\n\nAt the heart of the negotiations lies a difficult question for Rangoon. Germany has quietly made it known that any lasting arrangement with Siam would likely require Burna to renounce its lingering territorial claims against its neighbor. Such concessions would undoubtedly ease tensions and make Siam more receptive to diplomatic initiatives, but there is little appetite for acquiescence for the sake of Germany’s diplomatic double-dealings. Further there is no guarantee of Siamese acceptance as, while presenting the possibility of ending the threat of border revisions, it would require subordination to Berlin.\n\nParticipation in the Bangkok Conference offers the possibility of regional reconciliation and a new order protected by the hegemon only if we are willing to pay the diplomatic price."
gerfor.332.a:0 "We will attend the conference."
gerfor.332.b:0 "We will not surrender our claims."

gerfor.333.t:0 "A Premature End"
gerfor.333.d:0 "Months of quiet preparation had preceded the proposed conference between Siam and Burma. German diplomats had labored to craft a framework in which both states might set aside their grievances and align themselves with Berlin’s strategic interests in Southeast Asia. Yet before the first delegate could even take their seat at the negotiating table, the effort collapsed.\n\nMessages arriving from the region make it clear that the atmosphere between the two states has already soured beyond repair. Mutual suspicion between Bangkok and Rangoon has hardened into outright hostility, with both sides convinced the other intends to exploit any compromise as a sign of weakness. Even the promise of mediation has failed to calm the rising tensions. What may have been the diplomatic coup of the century has ended before it even began."
gerfor.333.a:0 "So be it."

gerfor.334.t:0 "The Bangkok Conference Starts"
gerfor.334.d:0 "Against the odds, representatives from Siam and Burma have arrived to attend the German-sponsored conference. The meeting, convened at the behest of Berlin, seeks to resolve the lingering territorial disputes that have poisoned relations between the two nations for years.\n\nThe stakes for Germany are considerable. A cooperative Siam could serve as a valuable partner in Southeast Asia, resolve the Cambodian border, and deny an insurgent Tokyo a possible ally. Yet such cooperation will remain impossible so long as tensions with Burma continue to simmer along the frontier.\n\nThe delegation now faces a delicate balancing act. Convincing Burma to renounce its territorial claims will hopefully remove a major obstacle to rapprochement with Siam. Further, Berlin might sweeten the arrangement further, as well as matching Burma’s concessions, with a transference of the Cambodian Stung Treng province. Such a move would end the contentious border which has been a constant annoyance for colonial administrators to manage deep in the jungle."
gerfor.334.a:0 "Burma will renounce its claims."
gerfor.334.b:0 "Burma will renounce its claims, and Siam will receive Stung Treng."

gerfor.335.t:0 "The German Proposal"
gerfor.335.d:0 "The mediators have presented their proposal to the Burmese and Siamese delegates. Under the terms of the agreement, Burma would formally renounce its territorial claims against Siam, removing one of the principal sources of friction between the two states.\n\nBerlin hopes that this concession will lay the foundation for a broader understanding between the nations of mainland Southeast Asia. With tensions eased, Germany believes Siam could take a more cooperative stance in regional affairs and consider closer ties with the Reich itself. The decision now rests with Bangkok. The benefit of pacifying both the eastern and western borders as well as the backing of the strongest global power is clear. However there is a shadow looming in Asia, as new powers rise and the region approaches collision, is signing up to stand beside the European colonials worth it?"
gerfor.335.a:0 "This will suffice."
gerfor.335.b:0 "Unacceptable."

gerfor.336.t:0 "Burma Revokes Claims"
gerfor.336.d:0 "Under considerable diplomatic pressure from Berlin, the Burmese delegation has formally agreed to renounce its territorial claims against Siam, who had gained the land in the chaos following the British collapse. Rangoon had signalled this concession for some time as the principal inducement to bring Bangkok to the negotiating table, though few observers missed the clear reluctance behind the decision. The frontier in question has long been one of Southeast Asia’s most bitter fault lines. \n\nIn 1767 the armies of the Konbaung dynasty stormed and destroyed Ayutthaya after a brutal campaign, securing Burmese control over the Tenasserim coast and its valuable ports such as Mergui and Tavoy. The region remained contested until the late eighteenth century, when Siam was forced to cede the Tenasserim littoral to Burma following renewed wars. The balance shifted again in 1826, when Britain defeated Burma in the First Anglo-Burmese War and seized Tenasserim. Subsequent diplomacy, including the Burney Treaty and the 1868 Anglo-Siamese boundary convention, formally demarcating the line through the Tenasserim Mountains.\n\nNow, this long history is at an end. Through the sweeping aside of the lingering territorial question, Berlin hopes to clear the greatest obstacle to a broader settlement that might yet draw Siam closer into the sphere of influence. Whether this gesture will be enough to satisfy Bangkok, however, remains uncertain."
gerfor.336.a:0 "A necessary concession."

gerfor.337.t:0 "Siam Refuses the Deal"
gerfor.337.d:0 "Despite strong efforts to craft a compromise acceptable to all parties, the Siamese delegation has rejected the proposed settlement. Not even Burma’s willingness to abandon its claims nor the Reich's concessions has failed to satisfy Bangkok’s ravenous appetite, and the atmosphere surrounding the conference has rapidly deteriorated.\n\nThe rejection is undeniably frustrating. The entire purpose of the conference was to stabilize relations and open the door for deeper cooperation with Siam. Instead, the negotiations now teeter on the brink of collapse.\n\nBerlin must now decide how to proceed. The conference can be abandoned entirely, accepting diplomatic failure in Southeast Asia. Alternatively, diplomats might attempt to salvage the negotiations by offering further concessions to Siam. Or, should patience finally run out, the Kaiserliche Marine could abandon diplomacy altogether and resolve the matter through force."
gerfor.337.a:0 "Call this whole thing off."
gerfor.337.b:0 "Promise them Stung Treng."
gerfor.337.c:0 "Prepare for an invasion."

gerfor.338.t:0 "Siam Will Join the Reichspakt"
gerfor.338.d:0 "After days of tense negotiations in Bangkok, the Siamese government has formally agreed to join the Reichspakt, casting its lot with Berlin rather than drifting further into the orbit of Tokyo. Diplomats have worked tirelessly behind closed doors to soothe fears, offer investment, and build a relationship able to overpower the existing network of japanophiles in Bangkok. In the end, the promise of German partnership, backed by the weight of the Kaiserliche Navy and the vast industrial power of Mitteleuropa, proved more appealing than the uncertainties of the rising sun or isolation.\n\nWith Siam now aligned with the Reichspakt, Germany has stabilised our crucial foothold in mainland Southeast Asia. The agreement not only strengthens our position in the region but sends a clear message to Asia that the world order stretches far beyond Europe, and its reach grows longer by the day."
gerfor.338.a:0 "A valuable new partner in Asia."

gerfor.339.t:0 "Failure of the Bangkok Conference"
gerfor.339.d:0 "The Bangkok Conference has collapsed in a storm of recriminations and diplomatic bitterness. What Berlin had hoped would be a masterstroke of mediation between Siam and Burma instead devolved into an exercise in stubbornness, mutual distrust, and political theatre.\n\nDelegates argued endlessly over minor adjustments of the borders, influence, and grievances stretching back centuries. German representatives attempted to steer the talks toward compromise, but neither side proved willing to yield. Each proposal was met with suspicion, each concession with fresh demands. By the end, the atmosphere in the conference halls had turned openly hostile.\n\nFor Germany, the failure is more than a diplomatic embarrassment. Southeast Asia remains unstable, Siam continues to flirt with rival powers, and the opportunity to peacefully secure our position in the region has slipped through our fingers. If diplomacy cannot resolve the matter, Berlin may soon be forced to consider far less polite solutions to resolve the Siamese problem permanently."
gerfor.339.a:0 "A deeply frustrating outcome."

gerfor.340.t:0 "The German Saber Rattles"
gerfor.340.d:0 "Berlin’s patience has run out. The collapse of negotiations in Bangkok and Siam’s continued defiance against the world power’s attempt to impose an alignment has provoked the German government into openly declaring an imminent invasion in Southeast Asia, believing the Siamese rulership to be an obstacle to wider peace in the region. Riding high on the acquisitions from the collapsing Entente powers, Bangkok is sure it will be able to withstand the Imperial Eagles fury, but apprehension is still spreading throughout the Royal Army. Heer planners have spent weeks preparing for this possibility, after all, and are already making their moves. The Eastern Colonial Navy has been organised in lockstep with our Kaiserliche Marine, expeditionary troops stand ready, and coordination with regional allies, with various inroads made to Burma, is already underway. It has been clear since the rebuffing of German diplomatic advances that they will not take no as an answer to ensure Southeast Asia will be secured against the Rising Sun's reach, and so the jungles and rivers of Indochina shall inevitably run red with blood."
gerfor.340.a:0 "Prepare our army!"

gerfor.341.t:0 "Germany Promises Stung Treng"
gerfor.341.d:0 "Diplomacy in Southeast Asia rarely proceeds without concessions, and our diplomats have made clear that Burma is not the only nation that must provide concessions if Berlin hopes to gain our trust. Among the issues raised in negotiations is the contested territory of Stung Treng, a sparsely populated yet important region along the Mekong whose dual occupation has long split the Cambodian natives.\n\nDiplomats, eager to secure Siamese cooperation, have agreed to transfer Siamese claims to the territory from colonial holdings. The region is so deep in the jungle that it has been impossible to control as Cambodians often cross the porous frontier into Siam. This fact has allowed trans-national rebels to fester at a weak point of the imperial grasp of Indochina. Such a promise demonstrates Germany’s willingness to reward loyal partners and sacrifice its own wealth for its compatriots before we join their sphere, and it has also placated the Burmese delegation as they are not the only nation compromising for this deal. The question of whether it is enough for us, however, remains to be seen."
gerfor.341.a:0 "A wonderful proposition."
gerfor.341.b:0 "The compromise is hardly enough."

gerfor.342.t:0 "The Promise of Burmese Conquest"
gerfor.342.d:0 "German strategists have increasingly viewed Siam as a possible critical ally in Southeast Asia after the fall of Burma to revolution. For months diplomats have been making increased efforts to build a reputation in Bangkok building a foundation for a mysterious coup de grace. Now in a personal meeting with the ambassador has been revealed, a joint invasion of Burma with Siam as its benefactor. Berlin believes that through such a joint action a shared geopolitical rival may be snipped in the bud and demonstrate the benefit of Reichspakt membership firsthand as we must join after victory.\n\nSuch an operation would dramatically alter the strategic landscape of mainland Southeast Asia Of course, the risks are considerable. War in Burma could draw in unexpected enemies and stretch Siam’s military resources. Yet for those in Bangkok who have dreamed of a stronger and more influential Siam, the opportunity presented by German backing may be too tempting to refuse. It has been increasingly clear that the Indian socialists have been building a common cause to reclaim Rangoon's claims, perhaps making such a war inevitable."
gerfor.342.a:0 "Very well, we will act."
gerfor.342.b:0 "This is not our war."

gerfor.343.t:0 "Siams Says Yes"
gerfor.343.d:0 "After careful deliberation, the Siamese government has chosen to align itself with Berlin’s vision for Southeast Asia. Diplomatic overtures, the elimination of Burma’s claims, and the prospect of military cooperation have proven persuasive to the leadership in Bangkok.\n\nAn undeniable blow to Pan-Asianism as well as a decisive step toward integration with the Reichspakt and the broader new international order. With such significant diplomatic success our new partner now stands ready in Southeast Asia, strengthening the Reichspakt’s position in a region where influence is fiercely contested."
gerfor.343.a:0 "Off to Asia!"

gerfor.344.t:0 "Siams Says No"
gerfor.344.d:0 "Despite Germany’s diplomatic efforts and promises of support, the Siamese government has declined Berlin’s proposals. Out of caution of the growing Japanese empire and domestic opposition from Pan-Asianists, Bangkok has ultimately decided that the risks outweigh the potential rewards. It's clear that Bangkok lacks the sense to take a good deal when offered and as such aligned itself against civilisation. Our diplomats have left the negotiations disappointed, having invested considerable effort in securing Siam’s cooperation. For now, we must accept that Siam will remain outside the Reichspakt. As the growing instability in the east grows, we will undoubtedly need to keep a watchful eye on events in the region."
gerfor.344.a:0 "I fear Asia’s growing unreliability."

gerfor.345.t:0 "Once More to Kabul"
gerfor.345.d:0 "The mountains of Afghanistan have long stood at the crossroads of empires, and Berlin remembers well the lessons of the previous venture into its natural fortifications. Envoys and agents once crossed the deserts and high passes of Persia and Central Asia in a daring attempt to stir resistance against the British Empire. Though those efforts ultimately faded with the intervention’s end, the idea of Kabul as a strategic partner never truly disappeared from Germany’s strategic thinking.\n\nNow, with tensions rising once more across Asia, the Foreign Office has begun to revisit those old plans. Afghanistan occupies a position of immense geopolitical value: a proud and fiercely independent kingdom sitting uncomfortably close to the soft underbelly of British India and the Russian steppe. Even modest involvement could strengthen Kabul’s hand and complicate British calculations across the region, while an allegiance would fully upset the great game."
gerfor.345.a:0 "Send light support only."
gerfor.345.b:0 "Invite them to the Reichspakt."

gerfor.346.t:0 "German Support Arrives"
gerfor.346.d:0 "Caravans bearing unfamiliar cargo have begun arriving across Afghanistan’s frontiers, escorted by foreign advisers speaking the clipped tones of the Germanic language. Crates of rifles, ammunition, communications equipment, and military supplies have quietly made their way into Afghan depots, accompanied by promises of technical expertise and political backing. Berlin’s intentions are hardly a mystery. The Empire seeks to strengthen Afghanistan as a counterweight to British influence in the region, hoping that a more capable Afghan state might keep Ottawa and St Petersburg perpetually uneasy about the security of India’s northern frontier. Accepting the aid could strengthen the army and increase Afghanistan’s standing on the international stage but it may also draw the kingdom into the shadow of great power rivalry once again."
gerfor.346.a:0 "We welcome their support."
gerfor.346.b:0 "Send the Germans away."

gerfor.347.t:0 "Afghanistan Accepts"
gerfor.347.d:0 "Word has arrived from Kabul: the Afghan government has agreed to accept assistance and deepen its ties with Berlin. Envoys report a favorable reception among elements of the Afghan leadership, who see cooperation with the Reich as an opportunity to strengthen their nation without bowing to international pressure.\n\nThough the scale of this partnership may still be modest, the implications are significant. A friendly Afghanistan complicates British-Indian strategy across the region and gives Germany a valuable foothold along the turbulent frontier of South Asia."
gerfor.347.a:0 "Excellent."

gerfor.348.t:0 "Afghanistan Refuses"
gerfor.348.d:0 "Berlin’s diplomatic outreach to Kabul has met an unexpected obstacle. The Afghan government, wary of foreign entanglements and mindful of the delicate balance that preserves its independence, has declined Germany’s offer of cooperation.\n\nOfficials in Kabul reportedly fear that accepting German assistance could provoke unnecessary hostility from Britain, Russia or even draw Afghanistan into conflicts far beyond its borders. The kingdom has chosen caution over ambition, preferring to maintain its traditional policy of guarded neutrality. Afghanistan has always been a land resistant to outside influence, and even the most carefully crafted diplomacy can falter against the fierce independence of its rulers."
gerfor.348.a:0 "Unfortunate."

gerfor.349.t:0 "Germany Wants Us in the Reichspakt"
gerfor.349.d:0 "Word has arrived from Berlin that in measured yet unmistakable terms, the Empire has extended a formal invitation to join the Reichspakt. For decades Afghanistan has occupied a precarious position between empires as the key prize of the great game. Once the object of relentless rivalry between the British and Russian spheres, Kabul has learned the harsh realities of survival in the shadow of great powers. Now the world has changed. Britain’s grip over the region weakens, and Germany seeks to shape the future balance of Asia.\n\nMembership in the Reichspakt would promise military support, economic investment, and a powerful patron in the turbulent geopolitics of the region. Such an offer would potentially draw the Emirate into conflicts far beyond the mountains that have long guarded its independence. The court must now decide whether this new partnership represents opportunity or another chapter in the long history of foreign powers seeking influence over Afghan destiny."
gerfor.349.a:0 "We will join the Reichspakt."
gerfor.349.b:0 "Afghanistan shall remain independent."

gerfor.350.t:0 "On to Hyderabad"
gerfor.350.d:0 "With influence gradually expanding across Asia, Berlin now turns its attention toward the Princely States of the Indian subcontinent. Among them, Hyderabad stands as one of the most powerful and politically significant, a vast and wealthy state whose leadership could play a decisive role in the future balance of power.\n\nThe collapse of old imperial certainties has left the subcontinent in flux. Competing royals, syndicalist insurgents, and regionalists all struggle to shape the destiny of India. In such an uncertain landscape, cultivating allies among the princely states could grant Germany valuable influence over the region’s future. Military assistance could help strengthen the state’s armed forces and secure its position in the turbulent politics of India. Economic investment, meanwhile, could bind Hyderabad more subtly into the networks of Mitteleuropa’s markets and industry. Of course, Berlin could also pursue both avenues at once, presenting Germany as both protector and partner. The decision will be key in deciding the potential future alignment of India itself."
gerfor.350.a:0 "Send military aid."
gerfor.350.b:0 "Send economic assistance."
gerfor.350.c:0 "Provide both military and economic support."

gerfor.351.t:0 "An Envoy from the Reich"
gerfor.351.d:0 "A delegation from the Empire has arrived in Hyderabad bearing a proposal of considerable significance. The envoys speak of partnership, opportunity, and the changing balance of power across Asia. Berlin has stated in clear terms it seeks to cultivate closer relations with the Princely Federation. The offer is generous on its face. Germany proposes military aid to strengthen Hyderabad’s defenses, alongside economic cooperation that would link the state more closely with the vast commercial networks of Mitteleuropa. Factories, railways, advisors, and investment could all follow if Hyderabad proves a reliable partner. While accepting  assistance could provide immediate advantages, it would also draw Hyderabad into the orbit of a distant yet immensely powerful empire. The court must now weigh its options carefully. Is this the beginning of a fruitful partnership with the world’s foremost power, or a subtle step toward foreign influence over the destiny of India?"
gerfor.351.a:0 "Their assistance is most welcome."
gerfor.351.b:0 "This does not serve our interests."

gerfor.352.t:0 "The Princes Agree"
gerfor.352.d:0 ""Berlin’s diplomatic overtures to Hyderabad have borne fruit. After careful deliberation within the courts of the Princely Federation, the proposal has been accepted. What began as a cautious exchange between distant powers now promises to grow into a meaningful partnership linking Central Europe to the shifting political landscape of the Indian subcontinent. The leadership of Hyderabad has recognized the advantages of German cooperation: military expertise, industrial investment, and access to the vast commercial networks of Mitteleuropa. In return, Berlin gains a valuable friend in a region where the old imperial order has fractured and new powers struggle to shape the future of India. This is another careful step in the patient construction of a global network of partners through diplomacy, investment, and opportunity."
gerfor.352.a:0 "Excellent."

gerfor.353.t:0 "The Princes Refuse"
gerfor.353.d:0 "Despite Berlin’s carefully prepared proposal, the leadership of the Princely Federation has declined Germany’s offer of assistance and cooperation. The envoys sent to Hyderabad have returned with unmistakably firm refusals, their hosts emphasizing the importance of maintaining independence from foreign entanglements during this uncertain chapter of Indian history.\n\nWithin the princely courts, many feared that accepting aid would inevitably draw Hyderabad into the complex rivalries of global powers. While the Empire’s promises of investment and military expertise were tempting, the price of such generosity was deemed too great for a state determined to safeguard its autonomy. Despite this loss the subcontinent remains fractured and unpredictable, and the balance of power may yet shift in ways that reopen doors once thought closed."
gerfor.353.a:0 "Unfortunate."

gerfor.354.t:0 "Building Up the Oststaats"
gerfor.354.d:0 "The eastern frontier of the German sphere remains both a shield and a vulnerability. The network of states stretching from the Baltic to the Ukrainian plains serves as the Empire’s forward line against any resurgence of Russian ambition. Yet years of political instability, economic strain, and uneven development have left many of these partners ill-prepared for the demands of modern warfare. Should a conflict in the East erupt once more, the burden of defending this vast frontier could quickly fall upon the Heer alone. Such a scenario risks overstretching our forces and repeating the exhausting struggles of the Weltkrieg. Strengthening our allies now, before the storm gathers, may prevent disaster later. \n\nOne approach would be to concentrate on the military capabilities of the east: training their armies, modernizing their equipment, and ensuring that their borders can be defended without immediate intervention. Alternatively, the Empire could focus on long-term industrial development, investing in factories, railways, and infrastructure that would transform these nations into reliable economic and logistical partners in any future war. Whether through rifles or factories, the stability of the eastern frontier must be secured."
gerfor.354.a:0 "Strengthen their armed forces."
gerfor.354.b:0 "Develop their industrial power."

gerfor.355.t:0 "Forays to Georgia"
gerfor.355.d:0 "Beyond the Black Sea and the mountains of the Caucasus lies Georgia, a state whose precarious independence sits directly along the fault line between German interests and Russian ambition. Since the collapse of the old tsarist order, Tpilisi has struggled to balance survival with sovereignty, resisting Moscow’s pressure while cautiously maintaining the Poti agreement that binds it to Berlin’s orbit.\n\nFor the Auswärtiges Amt, Georgia’s continued independence is a strategic necessity that creates a soft underbelly to the Eastern bear. A stable Caucasus denies Russia an easy southern advance, protecting the fragile political order along the eastern edge of Mitteleuropa while denying the Bear access to the near east.\n\nThe question facing Berlin is not whether Georgia should be supported, but how far that support should extend. A major military build-up could transform the Georgian army into a formidable regional force capable of standing against Russian encroachment. More modest aid such as rifles, instructors, and limited material would still strengthen our partner without drawing undue attention from Moscow. No matter what, Georgia must be prepared so that when the winds of conflict blow once more the Caucasian goat is not an easy meal for the bear."
gerfor.355.a:0 "Sponsor a major military build up."
gerfor.355.b:0 "Send some military aid."

gerfor.356.t:0 "The German Rewards"
gerfor.356.d:0 "The ships have arrived quietly along the Black Sea coast, their cargoes carefully documented by unusual men in unmarked field gray uniforms. Crates of rifles, artillery pieces, communication equipment, and modern military supplies now flow steadily into the depots of the Georgian army. Alongside them come German advisors, disciplined men from the Deutsches Heer whose presence signals that Berlin has not forgotten the commitments made between our governments.\nHonoring the Poti Treaty and maintaining their firm stance against Russian pressure, Berlin has demonstrated itself to be a dependable partner in a region where loyalties often shift with the tides of power. In the delicate balance of the mountains that divide Europe with Asia, such partnerships are worth far more than the cost of rifles and shells."
gerfor.356.a:0 "Thank goodness for those men in grey."

gerfor.357.t:0 "The German Request"
gerfor.357.d:0 "Envoys have once again arrived in Tiflis, though their goals are markedly different from the generous deals made in the past years. Along with a larger investment of military equipment than usual, the officials have come up with a proposal. In exchange for aid, Georgia would provide limited intelligence on Russian activities in the Caucasus and maintain its firm stance against Moscow’s influence in the region. The arrangement would not bind Georgia to war nor compromise its sovereignty outright, but it would draw the country more clearly into Germany’s strategic orbit.\n\nWhile Germany has been our closest ally in the region, such a gesture has sparked quite the debate. Some argue that cooperation with the Kaiser offers the best guarantee of survival against the ever-present Russian threat. Others caution that reliance on distant powers carries its own risks and that the growing strength of Moscow will not allow such an agreement to stand. Either way, Germany’s interest in the Caucasus has not diminished, and Berlin appears willing to invest heavily in those who stand alongside it."
gerfor.357.a:0 "Such a proposal sounds good."
gerfor.357.b:0 "No."

gerfor.358.t:0 "Georgia Says Yes"
gerfor.358.d:0 "Word has arrived from Tpilisi, and it carries the swan song of a new victory. The Georgian government has accepted Berlin’s proposal, agreeing to deepen cooperation with the Empire in exchange for increased military assistance and strategic support against the looming pressure of Russia.\n\nFor the statesmen of Georgia, the decision was not taken lightly. Situated between empires and surrounded by ambitious neighbors, the young republic has long walked a narrow path between repaying Berlin and appeasing the bear. Yet the reality of geopolitics in the Caucasus leaves little room for romantic isolation. They have secured both the needed arms and the implicit backing to keep their independence. A loyal partner has been strengthened in the Caucasus and in turn strengthened the entire eastern defensive network, complicating Russian ambitions in the region."
gerfor.358.a:0 "Excellent."

gerfor.359.t:0 "Georgia Says No"
gerfor.359.d:0 "The reply from Tpilisi has arrived, and it has made clear our Georgian friends lack conviction. The Georgian government has declined our proposal, choosing instead to maintain its present course without entering deeper cooperation with the Empire. Though Russia remains a looming concern, many in Tpilisi believe that preserving diplomatic flexibility offers the best hope for navigating the uncertain future of the Caucasus. It’s increasingly evident that many of the eastern nations who owe their existence to the Reich fail to repay the debt. They fear the bear in the dark woods but are too belligerent to back the hunter. Even so, Germany’s interests in the region remain unchanged. Georgia may decline formal cooperation today, but the strategic importance of the Caucasus ensures that Berlin will not soon turn its gaze elsewhere."
gerfor.359.a:0 "Drat."

gerfor.360.t:0 "German Military Support Arrives"
gerfor.360.d:0 "The first signs of Germany’s promised assistance have begun to appear across the country with engineers, industrial planners, and military advisors as well as the usual ordinance. Alongside them are construction materials and heavy machinery, laying the foundations for new arms factories intended to strengthen the nation’s military independence. Berlin’s intention is to transform its partners into capable defenders of their own frontiers, equipped with modern industry and supplied with the tools necessary to resist external threats. As the factories rise and the first assembly lines begin to turn, the partnership between our governments becomes visible in the smoke, steel, machinery, and the steady rhythm of industrial production."
gerfor.360.a:0 "Excellent."

gerfor.361.t:0 "German Economic Support Arrives"
gerfor.361.d:0 "The Kaiser’s economic assistance has begun to materialize across our country in the form of new industrial construction projects, carefully organized by engineers and financiers dispatched from Berlin. Surveyors and planners arrived first, mapping rail connections and identifying suitable locations for new factories, warehouses, and production centers intended to expand our industrial capacity. German-built machinery - precise, efficient, and modern - has begun arriving in great shipments, accompanied by technicians tasked with training local workers in its operation. Entire industrial complexes are now rising from what were once empty fields or neglected districts, promising employment, technological advancement, and a dramatic expansion of the nation’s productive potential."
gerfor.361.a:0 "Excellent."

gerfor.362.t:0 "Formation of the Eastern Battalions"
gerfor.362.d:0 "Under the supervision of German officers and military instructors, the first formations of what Berlin calls the Ostbataillone have begun to take shape within our armed forces. These units are composed primarily of local manpower, drawn from volunteers and recruits across our country, but trained and organized according to the rigorous standards of the Heer.\n\nHeer advisors oversee every aspect of their development: drill routines, tactical doctrine, communications procedures, and the disciplined command structures that have long defined Prussian military professionalism. By combining Prussian discipline with local manpower, Berlin ensures that its partners can field capable, reliable forces without requiring large permanent garrisons of Heer troops. For us, these battalions offer something equally valuable as a modernized military force capable of defending our sovereignty while standing shoulder to shoulder with one of Europe’s most formidable armies."
gerfor.362.a:0 "Excellent."

gerfor.363.t:0 "The Caucasian Quagmire"
gerfor.363.d:0 "Few regions in the world rival the Caucasus for its complexity, rivalries, and centuries-old grievances. From the Black Sea to the Caspian, mountains and valleys alike are home to a bewildering mosaic of peoples, loyalties, and competing ambitions. In this volatile landscape, every alliance is tentative, every border disputed, and every promise shadowed by the possibility of sudden upheaval.\n\nHowever for the Empire, the region’s instability is not merely a source of concern but also an opportunity. A carefully chosen partnership could provide Berlin with a valuable foothold in the Caucasus, strengthening the eastern flank of its geopolitical sphere while complicating Russian attempts to reassert dominance over the region.\n\nTwo potential partners stand out among the shifting alliances of the Caucasus. The Don Host, Cossacks hardened by years of frontier warfare and fiercely opposed to Russian central authority, could prove a reliable ally in maintaining regional resistance. Alternatively, the embattled and fragmented Mountain Republic may welcome the Reich’s assistance in securing its survival against the many forces that threaten it. While the Don Host is stronger and more united, it has a large disloyal remnant dedicated to the motherland, while the mountain republic is made up of anti-Russian minorities, strengthening it from such treachery."
gerfor.363.a:0 "The Don Host is our best ally."
gerfor.363.b:0 "The Mountain Republic could use our help."

gerfor.364.t:0 "The Kaiser and the Ataman"
gerfor.364.d:0 "Across the windswept peaks of the Don, word has arrived from Berlin. The Imperial eagle, ever attentive, has approached the leadership of the Don Host with cooperation in pursuit of our continued sovereignty. Berlin has recognised the Don Cossacks as the most formidable military societies of the region, hardened by frontier life and fiercely protective of their autonomy. An understanding between Berlin and the Don could create a powerful bulwark against Russian resurgence into the southwest, anchoring Germany’s eastern security with a loyal partner guarding the gates of the Middle East.\n\nYet we are no strangers to the games of empires, nor are they inclined to give their allegiance cheaply. The Ataman and his advisors have made it clear that cooperation must be mutually beneficial. If the Don Host is to align its ambitions with those of the Empire it expects something tangible in return, such as modern weapons, military expertise, or economic support to justify such an alignment."
gerfor.364.a:0 "We'd like political aid."
gerfor.364.b:0 "We'd like military aid."
gerfor.364.c:0 "We'd like economic aid."

gerfor.365.t:0 "The Don's Demands"
gerfor.365.d_pol:0 "The message from the Don Host has arrived, and its tone is clear. The Cossack leadership is willing to align itself with the Empire’s strategic aims in the region only if Berlin is prepared to extend its political backing to the young Cossack state. Such support will take many forms such as diplomatic recognition, advocacy in the international concert of nations, and the quiet but meaningful assurance that Germany will stand behind the Don in disputes with its neighbors. For the Ataman, the backing of the great empire for his political legitimacy is as valuable as any rifle or gold trinket. Public endorsements and meetings with the Kaiser would strengthen the Don’s position as a valid and recognised nation among the fractious states of the former Russian Empire. To accept would be to bind the Reich’s prestige to the survival and ambitions of the Cossack host and the horselord that governs them."
gerfor.365.d_mil:0 "The Don Host has answered Berlin’s overture with a request, delivered with a direct and blunt tone signature from the Cossacks. If the Empire wishes for their cooperation against Russia and other regional threats, then the Don expects tangible military assistance in return. Years of conflict and instability have left the Cossack forces brave but unevenly equipped. High-quality rifles, artillery, training missions, and logistical expertise could transform the Don Host into a far more formidable power along the eastern frontier. Within the halls of the Heer’s Command, the proposal has sparked debate. Arming the Don could significantly strengthen the anti-Russian defensive line across the frontier, but it would also deepen our involvement in the volatile politics of the region."
gerfor.365.d_eco:0 "The Don Host has presented a simple range of requests reflecting the pragmatic concerns of a frontier state struggling to build stable institutions amid the ruins of the Russian Empire. Rather than seeking immediate military assistance, the Cossack leadership has asked Berlin for economic support. Years of upheaval have disrupted infrastructure for trade, damaged industry, and left the Don’s fledgling administration struggling to maintain stability. Junker investment, technical advisors, and access to the broader economic networks of Mitteleuropa could provide the foundation for lasting prosperity. In return, the Don would align its policies more closely with those of Berlin, strengthening Germany’s influence across the Caucasus. Economic ties often prove more durable than military ones, and a prosperous Don Host bound to Mitteleuropean markets could become a reliable pillar of stability on the empire’s eastern flank."
gerfor.365.a:0 "Very well."
gerfor.365.b:0 "No."

gerfor.366.t:0 "Germania's Generous Gifts Arrive"
gerfor.366.d:0 "The Kaiser has shown himself to be a generous master, as German support has begun to flow across the mountain ranges, carried by diplomatic envoys and supply trains to strengthen the Cossack state. The Empire, one of the only dominant powers of Europe, has chosen to invest its influence in the survival and prosperity of the Cossack host and in turn given us primacy south of the Volga. The Russian sycophants that infest Novocherkassk have been routed en masse as orientation towards the west reaps its rewards.\n\nWith such flowing support, the form that the Don’s relationship with Germany shall take is being decided. Many seek to solely enjoy the tribute sent from Berlin while we see to our own designs. Others argue for the sake of our continued existence, the time has come to push towards formalizing the partnership by joining the Reichspakt outright. With the Imperial eagle showing its hand, it's time we play our cards."
gerfor.366.a:0 "Time to join the Reichspakt."
gerfor.366.b:0 "We'll maintain a distant relationship regardless."

gerfor.367.t:0 "Germania's Refusal"
gerfor.367.d:0 "Despite our Host’s willingness to cooperate, the Auswartiges Amt has declined to provide the requested assistance and elevate us to the Reichspakt. Within the Reich’s foreign office the decision was likely driven by the cold calculus of great-power politics. The Kaiser’s commitments already stretch across continents, and the volatile politics of the mountains may have been judged an unnecessary entanglement. While they are willing to prop up our holdings, they lack the spine to insure its continued existence. It appears even the hunter is scared of the bear. Whatever the reasoning, the result is clear that the Don Host must face the challenges of the region without the full support of the empire. The opportunity for a powerful partnership has slipped away like sand, leaving the Don to rely on its own strength."
gerfor.367.a:0 "Damn!"

gerfor.368.t:0 "The Host's Ascension"
gerfor.368.d:0 "The answer from the Don Host has arrived, carried across the mountains by diplomatic courier and then transferred via telegram to the halls of the Wilhelmstraße. After careful deliberation, the Cossack leadership has chosen to formalize its partnership with the Empire and enter the Reichspakt. The Don Cossacks, long renowned for their martial traditions and fiercely independent spirit, now stand as allies within the Kaiser’s growing defensive network. While the specter of Russian resurgence looms constantly over the fractured lands of the former empire, they shall stand ready under the Imperial Eagles’ watch. With the supply of Heer military expertise, economic assistance, and the security of an alliance with Europe’s foremost continental power, no nearby power shall oppose them. Along the windswept plains of the Don, the banners of the Cossack Host now ride in concert with the interests of Germania."
gerfor.368.a:0 "Excellent."

gerfor.369.t:0 "The Host's Resistance"
gerfor.369.d:0 "Berlin’s diplomatic efforts among the Cossacks have met a discouraging end. Despite cordial exchanges and the promise of the Kaiser’s favour, the leadership of the Don Host has declined to deepen its relationship with the Reich. Centuries of frontier life have instilled in them a suspicion of distant powers and an instinct to guard their autonomy fiercely. While the Empire may offer security and prosperity, the interests of many Russians within have been able to force the Ataman against such a treaty. The politics of the Caucasus are notoriously unpredictable, and the Cossacks have long preferred flexibility over rigid commitments. Even so, diplomatic channels remain open, and Germany’s influence in the region may yet grow through patience and careful engagement. For now, the Don Host remains outside the Reichspakt but is still supported as an independent actor on the volatile frontier between Europe and the Russian east."
gerfor.369.a:0 "Damn!"

gerfor.370.t:0 "The Germans Visit the Mountain Republic"
gerfor.370.d:0 "Envoys from the German Empire have arrived in Vladikavkaz, bearing formal greetings and a carefully prepared proposal from Berlin building on the existing oil deal. They seek to realign our burgeoning republic into closer alignment with the strategic framework of the Reichspakt. At the crossroads of empires, rivalries, and fragile states struggling to survive in the shadow of larger powers, Germany seeks to cultivate a reliable partner in the region. The Mountain Republic, though small and politically complex as a balancing act of ethnic groups, occupies terrain of immense strategic value. From the Terek and Sunzha river valleys to the heights of Mount Elbrus, it is a key choke point that has shaped the fate of armies for centuries.\n\nIn exchange for cooperation, the German delegation offers assistance and recognition with military advisors to strengthen the republic’s defenses, economic ties to the vast Mitteleuropean market, and the diplomatic backing of one of Europe’s most powerful states. It now must be decided whether Germany’s extended hand can be accepted to follow a new future or denied to build our own."
gerfor.370.a:0 "This partnership could secure our future."
gerfor.370.b:0 "We will remain independent."

gerfor.371.t:0 "The Republic's Acceptance"
gerfor.371.d:0 "After careful deliberation, Vladikavkaz has chosen to accept Berlin’s proposal. A significant shift in the political landscape of the Caucasus as a fractious republic now has the backing of the most reliable of partners. Heer support, economic investment, and diplomatic backing offer the Mountain Republic a level of security it could scarcely achieve alone.\n\nAnother piece of the complex Caucasian puzzle has fallen into place, strengthening the defensive arc Germany has sought to construct along its eastern frontier. Though the region remains volatile and fraught with rivalries, each new partner brings the vision of a stable, Prussian-aligned order closer to reality."
gerfor.371.a:0 "Another ally in the Caucasus."

gerfor.372.t:0 "The Republic's Refusal"
gerfor.372.d:0 "As diplomats toured the Mukhatarov Mosque in Vladikavkaz, news arrived to finally lay the killing blow on their trip. The Cabinet of Ministers has decided to refuse the offer of protection against all Imperial forces of the region. Despite the seemingly impeccable logic of an allegiance, as the Mountain Republic remains isolated in the turbulent Caucasus, they have refused ascension to the Reichspakt. The fiercely independent peoples of the Caucasus have spent centuries resisting domination by distant empires, and many among their council feared that an alliance with Germany might simply replace one overbearing protector with another. In heated deliberations the seven member states weighed the promises of Berlin against the long memory of foreign interference in their homeland. The Auswärtiges Amt’s courtiers depart the Caucasus empty-handed, reminded once again of the stubborn hearts of these peoples, moulded by the rugged isolating mountains that they call home."
gerfor.372.a:0 "How disappointing."

gerfor.373.t:0 "A Banquet in Baku"
gerfor.373.d:0 "In the glittering halls of Baku, where oil wealth and geopolitical ambition mingle beneath chandeliers and cigar smoke, diplomats prepare their approach to the Azerbaijani cabinet. The young republic sits atop one of the most valuable resources in Eurasia, and its strategic position along the Caspian makes it a prize coveted by many. Over wonderful courses of Plov, Qutab, and Dolma, such a grand affair offers us the chance to advance the concept of Azerbaijan's ascension into the Reishspakt.\n\nAs the banquet begins and the wine flows freely, the question before our diplomats is how generous Germany's offer should be in return for the cabinet's alignment, as being cheap while experiencing such a lavish display of hospitality may cost the cooperation of Baku."
gerfor.373.a:0 "Offer a little."
gerfor.373.b:0 "Offer a lot."

gerfor.374.t:0 "A Banquet in Baku"
gerfor.374.d:0 "In Baku, a grand lavish dinner has made history between diplomats and the Azerbaijani cabinet, where they have laid out a comprehensive plan for our entrance into the Reichspakt. In return for extensive investment in oil, military assistance, and the backing of Europe's most powerful empire.\n\nOver wonderful courses of Plov, Qutab, and Dolma, the offer is tempting. Prussian industry and military expertise could strengthen the republic and shield it from the ambitions of the trifecta of Russia, Iran, and Turkey. This triarchy of domination, in turn, have arrayed their allies in our government against the proposal alongside those who stand for complete autonomy no matter the cost."
gerfor.374.a:0 "The arrangement sounds good."
gerfor.374.b:0 "The arrangement sounds dangerous."

gerfor.375.t:0 "Azerbaijan Agrees"
gerfor.375.d:0 "After days of negotiations, speeches, and discreet bargaining behind closed doors, the government of Azerbaijan has reached its decision. The promises offered by Germany - protection, investment, and a place within the powerful Reichspakt alliance - have proven too significant to ignore. Azerbaijan sits in the shadow of greater powers, between the Russian bear, the Iranian lion, and the Ottoman wolf. With the popping of wine bottles, our diplomats celebrate the agreement as another triumph of Reich diplomacy in the East as the balance of the region shifts ever further away from Russia."
gerfor.375.a:0 "A valuable new partner."

gerfor.376.t:0 "Azerbaijan Disagrees"
gerfor.376.d:0 "The banquet has ended, the wine is gone, and the hangover has begun. The envoys from Baku have informed us that their cabinet has refused our premier offer. Despite generous offers of investment, military support, and diplomatic backing, the Azerbaijani leadership has declined to bind to the Reichspakt. Azerbaijan is used to being the frontier of empires and suffered for it during the Weltkrieg and so has become remarkably guarded against further entanglements. They are unwilling to exchange one distant master for another. German diplomats depart the Caspian coast with polite smiles masking quiet disappointment. The oil of Baku may yet flow freely, but it will not, for now, fly under the banner of the Reichspakt."
gerfor.376.a:0 "An unfortunate outcome."

gerfor.377.t:0 "Holding Georgia"
gerfor.377.d:0 "Our Georgian allies, who protect the gates to the Caucasus, require consistent support if they are to hold back the greedy expansion of our rivals. Their decision to align themselves with the Reichspakt was a diplomatic triumph, but alliances must be maintained as carefully as they are won. The young republic sits precariously in the region, surrounded by ambitious neighbors and is haunted by the specter of Russian revanchism. Further material assistance - weapons, economic support, and technical expertise - will water the flowering relationship between our two nations and demonstrate that the Reich stands firmly behind its friends."
gerfor.377.a:0 "Ensure Georgia remains within our orbit."

gerfor.378.t:0 "Further German Aid Arrives"
gerfor.378.d:0 "The distant thunder of freight trains echoes through our land as shipments of German equipment, machinery, and military supplies begin to arrive. Crates bearing imperial markings are unloaded in railway yards and depots, their contents destined for Georgian arsenals, workshops, and training grounds. Alongside the material come German advisors, officers, engineers, and administrators dispatched to help modernize the young republic's military and economy. As the threat against us grows by the day, the backing of the Imperial eagle is a relief for morale. Their presence is a tangible reminder that Georgia's new place within the Reichspakt is backed by the full weight of Ruhr industry and Prussian expertise."
gerfor.378.a:0 "The partnership grows stronger."

gerfor.379.t:0 "Anti-Russian Military Planning"
gerfor.379.d:0 "Within staff rooms and training fields across the country, preparations quietly intensify. Officers pore over translated manuals of Russian doctrine while instructors drill soldiers in tactics designed specifically to counter the armies beyond the northern frontier. German advisors have taken a leading role in these efforts, sharing hard-earned experience learned through blood and ice while assisting in the development of operational plans for the grim possibility of war. Detailed studies of terrain, supply lines, and potential defensive positions now circulate among the high command, each document reflecting the growing seriousness with which this threat is regarded. While peace still holds, should conflict erupt once more in the east, our forces must be ready to meet the Russian bear with discipline, preparation, and resolve."
gerfor.379.a:0 "Prepare for the inevitable."

gerfor.3000.t:0 "A Frankish Sovereign For France"
gerfor.3000.d:0 "France rests subjugated, its syndicalist regime broken in the face of Reichspakt might, yet true control requires more than mere occupation forces: a figurehead to provide legitimacy and stabilize the metropole's path in Mitteleuropa. Three candidates are at the ready, each grounded in the unshakeable resolve and shared history of the Germans.\n\nLothar von Arnauld de la Perière, the unmatched U-boat ace whose prize-winning captures of Entente shipping exceeded a half million tons without violating naval rules, offers a leadership role tempered in the depths and ready to tackle the throne as a new challenge: eliminating disloyalty and guiding France toward a new age of naval power to support Reichspakt naval supremacy.\n\nVictoria Louise von Preußen, the Kaiser's sole daughter and Duchess of Brunswick, offers the shining beauty and imperial charm that might win the hearts and minds of the French. Defying centuries of Salic law as the first reigning female monarch in French history, she might restore the aristocratic splendor and charm of the Belle Epoque through charity events, theatrical productions, and a dazzling court that might enchant the elite and redefine loyalty to the Reichspakt as aristocratic continuity.\n\nFranz von Roques, the Huguenot-descended general whose mastery of the rear areas in the Weltkrieg ensured order in the face of chaos, offers a martial leadership that might stabilize the French and restore order through junta-like control, crushing syndicalist pockets and agitators and utilizing pragmatic governance to provide the war-weary citizenry a measure of peace. Permanent or temporary, he combines the heritage and bloodlines of the French and the Teutons to forge a stalwart French sentinel."
gerfor.3000.a:0 "Crown the Admiral, Lothar von Arnauld de la Perière!"
gerfor.3000.b:0 "Enthrone the Kaiser’s Daughter, Victoria Louise von Preußen!"
gerfor.3000.c:0 "Appoint Franz von Roques for the foreseeable future."
gerfor.3000.e:0 "Appoint Franz von Roques until the worst has subsided for now."

gerfor.3001.t:0 "The New Face of the Metropole"
gerfor.3001.d:0 "With the embers of syndicalism extinguished within the Metropole, what remains of its once-defiant citizenry now awaits the formation of their new reality, one that has been shaped by the relentless struggle and march of Reichspakt forces. However, stability cannot arise from mere conquest but from a guiding figure that may emerge from amongst the soil of the conquered, one whose ambitions are aligned with that of Berlin. A figure who can manage the intricate details of governing and one who can represent our foreign rule in a more familial form. From amongst the shadows of defeat, candidates emerge with their own peculiar brand of influence, whether it be from the muses of technocratic circles, the ranks of visionary philosophers, rural firebrands, or the establishment of the old Republics. And so, the question becomes one of unity under one such figure, one who can forge a singular entity that can tap into the potential of France, her natural instincts, and, most importantly, her resources, inevitably for our benefit and theirs."
gerfor.3001.a:0 "Install a Unified Collaborator Government!"
gerfor.3001.b:0 "Under a dissolved France, a new reality may begin to emerge!"

gerfor.3002.t:0 "The Neustria Industrial Zone"
gerfor.3002.d:0 "In the shadow of the metropole's subjugation, the northern expanses of France disclose their hidden potential, a basin worn by centuries of toil but teeming with coal deposits and iron deposits that once fueled the nation's ascension. Like the ancient divisions of the Frankish Empire, in which Neustria represented the western bastion from the banks of the Loire to the limits of Silva Carbonaria, including the fertile plains and maritime cities that gave birth to Carolingian unity, we resurrect this legendary name for a new industrial empire. Under the watchful eye of Berlin's architecture, this new entity of Neustria shall not play the role of a competing subkingdom but shall function as a specialized entity devoted to the unremitting exploitation of resources, its mines and factories humming with ceaseless dedication to the great engine of Mitteleuropa. At its helm, we place Pierre Pucheu, a steel magnate whose control of the Cartel d'Acier perfected his skills in technocratic efficiency and iron-fisted order. A committed anti-syndicalist, Pucheu shall rule over an empire of labor that conforms to monopolistic efficiency, purging any vestiges of syndicalism and conforming production to German ideals of industrial renewal.\n\nBut the limits of such a domain must be decided; clearly not all of France can be encompassed in such a magnate, lest we stow the fires of yet another revanchist French nation. A more manageable and garrisoned realm must be decided upon. A compact entity that shall link Calais' docks with Lille's collieries, capitalizing on the Nord-Pas-de-Calais basin's traditional wealth of coal deposits that reached their peak of thirty-five million tonnes in the interwar years; an extended entity that shall include the southern regions of Amiens, blending Picardy's agricultural regions with deeper mining ventures; or a vast entity that shall sprawl from the Channel shores to the Rhine frontiers, uniting Lorraine's iron deposits with Champagne's vineyards in a grand entity of resource extraction. Regardless of territorial limits, however, Neustria shall symbolize the rebirth of the Franks under Teutonic guidance, its spoils fueling the Reichspakt and Mittleeuropa’s development."
gerfor.3002.a:0 "Confine Neustria to the Calais-Lille Corridor!"
gerfor.3002.b:0 "Neustria shall encompass the Calais-Lille-Amiens regions!"
gerfor.3002.c:0 "From the Channel to the Rhine, Neustria shall be born!"

gerfor.3100.t:0 "The German-Appointed Leader of Britain"
gerfor.3100.d:0 "With the British Isles firmly under German control, the question now turns to who shall stand at the head of the new regime. A ruler must be chosen who can stabilize the country while ensuring that Britain remains firmly within the orbit of the Reich. Such a decision will form the basis of legitimacy of the new governorate and will have a key role in ensuring the state’s prerogatives are respected and upheld.\n\nOne option is to grant the British crown to Charles Edward, Duke of Saxe-Coburg and Gotha, who stands as a bridge between the German and British royal houses. A grandson of Queen Victoria, nicknamed the \"Seventh Son of Kaiser Wilhelm\", and a devoted supporter of Germany through two world conflicts with his homeland possessing both dynastic legitimacy and unwavering loyalty to the Reich. Under his rule, Britain might be restored as a monarchy closely aligned with Prussian tradition of conservatism, militarism, and nationalism.\n\nAnother monarchal suggestion is a softer approach with Daisy, Princess of Pless. Born in Wales to noble blood, she married the wealthy Hans Heinrich XV von Hochberg and became integrated into the highest circles of European aristocracy while keeping strong ties to the English Gentry. Known for her charitable works, serving in the red cross, and her efforts to foster peace between the two nations during the war, she could serve as a conciliatory figure capable of calming a resentful population. Though less predictable in her loyalties, her popularity and humanitarian reputation might make her the ideal monarch to gently guide Britain toward cooperation with the Empire.\n\nA final option lies not in crowns or coronations, but in the firm hand of military rule. General Hermann Balck of the Panzertruppen has already demonstrated his ability to maintain order through discipline, mobility, and relentless efficiency, and has made a name for himself already in our campaigns against the British. Under Balck, Britain would be merely a tightly controlled territory governed by German authority. Whether as a temporary regent overseeing reconstruction or as the permanent Governor General of the islands, Balck would represent the uncompromising face of victory and Germanic supremacy over the Isles."
gerfor.3100.a:0 "Hail King Charles III!"
gerfor.3100.b:0 "Hail Queen Daisy!"
gerfor.3100.c:0 "Balck will have his own fiefdom."
gerfor.3100.e:0 "Balck will act as a regent until order is restored."

gerfor.3101.t:0 "The Ascension of the Collaborators"
gerfor.3101.d:0 "The guns have fallen silent across the British Isles, yet the question of governance looms larger than any battlefield victory. While Germania now stands triumphantly over the Union’s red-draped corpse, the conquest alone has not snuffed out the Anglo’s penchant for resistance and stubbornness. There remain many partisans in the English countryside, and the lack of a truly self-sufficient British economy has already proven to be a strain upon our resources as aid must continuously be directed to the Isles. To rectify this situation the Reichskanzler and his advisors have prepared for various local collaborators to make our rule smoother, ranging from former dissidents towards the syndicalist regime, to exiles that have joined our cause, to even members of Freikorps Hanover. It will certainly take time for the chaos to quiet down across the pond, but today we can begin to finally make progress."
gerfor.3101.a:0 "The Reichskanzler’s man shall ensure peace and stability."
gerfor.3101.b:0 "We must support the new states until the idea of a “United Kingdom” fades."

gerfor.3200.t:0 "The Crown of Russia within our Grasp"
gerfor.3200.d:0 "With the final fall of the former Russian government at last, we are now faced with the grandest struggle empires have faced with the Russian Bear. Vast stretches of steppes, deep forests, and snowy hills fill the Russian landscape, making occupation and stability a rare and fleeting sight. On top of this, a new sovereign for the collapsed Russian hegemony must be deployed as a leading figure to guide our occupation of Russia. This sovereign would be supported by a large dedicated German garrison in the region, but the scale of this garrison's control remains uncertain.\n\nFirst among the list is Wilhelm II's second son, Prince Eitel Friedrich of Prussia, a veteran from the first Weltkreig. Seen as the most legitimate German choice, Eitel would bring about the discipline and authority of his father, wishing to see Russia elevated to a Grand Duchy serving the Empire. However, despite his support and reputation within the German aristocracy and veterans' associations, he has little to no support in Russia. He would likely be seen as a simple foreign occupying tyrant, not too dissimilar to the Tsars and Mongols before him.\n\nNext among the candidates is Louis Ferdinand, grandson to Wilhelm II, who was only a child during the First Weltkrieg. Now an adult, he recently married the Grand Duchess Kira Kirillovna of Russia, which leads to Ferdinand’s greater legitimacy to the Russian throne compared to his contemporaries. While inexperienced and lacking connections like Eitel, Ferdinand enjoys a larger swathe of support amongst the Russian population, most notably due to his connection to the Romanov throne through his marriage. Less militant than other choices, he is quickly being seen as the best option for pacifying the Russian people through a relatable face. However, without any tangible experience in ruling, let alone running the chaotic ruins of Russia, many remain skeptical of him.\n\nLastly, the Field Marshal Fedor von Bock has beckoned to rule Russia, wishing to prove to history that the rabid bear can be tamed with sufficient effort. A veteran of both Weltkriegs, he earned himself the nickname "Der Sterber", or the "Dying One", often retelling his soldiers of the glory of serving the German fatherland. Now, with the chance to stabilize and tame the very nation he was mobilised against, he now wishes to rebuild it. Not as some fanciful rendition of redemption, but as an opportunity to cement German dominion over the Eastern front, to end the ceaseless conflicts of Russian aggression. While supported back home, chiefly among the general staff, he is vastly unpopular among the Russian populace due to his military service and ferocity on the Eastern front against their own, an unpopularity that will hamper attempts to tame Russia in its initial phase."
gerfor.3200.a:0 "Wilhelm II’s son, Eitel Friedrich."
gerfor.3200.b:0 "Louis Ferdinand, to unite the thrones."
gerfor.3200.c:0 "Fedor von Bock shall finally end the Russian menace."
gerfor.3200.e:0 "Fedor von Bock shall rule until Russia stabilizes."

gerfor.3201.t:0 "The Men of the Bear"
gerfor.3201.d:0 ""
gerfor.3201.a:0 "Cool unique Collabo shit"

gerfor.3240.t:0 "Return of the Chevrons"
gerfor.3240.d:0 "The question of whether to create a new French army or not has come up. The chance is there to fully reshape the army alongside Prussian lines and to perhaps stamp out the weak points of French society by eroding their own military traditions, and plugging up problem areas (such as the propensity for mutinies which caused their revolution in the first place), but many think that the French should not be trusted so soon with an armed force."
gerfor.3240.a:0 "The restrictions shall stay!"
gerfor.3240.b:0 "Lighten their restrictions modestly."
gerfor.3240.c:0 "The French can have an army again, for security purposes."

gerfor.3241.t:0 "Outreach to Like-Minded Anglos"
gerfor.3241.d:0 "Freikorps Hannover has begun to prove its worth across the scarred isles of Britain, growing larger by the month as an autonomous anti-syndicalist force. Born from the remnants of the British National Legion under William Joyce, this collaborationist formation has swelled into a notable paramilitary aligned with the occupation. Looters, nationalist zealots, and broken veterans alike march beneath its skull-and-bones insignia, clad in modified old British Army uniforms.\n\nMany among them are veterans of the Syndicalist war effort in the Second Weltkrieg. Returning to a shattered nation without work, support, or treatment for their wounds they have turned their rage inward, blaming the home front, the union bosses, and the internationalist ideologues who betrayed Britannia. Unable to reintegrate into civilian life and knowing only the language of violence, they have found renewed purpose in the ranks of the Legion. Anti-social behaviour is common as these drunken angry marauders desperate for camaraderie act in rage against those they perceived had betrayed them. Even some former syndicalists, now disillusioned, seek redemption through collaboration and bloodshed.\n\nThough effective as a blunt instrument against unrest and labour agitation, these forces remain undisciplined and prone to excess. Various examples of street beatings and the demolition of factories have made their way passed censors and into even the German press, causing revulsion and discontent in equal measure. However, within a select few units, there have appeared to be moments of sound decision-making and well-needed assistance to our Heer units in combatting remnant resistance. There have been calls for us to begin reining in the Freikorps once the fires have started to die down, and the Feldgendarmerie has already acted in a few places, but a question has arisen about whether or not the Freikorps should expand or remain heavily restricted in size after some appropriate promotions. While our officers on the ground are mixed about their usefulness, the upper levels of the General Staff believe that our occupation sorely needs the manpower."
gerfor.3241.a:0 "Keep the heavy restrictions."
gerfor.3241.b:0 "Apply only modest restrictions."
gerfor.3241.c:0 "Lighten the restrictions on their military to the maximum amount."

gerfor.3242.t:0 "Freed From Savagery"
gerfor.3242.d:0 "While some collaborator regiments already exist in Russia, there is now a chance to expand the rosters even further and create some veritable Ostlegionen from the masses of Russians who, most certainly, simply need some bread and payment. While there are lots of reservations over using such men, as the current collaborator groups suffer from a severe lack of discipline, the Heer can also admit that patrolling the taigas, tundras, and forests all on their own has been notably taxing, and so it might be best to start relying on those who know the lands better, even if they might not be the best of individuals."
gerfor.3242.a:0 "Maintain all restrictions."
gerfor.3242.b:0 "They can be trusted with a few more regiments."
gerfor.3242.c:0 "We need a lot of manpower to govern Russia!"

gerfor.3243.t:0 "The Burning British Isles"
gerfor.3243.d:0 "The United Kingdom lies broken, its proud cities reduced to smoldering carcasses. London, once the beating heart of an empire, now stands as a shattered monument to defiance, its great landmarks from Parliament to the clocktower of Big Ben blasted into ruin. Vast swathes of the population are left homeless, huddling in half-collapsed buildings or seeking refuge in the underground rail. Similar conditions plague the southern population centres, with Plymouth and Coventry especially hard-hit. Rationing is widespread, as farmers struggle to produce even subsistence yields and distribution networks falter under the strain. Roads and railways across England have been severed by the \"Blitz\", our air campaign across the British skies, creating a logistical nightmare that only deepens the crisis.\n\nIn the countryside, firestorms rage across forests unchecked, a lack of resources leaving entire provinces to burn and the night sky glowing with a hellish light visible for miles. The Heer struggles to maintain order beyond the cities as armed remnants of the Home Guard skulk through hedgerows and hollow lanes, striking where they can before vanishing once more into the countryside. Above them, the thunder of aircraft never ceases. The Luftwaffe circles like carrion birds, unleashing hails of gunfire upon any sign of resistance.\n\nAmidst all of this chaos, there remain many who grumble about the long road of reconstruction ahead, but the Heer has already drafted many plans to begin combatting these problems. In time, we may finally see peace, but it shall take a great deal of effort."
gerfor.3243.a:0 "It doesn't feel like a victory."

gerfor.3244.t:0 "The Uneasy Road to Peace"
gerfor.3244.d:0 "In the wake of conquest, the occupation authorities have turned their attention towards reconstruction with much of the resistance broken. The shattered systems of civilian life in health services, electrical grids, waterworks, and transport are being carefully restored from the remnants of Union’s institutions. For now, these services are granted free of charge to steady a population left reeling by war and privation.\n\nAt the same time, the process of ideological reformation advances with quiet determination. Anti-British rhetoric is deliberately restrained, replaced instead with a more measured campaign aimed at eroding syndicalist values and dismantling the lingering nostalgia for the old regime. Pamphlets, broadcasts, and carefully curated public messaging work in tandem, seeking to reshape attitudes without provoking open defiance.\n\nThe Heer remains a looming presence but its harsher instincts held in check. Luftwaffe reconnaissance continues to monitor the countryside however, the last remnants of the Home Guard have largely been silenced. Peace may be taking shape, but it remains fragile. It will be a long time yet before the occupation can truly be brought to a close."
gerfor.3244.a:0 "We have nothing to gain by brutalizing our fallen foes."

gerfor.3245.t:0 "Bringing Them Low"
gerfor.3245.d:0 "Across the British Isles, symbols of the syndicalist era such as trade halls, statues, banners, museums, and monuments are being systematically torn down or repurposed. These proud testaments to the Revolution of 1925 are relics of a misguided age, unworthy of preservation in the new order. A list of the many physical embodiments of socialist arrogance has been drawn up by the bureaucracy for action, slowly disseminated for local councils to enact.\n\nWhile in some cases it is simply the decision of renaming street names or taking a hammer to a plaque, statues and art pieces have had questions raised of their historical usefulness in being preserved. The highest quality of these will be shipped back to Germany to serve as a reminder of triumph over England while the rest are marked as open season for vandals and wreckers. Pre-Windsor monarchs, Reich-aligned politicians and apolitical figures are to take their place to serve as an example of the ideal citizen. The exiles will not be spared from cultural counter-revolution as their failures in the First Weltkrieg and their inability to prevent the violence of ‘25 are proof of their lack of strength.\n\nSoon, even memory itself will bend to the will of the new order. Shrines of syndicalist folly will fall to dust and in its place monuments to hierarchy, submission, and god given authority will rise, each stone and inscription carefully chosen to purge the red delusion permanently. In time, the old symbols will fade into obscurity, their meanings forgotten, their cause reduced to little more than a cautionary tale whispered by those few who still remember, and even they will eventually fall silent."
gerfor.3245.a:0 "In time, they will learn."

gerfor.3246.t:0 "Resurfacing the Blood of the Angles"
gerfor.3246.d:0 "For centuries the people of England have lived beneath the shadow of a cultural myth forged by Norman conquerors and shaped by the fashions of Gallic-Latin continental courts. Yet this narrative has always rung hollow. England itself bears the name of a Germanic tribe, the Angles, whose kinsmen once crossed the North Sea to settle the island and build a new homeland. The Angelcynn, as they called themselves, were not strangers to Germany, but the lost branch of the same ancient people.\n\nNow, with Britain under German influence, a new cultural policy has begun to take shape. Radio broadcasts, newspapers, and public festivals increasingly emphasize the shared Germanic roots of the English people. Oktoberfest-style gatherings, traditional folk celebrations, and exhibitions of German art and music are promoted across the country. Advertisements for weddings feature Polterabend , where families gather to break dishes and pots to bring good luck, alongside new events for Tanz in den Mai are established, to celebrate the start of spring with bonfires and Maypoles. The works of Wagner, Bach, and Beethoven fill the airwaves as the cultural inheritance of a common civilization stretching back to the migrations of the early Germanic tribes.\n\nThe Norman Conquest, celebrated as the birth of England’s aristocratic order, is now portrayed as a historical rupture that severed the English folk from their true heritage. Just as revolutionary syndicalism once brought political ruin to the old kingdom, so too did the Norman legacy erode the ancient Anglo-Saxon spirit. If Britain is to find its place in the new European order, it must rediscover the blood of the Angles and remember that across the North Sea dwell not their conquerors, but long-lost blood relatives."
gerfor.3246.a:0 "Remind them of their kinship."

gerfor.3247.t:0 "The Revolution's Violent Finale"
gerfor.3247.d:0 "The French are now occupied by Germany in the wake of the Second Weltkrieg. This is a simple starter event to the related tree about dealing with that. There are issues with Francs-tireurs, a hostile bureaucracy, and a messy occupation."
gerfor.3247.a:0 "Even in peace, the guns still resound!"

gerfor.3248.t:0 "A Shadowy Figure Looms Over France"
gerfor.3248.d:0 "Links formed with all sorts of elements in France to work as collaborators, notably the Corsican mafia and other criminal types. General flavor event, related to the GER_Collaborators_Criminals_and_Exiles focus"
gerfor.3248.a:0 "They might be unsavory, but they work for us."

gerfor.3249.t:0 "A Diplomatic Revolution"
gerfor.3249.d:0 "The signing of the Elysee Treaty https://en.wikipedia.org/wiki/%C3%89lys%C3%A9e_Treaty from IRL, mostly, and related to the relevant focus. A flavor event about the focus's completion and the immediate effects being felt, notably in the occupation lessening its grip on French life and a steady return to normalcy in many areas of the French country."
gerfor.3249.a:0 "No more shall die in the name of revanchisme!"

gerfor.3251.t:0 "A Bitter Winter"
gerfor.3251.d:0 "Starter event for the occupation of Russia. It's hard and grueling, and the land is especially hostile to the German forces stationed there as partisans and an unwelcoming climate greet them, but it has to be done."
gerfor.3251.a:0 "We will not repeat the mistakes of others from history."

gerfor.3252.t:0 "Finish What Peter Started"
gerfor.3252.d:0 "Event related to GER_Renewing_the_Petrovian_Revolution. The occupation changing its temperament towards nation building, in a way, as various facilities are repaired, constructed, refurbished, etc. and more opportunities are given to the Russian people to participate in governance themselves, of course with the oversight of the German military. The overall goal is to create a more loyal and docile populace through the usage of the carrot, but the stick is constantly kept close at hand. The Germans hope that, in time, Russia can be fully civilized and brought into the fold of proper Europe."
gerfor.3252.a:0 "Maybe the next generation won't be so savage."

gerfor.3253.t:0 "The Price of Order"
gerfor.3253.d:0 "Related to GER_Lead_with_a_Boyars_Mace. The occupation is going to be firm, but not excessively brutal... Or so that is the goal. The violent gangs of bandits, cossacks, partisans, paramilitaries, and all other groups spread across Russia shall be brought to heel, firmly and publicly, while those who obey, aid, or simply tolerate the occupation will be left well alone. While the army won't go out of its way to fix Russia or intervene immensely, it will be ensuring that chaos will not run rampant. Perhaps a notable few criminals can be brought to justice here."
gerfor.3253.a:0 "The taigas shall finally be tamed."

gerfor.3254.t:0 "Hiems Aeterna"
gerfor.3254.d:0 "'Eternal Winter', related to GER_Buxhovdens_Hailstorm. Russia, a "spiritual enemy" to Germany, will not be granted much in the way of clemency whatsoever as the occupation embarks on a near-total campaign of destruction of Russian nationalism. Statues toppled, militant speakers silenced, dissident groups "disappeared", there is nothing that shall be held back as the country is subjected to a forceful destruction of anything that might have prompted Russia to raise a hand against Germany in the interest of ensuring it never makes such a mistake ever again. The Teutonic Knights are now, firmly, avenged."
gerfor.3254.a:0 "Frost sets in, and the heart grows even colder."

gerfor.3255.t:0 "An Eastern Mission"
gerfor.3255.d:0 "Bureaucrats and all that from the focus GER_Second_Call_of_Catherine arriving in Russia and realizing that while they have quite a lot of work ahead of them, they do have a lot of leeway given to them since the government is quite desperate. Some will take this opportunistically, using success in this venture to further careers back in Germany, while others may take a moment to show some rare signs of compassion. It varies, to be sure, and while it all comes with the caveat that Russia's bureaucracy and state will be staffed by a lot of Germans, at least temporarily, it does mean that the state can start to get back on track."
gerfor.3255.a:0 "A duty, and an opportunity."

### Flavor Events ###

gerfla.1.t:0 "Sedantag"
gerfla.1.d:0 "After the Franco-German war of 1870-1871, the Sedantag was established to celebrate our victory at Sedan, where we captured the last French Emperor Napoleon III and the cream of their army. Originally a holiday to honour the Prussian military, the Sedantag transformed into a celebration of the Reich's foundation, and after the Weltkrieg the humbling of its foes.\n\nIn every town and village from Aachen to Memel, every street is decorated in black, white, and red. Every bell proudly proclaims this day of celebration. Nobles, soldiers and innumerable veterans parade proudly through the streets, cheered by the happy masses. Indeed, this is a good day, a day that reminds us of the peace and prosperity we have enjoyed since the forging of the Reich."
gerfla.1.a:0 "Heil dem Kaiserreich!"

gerfla.2.t:0 "Luise Hoffmann's Pacific Flight"
gerfla.2.d:0 "Luise Hoffmann was the first German woman to gain a pilot's licence. After her 1933 transatlantic solo flight she has become one of Germany's most famous aviation pioneers, along with heroes like Manfred von Richthofen and Gunther Pluschow. Today, Fraulein Hoffmann has accomplished a new long distance record in her customised Fokker F-IX. Starting in Tahiti 36 hours ago, Fraulein Hoffmann today landed safely in Lae on German Neuguinea, where she was welcomed by a jubilant crowd and local governor Albert Hahl.\n\nIt has been rumoured that Hoffmann will soon attempt a solo flight around the world. This would place her in direct competition with the Red Baron who is planning a similar endeavour..."
gerfla.2.a:0 "What an accomplishment!"

gerfla.3.t:0 "Hoffmann vs von Richthofen"
gerfla.3.d:0 "An exciting day for the history of aviation. Manfred von Richthofen has accepted Luise Hoffmann's challenge. Today both pilots, flying customised Fokker XIs, started in Daressalam in Mittelafrika for the first solo flight and air race around the world. His Imperial Majesty has wished best luck and Godspeed to both pilots."
gerfla.3.a:0 "How exciting!"

gerfla.4.t:0 "Hoffmann Wins"
gerfla.4.d:0 "Luise Hoffmann has just landed in Daressalam! She is now officially the first person to fly alone around the world! Manfred von Richthofen has already congratulated his opponent over the radio. Talking to the assembled reporters, Fräulein Hoffmann urged girls and women in Germany to persue their dreams, whatever may stand in their way."
gerfla.4.a:0 "Congratulations to a great woman!"

gerfla.5.t:0 "Von Richthofen Wins"
gerfla.5.d:0 "Manfred von Richthofen has just landed in Daressalam! He is now officially the first man to fly alone around the world! Luise Hoffmann has already congratulated her opponent over the radio. Again, the German flying legend has proven to be the world's best pilot."
gerfla.5.a:0 "Congratulations to a German hero!"

gerfla.6.t:0 "Erich von Ludendorff Dies"
gerfla.6.d:0 "Even after his death was reported early this morning, Erich von Ludendorff remains one of the most controversial people in recent German history. On the one hand he was a hero of the Weltkrieg, the orchestrator of German victory in the 1919 fall of France. On the other hand, most Germans haven't forgotten the ensuing military dictatorship that only ended when Admiral Von Tirpitz forced him to retire after the infamous Osthilfeskandal in 1924. Although Ludendorff still received some honours for his service, like his knighthood, the former quartermaster-general mostly led a secluded life at his estate afterwards."
gerfla.6.a:0 "Let's remember the genius, not the dictator."

gerfla.9.t:0 "Unser Kampf"
gerfla.9.d:0 "The Propyläen Verlag subdivision of the Ullstein Verlag publishing house has announced its intention to release a new series of books devoted to stories, accounts, and poetry by individual German soldiers that served throughout the various theatres of the Weltkrieg, titled 'Unser Kampf' or ‘Our Struggle’. Notable examples of works and writings drawn from include the diaries of famous figures such as Ernst Jünger and Paul von Lettow-Vorbeck, as well as the memoirs of lesser personas, such as that of corporal Adolf Hitler - a signalman who amongst other distinctions was awarded no less than two Iron Crosses for his valor on both the Western and Eastern fronts before being slain in 1918 at the hands of British soldier Henry Tandey. The diaries provide a unique and fiery insight into the nature of a bitter ideological struggle while honoring fallen heroes and showcasing the tragic heroism and horrors that war truly brings in a personal and intimate portrayal straight from the front. What better way to reaffirm the values and continuing glory of the Kaiserreich while also shining light on the grim realities of world war in these troubled times?"
gerfla.9.a:0 "A good read!"

gerfla.10.t:0 "Unser Kampf: The Movie"
gerfla.10.d:0 "Following the widespread popularity of the bestselling series produced by Propyläen Verlag, film director wunderkind Leni Riefenstahl resolved to turn the material into a movie based on the accounts given. 'Unser Kampf' boasts the highest production values hitherto seen - made possible by state investments into the Babelsberg studios - and offers a frighteningly real and morbid, although simultaneously glorified, depiction of the war. Starring Heinz Ruhmann, Hans Albers, Theodor Loos, and Marlene Dietrich, among others, the story focuses on the heroism and dedication of the 'small people' in the Weltkrieg, such as young fighter aces like Heinrich Gontermann, Hans-Joachim Buddecke, Max Immelmann, Oswald Boelcke, and Adolf Ritter von Tutschek that tragically died in the line of duty or people like the decorated corporal and signalman Adolf Hitler - being played by his own living nephew William Patrick Hitler; together who all sacrificed everything for their Kaiser and the Reich in the mud of Marcoing and other battlefields across Europe and the wider globe. May this film and others like it, such as the soon to be released ‘Metropolis’ and the previously-released ‘SOS Eisberg’ and ‘Das Blaue Licht’, continue to progress contemporary German cinema and art while also hopefully drumming up more patriotic fervor and support among the masses."
gerfla.10.a:0 "A stellar movie!"

gerfla.11.t:0 "A Return to Europe"
gerfla.11.d:0 "Our soldiers line the streets of [GetNameGERCapital], cheering wildly as the leaders of Germany step off their newly-arrived ships onto European soil once more. We are exiles no longer."
gerfla.11.a:0 "A wonderful day!"

GER_Berlin:0 "Berlin"
GER_Frankfurt:0 "Frankfurt"
GER_Hamburg:0 "Hamburg"
GER_Essen:0 "Essen"
GER_Munich:0 "Munich"
GEX_becomes_GER:0 "§Y[GEX.GetNameDefCap]§! will become §Y[GER.GetNameDef]§!"

gerfla.12.t:0 "A Return to Berlin"
gerfla.12.d:0 "With Berlin once more part of [GEX.GetNameDef], we may now return the government to its proper place in the Reichstag."
gerfla.12.a:0 "Excellent."

gerfla.13.t:0 "Marx Statue Unveiled in Trier"
gerfla.13.d:0 "As part of the recent efforts by the SPD to rehabilitate Marx as a true German hero, Kaiser [GER.GetLeader] himself has lent his presence to unveil a new statue of Karl Marx in his hometown of Trier. As part of his dedication speech, the Kaiser has pledged to embark on a new information campaign to remind the German people that Marx was no Syndicalist, merely a social democrat who believed in change through the existing capitalist system, a message that in time would hopefully make its way to the dirty Syndicalists in the West."
gerfla.13.a:0 "Someone should teach those Syndicalists how to read."

gerfla.14.t:0 "Irish Immigrants Arrive in Hamburg"
gerfla.14.d:0 "After a short yet perilous trek from Dublin to Hamburg, the first boat of Irish migrants has traversed past the numerous Communard patrols in the North Sea and found their way to our shores. As part of the FVP's new Mitteleuropa immigration program, the majority of people aboard the vessel were skilled laborers, possessing skills that they had acquired over a very long career. While there is no shortage of skilled labor in the Kaiserreich, there is optimism that this cultural and laboral diffusion will lead to closer relations between our two states. Their arrival was unremarkable, with the delegation quickly being interrupted by a minor group of conservatives, displeased with the arrival of Irish Catholics. However, we are confident that the Bavarians in our delegation helped our guests to disregard the outburst and feel more welcome in their new home, due to their shared Catholic heritage."
gerfla.14.a:0 "It seems the program is already starting to bear fruit."

gerfla.15.t:0 "Mittelafrikan Generals Return to Germany"
gerfla.15.d:0 "Some surprising news came out of Berlin airport today. While returning from one of his many visits to Daressalam, this time two additional figures followed Chancellor Lettow-Vorbeck off the plane in addition to his usual delegation. Upon further investigation, the throngs of German press determined the two mysterious figures were none other than Vorbeck's nephew Hans Albert, an up-and-coming officer in the Mittelafrikan army, as well as Nordrhodesien general Julian Scherner, a longtime confidant of the Chancellor's. This was confirmed later in the day when Vorbeck officially named them as generals in the Imperial German Army. While some political pundits are accusing Paul of nepotism for promoting his nephew, it's no secret that both men were inspired by the renewed patriotism of Lettow-Vorbeck's Germany and both want to take the fight directly to the despicable Communards."
gerfla.15.a:0 "A surprise to be sure, but a welcome one."

gerfla.17.t:0 "Vertical Developments"
gerfla.17.d:0 "Utilizing economic ties with domestic businesses and military contractors, we have been able to develop experimental ‘helicopter’ prototypes for the armies of the Kaiserreich. Named the Focke-Achgelis Fa 223 Drache, or Dragon, these unique aerial vehicles are capable of vertical take-off and landing, making them perfect for use in rough terrain. Though expensive and fragile, we have been able to send a few models to the major colonies and constituent members of the Reichspakt, allowing our armies and the armies of our subjects to utilize this unique technology. With our growing airfleet also using autogyros, rotabuggies, and other novel transports devised by crack German scientists and our allied lackeys, we shall be able to ferry our populace, our goods, and our troops all around the Kaiserreich without issue or delay while also delivering devastating payloads at a moment’s notice. Just be careful not to crash any, for we only have a fragile few, and they are currently very temperamental and very hard to replace."
gerfla.17.a:0 "Onwards and upwards!"

gerfla.18.t:0 "Experimental Technologies from the Fatherland"
gerfla.18.d:0 "Seeking to put their recent technological breakthroughs to the test, Berlin has been gracious enough to send some of their new military hardware to be tested on the frontlines here at the fringes of Germany’s sphere. The centerpiece invention of these new shipments are the Focke-Achgelis Fa 223 Drache, or Dragon. These ‘Dragons’ are unique aircraft that can take off and land vertically, and have been dubbed helicopters by the initial designers. Primarily designed to quickly ferry supplies and precious cargo in and out of rough areas and terrain, some of these ‘Dragons’ have also been out-fitted with weaponry, functioning as basic light aerial gunships and bombers. Looking more like something out of Da Vinci’s sketchbooks and less like a real war machine, we shall give these new helicopters and the other tech the Germans sent us a thorough testing against the varied enemies of the Kaiserirech and the wider Reichspakt."
gerfla.18.a:0 "We will ensure these are put to good use."

gerfla.19.t:0 "The Bauhaus Question"
gerfla.19.d:0 "Founded by Berlin-born artist Walter Gropius in the years following our victory in the Great War, the Staatliches Bauhaus is one of the Kaiserreich’s most famous, or infamous, art schools that first opened its doors in 1919 after working within the Deutscher Werkbund art union founded by Hermann Muthesius in 1907. Aimed at the creation of a Gesamtkunstwerk, or a comprehensive artwork in which all the different mediums of art in all its forms would be brought together in order to feed each other in a new, comprehensive artistic revolution based on non-Leftist Internationalism, anti-Expressionism, New Objectivity/New Sobriety (called Neues Bauen or Neue Saclichkeit in German), and new concepts of liberal German Modernism and the avant-garde. With three campuses now existing in Berlin, Dessau, and Weimar as the movement explodes in popularity, the Bauhaus group has largely been dominated by rival architect-directors Walter Gropius, Hannes Meyer, and Ludwig Mies van der Rohe, along with famous artists like Paul Klee, Wassily Kandisnky, László Moholy-Nagy, Oskar Schlemmer, Ernst May, Martin Wagner, Bruno Taut, Bruno Paul, Erich Mendelsohn, Hans Poelzig, Adolf Meyer, Peter Behrens, Joost Schmidt, and more, all dedicated to the creation of rational, functional, and non-fanciful art that flies in the face of the baroque, imposing classic architecture traditional throughout the Kaiserreich and the rising Völkisch movements that resist the march of progress.\n\nDespite their growing popularity, and their sole focus on art and nothing else like their famous new fonts and futurist art dedicate to the adaptation of German architecture towards something that fits ‘our world of machines, radios, and fast cars’, the Bauhaus group have been accused of harboring radically liberal or Leftist sentiments, holding traitorous ties to the Russian constructivist Vkhutemas art school, and harboring anti-monarchist sentiments, though none of these claims have been verified, likely just being hearsay spread by Bauhaus’ detractors. Regardless, this has not stopped many reactionary groups from going after the Left-ish artist guild while supporting rival art movements and typefaces like the dated Fraktur style and its rivalry with the Antiqua and Textura movements, or more modern attempts at a medieval-esque styles like Fraktur's proposed replacements of Kurrentschrift or Sütterlin, forcing our administration’s hand and leaving the decision of what to do with these artists up to the Crown. So what shall we do?"
gerfla.19.a:0 "Fund the Bauhaus group as an exemplar of German cultural innovation!"
gerfla.19.b:0 "Leave them to their art in peace."
gerfla.19.c:0 "Shut down this degenerate hive of liberal excess!"

gerfla.20.t:0 "Farewell to the King of Saxony"
gerfla.20.d:0 "Friedrich August Georg Ferdinand Albert Karl Anton Paul Marcellus, or simply King Georg of Saxony, has managed to seize the headlines in German newspapers despite the crisis previously possessing a monopoly on the front page: Georg has abdicated his throne in favor of a life in the Catholic Church, specifically in the Jesuit Order.\n\nRuling as the King of Saxony since his father's death in 1932, Georg had shockingly been thinking over the concept of abdication for years as the intrigues of noble life in the German Empire had been "intellectually limiting", all this exacerbated by what he viewed as his inability to truly help others across the Empire during the ongoing economic crisis and the increasing radicalism of both left and right. As his personal noblesse oblige led him to serving on the front in the Weltkrieg, even being wounded for it, so it again seemed to push him towards a life of theological work among the people he once represented as a king, believing that public religious teachings can help direct the population away from radicalism.\n\nHe has made it apparent he wishes to offer religious guidance and a spirited promotion of ecumenism, desiring a perspective of cooperativeness towards Protestant elements across the fatherland. The former king is well within his rights to abdicate, but as openly altruistic as his motivations are there remained some controversy in the halls of power. Notably, various Prussian nobles have voiced a concern over a German monarch holding such large swaths of foreign territory, permitted to operate an "exterior fiefdom" outside of the Empire's direct control, granting a possible manipulator far too much power than he should wield.\n\nFor now these "issues of state stability" are remaining only in the mouths of squawking old priests and noblemen, leaving Georg's abdication to be seen as most as the pinnacle of a nobleman's duty, but their paranoid proclamations have reopened a few questions on the status of Poland in the Reichspakt and the status quo of Prussianism in the eyes of the cunning few..."
gerfla.20.a:0 "He answers a calling higher than the throne."

gerfla.24.t:0 "Mother's Day" #KR4 Port, mildly rewritten
gerfla.24.d:0 "Ever since US Congress designated the second Sunday of May as Mother's Day in 1914, as a sign of love and reverence for the mothers of the world, this American tradition has slowly gained traction across the Atlantic. After the end of the Weltkrieg, the Association of German Flower Shop Owners (Verband Deutscher Blumengeschäftsinhaber) took advantage of this as a marketing tactic, promoting the date to raise flower sales in May. The liturgical emphasis of the original vision of the holiday also earned the support of religious conservative groups, who considered it a viable alternative to International Women's Day, initiated by socialist organisations. Movements calling for making it an official holiday earned traction in the German Empire in the 1920s and 1930s.\n\nAlongside business owners, conservative societies, and women's rights activists, the campaign in Germany was also endorsed by völkisch groups, who connected the idea of Mother's Day with their far-right ideal of a loyal childbearing mother who is the future of the Germanic master race. All of this has coalesced into an ongoing question as to whether or not Mother's Day should be made an official holiday in the Kaiserreich. The Empire has... seen better days, but perhaps a small propaganda victory will cause no harm?"
gerfla.24.a:0 "Mothers are the origin of our future, we should not neglect them."
gerfla.24.b:0 "The mothers can wait. The country is more important."

gerfla.27.t:0 "Discovery of the Citric Acid Cycle" #KR4 Port
gerfla.27.d:0 "In the newest publication of 'Chemiker-Zeitung über die wichtigsten Gebiete der Chemie und chemischen Industrie', readers could find an article submitted by Hans Krebs M.D., entitled 'The Role of Citric Acid in Intermediate Metabolism in Animal Tissues'. In it, Krebs presented his newest discovery of a cycle of reactions involving the molecule citric acid, that has proven to be essential in the functioning of all living organisms. The process involves a series of cyclical chemical conversions, and is a vital element of cellular respiration, allowing all organisms to function.\n\nThe author of the paper, Dr. Hans Krebs, is a researcher at the University of Freiburg, known for discovering the Ornithine Cycle in 1932. Using previous work by Albert Imre Szent-Györgyi de Nagyrápolt, who discovered several products and reactions in the cycle, Krebs has presented his discoveries in a succinct fashion.\n\nThis recent discovery has been seen as extremely innovative, and Krebs is already receiving further honours and renown in the scientific world. The achievement has also bolstered the reputation of German scientific circles, and more importantly, the Kaiser-Wilhelm Society."
gerfla.27.a:0 "A cycle of life."

gerfla.28.t:0 "Vydūnas" #KR4 Port
gerfla.28.d:0 "The nominations for the 1940 Nobel Prize in Literature are already reaching the Nobel Prize Committee, and among them is an unexpected name — Wilhelm Storost, more commonly known by the name 'Vydūnas'.\n\nVydūnas is a spiritual leader of the Prussian-Lithuanian community, a member of Theosophist societies, a poet and philosopher, as well as a noted preserver of local traditions, folklore, songs and even their ancient pre-Christian faith, which he has sought to rebuild and redeem. His moral influence among the shrinking Lithuanian-speaking population in East Prussia is unquestioned, and he has even made a name for himself on the other side of the Memelland, in the Kingdom of Lithuania, where his works are read and cited. Of course, he has garnered respect among German intellectuals as well, although his minority status and focus leaves him relatively unknown.\n\nStill, the news were met warmly in Berlin and with joy in Tilsit, and though his victory is not assured at all, merely taking Vydūnas into consideration is a significant accomplishment for the Prussian-Lithuanians. The only point of tension is the possible clash between him and the aristocratic Prussian establishment - a considerable portion of Vydūnas' works is dedicated to the conquest and colonisation of Prussia by the Teutonic Knights, and the destruction of local culture and way of life that this process caused. As not only Prussia, but arguably the Empire itself originates from the territories gained in the Ostsiedlung, this has gotten right-wing press to deride the poet as unpatriotic."
gerfla.28.a:0 "A laudable accomplishment for German literature!"
gerfla.28.b:0 "Let us push the Committee to consider more... patriotic authors."

gerfla.34.t:0 "'The History of Kashubia' Released" #KR4 Port
gerfla.34.d:0 "Aleksander Majkòwsczi — a leading figure in Towarzëstwò Młodokaszëbów (Young Kashubians Association) — has been working to release his project 'The History of Kashubia' in snippets for the 'Gryf' newspaper since 1922, and in book form since 1936, in reaction to 'Geschichte der Kaschuben' by Friedrich Lorentz. As Lorentz's book was perceived as a history of Germanisation in Kashubia, Majkòwsczi decided to highlight Kashubian nationality as Slavic by beginning his book with a short history of Slavic Nationalities. He perceived that Western Slavs, including Pomeranians and Kashubians, were influenced by Western Europe — with German as its main influence, strengthened by Germanisation. It was followed by a geographical overview of Kashubia, its local groups, and the historians of the nation. Later the book presented history from legends: through pagan culture, Polish Rule, the Duchy of Pomerelia under the local Sobiesławice dynasty, Teutonic Rule, renewed Polish Administration and finally Prussian Rule which lasts to present day.\n\nAleksander Majkòwsczi didn't live long enough to see his book published as he passed away earlier this year when it was being printed. A committee was formed, made up of his former colleagues, who decided to publish the book in his name alongside his novel 'Żëcé i przigòdë Remùsa'. Since release, the book was met with harsh criticism from the German Right, who call for banning the book, but has been lauded by Kashubian and liberal politicians."
gerfla.34.a:0 "Is his surname Majkowski or Majkòwsczi?"

gerfla.35.t:0 "Neither Sturmfest, nor Erdverwachsen" #KR4 Port
gerfla.35.d:0 "Prussia is a large realm and rules over many territories whose population is not too fond of their East Elbian overlords. While these opponents of Prussian rule can mostly be found in the distant periphery of the Empire, some of the most ardent regional patriots in fact do not live too far away from the capital — the Lower Saxons, who inhabit the Prussian Province of Hanover, the Duchy of Brunswick, the Principality of Schaumburg-Lippe and the Grand Duchy of Oldenburg. While similar to the Prussians in faith and dialect, they have a strong regional identity that reaches back thousands of years, and the Hanoverians have a deep disdain for the Prussians due to the annexation of their kingdom back in '66, manifested among others in the existence of the Guelph Party (DHP), whose main aim is the restoration of a sovereign Kingdom of Hanover within the Empire.\n\nLower Saxon patriotism however is not confined to the DHP, and this is shown most prominently in the Lower Saxon Homeland League. The oldest German regionalist movement, it evokes an even older image of the flat and marshy territories between Elbe and Ems, celebrating the medieval spirit of the Saxon Kingdom that bravely asserted itself against Romans, Franks and Staufers, and embraces illustrious leaders such as Arminius, Duke Widukind and Henry the Lion, famous scientists like Leibniz and Gauß, and acclaimed writers such as Hermann Löns, Wilhelm Busch and Hoffmann von Fallersleben.\n\nHowever, though local patriotism in the far northwest is strong, it never was enough to actively resist Prussian rule, as petty rivalries have plagued the Lower Saxon movement for decades. The official 'Song of the Lower Saxons' does not even include the lands west of the Weser. A protestant Harzer does not have much in common with a catholic Emslander, and the Oldenburgers are so proud of their Grand Duchy that they keep a certain distance to their 'brethren' on the other side of the border. Annually, the Homeland League convenes the so-called 'Lower Saxon Day' to foster local identity and celebrate their 'common' history, but one thing is certain - as long as the Prussians control most of the region, the Lower Saxons will remain a spiritually divided people."
gerfla.35.a:0 "As long as they squabble, they will remain under the Prussian boot, simple as that!"

gerfla.36.t:0 "An Imperial Anthem?"
gerfla.36.d:0 "In 1795, the French First Republic was the first nation to adopt a national anthem of La Marseillaise, as a modern interpretation of the royal anthems of the continental monarchies. Now a ubiquitous symbol of nationhood, Germany is a rare global power yet to declare an official anthem.  A de facto royal anthem, Heil dir im Siegerkranz, has been in place since 1795 passed down from the kingdom of Prussia. Despite this history it lacks popular support due to the melody of the hymn being derived from the British "God Save the King" and it lacking a connection to the southern German states.\n\nTo strengthen the national identity through song the chancellor now seeks to define an anthem to represent Germany united in the modern era. \"Heil dir im Siegerkranz\" remains an option to reassert, but the Henzollern anthem may fail to unite a people. \"Lied der Deutschen\", penned in 1841 by August Heinrich Hoffmann von Fallersleben, instead calls for unity in an age when Germany was splintered into quarreling states. Its verses are undeniably built on the liberal ideals of 1848 but it - in implementation - would anchor the Empire to the aspirations of unity, law, and a shared national destiny. If we would instead base our foundations on martial skill, \"Die Wacht am Rhein\", born in 1840 amid fears of French aggression along the Rhine frontier, fits perfectly. Its lyrics have been sung by volunteers and veterans alike, and it sanctified the Rhine as the sacred boundary of German honor would rally the nation against French revanchist claims. Finally, \"Des Deutschen Vaterland\", is an earlier patriotic hymn of Ernst Moritz Arndt. Written during the Napoleonic Wars it demanded to know what is the German’s fatherland, answered by wherever the German tongue rings true. It was a song of awakening against foreign domination, of Romantic nationalism and cultural unity before political unity was conceivable. However, its explicit mention of involving Austria could prove controversial.\n\nDespite this all remains a final, radical possibility: that the Empire, secure in its strength, requires no anthem at all to define it. Such a decision would defy the revolution that birthed such a concept and protect the status of tradition against modernity."
gerfla.36.a:0 "Heil dir im Siegerkranz"
gerfla.36.b:0 "Lied der Deutschen"
gerfla.36.c:0 "Die Wacht am Rhein"
gerfla.36.e:0 "Des Deutschen Vaterland"
gerfla.36.f:0 "No anthem"

gerfla.37.t:0 "Kronprinz Wilhelm Inaugurates the Reichsliga"
gerfla.37.d:0 "Although football had to struggle initially against more elitist sports, having its origins in Britain and being brought into the Rhineland by merchants in the nineteenth century and thus even being called the ‘English Disease’, it quickly began establishing itself as the most popular sport in Germany. There is no better example of this rise than the support it has garnered from the Crown Prince Wilhelm himself, who not only helped establish the Kronprinzenpokal as the only national cup competition for regionally dominant teams, but also graced the BFC Preussen team with his own name when it was established as the BFC Friedrich Wilhelm in 1894.\n\nDespite this popularity, there still remained a crucial problem that needed to be addressed. The Deutscher Fußball-Bund (German Football Association) was hesitant to create an Empire-wide league that could serve as the place of ‘battle’ for the most accomplished and skilled players, instead relegating them to only play each other occasionally during the Crown Prince Cup while the rest of their matches involved weaker teams from regional associations.\n\nIn recent years, however, great strides were made to mitigate this situation, with the previous president of the DFB, Gottfried Hinze, being replaced on Prince Wilhelm’s behalf. In his place was installed Josef Herberger, a promising young player, coach and trainer who shared the Kronprinz’s vision of reforming the league system.\n\nTheir efforts culminated today with the announcement of the foundation of the Reichsliga, the first-ever nationwide league for the German Empire. In an inaugural speech Crown Prince Wilhelm proclaimed that the best teams of our nation will finally be able to compete with each other on a regular basis, ensuring more excitement for their fans while also improving the abilities of players called up for the national team. President Sepp Herberger, in a proclamation that followed, assured the press that the Reichsliga was merely the first step on a grander road towards reforming the German league system."
gerfla.37.a:0 "Jawohl! Tor!"

gerfla.43.t:0 "Bodybuilders Tour the Weltreich"
gerfla.43.d:0 ""
gerfla.43.a:0 ""

gerfla.44.t:0 "The Helgoland Mass Murders Incident"
gerfla.44.d:0 "Ongoing land reclamation around Helgoland and Düne has been progressing well, with many famed noble houses invited to enjoy the local amenities during brief pauses in the project. Düne's newest addition, a beautiful Wilhelmine manor funded by a prestigious Prussian dynasty, has furthered upper society interest. However, a recent string of grisly events has stained the island in a way that even our construction workers are threatening to leave for the mainland.\n\nDuring a storm that cut Düne off for several days, unfortunately when our entire workforce was absent, the aforementioned dynasty had been holding a conference to discuss their assets and further investment into Helgoland. As the isle has no permanent inhabitants, the family and their servants were the only ones there. At some point during the two day storm, a blood-soaked massacre must have unfolded, as investigators that later came to the estate had found none of the nobility nor their entourage were still alive. Alongside this bewildering slaughter we have also uncovered a grand conspiracy, as the family's patriarch was rumored to have hidden his secret cache of gold on Düne for safekeeping. Eyewitnesses, be they survivors or the perpetrator, are yet to be identified. Thus, any semblance of justice for the murdered eighteen seems like a distant hope. Regardless, many are quick to think the motive of this illusive killer was simple greed.\n\nThe police are convinced that no one could have possibly come onto the island before the family did nor while the storm was ongoing, and so all are left scratching their heads looking for possible leads. The investigation has been hampered by seemingly contradictory pieces of evidence and "impossibilities" in what must have transpired. Even now, a proper timeline of events has yet to be constructed. Wild claims of the hidden gold has brought much of the police force tasked with solving the mystery into self-serving searches, and many of our lead detectives are growing pessimistic that any true resolution can be obtained.\n\nThe murders have sparked superstitious talk of ghosts, spirits, and even a witch roaming near the cliffs, that has put a pause on our expansion of the archipelago. Foremen who have succumbed to the same hysterics as their workers have been fired, and their replacements are going through the slow process of setting everything back in order. Even after the sitution is resolved, no matter the conclusion of the investigation, a grim mistery is bound to hang over Helgoland for years."
gerfla.44.a:0 "A slaughter at this scale, all for gold?"

gerfla.45.t:0 "The Witch of Düne"
gerfla.45.d:0 "The mystery of the massacre at Düne has become convoluted further after a Hanoverian fisherman had recently discovered a message in a bottle on the beach. Included in the sealed text is a supposed retelling of the mass murders with elaborate descriptions of esoteric occurrences and inexplicable ways in which the crime was committed. Ultimately, the message professes that a "witch", bearing the likeness of a portrait in the family's manor, is the true culprit.\n\nInitially this occult reconstruction of the incident was laughed off in the local press and never reached national news, but a subsequent announcement from the police caused this enchanted explanation to take the country by storm. State detectives, aching after a year of little progress and sensing hope in independent sleuths, declared that they found a similar manuscript during the initial investigation. This second message details a completely different sequence of fantastical events, but still condemns a "witch" as the murderer.\n\nMany among the Empire's nobility are decrying the messages as "baseless detective fiction" that takes advantage of a terrible tragedy, but this has not stopped a seemingly endless amount of theories and conspiracies from being produced. Intellectuals, workers, and even some politicians have tried to solve the riddle of this peculiar crime; with the search for the culprit becoming something of a national competition as the months go by."
gerfla.45.a:0 "We seem further from the truth than ever before."

gerfla.200.t:0 "Readying the Zeppelin Airfleets for War"
gerfla.200.d:0 "The pursuit of technological progress waits for no man, and with war in the air, innovation is as common as the anticipation and emotion that drives it, driving the Kaiserreich, and more specifically our military industry, into overdrive. One such recent benefit from this inspirational flash, though also aided by the Kaiser’s fascination with having his dreamed large navy be realized among the heavens, is the revitalization of the rigid airship program. First started by Graf Ferdinand von Zeppelin and his ‘Luftschiffbau Zeppelin’ company, the German obsession with dirigibles has only grown deeper. Since the Great War ended, the need for militarized zeppelins dropped to a secondary concern as focus was shifted to DELAG - the world’s first commercial airline - in order to cash in on the post-war economic boom. Initially centered around zeppelin airports in Berlin and Friedrichshafen, DELAG has since set up new hubs in cities all across not just Germany but the wider Kaiserreich and Reichspakt at large in an attempt to connect the world for the good of good of Germany and humanity through globalism, and the not-so subtle spread of German soft power. However, with war once again looming on the horizon, we must ready the airfleet for conflict once again.\n\nAlthough the DELAG service shall continue to run unhindered, funds from other areas shall be diverted to the expansion and conversion of Luftschiffbau Zeppelin’s manufacturing capabilities so that we can expand our military airfleet of zeppelins before it is too late, for building them and sourcing the helium needed for them from our trade partners in America, North Africa, and Eastern Europe shall take some time. Until new models can be developed, we shall largely be producing the Hindenburg-class - the largest of its kind currently in existence, for now - with the aging Graf Zeppelin II airship serving as the command ship of the airfleet. Using tactics perfected by zeppelin commanders like Peter Strasser and Hugo Eckener guiding us and our new air crews that are entering training, we shall build the greatest air force the world has ever seen!"
gerfla.200.a:0 "We shall make von Zeppelin proud as we take to the air in greater numbers than ever before."

gerfla.201.t:0 "The Dawn of the Age of the New Valkyries"
gerfla.201.d:0 "Fueled by patriotic inspiration and constant helium shipments from our allies and suppliers abroad in places like America, Eastern Europe, and Northern Africa, our brightest minds within the Kaiser Wilhelm Society have been able to create something truly awe-inspiring as part of our latest advancements within the Kaiserwaffe program. Nicknamed the ‘super zeppelin’, these Kaiser Wilhelm-class airships are the largest ever built, dwarfing even the Hindenburg-class line that shocked the world with their immense bulk just about two decades ago. Capable of not only high-altitude bombing missions, recon/supply runs, and cruise line service as current zeppelins are as well, these new super zeppelins are also capable of minor modularization, allowing them to be re-outfitted and re-configured to fit a variety of other combat roles as needed, such as running close-air support or tackling naval targets. With these great flying beasts of war, we have become like the Valkyries themselves, riding forth on mighty winged steeds ready to bring righteous ruination and justice to our foes, so let us do this great Germanic legacy proud by using these new wonder weapons to the best of our ability and their immense potential."
gerfla.201.a:0 "We shall skim the heavens with these mightiest of creations."

gerfla.202.t:0 "Kaiser-class Reporting"
gerfla.202.d:0 "Thanks to the neverending generosity of our benefactors and allies in Berlin, we have just received a shipment of a pair of Zeppelins, possibly to reward us for our loyal service as they try to empower and strengthen the military of their allies and subjects, or maybe they are just more outdated models shifted to us as they make room in their airfleet for their newest models and designs. Whatever the case may be, we have these marvels of air travel and warfare now at our disposal, with many within our administration eager to set up air travel services with the rest of the empire by tapping into Germany’s DELAG - the first airline in the world. Utilizing strategies, tactics, plans, and operating manuals penned by Germany’s brightest zeppelin commanders like Hugo Eckener and Peter Strasser along with their complementary training liaison, we shall also focus on military matters, fast tracking new air crews to let us use these new wonders of modern technology to their maximum potential in both commercial and militaristic endeavors. Now we just need to hope we can source the gasses - hopefully helium - needed to give them lift, for only a fool would resort to something more flammable like hydrogen...right? "
gerfla.202.a:0 "Helium mix optimal, bombardiers, to your stations!"

gerfla.203.t:0 "Airship Ready"
gerfla.203.d:0 "Based on the original German and American designs from the 1890s, along with designs that they and old France, Italy, and England made during the Great War, we have developed the first pair of our own modernized rigid airships, aka dirigibles or Zeppelins, for use in both commercial and wartime applications. Seeking to emulate the success of Germany’s DELAG service - the first airline in the world - in order to better connect our nation both to itself and the outside world, while also seeking to surpass the awe-inspiring terror and destruction wrought by the bomb bays of German zeppelins during the Great War, we shall begin limited production of these floating behemoths, so long as we can source the gasses - hopefully helium - needed to give them lift, for only a fool would resort to something more flammable like hydrogen...right?"
gerfla.203.a:0 "Helium mix optimal, bombing bays ready!"


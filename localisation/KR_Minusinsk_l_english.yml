### Decisions ###

KHA_join_siberia: "Join [FROM.GetLeader]'s Siberia"
KHA_join_cossacks: "Unite with [FROM.GetAdjective] Cossacks"

KHA_proclaim_hongorai: "Proclaim the State of Hongorai"

### Focuses ###

KHA_The_Cossack_State: "Yenisei Cossack State"
KHA_The_Cossack_State_desc: "With the victory over Sotnikovites, we can finally proclaim the temporary independence of our Yenisei-Khakass statehood."
KHA_Unite_Yenisey_Cossacks: "Deal with the Sotnikovite Split"
KHA_Unite_Yenisey_Cossacks_desc: "Despite the majority of Cossacks and Khakass support Ataman Solovyov, there are still those who challenge his leadership among the Sotnikovite-leaning generals. They leave country for Russia and are sure to return - with weapons in their hands."
KHA_Consolidate_Steppe_Dumas_And_Cossack_Circles: "Steppe Dumas and Cossack Circles"
KHA_Consolidate_Steppe_Dumas_And_Cossack_Circles_desc: "We must consolidate our coalition government, consisting of Yenisei Cossacks and the leaders of the Khakass national movement."
KHA_Martial_Law: "Military Field Courts"
KHA_Martial_Law_desc: "We are never safe - we have to transfer the judicial and executive power to the military field courts and Commandants appointed by Ataman Solovyov personally."

KHA_Learn_From_Don: "Learn from Krasnov's Almighty Don"
KHA_Learn_From_Don_desc: "Ataman Krasnov's Cossack state in the Don region is one of the best examples of how a statehood of our nations must be organized. With the adoption of a set of basic laws, similar to the Almighty Don's Constitution, we will further consolidate our regime and build a framework of effective Cossack governance."
KHA_Seek_Semyonovs_Experience: "Experience of the Semyonov Frontier"
KHA_Seek_Semyonovs_Experience_desc: "Unlike Krasnov's Don the Far-Eastern Cossack Hosts under Ataman Semyonov are examples of a true frontier - sometimes lawless and wild, but with loyalty to Ataman and discipline, based on informal ties."
KHA_Rely_On_Orthodoxy_And_Shamanism: "Rely on Orthodoxy and Shamanism"
KHA_Rely_On_Orthodoxy_And_Shamanism_desc: "While many of the Khakass people are Orthodox, traditional beliefs of this people, such as Shamanism or Tengri, must be respected. Ataman Solovyov shall proclaim the religious tolerance and establishment of the Council of Shamanic Seances, though still providing support for the Cossack Orthodoxy."
KHA_Line_Production_Of_Yermakovka: "Line-Production of Yermakovkas"
KHA_Line_Production_Of_Yermakovka_desc: "We are lacking good textile industry and traditional clothes of our officers are starting to wear out. If we manage to line-produce new Yermakovkas, we will increase our Host's spirit and morale."

KHA_Cossackization_Of_Khakas: "Cossackization of the Khakass"
KHA_Cossackization_Of_Khakas_desc: "Ataman believes that we should begin to massively recruit loyal Khakass seoks into the Cossacks. Entire villages will receive the official status of Cossack stanitsas, and their horsemen receive the titles of uryadniks and khorunzhiys."
KHA_Younger_Brothers_In_Arms: "Younger Brothers in Arms"
KHA_Younger_Brothers_In_Arms_desc: "We must grant limited cultural autonomy to the Khakass people and allow Maynagashev to continue his enlightening work and open schools, though we shall closely look if these activities are not separatist."
KHA_Cult_Of_Military_Prowess: "The Cult of Military Prowess"
KHA_Cult_Of_Military_Prowess_desc: "The Cavalry shall become the elite of our army, as Ataman will personally award St. George Crosses to steppe commanders, to raise the prestige of military service among the indigenous population."

KHA_Join_The_UCH: "Seek Unification with Other Cossacks"
KHA_Join_The_UCH_desc: "The Russian state has failed - and the Cossacks will now lead it. By establishing ties with other Cossack states and autonomies we will guarantee survival of our nation."
KHA_Demand_Recognition_From_Russia: "Recognize Russian Leadership"
KHA_Demand_Recognition_From_Russia_desc: "We must seek protection from the friendy Russian state and join them with the guarantees of our autonomy."

# Army Tree #
KHA_General_Mobilization: "Announce General Mobilization"
KHA_General_Mobilization_desc: "We are in dangerous position and our Host has no other choice but to conscript the entire male Cossack and peasant population, capable of carrying weapons."
KHA_Regular_Khakas_Detachments: "Regular Khakass Divisions"
KHA_Regular_Khakas_Detachments_desc: "In our state we must form the separate Khakass mounted detachments, using the experience and legacy of historical Native Divisions, while preserving their national identity."
KHA_Flying_Detachments: "Cavalry 'Flying' Detachments"
KHA_Flying_Detachments_desc: "In order to survive, our detachments must consist of highly mobile horsemen, capable of making crossing of up to 80 kilometers per day off-road."
KHA_Mobile_Warfare_Steppe_Taiga: "Steppe and Taiga Maneuver Warfare"
KHA_Mobile_Warfare_Steppe_Taiga_desc: "The tactics during the Russian Civil War proved themselves: we must carry out attacks rapidly in the steppe and forest zones with instand withdrawal to the mountain defiles, where enemies lose the advantage."
KHA_Fortify_Mountain_Passes: "Fortify the Mountain Passes"
KHA_Fortify_Mountain_Passes_desc: "Strengthening of key mountain passes in the Sayan Mountains and Kuznetsk Alatau is necessary to protect our borders from external invasion."
KHA_Secret_Weapon_Caches: "Secret Equipment Caches"
KHA_Secret_Weapon_Caches_desc: "In order for our units to operate autonomously for months, we should disperse the stocks of weapons, food, and fodder into dozens of hidden forest huts."

KHA_Light_Cavalry_And_Frontier_Patrols: "Light Cavalry and Frontier Patrols"
KHA_Light_Cavalry_And_Frontier_Patrols_desc: "In our common struggle, the Khakass people should be given main roles in light cavalry, recon and frontier patrols in the Taiga."
KHA_Artillery_Engineer: "Cossack Artillery and Engineer Troops"
KHA_Artillery_Engineer_desc: "While we try to divide the defensive roles, the Cossacks must be responsible for artillery, engineer detachments and garrisons."

KHA_Trade_Transit: "Establish Trade Routes to China"
KHA_Trade_Transit_desc: "If we manage to open secure trade corridors through Tuva to Mongolia and China for the purchase of weapons and medicines in exchange for Siberian raw materials, we will efficiently support our Host."


# Economy Tree #
KHA_Tribal_Pastures_For_Supplies: "Tribal Pastures for Supplies"
KHA_Tribal_Pastures_For_Supplies_desc: "We must find a land compromise, destroyed by previous decades - officially recognize the Khakass' rights for their tribal pasture in exchange for food supplies to the Host."
KHA_Tax_Grain_Cattle_Furs: "Taxes on Grain, Cattle and Furs"
KHA_Tax_Grain_Cattle_Furs_desc: "The era of requisitions destroyed both trust and economy of the local Khakass people. We must install a fixed and understanable tax on grain, cattle and furs."
KHA_Introduce_Fur_Dependent_Money: "Introduce Fur-Backed Currency"
KHA_Introduce_Fur_Dependent_Money_desc: "In order to control the economy, we must introduce temporary regional money - Solovyov chens - backed by the furs."

KHA_Protect_The_Pastures: "Protect the Pasture Lands"
KHA_Protect_The_Pastures_desc: "We must introduce a strict ban on the uncontrolled resettlements and plowing of the original Khakass pastures and limit the alien peasantry."
KHA_Cooperative_Cattle_Breeding: "Cooperative Cattle Breeding"
KHA_Cooperative_Cattle_Breeding_desc: "The traditional nomadic farming must transform into modern procurement cooperatives for the centralized sale of meat, wool and skins to Cossack towns and for export."
KHA_Subsurface_Concessions: "Subsurface Concessions"
KHA_Subsurface_Concessions_desc: "The state must retain control over the gold mines with the involvement of Cossack guards, but the Khakass people must be the beneficiaries of the rent."




KHA_The_Khakas_State: "State of the Khakass People"
KHA_The_Khakas_State_desc: "The fate has given us an opportunity to restart the Khakass national movement and proclaim independence of our own national state. While we still have to rely on Yenisei Cossacks as the main military power in the region, the civilian government is entirely in our hands."
KHA_Council_Of_Elders_And_Cossack_Circle: "Council of Elders and the Military Circle"
KHA_Council_Of_Elders_And_Cossack_Circle_desc: "The Khakass National Congress must be transformed from periodic congresses into a permanent supreme legislative body and a bicamerial parliament. As envisioned by Maynagashev and Solovyov, it would be divided into the Council of Elders (the Khakass Chamber), which would manage local Uluses based on the Steppe laws, and the Cossack chamber - the Military Circle - which would be responsible for stanitsas and general defence capabilities."
KHA_Two_Atamans_Of_One_State: "The Chairman and the Ataman"
KHA_Two_Atamans_Of_One_State_desc: "While we are weak, we have to find compromises - not only in legislation, but also in leadership itself. As our state establishes its young institutes, the Chairman of National Council, Stepan Maynagashev would be responsible only for civilian, judicial and cultural sphers, while the Military Ataman, Ivan Solovyov, would guarantee the military sphere."

KHA_Reform_Shamanism: "Reform Khakass Shamanism"
KHA_Reform_Shamanism_desc: "The traditional beliefs of the Khakass were long in the underground, since the Imperial times. We will legalize and reform it, create an official Council of Shamanic Seances, similar to the Buddhist structures in Buryat-Mongolia in order to regulate religious life and prevent radicalism."
KHA_Nomad_Schools: "Nomadic Primary and Evening Schools"
KHA_Nomad_Schools_desc: "The illiteracy is still present among the Khakass people, so to eliminate it we must introduce compulsory primary education. Maynagashev insists on opening a network of nomadic schools for children of pastoralists and evening schools for adults."
KHA_Create_The_National_Intelligentsia: "Create the National Khakass Intelligentsia"
KHA_Create_The_National_Intelligentsia_desc: "The Supreme Starosta has ordered to establish the Khakass Pedagogical College in Askiz and also begin the standardization of the language: the approval of a unified literary Khakass language based on the Sagai and Kachin dialects for use in government agencies and the press. This would also require creation of Khakass printing houses and folklore collections."
KHA_Liquidate_Seok_Division: "Liquidate the Seok Division"
KHA_Liquidate_Seok_Division_desc: "We must move towards the gradual abandonment of divisions based on seoks (clans) and the transition to territorial-volost division. This would help us destroy the cronyism and nepotism that hinders public administration."
KHA_Integrate_Cossack_Lands: "Canton-Based System of Cossack Lands"
KHA_Integrate_Cossack_Lands_desc: "The territories of the Yenisei Cossack Host should be included into the civil administration system as special military districts (cantons) while maintaining their internal self-government."

KHA_Join_The_Oirot_Republic: "Restore Great Oirotia"
KHA_Join_The_Oirot_Republic_desc: "We must seek unifying the region under our control in order to create a buffer state between Russia and China and secure our place under the sun."
KHA_Legacy_Of_Hongorai: "Legacy of Hongorai"
KHA_Legacy_Of_Hongorai_desc: "Our history comes from the Yenisei Kyrgyz and their ancestal land - the great Hongorai. As our neighbors keep fighting, we must save our people from this great power chaos and instead safeguard our independence for centuries to come."
KHA_Join_Free_Siberia: "Join Free Siberia"
KHA_Join_Free_Siberia_desc: "We should start negotiations with the Siberian Regionalists to recognize the Khakass-Yenisei Autonomous Republic as part of the federation."


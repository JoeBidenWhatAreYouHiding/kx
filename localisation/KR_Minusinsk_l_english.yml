### Parties ###
KHA_totalist_party: "KZA"
KHA_totalist_party_long: "Krestyanskaya Zelyonaya Armiya\n§LPeasant Green Army§!"
KHA_syndicalist_party: "$KHA_totalist_party$"
KHA_syndicalist_party_long: "$KHA_totalist_party_long$"
KHA_radical_socialist_party: "Stepnaya Uprava"
KHA_radical_socialist_party_long: "Khakasskaya Stepnaya Uprava\n§LKhakas Steppe Administration§!\n§gThe Khakass people, the name they officially adopted on a special Congress in 1917, never received an autonomy they desired. At first, they were ruled by the Abakan Steppe Duma, an administrative institution of self-government, that was established for 'nomad Inorodtsy (non-Slavic subjects of the Empire)'. When the Revolution dissolved the Empire, the Abakan Zemstvo Administration was established instead, eventually transformed into Khakass Steppe Administration. Anyway, it still was just an executive organization, rather than a territorial and national autonomy the Khakass people desired. When the region was annexed into Mongolia, even such an organization was dissolved and now, thanks to the efforts of Ivan Solovyov, it was reintroduced. Led by Stepan Maynagashev, a respected leader of the Khakass people, the Administration is looking forward to finally achieving the autonomy for Khakassia.§!"
KHA_social_democrat_party: "$KHA_radical_socialist_party$" 
KHA_social_democrat_party_long: "$KHA_radical_socialist_party_long$"
KHA_social_liberal_party: "$KHA_radical_socialist_party$"
KHA_social_liberal_party_long: "$KHA_radical_socialist_party_long$"
KHA_market_liberal_party: "$KHA_radical_socialist_party$"
KHA_market_liberal_party_long: "$KHA_radical_socialist_party_long$"
KHA_social_conservative_party: "Kazachiy Krug"
KHA_social_conservative_party_long: "Kazachiy Krug\n§LCossack Circle§!\n§gThe Yenisei Cossack Host is one of the youngest on the territory of Russia, established as an administrative and military unit only in June 1917. Aleksandr Sotnikov was elected an Ataman of this Host and in the beginning of the 191 he led a cossack insurgency in Minusinsk and Krasnoyarsk. In 1925 the Yenisei Cossacks, similarly to the majority of Cossack Hosts in all of Russia, supported Admiral Kolchak, but eventually found themselves annexed into Ungern's Mongolia. While now the territory of Minusinsk is controlled by the Cossacks, there's an ongoing power struggle between the former Ataman, Aleksandr Sotnikov and the incumbent one, Ivan Solovyov. The outcome of this struggle will likely define the future of the Cossack Host.§!"
KHA_authoritarian_democrat_party: "$KHA_social_conservative_party$"
KHA_authoritarian_democrat_party_long: "$KHA_social_conservative_party_long$"
KHA_paternal_autocrat_party: "$KHA_social_conservative_party$"
KHA_paternal_autocrat_party_long: "$KHA_social_conservative_party_long$"
KHA_national_populist_party: "$KHA_social_conservative_party$"
KHA_national_populist_party_long: "$KHA_social_conservative_party_long$"

### Events ###
kha.1.t: "History of Khakassia"
kha.1.d: ""
kha.1.a: ""

kha.2.t: "Ataman Solovyov Declares Independence!"
kha.2.d: ""
kha.2.a: "Northern regions break away..."
kha.2.b: "The Mongol rule ends now. (Play as Minusinsk)"

kha.3.t: "Formation of the Khakass Steppe Administration"
kha.3.d: ""
kha.3.a: "Great!"

kha.4.t: "Aleksandr Sotnikov Confronts Solovyov"
kha.4.d: ""
kha.4.a: "Khakass stand up for Solovyov"
kha.4.b: "Solovyov is forced to flee Minusinsk."

kha.5.t: "Cossack-Khakass Victory Over Sotnikov"
kha.5.d: ""
kha.5.a: "Long live the Yenisei Cossack Host!"

kha.6.t: "Solovyov Supports the Steppe Administration"
kha.6.d: ""
kha.6.a: "Long live the state of Khakassia!"

kha.7.t: "Intervention in Minusinsk"
kha.7.d: ""
kha.7.a: "A small step towards uniting all of Russia."

kha.8.t: "[FROM.GetName] Invades Minusinsk!"
kha.8.d: ""
kha.8.a: "Russia starts to act..."

kha.9.t: "[FROM.GetName] Sends the Delegation"
kha.9.d: "The government of [FROM.GetCapital.GetCapitalVictoryPointName] under leadership of [FROM.GetLeader] has approached us in order to seek unification."
kha.9.a: "Reinstate our control over Yenisei!"
kha.9.b: "Instead, we shall crush them."

kha.10.t: "[FROM.GetLeader] Suggests Unification"
kha.10.a: "Of course!"
kha.10.b: "We don't need them."

kha.12.t: "Uprising of the Russian Peasant Settlers"
kha.12.d: "As the pastures, seized from the Khakass seoks by the new Russian settlers, were returned legislatively and officially to their true owners, thousands of Russian peasant farms were left without free land. The new settlers started to feel like 'second-class' citizens in our new state, where power is divided between the indigenous Khakass and the old-timer Cossacks. According to the rumors, the discontent is skillfully exploited by the underground NRA agents from Minusinsk and Achinsk, who supply peasants with weapons and slogans \"Land - to the peasants!\" and \"Down with Ataman!\".\n\nSome of the dissatisfied peasants already created several partisan detachments in Prysayanye taiga and declared war on both the \"Khakass bais" and the \"Cossack punishers\", cutting off grain supplies to Cossack stanitsas and Khakass villages in an attempt to cause famine.\n\nThe government must react now! Ataman Solovyov, on one hand, suggests a military response: harsh suppression tactics against the rebellious villages, using punitive cavalry raids, confiscation of horses and weapons and event taking hostages among the village Starostas. On the other hand, Chairman Maynagashev believes it would be better to split the rebels, offering a moderate part of the settlers monetary compensation for the lost lands, as well as guarantee them places in the local Zemstvo government in exchange for loyalty."
kha.12.a: "No time for compromise. Strike the rebels!"
kha.12.b: "Try to pay them off."

kha.13.t: "Conservative Cossacks Oppose Maynagashev"
kha.13.d: "Despite the fact that the Sotnikov's coup failed, the legalization of shamanism and the creation of the Council of Shamanic Seances provoked fierce protest from the Cossack clergy and deeply religious old-timers. Conservatives declared the reform the planting of paganism on the native Russian land and the betrayal of Christ. In addition, the creation of a coalition government also destroyed the centuries-old estate exclusivity of the Cossacks. In this situation, Ivan Solovyov found himself between a rock and a hard place. On the one hand, he himself is the bone of the bone and flesh of the flesh of the conservative Cossacks, on the other hand, he understands that without an alliance with the Khakass, his Host will instantly lose its rear, intelligence and food.\n\nNevertheless, the situation requires drastic measures. One option is to isolate the radicals, that is, to remove the old-regime colonels who demanded to \"squeeze the aliens\" from their staff positions and send them to the front line to fight our enemies in order to direct their ardor in a constructive direction. On the other hand, in order to prevent a civil war within the Host, tactical concessions with economic preferences can be made. Conservative Cossacks can be appeased with guaranteed government orders for the purchase of combat horses and bread for the needs of the army at inflated prices."
kha.13.a: "Isolate the radicals."
kha.13.b: "Pay off the conservative cossacks."

kha.14.t: "Restoration of Hongorai Under Aq-Qöbök Dynasty?"
kha.14.d: "With the restoration of Aq-Qöbök dynasty rule in [ALT.GetName], one of the smaller branches of the great Hyrgys seok (dynasty), advisors of Stepan Maynagashev ask whether we should unite with the [ALT.GetAdjective] brothers under the rule of [ALT.GetLeader]?"
kha.14.a: "Send a delegation to Boktor I."
kha.14.b: "No, we will build a democratic republican Hongorai!"

kha.16.t: "Boktor I Aq-Qöbök Arrives to [ROOT.Capital.GetCapitalVictoryPointName]"
kha.16.d: ""
kha.16.a: "Glory to our constitutional monarchy!"

kha.17.t: "Fate of [KHA.GetName]"
kha.17.d.intro: "The region of Kuznetsk Alatau and Yenisei was annexed into Mongolia in 1925 during the Mad Baron's Northern expedition to secure control over the Trans-Siberian railway. This region is populated by the local Turkic tribes of the Khakass people and the Yenisei Cossacks."
kha.17.d: "$alt.4.d.intro$\n\nWe must now decide what to do with these separatists. Our government does not currently seek war with them, as we are still weak, despite conquering this rump state will be less than a nuisance."
kha.17.d2: "$alt.4.d$ Instead, [MON.GetLeader] suggests to establish friendly ties with them. This will help us secure an ally in the region.\n\nOn contrary, some of the generals believe that this rump state would anyway be conquered by the awaking Russian bear, and thus restoring it to Mongolia would be safer."
kha.17.d3: "$alt.4.d.intro$\n\nHowever, [MON.GetLeader] believes that this rump state would anyway be conquered by the awaking Russian bear, and thus restoring it to Mongolia would be safer."
kha.17.a: "We must demand their submission!"
kha.17.b: "Try to establish ties with the local Khakass."
kha.17.c: "Just ignore them."

kha.18.t: "A Friendly Envoy From [FROM.GetLeader]"
kha.18.d: "The new government of Mongolia and their leader, [MON.GetLeader], has sent a friendly envoy to [ROOT.Capital.GetCapitalVictoryPointName] in order to establish ties between our nations. As we understand that the Mongolian occupation of [ROOT.GetNameDef] was only due to the Mad Baron's ambitions, perhaps re-establishing ties with our neighbors would be a great opportunity, especially if we manage to receive their protection from Russia."
kha.18.a: "Sure, we are neighbors."
kha.18.b: "We do not seek friendship with the Mongolian oppressors!"

kha.19.t: "[ROOT.GetAdjective] Envoy Sent Back!"
kha.19.d: "Unfortunately, the local leaders refused to establish ties with us."
kha.19.a: "Pathetic!"

### Ideas ###
KHA_land_crisis: "Agricultural Crisis"
KHA_land_crisis_desc: "The arrival of Russian settlers in the region resulted in the appropriation of many of the Khakass' traditional grazing lands by Russian peasant migrants, leaving the native population without access to rich agricultural resources and, in some opinions, without a sense of dignity. Despite the efforts of the Mad Baron to prevent unnecessary ethnic conflicts in the newly acquired northern territories, the situation of the Khakass seoks remains dire, and a land reform accompanied by guaranteed concessions for the indigenous population could potentially alleviate their plight."
KHA_land_crisis_1: "Protected Tribal Pastures"
KHA_land_crisis_2: "Land Compromise"
KHA_land_crisis_3: "Cooperative Farming"

KHA_khakas_resistance: "Khakas Seoks' Resistance"
KHA_khakas_resistance_3: "Khakas Cossack Host"
KHA_peasant_unrest: "Peasant Unrest"

KHA_khakas_national_movement: "Khakass National Movement"

KHA_cossack_split: "Split Among the Cossacks"
KHA_cossack_split_desc: "The establishment of the Yenisei Cossack Army in 1917 saw the emergence of Ataman Sotnikov as its leader, but it was Ataman Solovyov's partisan detachment that wielded real power on the ground, successfully defeating Bolshevik resistance during the tumultuous Civil War. Despite Sotnikov's support for the Kolchak coup in 1925, the Yenisei lands ultimately fell under the expanding influence of Baron Ungern, forcing Sotnikov into submission.\nFollowing the declaration of Minusinsk's independence, Ataman Solovyov assumed leadership in a coalition with local Khakass intellectuals, causing significant discontent among Sotnikov and his clique."
KHA_cossack_split_1: "Remants of the Sotnikovites"
KHA_cossack_split_1_desc: "While Ataman Sotnikov was arrested, some of the conservative Cossacks still support him and are unwilling to subordinate."

KHA_cossack_state: "Cossack State"

KHA_national_guard: "National Guard"
KHA_weapon_caches_modifier: "Weapon Caches"

KHA_kuznetsk_alatau_gold: "Gold of the Kuznetsk Alatau"

KHA_chernogorsk_mines: "Company of Chernogorsk Mines"
KHA_chernogorsk_mines_desc: "Industrial development of Minusinsk hollow began thanks to the Balandin family of merchants (in particular, entrepreneur Vera Balandina). The Company of Chernogorsk Mines was created in 1907, which became the locomotive of the local economy since then."


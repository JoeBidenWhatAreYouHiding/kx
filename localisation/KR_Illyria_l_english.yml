### Leader Descs ###

CRO_STJEPAN_RADIC_DESC:0 "A Croat liberal, Stjepan Radić has always been fighting for Croatia, and now that the Croats are in charge of Illyria, Illyria. Always having supported Croatian autonomy, in the 1927 Ausgleich, which formed the Kingdom of Illyria, Radić fervently supported the creation of Illyria, as a way to cement Croatia's place in the Balkans. Having famously said not to "rush like drunken geese into the fog" as a way to convince his fellow Croats that it wasn't just a way for Austria and Hungary to keep dominion over Croatia. The Croat delegates then finally accepted the Ausgleich, and Bosnia, Montenegro, Dalmatia, and Croatia-Slavonia were merged to form the Kingdom of Illyria, as a separate entity of the Austro-Hungarian empire, with Radić at its head."
CRO_SVETOZAR_PRIBICEVIC_DESC:0 "A member of the Croato-Serbian Coalition, Svetozar Pribićević supports the creation of a pan-Slavic state that will finally unite the Slavs into a single political entity. He has always opposed Austrian influence, and clamors for Illyrian independence and the absorption of Slovenia and the Littoral into Illyria. Austria has always eyed the HSK with suspicion, and it is no different now. Pribićević aspires for an independent Illyria, as do his more radical followers in the HSK. Pribićević's ambitions may bear fruition soon, with the rising threat of war for Austria, and the Empire stands on a seesaw, ready to tip either towards success or collapse."
CRO_JOSIP_TITO_DESC:0 "Born on 7 May 1892, Josip \"Tito\" Broz, leader of the Social Democratic Party of Croatia and Slavonia, is one of the leading Austromarxists within Illyria. Despite his syndicalist sympathies, Broz has proven to be one of the leading politicians within Illyria and the Austromarxist scene. Having fought in both the Weltkrieg and South Slavic Revolts, Broz first gained notoriety by becoming the youngest sergeant major in the entire Common Army at age 22. Having fought in the Serbian Front and Galician Front during the Weltkrieg. However, Broz would captured by the Russians and sent to a work camp in the Urals. During his stay, Broz had managed and worked on several areas of the Trans-Siberian Railway before meeting a Boshevik during the Russian Revolution and managed to board a train to Petrograd just in time for the July Days. Escaping the carnage by fleeing to Finland before returning to Austria-Hungary by 1918. By the time of his return Broz had become somewhat famous among the then Croatian-Slavonian Domobranstvo for his leadership abilities by the end of the Weltkrieg in 1921. However, what propelled Broz to the empire wide scene was the South Slavic Revolts. Despite being a native Croatian, Broz became famous by his championship of his fierce loyalty to the empire and emperor Karl I, eventually forming the modern Kaisertreuen Ideals that Broz would preach to the recently established Kingdom of Illyria. Broz's efforts had caused him to be voted leader of the Social Democratic Party of Croatia and Slavonia which he still leads to this day."
CRO_IVO_PILLAR_DESC:0 ""
CRO_ANTE_PAVELIC_DESC:0 ""

###Ideas###

ILL_croatian_command:0 "Croatian Officers"
ILL_croatian_command_desc:0 "The Croatian people fought to make an Illyria free of Austria a reality, while the rest of the so called Illyrians hid in their cities and did nothing. It is for this reason that we must restrict all officer positions to Croatians at the cost of alienating the rest of our countrymen."

ILL_federated_army:0 "United Officer Corp"
ILL_federated_army_desc:0 "Despite all odds, we have managed to win against all who sought to destroy our fledgling nation, but there is much still left to do. All the military officers of Illyria must be pooled into a single and united Illyrian Officer Corp."

CRO_SLOintegration:0 "Slovenian Integration"
CRO_SLOintegration_desc:0 "While we share much with our Slovenian brothers, the cost of integrating the region's administration and anger from within certain segments of the Slovenian population which minimize Slovene ties to our people have become a substantial burden."


CRO_for_illyria:0 "Fighting for Illyria!"
CRO_for_illyria_desc:0 "We are fighting for all of Illyria, against the Austrian tyrant!"

CRO_bosnian_guerillas:0 "Bosnian Guerilla Issue"

CRO_guerilla_war:0 "Fighting for Bosnia!"
CRO_guerilla_war_desc:0 "We are fighting for Bosnian self-determination from Croatian tyranny!"

CRO_rampant_corruption:0 "Legacy of the South Slavic Revolts"
CRO_rampant_corruption_desc:0 ""

CRO_ethnic_clashes:0 "Ethnic Clashes"
CRO_ethnic_clashes_desc:0 "Illyria is a multiethnic nation. In the Balkans. Obviously, these two things together mean trouble. While many of the Southern Slavs support our government and exist peacefully together, another many clash and fight for the attention of Illyria. Being a Croat-led nation, the Croatians obviously get most of this attention, which angers the Bosnians, Montenegrins, Serbs, and Slovenians. To totally rid Illyria of ethnic violence that plagues it today, we must figure out a way to fairly balance all of the people, in a fair government."

CRO_ethnic_clashes_5bw:0 "Fires Upon the Dinarides"
CRO_ethnic_clashes_5bw_desc:0 "Illyria is a multiethnic nation. In the Balkans. Obviously, these two things together mean trouble. And now, with the [BOTDE_Get_Current_Balkan_War] raging in in country, ethnic violence has reached a peak not seen since the South Slavic Revolts of nearly 20 years prior. While the remaining minorities have banded together in a fragile alliance, it has caused many desertions in the [CRO.GetAdjective] army to the [SER.GetAdjective] army."


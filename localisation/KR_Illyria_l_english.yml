CRO_croatian_command:0 "Croatian Domobranstvo"
CRO_croatian_command_desc:0 "Initally a part of the Hungarian Army, the Domobranstvo was made the main army branch of [CRO.GetNameDef] with the formation of Illyria. Due to the Croatian loyalty to the Habsburg empire during the South Slavic Revolts, Croats are heavily favored in the imperial chambers and as such make up most of the general staff and officers in the Domobranstvo."

CRO_represented_armies:0 "Domobranstvo of the Kaisertreuen"
CRO_represented_armies_desc:0 "The Illyrian Royal Home Guard, or Domobranstvo, has been reformed into a fighting force of all the peoples that reside in it. Despite previous Croat domination, a series of reforms and promotion of the Kaisertreuen idea that former officers such as Josip Broz have championed as created a stronger, faster, and united Domobranstvo."


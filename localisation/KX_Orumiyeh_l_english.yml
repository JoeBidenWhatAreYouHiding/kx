### Scripted Localisation ###


### Ideas ###
ORM_haydar_khan_leadership:0 "The Middle Man Of Orumiyeh"
ORM_haydar_khan_leadership_desc:0 "If there was one man who could claim to be the father of Orumiyeh and its ideals, it would be Haydar Khan Amo-oghli. Even before his arrival to Iran more than thirty years ago, he was already a fervent socialist, and his efforts during the Constitutional Revolution and the Tajziyeh thereafter only cemented his legacy as a leading figure in the left-wing political sphere of Iran. However, what seperates him from his more radical Syndicalist and Bolshevik counterparts is his ability to sympathise and compromise with figures ideologically opposed to him. First, it was the radical Democrats under Taqizadeh, who is by no means a fervent socialist. Then it was the Azeri nationalists, to whom he won over using his background living and working in the Caucasus region. Soon enough, the other communists and nationalists would seek his presence in negotiations held during the formative years of the republic. \n\nIt is no surprise then that he was elected as the first and current head of Orumieyh's government, with the approval of President Taqizadeh. However, his vast network of different allies, however beneficial, have enabled whispers of his treachery and two-faced nature. Hopefully, this will not come to bite him in the back as Orumiyeh plans to move forward."

ORM_political_instability:0 "Political Instability"
ORM_political_instability_desc:0 "Orumiyeh is not only a melting pot of cultures and identities but also of politics. Here we are free of the malaise of moderate politics that only seeks to placate the liberation of the people of Iran, but what replaces that is still a matter heavily contested. Every major left-wing faction have found solace amongst us, and so too have the more nationalist radicals, capitalising on the precedence set in the Democratic Manifesto, the nation's foundational text. The price of inspiring such liberal radicalism is of course, that these forces will inevitably clash much harder against one another. Taqizadeh's own party, ironically, is seen as the moderate choice compared to the myriad of leftists, nationalists, and even Pan-Turkists which participate openly. Although these movements grew rather slowly at first due to the devastation we had faced with the Tajziyeh, they have seen an explosion in popularity, particularly amongst the youth. As so, more reports of violent clashes have come through in the last year especially, and Taqizadeh's adminstration has been viewed with far more scrutiny than ever before. If the state of things continue like this, it will surely lead into internal turmoil."


ORM_fragile_coalition:0 "Fragile Coalition"
ORM_fragile_coalition_desc:0 "Currently, the Iran Labour Party led by Hassan Taqizadeh has the biggest political majority within the country, though their popularity and influence has slowly waned over the years. Unlike the other fundamentalist radicals of Orumiyeh, however, Taqizadeh is not afraid of making alliances with the smaller parties and factions which have formed since the republic's founding, even if they may share more conservative opinions that his cabinet personally disagrees with. This loose coalitions mostly consists of the non-socialist intellectuals, the merchant class, and perhaps the most endangered group in Orumiyeh, the clerics, of whom Taqizadeh skillfully appease through his own experience as a once-qualified cleric. Despite this, the coalition is still shakey, especially as external pressures from groups outside this alliance attempt to break it apart for their own means."


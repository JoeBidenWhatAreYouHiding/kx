orumiyeh.1.t:0 "The Republic of Orumiyeh, 1936"
orumiyeh.1.d:0 "The Republic of Orumiyeh is not just a rebellious state. It is a manifestation of the people's demand for change. Founded ten years ago in Tabriz by a broad coalition of socialists, ethno-nationalists, and radical democrats, Orumiyeh has grown from a safehaven for the politically fringe to a true contender on the regional stage. The name of this new nation was a matter of much debate, but a consensus was reached; there was no other city which embodied their ideals more than Orumiyeh, located by the lake of the same name. Its long history detailed perseverance in the face of overwhelming horror and acceptance amongst one another despite their faith, or their ethnicity. These aspects and more are what the republic wished to embody, and therefore the name was settled. \n\nWhen the Dowran-e Tajziyeh finally erupted, there was no going back without submitting Orumiyeh to its own destruction. Fortunately, the nation persevered against the stagnant regime in Tehran, even after they had overthrown the petulant Qajar dynasty. Orumiyeh would not have survived however, had it not been for the aid of the many various groups that now call it home. The radical intelligentsia stirred up syndicalist and socialist fervour amongst the urban proletariat to fight for their rights, the Kurds and Azeris fought alongside one another for the pursuit of greater autonomy and cultural liberation. Even the Jangalis, freedom-fighters of Gilan, had deemed Orumiyeh as a cause worth fighting for. \n\nThese factors, alongside the inadvertant aid which the tribes of the south provided through their own rebellion, eventually led to victory in the Tajziyeh, at the cost of many lives. Though Tehran was not taken, it was no longer in a position to threaten the Tabrizi republic, and therefore it was granted more time to recover and plan for the upcoming years, consolidating the territories it held. Today, Taqizadeh, the father of the nation, still leads and his government's authority reaches from the borders of the Ottoman Empire to the very hinterlands of the Caspian Sea. However, the same allies which were once united in the founding of the Republic of Orumiyeh have now split apart, concerned that the fate of their dear nation will fall into improper hands. Despite the goodwill of Taqizadeh and his cabinet, conflict will inevitably arise within this small state with a big dream. If it can survive however, it may indeed become something even greater than what its founders could have ever anticipated."
orumiyeh.1.a:0 "We can free this country, together."


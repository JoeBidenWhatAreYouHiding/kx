### Leader Bios ###
POLITICS_TAQIZADEH_DESC:0 "Many men will say that change is needed to bring a country to prosperity; but who will fight for that change? This was a question which Seyyed Hassan Taqizadeh has embodied his whole life, and has sought to answer it. In his youth, it was only through the gift of learning that a rising storm began to grow in him. This storm would only grow as he became a parliamentarian representing Tabriz, witnessing the weakness and the decadence of the Qajars. It was during the Weltkrieg, when Taqizadeh found himself in Berlin after being exiled, that his true beliefs manifested themselves through his work and founding of Kaveh, a nationalist journal which spoke of deep, radical, patriotic change as a necessity for the country. His words would insist that only through emulation of Europe and its ideals of absolute liberation could Iran free itself from the shackles of its past. Undoubtedly, his presence within the sphere of radical democrats and nationalists alike would only rise from this point; an early omen of what was to come. \n\nThe Weltkrieg came and went, and the Iranian people was weaker, poorer, sicker. Meanwhile, the Qajars remained in their private estates, oblivious to the suffering of their subjects. This is what Taqizadeh saw, and he could no longer abide by it. The corruption of the Qajars combined with the weakness of the Moderates drove him and his closest allies to ally with the other Radical Democrats and other left-wing groups, and together they would produce a series of essays and articles that would come to be known as the Bayaniye-e Azadi. It was the ultimate manifestation of Taqizadeh's vision for Iran, one which advocated for the freedom of not just the men and women of Iran, but of their culture, of their traditions. \n\nCoupled with the continued collapse of the nation and the unwillingness of the Moderates to compromise, there was only one solution left. Surrounded by a myriad of leftists, disillusioned parliamentarians, and seperatists, Taqizadeh would proclaim a new government of the nation, one which represented the people in a manner which the Qajars had refused. Orumiyeh, the ancient city of a thousand identities, would be the leading face, the ideal, the example by which this new republic would be formed. Thus began the Tajziyeh. Today, though the war never truly had a conclusion, there is a pause in the campaign for liberation. Taqizadeh and his allies remain the face of the nation and its ideals, though it is clear to everyone that his position is precarious. The allies he once relied on have begun to shun him, but it is clear that he will not give up. Afer all, someone needs to keep fighting to bring change."


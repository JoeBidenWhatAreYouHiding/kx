orumiyeh.323.t:0 "Unusual Activity on the Southern Roads"
orumiyeh.323.d:0 "A routine report from our border inspectors in Kermanshah have noted an uptick in truck traffic along the southern routes through Zagros territory. This in itself is by no means unusual - many Assyrians of Orumiyeh are employed in this field - but the recent rise in reports would normally warrant investigation. Be that as it may, there is no reason why we should pursue this matter. The possible dealings of Zagros are not something we wish to be involved in with the Tehran Republic breathing down our necks."
orumiyeh.323.a:0 "File it and move on."


alt.14.t: "Fate of the Military Administration"
alt.14.d: "After Kaygorodov escapes Satunin consolidates his regime. However, the Altaian Duma demands changes and suggests restoring civilian power to the locals. Satunin laughs since he is a kolchakite and against autonomies, but surprisingly the locals receive much support and rejecting their demands will give you constant debuff"
alt.14.a: "Give up power to the Altaian Duma."
alt.14.b: "Refuse their blatant demands."

alt.15.t: "[FROM.GetName] Sends the Delegation"
alt.15.d: ""
alt.15.a: "Reinstate our control over Ulala!"
alt.15.b: "Instead, we shall crush them."

alt.16.t: "The Chuya Qurultai"
alt.16.d: "Our repressive laws against the natives are rapidly increasing resistance! Today Boktor Aq-Qöbök gathers a secret congress of the southern Seoks in Kosh-Agach. He was joined by radical Burkhanists who are disappointed of the Russian colonization. At this congress Boktor has declared that Oirot Khan will not appear in the form of a disembodied spirit - the spirit of Oirot must incarnate in a real ruler from the sacred blood of Aq-Qöbök, an ancient dynasty that once ruled these lands.\n\nHowever, this was less a problem that what followed next. Boktor has formed the 'White Guard of Oirotia' - a disciplined cavalry division armed with modern Japanese weapons. The Cossack garrison in Chuya valley was overwhelmed by the Boktor's forces in an ambush in the Katun gorge, as the native prince's popularity skyrocketed. He is preparing to enter Ulala not as a usurper, but as the savior of the nation."
alt.16.a: "Oh no!"

alt.17.t: "Proclamation of the Principality"
alt.17.d: "The Cossacks, spread and humiliated by Boktor's glorious March on Ulala, refuse to confront the Aq-Qöbök's host, accepting the prince's offer for a common Cossack to join him against the Russian peasant colonizers.\n\n[ROOT.GetLeader] and his clique, meanwhile, escapes Ulala, leaving all of Oirotia in the hands of this new government. Boktor has invited prominent Oirot leaders for a Qurultai in Ulala, that is to be convened in order to proclaim him the new Prince. Grigory Choros-Gurkin himself was offered an honorable title of 'Ulu-Yarlikchi', the Supreme spiritual mentor and cultural regent of Oirotia. As Boktor is crowned, receiving the belt and hat of the Dzhungarian rulers, the Oirot Principality is finally proclaimed."
alt.17.a: "Long live Boktor I!"

alt.18.t: "Protectorate Over [FROM.GetName]?"
alt.18.d: "With the victory of Boktor Aq-Qöbök in Chuya valley of Mountainous Altai, their new government has approached our government wishing to restore good ties and our suzerainty over them. How shall we react?"
alt.18.a: "Agree!"
alt.18.b: "We don't need them."

alt.19.t: "[FROM.GetLeader] Refused!"
alt.19.d: "Unfortunately, the [FROM.GetAdjective] government refused to sign a protectorate treaty with us."
alt.19.a: "Cowards!"

alt.20.t: "Restoration of the Double Tributary System in Chuya Valley?"
alt.20.d: "We were approached by the so-called government of the local petty monarch from the Chuya Valley, [ALT.GetLeader]. As the legitimate heir of the Second Chui Volost, he proposes to return the double tributary regime that existed in these lands in the 19th century. Due to the fact that the inhabitants of these lands will pay tribute to both us and [CHN.GetName], they will receive protection from both states, as well as some preferences. What should we say to this arrogant prince?"
alt.20.a: "Yes, we need a strong ally in the region."
alt.20.b: "What? It is our core land!"

alt.21.d: "We were approached by the ruler of the Chuya Valley in Altai, [ALT.GetLeader], who seeks to restore the double tributary regime that existed in these lands in the 19th century. By paying tribute to Russia and us at the same time, this local prince hopes to receive protectorate from both states and some preferences. Such a regime would allow us to improve trade relations with Russia through simplified customs along the Chui Tract. The Russian government has already given its consent."
alt.21.a: "Alright, we don't see any problems here."
alt.21.b: "We don't need such unnecessary difficulties."

alt.22.t: "[FROM.GetName] Refused!"
alt.22.d: "Unfortunately, the [FROM.GetAdjective] government has refused our double tributary offer."
alt.22.a: "Too bad it happened."

alt.23.t: "[RUS.GetAdjective]-[CHN.GetAdjective]-[ALT.GetAdjective] Treaty"
alt.23.d: "Today, representatives of our three countries met to sign an agreement on the dual regime of tributary status and protection established in the Chui Valley. The parties agreed on all conditions, including specific guarantees and trade conditions for the caravans of the Chui tract."
alt.23.a: "The treaty signed!"

alt.24.t: "The Constitution of the Oirot Republic"
alt.24.d: "After the formation of the first government of Oirotia - the National Council, a coalition of Siberian regionalists and Burkhanists, today at the congress of the Kurultai the first national constitution of the Oirot Republic was finally adopted, largely based on the constitution of Russia, but also containing many national characteristics and strongly influenced by the Oblastnik movement.\n\nThe constitution of Oirotia will stipulate that the Land of Altai (Zemlya-Suu) has rights on an equal basis with humans, and harming nature (illegal cutting of trees, desecration of Arjans-springs) is equated to high treason. Burkhanism (\"Ak Jang\") is recognized as the state ideology, but religious tolerance is guaranteed. In addition, the republic is divided not into faceless regions, but into Aymaqs, the borders of which strictly coincide with the historical nomads of the largest Seoks (Kipchak, Maiman, Todosh, Choros). The passport of a citizen of Oirotia will contain a mandatory column \"Seok\" to preserve the ancestral identity."
alt.24.a: "The nation of Oirotia is getting stronger!"

alt.25.t: "The First Qurultai of Oirotia"
alt.25.d: "Together with the implementation of the first reforms, the Burkhanists finally gained a foothold in power, and therefore the provisional government of the Mountainous Duma announced the convening of the First Oirot Kurultai to adopt a new constitution. \n\nThe draft of the supreme law itself already laid out the main provisions, in particular, the Kurultai should become the main legislative body, consisting of elders of traditional Altai families-Seok, as well as scientists, artists, engineers and invited Russian specialists, including the Gadalov merchants.\n\nAlthough the provisional government was led by Choros-Gurkin from the very beginning, a coalition of Siberian regionalists within the leadership is actively lobbying for the idea that for greater democracy and guarantees, including for Russians, the government should be headed by Oblastnik Vasily Anuchin, who is close to the Russian SRs. In this case, Choros-Gurkin will retain his position as head of state, but his powers will be limited."
alt.25.a: "Vasily Anuchin, a prominent Oblastnik will replace him."
alt.25.b: "Choros-Gurkin will lead us!"

alt.26.t: "The Messenger of White Faith"
alt.26.d: "who will lead and liberate all of Oirotia - who is the true messiah of Ak-Burkhan. event describing various choices for the head of state (not government/ideology change but figurehead for nation)."
alt.26.a: "Choros-Gurkin himself is clearly the one we look for."
alt.26.b: "Warrior Ja Lama is a confirmed reincarnation of Oirat Khan!"
alt.26.c: "The Telengit prince Boktor is a true Oirot messiah."
alt.26.e: "Aleksandr Kaygorodov who brought us liberation is the one."
alt.26.f: "Nikolay Roerich."

alt.27.t: "The Oirot Museum of Local Lore"
alt.27.d: "The exploration of Altai, its historical background and its inhabitants has captivated scholars and explorers since the 18th century. In numerous expeditions, figures such as Peter Pallas, Nikolay Potanin, and Nikolay Roerich amassed extensive collections of ethnographic, archaeological, geological, and other materials in Altai. However, these scientific treasures transcended the local area, gravitating toward the capitals and academic hubs of Russia and Siberia. The nearest museum, established in Barnaul in 1823, lacked the necessary infrastructure and personnel to adequately preserve and showcase the region's cultural heritage.\n\nThe revolutionary upheavals of 1917 within the Russian Empire gave rise to a rapid development of national identity among the diverse ethnic groups inhabiting the Altai region, manifesting itself in increased interest in historical and cultural matters. The establishment of the Altaian Regional Administration in 1917 saw the appointment of Grigory Choros-Gurkin, one of the prominent figures of the Altai community, as its leader. In the year 1918, the municipal council made a decision to acquire the collections amassed by the renowned Gulyaev family, who were ethnographic scholars.\n\nThe official history of this museum began in 1920, when the board of directors of the Mountainous Altaian Department of Public Education resolved at a meeting to \"acknowledge the necessity for establishing a museum in the region of Mountainous Altai\".\n\nFor most of its existence, the future museum was engaged in relocating its collections due to a lack of a permanent space, especially during the period of Mongolian occupation of Ulala. Now, the collections of the museum have been transferred from the village of Qizyl-Ozek to the capital city, where the museum has been allocated a modest stone building on Market Square, formerly the house-shop of merchant Tobokov. The museum is now prepared to welcome visitors.\n\nThe museum is under the leadership of Andrey Anokhin, who dedicated more than two decades of his life to the collection and study of materials related to ethnography, folklore, and song and musical art of the peoples inhabiting southern Siberia and the Altai region. The museum enjoys extensive support from both the local community and government, even boasting a collection of paintings by Grigory Choros-Gurkin, which he generously donated."
alt.27.a: "This should be made our national heritage!"


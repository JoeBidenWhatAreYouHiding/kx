### Events ###
alt.1.t: "The Mountainous Altai"
alt.1.d: "The areas of southern Siberia, including Altai were conquered by the Russian Tsardom in the 18th century. These lands, populated by diverse Siberian-Turkic peoples rejected the Russian rule and in general opposed Orthodox Christianity. By the 1900s a new religious movement rose up - Burkhanism, emerged in response to the needs of a new nation of Altai-kizhi, or Altaians, who sought to distinguish themselves from the neighboring and related tribes. But as the Russian Altaian Spiritual Mission continued to violently suppress the locals, it created a common sense of nationality and desire for self-determination, which was to be fulfilled in the chaos of the Russian Civil War.\n\nThe first autonomous government, pro-Burkhanist, was formed by Altai painter Grigory Choros-Gurkin, which intended to include not only Altai, but also neighboring Tuva and Khakassia - to rebuild the 17th century Oirat state. The Kolchak's government in Siberia, hostile to separatists, dissolved the autonomy and arrested its leaders, but later they were released. For five years between 1920 and 1925 the Altaians enjoyed their autonomy and Choros-Gurkin's Mountainous Duma did small, but effective efforts for building up the nation.\n\nHowever, in 1925 in the chaos of Kolchak Putsch both Altai and its neighboring regions were invaded and occupied by Ungern's Mongolia, and a military administration of Aleksandr Kaygorodov was established, who ruled Altai as his own fiefdom.\n\nNow, with Ungern's power destroyed, the remnants of his clique proclaimed independence of Altai under vile leadership of Kaygorodov, but it also gave hope to the locals. Perhaps, their dream of Oirotia is to be restored."
alt.1.a: "Altay – möñkü kudayıs."

alt.2.t: "The Dictator of Altai"
alt.2.d: "With the death of Mad Baron in Mongolia and his regime collapsing, Aleksandr Kaygorodov, a local warlord, who rules Altai as his own fiefdom has gathered his small council of brothers-in-arms in order to declare independence of this land with rifles in hands. While Mongolia is still recovering from the aftermath of Baron Ungern-Sternberg's demise, there is no doubt that they will come to our hearts, wanting to return the lands (illegally taken from Russia) to their subordination. On the other hand, Russia itself will certainly set its sights on capturing the Chui Valley in its strong hands.\n\nBut this is not the only problem Kaygorodov faces. First, there is opposition from General Satunin within his military administration. Secondly, the Mountain Duma of the local Altaians, led by Choros-Gurkin, who wants to gain their desired autonomy. Thirdly, partisans affiliated with the NRA under the leadership of Yefim Mamontov are also active in the region.\n\nOnly by dealing with all these forces pulling Altai in different directions will we be able to restore order."
alt.2.a: "We must get ready."

alt.3.t: "Kaygorodov Declares Independence of Altai!"
alt.3.d: "Following the death of Mad Baron, the local warlord of Altai region, Aleksandr Kaygorodov, has gathered his military council in order to proclaim the independence of his fiefdom.\n\nWhile our forces are still chaotic in the aftermath of the Ungern-Sternberg's regime collapsing, we must decide if we must destroy the threat coming from Altai or seek another way to deal with them."
alt.3.a: "We'll see what we can do."
alt.3.b: "For Free Altai! (Play as Altai)"

alt.4.t: "Fate of [ALT.GetName]"
alt.4.d.intro: "The region of Altai or Oirot was annexed into Mongolia in 1925 at the request of Mad Baron's ally and local warlord, Aleksandr Kaygorodov. The local Altaian people, however, are neither Mongols nor Buddhists, but Turkic tribes, despite being close to the Western Mongol tribe of Oirats."
alt.4.d: "$alt.4.d.intro$\n\nWe must now decide what to do with these splinter state. Our government does not currently seek war with them, as we are still weak, despite conquering this rump state will be less than a nuisance."
alt.4.d2: "$alt.4.d$ Instead, [MON.GetLeader] suggests to establish friendly ties with them. This will help us secure an ally in the region.\n\nOn contrary, some of the generals believe that this rump state would anyway be conquered by the awaking Russian bear, and thus restoring it to Mongolia would be safer."
alt.4.d3: "$alt.4.d.intro$\n\nHowever, [MON.GetLeader] believes that this rump state would anyway be conquered by the awaking Russian bear, and thus restoring it to Mongolia would be safer."
alt.4.a: "We must demand their submission!"
alt.4.b: "Try to establish ties with local Altaians."
alt.4.c: "Just ignore them."

alt.5.t: "A Friendly Envoy From [FROM.GetLeader]"
alt.5.d: "The new government of Mongolia and their leader, [MON.GetLeader], has sent a friendly envoy to [654.GetCapitalVictoryPointName] in order to establish ties between our nations. As we understand that the Mongolian occupation of Altai was only due to Kaygorodov's interest and Mad Baron's ambitions, perhaps re-establishing ties with our neighbors would be a great opportunity, especially if we manage to receive their protection from Russia."
alt.5.a: "Sure, we are neighbors."
alt.5.b: "We do not seek friendship with the Mongolian oppressors!"

alt.6.t: "[ROOT.GetAdjective] Envoy Sent Back!"
alt.6.d: "Unfortunately, the local leaders refused to establish ties with us. Perhaps, their ridiculuos dreams of establishing the Great Oirot state have made them clearly mad."
alt.6.a: "Pathetic!"

alt.7.t: "Unity of Ak Burkhan Under Ja Lama?"
alt.7.d: "Ja Lama, the brave leader of [MON.GetNameDef] has claimed to be the true successor of Amursana and has already been promoting the Ak Jang, the White Faith in Mongolia. He promises to make it the second official religion. While some in our government, including Grigory Choros-Gurkin, are looking at Ja Lama with distrust, the idea of the great Oirat restoration is becoming closer. As Ja Lama has officially sent his envoy to [654.GetCapitalVictoryPointName], suggesting that we must unite with our brothers-in-faith and in-arms in a common hope for restoring the Oirat Empire."
alt.7.a: "This warlord is neither grandson nor reincarnation of Amursana!"
alt.7.b: "We must unite with our brothers in [MON.GetName]!"

alt.8.t: "Confrontation with General Satunin"
alt.8.d: ""
alt.8.a: "We have to calm him down!"

alt.9.t: ""

### Ideas ###

ALT_complex_interfaith_relations: "Complex Interfaith Relations"
ALT_complex_interfaith_relations_desc: "Altai today is a site of a complex interplay of various religious movements. On one hand, the legacy of the Russification policies of the Imperial Russia, coupled with the aggressive advance of Orthodox missionaries. On the other hand, the traditional Altaic shamanistic beliefs, which continue to have a following. In contrast to these, there is the emerging religion of Burkhanism, which serves as a response to these two other faiths and is rapidly gaining popularity. It represents a synthesis of reformulated Altaic shamanic practices and folk traditions, incorporating elements of Tibetan and Mongolian Buddhist beliefs. One way or another, this religious tension hinders the development of Altai along any particular path."
ALT_land_crisis: "Agrarian Crisis"
ALT_land_crisis_desc: "The ongoing land dispute in the Altai region, caused by the Russian settlers and Cossack groups, continues to cause confusion among the local population and disrupt their traditional way of life. Prior to the arrival of Russian settlers, the Altai people had a long history of pure-strain stock-breeding, which remains a significant part of our cultural identity. Current agricultural practices are however limited due to the underdeveloped infrastructure of the region."
ALT_cossack_administration: "Military Administration"
ALT_cossack_administration_desc: "For almost 20 years, the local government in Altai has been represented by the military commander Kaigorodov and his clique - associates of Baron Ungern, Cossacks, and Russian settlers. This military administration is based on force and the suppression of local people who are not able to fight back against much better trained and trained officers."
ALT_cossack_sich: "Altaian Cossack Sich"
ALT_cossack_sich_desc: "The Altaian Cossack state, or Altaian Sich, after the name of the traditional Cossack military administrative centers and military camps, is the patrimony of Kaigorodov, who has now become the ataman of this new formation. The Altaian Sich, created in the image and likeness of the army of other Cossack chieftains, serves to protect the interests of the Altaians. In practice, however, it is only to protect the interests of Ataman Kaigorodov and his military clique."
ALT_anarchist_resistance_1: "Scattered Anarchist Bands"
ALT_anarchist_resistance_1_desc: "Ever since the end of the Russian Civil War, the People's Rebel Army of Altai (NPAA) has been laying low, largely disintegrating into disparate bands that continue to occasionally operate in our region. The NPAA's leader, Yefim Mamontov, remains in hiding, and the organization itself is not actively engaged in combat, relying primarily on limited supplies from the Transamur's NRA."
ALT_anarchist_resistance_2: "Organized Anarchist Resistance"
ALT_anarchist_resistance_2_desc: "With the outbreak of the new Russian civil war, the activities of the NPAA intensified, as they established communication with the newly formed revolutionary government in Petrograd. The anarchists now have shifted to actively engaging in acts of sabotage, evidently preparing for an uprising."

ALT_national_movement: "Altai-Oirot National Movement"
ALT_national_movement_desc: "With the advent of the Burkhanist regime, the Altai-Oirot national movement is once again flourishing. Aspiring to restore the grandeur of Oirotia and usher in a new era of prosperity, the Altai-kizhi are forging a path towards political consciousness. The sentiment of patriotism towards Khan Altai is on the rise, and the expansion of the Milk Faith is actively progressing."

ALT_yak_breeding: "Altaian Agriculture"

ALT_complex_interfaith_relations_1: "Isolating Orthodox Mercenaries"
ALT_complex_interfaith_relations_1_desc: "We must completely isolate our people from the influence of Russian settlers and Orthodox missionaries, who persist in propagating their religion in place of our genuine White Faith."
ALT_complex_interfaith_relations_2: "Crackdown on Khara Jañdu"
ALT_complex_interfaith_relations_2_desc: "The Black Faith of the Altai shamans, who continue to sacrifice livestock in the name of spirits and strike their drums on stone, remains strong among our people. It is our duty to do everything in our power to eradicate these archaic beliefs."
ALT_complex_interfaith_relations_3: "Instilling Orthodox Christianity"
ALT_complex_interfaith_relations_3_desc: "The local beliefs in spirits and so-called \"Burkhanism\" are nothing but heresy and an abominable parody of the true deity. We must make every effort to propagate the Orthodox faith both through our spiritual mission and in our daily lives."

ALT_artillery_positions: "Artillery in the Mountains"
ALT_conscripted_tribes: "Altaian Self-Defense"
ALT_modern_army: "Towards Modern Army"


### Focuses ###
## Kaygorodov & Satunin ##
ALT_Protect_Altai: "To Protect Altai"
ALT_Protect_Altai_desc: "Altai must be protected. With our independence, all strategic points - the Chike-Taman and Seminsky passes, the exits to the Katun and Biya rivers should be placed under the control of Cossack outposts."
ALT_Cossack_Administration: "Cossack Administration"
ALT_Cossack_Administration_desc: "We must further consolidate all military and civil power in the hands of the Commander-in-Chief, who currently rules based on emergency decrees of wartime."
ALT_Agreement_With_Gurkin: "Agreement with Choros-Gurkin"
ALT_Agreement_With_Gurkin_desc: "We must seek alliance with the local civilians - perhaps by giving them more control over the life of Altai seoks (families) and internal affairs. Furthemore, we must use Choros-Gurkin's authority for legimitizing our power among the native Altaians, or Oirots as they call themselves."
ALT_Disperse_The_Mountainous_Duma: "Disperse the Mountainous Duma"
ALT_Disperse_The_Mountainous_Duma_desc: ""
ALT_Revitalize_Local_Workshops: "Revitalize Local Workshops"
ALT_Revitalize_Local_Workshops_desc: ""
ALT_Challenge_Satunin: "Challenge Satunin"
ALT_Challenge_Satunin_desc: "The influence of Dmitry Satunin is increasing each day, as he starts plotting against Kaygorodov's rule, rallying the opposition against playing down with the Burkhanists."

ALT_Altai_Sech: "Altaian Sich"
ALT_Altai_Sech_desc: "We must move towards establishing a true Cossack state, also convening a formal legislative body - the Host Circle, consisting exclusively of the Cossack elite, officers and loyal representatives of the large Siberian merchants. The ordinary peasantry, workers will not have voting rights in our system. "
ALT_Form_Cossack_Regiments: "Form Cossack Regiments"
ALT_Form_Cossack_Regiments_desc: "We must enlist more Cossacks from the local stanitsas to safeguard our nation and establish specialized Cossack formations that shall not only serve as garrisons but also liberate our people in neighboring regions."
ALT_Restore_The_Siberian_Host: "Restore the Siberian Host"
ALT_Restore_The_Siberian_Host_desc: "The Siberian Cossack Host has been virtually annihilated, and those few who remain have been stripped of the privileges and rights they had so long earned. We must do everything in our power to revive the entirety of Siberian Cossacks, eradicating our adversaries in the process. Our Ataman's vision is that this revival should commence with the liberation of Omsk, followed by the reconstitution of the Siberian Cossack Host through the efforts of the Altai people."
ALT_Altai_For_Altaians: "Altai for Altaians"
ALT_Altai_For_Altaians_desc: "The indigenous Siberian Cossacks must receive enormous priveleges - they will be exempt from taxes, and their allotments will be inviolable. In return, each Cossack family is obliged to send a man with his horse, saddle and cold steel to the Host."

ALT_Military_Administration: "Military Administration"
ALT_Military_Administration_desc: "Despite the fact that the military administration in Altai has been in place for many years, our government is still lacking stability. It is necessary to depart from the Cossack-based principles that have been the foundation of the Altai Military Administration, and to cease Cossack separatism. A glance at the failed Hetmanate of Ukraine, which has degenerated into a mere puppet state under the Germans, serves as a clear example. We are an integral part of Greater Russia, and will always be."
ALT_Support_Kolchaks_Claims: "Support Kolchak's Claim"
ALT_Support_Kolchaks_Claims_desc: "Having initially espoused the Cossack rebellion in 1925, the Altai Cossacks have advocated for the dismantling of the criminal regime in Petrograd. Our comrades in Vladivostok maintain a favourable disposition towards our government, and it is our duty to formally join their struggle against all those who seek to subvert Great Russia."
ALT_Revive_The_Soyombo: "Revive the Soyombo"
ALT_Revive_The_Soyombo_desc: "The Soymobo Revival Society, established by a number of supporters of Ungern, including members of our government, must be revived, with its original objectives of establishing a Russian nation-state in Mongolia and reclaiming the territories lost by Russia to China. Our first step must be to dismantle the anti-Russian regime in Mongolia that emerged after the demise of Baron Ungern."

ALT_Fighting_Anarchist_Rebels: "Combat Anarchist Rebels"
ALT_Fighting_Anarchist_Rebels_desc: "The Anarchist underground is still strong - we must divide Altai into military sectors and introduce a severe passport regime. Furthermore, a worker or peasant shall have no right to change his place of work without the written permission of the military commander and any attempts to organize even a mutual aid funds will be interpreted as preparation of an anarcho-communist rebellion."
ALT_Intensify_Altai_Spiritual_Mission: "Intensify the Altaian Spiritual Mission"
ALT_Intensify_Altai_Spiritual_Mission_desc: ""
ALT_Burkhanist_Indoctrination: "Burkhanist Indoctrination"
ALT_Burkhanist_Indoctrination_desc: "We must use Burkhanism as a powerful ideological shift against socialism - the urban faith of the atheists, who take away cattle and land from the Altaians. The White Faith and the Free Cossacks are brothers whi protect Altai from outsiders. However, the Burkhanists themselves and their leader Gurkin must be placed in such conditions, where any attempt to talk about real autonomy or event independence will lead to the immediate deployment of punitive Cossack hundreds."
ALT_Expand_Russian_Settlements: "Expand Russian Settlements"
ALT_Expand_Russian_Settlements_desc: ""
ALT_Military_Land_Fund: "Land Fund of the Host"
ALT_Military_Land_Fund_desc: "The backbone of the left underground are the peasants, who came to Altai during the Stolypin reform - they are in majority traitors, who brought the contagion of Bolshevism and rebellion. We must deprive them of the right to own land and withdraw it to the Land Fund of our Host. All these peasant newcomers will be obliged to either rent it from the Cossack stanitsa for a half of the harvest, or go as a batrak to the old-timer Cossacks."

ALT_Cult_Of_Mad_Baron: "Cult of Baron Ungern"
ALT_Cult_Of_Mad_Baron_desc: "While our enemies call Baron Ungern the Mad Baron, he died as a martyr for faith and order, who cleansed the region of \"red filth\", even if his last fight was lost. We must hand his portraits in the headquarters next to Orthodox icons and spread the rumors among Altaians that Ungern did not die, but went to Shambhala and will return once Altai is in danger."

ALT_Smuggle_Equipment: "Gather Equipment"
ALT_Smuggle_Equipment_desc: "We do not possess military factories, and only the artisanal production of ammunition can save us. However, there remains a significant quantity of weapons in our region, dating back to both the period of civil war and Mongolian domination. It is important that we acquire weapons and uniforms for our forces in order to assert our sovereignty."
ALT_Artillery_Shipments: "Secure Artillery Shipments"
ALT_Artillery_Shipments_desc: "We must fortify our mountainous terrain with the most advanced artillery systems to provide adequate support for our military operations. To date, we have successfully negotiated the acquisition of weapons from nearby Russian factories specializing in the production of artillery, allowing us to restock our arsenals."
ALT_Master_Khan_Altai: "Master the Khan Altai"
ALT_Master_Khan_Altai_desc: "The rugged terrain of our mountains should serve as a natural bulwark against any would-be conquerors. By honing the skills of our soldiers in mountain warfare, we can ensure the security of Altai."
ALT_Recruit_Seoks: "Recruit the Seoks"
ALT_Recruit_Seoks_desc: "The Altai seoks have long been disengaged from the defence of their ancestral lands. We must establish indigenous units composed of Altai natives to significantly augment the capabilities of our military forces."
ALT_Fighting_In_Taiga: "Fighting in the Taiga"
ALT_Fighting_In_Taiga_desc: "Not only the mountains but also the unyielding Siberian taiga constitute an integral part of our region. The imposing forests of Altai must be harnessed for the purpose of defence and successful military campaigns against any would-be invaders."

ALT_Towards_Modern_Army: "Towards a Modern Army"
ALT_Towards_Modern_Army_desc: "While it is premature to assert that our military might can rival that of major global powers, the [ROOT.GetAdjective] army, which began as a mere division, is already emerging as a formidable force in the region. This army is well-equipped to confront any potential adversaries and, should the need arise, liberate our people from the shackles of oppression."
ALT_Build_Runway_In_Ulala: "Grass Air-Strip in [654.GetCapitalVictoryPointName]"
ALT_Build_Runway_In_Ulala_desc: "While we have no capacity to produce our own aircraft, we need air bases for our allies and the planes we buy from Russia and China. The first air-strip will be built in [654.GetCapitalVictoryPointName], while made of grass - but it is the first step towards Altai renewal."
ALT_Motorized_Cavalry: "Motorization of the Cavalry"
ALT_Motorized_Cavalry_desc: "Our military forces must be sufficiently mobile to conduct combat operations with proficiency. A first consignment of Russian-manufactured military trucks has been procured, but complete motorization remains an aspiration. Nonetheless, the progressive replacement of horse-drawn cavalry with fully functional and more reliable vehicles is a paramount objective."

## Burkhanists ##
ALT_The_Milk_Faith: "The Milk Faith"
ALT_The_Milk_Faith_desc: ""
ALT_New_Yarlikchi_Of_Altai: "New Yarlikchi of Altai"
ALT_New_Yarlikchi_Of_Altai_desc: "The institution of Yarlikchi (preachers, who spread the White Faith) will undergo a radical transformation. The national intelligentsia, writers and artists from among the Altaian seoks would become the new Yarlikchi, and furthermore, we will introduce the office of State Yarlikchi - or a minister of enlightenment, as the Europeans call it. A theological academy will be also constructed in Anuya to study saryns, world history, political science and philosophy. The new Yarlikchi will purify White Faith from superstition and transform it into a national religion, capable of competing with Buddhism and Christianity."
ALT_Fighting_Chichke_Put: "Fighting the Chichke-Put"
ALT_Fighting_Chichke_Put_desc: "The Chichke-put, or \"thin-legged\", are the Russian colonizers and Cossacks who settled on our lands and inflicted so much suffering. We must safeguard our pastures against these masses of illiterate settlers and eradicate the spread of the Russian religion."
ALT_Finish_Off_Black_Faith: "Eradicate the Black Faith Remnants"
ALT_Finish_Off_Black_Faith_desc: "The disciples of the Black Faith - shamans and witches in the mountains and taiga - continue to spread their poison. We must introduce a total ban on shamanic practices: their timbrels, costumes and Qormas idols, used in rituals, will be declared receptacles of evil spirits and publicly burned. The practice of animal blood offerings will be strictly prohibited and in its place, we will offer prayers to Ak Burkhan by sprinkling offerings of milk, tea and Talkan."
ALT_Patriotism_Altai: "Altaian Patriotism"
ALT_Patriotism_Altai_desc: "The population of Altai was historically divided into two large groups - the nomadic pastoralists in the South (Telengits and Teleuts) and the taiga hunters and fishermen in the North (Tubalar, Chalkandu, Kumandians). The Russians called us White Kalmyks and Black Tatars. But no more - we are Altai-kizhi, or the Altaian people as a nation. We are Ak Jang kizhi - people of the White Faith). And we are Oirot - in our history and heritage. Let the patriotism of our new nation arise!"
ALT_Qurultai_Power: "Convene the State Qurultai"
ALT_Qurultai_Power_desc: "The initial stages of reform have been implemented, and it is now imperative to convene a state council, or qurultai, in lieu of the defunct mountain duma. This qurultai shall comprise not only representatives from the traditional Altai seok families, but also scholars, artists, and merchants, with the aim of drafting a constitution for Oirotia."
ALT_Searching_For_Messenger_Of_White_Faith: "Searching for the Messenger of the White Faith"
ALT_Searching_For_Messenger_Of_White_Faith_desc: "We must send sacred expeditions deep into Mongolia, Tyva and the upper reaches of Xinjiang to look for real spiritual leaders of Eastern Buddhism and Theosophy who are able to recognize Oirotia as a sovereign state. For a society in a state of constant spiritual expectation and mobilization the search for the Messenger shall be a national idea."
ALT_Inspiration_By_Amursana: "Inspired by Amursana"
ALT_Inspiration_By_Amursana_desc: "Prince Amursana, the last ruler of Dzhungaria who fought the Qing Empire is both our legal and spiritual ancestor. His heroic struggle against colonization shall inspire all of us."
ALT_Institutionalize_Burkhanist_Prayers: "Institutionalize Burkhanist Prayers"
ALT_Institutionalize_Burkhanist_Prayers_desc: "For too long chaotic and temporary wooden altars in the Taiga and mountains were forced to be hidden. Our great leader, using his talent as an architect and artist has designed  majestic white-stone temples, combining the features of Buddhist datsans, Altaian ails and even European Art Nouveau. The main Temple of the White Faith is to be built at the confluence of the Katun and Chuya rivers and the prayers in it would be conducted according to the calendar on full moons. The Saryn-anthems would be performed by state choirs to the accompaniment of modernized topshuurs and yadagans."
ALT_Restore_The_Oirot_Khanate: "Restore the Oirot Khanate"
ALT_Restore_The_Oirot_Khanate_desc: "Oirot Khan, the just ruler, whose era was a period of independence, might, and prosperity, shall return to liberate Altai-kizhi and restore the golden age of Oirotia. However, to expedite his return, we must unite all true descendants of Oirot Khan under one banner."
ALT_Ban_Alcohol_Tobacco: "Ban Alcohol and Tobacco"
ALT_Ban_Alcohol_Tobacco_desc: "Widespread drunkenness in Altai, fueled by both the Chichke-put influence and the consumption of Khakass araka, a type of milk vodka, is spiraling out of control. This situation is exacerbated by the devastation, caused by the activities of Cossacks and Russian settlers on the local economy. We must impose the harshest penalties, including a complete ban on the production and sale of all alcoholic beverages and declare smoking a sin, destroying all smoking pipes."
ALT_Unite_Seoks: "Unite the Seoks"
ALT_Unite_Seoks_desc: "For centuries, our illustrious Altaic tribes have been estranged, yet we share a common Turkic tongue, a shared history, and faith. If at all possible, we have to eradicate the perceived superiority of certain Seoks over others, and to forge them into a single nation."
ALT_Faith_in_Triune_Uch_Kurbustan: "Faith in Triune Ak-Burkhan"
ALT_Faith_in_Triune_Uch_Kurbustan_desc: "Our great Ak-Burkhan is triune in his nature. Uch-Kurbustan is the supreme cosmic principle, the Creator and the pure spirit of Altaian Sky. Oirot Khan is an earthly incarnation, a savior king, messiah and a defender of the people. Altai-Eezi (Spirit of Altai) is the immanent presence of the deity in every mountain river and tree. Combined, Ak-Burkhan brings our people glory and freedom, and liberation from foreign oppressors who want to exploit our great land."
ALT_Offerings_To_Taika_Eezi_Arzhans: "Offerings to Taika-eezi and Arjans"
ALT_Offerings_To_Taika_Eezi_Arzhans_desc: "We must protect our nature, our healing springs and bring our official offerings to these sacred places. The official trips of the government members to these places in orde to tie sacred white ribbons on behalf of the entire Oirot people, praying for peace and fertility, shall be regular and compulsory."
ALT_Lake_Of_Mountain_Sprits: "Lake of Mountain Spirits"
ALT_Lake_Of_Mountain_Sprits_desc: "The famous painting of Choros-Gurkin, \"Lake of Mountain Spirits\", praising a lake near Qaraqol lakes shall become our sacral center. We must protect our nature, and use its gifts for our people, forbidding tourists, industrialists and hunters to use these sacred lands."
ALT_Support_Gadalov_Merchants: "Support the Gadalov Merchants"
ALT_Support_Gadalov_Merchants_desc: "The Gadalov family, prominent Siberian gold miners and merchants with vast capitals and regional influence are ready to forge a strategic alliance with our government. They would become the primary bankers and investors in the fledging Oirot Republic, secured for their capital and exclusive trading rights in Oirot's raw materials, including leather, fure and pine nuts. We can rely on their finances in our infrastructure projects, such as roads and modernization of the Chüy valley."
ALT_New_Golden_Age: "The New Golden Age"
ALT_New_Golden_Age_desc: ""
ALT_Great_Oirotia: "Great Oirotia"
ALT_Great_Oirotia_desc: ""

## Altai Economy ##
ALT_Yaks_Breeding: "Yak Breeding"
ALT_Yaks_Breeding_desc: "Cattle breeding, like Yak breeding, has long been a hallmark of the Altaian people. We must significantly expand our pastures at the expense of alien settlers and revive our agricultural sector."
ALT_Mechanization_Of_Agriculture: "Mechanization of Agriculture"
ALT_Mechanization_Of_Agriculture_desc: "The influx of the latest models of tractors from the Ural region will enable us to mechanize a small portion of our arable land, thereby significantly boosting agricultural output."
ALT_Develop_Light_Industry: "Development of Light Industry"
ALT_Develop_Light_Industry_desc: "The Altai region is not conducive to heavy industry in any way, so we must make do by supporting the textile industry and timber mills."
ALT_Export_Honey_Herbs: "Export Honey and Herbs"
ALT_Export_Honey_Herbs_desc: "We shall open a laboratory in Ulala that would patent Altaian medicine for the Russian and Chinese markets, as the base of our budget is the export of cedar oil, mountain honey and medicinal herbs."

## Chui Volost ##
ALT_Second_Second_Chui_Volost: "New Incarnation of the Second Chui Volost"
ALT_Second_Second_Chui_Volost_desc: "The White Guard of Oirotia enters Ulala as liberators, forcing Choros-Gurkin to resign and crown Boktor Aq-Qöbök as the new Oirot monarch and successor to the Oirat Khan. With the restoration of the Second Chui Volost, it will now take course on establishing the Sayan-Altaian Buddhist Khanate."
ALT_Heritage_Of_Hongorai: "Heritage of Hongorai"
ALT_Heritage_Of_Hongorai_desc: "As descendants of the great Hongorai state, Boktor I and his allies shall reclaim the legacy of Hongorai, forming the Sayan tumen - the cavalry division of White Buddha to recruit Telengit riflemen, Tuvan volunteers and Khakass traditionalists. The tribal aristocracy and nobles of Honograi shall also receive recognition and opportunities."
ALT_Buddhist_Altai: "Spread Buddhism in Altai"
ALT_Buddhist_Altai_desc: "We shall build the Buddhist datsans in Kosh-Agach, Ulagan and Chemala and transform them into main administrative, educational and judicial centers. Furthermore, we will transfer pastures and cattle to the monasteries, modernizing our stock-breeding using the Mongol-Tibetan example."
ALT_Absolute_Power_Of_Dynasty: "Absolute Power of the Aq-Qöbök"
ALT_Absolute_Power_Of_Dynasty_desc: "We shall proclaim theocracy and hereditary power of the great Aq-Qöbök seok, the descendants of the Qöbögösh from the Hyrgys dynasty. The strict vertical of power and compulsory conscription will bring our nation to the glory it deserves."

ALT_Restore_Ties_To_Qing: "Ties to the Qing Empire"
ALT_Restore_Ties_To_Qing_desc: "Russia has proven to be an unreliable partner, having failed to uphold its commitments regarding taxation and embarked on a path of colonization. However, our future course is now divergent from theirs. We must forge a new alliance with the Qing Dynasty, seeking their patronage for our own protection."
ALT_Restore_Double_Tributary_Regime: "Restore the Dual Tributary System"
ALT_Restore_Double_Tributary_Regime_desc: "The dual tributary system, which operated more than a century ago, once proved to be highly advantageous for our nation during the era of the Second Chui Volost. At that time, we benefited from the protection and commercial advantages offered by our larger neighbours, Russia and China. It is plausible that such a scenario would continue to be beneficial for us even now, should we secure similar concessions from these two powers."

ALT_The_New_Khaganate: "Proclaim the Sayan-Altaian Khanate"
ALT_The_New_Khaganate_desc: "Total support from the southern seoks and the military has brought us to the restoration of the Great Oirot Khanate under our great dynasty."


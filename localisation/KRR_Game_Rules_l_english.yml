ALT_PATH: "ÂŁKR_game_rule_flag_ALT   Future of Altai"
RULE_OPTION_ALT_PATH_RANDOM: "Default"
RULE_OPTION_ALT_PATH_RANDOM_DESC: "After the death of Baron Ungern, the Altai Military Administration takes power in Ulala and Mountainous Altai region. With the inter-ethnic troubles and anarchist resistance, the future of Altai remains unknown."
RULE_OPTION_ALT_PATH_RADSOC: "ÂŁKR_game_rule_flag_ALT_radical_socialist   Anarchist Uprising"
RULE_OPTION_ALT_PATH_RADSOC_DESC: "After the death of Baron Ungern, the Altai Military Administration takes power in Ulala and Mountainous Altai region. When the Russian Civil War breaks out, the local NPAA (People's Insurgent Army of Altai) manages to seize power in Biysk and raise an uprising against the government in Ulala, proclaiming the Â§NFree Territory of AltaiÂ§!.\nÂ§RRequires:Â§!\nÂ§CRevolutionÂ§! in ÂŁKR_game_rule_flag_RUS   Aftermath of the Assassination\nAny Â§Cnon-Ungern pathÂ§! in Â§Y$MON_UNGERN_PATHS$Â§!"
RULE_OPTION_ALT_PATH_SYNDIE: "ÂŁKR_game_rule_flag_ALT_radical_socialist   Militarized Anarchism"
RULE_OPTION_ALT_PATH_SYNDIE_DESC: "$RULE_OPTION_ALT_PATH_RADSOC_DESC$\nAfter consolidating its power, the NPAA under partisan Â§VMikhail PrudnikovÂ§! transforms Altai into a heavily militarized utopia that survives on producing and selling cheap erzats-equipment and Spartan-alike social rules.\nÂ§RRequires:Â§!\nÂ§CRevolutionÂ§! in ÂŁKR_game_rule_flag_RUS   Aftermath of the Assassination\nAny Â§Cnon-Ungern pathÂ§! in Â§Y$MON_UNGERN_PATHS$Â§!"
RULE_OPTION_ALT_PATH_RADSOC_UKR: "ÂŁKR_game_rule_flag_ALT_UKR   Grey Ukraine"
RULE_OPTION_ALT_PATH_RADSOC_UKR_DESC: "$RULE_OPTION_ALT_PATH_RADSOC_DESC$\nAfter consolidating its power, the NPAA allies the Ukrainian settlers and proclaims the Â§Nnational-anarchist territory of Grey UkraineÂ§ under the leadership of Feodosiy Kozyr.\nÂ§RRequires:Â§!\nÂ§CRevolutionÂ§! in ÂŁKR_game_rule_flag_RUS   Aftermath of the Assassination\nAny Â§Cnon-Ungern pathÂ§! in Â§Y$MON_UNGERN_PATHS$Â§!"
RULE_OPTION_ALT_PATH_RADSOC_TIB: "ÂŁKR_game_rule_flag_ALT_radical_socialist   Anarcho-Burkhanism"
RULE_OPTION_ALT_PATH_RADSOC_TIB_DESC: "$RULE_OPTION_ALT_PATH_RADSOC_DESC$\nAfter consolidating its power, the NPAA allies the native Burkhanists who believe that their God Ak-Burkhan has rejected the concept of state in order to establish an Â§Nanarcho-communist Shambhala.Â§!\nÂ§RRequires:Â§!\nÂ§CRevolutionÂ§! in ÂŁKR_game_rule_flag_RUS   Aftermath of the Assassination\nAny Â§Cnon-Ungern pathÂ§! in Â§Y$MON_UNGERN_PATHS$Â§!"
RULE_OPTION_ALT_PATH_SOCLIB: "ÂŁKR_game_rule_flag_ALT   Burkhanist Oirotia"
RULE_OPTION_ALT_PATH_SOCLIB_DESC: "After the death of Baron Ungern, the Altai Military Administration takes power in Ulala and Mountainous Altai region. After the confrontation between general Satunin and general Kaygorodov, the local Altaians support the latter, forcing him to recognize the civilian government of Grigory Choros-Gurkin in Ulala. The local ethno-religious government of Â§lBurkhanistsÂ§! establishes the Oirot Republic.\nÂ§RRequires:Â§!\nAny Â§Cnon-Ungern pathÂ§! in Â§Y$MON_UNGERN_PATHS$Â§!"
RULE_OPTION_ALT_PATH_PATAUT: "ÂŁKR_game_rule_flag_ALT   Military Administration"
RULE_OPTION_ALT_PATH_PATAUT_DESC: "After the death of Baron Ungern, the Altai Military Administration takes power in Ulala and Mountainous Altai region. Either general Satunin or general Kaygorodov wins in the power struggle and establishes a firm military dictatorship in the region, inspired by Baron Ungern's rule in Mongolia.\nÂ§RRequires:Â§!\nAny Â§Cnon-Ungern pathÂ§! in Â§Y$MON_UNGERN_PATHS$Â§!"
RULE_OPTION_ALT_PATH_PATAUT_TRM: "ÂŁKR_game_rule_flag_ALT  ÂŁKR_game_rule_flag_TRM   Kolchak's Pawn"
RULE_OPTION_ALT_PATH_PATAUT_TRM_DESC: "After the death of Baron Ungern, the Altai Military Administration takes power in Ulala and Mountainous Altai region. Either general Satunin or general Kaygorodov wins in the power struggle and establishes a firm military dictatorship in the region, inspired by Baron Ungern's rule in Mongolia.\nThey later ally a friendly regime in Vladivostok.\nÂ§RRequires:Â§!\nAny Â§Cnon-Ungern pathÂ§! in Â§Y$MON_UNGERN_PATHS$Â§!"
RULE_OPTION_ALT_PATH_PATAUT_MON: "ÂŁGFX_KR_game_rule_flag_MON_RUS   Restoring the Soyombo"
RULE_OPTION_ALT_PATH_PATAUT_MON_DESC: "After the death of Baron Ungern, the Altai Military Administration takes power in Ulala and Mountainous Altai region. General Kaygorodov wins in the power struggle and establishes a cossack state with himself as its Ataman.\nThey later gather the Soyombo Revival Society in Ulala to reconquer Mongolia and establish an ethnic Russian state.\nÂ§RRequires:Â§!\nAny Â§Cnon-Ungern pathÂ§! in Â§Y$MON_UNGERN_PATHS$Â§!"
RULE_OPTION_ALT_PATH_PATAUT_COS: "ÂŁKR_game_rule_flag_ALT   Altaian Sich"
RULE_OPTION_ALT_PATH_PATAUT_COS_DESC: "After the death of Baron Ungern, the Altai Military Administration takes power in Ulala and Mountainous Altai region. General Kaygorodov wins in the power struggle and establishes a cossack state with himself as its Ataman.\nÂ§RRequires:Â§!\nAny Â§Cnon-Ungern pathÂ§! in Â§Y$MON_UNGERN_PATHS$Â§!"

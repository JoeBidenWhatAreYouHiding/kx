RULE_OPTION_ALT_PATH_PATAUT_SIB_COS_DESC: "After the death of Baron Ungern, the Altai Military Administration takes power in Ulala and Mountainous Altai region. General Kaygorodov wins in the power struggle and establishes a cossack state with himself as its Ataman. He later decides to restore the Siberian Cossack Host and reconquer its lands.\nÂ§RRequires:Â§!\nAny Â§Cnon-Ungern pathÂ§! in Â§Y$MON_UNGERN_PATHS$Â§!"
RULE_OPTION_ALT_PATH_NATPOP: "ÂŁKR_game_rule_flag_ALT_national_populist   Monarchist Oirotia"
RULE_OPTION_ALT_PATH_NATPOP_DESC: "$RULE_OPTION_ALT_PATH_PATAUT$\nSeveral months later the Telengits raise a popular uprising against the Russians, proclaiming the power of the Aq-Qoboq dynasty under Boktor I.\nÂ§RRequires:Â§!\nAny Â§Cnon-Ungern pathÂ§! in Â§Y$MON_UNGERN_PATHS$Â§!"
RULE_OPTION_ALT_PATH_NATPOP_CHUI: "ÂŁKR_game_rule_flag_ALT_national_populist  ÂŁKR_game_rule_flag_RUS   Second Chui Volost"
RULE_OPTION_ALT_PATH_NATPOP_CHUI_DESC: "$RULE_OPTION_ALT_PATH_PATAUT$\nSeveral months later the Telengits raise a popular uprising against the Russians, proclaiming the power of the Aq-Qoboq dynasty under Boktor I.\nHe later restores the Second Chui Volost receiving protection of both Russian and China.\nÂ§RRequires:Â§!\nAny Â§Cnon-Ungern pathÂ§! in Â§Y$MON_UNGERN_PATHS$Â§!"
RULE_OPTION_ALT_PATH_NATPOP_QIE: "ÂŁKR_game_rule_flag_ALT_national_populist  ÂŁKR_game_rule_flag_QIE   Qing-aligned Oirotia"
RULE_OPTION_ALT_PATH_NATPOP_QIE_DESC: "$RULE_OPTION_ALT_PATH_PATAUT$\nSeveral months later the Telengits raise a popular uprising against the Russians, proclaiming the power of the Aq-Qoboq dynasty under Boktor I.\nHe later restores the Oirot Khanate as part of the Qing Empire's sphere.\nÂ§RRequires:Â§!\nAny Â§Cnon-Ungern pathÂ§! in Â§Y$MON_UNGERN_PATHS$Â§!"



